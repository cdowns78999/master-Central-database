<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Hearts - Ethereal Animation</title>
    <style>
        :root {
            --primary-red: #ff3e60;
            --primary-gradient: linear-gradient(135deg, #ff3e60 0%, #ff7eb3 100%);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --bg-dark: #0a0a12;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-dark);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 2000px;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: white;
        }

        #background-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(255, 62, 96, 0.15) 0%, transparent 70%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            position: relative;
            transform-style: preserve-3d;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 3D Heart Component */
        .heart-3d {
            position: relative;
            width: 100px;
            height: 90px;
            transform-style: preserve-3d;
            animation: main-float 6s ease-in-out infinite;
        }

        .heart-3d .layer {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
        }

        .heart-shape {
            position: absolute;
            width: 100px;
            height: 90px;
            background: var(--primary-red);
            transform: translateZ(var(--z-offset));
            opacity: var(--opacity, 1);
            filter: drop-shadow(0 0 10px rgba(255, 62, 96, 0.5));
        }

        .heart-shape::before,
        .heart-shape::after {
            content: "";
            position: absolute;
            width: 50px;
            height: 80px;
            background: inherit;
            border-radius: 50px 50px 0 0;
        }

        .heart-shape::before {
            left: 50px;
            transform: rotate(-45deg);
            transform-origin: 0 100%;
        }

        .heart-shape::after {
            left: 0;
            transform: rotate(45deg);
            transform-origin: 100% 100%;
        }

        /* Hero Heart Styling */
        .hero-heart {
            width: 200px;
            height: 180px;
            transform-style: preserve-3d;
            animation: hero-spin 8s linear infinite, hero-beat 1.5s ease-in-out infinite;
        }

        .hero-heart .heart-shape {
            width: 200px;
            height: 180px;
            background: var(--primary-gradient);
        }

        .hero-heart .heart-shape::before,
        .hero-heart .heart-shape::after {
            width: 100px;
            height: 160px;
        }

        .hero-heart .heart-shape::before {
            left: 100px;
        }

        @keyframes hero-spin {
            from {
                transform: rotateY(0deg) rotateX(10deg);
            }

            to {
                transform: rotateY(360deg) rotateX(10deg);
            }
        }

        @keyframes hero-beat {

            0%,
            100% {
                transform: scale(1) rotateY(0deg);
            }

            50% {
                transform: scale(1.15) rotateY(0deg);
            }
        }

        @keyframes main-float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-30px);
            }
        }

        /* Others - Varied Spinners */
        .other-heart {
            position: absolute;
            transform-style: preserve-3d;
        }

        /* Custom Animations for Others */
        @keyframes spin-y {
            from {
                transform: rotateY(0deg);
            }

            to {
                transform: rotateY(360deg);
            }
        }

        @keyframes spin-x {
            from {
                transform: rotateX(0deg);
            }

            to {
                transform: rotateX(360deg);
            }
        }

        @keyframes spin-z {
            from {
                transform: rotateZ(0deg);
            }

            to {
                transform: rotateZ(360deg);
            }
        }

        @keyframes spin-diagonal {
            from {
                transform: rotateX(0deg) rotateY(0deg);
            }

            to {
                transform: rotateX(360deg) rotateY(360deg);
            }
        }

        .glass-panel {
            position: absolute;
            top: 40px;
            left: 40px;
            padding: 24px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            z-index: 100;
        }

        .glass-panel h1 {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass-panel p {
            font-size: 0.8rem;
            opacity: 0.6;
        }
    </style>
</head>

<body>
    <div id="background-glow"></div>

    <div class="glass-panel">
        <h1>Eternal Hearts</h1>
        <p>A 3D Motion Exploration</p>
    </div>

    <div class="container" id="heart-container">
        <!-- Hero Heart -->
        <div class="heart-3d hero-heart" id="hero">
            <!-- Layers for 3D depth -->
        </div>
    </div>

    <script>
        const container = document.getElementById('heart-container');
        const hero = document.getElementById('hero');

        // Create layers for the Hero Heart to give it 3D thickness
        function createLayers(element, count, size) {
            for (let i = 0; i < count; i++) {
                const layer = document.createElement('div');
                layer.className = 'heart-shape';
                layer.style.setProperty('--z-offset', `${(i - count / 2) * 2}px`);
                layer.style.setProperty('--opacity', `${1 - (Math.abs(i - count / 2) / (count / 2)) * 0.5}`);
                element.appendChild(layer);
            }
        }

        createLayers(hero, 15, 200);

        // Create "Others" with different spins
        const animations = ['spin-y', 'spin-x', 'spin-z', 'spin-diagonal'];

        for (let i = 0; i < 12; i++) {
            const other = document.createElement('div');
            other.className = 'heart-3d other-heart';

            // Random position
            const x = (Math.random() - 0.5) * 80; // vw
            const y = (Math.random() - 0.5) * 80; // vh
            const z = (Math.random() - 0.5) * 500; // px

            other.style.left = `calc(50% + ${x}vw)`;
            other.style.top = `calc(50% + ${y}vh)`;
            other.style.transform = `translateZ(${z}px)`;

            // Random animation
            const anim = animations[Math.floor(Math.random() * animations.length)];
            const duration = 4 + Math.random() * 8;
            other.style.animation = `${anim} ${duration}s linear infinite, main-float ${3 + Math.random() * 3}s ease-in-out infinite`;

            // Random size
            const scale = 0.3 + Math.random() * 0.5;
            other.style.scale = scale;

            createLayers(other, 8, 100);
            container.appendChild(other);
        }
    </script>
</body>

</html>
