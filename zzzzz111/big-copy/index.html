<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HANDY DASHBOARD | Evolution 12.0</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="mobile-command">
    <div class="mesh-bg"></div>
    <div class="particles" id="particles"></div>

    <div class="focus-pill-wrapper">
        <div class="focus-pill" id="lock-pill" onclick="engine.toggleLock()">
            <div class="status-dot" id="lock-dot"></div>
            <div class="pill-content">
                <span id="rank-badge" class="rank-name">ROOKIE</span>
                <div class="xp-mini-bar">
                    <div class="xp-mini-fill" id="xp-fill" style="width: 45%;"></div>
                </div>
                <span class="xp-percent" id="xp-percent">45%</span>
            </div>
        </div>
    </div>

    <main class="viewport">
        <header class="view-header">
            <h1 id="page-title">Command Center</h1>
            <p id="page-subtitle">On-the-fly Artist Utility</p>t
        </header>
        <div id="stage-mount" class="command-grid"></div>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="app.switch('command', this)">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">Command</span>
        </div>
        <div class="nav-item" onclick="app.switch('vault', this)">
            <span class="nav-icon">📍</span>
            <span class="nav-label">Vault</span>
        </div>
        <div class="nav-item center-cmd" onclick="engine.add()">
            <div class="btn-command">
                <span class="cmd-glow"></span>
                <span style="font-size: 1.8rem; color: white;">🔳</span>
            </div>
        </div>
        <div class="nav-item" onclick="app.switch('lab', this)">
            <span class="nav-icon">🔬</span>
            <span class="nav-label">The Lab</span>
        </div>
        <div class="nav-item" onclick="app.switch('grid', this)">
            <span class="nav-icon">🔲</span>
            <span class="nav-label">Grid</span>
        </div>
    </nav>

    <div id="anomaly-overlay">
        <div class="glitch-msg" id="anomaly-text">BREACH</div>
    </div>

    <div class="level-flash" id="level-flash"></div>
    <div id="xp-popups"></div>
    <div class="ios-handle"></div>

    <script src="engine.js"></script>
    <script>
        const app = {
            switch(view, el) {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                el.classList.add('active');
                const title = document.getElementById('page-title');
                const subtitle = document.getElementById('page-subtitle');
                if (view === 'command') {
                    engine.render();
                    title.innerText = "Command Center";
                    subtitle.innerText = "On-the-fly Artist Utility";
                } else {
                    document.getElementById('stage-mount').innerHTML = `
                        <div class="handy-card construction-card">
                            <h2>${view.toUpperCase()} SECURE</h2>
                            <p>Handy logical drive encrypted...</p>
                            <div class="tech-id">ENGINE: ULTIMATE-12.0</div>
                        </div>
                    `;
                    title.innerText = view.charAt(0).toUpperCase() + view.slice(1);
                    subtitle.innerText = "Authorized Personal use Only";
                }
                window.navigator.vibrate?.(10);
            }
        };
        window.addEventListener('load', () => {
            engine.initParticles();
            engine.render();
        });
    </script>
</body>

</html>
