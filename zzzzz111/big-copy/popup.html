<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big Copy Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 120px;
            height: 120px;
            min-width: 120px;
            min-height: 120px;
            background: #000;
            margin: 0;
            padding: 0;
            overflow: hidden;
            position: relative;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 120px;
            height: 120px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            animation: containerEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        /* Evolution 14.0 Premium Gradient */
        .container::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1) 0%, rgba(5, 150, 105, 0.1) 100%);
            pointer-events: none;
        }

        #copyBtn {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
        }

        #copyBtn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.1);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        #copyBtn:active {
            transform: scale(0.95);
        }

        #copyBtn span {
            font-size: 8px;
            font-weight: 800;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
        }

        /* Success Dot */
        .copy-toast {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 6px;
            height: 6px;
            background: #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 30;
        }

        .copy-toast.visible {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        /* Unified Ticker */
        .ticker-wrap {
            position: absolute;
            bottom: 12px;
            left: 0;
            width: 100%;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }

        .ticker-wrap.active {
            opacity: 1;
        }

        .ticker-content {
            white-space: nowrap;
            font-size: 8px;
            font-weight: 800;
            letter-spacing: 1.5px;
            color: #ffffff;
            text-transform: uppercase;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.8);
            animation: tickerSlide 3s linear infinite;
        }

        @keyframes tickerSlide {
            0% {
                transform: translateX(50%);
            }

            100% {
                transform: translateX(-50%);
            }
        }

        .glow-line {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 1px;
            background: #fff;
            box-shadow: 0 0 10px #fff;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .ticker-wrap.active .glow-line {
            opacity: 0.6;
            animation: lineBreathe 2s ease-in-out infinite;
        }

        @keyframes containerEntrance {
            from {
                opacity: 0;
                transform: scale(1.05);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes lineBreathe {

            0%,
            100% {
                width: 30px;
            }

            50% {
                width: 60px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div id="copyBtn">
            <span>BIG<br>SYNC</span>
        </div>
        <div id="copyToast" class="copy-toast"></div>
        <div id="ticker" class="ticker-wrap">
            <div class="ticker-content">COMMAND EXECUTED • CLIPBOARD READY • SYNC COMPLETE • </div>
            <div class="glow-line"></div>
        </div>

        <!-- Hidden options preserved for functionality -->
        <div style="display: none;">
            <input type="checkbox" id="includeHtml" checked>
            <input type="checkbox" id="includeText" checked>
        </div>
    </div>
    <script src="popup.js"></script>
</body>

</html>
