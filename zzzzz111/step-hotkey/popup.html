<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #ffffff;
      --accent: #00f2ff;
      --bg: #000000;
      --card-bg: rgba(0, 0, 0, 0.6);
    }

    html,
    body {
      background: #000;
      margin: 0;
      padding: 0;
      width: 200px;
      /* Increased from 120px */
      min-height: 350px;
      /* Increased from 200px */
      overflow: hidden;
      font-family: 'Space Grotesk', sans-serif;
      border-right: 2px solid #ffffff;
      /* Sharp vertical accent */
    }

    /* All layers occupy the same space */
    .layer {
      position: absolute;
      inset: 0;
      padding: 10px 8px;
      /* Increased padding */
      display: flex;
      flex-direction: column;
      gap: 5px;
      /* Increased gap */
      pointer-events: none;
    }

    /* Bottom Canvas: Under everything */
    #particle-canvas {
      position: fixed;
      inset: 0;
      z-index: 5;
      pointer-events: none;
    }

    /* Glass Layer: The interactive buttons */
    #listArea {
      z-index: 10;
      pointer-events: auto;
    }

    /* Top Canvas: Between glass and text */
    #top-particle-canvas {
      position: fixed;
      inset: 0;
      z-index: 15;
      pointer-events: none;
    }

    /* Text Layer: Top-most layer */
    #textArea {
      z-index: 20;
      pointer-events: none;
    }

    .field-card {
      position: relative;
      background: var(--card-bg);
      backdrop-filter: blur(40px) saturate(200%);
      -webkit-backdrop-filter: blur(40px) saturate(200%);
      border-radius: 6px;
      height: 24px;
      /* Increased from 13px */
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.2, 0, 0, 1);
      display: flex;
      align-items: center;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .field-label {
      height: 24px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      width: 100%;
      box-sizing: border-box;
    }

    .field-index {
      font-size: 8px;
      color: var(--accent);
      margin-right: 8px;
      opacity: 0.6;
      font-family: monospace;
    }

    .field-text {
      font-size: 10px;
      /* Increased from 6px */
      font-weight: 700;
      color: rgba(255, 255, 255, 0.9);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Ultra-subtle Glass Hover */
    .field-card:hover {
      transform: translateY(-0.5px);
      background: rgba(255, 255, 255, 0.08);
      /* Tiny shine */
    }

    .field-card:active {
      transform: translateY(0.2px) scale(0.99);
    }

    /* Shared success state */
    .field-card.success {
      background: var(--accent) !important;
      box-shadow: 0 0 15px var(--accent);
    }

    .field-label.success .field-text,
    .field-label.success .field-index {
      color: #000 !important;
    }

    /* Footer / Clear Button */
    .footer {
      margin-top: auto;
      padding-top: 10px;
      display: flex;
      gap: 5px;
    }

    .clear-btn {
      flex: 1;
      height: 20px;
      background: rgba(255, 0, 0, 0.15);
      border: 1px solid rgba(255, 0, 0, 0.3);
      border-radius: 4px;
      color: #ff4444;
      font-size: 8px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      pointer-events: auto;
      transition: all 0.2s;
    }

    .clear-btn:hover {
      background: rgba(255, 0, 0, 0.3);
      color: #fff;
    }
  </style>
</head>

<body>
  <canvas id="particle-canvas"></canvas>
  <div class="layer" id="listArea"></div>
  <canvas id="top-particle-canvas"></canvas>
  <div class="layer" id="textArea">
    <div id="fieldsContainer" style="display: contents;"></div>
    <div class="footer">
      <div class="clear-btn" id="clearBtn">Clear Stack</div>
    </div>

    <div id="ticker" class="ticker-wrap">
      <div class="ticker-content">ITEM ADDED • STACK SYNCED • SEQUENCE READY • </div>
      <div class="glow-line"></div>
    </div>
  </div>

  <style>
    /* Unified Evolution 14.0 Ticker */
    .ticker-wrap {
      position: absolute;
      bottom: 25px;
      /* Adjust for Step Hotkey layout */
      left: 0;
      width: 100%;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
      z-index: 30;
    }

    .ticker-wrap.active {
      opacity: 1;
    }

    .ticker-content {
      white-space: nowrap;
      font-size: 8px;
      font-weight: 800;
      letter-spacing: 1.5px;
      color: #ffffff;
      text-transform: uppercase;
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.8), 0 0 15px rgba(255, 255, 255, 0.4);
      animation: tickerSlide 3s linear infinite;
    }

    @keyframes tickerSlide {
      0% {
        transform: translateX(50%);
      }

      100% {
        transform: translateX(-50%);
      }
    }

    .glow-line {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 1px;
      background: #fff;
      box-shadow: 0 0 10px #fff, 0 0 20px #fff;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .ticker-wrap.active .glow-line {
      opacity: 0.6;
      animation: lineBreathe 2s ease-in-out infinite;
    }

    @keyframes lineBreathe {

      0%,
      100% {
        width: 30px;
        opacity: 0.4;
      }

      50% {
        width: 60px;
        opacity: 0.8;
      }
    }
  </style>
  <script src="popup.js"></script>
</body>

</html>
