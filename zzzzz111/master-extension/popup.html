<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolution Master</title>
    <style>
        :root {
            --bg: #000;
            --accent: #fff;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 300px;
            background: var(--bg);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .header {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(to bottom, #111, #000);
        }

        .header h1 {
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 15px;
        }

        .module-tile {
            height: 80px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .module-tile:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        .module-tile span {
            font-size: 8px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 8px;
            opacity: 0.6;
        }

        .icon-box {
            font-size: 18px;
        }

        /* Step List (Expands) */
        #step-list {
            max-height: 0;
            overflow-y: auto;
            transition: max-height 0.5s ease;
            background: rgba(255, 255, 255, 0.02);
            font-size: 9px;
        }

        #step-list.open {
            max-height: 200px;
            padding: 10px;
            border-top: 1px solid var(--border);
        }

        .step-item {
            padding: 6px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
            display: flex;
            gap: 10px;
        }

        .step-item:hover {
            color: #00f2ff;
        }

        /* Ticker Area */
        .ticker-wrap {
            height: 30px;
            background: #000;
            border-top: 1px solid var(--border);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .ticker-content {
            white-space: nowrap;
            font-size: 8px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: tickerSlide 5s linear infinite;
        }

        @keyframes tickerSlide {
            0% {
                transform: translateX(100%);
            }

            100% {
                transform: translateX(-100%);
            }
        }

        .glow-line {
            position: absolute;
            bottom: 0;
            width: 100px;
            height: 2px;
            background: #fff;
            box-shadow: 0 0 10px #fff;
            animation: breathe 3s infinite;
        }

        @keyframes breathe {

            0%,
            100% {
                opacity: 0.3;
                width: 60px;
            }

            50% {
                opacity: 0.8;
                width: 120px;
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>EVOLUTION MASTER HUB</h1>
    </div>

    <div class="grid">
        <div class="module-tile" id="btn-prompt">
            <div class="icon-box">🧠</div>
            <span>Workflow</span>
        </div>
        <div class="module-tile" id="btn-sync">
            <div class="icon-box">📡</div>
            <span>Page Sync</span>
        </div>
        <div class="module-tile" id="btn-tone">
            <div class="icon-box">🎭</div>
            <span>Tone Refine</span>
        </div>
        <div class="module-tile" id="btn-steps">
            <div class="icon-box">📑</div>
            <span>Step Stack</span>
        </div>
        <div class="module-tile" id="btn-vids" style="background: rgba(16, 185, 129, 0.1);">
            <div class="icon-box">📹</div>
            <span>10 Vids</span>
        </div>
        <div class="module-tile" id="btn-topics" style="background: rgba(59, 130, 246, 0.1);">
            <div class="icon-box">🔍</div>
            <span>20 Topics</span>
        </div>
    </div>

    <div id="step-list">
        <!-- Steps will be injected here -->
    </div>

    <div class="ticker-wrap">
        <div id="ticker" class="ticker-content">COMMAND CENTER READY • STANDBY • EVOLUTION 14.0 • </div>
        <div class="glow-line"></div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
