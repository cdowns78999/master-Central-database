<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaign Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gray-1: #fafafa;
            --gray-2: #f5f5f5;
            --gray-3: #e5e5e5;
            --gray-5: #d4d4d4;
            --gray-6: #a3a3a3;
            --gray-8: #737373;
            --gray-10: #525252;
            --gray-11: #404040;
            --gray-12: #171717;
            --blue-6: #2563eb;
            --blue-7: #1d4ed8;
            --blue-8: #1e40af;
        }

        body {
            background: var(--gray-2);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--gray-12);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        .header {
            margin-bottom: 48px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            color: var(--gray-12);
            margin-bottom: 4px;
        }

        .header p {
            font-size: 14px;
            color: var(--gray-10);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
            gap: 24px;
        }

        .card {
            background: var(--gray-1);
            border: 1px solid var(--gray-3);
            border-radius: 24px;
            padding: 24px;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .platform-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .platform-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--gray-12);
        }

        .input {
            width: 100%;
            height: 40px;
            background: var(--gray-1);
            border: 1px solid var(--gray-3);
            border-radius: 12px;
            padding: 0 16px;
            font-size: 14px;
            color: var(--gray-12);
            margin-bottom: 12px;
            transition: all 0.2s;
        }

        .input:focus {
            outline: none;
            border-color: var(--gray-5);
            background: #fff;
        }

        .input::placeholder {
            color: var(--gray-6);
        }

        /* Platform-Specific Buttons */
        .btn {
            width: 100%;
            height: 40px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* Spotify Green */
        .btn-spotify {
            background: #1DB954;
            color: #ffffff;
            border: 1px solid #1ed760;
            box-shadow: 0 1.5px 0 0 rgba(255, 255, 255, 0.20) inset;
        }

        .btn-spotify:hover {
            background: #1ed760;
        }

        .btn-spotify:active {
            transform: scale(0.98);
        }

        /* SoundCloud Orange */
        .btn-soundcloud {
            background: #FF5500;
            color: #ffffff;
            border: 1px solid #ff6a1f;
            box-shadow: 0 1.5px 0 0 rgba(255, 255, 255, 0.20) inset;
        }

        .btn-soundcloud:hover {
            background: #ff6a1f;
        }

        .btn-soundcloud:active {
            transform: scale(0.98);
        }

        /* Press Gray */
        .btn-press {
            background: var(--gray-12);
            color: #ffffff;
            border: 1px solid var(--gray-11);
            box-shadow: 0 1.5px 0 0 rgba(255, 255, 255, 0.20) inset;
        }

        .btn-press:hover {
            background: var(--gray-11);
        }

        .btn-press:active {
            transform: scale(0.98);
        }

        .campaign-list {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .campaign-item {
            background: var(--gray-2);
            border: 1px solid var(--gray-3);
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }

        .campaign-item:hover {
            border-color: var(--gray-5);
        }

        .campaign-info {
            flex: 1;
        }

        .campaign-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--gray-12);
            margin-bottom: 2px;
        }

        .campaign-date {
            font-size: 12px;
            color: var(--gray-10);
        }

        .delete-btn {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: transparent;
            border: 1px solid var(--gray-3);
            color: var(--gray-10);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.2s;
        }

        .delete-btn:hover {
            background: var(--gray-3);
            color: var(--gray-12);
        }

        .stats {
            background: var(--gray-1);
            border: 1px solid var(--gray-3);
            border-radius: 24px;
            padding: 32px;
            margin-bottom: 32px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 32px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: var(--gray-12);
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 14px;
            color: var(--gray-10);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .icon {
            width: 18px;
            height: 18px;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .stats {
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Campaign Dashboard</h1>
            <p>Manage campaigns across platforms</p>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="totalCampaigns">0</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="activeCampaigns">0</div>
                <div class="stat-label">Active</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="completedCampaigns">0</div>
                <div class="stat-label">Completed</div>
            </div>
        </div>

        <div class="grid">
            <!-- Spotify -->
            <div class="card">
                <div class="card-header">
                    <div class="platform-icon" style="background: #1DB954;">
                        <svg class="icon" fill="white" viewBox="0 0 24 24">
                            <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
                        </svg>
                    </div>
                    <div class="platform-name">Spotify</div>
                </div>
                <input type="text" class="input" id="spotifyInput" placeholder="Campaign name">
                <button class="btn btn-spotify" onclick="addCampaign('spotify')">
                    <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                    </svg>
                    Launch Campaign
                </button>
                <div class="campaign-list" id="spotifyList"></div>
            </div>

            <!-- SoundCloud -->
            <div class="card">
                <div class="card-header">
                    <div class="platform-icon" style="background: #FF5500;">
                        <svg class="icon" fill="white" viewBox="0 0 24 24">
                            <path d="M1.175 12.225c-.051 0-.094.046-.101.1l-.233 2.154.233 2.105c.007.058.05.098.101.098.053 0 .096-.04.103-.098l.27-2.105-.27-2.154c-.007-.057-.05-.1-.103-.1zm1.246.047c-.058 0-.1.047-.106.107l-.191 1.984.191 1.927c.006.057.048.107.106.107.059 0 .103-.046.112-.107l.23-1.927-.23-1.984c-.009-.06-.053-.107-.112-.107zm1.233.061c-.063 0-.11.053-.117.112l-.175 1.863.175 1.815c.007.06.054.111.117.111.061 0 .11-.051.119-.111l.206-1.815-.206-1.863c-.009-.059-.058-.112-.119-.112zm1.24.062c-.068 0-.118.057-.127.119l-.158 1.793.158 1.757c.009.062.059.12.127.12.066 0 .12-.058.125-.12l.182-1.757-.182-1.793c-.005-.062-.059-.119-.125-.119zm1.236.062c-.071 0-.123.06-.133.124l-.142 1.729.142 1.699c.01.066.062.125.133.125.068 0 .122-.059.13-.125l.163-1.699-.163-1.729c-.008-.064-.062-.124-.13-.124zm1.228.061c-.073 0-.127.063-.136.129l-.127 1.667.127 1.641c.009.066.063.129.136.129.074 0 .127-.063.137-.129l.148-1.641-.148-1.667c-.01-.066-.063-.129-.137-.129z"/>
                        </svg>
                    </div>
                    <div class="platform-name">SoundCloud</div>
                </div>
                <input type="text" class="input" id="soundcloudInput" placeholder="Campaign name">
                <button class="btn btn-soundcloud" onclick="addCampaign('soundcloud')">
                    <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                    </svg>
                    Launch Campaign
                </button>
                <div class="campaign-list" id="soundcloudList"></div>
            </div>

            <!-- Press -->
            <div class="card">
                <div class="card-header">
                    <div class="platform-icon" style="background: var(--gray-12);">
                        <svg class="icon" fill="white" viewBox="0 0 24 24">
                            <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/>
                        </svg>
                    </div>
                    <div class="platform-name">Press</div>
                </div>
                <input type="text" class="input" id="pressInput" placeholder="Campaign name">
                <button class="btn btn-press" onclick="addCampaign('press')">
                    <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                    </svg>
                    Launch Campaign
                </button>
                <div class="campaign-list" id="pressList"></div>
            </div>
        </div>
    </div>

    <script>
        let campaigns = { spotify: [], soundcloud: [], press: [] };

        function addCampaign(platform) {
            const input = document.getElementById(`${platform}Input`);
            const name = input.value.trim();
            if (!name) return;

            const campaign = {
                id: Date.now(),
                name: name,
                date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
            };

            campaigns[platform].push(campaign);
            renderCampaign(platform, campaign);
            input.value = '';
            updateStats();
        }

        function renderCampaign(platform, campaign) {
            const list = document.getElementById(`${platform}List`);
            const item = document.createElement('div');
            item.className = 'campaign-item';
            item.id = `campaign-${campaign.id}`;
            item.innerHTML = `
                <div class="campaign-info">
                    <div class="campaign-name">${campaign.name}</div>
                    <div class="campaign-date">${campaign.date}</div>
                </div>
                <button class="delete-btn" onclick="deleteCampaign('${platform}', ${campaign.id})">×</button>
            `;
            list.appendChild(item);
        }

        function deleteCampaign(platform, id) {
            campaigns[platform] = campaigns[platform].filter(c => c.id !== id);
            document.getElementById(`campaign-${id}`).remove();
            updateStats();
        }

        function updateStats() {
            const total = campaigns.spotify.length + campaigns.soundcloud.length + campaigns.press.length;
            document.getElementById('totalCampaigns').textContent = total;
            document.getElementById('activeCampaigns').textContent = total;
            document.getElementById('completedCampaigns').textContent = 0;
        }

        ['spotify', 'soundcloud', 'press'].forEach(platform => {
            document.getElementById(`${platform}Input`).addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addCampaign(platform);
            });
        });
    </script>
</body>
</html>
