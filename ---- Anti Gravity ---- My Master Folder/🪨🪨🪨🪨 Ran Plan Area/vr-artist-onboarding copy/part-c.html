<!-- part-c.html — Q3 Song Picker + Q4 Your Deal + Full JavaScript -->

<!-- ===================== Q3 — SONG PICKER ===================== -->
<section class="quadrant picker" id="picker">
  <!-- Faded singing/mic girl, bottom right -->
  <img class="anime-girl anime-girl-picker"
       src="https://openclipart.org/download/305525/1534984810.svg"
       alt=""
       onerror="this.style.display='none'">

  <div class="picker-content">
    <p class="section-label">Pick Your Song</p>

    <div class="platform-banners" id="platformBanners">
      <button class="platform-banner" data-platform="spotify">♫ Spotify</button>
      <button class="platform-banner" data-platform="soundcloud">☁ SoundCloud</button>
      <button class="platform-banner" data-platform="youtube">▶ YouTube</button>
      <button class="platform-banner" data-platform="apple">♪ Apple Music</button>
    </div>

    <input class="url-input" id="songUrl" type="url"
           placeholder="Paste your track URL here...">

    <button class="submit-btn" id="submitSong">Submit My Song →</button>

    <p class="helper-text" id="urlHint">Spotify · SoundCloud · YouTube · Apple Music · Bandcamp</p>
  </div>
</section>


<!-- ===================== Q4 — YOUR DEAL ===================== -->
<section class="quadrant next-step" id="next">
  <!-- Faded celebrating girl, left side -->
  <img class="anime-girl anime-girl-next"
       src="https://openclipart.org/download/193072/Tra-la-la.svg"
       alt=""
       onerror="this.style.display='none'">

  <div class="next-content">
    <p class="section-label">Your Deal</p>

    <div class="deal-card glow-pulse">
      <div class="deal-split">
        <div class="deal-half">
          <span class="deal-pct">50%</span>
          <span class="deal-who">YOU</span>
          <span class="deal-desc">Your earnings</span>
        </div>
        <div class="deal-divider"></div>
        <div class="deal-half">
          <span class="deal-pct">50%</span>
          <span class="deal-who">ANTI GRAVITY</span>
          <span class="deal-desc">Production &amp; promo</span>
        </div>
      </div>
      <p class="deal-footnote">Every stream, every platform, every country. Automated monthly payout.</p>
    </div>

    <button class="cta-btn" id="beginJourney">Begin Your Journey →</button>

    <p class="helper-text" style="margin-top:0.75rem">No upfront cost · Revenue-based partnership · Your vocal stays yours</p>
  </div>
</section>


<!-- ===================== JAVASCRIPT ===================== -->
<script>
  // ── 1. Platform banner selection ──────────────────────────────────────────
  document.getElementById('platformBanners').addEventListener('click', function(e) {
    const btn = e.target.closest('.platform-banner');
    if (!btn) return;
    document.querySelectorAll('.platform-banner').forEach(function(b) {
      b.classList.remove('active');
    });
    btn.classList.add('active');
  });


  // ── 2. URL auto-detect platform on paste / input ──────────────────────────
  const patterns = {
    spotify:    /spotify\.com/,
    soundcloud: /soundcloud\.com/,
    youtube:    /youtube\.com|youtu\.be/,
    apple:      /music\.apple\.com/
  };

  document.getElementById('songUrl').addEventListener('input', function() {
    const val = this.value;
    for (const [platform, rx] of Object.entries(patterns)) {
      if (rx.test(val)) {
        document.querySelectorAll('.platform-banner').forEach(function(b) {
          b.classList.remove('active');
        });
        const match = document.querySelector('[data-platform="' + platform + '"]');
        if (match) match.classList.add('active');
        break;
      }
    }
  });


  // ── 3. Submit handler ─────────────────────────────────────────────────────
  document.getElementById('submitSong').addEventListener('click', function() {
    const url = document.getElementById('songUrl').value.trim();
    if (!url) {
      const input = document.getElementById('songUrl');
      input.focus();
      input.style.borderColor = '#ec4899';
      setTimeout(function() {
        input.style.borderColor = '';
      }, 1500);
      return;
    }
    this.textContent = '✓ Submitted — Miles will be in touch within 48 hours';
    this.classList.add('success');
    this.disabled = true;
  });


  // ── 4. Begin Journey → scroll to picker ──────────────────────────────────
  document.getElementById('beginJourney').addEventListener('click', function() {
    const picker = document.getElementById('picker');
    picker.scrollIntoView({ behavior: 'smooth' });
    setTimeout(function() {
      document.getElementById('songUrl').focus();
    }, 600);
  });


  // ── 5. Crosshair / resize note ────────────────────────────────────────────
  // Crosshair is CSS-positioned at left:55% top:56% — no JS needed for desktop.
  // On mobile resize, crosshair is hidden via CSS media query. Nothing to do here.
</script>
