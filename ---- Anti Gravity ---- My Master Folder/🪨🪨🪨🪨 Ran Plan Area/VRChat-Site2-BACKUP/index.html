<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VRChat Ultimate — Site 2</title>
  <meta name="description" content="The definitive VRChat culture reference — 18 sections covering safety, worlds, avatars, events, history, DJ culture, and more." />
  <meta name="theme-color" content="#00d4ff" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ════════ SIDEBAR ════════ -->
  <nav id="sidebar" aria-label="Main Navigation">
    <div class="sidebar-wordmark">
      <div class="wordmark-title">VRChat Ultimate</div>
      <div class="wordmark-sub">Site 2 · Culture Reference</div>
    </div>
    <ul class="nav-list" id="nav-list" role="list">
      <!-- Injected by app.js -->
    </ul>
  </nav>

  <!-- Sidebar overlay (mobile) -->
  <div id="sidebar-overlay" onclick="closeSidebar()" aria-hidden="true"></div>

  <!-- ════════ MAIN WRAPPER ════════ -->
  <div id="main-wrapper">

    <!-- Top Bar -->
    <header id="topbar">
      <button id="hamburger" onclick="openSidebar()" aria-label="Open navigation">☰</button>
      <span id="page-title">Report Behavior</span>
      <span id="breadcrumb">VRChat Ultimate › Report Behavior</span>
    </header>

    <!-- Content Area — sections injected here -->
    <main id="main-content" role="main" aria-live="polite">
      <!-- Dynamic content rendered by router -->
    </main>

  </div>

  <script src="app.js"></script>
</body>
</html>
