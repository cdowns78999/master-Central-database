<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A Gift for My Family · Easter 2026</title>

  <!-- Google Fonts: Playfair Display (title) + Inter (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500&display=swap"
    rel="stylesheet"
  />

  <style>
    /* ── Reset ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Body — full-screen pastel gradient ─────────────────── */
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: linear-gradient(135deg, #fde8f0 0%, #e8f5e9 50%, #fef9c3 100%);
      font-family: 'Inter', system-ui, sans-serif;
      position: relative;
    }

    /* ── Floating Easter eggs (CSS only) ────────────────────── */
    .eggs-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .egg {
      position: absolute;
      bottom: -80px;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      opacity: 0;
      animation: floatEgg linear infinite;
    }

    /* Individual egg sizes, colors, and timing */
    .egg:nth-child(1) {
      width: 28px; height: 36px;
      background: radial-gradient(circle at 35% 35%, #f9a8d4, #ec4899);
      left: 12%;
      animation-duration: 12s;
      animation-delay: 0s;
    }
    .egg:nth-child(2) {
      width: 22px; height: 28px;
      background: radial-gradient(circle at 35% 35%, #bbf7d0, #34d399);
      left: 28%;
      animation-duration: 15s;
      animation-delay: 2s;
    }
    .egg:nth-child(3) {
      width: 32px; height: 40px;
      background: radial-gradient(circle at 35% 35%, #fde68a, #f59e0b);
      left: 48%;
      animation-duration: 11s;
      animation-delay: 4.5s;
    }
    .egg:nth-child(4) {
      width: 20px; height: 26px;
      background: radial-gradient(circle at 35% 35%, #c4b5fd, #8b5cf6);
      left: 66%;
      animation-duration: 14s;
      animation-delay: 1s;
    }
    .egg:nth-child(5) {
      width: 26px; height: 33px;
      background: radial-gradient(circle at 35% 35%, #bfdbfe, #60a5fa);
      left: 80%;
      animation-duration: 13s;
      animation-delay: 3s;
    }
    .egg:nth-child(6) {
      width: 18px; height: 23px;
      background: radial-gradient(circle at 35% 35%, #fecdd3, #fb7185);
      left: 92%;
      animation-duration: 16s;
      animation-delay: 6s;
    }

    @keyframes floatEgg {
      0% {
        transform: translateY(0) rotate(-8deg);
        opacity: 0;
      }
      8% {
        opacity: 0.85;
      }
      90% {
        opacity: 0.6;
      }
      100% {
        transform: translateY(-110vh) rotate(20deg);
        opacity: 0;
      }
    }

    /* ── Center card ─────────────────────────────────────────── */
    .card {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 56px 48px 48px;
      max-width: 480px;
      width: 90%;
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow:
        0 8px 40px rgba(236, 72, 153, 0.10),
        0 2px 8px rgba(0, 0, 0, 0.06);
      animation: cardIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(28px) scale(0.97);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* ── Emoji decoration ────────────────────────────────────── */
    .card-emoji {
      font-size: 52px;
      display: block;
      margin-bottom: 20px;
      animation: eggBounce 2.5s ease-in-out infinite;
      line-height: 1;
    }

    @keyframes eggBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    /* ── Title ───────────────────────────────────────────────── */
    .card-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(28px, 6vw, 40px);
      font-weight: 700;
      color: #7c3d52;
      line-height: 1.2;
      letter-spacing: -0.01em;
      margin-bottom: 12px;
      animation: fadeInUp 0.6s 0.15s ease both;
    }

    /* ── Subtitle ────────────────────────────────────────────── */
    .card-subtitle {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: #a37080;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 36px;
      animation: fadeInUp 0.6s 0.28s ease both;
    }

    /* ── CTA Button ──────────────────────────────────────────── */
    .btn-open {
      display: inline-block;
      padding: 15px 44px;
      border-radius: 100px;
      text-decoration: none;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #ffffff;
      background: linear-gradient(135deg, #f9a8d4 0%, #f59e0b 100%);
      border: none;
      cursor: pointer;
      box-shadow:
        0 4px 20px rgba(249, 168, 212, 0.45),
        0 1px 4px rgba(0, 0, 0, 0.08);
      transition:
        transform 0.2s ease,
        box-shadow 0.2s ease,
        filter 0.2s ease;
      animation: fadeInUp 0.6s 0.42s ease both, pulseGlow 2.5s 1s ease-in-out infinite;
    }

    .btn-open:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow:
        0 8px 32px rgba(249, 168, 212, 0.6),
        0 2px 8px rgba(0, 0, 0, 0.10);
      filter: brightness(1.05);
    }

    .btn-open:active {
      transform: translateY(-1px) scale(1.01);
    }

    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 4px 20px rgba(249, 168, 212, 0.45), 0 1px 4px rgba(0,0,0,0.08); }
      50% { box-shadow: 0 4px 30px rgba(249, 168, 212, 0.75), 0 1px 4px rgba(0,0,0,0.08); }
    }

    /* ── Shared fade-up ──────────────────────────────────────── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Footer credit ───────────────────────────────────────── */
    .card-footer {
      margin-top: 28px;
      font-size: 12px;
      color: #c4a0aa;
      letter-spacing: 0.04em;
      animation: fadeInUp 0.6s 0.58s ease both;
    }

    /* ── Responsive ──────────────────────────────────────────── */
    @media (max-width: 480px) {
      .card {
        padding: 40px 28px 36px;
      }
      .btn-open {
        padding: 14px 36px;
        font-size: 15px;
      }
    }
  </style>
</head>
<body>

  <!-- ── Floating Easter eggs ─────────────────────────────── -->
  <div class="eggs-container" aria-hidden="true">
    <div class="egg"></div>
    <div class="egg"></div>
    <div class="egg"></div>
    <div class="egg"></div>
    <div class="egg"></div>
    <div class="egg"></div>
  </div>

  <!-- ── Center card ──────────────────────────────────────── -->
  <div class="card">
    <span class="card-emoji" aria-hidden="true">🐣</span>
    <h1 class="card-title">A gift for my family</h1>
    <p class="card-subtitle">Easter 2026 &middot; with love</p>
    <a href="grand-daddy.html" class="btn-open">Open ✦</a>
    <p class="card-footer">Made with care · tap to begin</p>
  </div>
