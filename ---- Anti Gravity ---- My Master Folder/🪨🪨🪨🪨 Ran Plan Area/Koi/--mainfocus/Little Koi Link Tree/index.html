<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Little Koi · Link Tree</title>
<meta name="description" content="Little Koi — singer with the it factor. Music, shows, and ways to connect." />
<meta name="theme-color" content="#0a5cff" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  /* ------- TOKENS ------- */
  :root {
    --bg: #0a5cff;          /* punchy bright blue */
    --bg-deep: #0747c8;     /* deeper blue for radial */
    --pink: #ff1493;        /* hot pink primary */
    --pink-soft: #ff5cb1;   /* hover/glow */
    --pink-deep: #d4007a;   /* pressed */
    --ink: #ffffff;
    --ink-dim: rgba(255,255,255,0.78);
    --card-bg: rgba(255,255,255,0.06);
    --card-border: rgba(255,255,255,0.18);
    --shadow: 0 10px 30px rgba(0, 20, 80, 0.35);
    --shadow-pink: 0 12px 40px rgba(255, 20, 147, 0.45);
    --radius: 20px;
    --radius-pill: 999px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Quicksand', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    min-height: 100%;
    overflow-x: hidden;
  }

  body {
    background:
      radial-gradient(1200px 800px at 50% -10%, #1a73ff 0%, var(--bg) 55%, var(--bg-deep) 100%);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* ------- BULB BACKGROUND LAYER ------- */
  .bulbs {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
  }

  .bulb {
    position: absolute;
    bottom: -80px;            /* start below viewport */
    left: -80px;              /* start left of viewport */
    user-select: none;
    will-change: transform, opacity;
    filter: drop-shadow(0 0 6px rgba(255, 235, 150, 0.45));
    animation-name: drift;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
  }

  /* diagonal drift from bottom-left to top-right */
  @keyframes drift {
    0%   { transform: translate(0vw, 0vh) rotate(-8deg); opacity: 0; }
    8%   { opacity: var(--peak, 0.35); }
    50%  { transform: translate(60vw, -55vh) rotate(6deg); opacity: var(--peak, 0.35); }
    92%  { opacity: var(--peak, 0.35); }
    100% { transform: translate(120vw, -110vh) rotate(-4deg); opacity: 0; }
  }

  /* twinkle on top of drift via filter pulse */
  @keyframes twinkle {
    0%, 100% { filter: drop-shadow(0 0 4px rgba(255, 235, 150, 0.35)) brightness(1); }
    50%      { filter: drop-shadow(0 0 14px rgba(255, 245, 180, 0.7)) brightness(1.25); }
  }

  /* ------- LAYOUT ------- */
  .wrap {
    position: relative;
    z-index: 1;
    max-width: 460px;
    margin: 0 auto;
    padding: 56px 22px 64px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  /* ------- AVATAR ------- */
  .avatar {
    width: 132px;
    height: 132px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 32% 28%, #fff 0%, #ffd1ec 28%, var(--pink) 62%, var(--pink-deep) 100%);
    display: grid;
    place-items: center;
    color: #fff;
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: 46px;
    letter-spacing: 1px;
    box-shadow:
      0 0 0 6px rgba(255,255,255,0.14),
      0 0 0 12px rgba(255, 20, 147, 0.28),
      var(--shadow-pink);
    animation: bob 5.5s ease-in-out infinite;
    text-shadow: 0 2px 8px rgba(120, 0, 60, 0.35);
  }

  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-6px); }
  }

  /* ------- NAME + TAGLINE ------- */
  h1.name {
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: clamp(34px, 6.4vw, 44px);
    letter-spacing: 0.5px;
    margin: 22px 0 6px;
    color: #fff;
    text-shadow: 0 2px 0 rgba(0, 30, 120, 0.25), 0 0 24px rgba(255, 20, 147, 0.25);
  }

  .tag {
    font-family: 'Quicksand', sans-serif;
    font-weight: 500;
    font-size: 15px;
    color: var(--ink-dim);
    margin: 0 0 30px;
    max-width: 320px;
    line-height: 1.45;
  }

  .tag .heart {
    color: var(--pink);
    font-weight: 700;
    text-shadow: 0 0 10px rgba(255, 20, 147, 0.55);
  }

  /* ------- LINK STACK ------- */
  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 4px;
  }

  .link {
    --tilt: 0deg;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 14px;
    padding: 16px 22px;
    background: var(--pink);
    color: #fff;
    text-decoration: none;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 17px;
    letter-spacing: 0.2px;
    border-radius: var(--radius-pill);
    border: 2px solid rgba(255,255,255,0.22);
    box-shadow:
      0 6px 0 var(--pink-deep),
      var(--shadow);
    transition: transform 180ms cubic-bezier(.2,.9,.3,1.4),
                box-shadow 180ms ease,
                background 180ms ease;
    overflow: hidden;
    isolation: isolate;
    transform: rotate(var(--tilt));
  }

  /* odd/even slight tilt for playful look */
  .link:nth-child(odd)  { --tilt: -0.6deg; }
  .link:nth-child(even) { --tilt:  0.6deg; }

  .link::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(120deg,
        rgba(255,255,255,0.0) 0%,
        rgba(255,255,255,0.35) 50%,
        rgba(255,255,255,0.0) 100%);
    transform: translateX(-110%);
    transition: transform 600ms ease;
    z-index: -1;
  }

  .link:hover {
    transform: rotate(0deg) translateY(-4px) scale(1.015);
    background: var(--pink-soft);
    box-shadow:
      0 10px 0 var(--pink-deep),
      var(--shadow-pink);
  }

  .link:hover::before {
    transform: translateX(110%);
  }

  .link:active {
    transform: rotate(0deg) translateY(0) scale(0.99);
    box-shadow:
      0 3px 0 var(--pink-deep),
      var(--shadow);
  }

  .link .ico {
    font-size: 22px;
    line-height: 1;
    width: 30px;
    text-align: center;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.25));
  }

  .link .lbl {
    flex: 1;
    text-align: left;
  }

  .link .arrow {
    font-size: 18px;
    opacity: 0.85;
    transition: transform 180ms ease;
  }

  .link:hover .arrow {
    transform: translateX(4px);
  }

  /* every 3rd link inverts to white-on-blue for rhythm */
  .link.alt {
    background: #ffffff;
    color: #0747c8;
    border-color: rgba(7, 71, 200, 0.18);
    box-shadow: 0 6px 0 #c8d8ff, var(--shadow);
  }
  .link.alt:hover {
    background: #f3f7ff;
    color: var(--pink-deep);
    box-shadow: 0 10px 0 #c8d8ff, 0 12px 32px rgba(0, 20, 80, 0.35);
  }

  /* ------- FOOTER ------- */
  footer {
    margin-top: 36px;
    font-family: 'Quicksand', sans-serif;
    font-size: 13px;
    color: var(--ink-dim);
    letter-spacing: 0.3px;
  }

  footer .b { color: #cfe1ff; }
  footer .p { color: var(--pink); text-shadow: 0 0 10px rgba(255, 20, 147, 0.4); }

  /* ------- RESPONSIVE ------- */
  @media (max-width: 480px) {
    .wrap { padding: 40px 18px 56px; }
    .avatar { width: 116px; height: 116px; font-size: 40px; }
    .link { padding: 15px 18px; font-size: 16px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .bulb, .avatar, .link, .link::before { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

  <!-- floating lightbulbs background -->
  <div class="bulbs" id="bulbs" aria-hidden="true"></div>

  <main class="wrap">
    <div class="avatar" aria-label="Little Koi avatar">LK</div>

    <h1 class="name">Little Koi</h1>
    <p class="tag">singer with the <span class="heart">it</span> factor — soft songs, big sparks</p>

    <nav class="links" aria-label="Little Koi links">
      <a class="link"     href="#" target="_blank" rel="noopener">
        <span class="ico">🎵</span><span class="lbl">Listen on Spotify</span><span class="arrow">›</span>
      </a>
      <a class="link alt" href="#" target="_blank" rel="noopener">
        <span class="ico">📺</span><span class="lbl">YouTube</span><span class="arrow">›</span>
      </a>
      <a class="link"     href="#" target="_blank" rel="noopener">
        <span class="ico">📸</span><span class="lbl">Instagram</span><span class="arrow">›</span>
      </a>
      <a class="link alt" href="#" target="_blank" rel="noopener">
        <span class="ico">🎤</span><span class="lbl">TikTok</span><span class="arrow">›</span>
      </a>
      <a class="link"     href="mailto:hello@littlekoi.example">
        <span class="ico">💌</span><span class="lbl">Email me</span><span class="arrow">›</span>
      </a>
      <a class="link alt" href="#" target="_blank" rel="noopener">
        <span class="ico">🎫</span><span class="lbl">Upcoming shows</span><span class="arrow">›</span>
      </a>
      <a class="link"     href="#" target="_blank" rel="noopener">
        <span class="ico">💖</span><span class="lbl">Support me</span><span class="arrow">›</span>
      </a>
    </nav>

    <footer>made with <span class="b">💙</span> + <span class="p">💖</span></footer>
  </main>

<script>
  // ------- spawn drifting lightbulbs -------
  (function () {
    const layer = document.getElementById('bulbs');
    if (!layer) return;
    const COUNT = 26;

    const rand = (min, max) => Math.random() * (max - min) + min;

    for (let i = 0; i < COUNT; i++) {
      const b = document.createElement('span');
      b.className = 'bulb';
      b.textContent = '💡';

      const size    = rand(14, 38);          // px
      const dur     = rand(22, 48);          // seconds for full diagonal
      const delay   = -rand(0, 48);          // negative => stagger so screen is populated immediately
      const startX  = rand(-10, 95);         // vw
      const startY  = rand(0, 100);          // vh from bottom (we offset via top%)
      const peak    = rand(0.18, 0.55);      // peak opacity
      const tw      = rand(2.2, 5.5);        // twinkle period

      b.style.fontSize = size + 'px';
      b.style.left = startX + 'vw';
      b.style.top  = (100 - startY) + 'vh';   // distribute along vertical too
      b.style.setProperty('--peak', peak.toFixed(2));
      b.style.animationDuration = dur.toFixed(1) + 's';
      b.style.animationDelay = delay.toFixed(1) + 's';
      // overlay twinkle
      b.style.animation = `drift ${dur.toFixed(1)}s linear ${delay.toFixed(1)}s infinite, twinkle ${tw.toFixed(1)}s ease-in-out ${(-rand(0,tw)).toFixed(1)}s infinite`;

      layer.appendChild(b);
    }
  })();
</script>
</body>
</html>
