<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music Industry Knowledge — Site 1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Theme slider -->
  <div id="theme-slider">
    <div class="theme-dot active" data-theme="default" title="Default Dark"></div>
    <div class="theme-dot" data-theme="vrchat" title="VRChat"></div>
    <div class="theme-dot" data-theme="warm" title="Warm Amber"></div>
    <div class="theme-dot" data-theme="ocean" title="Deep Ocean"></div>
  </div>

  <!-- Master Layer trigger button -->
  <button id="ml-btn" class="ml-btn" aria-label="Open Master Layer" title="Master Layer">&#9632;</button>

  <!-- Fixed sidebar nav (populated by app.js) -->
  <nav id="sidebar" aria-label="Category navigation"></nav>

  <!-- Master Layer overlay -->
  <div id="master-layer" class="ml-overlay hidden">
    <button id="ml-close" class="ml-close" aria-label="Close Master Layer">&times;</button>
    <div id="ml-content"></div>
  </div>

  <!-- Fixed top bar -->
  <div id="topbar">
    <span class="topbar-title">Music Industry Knowledge</span>
    <span class="topbar-active-cat" id="topbar-active"></span>
  </div>

  <!-- Main content (all 26 sections rendered by app.js) -->
  <main id="main"></main>

  <!-- Floating Deep Dive curriculum button -->
  <button id="curriculum-btn" aria-label="Open Deep Dive curriculum view">
    <span class="curr-icon">◈</span>
    <span class="curr-label">Deep Dive</span>
  </button>

  <!-- Curriculum overlay panel -->
  <div id="curriculum-overlay" class="curriculum-overlay hidden">
    <div class="curr-panel">
      <button class="curr-close" aria-label="Close curriculum">✕</button>
      <div id="curr-content"></div>
    </div>
  </div>

  <!-- Data file — must load before app.js -->
  <script src="data/data.js"></script>
  <script src="data/tile-sources.js"></script>
  <script src="app.js"></script>
</body>
</html>
