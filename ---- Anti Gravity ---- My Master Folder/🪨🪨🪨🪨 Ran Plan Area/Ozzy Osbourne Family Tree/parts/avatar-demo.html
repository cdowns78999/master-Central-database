<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avatar Component Demo — Ozzy Family Tree</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Permanent+Marker&display=swap" rel="stylesheet">
<link rel="stylesheet" href="avatar.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Courier Prime', 'Courier New', monospace;
    color: #e8dcc0;
    background:
      radial-gradient(ellipse at 20% 10%, rgba(255,220,180,0.08), transparent 60%),
      radial-gradient(ellipse at 80% 90%, rgba(0,0,0,0.4), transparent 50%),
      linear-gradient(170deg, #3b2416, #4a2e1c, #3b2416);
    min-height: 100vh;
    padding: 60px 20px 120px;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400"><filter id="g"><feTurbulence type="fractalNoise" baseFrequency="0.02 0.8" numOctaves="2"/></filter><rect width="100%" height="100%" filter="url(%23g)" opacity="0.35"/></svg>');
    opacity: 0.35;
    mix-blend-mode: overlay;
    pointer-events: none;
    z-index: 0;
  }
  main {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    text-align: center;
  }
  h1 {
    font-family: 'Special Elite', monospace;
    font-size: 38px;
    letter-spacing: 0.06em;
    color: #e8dcc0;
    margin-bottom: 10px;
  }
  .sub {
    font-family: 'Special Elite', monospace;
    font-size: 14px;
    letter-spacing: 0.14em;
    color: #d4a853;
    opacity: 0.85;
    margin-bottom: 14px;
  }
  .hint {
    font-family: 'Courier Prime', monospace;
    font-size: 12px;
    color: #e8dcc0;
    opacity: 0.6;
    margin-bottom: 50px;
    letter-spacing: 0.04em;
  }
  .avatar-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 40px;
    justify-content: center;
    align-items: flex-start;
    padding: 30px 10px 60px;
  }
  .avatar-label {
    display: block;
    margin-top: 16px;
    font-family: 'Special Elite', monospace;
    font-size: 11px;
    letter-spacing: 0.16em;
    color: #d4a853;
    opacity: 0.75;
    text-align: center;
  }
  .avatar-wrap {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
  }
  /* Larger variant for demo */
  .avatar-slot.size-lg { --av-size: 180px; }
  .avatar-slot.size-xl { --av-size: 220px; }
</style>
</head>
<body>
<main>
  <h1>3D Spinning Avatar — Visual QA</h1>
  <div class="sub">CASE FILE COMPONENT / DEMO MODE</div>
  <div class="hint">Hover any avatar to pause + zoom. Rotation: 7s full turn.</div>

  <div class="avatar-grid">
    <div class="avatar-wrap">
      <div class="avatar-slot"
           data-member-id="ozzy-osbourne"
           data-member-name="John Michael 'Ozzy' Osbourne"
           data-member-relationship="Root person - the Prince of Darkness"></div>
      <span class="avatar-label">OZZY (STANDARD 140)</span>
    </div>

    <div class="avatar-wrap">
      <div class="avatar-slot size-lg"
           data-member-id="sharon-osbourne"
           data-member-name="Sharon Rachel Osbourne"
           data-member-relationship="Second wife of Ozzy (1982-2025)"></div>
      <span class="avatar-label">SHARON (LARGE 180)</span>
    </div>

    <div class="avatar-wrap">
      <div class="avatar-slot size-xl"
           data-member-id="kelly-osbourne"
           data-member-name="Kelly Michelle Lee Osbourne"
           data-member-relationship="Daughter of Ozzy and Sharon"></div>
      <span class="avatar-label">KELLY (XL 220)</span>
    </div>
  </div>

  <div class="avatar-grid">
    <div class="avatar-wrap">
      <div class="avatar-slot"
           data-member-id="jack-osbourne"
           data-member-name="Jack Joseph Osbourne"
           data-member-relationship="Son of Ozzy and Sharon"></div>
      <span class="avatar-label">JACK</span>
    </div>

    <div class="avatar-wrap">
      <div class="avatar-slot"
           data-member-id="john-thomas-osbourne"
           data-member-name="John Thomas 'Jack' Osbourne"
           data-member-relationship="Father of Ozzy"></div>
      <span class="avatar-label">JACK SR (FATHER)</span>
    </div>

    <div class="avatar-wrap">
      <div class="avatar-slot"
           data-member-id="elijah-osbourne"
           data-member-name="Elijah Osbourne"
           data-member-relationship="Grandson of Ozzy (son of Louis)"></div>
      <span class="avatar-label">ELIJAH (GRANDCHILD)</span>
    </div>
  </div>
</main>

<script src="avatar.js"></script>
</body>
</html>
