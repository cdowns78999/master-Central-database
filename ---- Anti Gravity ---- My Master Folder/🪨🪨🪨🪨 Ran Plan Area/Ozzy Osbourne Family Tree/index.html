<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Osbourne Family — Case File / Family Tree</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Permanent+Marker&display=swap" rel="stylesheet">
<link rel="stylesheet" href="parts/tree.css">
<link rel="stylesheet" href="parts/avatar.css">
<link rel="stylesheet" href="parts/lessons.css">
<style>
  :root{
    --wood-dark:#3b2416;--wood-grain:#4a2e1c;--manila-folder:#d4a853;
    --manila-shadow:#a07a33;--aged-paper:#e8dcc0;--aged-paper-deep:#c9b790;
    --index-card-cream:#f4ead5;--index-card-rule:#b8d0e0;--typewriter-ink:#1a1512;
    --stamp-red:#a8231a;--stamp-red-faded:#c4443a;--redaction-black:#0f0e0c;
    --coffee-ring:#6b4423;--masking-tape:#e8d9a8;--faded-blue-ink:#3a5878;
    --paperclip-silver:#9ca3af;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:'Courier Prime','Courier New',monospace;
    color:var(--typewriter-ink);
    background:
      radial-gradient(ellipse at 20% 10%, rgba(255,220,180,0.08), transparent 60%),
      radial-gradient(ellipse at 80% 90%, rgba(0,0,0,0.4), transparent 50%),
      linear-gradient(170deg, var(--wood-dark), var(--wood-grain), var(--wood-dark));
    background-attachment:fixed;min-height:100vh;overflow-x:hidden;line-height:1.7;
  }
  body::before{
    content:'';position:fixed;inset:0;
    background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400"><filter id="g"><feTurbulence type="fractalNoise" baseFrequency="0.02 0.8" numOctaves="2"/></filter><rect width="100%" height="100%" filter="url(%23g)" opacity="0.35"/></svg>');
    opacity:0.35;mix-blend-mode:overlay;pointer-events:none;z-index:0;
  }
  main{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:40px 20px 120px}
  .loading{text-align:center;padding:60px;font-family:'Special Elite',monospace;color:var(--manila-folder);opacity:0.7}
</style>
</head>
<body>
<main>
  <div id="tree-root" class="loading">LOADING CASE FILE...</div>
  <div id="lessons-root" class="loading">LOADING LOCAL CONTACTS...</div>
</main>
<script>
(async function(){
  try{
    const [tree, lessons] = await Promise.all([
      fetch('parts/tree.html').then(r=>r.text()),
      fetch('parts/lessons.html').then(r=>r.text()).catch(()=>'')
    ]);
    document.getElementById('tree-root').outerHTML = tree;
    if(lessons) document.getElementById('lessons-root').outerHTML = lessons;
  }catch(e){
    document.getElementById('tree-root').textContent = 'ERROR LOADING FILE: '+e.message;
  }
  if(window.OzzyAvatar) window.OzzyAvatar.init();
})();
</script>
<script src="parts/avatar.js" defer></script>
<script src="parts/lessons.js" defer onerror="void 0"></script>
</body>
</html>
