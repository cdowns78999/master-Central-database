<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Label Finder v4</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ═══ DARK MODE OVERRIDES ═══ */
        body {
            background: #0a0a0a !important;
            color: #e0e0e0;
        }
        .sidebar {
            background: #111111 !important;
            border-right-color: rgba(255,255,255,0.06) !important;
        }
        .nav-item {
            color: rgba(255,255,255,0.3) !important;
        }
        .nav-item:hover, .nav-item.active {
            background: rgba(255,255,255,0.05) !important;
            color: #4da6ff !important;
        }
        .logo-circle {
            border-color: #4da6ff !important;
            box-shadow: 0 0 20px rgba(77,166,255,0.2) !important;
        }
        .top-bar {
            background: #111111 !important;
            border-bottom-color: rgba(255,255,255,0.06) !important;
        }
        .user-profile {
            background: rgba(255,255,255,0.05) !important;
            color: rgba(255,255,255,0.4) !important;
        }
        .user-avatar {
            background: rgba(255,255,255,0.08) !important;
        }
        .ambient-glow-1 { background: radial-gradient(circle, rgba(77,166,255,0.06) 0%, transparent 70%) !important; }
        .ambient-glow-2 { background: radial-gradient(circle, rgba(99,102,241,0.05) 0%, transparent 70%) !important; }
        .ambient-glow-3 { background: radial-gradient(circle, rgba(56,189,248,0.04) 0%, transparent 70%) !important; }

        /* ═══ SELECTION ROW ═══ */
        .selection-row {
            display: flex;
            align-items: center;
            border-radius: 12px;
            margin-bottom: 2px;
            padding: 6px 12px;
            transition: background 0.15s ease, box-shadow 0.15s ease;
            cursor: pointer;
            position: relative;
            border-bottom-color: rgba(255,255,255,0.04) !important;
        }
        .selection-row:hover {
            background: rgba(255,255,255,0.03);
            box-shadow: 0 0 0 1px rgba(77,166,255,0.08);
        }

        /* ═══ 4 DATA BUTTONS — Style 1 Glow Border ═══ */
        .action-bar {
            display: grid;
            grid-template-columns: repeat(4, 130px);
            gap: 4px;
            align-items: center;
            margin: 0 8px;
            flex-shrink: 0;
        }
        .data-btn {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.45rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            padding: 0;
            height: 28px;
            width: 130px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(77,166,255,0.06);
            border: 1px solid rgba(77,166,255,0.25);
            border-radius: 6px;
            color: #4da6ff;
            box-shadow: 0 0 8px rgba(77,166,255,0.1);
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }
        .data-btn:hover {
            box-shadow: 0 0 16px rgba(77,166,255,0.25);
            border-color: rgba(77,166,255,0.5);
            background: rgba(77,166,255,0.1);
            transform: scale(1.06);
        }
        .data-btn:active {
            transform: scale(0.95);
            transition: all 0.08s ease;
        }

        /* Grade color variants for button 1 */
        .data-btn.grade-S { color: #f59e0b; border-color: rgba(245,158,11,0.25); box-shadow: 0 0 8px rgba(245,158,11,0.1); background: rgba(245,158,11,0.06); }
        .data-btn.grade-S:hover { box-shadow: 0 0 16px rgba(245,158,11,0.25); border-color: rgba(245,158,11,0.5); background: rgba(245,158,11,0.1); }
        .data-btn.grade-A { color: #4da6ff; border-color: rgba(77,166,255,0.25); box-shadow: 0 0 8px rgba(77,166,255,0.1); background: rgba(77,166,255,0.06); }
        .data-btn.grade-B { color: #10b981; border-color: rgba(16,185,129,0.25); box-shadow: 0 0 8px rgba(16,185,129,0.1); background: rgba(16,185,129,0.06); }
        .data-btn.grade-B:hover { box-shadow: 0 0 16px rgba(16,185,129,0.25); border-color: rgba(16,185,129,0.5); background: rgba(16,185,129,0.1); }
        .data-btn.grade-C { color: rgba(255,255,255,0.4); border-color: rgba(255,255,255,0.1); box-shadow: none; background: rgba(255,255,255,0.03); }
        .data-btn.grade-C:hover { box-shadow: 0 0 12px rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.06); }
        .data-btn.grade-D { color: #ef4444; border-color: rgba(239,68,68,0.25); box-shadow: 0 0 8px rgba(239,68,68,0.1); background: rgba(239,68,68,0.06); }
        .data-btn.grade-D:hover { box-shadow: 0 0 16px rgba(239,68,68,0.25); border-color: rgba(239,68,68,0.5); background: rgba(239,68,68,0.1); }

        /* ═══ FIELD TAGS — Style 3 Underline Accent ═══ */
        .field-bar {
            display: grid;
            grid-template-columns: repeat(4, 65px);
            gap: 3px;
            align-items: center;
            margin-left: 4px;
            flex-shrink: 0;
        }
        .field-tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.4rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            height: 22px;
            width: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            border-bottom: 2px solid rgba(77,166,255,0.15);
            border-radius: 0;
            color: rgba(255,255,255,0.35);
            cursor: default;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .divider-pipe { background: rgba(255,255,255,0.06) !important; }
        .selection-data {
            font-size: 0.6875rem !important;
            letter-spacing: 0.02em !important;
        }
        .selection-data .reveal-char { color: rgba(255,255,255,0.12) !important; }
        .selection-row:hover .selection-data .reveal-char { color: rgba(255,255,255,0.5) !important; text-shadow: none !important; }
        .selection-data::before { color: rgba(255,255,255,0.15) !important; content: "// " !important; }
        .section-title { color: #4da6ff !important; font-size: 0.875rem; letter-spacing: 0.5em; margin-bottom: 24px; }

        /* ═══ HERO ═══ */
        .hero-overlay {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: opacity 0.6s ease;
        }
        .hero-overlay.fade-out {
            opacity: 0;
            pointer-events: none;
        }
        .hero-text {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            color: #e0e0e0;
            letter-spacing: -0.02em;
        }
        .hero-text .hero-char {
            opacity: 0;
            display: inline-block;
            animation: heroReveal 0.4s ease forwards;
        }
        @keyframes heroReveal {
            0% { opacity: 0; transform: translateY(8px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .hero-sub {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: #cbd5e0;
            margin-top: 16px;
            text-align: center;
            opacity: 0;
            animation: heroSubFade 0.5s ease 2.5s forwards;
        }
        @keyframes heroSubFade { to { opacity: 1; } }

        /* ═══ SEARCH BAR ═══ */
        .search-wrap { margin-bottom: 16px; }
        .search-input {
            width: 100%;
            max-width: 480px;
            height: 40px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 9999px;
            padding: 0 1.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: #e0e0e0;
            outline: none;
            transition: border-color 0.2s ease;
        }
        .search-input::placeholder { color: rgba(255,255,255,0.2); }
        .search-input:focus {
            border-color: #4da6ff;
            background: rgba(77,166,255,0.04);
        }

        /* ═══ SORT ROW ═══ */
        .sort-row {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.625rem;
            color: #cbd5e0;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .sort-row .sort-prefix { opacity: 0.6; }
        .sort-btn {
            background: none;
            border: none;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.625rem;
            color: #cbd5e0;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
            transition: color 0.2s ease;
        }
        .sort-btn:hover { color: #4da6ff; }
        .sort-btn.active {
            color: #4da6ff;
            text-shadow: 0 0 12px rgba(77, 166, 255, 0.3);
        }
        .sort-sep { color: rgba(255,255,255,0.1); }

        /* ═══ ARTIST HOVER CARD (button 3 only) ═══ */
        .hover-card {
            position: absolute;
            z-index: 500;
            background: rgba(17, 17, 17, 0.95);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            padding: 16px 20px;
            width: 320px;
            opacity: 0;
            transform: translateY(6px);
            transition: opacity 0.2s ease, transform 0.2s ease;
            pointer-events: none;
        }
        .hover-card.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        .hover-card-header {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 0.8rem;
            color: #e0e0e0;
            margin-bottom: 2px;
        }
        .hover-card-sub {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 12px;
        }
        .hover-artist-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 0;
        }
        .hover-artist-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 0.7rem;
            flex-shrink: 0;
        }
        .hover-artist-info { flex: 1; min-width: 0; }
        .hover-artist-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .hover-artist-name {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 0.75rem;
            color: #e0e0e0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .hover-artist-listeners {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            color: #4da6ff;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 3px;
        }
        .trend-up { color: #22c55e; }
        .trend-down { color: #ef4444; }
        .trend-steady { color: #9ca3af; }
        .hover-artist-meta {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.5rem;
            color: #9ca3af;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ═══ FADE TRANSITIONS ═══ */
        .outlet-grid { transition: opacity 0.25s ease; }
        .outlet-grid.fading { opacity: 0; }

        .selection-box-wrap { position: relative; }
        .selection-box {
            width: 180px !important; min-width: 180px !important; max-width: 180px !important;
            position: relative !important; overflow: visible !important;
            border: 1px solid rgba(255,255,255,0.12) !important;
            box-shadow: 0 0 12px rgba(0,0,0,0.3) !important;
        }
        .selection-box-overlay {
            opacity: 0.3 !important;
            mix-blend-mode: normal !important;
        }

        /* Type sticker — sits on the label pill like a store "NEW" tag */
        .type-sticker {
            position: absolute;
            top: -6px;
            right: -4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.35rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 2px 6px;
            border-radius: 6px;
            z-index: 2;
            transform: rotate(4deg);
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
            pointer-events: none;
        }
        .type-sticker.major {
            background: #ef4444;
            color: #fff;
        }
        .type-sticker.major-backed {
            background: #4da6ff;
            color: #fff;
        }
        .type-sticker.independent {
            background: #10b981;
            color: #fff;
        }

        /* ═══ LABEL COUNT ═══ */
        .label-count {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            color: #cbd5e0;
            margin-left: 12px;
            font-weight: 400;
        }
    </style>
</head>
<body>

    <!-- Ambient Glow Orbs -->
    <div class="ambient-glow ambient-glow-1"></div>
    <div class="ambient-glow ambient-glow-2"></div>
    <div class="ambient-glow ambient-glow-3"></div>

    <!-- Hero Overlay -->
    <div class="hero-overlay" id="heroOverlay">
        <div style="text-align: center;">
            <div class="hero-text" id="heroText"></div>
            <div class="hero-sub">click anywhere to explore</div>
        </div>
    </div>

    <!-- Sidebar -->
    <nav class="sidebar">
        <div class="logo-container">
            <div class="logo-circle" id="logoBtn" title="Toggle Bass/House"></div>
        </div>
        <div class="nav-links" id="navLinks">
            <div class="nav-item active" data-view="all" title="All Labels">A</div>
            <div class="nav-item" data-view="bass" title="Bass / Dubstep">B</div>
            <div class="nav-item" data-view="house" title="House / Tech House">H</div>
            <div class="nav-item" data-view="techno" title="Techno">T</div>
            <div class="nav-item" data-view="progressive" title="Progressive">P</div>
            <div class="nav-item" data-view="melodic" title="Melodic">M</div>
            <div class="nav-item" data-view="riddim" title="Riddim">R</div>
        </div>
        <div class="sidebar-footer"></div>
    </nav>

    <!-- Main Wrapper -->
    <div class="main-wrapper">
        <!-- Top Bar -->
        <div class="top-bar">
            <div class="app-name"></div>
            <div class="user-profile">
                <div class="user-avatar"></div>
                <span>user</span>
            </div>
        </div>

        <!-- Content Area -->
        <div class="content-area" id="contentArea">
            <div class="search-wrap">
                <input type="text" class="search-input" id="searchInput" placeholder="// search labels...">
            </div>
            <div class="sort-row">
                <span class="sort-prefix">// sort:</span>
                <button class="sort-btn" data-sort="roster">roster</button>
                <span class="sort-sep">&middot;</span>
                <button class="sort-btn" data-sort="year">year</button>
                <span class="sort-sep">&middot;</span>
                <button class="sort-btn" data-sort="az">a-z</button>
                <span class="sort-sep">&middot;</span>
                <button class="sort-btn" data-sort="reach">reach</button>
                <span class="sort-sep">&middot;</span>
                <button class="sort-btn" data-sort="relevance">relevance</button>
                <span class="sort-sep">&middot;</span>
                <button class="sort-btn" data-sort="releases">releases</button>
                <span class="sort-sep">&middot;</span>
                <button class="sort-btn" data-sort="topartist">top artist</button>
            </div>
            <div style="display: flex; align-items: baseline;">
                <div class="section-title" id="sectionTitle">ALL LABELS</div>
                <span class="label-count" id="labelCount"></span>
            </div>
            <div class="outlet-grid" id="gridRoot"></div>
        </div>
    </div>

    <!-- Hover Card (singleton, repositioned on hover) -->
    <div class="hover-card" id="hoverCard"></div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
