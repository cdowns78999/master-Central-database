<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Label Finder | Ahead</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="pos.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&family=Outfit:wght@400;600;800;900&display=swap"
        rel="stylesheet">
    <style>
        /* ═══════════════════════════════════════
           LABEL FINDER OVERRIDES & ADDITIONS
           ═══════════════════════════════════════ */

        /* Phase system — controls fade-in/fade-out flow */
        .phase {
            display: none;
            opacity: 0;
            transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .phase.visible {
            display: block;
            opacity: 1;
        }
        .phase.fading-out {
            opacity: 0;
            transform: translateY(-20px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .phase.fading-in {
            display: block;
            opacity: 0;
            transform: translateY(10px);
        }

        /* Hero question */
        .hero-question {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 128px);
            cursor: pointer;
            user-select: none;
        }
        .hero-text {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            color: #111827;
            letter-spacing: -0.02em;
            text-align: center;
            line-height: 1.3;
        }
        .hero-text .reveal-char {
            opacity: 0;
            color: #cbd5e0;
            transition: all 1.4s ease;
            transition-delay: calc(var(--char-index) * 0.04s);
            display: inline;
        }
        .hero-text.revealed .reveal-char {
            opacity: 1;
            color: #111827;
        }
        .hero-text .reveal-char.accent {
            color: #4da6ff;
            text-shadow: 0 0 30px rgba(77, 166, 255, 0.15);
        }
        .hero-text.revealed .reveal-char.accent {
            color: #4da6ff;
        }

        /* Hint text */
        .hero-hint {
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: #cbd5e0;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-top: 2rem;
            opacity: 0;
            transition: opacity 1.5s ease 2s;
        }
        .hero-text.revealed ~ .hero-hint {
            opacity: 1;
        }

        /* Category rows */
        .category-list {
            display: flex;
            flex-direction: column;
            gap: 0;
            max-width: none;
            margin: 0;
            padding-top: 8px;
        }
        .category-row {
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .category-row.shown {
            opacity: 1;
            transform: translateY(0);
        }
        .category-row .selection-row {
            cursor: pointer;
        }
        .category-row .selection-data {
            display: flex;
            flex-wrap: nowrap;
            align-items: center;
            gap: 4px;
            background: rgba(0, 0, 0, 0.025);
            padding: 4px 8px;
            border-radius: 9999px;
        }

        /* Search bar */
        .search-wrap {
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .search-bar {
            flex: 1;
            height: 40px;
            background: #ffffff;
            border: 1px solid #f0f0f0;
            border-radius: 9999px;
            padding: 0 1.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: #111827;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }
        .search-bar::placeholder {
            color: #cbd5e0;
        }
        .search-bar:focus {
            border-color: #4da6ff;
            box-shadow: 0 0 0 3px rgba(77, 166, 255, 0.08);
        }
        .search-scope {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.625rem;
            color: #cbd5e0;
            cursor: pointer;
            transition: color 0.2s ease;
            white-space: nowrap;
            user-select: none;
        }
        .search-scope:hover {
            color: #4da6ff;
        }
        .search-scope .scope-active {
            color: #4da6ff;
        }

        /* Sort row */
        .sort-row {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.625rem;
            color: #cbd5e0;
            margin-bottom: 16px;
            user-select: none;
        }
        .sort-row span {
            cursor: pointer;
            transition: color 0.2s ease;
        }
        .sort-row span:hover {
            color: #4b5563;
        }
        .sort-row span.sort-active {
            color: #4da6ff;
            text-shadow: 0 0 15px rgba(77, 166, 255, 0.2);
        }

        /* Label detail rows */
        .label-list {
            display: flex;
            flex-direction: column;
            gap: 0;
        }
        .label-row {
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        .label-row.shown {
            opacity: 1;
            transform: translateY(0);
        }
        .label-row .selection-data {
            display: flex;
            flex-wrap: nowrap;
            align-items: center;
            gap: 4px;
            background: rgba(0, 0, 0, 0.025);
            padding: 4px 8px;
            border-radius: 9999px;
        }
        /* Overflow detail — wraps to next line in same cluster */
        .label-row .selection-detail {
            grid-column: 1 / -1;
            padding: 4px 0 8px 0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.625rem;
            color: #9ca3af;
            letter-spacing: 0.05em;
            opacity: 0;
            max-height: 0;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .label-row.expanded .selection-detail {
            opacity: 1;
            max-height: 60px;
            padding: 6px 0 10px 0;
        }
        .label-row .selection-detail .detail-tags {
            display: inline;
        }
        .label-row .selection-detail .detail-tags span {
            color: #cbd5e0;
        }
        .label-row .selection-detail .detail-assoc {
            color: #4da6ff;
            margin-left: 12px;
        }

        /* Back button */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 0 1.25rem;
            height: 36px;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 400;
            cursor: pointer;
            border: 1px solid #f0f0f0;
            font-family: 'JetBrains Mono', monospace;
            background: #ffffff;
            color: #cbd5e0;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 32px;
        }
        .back-btn:hover {
            background: #f8fafc;
            border-color: #4da6ff;
            color: #4da6ff;
        }

        /* Category count badge */
        .cat-count {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 24px;
            height: 24px;
            border-radius: 12px;
            background: rgba(77, 166, 255, 0.1);
            color: #4da6ff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 0 6px;
            margin-left: 8px;
        }

        /* View title override */
        .section-title {
            transition: opacity 0.4s ease;
        }

        /* Active nav glow */
        .nav-item.current {
            background: #f8fafc;
            color: #4da6ff;
            box-shadow: 0 0 12px rgba(77, 166, 255, 0.1);
        }

        /* ═══ Hover Profile Card ═══ */
        .hover-card {
            position: absolute;
            z-index: 500;
            background: #ffffff;
            border: 1px solid #f0f0f0;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 16px 20px;
            width: 340px;
            opacity: 0;
            transform: translateY(6px);
            transition: opacity 0.2s ease, transform 0.2s ease;
            pointer-events: none;
        }
        .hover-card.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        .hover-card-header {
            font-family: 'Outfit', sans-serif;
            font-size: 0.85rem;
            font-weight: 800;
            color: #111827;
            margin-bottom: 4px;
        }
        .hover-card-sub {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        .hover-card-artist {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 0;
            border-bottom: 1px solid #f9fafb;
            opacity: 0;
            transform: translateX(8px);
            animation: pillFlutter 0.3s ease forwards;
        }
        .hover-card-artist:last-child {
            border-bottom: none;
        }
        .hover-card-artist:nth-child(1) { animation-delay: 0.05s; }
        .hover-card-artist:nth-child(2) { animation-delay: 0.1s; }
        .hover-card-artist:nth-child(3) { animation-delay: 0.15s; }
        .hover-card-artist:nth-child(4) { animation-delay: 0.2s; }
        .hover-card-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 0.8rem;
            color: #fff;
            flex-shrink: 0;
        }
        .hover-card-info {
            flex: 1;
            min-width: 0;
        }
        .hover-card-name {
            font-family: 'Outfit', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            color: #111827;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .hover-card-meta {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.55rem;
            color: #9ca3af;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .hover-card-listeners {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            font-weight: 700;
            color: #4da6ff;
            white-space: nowrap;
            text-align: right;
        }
        .hover-card-trend {
            font-size: 0.65rem;
            margin-left: 4px;
        }
        .hover-card-trend.up { color: #10b981; }
        .hover-card-trend.down { color: #ef4444; }
        .hover-card-trend.steady { color: #9ca3af; }

        /* Type badge — major / major-backed / independent */
        .label-type {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.5625rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 3px 10px;
            border-radius: 9999px;
            white-space: nowrap;
            display: inline-block;
        }
        .label-type.major {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        .label-type.major-backed {
            background: rgba(77, 166, 255, 0.1);
            color: #4da6ff;
            border: 1px solid rgba(77, 166, 255, 0.2);
        }
        .label-type.independent {
            background: rgba(16, 185, 129, 0.08);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.15);
        }

        /* Data pill badges — unified bullbar style with flutter callback */
        .data-pill {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.5625rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 4px 12px;
            border-radius: 9999px;
            white-space: nowrap;
            display: inline-block;
            margin-right: 0;
            margin-bottom: 0;
            background: rgba(77, 166, 255, 0.06);
            color: #4da6ff;
            border: 1px solid rgba(77, 166, 255, 0.12);
            opacity: 0;
            transform: translateY(4px);
            animation: pillFlutter 0.4s ease forwards;
            animation-delay: calc(var(--pill-i, 0) * 0.06s);
            transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
        }
        .data-pill:hover {
            background: rgba(77, 166, 255, 0.14);
            border-color: rgba(77, 166, 255, 0.3);
        }
        /* Color accents — subtle tint variations within the unified look */
        .data-pill.roster { color: #4da6ff; }
        .data-pill.year { color: #6366f1; border-color: rgba(99, 102, 241, 0.12); }
        .data-pill.country { color: #10b981; border-color: rgba(16, 185, 129, 0.12); }
        .data-pill.sub-genre { color: #f43f5e; border-color: rgba(244, 63, 94, 0.12); }

        @keyframes pillFlutter {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Override selection-row grid for type column */
        .label-row .selection-row,
        .category-row .selection-row.has-type {
            grid-template-columns: 280px auto 1fr;
        }

        /* Genre switch — double nav header */
        .genre-switch {
            display: flex;
            gap: 0;
            margin-bottom: 24px;
            border: 1px solid #f0f0f0;
            border-radius: 9999px;
            overflow: hidden;
            max-width: 300px;
        }
        .genre-switch-btn {
            flex: 1;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            font-weight: 400;
            color: #cbd5e0;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            background: #ffffff;
            border: none;
            user-select: none;
        }
        .genre-switch-btn:first-child {
            border-right: 1px solid #f0f0f0;
        }
        .genre-switch-btn.active {
            background: #f8fafc;
            color: #4da6ff;
            font-weight: 700;
        }
        .genre-switch-btn:hover:not(.active) {
            color: #4b5563;
        }
    </style>
</head>

<body>
    <!-- Ambient Glow Effects -->
    <div class="ambient-glow ambient-glow-1"></div>
    <div class="ambient-glow ambient-glow-2"></div>
    <div class="ambient-glow ambient-glow-3"></div>

    <aside class="sidebar">
        <div class="logo-container">
            <div class="logo-circle" id="logoBack" title="Back to start"></div>
        </div>
        <nav class="nav-links">
            <a href="#" class="nav-item" data-cat="All Labels" title="View All">A</a>
            <a href="#" class="nav-item" data-cat="Bass" title="Bass">B</a>
            <a href="#" class="nav-item" data-cat="House" title="House">H</a>
            <a href="#" class="nav-item" data-cat="Riddim" title="Riddim (coming soon)">R</a>
        </nav>
        <div class="sidebar-footer">
            <div class="nav-item" id="posLaunchSidebar" title="Label Analyzer" style="cursor:pointer;">?</div>
        </div>
    </aside>

    <div class="main-wrapper">
        <header class="top-bar">
            <div class="top-bar-left">
                <span class="app-name">label finder</span>
            </div>
            <div class="top-bar-right">
                <div class="user-profile">
                    <div class="user-avatar"></div>
                    <span>Chad Downs</span>
                </div>
            </div>
        </header>

        <main class="content-area">
            <div id="grid-root">

                <!-- PHASE 1: Hero Question -->
                <div id="phaseHero" class="phase visible">
                    <div class="hero-question" id="heroClick">
                        <div>
                            <div class="hero-text" id="heroText"></div>
                            <div class="hero-hint">click anywhere to begin</div>
                        </div>
                    </div>
                </div>

                <!-- PHASE 2: Category Selection -->
                <div id="phaseCategories" class="phase">
                    <div class="search-wrap">
                        <input type="text" class="search-bar" id="searchBar" placeholder="search all 77 labels...">
                        <span class="search-scope" id="searchScope">// scope: <span class="scope-active">all</span></span>
                    </div>
                    <div class="genre-switch" id="genreSwitch" style="display:none;">
                        <div class="genre-switch-btn active" data-genre="Bass">bass</div>
                        <div class="genre-switch-btn" data-genre="House">house</div>
                    </div>
                    <h2 class="section-title" id="catTitle">Bass</h2>
                    <div class="category-list" id="categoryList"></div>
                </div>

                <!-- PHASE 3: Label Rows -->
                <div id="phaseLabels" class="phase">
                    <div class="back-btn" id="backToCategories">&larr; back</div>
                    <div class="search-wrap">
                        <input type="text" class="search-bar" id="searchBarLabels" placeholder="search labels...">
                        <span class="search-scope" id="searchScopeLabels">// scope: <span class="scope-active">category</span></span>
                    </div>
                    <div class="sort-row" id="sortRow">// sort: <span class="sort-active" data-sort="roster">roster</span> · <span data-sort="year">year</span> · <span data-sort="az">a-z</span> · <span data-sort="reach">reach</span></div>
                    <h2 class="section-title" id="labelViewTitle"></h2>
                    <div class="label-list" id="labelList"></div>
                </div>

            </div>
        </main>
    </div>

    <!-- Hover Profile Card (shared, repositioned by JS) -->
    <div class="hover-card" id="hoverCard"></div>

    <script src="data.js"></script>
    <script src="app.js"></script>
    <script src="pos.js"></script>
</body>

</html>
