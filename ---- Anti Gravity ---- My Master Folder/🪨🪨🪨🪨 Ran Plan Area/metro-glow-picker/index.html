<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Metro Glow Picker</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0f172a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px 64px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Inter", sans-serif;
    }

    /* ── Page Title ── */
    .page-title {
      color: #ffffff;
      font-size: 26px;
      font-weight: 600;
      letter-spacing: 0.04em;
      margin-bottom: 48px;
      text-align: center;
      opacity: 0.95;
    }

    /* ── Card Stack ── */
    .card-stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      width: 100%;
    }

    /* ── Card Wrapper (card + button grouped) ── */
    .card-unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    /* ── Glow Card Base ── */
    .glow-card {
      width: 420px;
      height: 120px;
      background-color: rgba(30, 41, 59, 0.80);
      border: 1px solid #334155;
      border-radius: 12px;
      display: flex;
      align-items: center;
      padding: 0 28px;
      position: relative;
      overflow: hidden;
      cursor: crosshair;
    }

    .glow-card .card-label {
      color: #cbd5e1;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.03em;
      pointer-events: none;
      user-select: none;
      position: relative;
      z-index: 10;
    }

    /* ── Pick This Button ── */
    .pick-btn {
      background: #334155;
      border: none;
      color: #ffffff;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      padding: 6px 16px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.18s ease, transform 0.1s ease;
    }

    .pick-btn:hover {
      background: #475569;
      transform: translateY(-1px);
    }

    .pick-btn:active {
      transform: translateY(0);
      background: #1e293b;
    }

    /* ═══════════════════════════════════════
       IMPL 1 — Conic Gradient Rotating Border
       ═══════════════════════════════════════ */
    .impl-1 {
      --mx: 50%;
      --my: 50%;
      border: 2px solid transparent;
      background-clip: padding-box;
    }

    .impl-1::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 14px;
      background: conic-gradient(
        from 0deg at var(--mx) var(--my),
        hsl(0,100%,60%),
        hsl(60,100%,60%),
        hsl(120,100%,60%),
        hsl(180,100%,60%),
        hsl(240,100%,60%),
        hsl(300,100%,60%),
        hsl(360,100%,60%)
      );
      z-index: 0;
      transition: opacity 0.3s ease;
      opacity: 0;
    }

    .impl-1::after {
      content: '';
      position: absolute;
      inset: 2px;
      border-radius: 11px;
      background: rgba(30,41,59,0.90);
      z-index: 1;
    }

    .impl-1:hover::before {
      opacity: 1;
      animation: impl1-spin 3s linear infinite;
    }

    @keyframes impl1-spin {
      0%   { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }

    /* Glow blur layer */
    .impl-1 .conic-blur {
      position: absolute;
      inset: -2px;
      border-radius: 14px;
      background: conic-gradient(
        from 0deg at var(--mx) var(--my),
        hsl(0,100%,60%),
        hsl(60,100%,60%),
        hsl(120,100%,60%),
        hsl(180,100%,60%),
        hsl(240,100%,60%),
        hsl(300,100%,60%),
        hsl(360,100%,60%)
      );
      filter: blur(12px);
      opacity: 0;
      z-index: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .impl-1:hover .conic-blur {
      opacity: 0.6;
      animation: impl1-spin 3s linear infinite;
    }

    /* ═══════════════════════════════════════
       IMPL 2 — Multi-Layer Box Shadow Pulse
       ═══════════════════════════════════════ */
    .impl-2 {
      --hue: 200;
      transition: box-shadow 0.08s ease;
    }

    .impl-2:hover {
      animation: impl2-pulse 1.6s ease-in-out infinite;
    }

    @keyframes impl2-pulse {
      0%, 100% {
        box-shadow:
          0 0  8px 1px  hsl(var(--hue),90%,60%),
          0 0 16px 4px  hsl(calc(var(--hue) + 60),90%,55%),
          0 0 28px 8px  hsl(calc(var(--hue) + 120),90%,50%),
          0 0 44px 12px hsl(calc(var(--hue) + 200),90%,45%),
          0 0 64px 18px hsl(calc(var(--hue) + 270),90%,40%);
      }
      50% {
        box-shadow:
          0 0 14px 3px  hsl(var(--hue),100%,70%),
          0 0 28px 8px  hsl(calc(var(--hue) + 60),100%,65%),
          0 0 46px 14px hsl(calc(var(--hue) + 120),100%,60%),
          0 0 68px 20px hsl(calc(var(--hue) + 200),100%,55%),
          0 0 90px 28px hsl(calc(var(--hue) + 270),100%,50%);
      }
    }

    /* ═══════════════════════════════════════
       IMPL 3 — ::before Pseudo Hue-Rotate
       ═══════════════════════════════════════ */
    .impl-3 {
      --mx: 50%;
      --my: 50%;
    }

    .impl-3::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 12px;
      background: radial-gradient(
        circle at var(--mx) var(--my),
        hsl(200,100%,70%) 0%,
        hsl(260,100%,60%) 30%,
        hsl(300,100%,55%) 55%,
        transparent 80%
      );
      opacity: 0;
      transition: opacity 0.35s ease;
      animation: impl3-hue 4s linear infinite paused;
      pointer-events: none;
      z-index: 0;
    }

    .impl-3:hover::before {
      opacity: 0.55;
      animation-play-state: running;
    }

    @keyframes impl3-hue {
      0%   { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }

    /* ═══════════════════════════════════════
       IMPL 4 — SVG feColorMatrix Rainbow Shift
       ═══════════════════════════════════════ */
    .impl-4 {
      --hue: 0;
    }

    .impl-4 .svg-glow-layer {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      background: linear-gradient(135deg,
        hsl(200,80%,55%),
        hsl(280,80%,55%),
        hsl(340,80%,55%)
      );
      opacity: 0;
      transition: opacity 0.35s ease;
      pointer-events: none;
      z-index: 0;
      filter: url(#impl4-filter);
    }

    .impl-4:hover .svg-glow-layer {
      opacity: 0.65;
    }

    /* ═══════════════════════════════════════
       IMPL 5 — Canvas Aurora Shimmer
       ═══════════════════════════════════════ */
    .impl-5 canvas.aurora-canvas {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      pointer-events: none;
      z-index: 0;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .impl-5:hover canvas.aurora-canvas {
      opacity: 1;
    }

  </style>
</head>
<body>

  <!-- Hidden SVG filter for Impl 4 -->
  <svg width="0" height="0" style="position:absolute;overflow:hidden;" aria-hidden="true">
    <defs>
      <filter id="impl4-filter" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
        <feColorMatrix id="impl4-hue-matrix" type="hueRotate" values="0" result="hued"/>
        <feColorMatrix type="saturate" values="2.2" in="hued" result="sat"/>
        <feGaussianBlur stdDeviation="6" in="sat" result="blurred"/>
        <feBlend in="SourceGraphic" in2="blurred" mode="screen"/>
      </filter>
    </defs>
  </svg>

  <h1 class="page-title">Metro Glow Picker</h1>

  <div class="card-stack">

    <!-- Implementation 1 -->
    <div class="card-unit">
      <div class="glow-card impl-1">
        <div class="conic-blur"></div>
        <span class="card-label">01 — Conic Border Glow</span>
      </div>
      <button class="pick-btn">&#10022; Pick This</button>
    </div>

    <!-- Implementation 2 -->
    <div class="card-unit">
      <div class="glow-card impl-2">
        <span class="card-label">02 — Shadow Pulse</span>
      </div>
      <button class="pick-btn">&#10022; Pick This</button>
    </div>

    <!-- Implementation 3 -->
    <div class="card-unit">
      <div class="glow-card impl-3">
        <span class="card-label">03 — Hue-Rotate Pseudo</span>
      </div>
      <button class="pick-btn">&#10022; Pick This</button>
    </div>

    <!-- Implementation 4 -->
    <div class="card-unit">
      <div class="glow-card impl-4">
        <div class="svg-glow-layer"></div>
        <span class="card-label">04 — SVG Filter Shift</span>
      </div>
      <button class="pick-btn">&#10022; Pick This</button>
    </div>

    <!-- Implementation 5 -->
    <div class="card-unit">
      <div class="glow-card impl-5">
        <span class="card-label">05 — Canvas Aurora</span>
      </div>
      <button class="pick-btn">&#10022; Pick This</button>
    </div>

  </div>

  <script>
    // ─────────────────────────────────────────────────
    // IMPL 1 — Conic Gradient Rotating Border
    // Mouse XY drives --mx/--my focal point of the conic
    // ─────────────────────────────────────────────────
    (function() {
      const card = document.querySelector('.glow-card.impl-1');
      const blurLayer = card.querySelector('.conic-blur');

      card.addEventListener('mousemove', (e) => {
        const rect = card.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width  * 100).toFixed(1) + '%';
        const y = ((e.clientY - rect.top)  / rect.height * 100).toFixed(1) + '%';
        card.style.setProperty('--mx', x);
        card.style.setProperty('--my', y);
        if (blurLayer) {
          blurLayer.style.setProperty('--mx', x);
          blurLayer.style.setProperty('--my', y);
        }
      });
    })();


    // ─────────────────────────────────────────────────
    // IMPL 2 — Multi-Layer Box Shadow Rainbow Pulse
    // Mouse X position maps to hue 0–300
    // ─────────────────────────────────────────────────
    (function() {
      const card = document.querySelector('.glow-card.impl-2');

      card.addEventListener('mousemove', (e) => {
        const rect = card.getBoundingClientRect();
        const ratio = (e.clientX - rect.left) / rect.width;
        const hue = Math.round(ratio * 300);
        card.style.setProperty('--hue', hue);
      });
    })();


    // ─────────────────────────────────────────────────
    // IMPL 3 — ::before Pseudo Hue-Rotate Radial
    // Tracks --mx/--my for radial focal point
    // hue-rotate plays on hover, paused otherwise (pure CSS)
    // ─────────────────────────────────────────────────
    (function() {
      const card = document.querySelector('.glow-card.impl-3');

      card.addEventListener('mousemove', (e) => {
        const rect = card.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width  * 100).toFixed(1) + '%';
        const y = ((e.clientY - rect.top)  / rect.height * 100).toFixed(1) + '%';
        card.style.setProperty('--mx', x);
        card.style.setProperty('--my', y);
      });
    })();


    // ─────────────────────────────────────────────────
    // IMPL 4 — SVG feColorMatrix Rainbow Shift
    // rAF lerp loop updates hueRotate values on mousemove
    // Mouse XY maps to target hue (0–360)
    // ─────────────────────────────────────────────────
    (function() {
      const card    = document.querySelector('.glow-card.impl-4');
      const matrix  = document.getElementById('impl4-hue-matrix');

      let currentHue = 0;
      let targetHue  = 0;
      let rafId      = null;
      let hovering   = false;

      function tick() {
        currentHue += (targetHue - currentHue) * 0.08;
        if (matrix) matrix.setAttribute('values', currentHue.toFixed(1));
        if (hovering || Math.abs(targetHue - currentHue) > 0.5) {
          rafId = requestAnimationFrame(tick);
        } else {
          rafId = null;
        }
      }

      card.addEventListener('mousemove', (e) => {
        const rect = card.getBoundingClientRect();
        const rx = (e.clientX - rect.left) / rect.width;
        const ry = (e.clientY - rect.top)  / rect.height;
        targetHue = rx * 200 + ry * 160;  // XY combined → 0–360 range
        if (!rafId) rafId = requestAnimationFrame(tick);
      });

      card.addEventListener('mouseenter', () => { hovering = true; });
      card.addEventListener('mouseleave', () => {
        hovering = false;
        targetHue = 0;
        if (!rafId) rafId = requestAnimationFrame(tick);
      });
    })();


    // ─────────────────────────────────────────────────
    // IMPL 5 — Canvas Aurora Shimmer
    // 6 ambient blobs drifting + bright radial corona
    // rAF loop runs only while hovered
    // ─────────────────────────────────────────────────
    (function() {
      const card   = document.querySelector('.glow-card.impl-5');
      const W      = 420;
      const H      = 120;

      const canvas = document.createElement('canvas');
      canvas.className = 'aurora-canvas';
      canvas.width  = W;
      canvas.height = H;
      card.insertBefore(canvas, card.firstChild);

      const ctx    = canvas.getContext('2d');
      let mouse    = { x: W / 2, y: H / 2 };
      let hovering = false;
      let rafId    = null;
      let t        = 0;

      // 6 ambient blobs
      const blobs = Array.from({ length: 6 }, (_, i) => ({
        x:    (i / 5) * W * 0.9 + W * 0.05,
        y:    H / 2 + Math.sin(i * 1.3) * 22,
        r:    38 + i * 8,
        hue:  i * 55 + 10,
        spx:  (Math.random() - 0.5) * 0.35,
        spy:  (Math.random() - 0.5) * 0.18,
        phase: i * 0.9,
      }));

      function drawFrame() {
        t += 0.012;
        ctx.clearRect(0, 0, W, H);

        // ambient blobs
        blobs.forEach(b => {
          b.x += b.spx + Math.sin(t + b.phase) * 0.3;
          b.y += b.spy + Math.cos(t * 0.7 + b.phase) * 0.2;
          // wrap
          if (b.x < -b.r)  b.x = W + b.r;
          if (b.x > W + b.r) b.x = -b.r;
          if (b.y < -b.r)  b.y = H + b.r;
          if (b.y > H + b.r) b.y = -b.r;

          const g = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
          g.addColorStop(0, `hsla(${b.hue + t * 20 % 360},90%,70%,0.55)`);
          g.addColorStop(1, `hsla(${b.hue + t * 20 % 360},90%,60%,0)`);
          ctx.beginPath();
          ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
          ctx.fillStyle = g;
          ctx.fill();
        });

        // mouse corona
        const cr = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 55);
        cr.addColorStop(0, `hsla(${(t * 60) % 360},100%,90%,0.9)`);
        cr.addColorStop(0.3, `hsla(${(t * 60 + 90) % 360},100%,75%,0.5)`);
        cr.addColorStop(1, 'hsla(0,0%,0%,0)');
        ctx.beginPath();
        ctx.arc(mouse.x, mouse.y, 55, 0, Math.PI * 2);
        ctx.fillStyle = cr;
        ctx.fill();

        if (hovering) rafId = requestAnimationFrame(drawFrame);
        else rafId = null;
      }

      card.addEventListener('mouseenter', (e) => {
        hovering = true;
        const rect = card.getBoundingClientRect();
        mouse.x = e.clientX - rect.left;
        mouse.y = e.clientY - rect.top;
        if (!rafId) rafId = requestAnimationFrame(drawFrame);
      });

      card.addEventListener('mousemove', (e) => {
        const rect = card.getBoundingClientRect();
        mouse.x = e.clientX - rect.left;
        mouse.y = e.clientY - rect.top;
      });

      card.addEventListener('mouseleave', () => {
        hovering = false;
        // let last frame clear itself naturally
      });
    })();

  </script>
</body>
</html>
