<!-- ============================================================
     P1 — Cinematic Opener
     Inner content of <section id="p1"> only.
     The section gets the .cinematic class to override deep-bg with pure black.
     Animation triggers when JS adds .visible to #p1.
     ============================================================ -->
<div class="p1-stage cinematic-stage">

  <div class="p1-lines" aria-hidden="false">
    <p class="p1-eyebrow">VR FINAL LABEL</p>
    <h1 class="p1-hero">we heard you sing.</h1>
    <p class="p1-sub">let&rsquo;s put it on Spotify.</p>
  </div>

  <div class="p1-scroll-hint" aria-hidden="true">
    <span class="p1-scroll-line"></span>
    <span class="p1-scroll-arrow">&darr;</span>
  </div>

</div>

<script>
  /* P1 owns its background. Add the cinematic class to its parent <section>
     so the global deep-bg gets overridden cleanly without editing index.html. */
  (function () {
    var p1 = document.getElementById('p1');
    if (p1 && !p1.classList.contains('cinematic')) {
      p1.classList.add('cinematic');
    }
  })();
</script>

<!-- P1 stylesheet + behavior -->
<link rel="stylesheet" href="css/sections/p1.css">
<script src="js/sections/p1.js"></script>
