<!-- ============================================================
     P2 — Artist Info Form
     Inner content of <section id="p2">.
     On submit, the form silhouette morphs and pins as a hover travel card.
     ============================================================ -->
<div class="p2-stage" id="p2-stage">

  <div class="p2-form-wrap" id="p2-form-wrap">
    <p class="p2-eyebrow">ARTIST INFO</p>
    <h2 class="p2-title">who are you?</h2>
    <p class="p2-sub">we ride with one artist at a time. tell us who&rsquo;s in the booth.</p>

    <form class="p2-form" id="p2-form" autocomplete="on" novalidate>

      <label class="p2-field">
        <span class="p2-label">stage name <em>*</em></span>
        <input type="text" id="p2-stage-name" name="stageName" data-key="stageName" required placeholder="what fans search for" />
      </label>

      <label class="p2-field">
        <span class="p2-label">real name</span>
        <input type="text" id="p2-real-name" name="realName" data-key="realName" placeholder="for the paperwork" />
      </label>

      <label class="p2-field">
        <span class="p2-label">email <em>*</em></span>
        <input type="email" id="p2-email" name="email" data-key="email" required placeholder="you@domain.com" />
      </label>

      <label class="p2-field">
        <span class="p2-label">phone</span>
        <input type="tel" id="p2-phone" name="phone" data-key="phone" placeholder="(optional)" />
      </label>

      <label class="p2-field">
        <span class="p2-label">age</span>
        <input type="number" id="p2-age" name="age" data-key="age" min="13" placeholder="13+" />
      </label>

      <label class="p2-field p2-field-file">
        <span class="p2-label">artist photo</span>
        <input type="file" id="p2-photo" name="photo" data-key="photo" accept="image/*" />
        <span class="p2-file-hint">tap to upload &middot; jpg / png</span>
      </label>

      <label class="p2-field p2-field-wide">
        <span class="p2-label">short bio</span>
        <textarea id="p2-bio" name="bio" data-key="bio" rows="3" maxlength="280" placeholder="one or two lines &mdash; vibe, city, sound"></textarea>
      </label>

      <label class="p2-field">
        <span class="p2-label">instagram</span>
        <input type="text" id="p2-instagram" name="instagram" data-key="instagram" placeholder="@handle or url" />
      </label>

      <label class="p2-field">
        <span class="p2-label">tiktok</span>
        <input type="text" id="p2-tiktok" name="tiktok" data-key="tiktok" placeholder="@handle or url" />
      </label>

      <label class="p2-field p2-field-wide">
        <span class="p2-label">spotify</span>
        <input type="url" id="p2-spotify" name="spotify" data-key="spotify" placeholder="https://open.spotify.com/artist/&hellip;" />
      </label>

      <div class="p2-submit-row">
        <button type="submit" class="p2-submit" id="p2-submit">submit</button>
      </div>

    </form>
  </div>

</div>

<!-- P2 stylesheet + behavior + travel card -->
<link rel="stylesheet" href="css/sections/p2.css">
<script src="js/card.js"></script>
<script src="js/sections/p2.js"></script>
