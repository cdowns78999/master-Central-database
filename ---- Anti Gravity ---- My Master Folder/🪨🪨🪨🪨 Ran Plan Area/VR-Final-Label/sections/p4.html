<!-- =========================================================
     P4 — Cover Theme Picker
     Owner: Agent 4
     Captures: theme, custom-theme, moods (array), instrumentation, reference-tracks
     ========================================================= -->
<link rel="stylesheet" href="css/sections/p4.css">

<div class="p4-wrap">
  <header class="p4-head">
    <p class="p4-eyebrow">STEP 3 / YOUR TAKE</p>
    <h2 class="p4-title">what&rsquo;s your twist?</h2>
    <p class="p4-sub">pick the vibe for your cover. be specific &mdash; this shapes the whole production.</p>
  </header>

  <div class="p4-themes" role="radiogroup" aria-label="cover theme">
    <button type="button" class="p4-tile" data-theme="lo-fi-acoustic" role="radio" aria-checked="false">
      <span class="p4-tile-icon" aria-hidden="true">🎻</span>
      <span class="p4-tile-name">Lo-Fi Acoustic</span>
      <span class="p4-tile-desc">stripped, intimate, room mic warmth</span>
    </button>

    <button type="button" class="p4-tile" data-theme="synthwave" role="radio" aria-checked="false">
      <span class="p4-tile-icon" aria-hidden="true">🌆</span>
      <span class="p4-tile-name">Synthwave</span>
      <span class="p4-tile-desc">80s neon, gated drums, analog pads</span>
    </button>

    <button type="button" class="p4-tile" data-theme="jazz-lounge" role="radio" aria-checked="false">
      <span class="p4-tile-icon" aria-hidden="true">🥃</span>
      <span class="p4-tile-name">Jazz Lounge</span>
      <span class="p4-tile-desc">smoky upright bass, brushed drums, Rhodes</span>
    </button>

    <button type="button" class="p4-tile" data-theme="indie-alt" role="radio" aria-checked="false">
      <span class="p4-tile-icon" aria-hidden="true">🎸</span>
      <span class="p4-tile-name">Indie Alt</span>
      <span class="p4-tile-desc">jangly guitars, tape saturation, halftone vox</span>
    </button>

    <button type="button" class="p4-tile" data-theme="trap-flip" role="radio" aria-checked="false">
      <span class="p4-tile-icon" aria-hidden="true">🥁</span>
      <span class="p4-tile-name">Trap Flip</span>
      <span class="p4-tile-desc">808s, hi-hat rolls, pitched-down hook</span>
    </button>

    <button type="button" class="p4-tile" data-theme="orchestral-cinematic" role="radio" aria-checked="false">
      <span class="p4-tile-icon" aria-hidden="true">🎼</span>
      <span class="p4-tile-name">Orchestral Cinematic</span>
      <span class="p4-tile-desc">strings, swelling brass, film-score weight</span>
    </button>

    <button type="button" class="p4-tile p4-tile-custom" data-theme="custom" role="radio" aria-checked="false">
      <span class="p4-tile-icon" aria-hidden="true">✶</span>
      <span class="p4-tile-name">Custom</span>
      <span class="p4-tile-desc">describe your own direction</span>
    </button>
  </div>

  <div class="p4-custom-wrap" id="p4-custom-wrap">
    <label class="p4-label" for="p4-custom-theme">describe your own theme</label>
    <textarea
      class="p4-input p4-textarea"
      id="p4-custom-theme"
      data-vrfl-key="custom-theme"
      rows="3"
      placeholder="e.g. dub-reggae meets gospel choir, all in 6/8"
    ></textarea>
  </div>

  <div class="p4-block">
    <p class="p4-block-label">mood</p>
    <div class="p4-chips" role="group" aria-label="mood tags">
      <button type="button" class="p4-chip" data-mood="energetic">energetic</button>
      <button type="button" class="p4-chip" data-mood="moody">moody</button>
      <button type="button" class="p4-chip" data-mood="romantic">romantic</button>
      <button type="button" class="p4-chip" data-mood="dark">dark</button>
      <button type="button" class="p4-chip" data-mood="uplifting">uplifting</button>
      <button type="button" class="p4-chip" data-mood="nostalgic">nostalgic</button>
      <button type="button" class="p4-chip" data-mood="haunting">haunting</button>
      <button type="button" class="p4-chip" data-mood="playful">playful</button>
    </div>
  </div>

  <div class="p4-block">
    <label class="p4-label" for="p4-instrumentation">any specific instruments you want featured?</label>
    <textarea
      class="p4-input p4-textarea"
      id="p4-instrumentation"
      data-vrfl-key="instrumentation"
      rows="2"
      placeholder="e.g. nylon-string guitar, mellotron, pedal steel"
    ></textarea>
  </div>

  <div class="p4-block">
    <label class="p4-label" for="p4-reference-tracks">similar-sounding song we should listen to for inspiration</label>
    <input
      class="p4-input"
      type="text"
      id="p4-reference-tracks"
      data-vrfl-key="reference-tracks"
      placeholder="artist &mdash; song title"
    >
  </div>
</div>

<script src="js/sections/p4.js"></script>
