<!-- ============================================================
     P6 — Cover Art Drop
     Big square drag-drop zone. Square-ish image, JPG/PNG.
     3000x3000 recommended, 1400x1400 minimum.
     ============================================================ -->
<div class="p6-stage">

  <header class="p6-head">
    <p class="p6-eyebrow">STEP 5 / COVER ART</p>
    <h2 class="p6-title">drop your cover art.</h2>
    <p class="p6-sub">square image, JPG or PNG, 3000&times;3000 recommended (minimum 1400&times;1400).</p>
  </header>

  <div class="p6-drop" id="p6-drop" tabindex="0" role="button" aria-label="Drop cover art or click to browse">

    <div class="p6-drop-prompt" id="p6-drop-prompt">
      <div class="p6-drop-icon" aria-hidden="true">&#x21A5;</div>
      <div class="p6-drop-headline">drop art here</div>
      <div class="p6-drop-subline">or click to browse</div>
    </div>

    <div class="p6-drop-preview" id="p6-drop-preview" hidden>
      <img class="p6-thumb" id="p6-thumb" alt="cover art preview" />
      <div class="p6-meta" id="p6-meta"></div>
      <div class="p6-warn" id="p6-warn" hidden></div>
      <button type="button" class="p6-replace" id="p6-replace">replace</button>
    </div>

    <input type="file" id="p6-file" accept="image/jpeg,image/png" hidden />
  </div>

</div>

<link rel="stylesheet" href="css/sections/p6.css">
<script src="js/sections/p6.js"></script>
