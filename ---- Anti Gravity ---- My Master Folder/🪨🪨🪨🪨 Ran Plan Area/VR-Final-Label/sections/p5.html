<!-- ============================================================
     P5 — Release Metadata
     Inner content of <section id="p5">.
     2-column form. Captures via captureField('p5', key, value).
     ============================================================ -->
<div class="p5-stage">

  <header class="p5-header">
    <p class="p5-eyebrow">STEP 4 / METADATA</p>
    <h2 class="p5-title">the release details.</h2>
    <p class="p5-sub">stores need this to shelve your song. takes a minute.</p>
  </header>

  <form class="p5-form" id="p5-form" autocomplete="off" novalidate>

    <!-- ---------- Group: identity ---------- -->
    <fieldset class="p5-group">
      <legend class="p5-group-legend">song identity</legend>

      <label class="p5-field p5-field-wide">
        <span class="p5-label">release title</span>
        <input type="text" id="p5-release-title" name="releaseTitle" data-key="release-title" placeholder="defaults to your song pick from step 2" />
      </label>

      <label class="p5-field">
        <span class="p5-label">primary genre</span>
        <span class="p5-select-wrap">
          <select id="p5-primary-genre" name="primaryGenre" data-key="primary-genre">
            <option value="">choose one</option>
            <option value="Pop">Pop</option>
            <option value="Rock">Rock</option>
            <option value="Hip-Hop">Hip-Hop</option>
            <option value="R&amp;B">R&amp;B</option>
            <option value="Electronic">Electronic</option>
            <option value="Indie">Indie</option>
            <option value="Folk">Folk</option>
            <option value="Country">Country</option>
            <option value="Jazz">Jazz</option>
            <option value="Classical">Classical</option>
            <option value="Other">Other</option>
          </select>
        </span>
      </label>

      <label class="p5-field">
        <span class="p5-label">secondary genre <em>optional</em></span>
        <span class="p5-select-wrap">
          <select id="p5-secondary-genre" name="secondaryGenre" data-key="secondary-genre">
            <option value="None">None</option>
            <option value="Pop">Pop</option>
            <option value="Rock">Rock</option>
            <option value="Hip-Hop">Hip-Hop</option>
            <option value="R&amp;B">R&amp;B</option>
            <option value="Electronic">Electronic</option>
            <option value="Indie">Indie</option>
            <option value="Folk">Folk</option>
            <option value="Country">Country</option>
            <option value="Jazz">Jazz</option>
            <option value="Classical">Classical</option>
            <option value="Other">Other</option>
          </select>
        </span>
      </label>

      <label class="p5-field">
        <span class="p5-label">language</span>
        <span class="p5-select-wrap">
          <select id="p5-language" name="language" data-key="language">
            <option value="English">English</option>
            <option value="Spanish">Spanish</option>
            <option value="French">French</option>
            <option value="German">German</option>
            <option value="Japanese">Japanese</option>
            <option value="Korean">Korean</option>
            <option value="Portuguese">Portuguese</option>
            <option value="Other">Other</option>
          </select>
        </span>
      </label>

      <div class="p5-field">
        <span class="p5-label">explicit</span>
        <div class="p5-radio-pill" role="radiogroup" aria-label="Explicit">
          <label class="p5-radio">
            <input type="radio" name="explicit" value="No" data-key="explicit" checked />
            <span>No</span>
          </label>
          <label class="p5-radio">
            <input type="radio" name="explicit" value="Yes" data-key="explicit" />
            <span>Yes</span>
          </label>
        </div>
      </div>
    </fieldset>

    <!-- ---------- Group: credits ---------- -->
    <fieldset class="p5-group">
      <legend class="p5-group-legend">credits</legend>

      <label class="p5-field p5-field-wide">
        <span class="p5-label">original songwriter credit(s)</span>
        <input type="text" id="p5-songwriter" name="songwriterCredits" data-key="songwriter-credits" placeholder="who wrote the original (comma-separated)" />
      </label>

      <label class="p5-field">
        <span class="p5-label">producer credit</span>
        <input type="text" id="p5-producer" name="producerCredits" data-key="producer-credits" placeholder="usually: VR Final Label" />
      </label>

      <label class="p5-field">
        <span class="p5-label">label name</span>
        <input type="text" id="p5-label-name" name="labelName" data-key="label-name" value="VR Final Label" />
      </label>
    </fieldset>

    <!-- ---------- Group: release ---------- -->
    <fieldset class="p5-group">
      <legend class="p5-group-legend">release window</legend>

      <label class="p5-field">
        <span class="p5-label">release date</span>
        <input type="date" id="p5-release-date" name="releaseDate" data-key="release-date" />
        <span class="p5-field-hint">earliest = 3 weeks from today (store lead time)</span>
      </label>

      <label class="p5-field p5-field-check">
        <input type="checkbox" id="p5-presave" name="presaveEnabled" data-key="presave-enabled" checked />
        <span class="p5-label-check">
          <strong>open up a pre-save window</strong>
          <em>recommended &mdash; lets fans pre-add before drop day</em>
        </span>
      </label>
    </fieldset>

  </form>

</div>

<link rel="stylesheet" href="css/sections/p5.css">
