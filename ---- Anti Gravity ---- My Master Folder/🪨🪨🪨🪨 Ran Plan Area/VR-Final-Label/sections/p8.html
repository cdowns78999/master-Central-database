<!-- ============================================================
     P8 — GO Button (stubbed extension + email)
     Cinematic full-viewport climax. Big warm-orange GO button.
     Bundles everything from window.__VRFL into a JSON preview.
     ============================================================ -->
<div class="p8-stage">

  <header class="p8-head">
    <p class="p8-eyebrow">STEP 7 / SEND IT</p>
    <h2 class="p8-title">ready?</h2>
    <p class="p8-sub">this sends your song to Spotify, Apple Music, and every other major store.</p>
  </header>

  <div class="p8-cta-wrap">
    <button type="button" class="p8-go" id="p8-go">SEND IT OFF TO STORES + DSPs</button>
    <button type="button" class="p8-preview-link" id="p8-preview-link">preview what&rsquo;s being sent</button>
  </div>

</div>

<!-- Modal overlay -->
<div class="p8-modal" id="p8-modal" hidden role="dialog" aria-modal="true" aria-labelledby="p8-modal-title">
  <div class="p8-modal-card">

    <header class="p8-modal-head">
      <h3 id="p8-modal-title">BUNDLE PREVIEW</h3>
      <p class="p8-modal-sub">this is what the Chrome extension will receive. (ext not wired yet in this build)</p>
      <button type="button" class="p8-modal-close" id="p8-modal-close" aria-label="close">&times;</button>
    </header>

    <section class="p8-modal-section">
      <h4 class="p8-modal-h4">bundle JSON</h4>
      <pre class="p8-bundle" id="p8-bundle"></pre>
    </section>

    <section class="p8-modal-section">
      <h4 class="p8-modal-h4">email stub</h4>
      <div class="p8-email" id="p8-email">
        <div class="p8-email-line"><span class="p8-email-key">to:</span> <span id="p8-email-to">&mdash;</span></div>
        <div class="p8-email-line"><span class="p8-email-key">subject:</span> <span id="p8-email-subject"></span></div>
        <div class="p8-email-body" id="p8-email-body"></div>
      </div>
    </section>

    <footer class="p8-modal-foot">
      <button type="button" class="p8-modal-done" id="p8-modal-done">close &amp; continue</button>
    </footer>

  </div>
</div>

<link rel="stylesheet" href="css/sections/p8.css">
<script src="js/sections/p8.js"></script>
