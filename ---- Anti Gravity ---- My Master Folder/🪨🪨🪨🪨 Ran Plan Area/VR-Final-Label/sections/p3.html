<!-- =========================================================
     P3 — Song Pick
     Owner: Agent 4
     Captures: original-artist, song-title, release-year, youtube-link, notes
     ========================================================= -->
<link rel="stylesheet" href="css/sections/p3.css">

<div class="p3-wrap">
  <header class="p3-head">
    <p class="p3-eyebrow">STEP 2 / PICK YOUR SONG</p>
    <h2 class="p3-title">which song are you covering?</h2>
  </header>

  <form class="p3-form" autocomplete="off" novalidate>
    <div class="p3-field">
      <label class="p3-label" for="p3-original-artist">Original artist <span class="p3-req">*</span></label>
      <input
        class="p3-input"
        type="text"
        id="p3-original-artist"
        name="original-artist"
        data-vrfl-key="original-artist"
        required
        placeholder="e.g. Fleetwood Mac"
      >
    </div>

    <div class="p3-field">
      <label class="p3-label" for="p3-song-title">Song title <span class="p3-req">*</span></label>
      <input
        class="p3-input"
        type="text"
        id="p3-song-title"
        name="song-title"
        data-vrfl-key="song-title"
        required
        placeholder="e.g. Dreams"
      >
    </div>

    <div class="p3-row">
      <div class="p3-field p3-field-half">
        <label class="p3-label" for="p3-release-year">Year released</label>
        <input
          class="p3-input"
          type="number"
          id="p3-release-year"
          name="release-year"
          data-vrfl-key="release-year"
          min="1900"
          max="2026"
          step="1"
          placeholder="1977"
        >
      </div>

      <div class="p3-field p3-field-half">
        <label class="p3-label" for="p3-youtube-link">YouTube link <span class="p3-opt">(optional)</span></label>
        <input
          class="p3-input"
          type="url"
          id="p3-youtube-link"
          name="youtube-link"
          data-vrfl-key="youtube-link"
          placeholder="https://youtube.com/watch?v=..."
        >
      </div>
    </div>

    <div class="p3-field">
      <label class="p3-label" for="p3-notes">anything we should know about your take? <span class="p3-opt">(optional)</span></label>
      <textarea
        class="p3-input p3-textarea"
        id="p3-notes"
        name="notes"
        data-vrfl-key="notes"
        rows="3"
        placeholder="key change, half-time feel, sung in a different key, etc."
      ></textarea>
    </div>

    <p class="p3-hint">scroll to continue &darr;</p>
  </form>
</div>

<script src="js/sections/p3.js"></script>
