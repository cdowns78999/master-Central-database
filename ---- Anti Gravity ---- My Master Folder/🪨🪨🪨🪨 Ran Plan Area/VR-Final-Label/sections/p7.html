<!-- ============================================================
     P7 — WAV Drop
     Wide drag-drop zone. WAV only. 44.1kHz+. No compression.
     ============================================================ -->
<div class="p7-stage">

  <header class="p7-head">
    <p class="p7-eyebrow">STEP 6 / AUDIO FILE</p>
    <h2 class="p7-title">drop the final WAV.</h2>
    <p class="p7-sub">WAV file only. 44.1kHz or higher. no compression &mdash; we master it.</p>
  </header>

  <div class="p7-drop" id="p7-drop" tabindex="0" role="button" aria-label="Drop WAV or click to browse">

    <div class="p7-drop-prompt" id="p7-drop-prompt">
      <div class="p7-drop-icon" aria-hidden="true">&#9836;</div>
      <div class="p7-drop-headline">drop WAV here</div>
      <div class="p7-drop-subline">or click to browse</div>
    </div>

    <div class="p7-drop-loaded" id="p7-drop-loaded" hidden>
      <div class="p7-meta" id="p7-meta"></div>

      <div class="p7-wave" id="p7-wave" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
      </div>

      <button type="button" class="p7-replace" id="p7-replace">replace</button>
    </div>

    <div class="p7-error" id="p7-error" hidden></div>

    <input type="file" id="p7-file" accept="audio/wav,.wav" hidden />
  </div>

</div>

<link rel="stylesheet" href="css/sections/p7.css">
<script src="js/sections/p7.js"></script>
