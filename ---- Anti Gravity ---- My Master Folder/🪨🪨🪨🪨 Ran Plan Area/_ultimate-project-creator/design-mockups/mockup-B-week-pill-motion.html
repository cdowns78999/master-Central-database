<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Mockup B — Week-Pill Motion</title>
<!--
  Purpose: R&D mockup for the dashboard-top week-pill carousel.
  Key decisions:
   - Horizontal scroll-snap, 250ms ease-in-out transitions only.
   - Active pill inverted (white bg, black text) — no bounce.
   - Arrow buttons scroll by exactly one pill; disabled at ends.
   - "Simulate +7 days" demonstrates atomic-clock logic purely client-side.
-->
<style>
  :root {
    --bg: #000;
    --fg: #fff;
    --mute: #8b8b8b;
    --line: #2a2a2a;
    --ink: #111;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; background: var(--bg); color: var(--fg);
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    -webkit-font-smoothing: antialiased;
  }
  body { padding: 28px 20px 60px; }
  h1 {
    font-size: 15px; font-weight: 600; letter-spacing: 0.14em;
    text-transform: uppercase; margin: 0 0 6px;
  }
  .sub {
    color: var(--mute); font-size: 12px; margin-bottom: 28px;
    letter-spacing: 0.08em;
  }
  .wrap { max-width: 1100px; margin: 0 auto; }

  .strip-row {
    display: flex; align-items: center; gap: 12px;
    border: 1px solid var(--line); padding: 12px;
    border-radius: 2px; background: #070707;
  }

  .arrow {
    flex: 0 0 36px; height: 40px;
    border: 1px solid var(--line); background: transparent;
    color: var(--fg); cursor: pointer; font-size: 18px;
    transition: all 250ms ease-in-out;
  }
  .arrow:hover:not(:disabled) { background: var(--fg); color: var(--ink); }
  .arrow:disabled { opacity: 0.3; cursor: not-allowed; }

  .strip {
    flex: 1 1 auto;
    display: flex; gap: 10px;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    scroll-behavior: smooth;
    padding: 4px 2px;
    scrollbar-width: none;
  }
  .strip::-webkit-scrollbar { display: none; }

  .pill {
    flex: 0 0 auto;
    scroll-snap-align: center;
    padding: 10px 22px;
    border: 1px solid var(--line);
    font-size: 12px; letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--mute);
    cursor: pointer;
    white-space: nowrap;
    transition: all 250ms ease-in-out;
    background: transparent;
  }
  .pill:hover { color: var(--fg); border-color: #555; }
  .pill.active {
    background: var(--fg); color: var(--ink);
    border-color: var(--fg); font-weight: 600;
  }
  .pill.fresh {
    animation: fresh 600ms ease-in-out;
  }
  @keyframes fresh {
    0%   { opacity: 0; transform: translateX(20px); }
    100% { opacity: 1; transform: translateX(0); }
  }

  .control-row {
    margin-top: 22px; display: flex; gap: 10px; align-items: center;
    flex-wrap: wrap;
  }
  .sim-btn {
    padding: 10px 18px;
    border: 1px solid var(--fg); background: transparent;
    color: var(--fg); font-size: 11px; letter-spacing: 0.14em;
    text-transform: uppercase; cursor: pointer;
    font-family: inherit;
    transition: all 250ms ease-in-out;
  }
  .sim-btn:hover { background: var(--fg); color: var(--ink); }

  .clock {
    font-size: 11px; color: var(--mute); letter-spacing: 0.1em;
  }
  .clock b { color: var(--fg); }

  .board {
    margin-top: 34px;
    border: 1px solid var(--line); padding: 20px;
    min-height: 120px;
  }
  .board .lbl {
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--mute); margin-bottom: 12px;
  }
  .board .head {
    font-size: 22px; margin-bottom: 14px; letter-spacing: -0.01em;
  }
  .board .row {
    display: flex; gap: 18px; flex-wrap: wrap;
    font-size: 12px; color: #cfcfcf;
  }
  .board .row span b { color: var(--fg); }
</style>
</head>
<body>
  <div class="wrap">
    <h1>Mockup B — Week-Pill Motion</h1>
    <div class="sub">Project dashboard · horizontal pill strip · atomic-clock simulator</div>

    <div class="strip-row">
      <button class="arrow" id="prev" aria-label="prev">&lsaquo;</button>
      <div class="strip" id="strip">
        <button class="pill" data-ts="2026-04-09">Week of 4/9</button>
        <button class="pill" data-ts="2026-04-16">Week of 4/16</button>
        <button class="pill active" data-ts="2026-04-23">Week of 4/23</button>
        <button class="pill" data-ts="2026-04-30">Week of 4/30</button>
        <button class="pill" data-ts="2026-05-07">Week of 5/7</button>
      </div>
      <button class="arrow" id="next" aria-label="next">&rsaquo;</button>
    </div>

    <div class="control-row">
      <button class="sim-btn" id="sim">Simulate +7 days</button>
      <span class="clock">Atomic clock: <b id="clock">2026-04-23</b></span>
    </div>

    <div class="board">
      <div class="lbl">focused week</div>
      <div class="head" id="focusedHead">Week of 4/23</div>
      <div class="row">
        <span>Project: <b>scout troop app</b></span>
        <span>Phase: <b>3/5</b></span>
        <span>% chance: <b>68%</b></span>
        <span>Open leave-app: <b>3</b></span>
      </div>
    </div>
  </div>

<script>
  const strip = document.getElementById('strip');
  const prev  = document.getElementById('prev');
  const next  = document.getElementById('next');
  const sim   = document.getElementById('sim');
  const clock = document.getElementById('clock');
  const head  = document.getElementById('focusedHead');

  let atomic = new Date('2026-04-23T00:00:00');

  function fmtMD(d) {
    return (d.getMonth() + 1) + '/' + d.getDate();
  }
  function fmtISO(d) {
    return d.toISOString().slice(0, 10);
  }

  function pills() { return [...strip.querySelectorAll('.pill')]; }

  function setActive(pill) {
    pills().forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    head.textContent = pill.textContent.trim();
    pill.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    updateArrows();
  }

  function activeIndex() {
    return pills().findIndex(p => p.classList.contains('active'));
  }
  function updateArrows() {
    const i = activeIndex();
    prev.disabled = i <= 0;
    next.disabled = i >= pills().length - 1;
  }

  strip.addEventListener('click', (e) => {
    const p = e.target.closest('.pill');
    if (p) setActive(p);
  });

  prev.addEventListener('click', () => {
    const i = activeIndex();
    if (i > 0) setActive(pills()[i - 1]);
  });
  next.addEventListener('click', () => {
    const i = activeIndex();
    if (i < pills().length - 1) setActive(pills()[i + 1]);
  });

  sim.addEventListener('click', () => {
    atomic = new Date(atomic.getTime() + 7 * 24 * 60 * 60 * 1000);
    clock.textContent = fmtISO(atomic);

    const exists = pills().some(p => p.dataset.ts === fmtISO(atomic));
    if (!exists) {
      const btn = document.createElement('button');
      btn.className = 'pill fresh';
      btn.dataset.ts = fmtISO(atomic);
      btn.textContent = 'Week of ' + fmtMD(atomic);
      strip.appendChild(btn);
    }
    const target = pills().find(p => p.dataset.ts === fmtISO(atomic));
    setActive(target);
  });

  updateArrows();
</script>
</body>
</html>
