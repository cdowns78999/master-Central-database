<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sample Pack Template</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Theme slider (top-right dots) -->
  <div id="theme-slider" aria-label="Theme switcher">
    <div class="theme-dot active" data-theme="midnight" title="Midnight"></div>
    <div class="theme-dot" data-theme="graphite" title="Graphite"></div>
    <div class="theme-dot" data-theme="plum" title="Plum"></div>
    <div class="theme-dot" data-theme="forest" title="Forest"></div>
  </div>

  <!-- Fixed left sidebar (populated by app.js) -->
  <nav id="sidebar" aria-label="Category navigation">
    <div class="sidebar-logo">SP</div>
    <!-- nav items injected here -->
    <span id="nav-pill" aria-hidden="true"></span>
  </nav>

  <!-- Fixed top bar -->
  <header id="topbar">
    <span class="topbar-title">Sample Pack</span>
    <span class="topbar-active" id="topbar-active">—</span>
  </header>

  <!-- Main content area (swapped in place) -->
  <main id="main">
    <section class="content-swap" id="content-swap">
      <!-- rendered by app.js -->
    </section>
  </main>

  <!-- Floating action button slot -->
  <button id="fab" aria-label="Primary action" title="Action">
    <span class="fab-icon">+</span>
  </button>

  <script src="app.js"></script>
</body>
</html>
