# VR Bridge — Netlify config
# Netlify only hosts the static HTML shell. The Express server (server.js) and
# the invite bot (invite-bot.js) run LOCALLY on Chad's machine, never on Netlify.
# The deployed page points at http://localhost:3000 for /realtime-token + /tts.

[build]
  publish = "."
  command = "echo 'static site — no build step'"
  ignore = "/bin/sh -c 'exit 0'"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
