<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Label Generator — Ahead Artist Solutions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ── Design Tokens ── */
        :root {
            --bg: #0a0a0a;
            --bg-elevated: #141414;
            --bg-float: #1a1a1a;
            --bg-hover: #222;
            --border: rgba(255,255,255,0.06);
            --border-hover: rgba(30,215,96,0.25);
            --text: #e8e8e8;
            --text-dim: rgba(255,255,255,0.45);
            --text-ghost: rgba(255,255,255,0.25);
            --spotify: #1ed760;
            --spotify-dim: rgba(30,215,96,0.15);
            --amber: #f59e0b;
            --amber-dim: rgba(245,158,11,0.15);
            --red: #ef4444;
            --red-dim: rgba(239,68,68,0.12);
            --blue: #3b82f6;
            --blue-dim: rgba(59,130,246,0.12);
            --purple: #a855f7;
            --purple-light: #c084fc;
            --purple-dim: rgba(168,85,247,0.12);
            --orange: #fb923c;
            --radius-card: 16px;
            --radius-pill: 999px;
            --transition-smooth: cubic-bezier(.4,0,.2,1);
        }

        /* ── Reset ── */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ── Utility ── */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* ── Hero ── */
        .hero {
            padding: 72px 0 40px;
            text-align: center;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--purple-dim);
            border: 1px solid rgba(168,85,247,0.2);
            color: var(--purple);
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            padding: 6px 16px;
            border-radius: var(--radius-pill);
            margin-bottom: 20px;
        }

        .hero-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--purple);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--purple);
        }

        .hero h1 {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(2.4rem, 5vw, 3.6rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.1;
            color: var(--text);
        }

        .hero h1 .accent {
            background: linear-gradient(135deg, var(--purple), var(--purple-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-sub {
            font-size: 15px;
            color: var(--text-dim);
            margin-top: 12px;
            font-weight: 400;
        }

        /* ── Toggle Slider ── */
        .toggle-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            padding: 24px 0 36px;
        }

        .toggle-label {
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dim);
            transition: color 0.25s ease;
            cursor: pointer;
            user-select: none;
        }

        .toggle-label.active {
            color: var(--text);
        }

        .toggle-track {
            position: relative;
            width: 51px;
            height: 31px;
            background: var(--bg-float);
            border: 1px solid var(--border);
            border-radius: 999px;
            cursor: pointer;
            transition: background 0.3s var(--transition-smooth), border-color 0.3s var(--transition-smooth);
        }

        .toggle-track:hover {
            border-color: var(--border-hover);
        }

        .toggle-track.on {
            background: var(--purple-dim);
            border-color: rgba(168,85,247,0.3);
        }

        .toggle-thumb {
            position: absolute;
            top: 3px;
            left: 3px;
            width: 23px;
            height: 23px;
            background: var(--text);
            border-radius: 50%;
            transition: transform 0.3s cubic-bezier(.68,-.55,.27,1.55);
            box-shadow: 0 1px 4px rgba(0,0,0,0.4);
        }

        .toggle-track.on .toggle-thumb {
            transform: translateX(20px);
            background: var(--purple);
        }

        /* ── Views ── */
        .view-container {
            position: relative;
            min-height: 400px;
        }

        .view {
            transition: opacity 0.25s ease;
        }

        .view.hidden {
            display: none;
            opacity: 0;
        }

        .view.visible {
            display: block;
            opacity: 1;
        }

        /* ── Search View ── */
        .search-bar-wrap {
            position: relative;
            max-width: 560px;
            margin: 0 auto 36px;
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: var(--text-ghost);
            pointer-events: none;
        }

        .search-bar {
            width: 100%;
            padding: 14px 18px 14px 48px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 500;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .search-bar::placeholder {
            color: var(--text-ghost);
        }

        .search-bar:focus {
            border-color: rgba(168,85,247,0.4);
            box-shadow: 0 0 0 3px rgba(168,85,247,0.08);
        }

        .search-suggestions {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            right: 0;
            background: var(--bg-float);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            z-index: 100;
            display: none;
            box-shadow: 0 12px 40px rgba(0,0,0,0.5);
        }

        .search-suggestions.open {
            display: block;
        }

        .suggestion-item {
            padding: 12px 18px;
            font-size: 14px;
            color: var(--text-dim);
            cursor: pointer;
            transition: background 0.15s ease, color 0.15s ease;
            border-bottom: 1px solid var(--border);
        }

        .suggestion-item:last-child {
            border-bottom: none;
        }

        .suggestion-item:hover,
        .suggestion-item.active {
            background: var(--bg-hover);
            color: var(--text);
        }

        .suggestion-item .match {
            color: var(--purple);
            font-weight: 600;
        }

        /* ── Label Cards Grid ── */
        .label-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding-bottom: 48px;
        }

        .label-card {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-card);
            padding: 24px;
            transition: transform 0.25s var(--transition-smooth), border-color 0.25s ease, box-shadow 0.25s ease;
            cursor: default;
        }

        .label-card:hover {
            transform: translateY(-4px);
            border-color: var(--border-hover);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .card-name {
            font-family: 'Outfit', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.01em;
        }

        .card-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
            margin-top: 7px;
        }

        .card-status.active {
            background: var(--spotify);
            box-shadow: 0 0 8px rgba(30,215,96,0.5);
        }

        .card-status.inactive {
            background: var(--red);
            box-shadow: 0 0 8px rgba(239,68,68,0.4);
        }

        .card-status.pending {
            background: var(--amber);
            box-shadow: 0 0 8px rgba(245,158,11,0.4);
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 16px;
        }

        .card-tag {
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: var(--radius-pill);
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .card-tag.genre {
            background: var(--purple-dim);
            color: var(--purple);
        }

        .card-tag.sub {
            background: var(--blue-dim);
            color: var(--blue);
        }

        .card-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .stat {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .stat-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-ghost);
        }

        .stat-value {
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-dim);
        }

        .empty-state {
            text-align: center;
            padding: 80px 24px;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .empty-title {
            font-family: 'Outfit', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .empty-sub {
            font-size: 14px;
            color: var(--text-ghost);
        }

        /* ── Bracket View ── */
        .bracket-filters {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 32px;
        }

        .gen-pill {
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 600;
            padding: 8px 20px;
            border-radius: var(--radius-pill);
            border: 1px solid var(--border);
            background: var(--bg-elevated);
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .gen-pill:hover {
            border-color: var(--border-hover);
            color: var(--text);
        }

        .gen-pill.active {
            background: var(--purple-dim);
            border-color: rgba(168,85,247,0.3);
            color: var(--purple);
        }

        .bracket-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 32px;
            padding-bottom: 48px;
        }

        .bracket-column {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .bracket-header {
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 10px 16px;
            border-radius: 10px;
            text-align: center;
            position: relative;
        }

        .bracket-header.edm { background: var(--purple-dim); color: var(--purple); }
        .bracket-header.hiphop { background: var(--amber-dim); color: var(--amber); }
        .bracket-header.pop { background: var(--spotify-dim); color: var(--spotify); }
        .bracket-header.rock { background: var(--red-dim); color: var(--red); }
        .bracket-header.rnb { background: var(--blue-dim); color: var(--blue); }
        .bracket-header.latin { background: rgba(245,158,11,0.1); color: var(--orange); }

        .bracket-nodes {
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            padding-left: 20px;
        }

        .bracket-nodes::before {
            content: '';
            position: absolute;
            left: 6px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--border);
            border-radius: 1px;
        }

        .bracket-node {
            position: relative;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: auto auto;
            gap: 6px 12px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .bracket-node::before {
            content: '';
            position: absolute;
            left: -20px;
            top: 50%;
            width: 14px;
            height: 2px;
            background: var(--border);
        }

        .bracket-node:hover {
            border-color: var(--border-hover);
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
        }

        .node-name {
            grid-column: 1 / -1;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.01em;
        }

        .node-stat {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .node-stat-label {
            font-size: 9px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: var(--text-ghost);
        }

        .node-stat-value {
            font-family: 'Outfit', sans-serif;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dim);
        }

        .bracket-empty {
            padding: 32px 16px;
            text-align: center;
            color: var(--text-ghost);
            font-size: 13px;
            font-style: italic;
        }

        /* ── Footer ── */
        .site-footer {
            border-top: 1px solid var(--border);
            padding: 32px 0;
            text-align: center;
            margin-top: 40px;
        }

        .footer-text {
            font-size: 13px;
            color: var(--text-ghost);
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .footer-text .footer-dot {
            display: inline-block;
            margin: 0 8px;
            opacity: 0.4;
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .hero { padding: 48px 0 28px; }

            .label-grid {
                grid-template-columns: 1fr;
                gap: 14px;
            }

            .search-bar-wrap {
                max-width: 100%;
            }

            .bracket-container {
                grid-template-columns: 1fr;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }

            .bracket-filters {
                flex-wrap: wrap;
                gap: 6px;
            }

            .toggle-wrap {
                gap: 10px;
            }
        }

        @media (min-width: 769px) and (max-width: 1024px) {
            .label-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .bracket-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.14); }
    </style>
</head>
<body>

    <!-- Hero -->
    <section class="hero">
        <div class="container">
            <div class="hero-badge">Label Generator</div>
            <h1>Find Your <span class="accent">Label</span></h1>
            <p class="hero-sub">Search, discover, and explore the label landscape</p>
        </div>
    </section>

    <!-- Toggle -->
    <div class="toggle-wrap">
        <span class="toggle-label active" id="toggleSearch" onclick="setView(false)">Search</span>
        <div class="toggle-track" id="toggleTrack" onclick="toggleView()">
            <div class="toggle-thumb"></div>
        </div>
        <span class="toggle-label" id="toggleBracket" onclick="setView(true)">Bracket</span>
    </div>

    <!-- Content -->
    <div class="container">
        <div class="view-container">

            <!-- Search View -->
            <div class="view visible" id="searchView">
                <div class="search-bar-wrap">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                    <input
                        type="text"
                        class="search-bar"
                        id="searchInput"
                        placeholder="Search labels by name, genre, or tag..."
                        autocomplete="off"
                    >
                    <div class="search-suggestions" id="suggestions"></div>
                </div>

                <div class="label-grid" id="labelGrid">
                    <!-- Cards rendered by JS -->
                </div>
            </div>

            <!-- Bracket View -->
            <div class="view hidden" id="bracketView">
                <div class="bracket-filters">
                    <button class="gen-pill active" data-filter="default">Default</button>
                    <button class="gen-pill" data-filter="mood">Mood</button>
                    <button class="gen-pill" data-filter="lifestyle">Lifestyle</button>
                </div>

                <div class="bracket-container" id="bracketContainer">
                    <!-- Brackets rendered by JS -->
                </div>
            </div>

        </div>
    </div>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="container">
            <p class="footer-text">Label Generator <span class="footer-dot">&middot;</span> Ahead Artist Solutions</p>
        </div>
    </footer>

    <script>
    // ── Data ──
    // Chad adds labels later
    const LABELS = [];

    // Label object shape reference:
    // { name: '', genre: '', subGenre: '', status: 'active', founded: '', roster: 0, country: '', tags: [] }

    const GENRE_BRACKETS = ['EDM', 'Hip-Hop', 'Pop', 'Rock', 'R&B', 'Latin'];
    const GENRE_CLASSES = {
        'EDM': 'edm',
        'Hip-Hop': 'hiphop',
        'Pop': 'pop',
        'Rock': 'rock',
        'R&B': 'rnb',
        'Latin': 'latin'
    };

    // ── State ──
    let isBracketView = localStorage.getItem('labelgen-view') === 'bracket';
    let searchQuery = '';

    // ── DOM ──
    const searchView = document.getElementById('searchView');
    const bracketView = document.getElementById('bracketView');
    const toggleTrack = document.getElementById('toggleTrack');
    const toggleSearchLabel = document.getElementById('toggleSearch');
    const toggleBracketLabel = document.getElementById('toggleBracket');
    const searchInput = document.getElementById('searchInput');
    const suggestionsEl = document.getElementById('suggestions');
    const labelGrid = document.getElementById('labelGrid');
    const bracketContainer = document.getElementById('bracketContainer');

    // ── Toggle ──
    function toggleView() {
        isBracketView = !isBracketView;
        applyView();
    }

    function setView(bracket) {
        isBracketView = bracket;
        applyView();
    }

    function applyView() {
        localStorage.setItem('labelgen-view', isBracketView ? 'bracket' : 'search');

        toggleTrack.classList.toggle('on', isBracketView);
        toggleSearchLabel.classList.toggle('active', !isBracketView);
        toggleBracketLabel.classList.toggle('active', isBracketView);

        if (isBracketView) {
            searchView.classList.remove('visible');
            searchView.classList.add('hidden');
            bracketView.classList.remove('hidden');
            bracketView.classList.add('visible');
        } else {
            bracketView.classList.remove('visible');
            bracketView.classList.add('hidden');
            searchView.classList.remove('hidden');
            searchView.classList.add('visible');
        }
    }

    // ── Search ──
    function filterLabels(q) {
        if (!q) return LABELS;
        const lower = q.toLowerCase();
        return LABELS.filter(l =>
            l.name.toLowerCase().includes(lower) ||
            l.genre.toLowerCase().includes(lower) ||
            l.subGenre.toLowerCase().includes(lower) ||
            l.tags.some(t => t.toLowerCase().includes(lower)) ||
            l.country.toLowerCase().includes(lower)
        );
    }

    function renderSuggestions(q) {
        if (!q || LABELS.length === 0) {
            suggestionsEl.classList.remove('open');
            return;
        }

        const matches = filterLabels(q).slice(0, 6);
        if (matches.length === 0) {
            suggestionsEl.classList.remove('open');
            return;
        }

        const lower = q.toLowerCase();
        suggestionsEl.innerHTML = matches.map(l => {
            const idx = l.name.toLowerCase().indexOf(lower);
            let display = l.name;
            if (idx > -1) {
                display = l.name.slice(0, idx) +
                    `<span class="match">${l.name.slice(idx, idx + q.length)}</span>` +
                    l.name.slice(idx + q.length);
            }
            return `<div class="suggestion-item" data-name="${l.name}">${display} <span style="color:var(--text-ghost);font-size:12px;margin-left:6px">${l.genre}</span></div>`;
        }).join('');

        suggestionsEl.classList.add('open');

        suggestionsEl.querySelectorAll('.suggestion-item').forEach(item => {
            item.addEventListener('click', () => {
                searchInput.value = item.dataset.name;
                searchQuery = item.dataset.name;
                suggestionsEl.classList.remove('open');
                renderCards(filterLabels(searchQuery));
            });
        });
    }

    searchInput.addEventListener('input', (e) => {
        searchQuery = e.target.value.trim();
        renderSuggestions(searchQuery);
        renderCards(filterLabels(searchQuery));
    });

    searchInput.addEventListener('focus', () => {
        if (searchQuery) renderSuggestions(searchQuery);
    });

    document.addEventListener('click', (e) => {
        if (!e.target.closest('.search-bar-wrap')) {
            suggestionsEl.classList.remove('open');
        }
    });

    // ── Card Rendering ──
    function statusClass(s) {
        if (s === 'active') return 'active';
        if (s === 'inactive') return 'inactive';
        return 'pending';
    }

    function renderCards(labels) {
        if (labels.length === 0) {
            labelGrid.innerHTML = `
                <div class="empty-state" style="grid-column:1/-1;">
                    <div class="empty-icon">&#9835;</div>
                    <div class="empty-title">${LABELS.length === 0 ? 'No labels added yet' : 'No results found'}</div>
                    <div class="empty-sub">${LABELS.length === 0 ? 'Labels will appear here once data is added' : 'Try a different search term'}</div>
                </div>
            `;
            return;
        }

        labelGrid.innerHTML = labels.map(l => `
            <div class="label-card">
                <div class="card-header">
                    <div class="card-name">${l.name}</div>
                    <div class="card-status ${statusClass(l.status)}" title="${l.status}"></div>
                </div>
                <div class="card-tags">
                    <span class="card-tag genre">${l.genre}</span>
                    ${l.subGenre ? `<span class="card-tag sub">${l.subGenre}</span>` : ''}
                    ${l.tags.slice(0, 2).map(t => `<span class="card-tag sub">${t}</span>`).join('')}
                </div>
                <div class="card-stats">
                    <div class="stat">
                        <span class="stat-label">Roster</span>
                        <span class="stat-value">${l.roster > 0 ? l.roster : '—'}</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Founded</span>
                        <span class="stat-value">${l.founded || '—'}</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Country</span>
                        <span class="stat-value">${l.country || '—'}</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Status</span>
                        <span class="stat-value" style="text-transform:capitalize">${l.status}</span>
                    </div>
                </div>
            </div>
        `).join('');
    }

    // ── Bracket Rendering ──
    function renderBrackets() {
        bracketContainer.innerHTML = GENRE_BRACKETS.map(genre => {
            const cls = GENRE_CLASSES[genre];
            const labels = LABELS.filter(l => l.genre === genre);

            const nodesHtml = labels.length > 0
                ? labels.map(l => `
                    <div class="bracket-node">
                        <div class="node-name">${l.name}</div>
                        <div class="node-stat">
                            <span class="node-stat-label">Roster</span>
                            <span class="node-stat-value">${l.roster > 0 ? l.roster : '—'}</span>
                        </div>
                        <div class="node-stat">
                            <span class="node-stat-label">Founded</span>
                            <span class="node-stat-value">${l.founded || '—'}</span>
                        </div>
                        <div class="node-stat">
                            <span class="node-stat-label">Country</span>
                            <span class="node-stat-value">${l.country || '—'}</span>
                        </div>
                    </div>
                `).join('')
                : `<div class="bracket-empty">No labels yet</div>`;

            return `
                <div class="bracket-column">
                    <div class="bracket-header ${cls}">${genre}</div>
                    <div class="bracket-nodes">
                        ${nodesHtml}
                    </div>
                </div>
            `;
        }).join('');
    }

    // ── Bracket Filter Pills ──
    document.querySelectorAll('.gen-pill').forEach(pill => {
        pill.addEventListener('click', () => {
            document.querySelectorAll('.gen-pill').forEach(p => p.classList.remove('active'));
            pill.classList.add('active');
            // Mood and Lifestyle are placeholder filters
            // Only "Default" renders the bracket currently
            renderBrackets();
        });
    });

    // ── Init ──
    applyView();
    renderCards(LABELS);
    renderBrackets();
    </script>

</body>
</html>
