<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Case File No. 2-A — Turkish Angora x Ragdoll</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="parts/dossier.css">
</head>
<body>
<main>
  <div id="dossier-root" class="dossier-loading">LOADING CASE FILE...</div>
</main>
<script>
(async function(){
  try{
    const shell = await fetch('parts/dossier.html').then(r=>r.text());
    document.getElementById('dossier-root').outerHTML = shell;
    // Load + run renderer after the markup is in the DOM
    const s = document.createElement('script');
    s.src = 'parts/dossier.js';
    s.defer = true;
    document.body.appendChild(s);
  }catch(e){
    const el = document.getElementById('dossier-root');
    if(el) el.textContent = 'ERROR LOADING CASE FILE: ' + e.message;
  }
})();
</script>
</body>
</html>
