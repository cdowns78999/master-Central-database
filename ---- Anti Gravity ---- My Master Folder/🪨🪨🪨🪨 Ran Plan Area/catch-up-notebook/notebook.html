<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catch-Up Notebook</title>
<link href="https://fonts.googleapis.com/css2?family=Gochi+Hand&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}

  /* ═══════════════════════════════════════════
     DESK SURFACE — warm linen / soft wood
     ═══════════════════════════════════════════ */
  body{
    font-family:'Special Elite','Courier New',monospace;
    background:#d6c9a8;
    background-image:
      radial-gradient(ellipse at 25% 40%,#e0d4b8 0%,transparent 60%),
      radial-gradient(ellipse at 75% 55%,#c8b990 0%,transparent 55%),
      linear-gradient(160deg,#d9ccab 0%,#c4b594 100%);
    min-height:100vh;display:flex;align-items:flex-start;justify-content:center;
    padding:60px 20px 80px;position:relative;overflow-x:hidden;
  }

  /* subtle linen / canvas weave on the desk */
  body::before{
    content:'';position:fixed;inset:0;
    background-image:
      repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.015) 2px,rgba(0,0,0,.015) 3px),
      repeating-linear-gradient(90deg,transparent,transparent 2px,rgba(0,0,0,.015) 2px,rgba(0,0,0,.015) 3px);
    pointer-events:none;z-index:0;
  }

  /* ═══════════════════════════════════════════
     COFFEE CUP — CSS-only, top-right of desk
     ═══════════════════════════════════════════ */
  .coffee-cup{
    position:fixed;top:32px;right:calc(50% - 390px);
    z-index:5;opacity:.55;pointer-events:none;
  }

  /* cup body — white ceramic */
  .cup-body{
    width:52px;height:40px;
    background:linear-gradient(180deg,#f5f3ee,#e8e4dd);
    border-radius:4px 4px 20px 20px;
    border:2px solid #d4cfc5;
    position:relative;
    box-shadow:0 4px 8px rgba(0,0,0,.08);
  }

  /* coffee inside */
  .cup-body::before{
    content:'';position:absolute;top:4px;left:5px;right:5px;height:14px;
    background:radial-gradient(ellipse,#5c3a1e,#3e2610);
    border-radius:50%;
  }

  /* handle */
  .cup-body::after{
    content:'';position:absolute;right:-14px;top:6px;
    width:12px;height:22px;
    border:2.5px solid #d4cfc5;border-left:none;
    border-radius:0 10px 10px 0;
    background:transparent;
  }

  /* saucer */
  .cup-saucer{
    width:64px;height:8px;margin-left:-6px;
    background:linear-gradient(180deg,#eae6de,#ddd8ce);
    border-radius:50%;
    border:1.5px solid #d0cbbe;
  }

  /* steam lines */
  .steam{
    position:absolute;bottom:100%;left:50%;
    display:flex;gap:6px;transform:translateX(-50%);
    padding-bottom:4px;
  }
  .steam span{
    display:block;width:2px;height:18px;
    background:rgba(180,170,150,.4);
    border-radius:50%;
    animation:steam-rise 2.4s ease-out infinite;
  }
  .steam span:nth-child(1){
    animation-delay:0s;height:16px;
  }
  .steam span:nth-child(2){
    animation-delay:.5s;height:22px;
  }
  .steam span:nth-child(3){
    animation-delay:1s;height:14px;
  }

  @keyframes steam-rise{
    0%{
      opacity:.6;
      transform:translateY(0) scaleX(1) translateX(0);
    }
    25%{
      transform:translateY(-6px) scaleX(1.3) translateX(2px);
    }
    50%{
      transform:translateY(-14px) scaleX(1.6) translateX(-1px);
      opacity:.35;
    }
    75%{
      transform:translateY(-22px) scaleX(2) translateX(3px);
      opacity:.15;
    }
    100%{
      opacity:0;
      transform:translateY(-30px) scaleX(2.5) translateX(0);
    }
  }

  /* ═══════════════════════════════════════════
     NOTEPAD — cream Muji paper
     ═══════════════════════════════════════════ */
  .notepad{
    position:relative;z-index:2;width:100%;max-width:640px;
    background:#fbfae8;
    min-height:80vh;
    border-radius:2px;
    transform:rotate(-1deg);
    box-shadow:
      0 4px 20px rgba(0,0,0,.08),
      0 8px 40px rgba(0,0,0,.05),
      0 1px 3px rgba(0,0,0,.06);
    padding:52px 44px 40px 72px;
    /* ruled lines synced to 32px line-height */
    background-image:
      repeating-linear-gradient(
        #fbfae8, #fbfae8 31px,
        #d8d4c4 31px, #d8d4c4 32px
      );
    background-position:0 51px;
  }

  /* coral margin line */
  .notepad::before{
    content:'';position:absolute;left:58px;top:0;bottom:0;width:1.5px;
    background:#cc4b48;opacity:.35;z-index:1;
  }

  /* top binding strip */
  .notepad::after{
    content:'';position:absolute;top:0;left:10px;right:10px;height:7px;
    background:linear-gradient(180deg,#c0bba8,#d8d3c0);border-radius:0 0 2px 2px;
  }

  .binding-holes{
    position:absolute;top:0;left:0;right:0;height:7px;display:flex;
    justify-content:space-around;padding:0 40px;z-index:4;
  }
  .binding-holes span{
    width:10px;height:10px;background:#c4b594;border-radius:50%;
    margin-top:-2px;box-shadow:inset 0 1px 3px rgba(0,0,0,.18);
  }

  /* ═══════════════════════════════════════════
     TYPOGRAPHY
     ═══════════════════════════════════════════ */
  h1{
    font-family:'Gochi Hand',cursive;
    font-size:22px;font-weight:400;color:#cc4b48;letter-spacing:.5px;
    margin-bottom:28px;padding-bottom:4px;
    border-bottom:1.5px dashed rgba(204,75,72,.2);
  }

  .section{margin-bottom:28px}

  .section-title{
    font-family:'Gochi Hand',cursive;
    font-size:17px;font-weight:400;color:#cc4b48;margin-bottom:6px;
    display:flex;align-items:center;gap:8px;line-height:32px;
  }

  /* + button — pencil-mark style */
  .section-title .add-btn{
    width:22px;height:22px;border:none;background:none;
    color:#a09880;
    font-family:'Special Elite',monospace;
    font-size:20px;cursor:pointer;border-radius:50%;display:flex;
    align-items:center;justify-content:center;transition:all .15s;line-height:1;
  }
  .section-title .add-btn:hover{color:#706650;background:rgba(0,0,0,.04)}

  .items{list-style:none}

  .item{
    display:flex;align-items:flex-start;gap:6px;line-height:32px;
    position:relative;padding-right:22px;
  }
  .item.indent-1{padding-left:22px}
  .item.indent-2{padding-left:44px}

  .item .bullet{
    flex-shrink:0;width:5px;height:5px;background:#a09880;border-radius:50%;
    margin-top:13px;
  }
  .item.indent-1 .bullet,.item.indent-2 .bullet{
    background:none;border:1.2px solid #b8b098;width:4px;height:4px;margin-top:14px;
  }

  .item .text{
    font-family:'Special Elite',monospace;
    font-size:14px;font-weight:400;color:#3a3530;cursor:pointer;
    transition:all .25s;flex:1;user-select:none;word-break:break-word;
  }

  /* ═══════════════════════════════════════════
     DONE STATE — coral wavy strikethrough
     ═══════════════════════════════════════════ */
  .item.done .text{
    opacity:.5;
    color:#8a8070;
    text-decoration:line-through;
    text-decoration-color:#cc4b48;
    text-decoration-style:wavy;
    text-decoration-thickness:1.5px;
  }

  /* × delete button — pencil-mark style */
  .item .remove{
    position:absolute;right:0;top:50%;transform:translateY(-50%);
    width:18px;height:18px;border:none;background:none;
    color:#b8b098;
    font-family:'Special Elite',monospace;
    font-size:15px;cursor:pointer;opacity:0;transition:opacity .15s;
    display:flex;align-items:center;justify-content:center;
  }
  .item:hover .remove{opacity:1}
  .item .remove:hover{color:#cc4b48}

  /* ═══════════════════════════════════════════
     NEW ITEM INPUT
     ═══════════════════════════════════════════ */
  .new-item-input{
    width:100%;border:none;border-bottom:1px dashed #ccc8b8;
    font-family:'Special Elite',monospace;font-size:14px;font-weight:400;color:#3a3530;
    padding:4px 0;margin:2px 0 2px 11px;outline:none;background:transparent;
    line-height:24px;
  }
  .new-item-input::placeholder{color:#c0b8a0}

  /* ═══════════════════════════════════════════
     PAGE FOOTER
     ═══════════════════════════════════════════ */
  .page-footer{
    text-align:center;padding-top:20px;
    font-family:'Special Elite',monospace;
    font-size:11px;color:#c0b8a0;
    letter-spacing:1.5px;font-weight:400;
  }

  /* ═══════════════════════════════════════════
     SYNC INDICATOR DOT
     ═══════════════════════════════════════════ */
  .sync-dot{
    position:fixed;bottom:14px;right:14px;width:6px;height:6px;
    border-radius:50%;opacity:.45;z-index:100;transition:background .3s,opacity .3s;
    pointer-events:none;
  }
  .sync-dot.connected{background:#4caf50}
  .sync-dot.polling{background:#ff9800;opacity:.7}
  .sync-dot.offline{background:#999}
</style>
</head>
<body>

<!-- Coffee cup prop -->
<div class="coffee-cup">
  <div style="position:relative;display:inline-block">
    <div class="steam"><span></span><span></span><span></span></div>
    <div class="cup-body"></div>
    <div class="cup-saucer"></div>
  </div>
</div>

<div class="sync-dot offline" id="syncDot"></div>

<div class="notepad" id="notepad">
  <div class="binding-holes"><span></span><span></span><span></span><span></span><span></span><span></span></div>
  <h1>Catch-Up Notebook</h1>
  <div id="sections"></div>
  <div class="page-footer">auto-saved</div>
</div>

<script>
const API='http://localhost:3009/api/data';
const API_VERSION='http://localhost:3009/api/version';
const LS_KEY='catchup-notebook-v1';
let uid=()=>Math.random().toString(36).slice(2,10);

const DEFAULT_DATA={sections:[
  {title:'Catch Up Plan For Business',items:[
    {text:'Pay everyone back and catch them up',done:false,indent:0,id:uid()},
    {text:'Who are the people',done:false,indent:1,id:uid()},
    {text:'What are the campaigns',done:false,indent:1,id:uid()},
    {text:'How much is owed',done:false,indent:1,id:uid()},
    {text:'How much total owed between everyone?',done:false,indent:0,id:uid()},
    {text:'Set up a great foundation per client with a good journey experience',done:false,indent:0,id:uid()},
    {text:'Lemi Vice - what does he need?',done:false,indent:1,id:uid()},
    {text:'Marc Antonix - what does he need',done:false,indent:1,id:uid()},
  ]},
  {title:'Catch Up Plan For Life',items:[
    {text:'$12,775 due in 8 days',done:false,indent:0,id:uid()},
    {text:'Electric bill and a few others about to be cut off',done:false,indent:0,id:uid()},
    {text:'What bills are behind and how much?',done:false,indent:0,id:uid()},
  ]}
]};

let data=null;
let saveTimer=null;

/* --- Polling & WebSocket state --- */
let knownVersion=-1;
let skipNextPoll=false;
let serverOnline=false;
let ws=null;
let wsConnected=false;
let wsReconnectTimer=null;
const syncDot=document.getElementById('syncDot');

function setSyncState(state){
  syncDot.className='sync-dot '+state;
}

/* Flag user action — skip the next poll to avoid overwriting local change */
function flagUserAction(){
  skipNextPoll=true;
}

async function loadData(){
  try{
    let r=await fetch(API,{signal:AbortSignal.timeout(2000)});
    if(r.ok){
      let j=await r.json();
      if(j&&j.sections&&j.sections.length){data=j;serverOnline=true;setSyncState('connected');return}
    }
  }catch(e){}
  serverOnline=false;
  setSyncState('offline');
  let ls=localStorage.getItem(LS_KEY);
  if(ls){try{let p=JSON.parse(ls);if(p&&p.sections){data=p;return}}catch(e){}}
  data=JSON.parse(JSON.stringify(DEFAULT_DATA));
}

function saveData(){
  flagUserAction();
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    let json=JSON.stringify(data);
    localStorage.setItem(LS_KEY,json);
    fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:json})
      .then(()=>{serverOnline=true;setSyncState('connected')})
      .catch(()=>{serverOnline=false;setSyncState('offline')});
  },500);
}

/* --- Re-render from new data (used by poll) --- */
function rebuildFromServer(newData){
  data=newData;
  localStorage.setItem(LS_KEY,JSON.stringify(data));
  render();
}

/* --- Version polling (fallback when WS is down) --- */
async function pollVersion(){
  if(wsConnected){return}  /* WS is live — skip HTTP poll */
  if(skipNextPoll){skipNextPoll=false;return}
  try{
    setSyncState('polling');
    let r=await fetch(API_VERSION,{signal:AbortSignal.timeout(2000)});
    if(!r.ok){throw new Error('not ok')}
    let j=await r.json();
    let v=j.version;
    if(!serverOnline){serverOnline=true}
    if(knownVersion===-1){
      knownVersion=v;
      setSyncState('connected');
      return;
    }
    if(v!==knownVersion){
      knownVersion=v;
      let dr=await fetch(API,{signal:AbortSignal.timeout(2000)});
      if(dr.ok){
        let nd=await dr.json();
        if(nd&&nd.sections){rebuildFromServer(nd)}
      }
    }
    setSyncState('connected');
  }catch(e){
    serverOnline=false;
    setSyncState('offline');
  }
}

/* --- WebSocket connection --- */
function connectWS(){
  if(ws&&(ws.readyState===WebSocket.CONNECTING||ws.readyState===WebSocket.OPEN))return;
  try{
    ws=new WebSocket('ws://localhost:3010');
  }catch(e){scheduleReconnect();return}

  ws.onopen=()=>{
    wsConnected=true;
    serverOnline=true;
    clearTimeout(wsReconnectTimer);
    setSyncState('connected');
  };

  ws.onmessage=async(ev)=>{
    try{
      let msg=JSON.parse(ev.data);
      if(msg.type==='update'&&msg.version!==knownVersion){
        knownVersion=msg.version;
        /* fetch fresh data via HTTP — small payload, persistent TCP not needed */
        let r=await fetch(API,{signal:AbortSignal.timeout(2000)});
        if(r.ok){
          let nd=await r.json();
          if(nd&&nd.sections){rebuildFromServer(nd)}
        }
      }
    }catch(e){}
  };

  ws.onclose=()=>{
    wsConnected=false;
    setSyncState('polling');
    scheduleReconnect();
  };

  ws.onerror=()=>{
    wsConnected=false;
    ws.close();
  };
}

function scheduleReconnect(){
  clearTimeout(wsReconnectTimer);
  wsReconnectTimer=setTimeout(connectWS,3000);
}

function render(){
  let c=document.getElementById('sections');
  c.innerHTML='';
  data.sections.forEach((sec,si)=>{
    let div=document.createElement('div');
    div.className='section';
    let hdr=document.createElement('div');
    hdr.className='section-title';
    hdr.innerHTML=`<span>${esc(sec.title)}</span>`;
    let addBtn=document.createElement('button');
    addBtn.className='add-btn';addBtn.textContent='+';addBtn.title='Add item';
    addBtn.onclick=()=>showNewInput(si,div);
    hdr.appendChild(addBtn);
    div.appendChild(hdr);
    let ul=document.createElement('div');
    ul.className='items';
    sec.items.forEach((item,ii)=>{
      ul.appendChild(makeItem(si,ii,item));
    });
    div.appendChild(ul);
    c.appendChild(div);
  });
}

function makeItem(si,ii,item){
  let row=document.createElement('div');
  row.className='item'+(item.done?' done':'')+(item.indent?' indent-'+item.indent:'');
  row.innerHTML=`<span class="bullet"></span><span class="text">${esc(item.text)}</span><button class="remove" title="Remove">&times;</button>`;
  row.querySelector('.text').onclick=()=>{
    item.done=!item.done;saveData();render();
  };
  row.querySelector('.remove').onclick=(e)=>{
    e.stopPropagation();
    data.sections[si].items.splice(ii,1);
    saveData();render();
  };
  return row;
}

function showNewInput(si,sectionDiv){
  if(sectionDiv.querySelector('.new-item-input'))return;
  let inp=document.createElement('input');
  inp.className='new-item-input';inp.placeholder='New item... (Tab to indent)';
  inp.dataset.indent='0';
  inp.addEventListener('keydown',(e)=>{
    if(e.key==='Tab'){
      e.preventDefault();
      let n=Math.min(2,parseInt(inp.dataset.indent)+1);
      inp.dataset.indent=String(n);
      inp.style.marginLeft=(11+n*22)+'px';
    }
    if(e.key==='Enter'&&inp.value.trim()){
      data.sections[si].items.push({text:inp.value.trim(),done:false,indent:parseInt(inp.dataset.indent),id:uid()});
      saveData();render();
    }
    if(e.key==='Escape'){inp.remove()}
  });
  inp.addEventListener('blur',()=>{
    if(inp.value.trim()){
      data.sections[si].items.push({text:inp.value.trim(),done:false,indent:parseInt(inp.dataset.indent),id:uid()});
      saveData();render();
    }else{inp.remove()}
  });
  sectionDiv.appendChild(inp);
  inp.focus();
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

/* --- Boot --- */
(async()=>{
  await loadData();
  render();
  /* Try WebSocket first, fall back to HTTP polling */
  connectWS();
  setInterval(pollVersion,2000);
})();
</script>
</body>
</html>
