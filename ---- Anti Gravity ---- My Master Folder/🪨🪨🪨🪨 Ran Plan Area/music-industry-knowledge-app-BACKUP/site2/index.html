<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music Industry Knowledge — Site 2</title>
  <meta name="description" content="26 essential music industry topics: streaming, royalties, sync licensing, distribution, PR, touring, and more. Light SPA with card-first design." />
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
</head>
<body>

  <!-- PARALLAX DOT-GRID BACKGROUND -->
  <div class="parallax-bg" aria-hidden="true"></div>

  <!-- APP SHELL -->
  <div class="app-shell">

    <!-- SIDEBAR -->
    <aside class="sidebar" role="navigation" aria-label="Category navigation">
      <div class="sidebar-brand">
        <div class="brand-icon">MI</div>
        <div class="brand-label">Music<br>Ind.</div>
      </div>
      <nav id="sidebar-nav" aria-label="26 categories"></nav>
    </aside>

    <!-- MAIN -->
    <div class="main">

      <!-- TOP BAR -->
      <header class="topbar">
        <span class="topbar-badge">Site 2</span>
        <span class="topbar-title">Music Industry Knowledge Base</span>
        <span class="topbar-sub">26 Categories &nbsp;·&nbsp; 2025–2026 Data</span>
      </header>

      <!-- SPA CONTENT AREA -->
      <main id="content-area" aria-live="polite" aria-atomic="true">
        <!-- Injected by app.js -->
      </main>

    </div><!-- /.main -->
  </div><!-- /.app-shell -->

  <!-- FLOATING CURRICULUM BUTTON -->
  <button id="curriculum-btn" aria-label="Open Deep Dive curriculum view">
    <span class="curr-icon">◈</span>
    <span class="curr-label">Deep Dive</span>
  </button>

  <!-- CURRICULUM OVERLAY PANEL -->
  <div id="curriculum-overlay" class="curriculum-overlay hidden">
    <div class="curr-panel">
      <button class="curr-close" aria-label="Close curriculum">✕</button>
      <div id="curr-content"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
