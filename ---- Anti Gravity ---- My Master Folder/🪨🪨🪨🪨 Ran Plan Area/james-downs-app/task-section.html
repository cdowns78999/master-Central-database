<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Section — James Downs Command Center</title>
  <style>
    /* ── CSS Variables ─────────────────────────────────────────── */
    :root {
      --bg:           #0a0f1e;
      --card-bg:      #0d1526;
      --gold:         #c9a84c;
      --gold-dim:     rgba(201, 168, 76, 0.15);
      --gold-border:  rgba(201, 168, 76, 0.3);
      --text:         #e8e0cc;
      --text-muted:   rgba(232, 224, 204, 0.45);
      --text-dim:     rgba(232, 224, 204, 0.7);
      --high:         #e74c3c;
      --high-bg:      rgba(231, 76, 60, 0.12);
      --med:          #f39c12;
      --med-bg:       rgba(243, 156, 18, 0.12);
      --low:          #2ecc71;
      --low-bg:       rgba(46, 204, 113, 0.12);
      --border:       rgba(232, 224, 204, 0.07);
      --input-bg:     rgba(232, 224, 204, 0.04);
      --hover-bg:     rgba(201, 168, 76, 0.06);
      --radius:       10px;
      --radius-sm:    6px;
      --transition:   0.22s ease;
    }

    /* ── Reset / Base ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 20px;
    }

    /* ── Section Wrapper ───────────────────────────────────────── */
    .task-section {
      width: 100%;
      max-width: 640px;
    }

    /* ── Section Header ────────────────────────────────────────── */
    .section-header {
      margin-bottom: 28px;
    }

    .section-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text);
      display: inline-block;
      padding-bottom: 10px;
      position: relative;
    }

    .section-title::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, var(--gold), transparent);
      border-radius: 2px;
    }

    /* ── Add Task Form ─────────────────────────────────────────── */
    .add-task-form {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 20px;
      transition: border-color var(--transition);
    }

    .add-task-form:focus-within {
      border-color: var(--gold-border);
    }

    .task-input {
      flex: 1;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 14px;
      padding: 9px 13px;
      outline: none;
      transition: border-color var(--transition), background var(--transition);
      font-family: inherit;
    }

    .task-input::placeholder {
      color: var(--text-muted);
    }

    .task-input:focus {
      border-color: var(--gold-border);
      background: rgba(201, 168, 76, 0.04);
    }

    .priority-select {
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      padding: 9px 10px;
      outline: none;
      cursor: pointer;
      transition: border-color var(--transition);
      font-family: inherit;
      appearance: none;
      -webkit-appearance: none;
      min-width: 90px;
      text-align: center;
    }

    .priority-select:focus {
      border-color: var(--gold-border);
    }

    .priority-select option[value="high"]  { color: var(--high); }
    .priority-select option[value="med"]   { color: var(--med); }
    .priority-select option[value="low"]   { color: var(--low); }

    .priority-select.is-high { color: var(--high); border-color: rgba(231,76,60,0.35); }
    .priority-select.is-med  { color: var(--med);  border-color: rgba(243,156,18,0.35); }
    .priority-select.is-low  { color: var(--low);  border-color: rgba(46,204,113,0.35); }

    .add-btn {
      background: var(--gold);
      color: #0a0f1e;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 9px 18px;
      cursor: pointer;
      transition: opacity var(--transition), transform var(--transition);
      font-family: inherit;
      white-space: nowrap;
    }

    .add-btn:hover  { opacity: 0.88; }
    .add-btn:active { transform: scale(0.97); }

    /* ── Filter Tabs + Counter ─────────────────────────────────── */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .filter-tabs {
      display: flex;
      gap: 4px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 4px;
    }

    .filter-tab {
      background: transparent;
      border: none;
      border-radius: 4px;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.05em;
      padding: 5px 13px;
      cursor: pointer;
      transition: background var(--transition), color var(--transition);
      font-family: inherit;
      text-transform: uppercase;
    }

    .filter-tab:hover {
      color: var(--text-dim);
    }

    .filter-tab.active {
      background: var(--gold-dim);
      color: var(--gold);
    }

    .task-counter {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.03em;
    }

    .task-counter span {
      color: var(--gold);
      font-weight: 600;
    }

    /* ── Task List ─────────────────────────────────────────────── */
    .task-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .task-item {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 13px 16px;
      display: flex;
      align-items: center;
      gap: 13px;
      transition:
        border-color var(--transition),
        opacity 0.3s ease,
        transform 0.25s ease;
      animation: slideIn 0.22s ease forwards;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .task-item:hover {
      border-color: var(--gold-border);
      background: var(--hover-bg);
    }

    .task-item.completed {
      opacity: 0.45;
    }

    .task-item.completed .task-text {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    /* Checkbox */
    .task-checkbox {
      width: 18px;
      height: 18px;
      min-width: 18px;
      border: 2px solid var(--gold-border);
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition), border-color var(--transition), transform 0.18s ease;
      position: relative;
      background: transparent;
      flex-shrink: 0;
    }

    .task-checkbox:hover {
      border-color: var(--gold);
      transform: scale(1.1);
    }

    .task-item.completed .task-checkbox {
      background: var(--gold);
      border-color: var(--gold);
    }

    .task-checkbox .check-icon {
      opacity: 0;
      transform: scale(0.5);
      transition: opacity 0.18s ease, transform 0.18s ease;
      font-size: 10px;
      color: #0a0f1e;
      font-weight: 900;
      line-height: 1;
    }

    .task-item.completed .task-checkbox .check-icon {
      opacity: 1;
      transform: scale(1);
    }

    /* Priority Badge */
    .priority-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .priority-badge.high { color: var(--high); background: var(--high-bg); border: 1px solid rgba(231,76,60,0.2); }
    .priority-badge.med  { color: var(--med);  background: var(--med-bg);  border: 1px solid rgba(243,156,18,0.2); }
    .priority-badge.low  { color: var(--low);  background: var(--low-bg);  border: 1px solid rgba(46,204,113,0.2); }

    /* Task Text */
    .task-text {
      flex: 1;
      font-size: 14px;
      color: var(--text);
      line-height: 1.4;
      transition: color var(--transition), text-decoration var(--transition);
      word-break: break-word;
    }

    /* Delete Button */
    .delete-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 16px;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color var(--transition), background var(--transition), transform 0.15s ease;
      flex-shrink: 0;
      line-height: 1;
    }

    .delete-btn:hover {
      color: var(--high);
      background: rgba(231, 76, 60, 0.1);
      transform: scale(1.15);
    }

    /* ── Empty State ───────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
      font-size: 13px;
      letter-spacing: 0.04em;
      display: none;
    }

    .empty-state.visible { display: block; }

    .empty-state-icon {
      font-size: 32px;
      display: block;
      margin-bottom: 10px;
      opacity: 0.4;
    }

    /* ── Removing Animation ────────────────────────────────────── */
    .task-item.removing {
      animation: slideOut 0.22s ease forwards;
    }

    @keyframes slideOut {
      from { opacity: 1; transform: translateX(0); max-height: 80px; }
      to   { opacity: 0; transform: translateX(20px); max-height: 0; padding-top: 0; padding-bottom: 0; margin: 0; }
    }
  </style>
</head>
<body>

<section class="task-section" id="taskSection">

  <!-- Header -->
  <div class="section-header">
    <h2 class="section-title">Tasks</h2>
  </div>

  <!-- Add Task Form -->
  <form class="add-task-form" id="addTaskForm">
    <input
      class="task-input"
      id="taskInput"
      type="text"
      placeholder="Add a new task..."
      autocomplete="off"
      maxlength="200"
    />
    <select class="priority-select is-high" id="prioritySelect">
      <option value="high">⬤ High</option>
      <option value="med">⬤ Med</option>
      <option value="low">⬤ Low</option>
    </select>
    <button class="add-btn" type="submit">+ Add</button>
  </form>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="filter-tabs" id="filterTabs">
      <button class="filter-tab active" data-filter="all">All</button>
      <button class="filter-tab" data-filter="active">Active</button>
      <button class="filter-tab" data-filter="completed">Done</button>
    </div>
    <div class="task-counter" id="taskCounter">
      <span id="remainingCount">0</span> tasks remaining
    </div>
  </div>

  <!-- Task List -->
  <div class="task-list" id="taskList"></div>

  <!-- Empty State -->
  <div class="empty-state" id="emptyState">
    <span class="empty-state-icon">◈</span>
    Nothing here yet.
  </div>

</section>

<script>
  (() => {
    const STORAGE_KEY = 'jd_tasks';
    let tasks  = [];
    let filter = 'all';

    /* ── Persistence ─────────────────────────────────────────── */
    const load  = () => { try { tasks = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { tasks = []; } };
    const save  = () => localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));

    /* ── ID Generator ────────────────────────────────────────── */
    const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);

    /* ── Render ──────────────────────────────────────────────── */
    const taskList     = document.getElementById('taskList');
    const emptyState   = document.getElementById('emptyState');
    const remainingEl  = document.getElementById('remainingCount');

    function getVisible() {
      if (filter === 'active')    return tasks.filter(t => !t.done);
      if (filter === 'completed') return tasks.filter(t =>  t.done);
      return tasks;
    }

    function updateCounter() {
      const remaining = tasks.filter(t => !t.done).length;
      remainingEl.textContent = remaining;
    }

    function buildItem(task, animate) {
      const item = document.createElement('div');
      item.className = 'task-item' + (task.done ? ' completed' : '');
      item.dataset.id = task.id;
      if (animate) item.style.animation = 'slideIn 0.22s ease forwards';

      item.innerHTML = `
        <div class="task-checkbox" role="checkbox" aria-checked="${task.done}" tabindex="0" title="Toggle complete">
          <span class="check-icon">✓</span>
        </div>
        <span class="priority-badge ${task.priority}">${task.priority.toUpperCase()}</span>
        <span class="task-text">${escHtml(task.text)}</span>
        <button class="delete-btn" title="Delete task" aria-label="Delete task">✕</button>
      `;

      /* Checkbox toggle */
      const cb = item.querySelector('.task-checkbox');
      const toggle = () => {
        task.done = !task.done;
        item.classList.toggle('completed', task.done);
        cb.setAttribute('aria-checked', task.done);
        save();
        updateCounter();

        /* If filtered view no longer matches, remove after brief pause */
        if (filter !== 'all') {
          setTimeout(() => render(false), 400);
        }
      };
      cb.addEventListener('click', toggle);
      cb.addEventListener('keydown', e => { if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); toggle(); } });

      /* Delete */
      item.querySelector('.delete-btn').addEventListener('click', () => {
        item.classList.add('removing');
        item.addEventListener('animationend', () => {
          tasks = tasks.filter(t => t.id !== task.id);
          save();
          render(false);
        }, { once: true });
      });

      return item;
    }

    function render(animate = false) {
      taskList.innerHTML = '';
      const visible = getVisible();
      if (visible.length === 0) {
        emptyState.classList.add('visible');
      } else {
        emptyState.classList.remove('visible');
        visible.forEach(t => taskList.appendChild(buildItem(t, animate)));
      }
      updateCounter();
    }

    /* ── HTML Escape ─────────────────────────────────────────── */
    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    /* ── Add Task Form ───────────────────────────────────────── */
    const form    = document.getElementById('addTaskForm');
    const input   = document.getElementById('taskInput');
    const selPri  = document.getElementById('prioritySelect');

    /* Priority selector color sync */
    function syncSelectColor() {
      selPri.className = 'priority-select is-' + selPri.value;
    }
    selPri.addEventListener('change', syncSelectColor);

    form.addEventListener('submit', e => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) { input.focus(); return; }

      const task = { id: uid(), text, priority: selPri.value, done: false, created: Date.now() };
      tasks.unshift(task);
      save();

      /* If filter hides new active task, switch to all */
      if (filter === 'completed') { setFilter('all'); } else { render(true); }

      input.value = '';
      input.focus();
    });

    /* ── Filter Tabs ─────────────────────────────────────────── */
    const tabsEl = document.getElementById('filterTabs');

    function setFilter(f) {
      filter = f;
      tabsEl.querySelectorAll('.filter-tab').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.filter === f);
      });
      render(false);
    }

    tabsEl.addEventListener('click', e => {
      const btn = e.target.closest('.filter-tab');
      if (btn) setFilter(btn.dataset.filter);
    });

    /* ── Boot ────────────────────────────────────────────────── */
    load();
    render(false);
  })();
</script>

</body>
</html>
