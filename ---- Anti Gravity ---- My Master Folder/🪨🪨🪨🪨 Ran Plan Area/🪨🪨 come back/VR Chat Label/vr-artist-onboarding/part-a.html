<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You Were Scouted — Anti Gravity Music</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎙️</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>

/* ─── Token System ─────────────────────────────────── */
:root {
  --bg:        #0e0f1e;
  --surface:   #1a1b36;
  --surface2:  #252750;
  --primary:   #4d509c;
  --accent:    #ec4899;
  --text:      #ffffff;
  --text-dim:  #cecfe7;
  --text-muted:#8b8db8;
  --border:    rgba(77, 80, 156, 0.3);
  --border-strong: rgba(77, 80, 156, 0.5);
  --font:      'Exo 2', system-ui, sans-serif;
  --r-sm:      8px;
  --r-md:      12px;
  --r-lg:      16px;
}

/* ─── Reset ────────────────────────────────────────── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

/* ─── Body ─────────────────────────────────────────── */
body {
  background: var(--bg);
  font-family: var(--font);
  color: var(--text);
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  position: relative;
  -webkit-font-smoothing: antialiased;
}

/* ─── Background Watermark ─────────────────────────── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: url('https://upload.wikimedia.org/wikipedia/commons/6/6a/All_Weather_Girls_Portrait.png') center / cover no-repeat;
  opacity: 0.04;
  z-index: 0;
  pointer-events: none;
  filter: saturate(0.5);
}

/* ─── Quadrant Grid ────────────────────────────────── */
.quadrant-grid {
  display: grid;
  grid-template-columns: 55fr 45fr;
  grid-template-rows: 56vh 44vh;
  grid-template-areas:
    "hero how"
    "picker next";
  height: 100vh;
  height: 100dvh;
  width: 100vw;
  position: relative;
  z-index: 1;
}

/* ─── Quadrant Base + Grid Areas ───────────────────── */
.quadrant {
  position: relative;
  overflow: hidden;
  background: var(--bg);
  animation: blurIn 0.7s ease-out both;
}
.quadrant.hero         { grid-area: hero;    border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); animation-delay: 0s; background: linear-gradient(135deg, #0e0f1e 0%, #111330 100%); }
.quadrant.how-it-works { grid-area: how;     border-bottom: 1px solid var(--border); animation-delay: 0.12s; }
.quadrant.picker       { grid-area: picker;  border-right: 1px solid var(--border); animation-delay: 0.24s; }
.quadrant.next-step    { grid-area: next;    animation-delay: 0.36s; }

/* ─── Crosshair Ornament ───────────────────────────── */
.crosshair {
  position: fixed;
  left: 55%;
  top: 56%;
  transform: translate(-50%, -50%);
  width: 16px;
  height: 16px;
  background: var(--primary);
  rotate: 45deg;
  z-index: 100;
  opacity: 0.7;
  box-shadow: 0 0 12px rgba(77,80,156,0.8), 0 0 24px rgba(77,80,156,0.4);
  animation: crosshairPulse 3s ease-in-out infinite;
}
@keyframes crosshairPulse {
  0%, 100% { opacity: 0.5; box-shadow: 0 0 8px rgba(77,80,156,0.6); }
  50%       { opacity: 0.9; box-shadow: 0 0 20px rgba(77,80,156,0.9), 0 0 40px rgba(236,72,153,0.3); }
}

/* ─── Anime Girl Images ────────────────────────────── */
.anime-girl {
  position: absolute;
  pointer-events: none;
  user-select: none;
  z-index: 0;
}
.anime-girl-hero {
  right: 0; bottom: 0;
  height: 90%;
  width: auto;
  opacity: 0.18;
  -webkit-mask-image: linear-gradient(to right, transparent 0%, black 30%);
  mask-image: linear-gradient(to right, transparent 0%, black 30%);
  filter: saturate(0.8);
}
.anime-girl-how {
  right: -10px; bottom: 0;
  height: 50%;
  width: auto;
  opacity: 0.1;
  -webkit-mask-image: linear-gradient(to right, transparent 0%, black 40%);
  mask-image: linear-gradient(to right, transparent 0%, black 40%);
}
.anime-girl-picker {
  right: -10px; bottom: 0;
  height: 80%;
  width: auto;
  opacity: 0.12;
  -webkit-mask-image: linear-gradient(to right, transparent 0%, black 35%);
  mask-image: linear-gradient(to right, transparent 0%, black 35%);
}
.anime-girl-next {
  left: 0; bottom: 0;
  height: 80%;
  width: auto;
  opacity: 0.12;
  -webkit-mask-image: linear-gradient(to left, transparent 0%, black 35%);
  mask-image: linear-gradient(to left, transparent 0%, black 35%);
}

/* ─── Animations ───────────────────────────────────── */
@keyframes blurIn {
  from { filter: blur(10px); opacity: 0; transform: scale(0.99); }
  to   { filter: blur(0);    opacity: 1; transform: scale(1); }
}

@keyframes stepGlow {
  0%, 100% { box-shadow: 0 0 8px rgba(77,80,156,0.3); border-color: var(--border); }
  33%       { box-shadow: 0 0 18px rgba(77,80,156,0.6), 0 0 8px rgba(236,72,153,0.2); border-color: rgba(77,80,156,0.6); }
  66%       { box-shadow: 0 0 22px rgba(99,102,241,0.5), 0 0 10px rgba(139,92,246,0.35); border-color: rgba(99,102,241,0.5); }
}
.glow-pulse      { animation: stepGlow 3s ease-in-out infinite; }
.glow-pulse-slow { animation: stepGlow 5s ease-in-out infinite; }

@keyframes floatCTA {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-4px); }
}

/* ─── Shared Section Label ─────────────────────────── */
.section-label {
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--primary);
  margin-bottom: 1.25rem;
  display: flex; align-items: center; gap: 0.6rem;
}
.section-label::before {
  content: '';
  width: 20px; height: 1px;
  background: var(--primary);
  box-shadow: 0 0 6px rgba(77,80,156,0.6);
}

/* ─── Hero / Scout Receipt ─────────────────────────── */
.hero-content {
  position: relative; z-index: 1;
  padding: 2.5rem 3rem;
  height: 100%;
  display: flex; flex-direction: column; justify-content: center;
}
.eyebrow {
  font-size: 0.6rem; font-weight: 700; letter-spacing: 0.35em;
  text-transform: uppercase; color: var(--primary);
  margin-bottom: 1rem; opacity: 0.85;
}
.scout-receipt {
  background: rgba(26,27,54,0.9);
  border: 1px solid var(--border-strong);
  border-radius: var(--r-lg);
  padding: 1.75rem 2rem;
  max-width: 480px;
  position: relative;
  backdrop-filter: blur(8px);
}
.receipt-label {
  display: block;
  font-size: 0.55rem; font-weight: 700; letter-spacing: 0.3em;
  text-transform: uppercase; color: var(--primary);
  margin-bottom: 0.75rem; font-family: monospace;
}
.hero-headline {
  font-size: 2.6rem; font-weight: 800;
  letter-spacing: -0.02em; line-height: 1;
  color: var(--text); margin-bottom: 0.6rem;
}
.hero-sub {
  font-size: 0.9rem; color: var(--text-dim); line-height: 1.5;
  margin-bottom: 1.25rem;
}
.receipt-rule {
  border: none; border-top: 1px solid var(--border);
  margin-bottom: 1rem;
}
.receipt-data {
  display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;
}
.receipt-data span {
  font-size: 0.6rem; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--primary);
  font-family: monospace; opacity: 0.9;
}

/* ─── Step Spine (Q2) ──────────────────────────────── */
.how-content {
  position: relative; z-index: 1;
  padding: 2rem 2rem 2rem 1.75rem;
  height: 100%; overflow-y: auto;
}
.how-content::-webkit-scrollbar { width: 4px; }
.how-content::-webkit-scrollbar-track { background: transparent; }
.how-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.step-spine {
  position: relative;
  display: flex; flex-direction: column; gap: 0.5rem;
}
.step-spine::before {
  content: ''; position: absolute;
  left: 11px; top: 12px; bottom: 12px; width: 1px;
  background: linear-gradient(to bottom, var(--primary), rgba(77,80,156,0.1));
}
.step-card {
  display: flex; align-items: flex-start; gap: 0.75rem;
  padding: 0.6rem 0.8rem;
  background: rgba(26,27,54,0.7);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  cursor: default;
  transition: all 0.2s ease;
  position: relative;
}
.step-card:hover {
  background: rgba(37,39,80,0.9);
  border-color: rgba(77,80,156,0.55);
  box-shadow: 0 0 16px rgba(77,80,156,0.25), 0 0 6px rgba(236,72,153,0.1);
  transform: translateX(3px);
}
.step-num {
  width: 22px; height: 22px; min-width: 22px;
  border-radius: 50%; background: var(--primary);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.55rem; font-weight: 700; color: white;
  position: relative; z-index: 1;
}
.step-title { font-size: 0.78rem; font-weight: 700; color: var(--text); line-height: 1.2; }
.step-desc  { font-size: 0.68rem; color: var(--text-muted); line-height: 1.3; margin-top: 0.1rem; }

/* ─── Song Picker (Q3) ─────────────────────────────── */
.picker-content {
  position: relative; z-index: 1;
  padding: 2rem 3rem;
  height: 100%;
  display: flex; flex-direction: column; justify-content: center;
}
.platform-banners {
  display: flex; gap: 0.6rem; flex-wrap: wrap;
  margin-bottom: 1rem;
}
.platform-banner {
  height: 34px; padding: 0 1rem;
  border-radius: 20px;
  border: 1px solid;
  background: transparent;
  font-family: var(--font); font-size: 0.7rem; font-weight: 600;
  cursor: pointer; transition: all 0.15s ease;
  display: flex; align-items: center; gap: 0.4rem;
}
.platform-banner[data-platform="spotify"]    { border-color: #1DB954; color: #1DB954; }
.platform-banner[data-platform="soundcloud"] { border-color: #FF5500; color: #FF5500; }
.platform-banner[data-platform="youtube"]    { border-color: #FF0000; color: #FF0000; }
.platform-banner[data-platform="apple"]      { border-color: #FC3C44; color: #FC3C44; }
.platform-banner.active[data-platform="spotify"]    { background: rgba(29,185,84,0.15); }
.platform-banner.active[data-platform="soundcloud"] { background: rgba(255,85,0,0.15); }
.platform-banner.active[data-platform="youtube"]    { background: rgba(255,0,0,0.12); }
.platform-banner.active[data-platform="apple"]      { background: rgba(252,60,68,0.12); }
.platform-banner:hover { transform: translateY(-1px); filter: brightness(1.15); }

.url-input {
  width: 100%; height: 50px;
  background: var(--surface);
  border: 1px solid var(--border-strong);
  border-radius: var(--r-md);
  color: var(--text); font-family: var(--font); font-size: 0.875rem;
  padding: 0 1.25rem;
  outline: none;
  transition: all 0.2s ease;
  margin-bottom: 0.75rem;
}
.url-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(236,72,153,0.18);
}
.url-input::placeholder { color: var(--text-muted); }

.submit-btn {
  width: 100%; height: 48px;
  background: linear-gradient(135deg, var(--primary) 0%, #7c3aed 50%, var(--accent) 100%);
  border: none; border-radius: var(--r-md);
  color: white; font-family: var(--font); font-size: 0.9rem; font-weight: 700;
  letter-spacing: 0.04em; cursor: pointer;
  transition: all 0.2s ease;
  position: relative; overflow: hidden;
}
.submit-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(77,80,156,0.45), 0 2px 8px rgba(236,72,153,0.3);
}
.submit-btn:active { transform: translateY(0) scale(0.99); }
.submit-btn.success {
  background: linear-gradient(135deg, #059669, #10b981);
}

.helper-text {
  font-size: 0.68rem; color: var(--text-muted); margin-top: 0.6rem; text-align: center;
}

/* ─── Deal Card (Q4) ───────────────────────────────── */
.next-content {
  position: relative; z-index: 1;
  padding: 1.75rem 2rem;
  height: 100%;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  text-align: center;
}
.deal-card {
  width: 100%; max-width: 320px;
  background: var(--surface);
  border: 1px solid var(--border-strong);
  border-radius: var(--r-lg);
  padding: 1.5rem 1.75rem;
  margin-bottom: 1.25rem;
}
.deal-split {
  display: flex; align-items: center; gap: 0;
}
.deal-half {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 0.25rem;
}
.deal-pct {
  font-size: 2.4rem; font-weight: 800; color: var(--text); line-height: 1;
}
.deal-who {
  font-size: 0.55rem; font-weight: 700; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--primary);
}
.deal-desc { font-size: 0.65rem; color: var(--text-muted); }
.deal-divider {
  width: 1px; height: 60px;
  background: linear-gradient(to bottom, transparent, var(--border-strong), transparent);
  margin: 0 1rem;
}
.deal-footnote {
  font-size: 0.65rem; color: var(--text-muted); margin-top: 1rem;
  border-top: 1px solid var(--border); padding-top: 0.75rem;
}

.cta-btn {
  width: 100%; max-width: 300px; height: 52px;
  background: var(--accent);
  border: none; border-radius: var(--r-md);
  color: white; font-family: var(--font); font-size: 0.95rem; font-weight: 800;
  letter-spacing: 0.05em; cursor: pointer;
  animation: floatCTA 2s ease-in-out infinite;
  transition: background 0.2s ease, box-shadow 0.2s ease;
  box-shadow: 0 4px 20px rgba(236,72,153,0.35);
}
.cta-btn:hover {
  background: #d4387e;
  box-shadow: 0 6px 28px rgba(236,72,153,0.55);
  animation: none; transform: translateY(-2px);
}
.cta-btn:active { transform: scale(0.98); animation: none; }

/* ─── Mobile Responsive ────────────────────────────── */
@media (max-width: 960px) {
  body { overflow: auto; height: auto; }
  .quadrant-grid {
    display: block;
    height: auto;
    width: 100%;
  }
  .quadrant {
    width: 100%; height: auto; min-height: 60vh;
    border-right: none !important;
  }
  .quadrant.how-it-works { min-height: auto; }
  .anime-girl-how, .anime-girl-picker, .anime-girl-next { display: none; }
  .crosshair { display: none; }
  .hero-content { padding: 2rem 1.75rem; }
  .picker-content { padding: 2rem 1.75rem; }
}
@media (max-width: 640px) {
  .hero-headline { font-size: 2rem; }
  .platform-banners { gap: 0.4rem; }
  .platform-banner { font-size: 0.65rem; padding: 0 0.75rem; }
  .deal-pct { font-size: 2rem; }
  .next-content { padding: 1.5rem 1.25rem; }
}

</style>
