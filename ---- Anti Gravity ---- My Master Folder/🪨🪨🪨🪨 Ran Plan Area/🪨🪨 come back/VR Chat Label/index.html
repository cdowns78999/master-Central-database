<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VR Chat Label</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎧</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./styles.css">
<style>
:root {
  --bg:         #0e0f1e;
  --surface:    #1a1b36;
  --surface2:   #252750;
  --primary:    #4d509c;
  --accent:     #ec4899;
  --text:       #ffffff;
  --text-dim:   #cecfe7;
  --text-muted: #8b8db8;
  --border:     rgba(77, 80, 156, 0.3);
  --font:       'Exo 2', system-ui, sans-serif;
  --r-sm:       8px;
  --r-md:       12px;
  --r-lg:       16px;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

@keyframes blurIn {
  from { opacity: 0; filter: blur(12px); transform: translateY(10px); }
  to   { opacity: 1; filter: blur(0);    transform: translateY(0); }
}

body {
  background: var(--bg);
  font-family: var(--font);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 60px 24px 40px;
  -webkit-font-smoothing: antialiased;
}

.hero {
  text-align: center;
  animation: blurIn 0.7s ease-out both;
  margin-bottom: 48px;
}

.emoji-icon {
  font-size: 52px;
  display: block;
  margin-bottom: 20px;
}

h1 {
  font-size: clamp(2rem, 6vw, 3.2rem);
  font-weight: 800;
  letter-spacing: -0.02em;
  color: var(--text);
  margin-bottom: 12px;
}

.tagline {
  font-size: 1rem;
  color: var(--text-muted);
  font-weight: 400;
  letter-spacing: 0.04em;
}

.notes-area {
  width: 100%;
  max-width: 680px;
  animation: blurIn 0.7s ease-out 0.15s both;
}

.notes-label {
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  margin-bottom: 12px;
}

textarea {
  width: 100%;
  min-height: 220px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  color: var(--text-dim);
  font-family: var(--font);
  font-size: 0.95rem;
  line-height: 1.6;
  padding: 20px;
  resize: vertical;
  outline: none;
  transition: border-color 0.2s;
}

textarea::placeholder { color: var(--text-muted); }
textarea:focus { border-color: rgba(77, 80, 156, 0.6); }

.placeholder-cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
  margin-top: 20px;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 16px 18px;
  color: var(--text-muted);
  font-size: 0.85rem;
  min-height: 72px;
}
</style>
</head>
<body>

<div class="hero">
  <span class="emoji-icon">🎧</span>
  <h1>VR Chat Label</h1>
  <p class="tagline">Artists. Worlds. Label.</p>
</div>

<div class="notes-area">
  <p class="notes-label">Notes</p>
  <textarea placeholder="Artists, worlds, strategy, rollout..."></textarea>

  <div class="placeholder-cards">
    <div class="card">Artists</div>
    <div class="card">Worlds</div>
    <div class="card">Releases</div>
    <div class="card">Strategy</div>
  </div>
</div>

</body>
</html>
