<head>

<title>NJ Vet Tech Job Hunt Checklist for Planetary/VRC+</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:#faf8f5;font-family:'Inter',sans-serif;color:#333;padding:12px 16px 120px;min-height:100vh;}

/* ── 3D pencil ── */
.pencil-wrap{display:flex;justify-content:center;margin:20px 0 8px;}
.pencil{position:relative;width:180px;height:22px;transform:rotate(-4deg);filter:drop-shadow(3px 4px 6px rgba(0,0,0,.25));}
.pencil-body{position:absolute;top:0;left:20px;right:20px;height:100%;background:linear-gradient(180deg,#ffe066 0%,#ffd633 40%,#e6be00 100%);border-radius:2px;border-top:1px solid #fff3a8;border-bottom:1px solid #c9a800;}
.pencil-eraser{position:absolute;top:1px;right:0;width:22px;height:20px;background:linear-gradient(180deg,#f5a0b8 0%,#e87a9e 100%);border-radius:2px 4px 4px 2px;border-left:3px solid #c8c8c8;}
.pencil-tip{position:absolute;top:3px;left:0;width:0;height:0;border-top:8px solid transparent;border-bottom:8px solid transparent;border-right:20px solid #666;}
.pencil-tip::after{content:'';position:absolute;top:5px;left:15px;width:0;height:0;border-top:3px solid transparent;border-bottom:3px solid transparent;border-right:5px solid #222;}
.pencil-stripe{position:absolute;top:0;left:60px;width:6px;height:100%;background:rgba(0,0,0,.06);}
.pencil-stripe2{position:absolute;top:0;left:70px;width:6px;height:100%;background:rgba(0,0,0,.06);}

/* ── title ── */
.main-title{font-family:'Caveat',cursive;font-size:2.2rem;text-align:center;color:#5a4a3a;margin-bottom:2px;font-weight:700;}
.subtitle{text-align:center;font-size:.82rem;color:#999;margin-bottom:16px;letter-spacing:.3px;}

/* ── progress bar (sticky) ── */
.progress-wrap{position:sticky;top:0;z-index:900;background:rgba(250,248,245,.96);backdrop-filter:blur(8px);padding:10px 14px;border-radius:0 0 12px 12px;box-shadow:0 2px 10px rgba(0,0,0,.08);margin-bottom:14px;display:flex;flex-wrap:wrap;gap:6px 14px;align-items:center;font-size:.85rem;}
.progress-bar-outer{flex:1;min-width:100px;height:14px;background:#eee;border-radius:7px;overflow:hidden;}
.progress-bar-inner{height:100%;background:linear-gradient(90deg,#a8e6cf,#87ceeb,#d4a5f5,#f8b4d9);border-radius:7px;transition:width .5s ease;}
.progress-text{font-family:'JetBrains Mono',monospace;font-weight:600;color:#5a4a3a;font-size:.8rem;}
.response-count{font-family:'JetBrains Mono',monospace;font-weight:600;color:#e87a9e;text-shadow:0 0 10px rgba(232,122,158,.45);font-size:.8rem;}

/* ── tutorial cards ── */
.tutorial-wrap{display:flex;flex-direction:column;gap:8px;margin-bottom:18px;}
.tutorial-card{background:#fff;border:1px solid #e8e0d8;border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 5px rgba(0,0,0,.05);}
.tutorial-card .tc-step{font-family:'Caveat',cursive;font-size:1rem;color:#b0a090;white-space:nowrap;font-weight:700;}
.tutorial-card .tc-body{flex:1;font-size:.8rem;color:#555;line-height:1.45;}
.tutorial-card .tc-dismiss{background:none;border:1px solid #ddd;border-radius:6px;padding:3px 10px;font-size:.7rem;cursor:pointer;color:#999;transition:all .2s;white-space:nowrap;}
.tutorial-card .tc-dismiss:hover{background:#f5f0ea;color:#666;}

/* ── city section ── */
.city-section{margin-bottom:20px;}
.city-header{font-family:'Caveat',cursive;font-size:1.5rem;color:#5a4a3a;cursor:pointer;user-select:none;display:flex;align-items:center;gap:8px;padding:8px 4px;border-bottom:2px solid #e8e0d8;margin-bottom:10px;transition:color .2s;font-weight:700;}
.city-header:hover{color:#999;}
.city-header .chevron{display:inline-block;transition:transform .3s;font-size:.75rem;}
.city-header .chevron.collapsed{transform:rotate(-90deg);}
.city-cards{overflow:hidden;transition:max-height .4s ease;}
.city-cards.collapsed-cards{max-height:0 !important;overflow:hidden;}

/* ── clinic card ── */
.clinic-card{background:#fff;border-radius:12px;border-left:5px solid #ccc;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,.05);position:relative;transition:box-shadow .25s;}
.clinic-card:hover{box-shadow:0 3px 14px rgba(0,0,0,.1);}
.clinic-card.response-received{box-shadow:0 0 0 2px #f8b4d9,0 4px 16px rgba(248,180,217,.25);}
.response-badge{position:absolute;top:8px;right:10px;font-size:.68rem;background:linear-gradient(135deg,#ffe066,#f8b4d9);padding:3px 10px;border-radius:20px;font-weight:600;color:#5a4a3a;}
.clinic-name{font-family:'Caveat',cursive;font-size:1.2rem;font-weight:700;color:#3a3a3a;margin-bottom:3px;}
.clinic-meta{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:#888;margin-bottom:4px;line-height:1.55;}
.clinic-meta a{color:#6b8acd;text-decoration:none;}
.clinic-meta a:hover{text-decoration:underline;}
.clinic-services{font-size:.75rem;color:#777;margin-bottom:3px;}
.clinic-looking{font-size:.75rem;color:#5a8a6a;font-style:italic;margin-bottom:8px;}
.nudge-box{background:#fef9f0;border:1px dashed #e0d5c5;border-radius:8px;padding:8px 10px;font-size:.78rem;color:#8a7a6a;margin-bottom:8px;}
.btn{display:inline-flex;align-items:center;gap:4px;padding:7px 14px;border:none;border-radius:8px;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif;}
.btn-email{background:linear-gradient(135deg,#a8e6cf,#87ceeb);color:#3a3a3a;box-shadow:0 0 14px rgba(168,230,207,.45);margin-top:2px;}
.btn-email:hover{box-shadow:0 0 22px rgba(168,230,207,.75);transform:translateY(-1px);}
.btn-copy{background:#f0e6ff;color:#6a5acd;}
.btn-copy:hover{background:#e0d0ff;}
.btn-sm{padding:5px 10px;font-size:.72rem;}
.sent-badge{display:inline-block;font-size:.68rem;color:#5a8a6a;margin-left:8px;font-family:'JetBrains Mono',monospace;}

/* ── checkbox custom ── */
.checkbox-row{display:flex;align-items:center;gap:6px;font-size:.8rem;color:#555;margin:6px 0;}
.checkbox-row input[type="checkbox"]{appearance:none;-webkit-appearance:none;width:18px;height:18px;border:2px solid #d4c8b8;border-radius:5px;cursor:pointer;position:relative;transition:all .2s;flex-shrink:0;}
.checkbox-row input[type="checkbox"]:checked{background:#a8e6cf;border-color:#7ac4a5;}
.checkbox-row input[type="checkbox"]:checked::after{content:'\2713';position:absolute;top:-1px;left:2px;font-size:13px;color:#fff;font-weight:700;animation:cbBounce .3s ease;}
@keyframes cbBounce{0%{transform:scale(0);}50%{transform:scale(1.35);}100%{transform:scale(1);}}

/* ── email modal ── */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.38);z-index:1000;align-items:flex-end;justify-content:center;}
.modal-overlay.active{display:flex;}
.modal-content{background:#fff;border-radius:16px 16px 0 0;padding:22px 20px 28px;max-width:560px;width:100%;max-height:85vh;overflow-y:auto;animation:slideUp .3s ease;position:relative;}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.modal-close{position:absolute;top:12px;right:16px;background:none;border:none;font-size:1.3rem;cursor:pointer;color:#aaa;transition:color .2s;line-height:1;}
.modal-close:hover{color:#666;}
.modal-title{font-family:'Caveat',cursive;font-size:1.3rem;color:#5a4a3a;margin-bottom:12px;font-weight:700;}
.email-template{background:#f9f6f2;border:1px solid #e8e0d8;border-radius:8px;padding:14px;font-size:.8rem;line-height:1.65;color:#444;white-space:pre-wrap;font-family:'Inter',sans-serif;margin-bottom:10px;}
.instruction-box{background:#f0f7ff;border:1px dashed #b0c8e8;border-radius:8px;padding:8px 12px;font-size:.75rem;color:#5577aa;margin-bottom:10px;line-height:1.5;}

/* ── follow-up card ── */
.followup-card{background:linear-gradient(135deg,#fef9f0,#fff5f8);border:1px solid #f0ddd0;border-radius:10px;padding:10px 12px;margin-top:8px;}
.followup-title{font-family:'Caveat',cursive;font-size:1.05rem;color:#e87a9e;font-weight:700;}
.countdown{font-family:'JetBrains Mono',monospace;font-size:.8rem;color:#c56a8a;margin:4px 0;}
.countdown.expired{color:#e05050;font-weight:700;}
.followup-date{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:#aaa;margin-bottom:6px;}

/* ── response tracker floating btn ── */
.response-fab{position:fixed;bottom:20px;right:20px;z-index:950;background:linear-gradient(135deg,#f8b4d9,#ffe066);border:none;border-radius:50px;padding:12px 18px;font-size:.8rem;font-weight:600;cursor:pointer;box-shadow:0 2px 12px rgba(248,180,217,.5);animation:fabPulse 2s infinite;color:#5a4a3a;}
@keyframes fabPulse{0%,100%{box-shadow:0 2px 12px rgba(248,180,217,.5);}50%{box-shadow:0 2px 28px rgba(248,180,217,.85);}}

/* ── response panel ── */
.response-panel{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.38);z-index:1001;align-items:center;justify-content:center;}
.response-panel.active{display:flex;}
.response-panel-inner{background:#fff;border-radius:14px;padding:22px;max-width:520px;width:92%;max-height:80vh;overflow-y:auto;}
.response-panel-inner h3{font-family:'Caveat',cursive;font-size:1.4rem;color:#5a4a3a;margin-bottom:12px;font-weight:700;}
.response-clinic-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 0;border-bottom:1px solid #f0e8e0;flex-wrap:wrap;}
.response-clinic-row .rcn{font-size:.78rem;font-weight:600;flex:1;min-width:100px;color:#444;}
.response-clinic-row .rc-btns{display:flex;gap:4px;}
.rc-btn{padding:4px 10px;border:1px solid #e8e0d8;border-radius:6px;font-size:.7rem;cursor:pointer;background:#fff;transition:all .2s;color:#555;}
.rc-btn:hover{background:#fef0f5;}
.rc-btn.marked{background:#a8e6cf;border-color:#7ac4a5;color:#3a5a3a;}

/* ── notes input ── */
.notes-input{width:100%;border:1px solid #e0d8cc;border-radius:6px;padding:5px 8px;font-size:.78rem;font-family:'Inter',sans-serif;margin-top:6px;height:28px;resize:vertical;background:#fefcf8;color:#444;}
.notes-input:focus{outline:none;border-color:#b0c8e8;box-shadow:0 0 0 2px rgba(176,200,232,.3);}
.notes-input::placeholder{color:#c0b8a8;}

/* ── mobile ── */

.checkbox-row{font-size:9px;gap:4px;}
.email-template{font-size:9px;padding:6px;}
.notes-input{font-size:9px;height:22px;}
.progress-wrap{font-size:10px;padding:4px 8px;}
.tutorial-card{padding:6px 10px;font-size:10px;}
.btn{font-size:9px;padding:4px 8px;}
.pencil{width:100px;height:12px;}
.pencil-body{border-radius:1px;}
.pencil-eraser{width:14px;height:10px;top:1px;border-left-width:2px;}
.pencil-tip{top:1px;border-top-width:5px;border-bottom-width:5px;border-right-width:12px;}
.pencil-tip::after{top:3px;left:9px;border-top-width:2px;border-bottom-width:2px;border-right-width:3px;}
.modal-content{padding:12px;}
.countdown{font-size:10px;}
.main-title{font-size:1.5rem;}
.subtitle{font-size:.7rem;}
.city-header{font-size:1.15rem;}
.response-fab{padding:8px 12px;font-size:.7rem;bottom:12px;right:12px;}
}
</style>

const TUTORIALS = [
  {step:'1/4',title:'Welcome! \uD83E\uDE7A',body:"Your NJ vet tech job hunt tracker. 42 clinics, custom emails, follow-up reminders. Let's get you hired!"},
  {step:'2/4',title:'The flow \u270F\uFE0F',body:'Discover \u2192 Email \u2192 Follow Up \u2192 Track Responses. Each clinic guides you through the whole process!'},
  {step:'3/4',title:'Smart reminders \u23F0',body:"When you send an email, a 48-hour countdown starts automatically. We'll tell you exactly when to follow up."},
  {step:'4/4',title:"Let's go! \uD83D\uDE80",body:"Start from the top. You've got this! \uD83D\uDCAA"}
];

/* ══════════ STORAGE ══════════ */
function lsGet(k,d){try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):d;}catch(e){return d;}}
function lsSet(k,v){localStorage.setItem(k,JSON.stringify(v));}
function escHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

/* ══════════ TUTORIALS ══════════ */
function renderTutorials(){
  const wrap=document.getElementById('tutorialWrap');
  wrap.innerHTML='';
  const dismissed=lsGet('vtjh_tut_dismissed',[]);
  TUTORIALS.forEach((t,i)=>{
    if(dismissed.includes(i))return;
    const d=document.createElement('div');
    d.className='tutorial-card';
    d.innerHTML='<span class="tc-step">'+t.step+'</span><span class="tc-body"><b>'+t.title+'</b> &mdash; '+t.body+'</span><button class="tc-dismiss" onclick="dismissTut('+i+')">Got it</button>';
    wrap.appendChild(d);
  });
}
function dismissTut(i){
  const d=lsGet('vtjh_tut_dismissed',[]);
  if(!d.includes(i))d.push(i);
  lsSet('vtjh_tut_dismissed',d);
  renderTutorials();
}

/* ══════════ BUILD SECTIONS ══════════ */
function buildSections(){
  const container=document.getElementById('clinicSections');
  container.innerHTML='';
  const cities=[];
  const seen={};
  CLINICS.forEach(c=>{if(!seen[c.city]){seen[c.city]=true;cities.push(c.city);}});

  cities.forEach(city=>{
    const clinics=CLINICS.filter(c=>c.city===city);
    const region=clinics[0].region;
    const color=REGION_COLORS[region];
    const emoji=REGION_EMOJI[region];
    const collapsed=lsGet('vtjh_city_'+city,false);
    const safeId=city.replace(/[^a-zA-Z0-9]/g,'_');

    const section=document.createElement('div');
    section.className='city-section';

    const header=document.createElement('div');
    header.className='city-header';
    header.innerHTML='<span class="chevron '+(collapsed?'collapsed':'')+'">&#x25BC;</span> '+emoji+' '+city;
    header.onclick=function(){toggleCity(city,this);};
    section.appendChild(header);

    const cardsWrap=document.createElement('div');
    cardsWrap.className='city-cards'+(collapsed?' collapsed-cards':'');
    cardsWrap.id='citycards_'+safeId;
    if(!collapsed)cardsWrap.style.maxHeight='none';

    clinics.forEach(cl=>{
      cardsWrap.appendChild(buildClinicCard(cl,color));
    });

    section.appendChild(cardsWrap);
    container.appendChild(section);
  });
}

function buildClinicCard(cl,borderColor){
  const card=document.createElement('div');
  card.className='clinic-card';
  card.id='card_'+cl.id;
  card.style.borderLeftColor=borderColor;

  const sent=lsGet('vtjh_'+cl.id+'_sent',false);
  const sentAt=lsGet('vtjh_'+cl.id+'_sentAt',null);
  const followedUp=lsGet('vtjh_'+cl.id+'_followedUp',false);
  const responseType=lsGet('vtjh_'+cl.id+'_response',null);
  const notes=lsGet('vtjh_'+cl.id+'_notes','');

  if(responseType) card.classList.add('response-received');

  let h='';

  // response badge
  if(responseType){
    const label=responseType==='called'?'\uD83D\uDCDE Called back':'\uD83D\uDC8C Emailed back';
    h+='<div class="response-badge">\uD83C\uDF89 Response received! ('+label+')</div>';
  }

  // clinic info
  h+='<div class="clinic-name">'+escHtml(cl.name)+'</div>';
  h+='<div class="clinic-meta">'+escHtml(cl.addr);
  if(cl.phone){
    const telNum=cl.phone.replace(/[^0-9+]/g,'');
    h+=' &middot; <a href="tel:'+telNum+'">'+escHtml(cl.phone)+'</a>';
  }
  h+='</div>';
  h+='<div class="clinic-services">\uD83D\uDC3E Services: '+escHtml(cl.services)+'</div>';
  h+='<div class="clinic-looking">\uD83D\uDD0D Looking for: '+escHtml(cl.looking)+'</div>';

  if(!sent){
    // Step 1: DISCOVER
    h+='<div class="nudge-box">\u2728 This could be a great fit! Want to reach out?</div>';
    h+='<button class="btn btn-email" onclick="openEmailModal('+cl.id+')">Email This Clinic</button>';
  } else {
    // Already sent
    const sentDateStr=sentAt?new Date(sentAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'}):'';
    h+='<div class="checkbox-row"><input type="checkbox" checked disabled><label>Email sent</label><span class="sent-badge">\u2705 '+sentDateStr+'</span></div>';

    // Follow-up area
    h+='<div class="followup-card" id="followup_'+cl.id+'">';
    if(!followedUp){
      const followDate=sentAt?new Date(sentAt+48*60*60*1000):null;
      const followStr=followDate?followDate.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}):'--';
      h+='<div class="followup-title">\u23F0 Follow up in 2 days!</div>';
      h+='<div class="followup-date">Follow up on: '+followStr+'</div>';
      h+='<div class="countdown" id="cd_'+cl.id+'"></div>';
      h+='<button class="btn btn-copy btn-sm" style="margin-top:6px;" onclick="openFollowupModal('+cl.id+')">View Follow-Up Email</button>';
    } else {
      h+='<div class="checkbox-row"><input type="checkbox" checked disabled><label>Followed up \u2705</label></div>';
    }
    h+='</div>';
  }

  // notes
  h+='<input class="notes-input" placeholder="Personal notes..." value="'+escHtml(notes).replace(/"/g,'&quot;')+'" oninput="saveNote('+cl.id+',this.value)">';

  card.innerHTML=h;
  return card;
}

/* ══════════ CITY TOGGLE ══════════ */
function toggleCity(city,headerEl){
  const safeId=city.replace(/[^a-zA-Z0-9]/g,'_');
  const wrap=document.getElementById('citycards_'+safeId);
  const chev=headerEl.querySelector('.chevron');
  const isCollapsed=wrap.classList.contains('collapsed-cards');
  if(isCollapsed){
    wrap.classList.remove('collapsed-cards');
    wrap.style.maxHeight='none';
    chev.classList.remove('collapsed');
    lsSet('vtjh_city_'+city,false);
  } else {
    wrap.classList.add('collapsed-cards');
    wrap.style.maxHeight='0';
    chev.classList.add('collapsed');
    lsSet('vtjh_city_'+city,true);
  }
}

/* ══════════ EMAIL MODAL (Step 2) ══════════ */
function openEmailModal(id){
  const cl=CLINICS.find(c=>c.id===id);
  if(!cl)return;
  const modal=document.getElementById('emailModal');
  const body=document.getElementById('emailModalBody');

  const emailText='Hi '+cl.name+' Team,\n\nI\'m writing to express my interest in a Veterinary Technician position at '+cl.name+'. I bring hands-on experience with '+cl.looking+' and a genuine passion for animal care.\n\nI\'ve attached my resume for your review and would welcome the opportunity to discuss how I can contribute to your team.\n\nThank you for your time and consideration.\n\nWarm regards,\n[Your Name Here]';

  body.innerHTML=
    '<div class="modal-title">Email '+escHtml(cl.name)+'</div>'+
    '<div class="email-template" id="emailText_'+id+'">'+escHtml(emailText)+'</div>'+
    '<button class="btn btn-copy" onclick="copyToClip(\'emailText_'+id+'\',\'copyConf_'+id+'\')">Copy Message</button>'+
    '<span id="copyConf_'+id+'" style="font-size:.75rem;color:#5a8a6a;margin-left:8px;"></span>'+
    '<div class="instruction-box" style="margin-top:10px;">\uD83D\uDCCB Step 1: Copy this message. Step 2: Open your email. Step 3: Paste and send. Step 4: Come back here and check the box!</div>'+
    '<div class="checkbox-row" style="margin-top:12px;">'+
      '<input type="checkbox" id="sentCheck_'+id+'" onchange="markSent('+id+',this.checked)">'+
      '<label for="sentCheck_'+id+'">\u2705 I sent the email</label>'+
    '</div>';

  modal.classList.add('active');
}
function closeEmailModal(){document.getElementById('emailModal').classList.remove('active');}

/* ══════════ FOLLOW-UP MODAL (Step 3) ══════════ */
function openFollowupModal(id){
  const cl=CLINICS.find(c=>c.id===id);
  if(!cl)return;
  const modal=document.getElementById('followupModal');
  const body=document.getElementById('followupModalBody');

  const fuText='Hi '+cl.name+' Team,\n\nI wanted to follow up on my recent message regarding the Vet Tech position. I remain very interested and would love to connect when you have a moment.\n\nThank you!\n[Your Name]';

  body.innerHTML=
    '<div class="modal-title">Follow Up \u2014 '+escHtml(cl.name)+'</div>'+
    '<div class="email-template" id="fuText_'+id+'">'+escHtml(fuText)+'</div>'+
    '<button class="btn btn-copy" onclick="copyToClip(\'fuText_'+id+'\',\'fuConf_'+id+'\')">Copy Follow-Up</button>'+
    '<span id="fuConf_'+id+'" style="font-size:.75rem;color:#5a8a6a;margin-left:8px;"></span>'+
    '<div class="checkbox-row" style="margin-top:12px;">'+
      '<input type="checkbox" id="fuCheck_'+id+'" onchange="markFollowedUp('+id+',this.checked)">'+
      '<label for="fuCheck_'+id+'">\u2705 I followed up</label>'+
    '</div>';

  modal.classList.add('active');
}
function closeFollowupModal(){document.getElementById('followupModal').classList.remove('active');}

/* ══════════ CLIPBOARD ══════════ */
function copyToClip(elId,confId){
  const el=document.getElementById(elId);
  if(!el)return;
  const text=el.textContent||el.innerText;
  navigator.clipboard.writeText(text).then(()=>{
    const conf=document.getElementById(confId);
    if(conf){conf.textContent='Copied! \u2713';setTimeout(()=>{conf.textContent='';},2500);}
  }).catch(()=>{
    // fallback
    const ta=document.createElement('textarea');
    ta.value=text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    const conf=document.getElementById(confId);
    if(conf){conf.textContent='Copied! \u2713';setTimeout(()=>{conf.textContent='';},2500);}
  });
}

/* ══════════ STATE MUTATIONS ══════════ */
function markSent(id,checked){
  if(!checked)return;
  const now=Date.now();
  lsSet('vtjh_'+id+'_sent',true);
  lsSet('vtjh_'+id+'_sentAt',now);
  closeEmailModal();
  rebuildAll();
}

function markFollowedUp(id,checked){
  if(!checked)return;
  lsSet('vtjh_'+id+'_followedUp',true);
  lsSet('vtjh_'+id+'_followedUpAt',Date.now());
  closeFollowupModal();
  rebuildAll();
}

function saveNote(id,val){lsSet('vtjh_'+id+'_notes',val);}

/* ══════════ RESPONSE PANEL (Step 4) ══════════ */
function openResponsePanel(){
  const panel=document.getElementById('responsePanel');
  const list=document.getElementById('responsePanelList');
  list.innerHTML='';

  const applied=CLINICS.filter(c=>lsGet('vtjh_'+c.id+'_sent',false));
  if(applied.length===0){
    list.innerHTML='<p style="font-size:.82rem;color:#aaa;text-align:center;padding:24px 0;">No applications sent yet. Start emailing clinics!</p>';
  } else {
    applied.forEach(cl=>{
      const resp=lsGet('vtjh_'+cl.id+'_response',null);
      const row=document.createElement('div');
      row.className='response-clinic-row';
      row.innerHTML=
        '<span class="rcn">'+escHtml(cl.name)+'</span>'+
        '<div class="rc-btns">'+
          '<button class="rc-btn '+(resp==='called'?'marked':'')+'" onclick="markResponse('+cl.id+',\'called\')">&#x1F4DE; They called!</button>'+
          '<button class="rc-btn '+(resp==='emailed'?'marked':'')+'" onclick="markResponse('+cl.id+',\'emailed\')">&#x1F48C; They emailed!</button>'+
        '</div>';
      list.appendChild(row);
    });
  }
  panel.classList.add('active');
}
function closeResponsePanel(){document.getElementById('responsePanel').classList.remove('active');}

function markResponse(id,type){
  lsSet('vtjh_'+id+'_response',type);
  lsSet('vtjh_'+id+'_responseAt',Date.now());
  // refresh the panel and cards
  openResponsePanel();
  buildSections();
  updateProgress();
  updateCountdowns();
}

/* ══════════ PROGRESS ══════════ */
function updateProgress(){
  let applied=0,responses=0;
  CLINICS.forEach(c=>{
    if(lsGet('vtjh_'+c.id+'_sent',false))applied++;
    if(lsGet('vtjh_'+c.id+'_response',null))responses++;
  });
  document.getElementById('appliedCount').textContent='Applied to '+applied+' / '+TOTAL+' clinics';
  document.getElementById('progressBar').style.width=((applied/TOTAL)*100).toFixed(1)+'%';
  document.getElementById('responseCount').textContent='Responses received: '+responses;
}

/* ══════════ COUNTDOWNS (atomic clock) ══════════ */
function updateCountdowns(){
  CLINICS.forEach(cl=>{
    const sentAt=lsGet('vtjh_'+cl.id+'_sentAt',null);
    const followedUp=lsGet('vtjh_'+cl.id+'_followedUp',false);
    if(!sentAt||followedUp)return;
    const el=document.getElementById('cd_'+cl.id);
    if(!el)return;
    const target=sentAt+(48*60*60*1000);
    const remaining=target-Date.now();
    if(remaining<=0){
      el.textContent='\uD83D\uDD14 Time to follow up! Send a quick check-in.';
      el.classList.add('expired');
    } else {
      const days=Math.floor(remaining/(24*60*60*1000));
      const hours=Math.floor((remaining%(24*60*60*1000))/(60*60*1000));
      const mins=Math.floor((remaining%(60*60*1000))/(60*1000));
      let txt='';
      if(days>0)txt+=days+' day'+(days!==1?'s':'')+', ';
      txt+=hours+' hour'+(hours!==1?'s':'')+', ';
      txt+=mins+' minute'+(mins!==1?'s':'')+' remaining';
      el.textContent=txt;
      el.classList.remove('expired');
    }
  });
}

/* ══════════ REBUILD ALL ══════════ */
function rebuildAll(){
  buildSections();
  updateProgress();
  updateCountdowns();
}

/* ══════════ INIT ══════════ */
renderTutorials();
buildSections();
updateProgress();
updateCountdowns();

// tick countdowns every 60 seconds
setInterval(updateCountdowns,60000);

// close modals on overlay click
document.getElementById('emailModal').addEventListener('click',function(e){if(e.target===this)closeEmailModal();});
document.getElementById('followupModal').addEventListener('click',function(e){if(e.target===this)closeFollowupModal();});
document.getElementById('responsePanel').addEventListener('click',function(e){if(e.target===this)closeResponsePanel();});
</script>
