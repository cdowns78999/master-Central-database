<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ozzy — forever loved</title>
<style>
  :root {
    --cream: #faf4ea;
    --cream-2: #f4ead8;
    --cream-3: #efe2c9;
    --warm-beige: #e8d9bd;
    --ink: #4a3b2a;
    --ink-soft: #7a6a55;
    --accent: #b8896b;
    --shadow: 0 8px 28px rgba(122, 90, 55, 0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100%;
    font-family: "Georgia", "Iowan Old Style", "Palatino", serif;
    color: var(--ink);
    background: var(--cream);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* slow ambient gradient shift */
  body {
    background:
      radial-gradient(ellipse at 20% 10%, #fbf1dc 0%, transparent 55%),
      radial-gradient(ellipse at 85% 30%, #f3e6cb 0%, transparent 60%),
      radial-gradient(ellipse at 50% 95%, #eedfc2 0%, transparent 55%),
      linear-gradient(180deg, #faf4ea 0%, #f4ead8 100%);
    background-size: 200% 200%;
    animation: driftBg 36s ease-in-out infinite alternate;
    position: relative;
    overflow-x: hidden;
  }

  @keyframes driftBg {
    0%   { background-position: 0% 0%, 100% 0%, 50% 100%, 0% 0%; }
    100% { background-position: 10% 20%, 85% 15%, 55% 90%, 0% 0%; }
  }

  /* floating motes */
  .motes {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .mote {
    position: absolute;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(184,137,107,0.55), rgba(184,137,107,0));
    opacity: 0.55;
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0%   { transform: translateY(110vh) translateX(0) scale(0.8); opacity: 0; }
    10%  { opacity: 0.6; }
    50%  { transform: translateY(55vh) translateX(12px) scale(1); }
    90%  { opacity: 0.4; }
    100% { transform: translateY(-10vh) translateX(-8px) scale(0.7); opacity: 0; }
  }

  /* layout */
  .page {
    position: relative;
    z-index: 1;
    max-width: 600px;
    margin: 0 auto;
    padding: 28px 22px 80px;
  }

  /* back arrow */
  .back-btn {
    position: fixed;
    top: 18px;
    left: 18px;
    z-index: 10;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: 1px solid rgba(122, 90, 55, 0.18);
    background: rgba(255, 251, 242, 0.78);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink);
    text-decoration: none;
    font-size: 18px;
    line-height: 1;
    box-shadow: var(--shadow);
    transition: transform 0.25s ease, background 0.25s ease;
  }
  .back-btn:hover { transform: translateX(-2px); background: rgba(255, 251, 242, 1); }

  /* header */
  header {
    text-align: center;
    padding: 72px 12px 40px;
  }
  header .glyph {
    display: inline-block;
    font-size: 22px;
    color: var(--accent);
    letter-spacing: 0.3em;
    margin-bottom: 14px;
    opacity: 0.85;
    animation: glowPulse 5s ease-in-out infinite;
  }
  @keyframes glowPulse {
    0%, 100% { opacity: 0.65; transform: scale(1); }
    50%      { opacity: 1;    transform: scale(1.05); }
  }
  header h1 {
    font-family: "Didot", "Bodoni 72", "Playfair Display", Georgia, serif;
    font-weight: 400;
    font-size: clamp(58px, 14vw, 92px);
    letter-spacing: 0.02em;
    color: var(--ink);
    line-height: 1;
    margin-bottom: 18px;
  }
  header p.subtitle {
    font-style: italic;
    font-size: 17px;
    color: var(--ink-soft);
    letter-spacing: 0.05em;
  }

  /* thin divider */
  .divider {
    display: block;
    width: 64px;
    height: 1px;
    margin: 44px auto;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.6;
  }

  /* photo grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    margin: 0 auto;
  }
  @media (min-width: 480px) {
    .grid { grid-template-columns: repeat(3, 1fr); gap: 16px; }
  }

  .photo-slot {
    position: relative;
    aspect-ratio: 1 / 1;
    border-radius: 18px;
    background:
      linear-gradient(145deg, #f3e6cc 0%, #e8d6b4 100%);
    box-shadow:
      inset 0 0 0 1px rgba(184, 137, 107, 0.18),
      var(--shadow);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: transform 0.35s ease, box-shadow 0.35s ease;
  }
  .photo-slot:hover {
    transform: translateY(-2px);
    box-shadow:
      inset 0 0 0 1px rgba(184, 137, 107, 0.28),
      0 12px 32px rgba(122, 90, 55, 0.18);
  }
  .photo-slot img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none; /* hidden until src is set */
  }
  .photo-slot img[src]:not([src=""]) { display: block; }
  .photo-slot img[src]:not([src=""]) ~ .slot-inner { display: none; }

  .slot-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    color: var(--accent);
    opacity: 0.55;
  }
  .slot-inner svg { width: 30px; height: 30px; }
  .slot-label {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-soft);
    opacity: 0.7;
  }

  /* inscription */
  .inscription {
    margin: 56px auto 0;
    padding: 32px 22px;
    text-align: center;
    border-top: 1px solid rgba(184, 137, 107, 0.18);
    border-bottom: 1px solid rgba(184, 137, 107, 0.18);
  }
  .inscription blockquote {
    font-family: "Didot", "Bodoni 72", Georgia, serif;
    font-style: italic;
    font-size: 20px;
    line-height: 1.6;
    color: var(--ink-soft);
    letter-spacing: 0.01em;
  }
  .inscription blockquote::before,
  .inscription blockquote::after {
    content: "";
    display: block;
    width: 28px;
    height: 1px;
    margin: 14px auto;
    background: var(--accent);
    opacity: 0.4;
  }

  /* footer note */
  footer {
    text-align: center;
    margin-top: 56px;
    font-size: 12px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-soft);
    opacity: 0.55;
  }
  footer span.heart {
    color: var(--accent);
    margin: 0 6px;
    opacity: 0.8;
  }
</style>
</head>
