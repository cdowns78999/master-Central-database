localStorage.setItem('wpal_editor', "<h2>THENNOW Is Building Toward Something \u2014 And This Double Release Is the Proof</h2>\n\n<p>There's a particular kind of underground artist who grows quietly for a long time, stacking plays and building a catalog without ever quite breaking into the wider conversation \u2014 and then, at some point, something shifts. The numbers start moving differently. The releases start landing with more weight. The trajectory bends upward in a way that feels less like luck and more like arrival. THENNOW is at that bend right now.</p>\n\n<p>The Chicago-region bass artist is dropping two tracks simultaneously on March 27th \u2014 an original, and <em>TAKE vip (Supertask \u2013 Get to You Remix)</em>, a remix that takes Supertask and Saint Sinner's \"Get to You\" somewhere significantly darker and more disorienting than the source material. Two songs, one drop date, independent release. It's a calculated move from someone who's been paying attention to how momentum works.</p>\n\n<h2>The Numbers Tell a Story</h2>\n\n<p>Before we get into what these songs actually sound like, it's worth pausing on the context \u2014 because context is what makes a release like this legible as more than just two more tracks.</p>\n\n<p>THENNOW logged double-digit percentage growth on SoundCloud in 2025. In an era where most independent bass artists are fighting for incremental traction, that's not a small thing. The catalog has multiple entries sitting in the 4,200\u20134,800 play range: <em>FEEL ALIVE MUSIC</em>, <em>Dum &amp; Dummer (THENNOW Remix)</em>, <em>HELIX (THENNOW Remix)</em>, <em>Make It Home</em>. These aren't viral spikes \u2014 they're consistent performers across a body of work, which means there's an audience that keeps returning.</p>\n\n<p>The top performer right now is <em>MOONSPELL (THENNOW Remix)</em> \u2014 an isoxo remix that just crossed 5,300 plays and edged out the long-standing fan favorite <em>HIDE N' SEEK</em> for the top spot. That passing of the baton from an older track to a newer one isn't just a stat. It's evidence that the catalog is gaining, not coasting.</p>\n\n<p>Now THENNOW is launching 2026 with double singles out of the gate. That's a statement about confidence and output. It signals an artist who's done waiting for the right moment and has decided to manufacture it instead.</p>\n\n<h2>What the Music Is Actually Doing</h2>\n\n<p>The two tracks are designed to work as a pair \u2014 complementary in weight and energy, distinct enough in character to demonstrate range. Think of them as two views of the same city from different angles: you recognize the skyline, but the light is hitting differently.</p>\n\n<p>Both are bass bangers in the purest sense \u2014 heavy percussion, sharp sound design, the kind of low-end pressure that makes a system work for its money. But THENNOW isn't just stacking sub and calling it a day. There's clarity here. The mixes punch without turning to mud. That's harder to pull off than it sounds, and it's the difference between tracks that hit in a club and tracks that hit <em>and</em> translate on headphones or in a car at 2 a.m.</p>\n\n<p><em>TAKE vip (Supertask \u2013 Get to You Remix)</em> is the more immediately distinctive of the two. It takes the emotional openness of the Supertask and Saint Sinner original and runs it through something colder and stranger \u2014 warped atmospheres, a low-end that snarls rather than swells, the vocal floating in the middle of it all like a transmission from somewhere you're not sure you want to go. It's dreamy in the way a bad dream is dreamy. The original had feeling; the remix takes that feeling and hangs it upside down. The result is something late-night and a little creepy, heavy in a way that gets under the skin rather than just pressing on the chest.</p>\n\n<p>The original track holds its own alongside the remix without trying to replicate it. Where the VIP spirals inward, the original carries outward energy \u2014 built for rooms, built for movement. Together, they give the listener two different emotional entry points into the same sonic world THENNOW has been refining.</p>\n\n<h2>What Underground Credibility Looks Like in 2026</h2>\n\n<p>One of the things that makes THENNOW's trajectory worth watching is that it's been built almost entirely on the strength of the music. No major label infrastructure, no algorithmic shortcut. Independent. Chicago underground. The kind of scene where you earn your plays because the people listening actually care about what they're hearing.</p>\n\n<p>That foundation matters when an artist starts to scale, because it means the audience is real and the growth has roots. A catalog that stacks genuine listens across multiple tracks doesn't disappear overnight. It compounds. Which is part of why a double-single drop from an artist in THENNOW's position feels different from the same move made by someone starting from zero \u2014 there's already a base of listeners who know the name, trust the sound, and are primed to receive something new.</p>\n\n<p>The live translation is the next piece. THENNOW is actively working to carry the online momentum into physical rooms \u2014 which, for a bass artist who builds tracks the way these are built, is the logical extension. This is music that was engineered to function at volume in space. The production choices aren't accidental. The clarity in the mix, the way the low-end sits without overwhelming \u2014 these are decisions made by someone who's thinking about how a track performs in a club, not just on a stream count.</p>\n\n<h2>The Turning Point Is Now</h2>\n\n<p>Not every artist has a clean turning point. Most careers are gradual, almost imperceptible in their movement until you look back and realize everything changed. But sometimes there's a moment where the pieces align in a way that's legible in real time \u2014 where the output matches the growth, the ambition matches the foundation, and a release feels less like another drop and more like a gear shift.</p>\n\n<p>That's what's happening here. THENNOW has spent the last few years building something real in the Chicago underground bass scene. The catalog is deep enough and consistent enough that this isn't a debut \u2014 it's a consolidation. The double-single format says something about how seriously this moment is being treated. The music itself is the best argument: dense, intentional, functional, and sharp in a way that distinguishes it from the crowded field of bass releases that land every week.</p>\n\n<p>Keep this name. The arc is bending.</p>\n\n<p><em>TAKE vip (Supertask \u2013 Get to You Remix)</em> and SONG1 drop March 27th, independently released. Follow THENNOW on SoundCloud to stay current with the catalog.</p>\n\n<hr>\n");
