localStorage.setItem('wpal_editor', "<h2>I Need You to Stop What You're Doing and Listen to This THENNOW Drop</h2>\n\n<p>Okay, I'm not doing the slow build here. No throat-clearing. No \"emerging artist to watch\" setup. I heard these tracks and immediately needed to tell someone about them, so here we go.</p>\n\n<p>THENNOW \u2014 Chicago-region bass producer, underground scene, consistent SoundCloud grower, catalog is already hard \u2014 is dropping a <strong>double single on March 27th</strong>. Two tracks. Both of them are filthy. And the pairing is so intentional it almost makes me mad that more artists don't think like this.</p>\n\n<h2>The Remix Hit Different</h2>\n\n<p>The first thing I heard was <strong>\"TAKE vip (Supertask \u2013 Get to You Remix)\"</strong> and I genuinely sat back in my chair for a second.</p>\n\n<p>You know Supertask and Saint Sinner's \"Get to You\"? Has a whole emotional thing going on \u2014 warmth, feeling, the good kind of heavy. THENNOW took that track and made it <em>creepy</em>. Not in a cheap haunted-house way. In a late-night, something-is-wrong-but-in-the-best-possible-way kind of way. The atmospheres are warped. The vocal sounds like it's coming from a different dimension. The low-end doesn't sit under the track, it coils around it.</p>\n\n<p>This is the kind of remix that makes you forget the original ever existed in its original form. You can't unhear what THENNOW did to it. It has fully colonized the source material and made it its own. That's not easy to do. Most remixes don't do it. This one does.</p>\n\n<h2>And Then SONG1 Came On</h2>\n\n<p>If the VIP is the one that makes you tilt your head and stare into the middle distance, SONG1 is the one that makes you physically react. Sharp sound design. Heavy percussion \u2014 like genuinely thick, lands-in-your-chest percussion. Still totally clear in the mix despite all that density. That last part matters because a lot of bass tracks get heavy at the cost of getting muddy. Not this one.</p>\n\n<p>The two tracks together work like a one-two. The VIP gets your head right. SONG1 makes sure the rest of you catches up. Whoever put these together as a pair made the right call.</p>\n\n<h2>This Producer Has Been Putting in the Work</h2>\n\n<p>Here's the context you need. THENNOW had <strong>double-digit SoundCloud growth in 2025</strong>. Not based on one viral track \u2014 based on a catalog that keeps performing. The <strong>isoxo \"MOONSPELL\" remix just passed 5,300 plays</strong> and is now the top performer in the discography. And before that there were already four or five tracks all sitting in the 4,200\u20134,800 range \u2014 <strong>\"FEEL ALIVE MUSIC,\" \"HELIX (THENNOW Remix),\" \"Dum &amp; Dummer (THENNOW Remix),\" \"Make It Home\"</strong>. All of them hanging in that territory consistently.</p>\n\n<p>This isn't a one-hit-wonder situation. This is an artist who built a floor and keeps raising the ceiling. Every release comes out sounding more focused and more confident than the last. And now we've got a double single drop launching 2026 and both tracks are clearly operating at the top of what this producer can do.</p>\n\n<p>That's the kind of momentum you want to be in front of. Not chasing after it once everyone already knows.</p>\n\n<h2>Live Shows Are Coming Too</h2>\n\n<p>THENNOW is also starting to move from online to physical \u2014 translating the SoundCloud numbers into actual live performances in the Chicago region. I want to be in one of those rooms when these tracks hit a real system. The VIP on a club setup is going to be a religious experience. I'm calling it now.</p>\n\n<h2>Why This Drop Matters Right Now</h2>\n\n<p>Bass music in 2026 has a ton of artists doing their best impression of what the genre is supposed to sound like. THENNOW is not doing that. These tracks have a specific identity \u2014 a point of view about what heavy bass music can be when you push it somewhere weirder and more interesting than the obvious play. The VIP goes headier and darker than the source material dared to go. SONG1 is club-ready without being generic. Sharp, specific, intentional.</p>\n\n<p>That's what separates the artists who last from the artists who just fill a moment. THENNOW is building something that lasts.</p>\n\n<p>March 27th. Double single. Both tracks are going on every playlist I have. You've been warned.</p>\n\n<hr>\n\n<p><em>THENNOW drops SONG1 and \"TAKE vip (Supertask \u2013 Get to You Remix)\" on March 27th. Follow on SoundCloud. Get in now.</em></p>\n");
