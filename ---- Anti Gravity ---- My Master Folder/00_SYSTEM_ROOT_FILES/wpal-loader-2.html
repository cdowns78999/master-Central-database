localStorage.setItem('wpal_editor', "<h2>THENNOW's Double Single Is a Study in How Remixes Actually Work</h2>\n\n<p>A remix is a specific kind of artistic claim. When you take someone else's record \u2014 something with its own emotional logic, its own established relationship with listeners who already love it \u2014 and decide to pull it somewhere new, you're not just rearranging sounds. You're arguing with the original. You're saying: <em>here is what I heard underneath this, and you should hear it too.</em> It's a bold move. It's also where a producer's real sensibility gets revealed, because you can't hide behind novelty when the source material is already beloved. You have to earn the reinterpretation.</p>\n\n<p>THENNOW earns it.</p>\n\n<p>The Chicago-region bass producer is releasing a double single on March 27th: an original called <strong>SONG1</strong> and <strong>\"TAKE vip (Supertask \u2013 Get to You Remix)\"</strong>, a rework of the Supertask and Saint Sinner collaboration \"Get to You.\" Taken together, these two tracks read less like a routine release and more like an artistic statement \u2014 a dual exhibition of what this producer's sensibility looks like when applied to found material versus built-from-scratch material. The contrast is illuminating, and it's clearly intentional.</p>\n\n<h2>On the Art of the Remix Decision</h2>\n\n<p>Before we get into the sonic specifics, it's worth sitting with the choice of source material for a moment. Supertask and Saint Sinner's \"Get to You\" carries emotional warmth at its core. It has feeling. That's not incidental \u2014 it's the whole architecture of the track. What THENNOW does is take that emotional core and subject it to pressure, pulling it into what the release describes as \"creepier, headier territory.\" Warped atmospheres. A vocal that feels like it's being heard through water or fog. Low-end that snarls instead of simply supporting.</p>\n\n<p>This is a specific kind of remix philosophy, and it's one worth naming. Rather than amplifying what was already there \u2014 the warmth, the uplift, the clarity \u2014 THENNOW inverts it. The emotional content of the original becomes a kind of tension, something the production wraps around and transforms. The dreamy quality of the source doesn't disappear; it curdles, slightly, into something more complex and late-night. What was earnest becomes haunted.</p>\n\n<p>That's a genuine artistic perspective. And the fact that THENNOW can execute it at the production level \u2014 that the atmospheres are genuinely warped, that the low-end genuinely snarls, that the vocal genuinely sounds like it belongs in this new darker context rather than just sitting awkwardly on top of a reskinned arrangement \u2014 is proof that this isn't a concept that outran its execution. The intention and the craft are moving together.</p>\n\n<h2>What Sound Design Tells You About an Artist</h2>\n\n<p>The production notes on this release are precise in a way that reveals how THENNOW thinks. The description of these tracks \u2014 \"sharp sound design, thick heavy percussion, punches through the mix without losing clarity\" \u2014 sounds like a simple summary, but it's actually a description of a specific technical and aesthetic problem that most bass producers don't fully solve.</p>\n\n<p>The tension at the heart of heavy bass music is density versus readability. The more you add \u2014 more layers, more weight, more low-end information \u2014 the more you risk losing the listener inside the sound. Things blur. The impact becomes overwhelming instead of satisfying. The solution is not to add less, but to be ruthlessly precise about what you add and where you put it in the frequency spectrum. THENNOW's tracks are described as dense and detailed, yet immediate and clear. That means the problem got solved, which means there's real engineering discipline happening at the production level, not just creative intuition.</p>\n\n<p>The catalog confirms this is a consistent quality, not a one-time achievement. Multiple tracks in the 4,200\u20134,800 play range \u2014 <strong>\"FEEL ALIVE MUSIC,\" \"Dum &amp; Dummer (THENNOW Remix),\" \"HELIX (THENNOW Remix),\" \"Make It Home\"</strong> \u2014 suggest an artist who has found a production approach and developed it with increasing precision over time. The top performer, the <strong>isoxo \"MOONSPELL\" remix at 5,300+ plays</strong>, is the current ceiling of a catalog that has been steadily raising that ceiling with each release cycle.</p>\n\n<h2>The Pairing as Statement</h2>\n\n<p>The decision to release these two tracks simultaneously rather than separately is the kind of choice that invites interpretation. SONG1 and \"TAKE vip\" are described as foils \u2014 complementary in weight and character, representing \"two distinct but connected looks at the same heavy, club-ready universe.\" That's deliberate curatorial language, and it suggests THENNOW is thinking about discography in a way that extends beyond the individual track.</p>\n\n<p>This approach has precedent in how artists across genres have used double singles, EPs, and companion releases to create meaning through context. When two pieces of work arrive together, they define each other. The listener's relationship with SONG1 is shaped by having heard \"TAKE vip\" first, and vice versa. Each track becomes more specific in identity because the other one exists. The space between them is where the full artistic statement lives.</p>\n\n<p>For THENNOW, that space seems to be about range within constraint. The constraint is the world the producer inhabits \u2014 heavy, bass-forward, underground, Chicago-influenced, built for rooms. The range is everything that's possible within that world: the atmospheric creep of the remix sitting alongside the sharper, more immediate impact of the original. Same sensibility. Different expressions. That's what a mature catalog sounds like in progress.</p>\n\n<h2>Momentum That Comes From the Work</h2>\n\n<p>THENNOW's double-digit SoundCloud growth in 2025 is meaningful precisely because of how it happened \u2014 organically, through a catalog that kept performing, through an underground audience that kept sharing, through work that compounded interest rather than burning bright and fading. In an ecosystem that rewards spectacle and viral moments, slow-build growth driven by consistent quality is genuinely unusual.</p>\n\n<p>The move into live performance \u2014 translating online momentum into shows in the Chicago region \u2014 is the logical extension of that kind of trajectory. The audience built online is real. The question is whether it translates to rooms, and the answer almost always comes from the quality of the material. Based on what this double single demonstrates about craft, intention, and artistic coherence, the answer looks promising.</p>\n\n<p>This release is worth your attention not because THENNOW is about to blow up \u2014 though that may come \u2014 but because the work itself is doing something interesting and doing it well. In a genre where technical ambition often outpaces artistic clarity, here is a producer who seems to know exactly what they're making and why. That's rare enough to notice.</p>\n\n<hr>\n\n<p><em>THENNOW releases SONG1 and \"TAKE vip (Supertask \u2013 Get to You Remix)\" on March 27th, independently. Follow their SoundCloud catalog to hear the full arc of what this artist is building.</em></p>\n");
