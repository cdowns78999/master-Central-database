localStorage.setItem('wpal_editor', "<h2>THENNOW Is Dropping a Double Single and Both of Them Are Built for the Club</h2>\n\n<p>There are artists who make music for headphones, and there are artists who make music for systems. THENNOW makes music for systems \u2014 the kind of bass-forward, precision-engineered club weapons that sound wrong anywhere except a room where the floor is shaking. The Chicago-region producer is back with a double single release on March 27th, and if you're a DJ looking for your next peak-hour tool, you need to be paying attention right now.</p>\n\n<p>The release pairs an original \u2014 <strong>SONG1</strong> \u2014 with a remix of Supertask and Saint Sinner's \"Get to You,\" retitled <strong>\"TAKE vip (Supertask \u2013 Get to You Remix)\"</strong>. Two tracks. Two distinct personalities. One unified vision of what bass music is supposed to do when the lights go down and the room is full.</p>\n\n<h2>What Makes These Tracks DJ Weapons</h2>\n\n<p>Let's talk about what DJs actually need from a record. They need something that sounds like nothing else in the mix. They need something that reads clearly at high volume \u2014 where the arrangement communicates through the chaos and the low-end lands without turning to mud. They need tracks that give them options: tools they can use to build tension or release it, depending on where they are in the set.</p>\n\n<p>THENNOW delivers both of those functions with this double drop, and the fact that the two tracks feel intentionally paired is part of what makes this a smart release.</p>\n\n<p><strong>\"TAKE vip\"</strong> goes for the creep. This is your late-night weapon, your 2 AM tool. It takes the emotional warmth of Supertask and Saint Sinner's original \u2014 a track that had genuine feeling in it \u2014 and drags it into darker, headier territory. The atmospheres are warped. The vocal floats somewhere between dreamy and unnerving. And underneath all of it, the low-end doesn't just sit there \u2014 it snarls. It's the kind of track that makes a dancefloor feel like it's tilting sideways. That's a very specific sensation to engineer, and THENNOW pulls it off.</p>\n\n<p><strong>SONG1</strong> plays the counterpoint. Where the VIP leans atmospheric, SONG1 brings complementary weight. Sharp sound design, thick percussion that punches through the mix \u2014 this one is more immediate, more functional in the classic drop-ready sense. If \"TAKE vip\" is the track that makes the crowd look at each other like <em>what is happening right now</em>, SONG1 is what you drop right after to make sure they don't actually leave their bodies.</p>\n\n<p>Together they cover a range. That's exactly what you want in a double single \u2014 two tracks that work independently but make more sense as a pair. Smart thinking from an artist who clearly understands how records get used in real DJ sets.</p>\n\n<h2>The Catalog Numbers Don't Lie</h2>\n\n<p>Here's where we brag a little. THENNOW recorded double-digit growth on SoundCloud in 2025 without a major label push, without a viral moment, without the algorithmic lottery \u2014 just consistent, quality output finding its audience in the underground. That's the kind of growth that actually sticks.</p>\n\n<p>The flagship is <strong>isoxo's \"MOONSPELL (THENNOW Remix)\"</strong> \u2014 5,300+ plays and climbing, currently outperforming the previously top-performing \"HIDE N' SEEK.\" That puts it at the top of a catalog where multiple records are sitting comfortably in the 4,200\u20134,800 play range. <strong>\"FEEL ALIVE MUSIC,\" \"Dum &amp; Dummer (THENNOW Remix),\" \"HELIX (THENNOW Remix),\" \"Make It Home\"</strong> \u2014 all of them landing in that range. That's not one breakout track carrying dead weight. That's a catalog performing at a consistent floor, with a top performer pushing the ceiling higher with every release cycle.</p>\n\n<p>Double-digit growth across a catalog like that means the audience isn't just finding one song and bouncing. They're staying. They're going deeper into the discography. That's how you know an artist is building something real.</p>\n\n<h2>Chicago Bass and What That Means</h2>\n\n<p>Chicago has always had a scene that punches harder than it gets credit for. From the city's deep roots in house and footwork to the current crop of bass artists working the underground circuit, there's a sound culture there that produces artists who understand rhythm in a specific, almost cellular way. THENNOW is operating out of that ecosystem \u2014 drawing on the energy of a market that doesn't hype things up without earning it.</p>\n\n<p>That matters for a bass artist in 2026 because the genre is at a crossroads. There's a version of bass music that leans fully mainstream \u2014 polished, softened, formatted for streaming-first listeners who want the drop without the discomfort. And then there's the version THENNOW is making: dense, detailed, built for rooms, willing to go creepy and heavy and complicated because that's what actually works at 1 AM when everyone in the room is locked in.</p>\n\n<p>The fact that this producer is now translating online momentum into live shows is the natural next step. These are tracks built to be played. Hearing them on a real system, in a real room, is going to be the full version of the experience \u2014 and if you're in the Chicago region this spring, you should be watching for that opportunity.</p>\n\n<h2>The Bigger Picture for 2026</h2>\n\n<p>THENNOW is opening 2026 by launching <strong>double singles</strong> \u2014 a deliberate choice to drop two connected pieces of work simultaneously rather than spacing them out for algorithmic optimization. That's a statement about how this artist thinks about releases: as artistic packages, not content drops. It's the kind of thinking that separates producers who are building a discography from producers who are just feeding a platform.</p>\n\n<p>With a catalog already performing well, a top-performing remix putting new eyes on the name, and now a double drop that showcases range \u2014 creepy atmospheric remix <em>and</em> pure club-ready original in the same package \u2014 THENNOW is setting up 2026 to be a momentum year. The underground audience that's been following along already knows what's going on here. The question is how long it takes everyone else to catch up.</p>\n\n<p>March 27th. Double single. Mark it. Play it loud.</p>\n\n<hr>\n\n<p><em>THENNOW's double single SONG1 and \"TAKE vip (Supertask \u2013 Get to You Remix)\" releases March 27th. Follow on SoundCloud and stay locked for live show announcements in the Chicago region.</em></p>\n");
