<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude × Music Business — 12-Tool Curriculum</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ========== TOP NAV ========== -->
  <header class="topbar">
    <div class="brand">
      <span class="brand-glyph">🎓</span>
      <h1 class="brand-title">
        Claude <span class="x-divider">×</span> Music Business
        <span class="brand-sub">12-Tool Curriculum</span>
      </h1>
    </div>

    <div class="topbar-controls">
      <div class="progress-wrap" title="Lessons completed">
        <div class="progress-label">
          <span id="progressCount">0</span> / 12 complete
        </div>
        <div class="progress-track">
          <div id="progressFill" class="progress-fill"></div>
        </div>
      </div>
      <button id="resetBtn" class="reset-btn" type="button">Reset progress</button>
    </div>
  </header>

  <!-- ========== TILE GRID ========== -->
  <main class="grid-wrap">
    <div id="tileGrid" class="tile-grid" role="list"></div>
  </main>

  <!-- ========== MODAL ========== -->
  <div id="lessonModal" class="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <header class="modal-head">
        <div class="modal-head-left">
          <span id="modalIcon" class="modal-icon">🎯</span>
          <div class="modal-head-text">
            <div class="modal-eyebrow">
              Lesson <span id="modalNumber">1</span>
              <span class="modal-pill" id="modalPill">easy</span>
            </div>
            <h2 id="modalTitle" class="modal-title">Skills</h2>
          </div>
        </div>
        <button id="closeModal" class="icon-btn" aria-label="Close">×</button>
      </header>

      <section id="modalBody" class="modal-body">
        <!-- Markdown-rendered sections appear here -->
      </section>

      <footer class="modal-foot">
        <button id="prevLesson" class="nav-btn" type="button">← Prev</button>
        <button id="completeBtn" class="complete-btn" type="button" disabled>
          Mark complete
        </button>
        <button id="nextLesson" class="nav-btn" type="button">Next →</button>
      </footer>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
