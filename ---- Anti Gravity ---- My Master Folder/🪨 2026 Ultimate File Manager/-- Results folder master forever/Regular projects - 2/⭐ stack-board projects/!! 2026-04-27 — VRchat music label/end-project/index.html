<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VRchat Music Label — A&R Console</title>
<link rel="stylesheet" href="roster.css" />
<style>
  /* ============================================================
     VRchat Music Label — Agent A9 shell
     Warm indie-label palette: pink → orange gradient + cream + ink
     Vinyl-record motifs, foil-stamp accents, no CDN
     ============================================================ */
  :root{
    --ink:#1a1410;
    --ink-soft:#3b2a23;
    --paper:#fff7ee;
    --paper-2:#fdebd9;
    --cream:#faddc0;
    --pink:#ff5f8f;
    --pink-2:#ff7aa8;
    --orange:#ff8a3d;
    --orange-2:#ffb066;
    --gold:#caa15e;
    --grid:rgba(26,20,16,.08);
    --hairline:rgba(26,20,16,.14);
    --shadow:0 18px 40px -22px rgba(89,28,12,.45), 0 2px 0 rgba(255,255,255,.6) inset;
    --grad: linear-gradient(135deg,#ff5f8f 0%,#ff7e64 48%,#ff8a3d 100%);
    --grad-soft: linear-gradient(135deg,#ffd6d6 0%,#ffe9c2 100%);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font:15px/1.5 "Helvetica Neue", Inter, system-ui, -apple-system, "Segoe UI", sans-serif;
    color:var(--ink);
    background:
      radial-gradient(900px 520px at 8% -8%, #ffd2cf 0%, transparent 60%),
      radial-gradient(1100px 600px at 110% 0%, #ffe2bd 0%, transparent 55%),
      radial-gradient(1200px 700px at 50% 110%, #fff0d6 0%, transparent 60%),
      var(--paper);
    min-height:100vh;
  }

  /* ------------ Header ------------ */
  .topbar{
    position:sticky; top:0; z-index:30;
    background:linear-gradient(180deg, rgba(255,247,238,.96), rgba(255,247,238,.82));
    backdrop-filter: blur(10px);
    border-bottom:1px solid var(--hairline);
  }
  .topbar-inner{
    max-width:1240px; margin:0 auto;
    padding:18px 28px 0;
    display:flex; align-items:center; gap:22px;
  }
  .brand{ display:flex; align-items:center; gap:14px; }
  .vinyl{
    width:42px; height:42px; border-radius:50%;
    background:
      radial-gradient(circle at 50% 50%, #ff8a3d 0 6px, #1a1410 6px 8px, #2a201a 8px 11px, #1a1410 11px 13px, #2a201a 13px 16px, #1a1410 16px 18px, #2a201a 18px 21px);
    box-shadow:0 6px 14px -6px rgba(0,0,0,.45), inset 0 0 0 1px rgba(255,255,255,.05);
    position:relative; flex:none;
    animation:spin 18s linear infinite;
  }
  .vinyl::after{
    content:""; position:absolute; inset:18px; border-radius:50%;
    background:var(--grad);
    box-shadow:0 0 0 1px rgba(0,0,0,.25);
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .wordmark{display:flex; flex-direction:column; line-height:1.05}
  .wordmark .wm-1{
    font-family: "Georgia", "Playfair Display", serif;
    font-size:28px; font-weight:700; letter-spacing:.2px;
    background:var(--grad);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .wordmark .wm-2{
    font-size:10.5px; letter-spacing:.32em; text-transform:uppercase;
    color:var(--ink-soft); margin-top:4px;
  }
  .topbar-spacer{flex:1}
  .meta-pill{
    display:flex; align-items:center; gap:8px;
    padding:7px 12px; border-radius:999px;
    background:#fff; border:1px solid var(--hairline);
    font-size:12px; color:var(--ink-soft);
  }
  .meta-pill .dot{width:7px;height:7px;border-radius:50%;background:#19b27a;box-shadow:0 0 0 3px rgba(25,178,122,.18)}
  .cta{
    display:inline-flex; align-items:center; gap:8px;
    padding:11px 18px; border-radius:999px;
    background:var(--grad); color:#fff; font-weight:700;
    border:0; cursor:pointer; letter-spacing:.02em;
    box-shadow:0 12px 24px -10px rgba(255,95,143,.55), inset 0 1px 0 rgba(255,255,255,.35);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .cta:hover{transform:translateY(-1px); box-shadow:0 16px 30px -12px rgba(255,95,143,.7)}
  .cta .plus{
    width:18px; height:18px; border-radius:50%;
    background:rgba(255,255,255,.22); display:grid; place-items:center;
    font-weight:900; font-size:14px;
  }

  /* ------------ Tab nav ------------ */
  .tabs{
    max-width:1240px; margin:0 auto;
    display:flex; gap:4px; padding:14px 28px 0;
    overflow-x:auto;
  }
  .tab{
    appearance:none; border:0; background:transparent; cursor:pointer;
    font:600 13.5px/1 "Helvetica Neue", Inter, system-ui;
    color:var(--ink-soft);
    padding:12px 16px 14px; border-radius:10px 10px 0 0;
    letter-spacing:.04em; text-transform:lowercase;
    position:relative;
    transition:color .15s ease, background .15s ease;
  }
  .tab:hover{color:var(--ink); background:rgba(255,138,61,.08)}
  .tab[aria-selected="true"]{
    color:var(--ink);
    background:linear-gradient(180deg, #fff 0%, #fff7ee 100%);
    box-shadow:0 -1px 0 var(--hairline) inset;
  }
  .tab[aria-selected="true"]::after{
    content:""; position:absolute; left:10px; right:10px; bottom:-1px; height:3px;
    background:var(--grad); border-radius:3px 3px 0 0;
  }
  .tab .badge{
    display:inline-block; margin-left:6px; padding:2px 7px; border-radius:999px;
    background:#1a1410; color:#fff; font-size:10px; letter-spacing:.06em;
  }

  /* ------------ Main ------------ */
  main{ max-width:1240px; margin:0 auto; padding:24px 28px 80px }
  .panel{ display:none }
  .panel.active{ display:block; animation:fade .25s ease }
  @keyframes fade{from{opacity:0; transform:translateY(4px)} to{opacity:1; transform:none}}

  /* Re-usable card surface */
  .card{
    background:#fff;
    border:1px solid var(--hairline);
    border-radius:16px;
    box-shadow:var(--shadow);
  }
  .card-h{
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 18px; border-bottom:1px solid var(--hairline);
  }
  .card-h h3{margin:0; font:700 15px/1 "Helvetica Neue", Inter, system-ui; letter-spacing:.02em}
  .card-h .sub{font-size:12px; color:var(--ink-soft)}
  .chip{
    display:inline-flex; align-items:center; gap:6px;
    padding:4px 9px; border-radius:999px;
    font-size:11px; font-weight:700; letter-spacing:.06em; text-transform:uppercase;
    background:#fff2e0; color:#a14a14; border:1px solid #ffd6a8;
  }
  .chip.pink{background:#ffe1ea; color:#a3265a; border-color:#ffc5d4}
  .chip.gold{background:#fdf2d6; color:#7a5a18; border-color:#f1dfa5}
  .chip.ink {background:#1a1410; color:#fff; border-color:#1a1410}

  /* ------------ Footer ------------ */
  footer{
    border-top:1px solid var(--hairline);
    background:#fff7ee;
    margin-top:40px;
  }
  .footer-inner{
    max-width:1240px; margin:0 auto;
    padding:22px 28px;
    display:flex; align-items:center; justify-content:space-between;
    gap:18px; flex-wrap:wrap;
  }
  .footprint{
    display:flex; align-items:center; gap:10px;
    color:var(--ink-soft); font-size:12.5px;
  }
  .foil{
    background:linear-gradient(135deg,#caa15e,#f1d28a 50%,#caa15e);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    font-family:"Georgia", serif; font-weight:700;
  }
  .footer-link{
    display:inline-flex; align-items:center; gap:10px;
    padding:10px 16px; border-radius:999px;
    background:#1a1410; color:#fff; text-decoration:none;
    font-weight:700; font-size:13px; letter-spacing:.02em;
    box-shadow:0 10px 20px -12px rgba(0,0,0,.55);
    transition:transform .15s ease;
  }
  .footer-link:hover{transform:translateY(-1px)}
  .footer-link .vd{
    width:14px; height:14px; border-radius:50%;
    background: radial-gradient(circle at 50% 50%, #ff8a3d 0 2px, #1a1410 2px 4px, #2a201a 4px 6px, #1a1410 6px 7px);
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.1);
  }

  /* ------------ Modal (release CTA) ------------ */
  .veil{
    position:fixed; inset:0; background:rgba(26,20,16,.55);
    display:none; align-items:center; justify-content:center;
    z-index:60; backdrop-filter:blur(4px);
  }
  .veil.show{display:flex}
  .modal{
    width:min(520px, 92vw); background:#fff; border-radius:18px;
    border:1px solid var(--hairline);
    box-shadow:0 30px 80px -30px rgba(0,0,0,.55);
    overflow:hidden;
  }
  .modal-head{
    padding:18px 20px; background:var(--grad); color:#fff;
    display:flex; align-items:center; justify-content:space-between;
  }
  .modal-head h4{margin:0; font:700 17px/1 Georgia, serif; letter-spacing:.02em}
  .modal-x{appearance:none; background:rgba(255,255,255,.18); color:#fff; border:0; width:30px; height:30px; border-radius:50%; cursor:pointer; font-size:16px}
  .modal-body{padding:20px}
  .field{display:flex; flex-direction:column; gap:6px; margin-bottom:14px}
  .field label{font-size:11.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-soft)}
  .field input, .field select{
    padding:11px 12px; border-radius:10px;
    border:1px solid var(--hairline); background:var(--paper); color:var(--ink);
    font:inherit;
  }
  .modal-foot{display:flex; justify-content:flex-end; gap:10px; padding:0 20px 20px}
  .ghost{
    appearance:none; padding:10px 14px; border-radius:999px;
    background:#fff; border:1px solid var(--hairline); cursor:pointer; font-weight:600;
  }

  /* small-screen polish */
  @media (max-width:760px){
    .topbar-inner{flex-wrap:wrap; padding:14px 18px 0}
    .tabs{padding:10px 18px 0}
    main{padding:18px 18px 60px}
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <div class="vinyl" aria-hidden="true"></div>
      <div class="wordmark">
        <span class="wm-1">VRchat Music Label</span>
        <span class="wm-2">A&amp;R · Calendar · Catalog · Payouts</span>
      </div>
    </div>
    <div class="topbar-spacer"></div>
    <div class="meta-pill" title="Live status"><span class="dot"></span> 4 worlds online · 12 artists</div>
    <button class="cta" id="newReleaseBtn" type="button">
      <span class="plus">+</span> release
    </button>
  </div>

  <nav class="tabs" role="tablist" aria-label="Label sections">
    <button class="tab" role="tab" data-tab="roster"   aria-selected="true">roster <span class="badge">12</span></button>
    <button class="tab" role="tab" data-tab="catalog"  aria-selected="false">catalog</button>
    <button class="tab" role="tab" data-tab="pipeline" aria-selected="false">pipeline</button>
    <button class="tab" role="tab" data-tab="calendar" aria-selected="false">calendar <span class="badge">4</span></button>
    <button class="tab" role="tab" data-tab="payouts"  aria-selected="false">payouts</button>
    <button class="tab" role="tab" data-tab="showcase" aria-selected="false">showcase</button>
  </nav>
</header>

<main>
  <section id="panel-roster"   class="panel active" role="tabpanel"></section>
  <section id="panel-catalog"  class="panel"        role="tabpanel"></section>
  <section id="panel-pipeline" class="panel"        role="tabpanel"></section>
  <section id="panel-calendar" class="panel"        role="tabpanel"></section>
  <section id="panel-payouts"  class="panel"        role="tabpanel"></section>
  <section id="panel-showcase" class="panel"        role="tabpanel"></section>
</main>

<footer>
  <div class="footer-inner">
    <div class="footprint">
      <span class="foil">VRchat Music Label</span>
      &nbsp;·&nbsp; pressed in spatial audio &nbsp;·&nbsp; est. 2026
    </div>
    <a class="footer-link"
       href="https://vrchat.com/home/launch?worldId=wrld_vrchat-music-label-mainstage"
       target="_blank" rel="noopener">
       <span class="vd"></span> Visit the showcase venue in VRChat
    </a>
  </div>
</footer>

<!-- New Release modal -->
<div class="veil" id="releaseVeil" aria-hidden="true">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="rel-title">
    <div class="modal-head">
      <h4 id="rel-title">Cut a new release</h4>
      <button class="modal-x" id="releaseClose" aria-label="Close">×</button>
    </div>
    <div class="modal-body">
      <div class="field"><label>Artist</label>
        <select><option>Neon Koi</option><option>Velvet Patch</option><option>Polygon Saint</option><option>Aurora Tape</option></select>
      </div>
      <div class="field"><label>Title</label><input placeholder="e.g. Worlds Apart" /></div>
      <div class="field"><label>Format</label>
        <select><option>Single</option><option>EP</option><option>Album</option><option>Live from VRChat</option></select>
      </div>
      <div class="field"><label>Target street date</label><input type="date" /></div>
    </div>
    <div class="modal-foot">
      <button class="ghost" id="releaseCancel" type="button">cancel</button>
      <button class="cta"   id="releaseSave"   type="button">queue release</button>
    </div>
  </div>
</div>

<!-- Module scripts (agents A7 + A8 own roster/catalog/pipeline/scout; A9 owns calendar/portal) -->
<script src="roster.js"></script>
<script src="catalog.js"></script>
<script src="pipeline.js"></script>
<script src="scout-distrokid.js"></script>
<script src="calendar.js"></script>
<script src="portal.js"></script>

<script>
  // ============================================================
  //  Shell controller — agent A9
  //  Wires tab nav to each module's render fn, with safe fallbacks
  //  if a module hasn't loaded yet (so the page never goes blank).
  // ============================================================
  (function(){
    const TABS = ['roster','catalog','pipeline','calendar','payouts','showcase'];

    function placeholder(name, blurb){
      return `
        <div class="card" style="padding:34px 28px">
          <div style="display:flex;align-items:center;gap:14px;margin-bottom:8px">
            <div style="width:34px;height:34px;border-radius:50%;background:var(--grad);box-shadow:var(--shadow)"></div>
            <h2 style="margin:0;font-family:Georgia,serif;font-size:22px">${name}</h2>
          </div>
          <p style="margin:6px 0 0;color:var(--ink-soft);max-width:60ch">${blurb}</p>
        </div>`;
    }

    function call(fnName, container, fallbackName, blurb){
      const fn = window[fnName];
      if (typeof fn === 'function'){
        try { fn(container); return; }
        catch (e) { console.warn('[A9] '+fnName+' threw', e); }
      }
      container.innerHTML = placeholder(fallbackName, blurb);
    }

    function render(tab){
      const c = document.getElementById('panel-' + tab);
      if (!c) return;
      switch(tab){
        case 'roster':   return call('renderRoster',   c, 'Roster',   'Signed artists, stage handles, and current world residencies.');
        case 'catalog':  return call('renderCatalog',  c, 'Catalog',  'Every release on the label — singles, EPs, live-from-VRChat tapes.');
        case 'pipeline': return call('renderPipeline', c, 'Pipeline', 'Releases moving through scout → master → DistroKid → Spotify.');
        case 'calendar': return call('renderCalendar', c, 'Calendar', 'Upcoming live sets across our four resident VRChat venues.');
        case 'payouts':  return call('renderPortal',   c, 'Payouts',  'Streams, royalties, and presale codes for the fan portal.');
        case 'showcase': return c.innerHTML = showcaseMarkup();
      }
    }

    function showcaseMarkup(){
      const venues = [
        {n:'The Mainstage',     w:'wrld_mainstage_88', cap:120, hue:'var(--grad)'},
        {n:'Velvet Lounge',     w:'wrld_velvet_42',    cap:48,  hue:'linear-gradient(135deg,#ff7aa8,#caa15e)'},
        {n:'Static Garden',     w:'wrld_static_17',    cap:64,  hue:'linear-gradient(135deg,#ff8a3d,#ffd28a)'},
        {n:'After-Hours Booth', w:'wrld_after_03',     cap:24,  hue:'linear-gradient(135deg,#1a1410,#ff5f8f)'},
      ];
      return `
        <div class="card" style="padding:22px">
          <div class="card-h" style="border:0;padding:0 0 14px">
            <div>
              <h3>Showcase venues</h3>
              <div class="sub">Resident VRChat worlds where the label hosts live sets, listening parties, and album drops.</div>
            </div>
            <span class="chip">4 worlds</span>
          </div>
          <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px">
            ${venues.map(v => `
              <a href="https://vrchat.com/home/launch?worldId=${v.w}" target="_blank" rel="noopener"
                 style="text-decoration:none;color:inherit;display:block;border-radius:14px;overflow:hidden;border:1px solid var(--hairline);background:#fff;transition:transform .15s ease"
                 onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform=''">
                <div style="height:96px;background:${v.hue};position:relative">
                  <div style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:62px;height:62px;border-radius:50%;
                              background:radial-gradient(circle at 50% 50%, #ff8a3d 0 8px, #1a1410 8px 11px, #2a201a 11px 16px, #1a1410 16px 19px, #2a201a 19px 24px);
                              box-shadow:0 8px 18px -10px rgba(0,0,0,.55)"></div>
                </div>
                <div style="padding:12px 14px">
                  <div style="font-weight:700">${v.n}</div>
                  <div style="font-size:12px;color:var(--ink-soft);margin-top:2px">cap ${v.cap} · ${v.w}</div>
                </div>
              </a>`).join('')}
          </div>
        </div>`;
    }

    // Tab wiring
    document.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        const t = btn.dataset.tab;
        document.querySelectorAll('.tab').forEach(b => b.setAttribute('aria-selected', b===btn ? 'true' : 'false'));
        document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + t));
        render(t);
      });
    });

    // Release modal
    const veil = document.getElementById('releaseVeil');
    const open = () => veil.classList.add('show');
    const shut = () => veil.classList.remove('show');
    document.getElementById('newReleaseBtn').addEventListener('click', open);
    document.getElementById('releaseClose').addEventListener('click', shut);
    document.getElementById('releaseCancel').addEventListener('click', shut);
    document.getElementById('releaseSave').addEventListener('click', () => { shut(); /* hand-off to pipeline.js when wired */ });
    veil.addEventListener('click', (e) => { if (e.target === veil) shut(); });

    // First paint
    TABS.forEach(t => render(t));   // hydrate every panel so swapping is instant
  })();
</script>

</body>
</html>
