<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>⭐ STACK BOARD PROJECTS</title>
<style>
  :root{
    --bg:#0b0d12;
    --panel:#11141c;
    --panel-2:#161a25;
    --line:#1f2532;
    --text:#e6e9f2;
    --dim:#8a93a6;
    --faded:#3a4150;
    --amber:#f59e0b;
    --sky:#0ea5e9;
    --done:#10b981;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
  body{min-height:100vh;padding:32px 40px 60px}

  .header{
    display:flex;align-items:center;justify-content:space-between;
    padding-bottom:18px;border-bottom:1px solid var(--line);margin-bottom:28px;
  }
  .title{
    font-size:22px;font-weight:700;letter-spacing:2.5px;color:var(--amber);
    text-shadow:0 0 14px rgba(245,158,11,.45), 0 0 28px rgba(245,158,11,.2);
    animation: header-pulse 5s ease-in-out infinite;
  }
  @keyframes header-pulse{
    0%   { text-shadow: 0 0 10px rgba(245,158,11,.30), 0 0 22px rgba(245,158,11,.15); }
    50%  { text-shadow: 0 0 18px rgba(245,158,11,.55), 0 0 36px rgba(245,158,11,.30); }
    100% { text-shadow: 0 0 10px rgba(245,158,11,.30), 0 0 22px rgba(245,158,11,.15); }
  }
  .meta{font-size:11px;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase}
  .meta b{color:var(--sky)}

  .grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:18px;
    max-width:1200px;
    margin:0 auto;
  }

  .tile{
    position:relative;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    padding:18px 18px 16px;
    min-height:180px;
    cursor:pointer;
    transition: transform 200ms ease, border-color 200ms ease, box-shadow 200ms ease, background 200ms ease;
    display:flex;flex-direction:column;justify-content:space-between;
    overflow:hidden;
    opacity: 0;
    animation: tile-fade-in 360ms ease forwards;
  }
  @keyframes tile-fade-in{
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  /* Stagger up to 12 tiles (3x3 + buffer) */
  .grid > .tile:nth-child(1)  { animation-delay:  0ms; }
  .grid > .tile:nth-child(2)  { animation-delay:  60ms; }
  .grid > .tile:nth-child(3)  { animation-delay: 120ms; }
  .grid > .tile:nth-child(4)  { animation-delay: 180ms; }
  .grid > .tile:nth-child(5)  { animation-delay: 240ms; }
  .grid > .tile:nth-child(6)  { animation-delay: 300ms; }
  .grid > .tile:nth-child(7)  { animation-delay: 360ms; }
  .grid > .tile:nth-child(8)  { animation-delay: 420ms; }
  .grid > .tile:nth-child(9)  { animation-delay: 480ms; }
  .grid > .tile:nth-child(10) { animation-delay: 540ms; }
  .grid > .tile:nth-child(11) { animation-delay: 600ms; }
  .grid > .tile:nth-child(12) { animation-delay: 660ms; }
  .tile:hover{
    border-color:var(--amber);
    transform:translateY(-2px);
    box-shadow:0 4px 12px rgba(245, 158, 11, 0.2);
  }
  .tile:hover .open-label{opacity:1}

  .tile.empty{
    background: linear-gradient(110deg,
      rgba(58,65,80,0.04) 0%,
      rgba(245,158,11,0.06) 50%,
      rgba(58,65,80,0.04) 100%);
    background-size: 220% 100%;
    background-position: 100% 0;
    border:1px dashed var(--faded);
    cursor:default;
    color:var(--faded);
    box-shadow:none;
    animation: tile-fade-in 360ms ease forwards, empty-shimmer 4.5s ease-in-out infinite;
  }
  @keyframes empty-shimmer{
    0%   { background-position: 100% 0; }
    50%  { background-position: 0 0; }
    100% { background-position: 100% 0; }
  }
  .tile.empty:hover{transform:none;border-color:var(--faded);box-shadow:none}
  .tile.empty .empty-label{
    font-size:11px;letter-spacing:2px;text-transform:uppercase;
    color:var(--faded);text-align:center;align-self:center;margin:auto;
  }

  .tile-name{
    font-size:15px;font-weight:600;color:var(--text);
    line-height:1.3;margin-bottom:6px;
    word-break:break-word;
  }
  .tile-date{
    font-size:11px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;
    margin-bottom:14px;
  }

  .dot-row{
    display:flex;align-items:center;gap:8px;margin-top:8px;
  }
  .dot{
    width:14px;height:14px;border-radius:50%;
    border:2px solid var(--faded);background:transparent;
  }
  .dot.active{border-color:var(--amber);background:var(--amber);box-shadow:0 0 8px rgba(245,158,11,.5)}
  .dot.done{border-color:var(--done);background:var(--done)}
  .dot-arrow{color:var(--faded);font-size:10px}

  .tile-footer{
    display:flex;align-items:center;justify-content:space-between;
    margin-top:14px;
  }
  .open-label{
    font-size:10px;letter-spacing:1.5px;color:var(--amber);
    opacity:0;transition:opacity .15s ease;text-transform:uppercase;
  }
  .promote-btn{
    background:transparent;border:1px solid var(--sky);color:var(--sky);
    font-size:10px;letter-spacing:1px;padding:5px 9px;border-radius:4px;
    cursor:pointer;text-transform:uppercase;font-family:inherit;
    transition: background 200ms ease, color 200ms ease, transform 200ms ease, box-shadow 200ms ease, border-color 200ms ease;
  }
  .promote-btn:hover{
    background:var(--sky);color:var(--bg);
    border-color:#38bdf8;
    transform: scale(1.02);
    box-shadow: 0 0 12px rgba(14,165,233,.45);
  }
  .promote-btn:active{
    transform: scale(0.99);
  }

  .empty-state{
    grid-column:1/-1;text-align:center;padding:80px 0;
    color:var(--dim);font-size:13px;letter-spacing:1.5px;text-transform:uppercase;
  }

  .footer-note{
    margin-top:40px;text-align:center;color:var(--dim);
    font-size:10px;letter-spacing:2px;text-transform:uppercase;
  }
</style>
</head>
<body>

<div class="header">
  <div class="title">⭐ STACK BOARD PROJECTS</div>
  <div class="meta">PROJECTS: <b id="count">0</b> &nbsp;·&nbsp; GRID 3×3</div>
</div>

<div class="grid" id="grid"></div>

<div class="footer-note">CLICK TILE → OPEN PROJECT &nbsp;·&nbsp; PROMOTE → PRETTY BRIDGE</div>

<script>
  const grid = document.getElementById('grid');
  const countEl = document.getElementById('count');

  function dotClass(state){
    if(state === 'active') return 'dot active';
    if(state === 'done') return 'dot done';
    return 'dot';
  }

  function renderDots(states){
    const s = (states && states.length) ? states : ['empty','empty','empty','empty'];
    let html = '<div class="dot-row">';
    for(let i=0;i<4;i++){
      html += '<div class="' + dotClass(s[i] || 'empty') + '"></div>';
      if(i<3) html += '<span class="dot-arrow">→</span>';
    }
    html += '</div>';
    return html;
  }

  function tileHTML(p){
    const cleanName = (p.name || p.folder || 'untitled').replace(/^!!\s*/, '');
    const date = p.date || '';
    const folder = p.folder || cleanName;
    return `
      <div class="tile" data-folder="${encodeURIComponent(folder)}">
        <div>
          <div class="tile-name">${cleanName}</div>
          <div class="tile-date">${date}</div>
          ${renderDots(p.states)}
        </div>
        <div class="tile-footer">
          <span class="open-label">OPEN →</span>
          <button class="promote-btn" data-promote="${encodeURIComponent(folder)}">PROMOTE → PRETTY</button>
        </div>
      </div>
    `;
  }

  function emptyTile(){
    return '<div class="tile empty"><span class="empty-label">empty slot</span></div>';
  }

  function render(projects){
    grid.innerHTML = '';
    if(!projects || projects.length === 0){
      grid.innerHTML = '<div class="empty-state">No projects yet — fire /stack-board to create one</div>';
      // still pad empties below for visual consistency
      const pad = document.createElement('div');
      pad.style.gridColumn = '1/-1';
      pad.innerHTML = '<div class="grid" style="margin-top:20px">' +
        Array.from({length:9}).map(()=>emptyTile()).join('') + '</div>';
      grid.appendChild(pad);
      countEl.textContent = '0';
      return;
    }

    const slots = Math.max(9, projects.length);
    let html = '';
    for(let i=0;i<slots;i++){
      if(i < projects.length) html += tileHTML(projects[i]);
      else html += emptyTile();
    }
    grid.innerHTML = html;
    countEl.textContent = projects.length;

    // wire up tile clicks
    grid.querySelectorAll('.tile:not(.empty)').forEach(tile=>{
      tile.addEventListener('click', (e)=>{
        if(e.target.classList.contains('promote-btn')) return;
        const folder = decodeURIComponent(tile.dataset.folder);
        const ts = Date.now();
        // file:// URL relative to this index — same window
        window.location.href = './' + encodeURIComponent(folder) + '/index.html?v=' + ts;
      });
    });

    // wire up promote buttons
    grid.querySelectorAll('.promote-btn').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        e.stopPropagation();
        const folder = decodeURIComponent(btn.dataset.promote);
        const url = '../../../../🪨🪨      AUTOMATIONS     🪨🪨/skill-support-md/stack-board/stack-to-pretty-bridge.html?project=' + encodeURIComponent(folder);
        window.open(url, '_blank');
      });
    });
  }

  fetch('projects.json')
    .then(r => {
      if(!r.ok) throw new Error('no projects.json');
      return r.json();
    })
    .then(render)
    .catch(()=> render([]));
</script>

</body>
</html>
