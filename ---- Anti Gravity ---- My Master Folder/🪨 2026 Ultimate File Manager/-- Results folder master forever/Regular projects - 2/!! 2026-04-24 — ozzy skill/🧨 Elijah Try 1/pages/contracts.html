<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sharon — Contracts</title>
<style>
  :root { --bg:#f4f5f7; --pane:#fff; --line:#e1e4ea; --line-soft:#eef0f4; --accent:#4a6da7; --accent-soft:#eaf0fa; --ink:#1f2430; --muted:#6b7280; }
  *{box-sizing:border-box}html,body{height:100%;margin:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;background:var(--bg);color:var(--ink);font-size:13px}
  .page{display:grid;grid-template-rows:56px 1fr 28px;height:100vh}
  header.top{display:flex;align-items:center;gap:16px;padding:0 22px;background:#fff;border-bottom:1px solid var(--line)}
  header.top a.back{color:var(--muted);text-decoration:none;font-size:12px}
  header.top a.back:hover{color:var(--accent)}
  header.top h1{margin:0;font-size:18px;font-weight:700;letter-spacing:-0.01em}
  header.top .sub{color:var(--muted);font-size:12px}
  .body{display:grid;grid-template-columns:1fr 220px;gap:18px;padding:18px 22px;overflow:auto}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}
  .empty-card{aspect-ratio:1.1/1;border:1.5px dashed #c7cdd8;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);cursor:pointer;background:rgba(255,255,255,.5);transition:.15s}
  .empty-card:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
  .empty-card .plus{font-size:32px;font-weight:300;line-height:1}
  .empty-card .lbl{font-size:11.5px;margin-top:8px;letter-spacing:.02em}
  aside.stats{background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px;height:fit-content}
  aside.stats h3{margin:0 0 12px;font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:700}
  aside.stats .stat{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line-soft);font-size:12px}
  aside.stats .stat:last-child{border-bottom:none}
  aside.stats .stat .v{font-weight:600;color:var(--accent)}
  footer.status{display:flex;align-items:center;justify-content:center;gap:12px;background:linear-gradient(180deg,#f5f6f9 0%,#e9ecf1 100%);border-top:1px solid var(--line);color:var(--muted);font-size:11px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  dialog.detail{border:none;border-radius:14px;padding:0;max-width:720px;width:92vw;box-shadow:0 20px 60px rgba(0,0,0,.25)}
  dialog.detail::backdrop{background:rgba(15,20,35,.55)}
  dialog.detail .dhead{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--line)}
  dialog.detail .dhead h2{margin:0;font-size:16px}
  dialog.detail .dclose{width:30px;height:30px;border-radius:50%;border:none;background:#1f2430;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  dialog.detail .dclose:hover{background:var(--accent)}
  dialog.detail .form{padding:22px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
  dialog.detail .field{display:flex;flex-direction:column;gap:4px}
  dialog.detail .field label{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:700}
  dialog.detail .field input{border:1px solid var(--line);border-radius:6px;padding:8px 10px;font-size:13px;outline:none;font-family:inherit}
  dialog.detail .field input:focus{border-color:var(--accent)}
</style>
</head>
<body>
  <div class="page">
    <header class="top">
      <a class="back" href="../index.html">← Sharon</a>
      <div><h1>Contracts</h1><div class="sub">Publishing · sync · distribution · mgmt</div></div>
    </header>
    <div class="body">
      <div class="grid">
        <div class="empty-card"><div class="plus">+</div><div class="lbl">Add new contract</div></div>
        <div class="empty-card"><div class="plus">+</div><div class="lbl">Add new contract</div></div>
        <div class="empty-card"><div class="plus">+</div><div class="lbl">Add new contract</div></div>
      </div>
      <aside class="stats">
        <h3>Quick stats</h3>
        <div class="stat"><span>Total</span><span class="v">0</span></div>
        <div class="stat"><span>This week</span><span class="v">0</span></div>
        <div class="stat"><span>Active</span><span class="v">0</span></div>
      </aside>
    </div>
    <footer class="status">Contracts · v0.1 · empty</footer>
  </div>
  <dialog class="detail" id="detail">
    <div class="dhead"><h2>New Contract</h2><button class="dclose" onclick="document.getElementById('detail').close()">✕</button></div>
    <div class="form">
      <div class="field"><label>Title</label><input placeholder="—"></div>
      <div class="field"><label>Type</label><input placeholder="publishing / sync / distribution / mgmt"></div>
      <div class="field"><label>Counterparty</label><input placeholder="—"></div>
      <div class="field"><label>Effective</label><input placeholder="—"></div>
      <div class="field"><label>Expiry</label><input placeholder="—"></div>
      <div class="field"><label>Status</label><input placeholder="—"></div>
    </div>
  </dialog>
  <script>document.querySelectorAll('.empty-card').forEach(c=>c.addEventListener('click',()=>document.getElementById('detail').showModal()));</script>
</body>
</html>
