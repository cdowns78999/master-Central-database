<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Board — Chad's Dreams</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-0: #0a0e1a;
    --bg-1: #111827;
    --bg-2: #1a2234;
    --ink: #e5e7eb;
    --ink-dim: #94a3b8;
    --ink-faint: #64748b;
    --accent: #d4a574;
    --accent-hot: #f0b87a;
    --mint: #10b981;
    --mint-glow: rgba(16,185,129,0.35);
    --red: #ef4444;
    --amber: #f59e0b;
    --blue: #60a5fa;
    --violet: #a78bfa;
    --border: rgba(255,255,255,0.06);
    --border-hot: rgba(212,165,116,0.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: radial-gradient(ellipse at top, var(--bg-1) 0%, var(--bg-0) 60%);
    color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body { padding: 48px 32px 80px; }

  .masthead {
    max-width: 1400px;
    margin: 0 auto 40px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    padding-bottom: 24px;
  }
  .masthead h1 {
    font-size: 32px;
    font-weight: 300;
    letter-spacing: -0.02em;
  }
  .masthead h1 span { color: var(--accent); font-weight: 500; }
  .masthead .sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .board {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .row {
    background: linear-gradient(180deg, rgba(255,255,255,0.015), rgba(255,255,255,0));
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: border-color .25s ease;
  }
  .row.active-row { border-color: var(--border-hot); box-shadow: 0 0 0 1px rgba(212,165,116,0.15), 0 20px 60px -20px rgba(212,165,116,0.15); }

  .row-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px;
    cursor: pointer;
    user-select: none;
    transition: background .2s ease;
  }
  .row-head:hover { background: rgba(255,255,255,0.02); }
  .row-head-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .row-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 999px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .row.active-row .row-badge { background: rgba(212,165,116,0.15); color: var(--accent); }
  .row.queued-row .row-badge { background: rgba(96,165,250,0.12); color: var(--blue); }
  .row.backlog-row .row-badge { background: rgba(148,163,184,0.1); color: var(--ink-dim); }

  .row-title {
    font-size: 18px;
    font-weight: 500;
    letter-spacing: -0.01em;
  }
  .row-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-faint);
  }
  .chevron {
    color: var(--ink-faint);
    transition: transform .3s ease;
    font-size: 14px;
  }
  .row.collapsed .chevron { transform: rotate(-90deg); }

  .row-body {
    padding: 8px 24px 28px;
    overflow: hidden;
    transition: max-height .35s ease, padding .35s ease;
    max-height: 600px;
  }
  .row.collapsed .row-body {
    max-height: 0;
    padding-top: 0;
    padding-bottom: 0;
  }

  .flow {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 0;
    align-items: stretch;
    position: relative;
  }

  .cell-wrap {
    display: flex;
    align-items: stretch;
    position: relative;
  }
  /* Red arrows between cells (replacing grey) */
  .cell-wrap:not(:last-child)::after {
    content: '';
    position: absolute;
    top: 50%;
    right: -8px;
    width: 16px;
    height: 2px;
    background: linear-gradient(90deg, #ef4444, rgba(239,68,68,0.3));
    box-shadow: 0 0 8px rgba(239,68,68,0.4);
    transition: box-shadow 0.3s ease, background 0.3s ease;
    z-index: 2;
  }
  .cell-wrap:not(:last-child)::before {
    content: '▸';
    position: absolute;
    top: 50%;
    right: -10px;
    transform: translateY(-50%);
    color: #ef4444;
    text-shadow: 0 0 4px rgba(239,68,68,0.4);
    font-size: 14px;
    z-index: 3;
    background: var(--bg-0);
    padding: 0 2px;
    transition: color 0.3s ease, text-shadow 0.3s ease;
  }
  .cell-wrap.arrow-hover::after { box-shadow: 0 0 14px rgba(239,68,68,0.9); }
  .cell-wrap.arrow-hover::before { color: #f87171; text-shadow: 0 0 10px rgba(239,68,68,0.8); }

  .cell {
    flex: 1;
    min-height: 140px;
    margin: 0 8px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    cursor: pointer;
    position: relative;
    display: flex;
    flex-direction: column;
    transition: all .2s ease;
    overflow: hidden;
  }
  .cell:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 12px 30px -15px rgba(0,0,0,0.6);
  }
  .cell-wrap:first-child .cell { margin-left: 0; }
  .cell-wrap:last-child .cell { margin-right: 0; }

  /* Pulse only lives on .cell.active */
  .cell.active {
    border-color: var(--mint);
    box-shadow: 0 0 0 1px var(--mint), 0 0 40px -10px var(--mint-glow);
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 1px var(--mint), 0 0 30px -10px var(--mint-glow); }
    50% { box-shadow: 0 0 0 1px var(--mint), 0 0 50px -5px var(--mint-glow); }
  }

  .cell.done {
    opacity: 0.55;
    border-style: dashed;
  }
  .cell.done:hover { opacity: 1; }

  /* Move .cell-num to the left so it doesn't overlap the help icon */
  .cell-num {
    position: absolute;
    top: 10px;
    left: 12px;
    right: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-faint);
    letter-spacing: 0.1em;
  }

  /* Yellow help icon (top-right) */
  .cell-help-icon {
    position: absolute;
    top: 8px;
    right: 8px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: rgba(245,158,11,0.15);
    color: #f59e0b;
    font-size: 12px;
    font-weight: 600;
    cursor: help;
    border: 1px solid rgba(245,158,11,0.3);
    transition: background 0.2s ease, box-shadow 0.2s ease;
    z-index: 10;
    font-style: italic;
    font-family: 'Inter', serif;
  }
  .cell-help-icon:hover {
    background: rgba(245,158,11,0.25);
    box-shadow: 0 0 8px rgba(245,158,11,0.4);
  }
  .cell-help-icon::after {
    content: attr(data-hint);
    position: absolute;
    bottom: 100%;
    right: 0;
    margin-bottom: 8px;
    padding: 8px 12px;
    background: var(--bg-1);
    color: var(--ink);
    font-size: 10px;
    border-radius: 6px;
    border: 1px solid var(--border-hot);
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s ease;
    z-index: 20;
  }
  .cell-help-icon:hover::after { opacity: 1; }

  .cell-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-top: 18px;
    margin-bottom: 10px;
    box-shadow: 0 0 12px currentColor;
  }
  .dot-mint { background: var(--mint); color: var(--mint); }
  .dot-amber { background: var(--amber); color: var(--amber); }
  .dot-blue { background: var(--blue); color: var(--blue); }
  .dot-violet { background: var(--violet); color: var(--violet); }
  .dot-red { background: var(--red); color: var(--red); }
  .dot-dim { background: var(--ink-faint); color: var(--ink-faint); box-shadow: none; }

  .cell-title {
    font-size: 14px;
    font-weight: 500;
    line-height: 1.35;
    margin-bottom: 6px;
    color: var(--ink);
  }
  .cell-hint {
    font-size: 11px;
    color: var(--ink-dim);
    line-height: 1.5;
    font-family: 'JetBrains Mono', monospace;
  }

  .cell-foot {
    margin-top: auto;
    padding-top: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-faint);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* Floating "Do next step" button — ONLY on active cell */
  .do-next-btn {
    position: absolute;
    bottom: 12px;
    right: 12px;
    padding: 8px 14px;
    background: var(--mint);
    color: var(--bg-0);
    border: none;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    opacity: 0;
    pointer-events: none;
    transition: all 0.2s ease;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    z-index: 15;
  }
  .cell.active .do-next-btn {
    opacity: 1;
    pointer-events: auto;
  }
  .do-next-btn:hover {
    background: #06d6a6;
    transform: scale(1.05);
    box-shadow: 0 4px 12px rgba(16,185,129,0.4);
  }

  .cell-drawer {
    display: none;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--ink-dim);
    line-height: 1.6;
  }
  .cell.expanded { min-height: 200px; cursor: default; }
  .cell.expanded .cell-drawer { display: block; }

  .cell-drawer a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px dotted var(--accent);
  }

  .footer {
    max-width: 1400px;
    margin: 48px auto 0;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.1em;
  }
  .footer span { color: var(--accent); }

  @media (max-width: 1100px) {
    .flow { grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .cell-wrap:nth-child(3n):not(:last-child)::after,
    .cell-wrap:nth-child(3n):not(:last-child)::before { display: none; }
  }
  @media (max-width: 700px) {
    .flow { grid-template-columns: 1fr; }
    .cell-wrap::after, .cell-wrap::before { display: none !important; }
    .cell { margin: 0; }
  }
</style>
</head>
<body>

<div class="masthead">
  <h1>The <span>Board</span></h1>
  <div class="sub">5 × 3 · One step · Left → Right</div>
</div>

<div class="board" id="board"></div>

<div class="footer">
  Click any cell for detail · Click a row header to collapse · The glowing cell is <span>your next step</span>
</div>

<script>
  const rows = [
    {
      id: 'active',
      badge: 'Active Now',
      title: 'The next 5 steps',
      meta: '1 → 5 · do these first',
      className: 'active-row',
      cells: [
        { num: '01', dot: 'mint', title: 'The iPad Grid', hint: 'visual map, tap-to-open', foot: 'Work Progress', status: 'active', detail: 'Build the iPad grid visual — the anchor view for the full ecosystem. Tap-to-open any tile.' },
        { num: '02', dot: 'amber', title: 'Randy — Finish the Presentation', hint: 'one-click, push-button simple', foot: 'Goal locked', status: 'pending', detail: 'Finish the Randy Engineerski presentation. Goal: if it is not push-of-a-button simple, it is not ready.' },
        { num: '03', dot: 'violet', title: 'Mike "Blessing" App', hint: 'stutter-as-advantage wholesome', foot: 'Warm Heart', status: 'pending', detail: 'Evidence-backed wholesome app reframing stuttering as a gift. Same template as Ozzy.' },
        { num: '04', dot: 'blue', title: 'Koi — Singer Tribute', hint: 'the "it factor" app', foot: 'Variants deployed', status: 'pending', detail: 'Tribute app for the singer with the "it factor". Variants live at koi-where-opera-stands-04428 and for-koi-603660.' },
        { num: '05', dot: 'red', title: 'Big Payback Job', hint: 'everyone paid back, color coded', foot: 'Work Debt', status: 'pending', detail: 'Build the payback tracker. Every person, every amount, color coded by status.' }
      ]
    },
    {
      id: 'queued',
      badge: 'Queued Next',
      title: 'When Active clears',
      meta: '6 → 10 · warm, waiting',
      className: 'queued-row',
      cells: [
        { num: '06', dot: 'blue', title: 'James Budget / Task App', hint: 'personal, for James Downs', foot: 'Personal & Family', status: 'pending', detail: 'Simple budget + task app personalized for James.' },
        { num: '07', dot: 'blue', title: 'James — Marching Band App', hint: 'schedule, drills, routines', foot: 'Personal & Family', status: 'pending', detail: 'Marching band companion app for James.' },
        { num: '08', dot: 'blue', title: 'Dad — Financial Plan', hint: 'clear, step-by-step', foot: 'Personal & Family', status: 'pending', detail: 'Clear, visual financial plan document for Dad.' },
        { num: '09', dot: 'amber', title: 'Master Business Creator', hint: 'boxes & arrows builder', foot: 'Work Progress', status: 'pending', detail: 'Drag-and-drop boxes-and-arrows builder for mapping business flows.' },
        { num: '10', dot: 'violet', title: 'YouTube Channel Assembly', hint: 'HTML pipeline, repeatable', foot: 'Work Progress', status: 'pending', detail: 'Repeatable HTML assembly line for spinning up YouTube channel pages.' }
      ]
    },
    {
      id: 'backlog',
      badge: 'Backlog',
      title: 'On deck, no rush',
      meta: '11 → 15 · later this stretch',
      className: 'backlog-row',
      cells: [
        { num: '11', dot: 'dim', title: 'Tool — Detective-File Clone', hint: 'band tribute, Ozzy pattern', foot: 'Work Progress', status: 'pending', detail: 'Tool (the band) detective-file tribute — clone of the Ozzy canonical template.' },
        { num: '12', dot: 'dim', title: 'Koi Board', hint: 'ops board for Koi project', foot: 'Work Progress', status: 'pending', detail: 'Dedicated Koi board for managing the variants + flow.' },
        { num: '13', dot: 'dim', title: 'Cloudy Nav Samples', hint: 'navigation UI set', foot: 'Work Progress', status: 'pending', detail: 'Sample gallery of cloudy / soft navigation UI variants.' },
        { num: '14', dot: 'dim', title: 'VR Status Preview', hint: 'VR status prototype', foot: 'Work Progress', status: 'pending', detail: 'Prototype for a VR status / presence preview screen.' },
        { num: '15', dot: 'dim', title: '3D Photo Showcase', hint: '3D photo gallery proto', foot: 'Work Progress', status: 'pending', detail: 'Prototype 3D photo gallery experience.' }
      ]
    }
  ];

  const board = document.getElementById('board');
  rows.forEach(row => {
    const r = document.createElement('div');
    r.className = `row ${row.className}`;
    r.dataset.rowId = row.id;

    const head = document.createElement('div');
    head.className = 'row-head';
    head.innerHTML = `
      <div class="row-head-left">
        <span class="row-badge">${row.badge}</span>
        <span class="row-title">${row.title}</span>
      </div>
      <div class="row-head-left">
        <span class="row-meta">${row.meta}</span>
        <span class="chevron">▾</span>
      </div>
    `;
    head.addEventListener('click', () => r.classList.toggle('collapsed'));

    const body = document.createElement('div');
    body.className = 'row-body';

    const flow = document.createElement('div');
    flow.className = 'flow';

    row.cells.forEach((c) => {
      const wrap = document.createElement('div');
      wrap.className = 'cell-wrap';
      wrap.dataset.stepId = c.num;

      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.stepStatus = c.status || 'pending';
      cell.innerHTML = `
        <div class="cell-help-icon" data-hint="${c.hint}">i</div>
        <div class="cell-num">${c.num}</div>
        <div class="cell-dot dot-${c.dot}"></div>
        <div class="cell-title">${c.title}</div>
        <div class="cell-hint">${c.hint}</div>
        <div class="cell-foot"><span>${c.foot}</span></div>
        <button class="do-next-btn">Do next step →</button>
        <div class="cell-drawer">${c.detail}</div>
      `;
      cell.addEventListener('click', (e) => {
        if (e.target.classList.contains('do-next-btn')) return;
        if (e.target.classList.contains('cell-help-icon')) return;
        e.stopPropagation();
        cell.classList.toggle('expanded');
      });

      wrap.appendChild(cell);
      flow.appendChild(wrap);
    });

    body.appendChild(flow);
    r.appendChild(head);
    r.appendChild(body);
    board.appendChild(r);
  });

  // Initialize status classes on every cell (after render)
  function initializeBoard() {
    document.querySelectorAll('.cell').forEach(cell => {
      const status = cell.dataset.stepStatus || 'pending';
      cell.classList.remove('start-here');
      if (status === 'active') cell.classList.add('active');
      if (status === 'done') cell.classList.add('done');
    });
  }
  initializeBoard();

  // Arrow-hover glow when mouse is near the active cell
  document.addEventListener('mousemove', (e) => {
    document.querySelectorAll('.cell.active').forEach(activeCell => {
      const wrap = activeCell.closest('.cell-wrap');
      if (!wrap) return;
      const rect = wrap.getBoundingClientRect();
      const dist = Math.hypot(
        e.clientX - (rect.left + rect.width / 2),
        e.clientY - (rect.top + rect.height / 2)
      );
      wrap.classList.toggle('arrow-hover', dist < 80);
    });
  });

  // "Do next step" click handler
  document.addEventListener('click', (e) => {
    if (e.target.classList.contains('do-next-btn')) {
      e.preventDefault();
      e.stopPropagation();
      const stepId = e.target.closest('.cell-wrap').dataset.stepId;
      console.log(`Triggering sub-agent for step: ${stepId}`);
    }
  });
</script>

</body>
</html>
