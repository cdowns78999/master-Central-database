<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #000000;
            --bg-card: #0a0a0a;
            --bg-hover: #1a1a1a;
            --text-main: #ffffff;
            --text-sub: #888888;
            --accent: #1db954;
            --border: rgba(255, 255, 255, 0.08);
            --danger: #ff0000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            width: 300px;
            min-height: 400px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-right: 1px solid var(--accent);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .control-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .label-mini {
            font-size: 9px;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--text-sub);
        }

        select {
            background: #000;
            border: 1px solid var(--border);
            color: #fff;
            padding: 8px;
            border-radius: 4px;
            width: 100%;
            outline: none;
        }

        .btn-row {
            display: flex;
            gap: 8px;
        }

        .btn-status {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-open {
            background: var(--accent);
            color: #000;
        }

        .btn-close {
            background: #333;
            color: #fff;
        }

        .slots-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .slot-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .slot-item.active {
            border-color: var(--accent);
            background: #0c0c0c;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .dot-open {
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent);
        }

        .dot-closed {
            background: var(--danger);
            box-shadow: 0 0 8px var(--danger);
        }

        .time-txt {
            font-size: 11px;
            font-weight: 600;
        }

        .btn-copy {
            width: 100%;
            background: #fff;
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 4px;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            margin-top: auto;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>CALL PLANNER</h1>
        <div class="dot dot-open"></div>
    </div>

    <div class="control-box">
        <div class="label-mini">Select Slot</div>
        <select id="slotSelect">
            <option value="0">8:00 AM</option>
            <option value="1">8:30 AM</option>
            <option value="2">9:00 AM</option>
            <option value="3">9:30 AM</option>
            <option value="4">10:00 AM</option>
            <option value="5">10:30 AM</option>
            <option value="6">11:00 AM</option>
            <option value="7">11:30 AM</option>
        </select>
        <div class="btn-row">
            <button class="btn-status btn-open" id="setOpen">OPEN</button>
            <button class="btn-status btn-close" id="setClose">CLOSE</button>
        </div>
    </div>

    <div class="slots-grid" id="slotsGrid"></div>

    <button class="btn-copy" id="copyBtn">COPY MASTER LIST</button>

    <script src="popup.js"></script>
</body>

</html>
