<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Campaign Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #0a0e1a;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        canvas#particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        .header {
            text-align: center;
            margin-bottom: 60px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
        }

        .platforms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .platform-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 32px;
            transition: all 0.2s ease;
        }

        .platform-card:hover {
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .platform-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .platform-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .platform-name {
            font-size: 18px;
            font-weight: 600;
        }

        .campaign-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px 16px;
            color: #fff;
            font-size: 14px;
            margin-bottom: 12px;
            outline: none;
            transition: all 0.2s ease;
        }

        .campaign-input:focus {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }

        .campaign-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        /* Platform-Specific Buttons */
        .btn {
            width: 100%;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: none;
            position: relative;
        }

        /* Spotify Button */
        .btn-spotify {
            background: #1DB954;
            color: #ffffff;
            border: 1px solid #1ed760;
            box-shadow: 0 1.5px 0 0 rgba(255, 255, 255, 0.2) inset;
        }

        .btn-spotify:hover {
            background: #1ed760;
            transform: translateY(-1px);
            box-shadow: 0 1.5px 0 0 rgba(255, 255, 255, 0.2) inset,
                        0 4px 12px rgba(29, 185, 84, 0.4);
        }

        .btn-spotify:active {
            transform: translateY(0);
        }

        /* SoundCloud Button */
        .btn-soundcloud {
            background: #FF5500;
            color: #ffffff;
            border: 1px solid #ff6a1f;
            box-shadow: 0 1.5px 0 0 rgba(255, 255, 255, 0.2) inset;
        }

        .btn-soundcloud:hover {
            background: #ff6a1f;
            transform: translateY(-1px);
            box-shadow: 0 1.5px 0 0 rgba(255, 255, 255, 0.2) inset,
                        0 4px 12px rgba(255, 85, 0, 0.4);
        }

        .btn-soundcloud:active {
            transform: translateY(0);
        }

        /* Press Button */
        .btn-press {
            background: #4a5568;
            color: #ffffff;
            border: 1px solid #5a6678;
            box-shadow: 0 1.5px 0 0 rgba(255, 255, 255, 0.2) inset;
        }

        .btn-press:hover {
            background: #5a6678;
            transform: translateY(-1px);
            box-shadow: 0 1.5px 0 0 rgba(255, 255, 255, 0.2) inset,
                        0 4px 12px rgba(74, 85, 104, 0.4);
        }

        .btn-press:active {
            transform: translateY(0);
        }

        .campaign-list {
            margin-top: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .campaign-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
        }

        .campaign-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.12);
        }

        .campaign-info {
            flex: 1;
        }

        .campaign-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .campaign-meta {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }

        .campaign-status {
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(29, 185, 84, 0.15);
            color: #1DB954;
            border: 1px solid rgba(29, 185, 84, 0.3);
        }

        .delete-btn {
            background: rgba(255, 93, 143, 0.15);
            color: #ff5d8f;
            border: 1px solid rgba(255, 93, 143, 0.3);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            margin-left: 8px;
            transition: all 0.2s ease;
        }

        .delete-btn:hover {
            background: rgba(255, 93, 143, 0.25);
            border-color: rgba(255, 93, 143, 0.5);
        }

        .stats-bar {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 24px 32px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 32px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 4px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .icon {
            width: 16px;
            height: 16px;
        }

        @media (max-width: 768px) {
            .platforms-grid {
                grid-template-columns: 1fr;
            }

            .stats-bar {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <canvas id="particles"></canvas>

    <div class="container">
        <div class="header">
            <h1>Campaign Dashboard</h1>
            <p>Manage your music campaigns across platforms</p>
        </div>

        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="totalCampaigns">0</div>
                <div class="stat-label">Total Campaigns</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="activeCampaigns">0</div>
                <div class="stat-label">Active</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="completedCampaigns">0</div>
                <div class="stat-label">Completed</div>
            </div>
        </div>

        <div class="platforms-grid" style="margin-top: 40px;">
            <!-- Spotify -->
            <div class="platform-card">
                <div class="platform-header">
                    <div class="platform-icon" style="background: #1DB954;">
                        <svg class="icon" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
                        </svg>
                    </div>
                    <div class="platform-name">Spotify</div>
                </div>
                <input type="text" class="campaign-input" id="spotifyInput" placeholder="Campaign name...">
                <button class="btn btn-spotify" onclick="addCampaign('spotify')">
                    <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                    </svg>
                    Launch Spotify Campaign
                </button>
                <div class="campaign-list" id="spotifyList"></div>
            </div>

            <!-- SoundCloud -->
            <div class="platform-card">
                <div class="platform-header">
                    <div class="platform-icon" style="background: #FF5500;">
                        <svg class="icon" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M1.175 12.225c-.051 0-.094.046-.101.1l-.233 2.154.233 2.105c.007.058.05.098.101.098.053 0 .096-.04.103-.098l.27-2.105-.27-2.154c-.007-.057-.05-.1-.103-.1zm1.246.047c-.058 0-.1.047-.106.107l-.191 1.984.191 1.927c.006.057.048.107.106.107.059 0 .103-.046.112-.107l.23-1.927-.23-1.984c-.009-.06-.053-.107-.112-.107zm1.233.061c-.063 0-.11.053-.117.112l-.175 1.863.175 1.815c.007.06.054.111.117.111.061 0 .11-.051.119-.111l.206-1.815-.206-1.863c-.009-.059-.058-.112-.119-.112zm1.24.062c-.068 0-.118.057-.127.119l-.158 1.793.158 1.757c.009.062.059.12.127.12.066 0 .12-.058.125-.12l.182-1.757-.182-1.793c-.005-.062-.059-.119-.125-.119zm1.236.062c-.071 0-.123.06-.133.124l-.142 1.729.142 1.699c.01.066.062.125.133.125.068 0 .122-.059.13-.125l.163-1.699-.163-1.729c-.008-.064-.062-.124-.13-.124z"/>
                        </svg>
                    </div>
                    <div class="platform-name">SoundCloud</div>
                </div>
                <input type="text" class="campaign-input" id="soundcloudInput" placeholder="Campaign name...">
                <button class="btn btn-soundcloud" onclick="addCampaign('soundcloud')">
                    <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                    </svg>
                    Launch SoundCloud Campaign
                </button>
                <div class="campaign-list" id="soundcloudList"></div>
            </div>

            <!-- Press -->
            <div class="platform-card">
                <div class="platform-header">
                    <div class="platform-icon" style="background: #4a5568;">
                        <svg class="icon" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/>
                        </svg>
                    </div>
                    <div class="platform-name">Press & Media</div>
                </div>
                <input type="text" class="campaign-input" id="pressInput" placeholder="Campaign name...">
                <button class="btn btn-press" onclick="addCampaign('press')">
                    <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                    </svg>
                    Launch Press Campaign
                </button>
                <div class="campaign-list" id="pressList"></div>
            </div>
        </div>
    </div>

    <script>
        // Particle Background
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = Array.from({ length: 80 }, () => ({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2 + 0.5,
                vx: (Math.random() - 0.5) * 0.5,
                vy: (Math.random() - 0.5) * 0.5,
                opacity: Math.random() * 0.5 + 0.2
            }));
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;

                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

                ctx.fillStyle = `rgba(76, 201, 240, ${p.opacity})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize();
        animate();

        // Campaign Management
        let campaigns = {
            spotify: [],
            soundcloud: [],
            press: []
        };

        function addCampaign(platform) {
            const input = document.getElementById(`${platform}Input`);
            const name = input.value.trim();

            if (!name) return;

            const campaign = {
                id: Date.now(),
                name: name,
                platform: platform,
                status: 'Active',
                date: new Date().toLocaleDateString()
            };

            campaigns[platform].push(campaign);
            renderCampaign(campaign);
            input.value = '';
            updateStats();
        }

        function renderCampaign(campaign) {
            const list = document.getElementById(`${campaign.platform}List`);
            const item = document.createElement('div');
            item.className = 'campaign-item';
            item.id = `campaign-${campaign.id}`;
            item.innerHTML = `
                <div class="campaign-info">
                    <div class="campaign-title">${campaign.name}</div>
                    <div class="campaign-meta">Started ${campaign.date}</div>
                </div>
                <div style="display: flex; align-items: center;">
                    <div class="campaign-status">${campaign.status}</div>
                    <button class="delete-btn" onclick="deleteCampaign('${campaign.platform}', ${campaign.id})">×</button>
                </div>
            `;
            list.appendChild(item);
        }

        function deleteCampaign(platform, id) {
            campaigns[platform] = campaigns[platform].filter(c => c.id !== id);
            document.getElementById(`campaign-${id}`).remove();
            updateStats();
        }

        function updateStats() {
            const total = campaigns.spotify.length + campaigns.soundcloud.length + campaigns.press.length;
            document.getElementById('totalCampaigns').textContent = total;
            document.getElementById('activeCampaigns').textContent = total;
            document.getElementById('completedCampaigns').textContent = 0;
        }

        // Enter key support
        ['spotify', 'soundcloud', 'press'].forEach(platform => {
            document.getElementById(`${platform}Input`).addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addCampaign(platform);
            });
        });
    </script>
</body>
</html>
