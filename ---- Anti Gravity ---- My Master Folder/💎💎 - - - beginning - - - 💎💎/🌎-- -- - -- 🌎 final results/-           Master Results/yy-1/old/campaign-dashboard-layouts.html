<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaign Dashboard - Layout Styles</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gray-1: #fafafa;
            --gray-2: #f5f5f5;
            --gray-3: #e5e5e5;
            --gray-5: #d4d4d4;
            --gray-6: #a3a3a3;
            --gray-8: #737373;
            --gray-10: #525252;
            --gray-11: #404040;
            --gray-12: #171717;
        }

        body {
            background: var(--gray-2);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--gray-12);
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        .section {
            margin-bottom: 60px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--gray-12);
            margin-bottom: 8px;
        }

        .section-desc {
            font-size: 14px;
            color: var(--gray-10);
            margin-bottom: 24px;
        }

        /* STYLE 1: VERTICAL / STACKED (Top) */
        .grid-vertical {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
            gap: 24px;
        }

        .card {
            background: var(--gray-1);
            border: 1px solid var(--gray-3);
            border-radius: 24px;
            padding: 24px;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .platform-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .platform-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--gray-12);
        }

        .input {
            width: 100%;
            height: 40px;
            background: var(--gray-1);
            border: 1px solid var(--gray-3);
            border-radius: 12px;
            padding: 0 16px;
            font-size: 14px;
            color: var(--gray-12);
            margin-bottom: 12px;
            transition: all 0.2s;
        }

        .input:focus {
            outline: none;
            border-color: var(--gray-5);
            background: #fff;
        }

        .input::placeholder {
            color: var(--gray-6);
        }

        /* Platform Buttons */
        .btn {
            width: 100%;
            height: 40px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-spotify {
            background: #1DB954;
            color: #ffffff;
            border: 1px solid #1ed760;
            box-shadow: 0 1.5px 0 0 rgba(255, 255, 255, 0.20) inset;
        }

        .btn-spotify:hover {
            background: #1ed760;
        }

        .btn-soundcloud {
            background: #FF5500;
            color: #ffffff;
            border: 1px solid #ff6a1f;
            box-shadow: 0 1.5px 0 0 rgba(255, 255, 255, 0.20) inset;
        }

        .btn-soundcloud:hover {
            background: #ff6a1f;
        }

        .btn-press {
            background: var(--gray-12);
            color: #ffffff;
            border: 1px solid var(--gray-11);
            box-shadow: 0 1.5px 0 0 rgba(255, 255, 255, 0.20) inset;
        }

        .btn-press:hover {
            background: var(--gray-11);
        }

        /* STYLE 2: HORIZONTAL / SIDE BY SIDE */
        .grid-horizontal {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .card-horizontal {
            background: var(--gray-1);
            border: 1px solid var(--gray-3);
            border-radius: 24px;
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .card-horizontal .card-header {
            margin-bottom: 0;
            flex-shrink: 0;
        }

        .card-horizontal .input {
            margin-bottom: 0;
            flex: 1;
            min-width: 200px;
        }

        .card-horizontal .btn {
            width: auto;
            min-width: 180px;
            flex-shrink: 0;
        }

        .icon {
            width: 18px;
            height: 18px;
        }

        .campaign-list {
            margin-top: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .campaign-item {
            background: var(--gray-2);
            border: 1px solid var(--gray-3);
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .campaign-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--gray-12);
        }

        .delete-btn {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: transparent;
            border: 1px solid var(--gray-3);
            color: var(--gray-10);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.2s;
        }

        .delete-btn:hover {
            background: var(--gray-3);
        }

        @media (max-width: 768px) {
            .grid-vertical {
                grid-template-columns: 1fr;
            }

            .card-horizontal {
                flex-direction: column;
                align-items: stretch;
            }

            .card-horizontal .card-header {
                margin-bottom: 16px;
            }

            .card-horizontal .input {
                margin-bottom: 12px;
            }

            .card-horizontal .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- STYLE 1: VERTICAL / TOP -->
        <div class="section">
            <h2 class="section-title">Style 1: Vertical Layout (Top)</h2>
            <p class="section-desc">Buttons stacked vertically in separate cards</p>

            <div class="grid-vertical">
                <!-- Spotify -->
                <div class="card">
                    <div class="card-header">
                        <div class="platform-icon" style="background: #1DB954;">
                            <svg class="icon" fill="white" viewBox="0 0 24 24">
                                <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
                            </svg>
                        </div>
                        <div class="platform-name">Spotify</div>
                    </div>
                    <input type="text" class="input" id="spotify1" placeholder="Campaign name">
                    <button class="btn btn-spotify" onclick="addCampaign('spotify1', 'spotifyList1')">
                        <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                        </svg>
                        Launch Campaign
                    </button>
                    <div class="campaign-list" id="spotifyList1"></div>
                </div>

                <!-- SoundCloud -->
                <div class="card">
                    <div class="card-header">
                        <div class="platform-icon" style="background: #FF5500;">
                            <svg class="icon" fill="white" viewBox="0 0 24 24">
                                <path d="M1.175 12.225c-.051 0-.094.046-.101.1l-.233 2.154.233 2.105c.007.058.05.098.101.098.053 0 .096-.04.103-.098l.27-2.105-.27-2.154c-.007-.057-.05-.1-.103-.1zm1.246.047c-.058 0-.1.047-.106.107l-.191 1.984.191 1.927c.006.057.048.107.106.107.059 0 .103-.046.112-.107l.23-1.927-.23-1.984c-.009-.06-.053-.107-.112-.107z"/>
                            </svg>
                        </div>
                        <div class="platform-name">SoundCloud</div>
                    </div>
                    <input type="text" class="input" id="soundcloud1" placeholder="Campaign name">
                    <button class="btn btn-soundcloud" onclick="addCampaign('soundcloud1', 'soundcloudList1')">
                        <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                        </svg>
                        Launch Campaign
                    </button>
                    <div class="campaign-list" id="soundcloudList1"></div>
                </div>

                <!-- Press -->
                <div class="card">
                    <div class="card-header">
                        <div class="platform-icon" style="background: var(--gray-12);">
                            <svg class="icon" fill="white" viewBox="0 0 24 24">
                                <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/>
                            </svg>
                        </div>
                        <div class="platform-name">Press</div>
                    </div>
                    <input type="text" class="input" id="press1" placeholder="Campaign name">
                    <button class="btn btn-press" onclick="addCampaign('press1', 'pressList1')">
                        <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                        </svg>
                        Launch Campaign
                    </button>
                    <div class="campaign-list" id="pressList1"></div>
                </div>
            </div>
        </div>

        <!-- STYLE 2: HORIZONTAL / SIDE -->
        <div class="section">
            <h2 class="section-title">Style 2: Horizontal Layout (Side)</h2>
            <p class="section-desc">Buttons arranged horizontally side by side</p>

            <div class="grid-horizontal">
                <!-- Spotify -->
                <div class="card-horizontal">
                    <div class="card-header">
                        <div class="platform-icon" style="background: #1DB954;">
                            <svg class="icon" fill="white" viewBox="0 0 24 24">
                                <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
                            </svg>
                        </div>
                        <div class="platform-name">Spotify</div>
                    </div>
                    <input type="text" class="input" id="spotify2" placeholder="Campaign name">
                    <button class="btn btn-spotify" onclick="addCampaign('spotify2', 'spotifyList2')">
                        <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                        </svg>
                        Launch Campaign
                    </button>
                </div>

                <!-- SoundCloud -->
                <div class="card-horizontal">
                    <div class="card-header">
                        <div class="platform-icon" style="background: #FF5500;">
                            <svg class="icon" fill="white" viewBox="0 0 24 24">
                                <path d="M1.175 12.225c-.051 0-.094.046-.101.1l-.233 2.154.233 2.105c.007.058.05.098.101.098.053 0 .096-.04.103-.098l.27-2.105-.27-2.154c-.007-.057-.05-.1-.103-.1zm1.246.047c-.058 0-.1.047-.106.107l-.191 1.984.191 1.927c.006.057.048.107.106.107.059 0 .103-.046.112-.107l.23-1.927-.23-1.984c-.009-.06-.053-.107-.112-.107z"/>
                            </svg>
                        </div>
                        <div class="platform-name">SoundCloud</div>
                    </div>
                    <input type="text" class="input" id="soundcloud2" placeholder="Campaign name">
                    <button class="btn btn-soundcloud" onclick="addCampaign('soundcloud2', 'soundcloudList2')">
                        <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                        </svg>
                        Launch Campaign
                    </button>
                </div>

                <!-- Press -->
                <div class="card-horizontal">
                    <div class="card-header">
                        <div class="platform-icon" style="background: var(--gray-12);">
                            <svg class="icon" fill="white" viewBox="0 0 24 24">
                                <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/>
                            </svg>
                        </div>
                        <div class="platform-name">Press</div>
                    </div>
                    <input type="text" class="input" id="press2" placeholder="Campaign name">
                    <button class="btn btn-press" onclick="addCampaign('press2', 'pressList2')">
                        <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                        </svg>
                        Launch Campaign
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function addCampaign(inputId, listId) {
            const input = document.getElementById(inputId);
            const name = input.value.trim();
            if (!name) return;

            const list = document.getElementById(listId);
            const item = document.createElement('div');
            item.className = 'campaign-item';
            item.innerHTML = `
                <div class="campaign-name">${name}</div>
                <button class="delete-btn" onclick="this.parentElement.remove()">×</button>
            `;
            list.appendChild(item);
            input.value = '';
        }

        // Enter key support
        document.querySelectorAll('.input').forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const btn = e.target.nextElementSibling;
                    btn.click();
                }
            });
        });
    </script>
</body>
</html>
