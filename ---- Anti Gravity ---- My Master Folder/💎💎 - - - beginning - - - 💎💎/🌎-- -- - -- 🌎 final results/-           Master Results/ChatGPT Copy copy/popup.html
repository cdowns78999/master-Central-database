<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGPT Copy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 120px;
            height: 120px;
            min-width: 120px;
            min-height: 120px;
            max-width: 120px;
            max-height: 120px;
            background: #000;
            /* Deep black fallback */
            margin: 0;
            padding: 0;
            overflow: hidden;
            position: relative;
            /* iOS System Font stack */
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 120px;
            height: 120px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Consistent 2px white border */
            border: 2px solid #ffffff;
            box-sizing: border-box;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            animation: containerEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        /* Perfectly Pleasant "nice white dot" */
        .copy-toast {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 7px;
            height: 7px;
            background: #ffffff;
            border-radius: 50%;
            /* Layered shadow for luminous 3D depth */
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.4),
                0 0 15px rgba(255, 255, 255, 0.8),
                0 0 25px rgba(255, 255, 255, 0.4),
                inset 0 0 2px rgba(255, 255, 255, 1);
            opacity: 0;
            /* Premium bouncy transition */
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 30;
            pointer-events: none;
            font-size: 0;
            color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .copy-toast.visible {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        /* Only the success dot breathes */
        .copy-toast.visible:not(.error) {
            animation: dotBreathe 3s ease-in-out 0.6s infinite;
        }

        /* Subtle grey 'c' for error/alt state */
        .copy-toast.error {
            background: transparent;
            box-shadow: none;
            color: rgba(255, 255, 255, 0.45);
            font-size: 88px;
            font-weight: 500;
            line-height: 1;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.15);
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: translate(-50%, -50%) scale(1);
            /* Visual nudge for perfect centering as developed in Phase 1 */
            padding-bottom: 33px;
            padding-right: 4px;
            box-sizing: border-box;
        }

        /* Animations */
        @keyframes containerEntrance {
            from {
                opacity: 0;
                filter: blur(4px);
                transform: scale(1.05);
            }

            to {
                opacity: 1;
                filter: blur(0);
                transform: scale(1);
            }
        }

        /* Particle burst for premium feel */
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 20;
        }

        @keyframes particleBurst {
            0% {
                transform: translate(0, 0) scale(1.5);
                opacity: 1;
            }

            100% {
                transform: translate(var(--tx), var(--ty)) scale(0);
                opacity: 0;
            }
        }

        /* Organic breathing pulse */
        @keyframes dotBreathe {

            0%,
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
                filter: brightness(1);
            }

            50% {
                transform: translate(-50%, -50%) scale(1.3);
                opacity: 0.9;
                filter: brightness(1.1);
                box-shadow:
                    0 0 0 2px rgba(255, 255, 255, 0.4),
                    0 0 20px rgba(255, 255, 255, 0.9),
                    0 0 30px rgba(255, 255, 255, 0.5),
                    inset 0 0 2px rgba(255, 255, 255, 1);
            }
        }

        /* Unique 'c' Zoom sequence */
        @keyframes cZoom {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
                filter: blur(0);
            }

            100% {
                transform: translate(-50%, -50%) scale(25);
                opacity: 0;
                filter: blur(12px);
            }
        }

        .copy-toast.zooming {
            animation: cZoom 0.5s cubic-bezier(0.19, 1, 0.22, 1) forwards !important;
        }

        /* Glassmorphic Script Preview Box */
        .script-preview {
            position: absolute;
            bottom: 6px;
            left: 6px;
            right: 6px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            padding: 5px 8px;
            font-size: 8px;
            color: rgba(255, 255, 255, 0.5);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            user-select: text;
            cursor: text;
            z-index: 10;
            transition: all 0.3s ease;
            text-align: left;
        }

        .script-preview:hover {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.8);
        }
    </style>
</head>

<body>
    <div class="container">
        <div id="copyToast" class="copy-toast"></div>
        <div class="script-preview" id="scriptPreview" title="Click to select/copy manually">
            "Adopt a more practical, senseable tone, without losing the spirit of the thoughtfulness of the article"
        </div>
    </div>
    <script src="popup.js"></script>
</body>

</html>
