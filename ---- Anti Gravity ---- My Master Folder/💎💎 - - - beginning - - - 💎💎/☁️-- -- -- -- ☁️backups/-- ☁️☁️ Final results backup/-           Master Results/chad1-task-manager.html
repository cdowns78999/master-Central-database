                return {
                    id: id,
                    left: container.style.left,
                    top: container.style.top,
                    data: tileData[id]
                };
            });

            const state = {
                tileCounter,
                tiles,
                directions: tileDirections,
                fontSize: document.documentElement.style.getPropertyValue('--front-facing-font-size') || '12px'
            };

            const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const filename = isAuto ? `AUTO-BACKUP-task-manager-${new Date().getTime()}.json` : `task-manager-state-${new Date().toISOString().slice(0, 10)}.json`;
            a.download = filename;
            a.click();
            setTimeout(() => URL.revokeObjectURL(url), 100);
        }

        function importState(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (e) {
                try {
                    const state = JSON.parse(e.target.result);

                    // Clear current canvas
                    canvas.innerHTML = '';
                    tileData = {};

                    // Restore counter
                    tileCounter = state.tileCounter || 0;

                    // Restore directions
                    tileDirections = state.directions || {};

                    // Recreate tiles
                    state.tiles.forEach(tile => {
                        tileData[tile.id] = tile.data;
                        recreateTile(tile);

                        // Restore direction indicators
                        if (tileDirections[tile.id]) {
                            Object.keys(tileDirections[tile.id]).forEach(direction => {
                                if (tileDirections[tile.id][direction]) {
                                    placeDirectionText(tile.id, direction);
                                }
                            });
                        }
                    });

                    // Restore global settings
                    if (state.fontSize) {
                        const fontSize = state.fontSize;
                        document.documentElement.style.setProperty('--front-facing-font-size', fontSize);

                        // Sync all sliders
                        document.querySelectorAll('.font-size-slider').forEach(slider => {
                            slider.value = parseInt(fontSize);
                        });
                    }

                    console.log('State imported successfully');
                    // Reset input
                    event.target.value = '';
                } catch (err) {
                    console.error('Failed to import state:', err);
                    alert('Invalid JSON file. Please ensure it is a valid Task Manager state file.');
                }
            };
            reader.readAsText(file);
        }

        function recreateTile(tileConfig) {
            const tileContainer = document.createElement('div');
            tileContainer.className = 'tile-container';
            tileContainer.style.left = tileConfig.left;
            tileContainer.style.top = tileConfig.top;
            tileContainer.style.transform = 'none';
            tileContainer.dataset.tileId = tileConfig.id;

            const data = tileConfig.data || { link: '', linkName: '', webhook: '', script: '', step: '' };

            tileContainer.innerHTML = getTileTemplate(tileConfig.id, data);

            canvas.appendChild(tileContainer);

            // Add font size slider listener
            const slider = tileContainer.querySelector('.font-size-slider');
            addFontSizeSliderListener(slider);

            makeDraggable(tileContainer);
        }

        // Emergency Backup & Exit Confirmation
        window.addEventListener('beforeunload', (e) => {
            // Trigger auto-export
            exportState(true);

            // Standard browser confirmation
            e.preventDefault();
            e.returnValue = '';
        });
    </script>

        <span>Task Manager</span>
