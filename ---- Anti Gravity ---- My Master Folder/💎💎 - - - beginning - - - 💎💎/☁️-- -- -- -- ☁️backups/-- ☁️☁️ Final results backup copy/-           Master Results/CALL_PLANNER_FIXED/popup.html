<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #000000;
            --bg-card: #0a0a0a;
            --bg-hover: #1a1a1a;
            --text-main: #ffffff;
            --text-sub: #888888;
            --accent: #1db954;
            --border: rgba(255, 255, 255, 0.08);
            --danger: #ff0000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            width: 320px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            border-right: 1px solid var(--accent);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .tabs-container {
            display: flex;
            gap: 6px;
            background: var(--bg-card);
            padding: 4px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-sub);
            padding: 8px 4px;
            font-size: 10px;
            font-weight: 700;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .tab-btn:hover {
            color: #fff;
            background: var(--bg-hover);
        }

        .tab-btn.active {
            background: var(--accent);
            color: #000;
        }

        .mode-container {
            display: flex;
            gap: 8px;
            margin-bottom: 4px;
        }

        .mode-btn {
            flex: 1;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-sub);
            padding: 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .mode-btn:hover {
            border-color: var(--accent);
            color: #fff;
        }

        .mode-btn.active {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(29, 185, 84, 0.05);
        }

        .label-mini {
            font-size: 9px;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--text-sub);
            margin-bottom: 4px;
        }

        .slots-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .slot-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .slot-item:hover {
            background: var(--bg-hover);
            border-color: var(--accent);
            transform: translateY(-1px);
        }

        .slot-item:active {
            transform: translateY(0);
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .dot-open {
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent);
        }

        .dot-closed {
            background: var(--danger);
            box-shadow: 0 0 8px var(--danger);
        }

        .time-txt {
            font-size: 11px;
            font-weight: 600;
        }

        .footer-btns {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--border);
        }

        .btn-copy {
            width: 100%;
            background: #fff;
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 4px;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-copy:hover {
            background: #e0e0e0;
        }

        .btn-copy-all {
            flex: 1;
            background: #1a1a1a;
            color: #fff;
            border: 1px solid var(--border);
            padding: 12px 4px;
            border-radius: 4px;
            font-weight: 700;
            font-size: 9px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .btn-copy-row {
            display: flex;
            gap: 8px;
            width: 100%;
        }

        .btn-copy-all:hover {
            background: #252525;
            border-color: var(--accent);
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>CALL PLANNER</h1>
        <div class="dot dot-open"></div>
    </div>

    <div>
        <div class="label-mini">Select Mode</div>
        <div class="mode-container" id="modeSwitcher">
            <button class="mode-btn active" data-mode="day">☀️ DAY</button>
            <button class="mode-btn" data-mode="night">🌙 NIGHT</button>
        </div>
    </div>

    <div>
        <div class="label-mini">Quick Day Select</div>
        <div class="tabs-container" id="tabsRow">
            <button class="tab-btn" data-day="Monday">MON</button>
            <button class="tab-btn" data-day="Tuesday">TUE</button>
            <button class="tab-btn" data-day="Wednesday">WED</button>
            <button class="tab-btn" data-day="Thursday">THU</button>
            <button class="tab-btn" data-day="Friday">FRI</button>
        </div>
    </div>

    <div class="slots-grid" id="slotsGrid"></div>

    <div class="footer-btns">
        <button class="btn-copy" id="copyBtn">COPY MASTER LIST (CURRENT)</button>
        <div class="btn-copy-row">
            <button class="btn-copy-all" id="copyAllDayBtn">WEEK (DAY)</button>
            <button class="btn-copy-all" id="copyAllNightBtn">WEEK (NIGHT)</button>
        </div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
