<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Automatic Recap | Ocean Protocol</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;800&family=Inter:wght@400;600;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="mesh-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="app-frame">
        <div id="screen-mount" class="scroll-hide"></div>

        <nav class="tab-bar-container">
            <div class="tab-btn active" onclick="app.load('home')">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                    <polyline points="9 22 9 12 15 12 15 22" />
                </svg>
            </div>
            <div class="tab-btn" onclick="app.load('search')">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <circle cx="11" cy="11" r="8" />
                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg>
            </div>
            <div class="tab-btn" onclick="document.getElementById('import-input').click()">
                <div class="floppy-3d-container">
                    <div class="floppy-disk-3d floppy-cyan">
                        <div class="floppy-face front">
                            <div class="floppy-shutter"></div>
                            <div class="floppy-label">
                                <div class="floppy-line"></div>
                                <div class="floppy-line"></div>
                            </div>
                        </div>
                        <div class="floppy-face back"></div>
                    </div>
                </div>
            </div>
            <div class="tab-btn center-island" onclick="app.load('ticket')">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3">
                    <rect x="3" y="3" width="7" height="7" />
                    <rect x="14" y="3" width="7" height="7" />
                    <rect x="14" y="14" width="7" height="7" />
                    <rect x="3" y="14" width="7" height="7" />
                </svg>
            </div>
            <div class="tab-btn" onclick="app.exportData()">
                <div class="floppy-3d-container">
                    <div class="floppy-disk-3d floppy-pink">
                        <div class="floppy-face front">
                            <div class="floppy-shutter"></div>
                            <div class="floppy-label">
                                <div class="floppy-line"></div>
                                <div class="floppy-line"></div>
                            </div>
                        </div>
                        <div class="floppy-face back"></div>
                    </div>
                </div>
            </div>
            <div class="tab-btn" onclick="app.load('profile')">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg>
            </div>
        </nav>

        <input type="file" id="import-input" hidden accept=".json" onchange="app.importData(this)">

        <!-- 🎬 CINEMATIC FOCUS OVERLAY -->
        <div id="focus-overlay" class="focus-overlay" onclick="app.exitFocusMode()">
            <div class="focused-task-container" onclick="event.stopPropagation()">
                <div id="focus-mount"></div>
            </div>
        </div>
    </div>
    </div>

    <script src="screens.js"></script>
    <script src="app.js"></script>
</body>

</html>
