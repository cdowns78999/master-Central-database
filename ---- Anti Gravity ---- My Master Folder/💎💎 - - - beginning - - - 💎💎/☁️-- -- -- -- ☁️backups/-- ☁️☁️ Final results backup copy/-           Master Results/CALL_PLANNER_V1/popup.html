<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #121212;
            --bg-card: #181818;
            --bg-hover: #282828;
            --text-main: #ffffff;
            --text-sub: #b3b3b3;
            --accent: #1db954;
            /* Spotify Green */
            --accent-dim: rgba(29, 185, 84, 0.1);
            --border: rgba(255, 255, 255, 0.05);
            --danger: #e91429;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            width: 320px;
            min-height: 480px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-x: hidden;
        }

        /* Subtle Headers */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .header h1 {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .header .version {
            font-size: 10px;
            color: var(--text-sub);
        }

        /* Top Controls - Very subtle and integrated */
        .controls {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .label-tiny {
            font-size: 9px;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--text-sub);
            letter-spacing: 0.1em;
        }

        select {
            background: #242424;
            border: 1px solid transparent;
            color: var(--text-main);
            padding: 8px;
            border-radius: 4px;
            font-size: 12px;
            font-family: inherit;
            outline: none;
            width: 100%;
        }

        select:focus {
            border-color: var(--accent);
        }

        .btn-row {
            display: flex;
            gap: 8px;
        }

        .btn-status {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 500px;
            /* Spotify style pills */
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-open {
            background: var(--accent);
            color: #000;
        }

        .btn-close {
            background: transparent;
            border: 1px solid #535353;
            color: var(--text-main);
        }

        .btn-open:hover {
            transform: scale(1.04);
            background: #1ed760;
        }

        .btn-close:hover {
            border-color: #fff;
        }

        /* The Slots Grid */
        .slots-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .slot-item {
            background: var(--bg-card);
            border: 1px solid transparent;
            border-radius: 8px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
            cursor: default;
        }

        .slot-item:hover {
            background: var(--bg-hover);
        }

        .slot-item.active {
            border-color: var(--accent);
            background: var(--bg-hover);
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #535353;
        }

        .dot-open {
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
        }

        .dot-closed {
            background: var(--danger);
            box-shadow: 0 0 10px var(--danger);
        }

        .time-label {
            font-size: 12px;
            font-weight: 600;
        }

        .status-label {
            font-size: 9px;
            color: var(--text-sub);
            text-transform: uppercase;
        }

        /* Footer Action */
        .footer {
            margin-top: auto;
            padding-top: 10px;
        }

        .btn-master {
            width: 100%;
            background: #fff;
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 500px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 12px;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .btn-master:active {
            transform: scale(0.98);
        }

        .btn-master:hover {
            transform: scale(1.02);
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>Call Organizer</h1>
        <span class="version">ELITE V1.0</span>
    </div>

    <div class="controls">
        <div class="control-group">
            <span class="label-tiny">Target Slot</span>
            <select id="slotSelect">
                <option value="0">8:00 AM</option>
                <option value="1">8:30 AM</option>
                <option value="2">9:00 AM</option>
                <option value="3">9:30 AM</option>
                <option value="4">10:00 AM</option>
                <option value="5">10:30 AM</option>
                <option value="6">11:00 AM</option>
                <option value="7">11:30 AM</option>
            </select>
        </div>
        <div class="btn-row">
            <button class="btn-status btn-open" id="setOpen">Set Open</button>
            <button class="btn-status btn-close" id="setClose">Set Closed</button>
        </div>
    </div>

    <div class="slots-grid" id="slotsGrid">
        <!-- JS injected slots -->
    </div>

    <div class="footer">
        <button class="btn-master" id="copyBtn">Copy Master List</button>
    </div>

    <script src="popup.js"></script>
</body>

</html>
