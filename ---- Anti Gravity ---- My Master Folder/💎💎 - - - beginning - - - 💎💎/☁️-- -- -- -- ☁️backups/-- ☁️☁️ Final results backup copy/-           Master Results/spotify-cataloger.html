<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Cataloger | Workstation</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --bg: #010c1a;
            --sidebar-bg: rgba(0, 10, 25, 0.8);
            --card-bg: rgba(255, 255, 255, 0.05);
            --primary: #4cc9f0;
            --accent: #4361ee;
            --text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
            --radius: 16px;
            --transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Particles Background */
        #bgCanvas {
            position: absolute;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            opacity: 0.5;
        }

        /* Sidebar Styles */
        .sidebar {
            width: 320px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(40px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar-header {
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .site-title {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .add-curator-btn {
            background: rgba(76, 201, 240, 0.1);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .add-curator-btn:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 20px var(--primary);
        }

        .curator-list {
            flex-grow: 1;
            padding: 10px 20px;
            overflow-y: auto;
        }

        .curator-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 8px;
            transition: var(--transition);
            border: 1px solid transparent;
        }

        .curator-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .curator-item.active {
            background: rgba(76, 201, 240, 0.1);
            border-color: var(--primary);
            box-shadow: inset 0 0 15px rgba(76, 201, 240, 0.1);
        }

        .curator-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #222;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .curator-info {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            overflow: hidden;
        }

        .curator-name {
            font-weight: 600;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .curator-meta {
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        /* Main Workspace Styles */
        .workspace {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 40px;
            position: relative;
        }

        .workspace-header {
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .curator-headline {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .curator-large-avatar {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .curator-title-group h2 {
            font-size: 2.5rem;
            font-weight: 800;
        }

        .curator-title-group p {
            font-size: 0.9rem;
            color: var(--text-dim);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .actions {
            display: flex;
            gap: 12px;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
            transition: var(--transition);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: #fff;
        }

        /* Browser Grid Styles */
        .browser-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        /* Folder Styles */
        .folder {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius);
            padding: 20px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
        }

        .folder:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4), 0 0 30px rgba(76, 201, 240, 0.2);
        }

        .folder-icon {
            width: 50px;
            height: 50px;
            color: var(--primary);
            filter: drop-shadow(0 0 10px var(--primary));
        }

        .folder-name {
            font-weight: 700;
            font-size: 1.1rem;
        }

        .folder-count {
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        /* Playlist Card Styles */
        .playlist-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius);
            overflow: hidden;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .playlist-card:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: #fff;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 0 0 40px rgba(76, 201, 240, 0.3);
        }

        .playlist-art-container {
            width: 100%;
            aspect-ratio: 1;
            position: relative;
            background: #111;
        }

        .playlist-art {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }

        .playlist-card:hover .playlist-art {
            opacity: 0.7;
        }

        .playlist-content {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .playlist-title {
            font-weight: 700;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .playlist-tag-container {
            display: flex;
            gap: 6px;
        }

        .tag-pill {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-dim);
            cursor: pointer;
            transition: var(--transition);
        }

        .tag-pill:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
        }

        .tag-pill.active {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--primary);
        }

        .playlist-actions {
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }

        .btn-icon {
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
        }

        .btn-icon:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 15px var(--primary);
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal {
            background: #0a1122;
            border: 1px solid rgba(76, 201, 240, 0.3);
            border-radius: 24px;
            width: 100%;
            max-width: 500px;
            padding: 40px;
            box-shadow: 0 20px 100px rgba(0, 0, 0, 1), 0 0 50px rgba(76, 201, 240, 0.15);
            animation: modalIn 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(20px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-title {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-group label {
            font-size: 0.8rem;
            color: var(--primary);
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .modal input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 12px;
            color: #fff;
            width: 100%;
            outline: none;
            font-family: inherit;
            transition: var(--transition);
        }

        .modal input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(76, 201, 240, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }

        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 40px;
        }

        .btn-primary {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 12px 30px;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(76, 201, 240, 0.4);
            transition: var(--transition);
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(76, 201, 240, 0.6);
        }

        /* Empty State */
        .empty-state {
            margin: auto;
            text-align: center;
            color: var(--text-dim);
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .empty-icon {
            width: 100px;
            height: 100px;
            opacity: 0.1;
            color: var(--primary);
        }

        /* Animation utilities */
        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }

        /* Sidebar Right Styles (Control Center) */
        .sidebar-right {
            width: 300px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(40px);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .control-header {
            padding: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .control-section {
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .control-label {
            font-size: 0.75rem;
            color: var(--primary);
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 15px;
            border-radius: 10px;
            color: #fff;
            font-family: inherit;
            outline: none;
            transition: var(--transition);
        }

        .search-box input:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(76, 201, 240, 0.2);
        }

        .filter-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .filter-pill {
            padding: 8px 15px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-dim);
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
            flex: 1;
        }

        .filter-pill.active {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary);
        }

        .search-stats {
            margin-top: auto;
            padding: 30px;
            font-size: 0.8rem;
            color: var(--text-dim);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        </head><body><canvas id="bgCanvas"></canvas>< !-- Sidebar --><aside class="sidebar"><div class="sidebar-header"><h1 class="site-title">SPOTIFY CATALOGER</h1><button class="add-curator-btn" onclick="openModal('curatorModal')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>ADD CURATOR </button></div><div class="curator-list" id="curatorList">< !-- Curators injected here --></div></aside>< !-- Workspace --><main class="workspace" id="workspace"><div id="workspaceContent" style="display: none; height: 100%; display: flex; flex-direction: column;"><div class="workspace-header"><div class="curator-headline"><img src="" alt="" class="curator-large-avatar" id="headerAvatar"><div class="curator-title-group"><p id="headerMeta">ACTIVE CURATOR</p><h2 id="headerName">Select a Curator</h2></div></div><div class="actions"><button class="btn-secondary" onclick="goBackToFolders()" id="backBtn"
        style="display: none;">BACK</button><button class="btn-secondary" onclick="openModal('folderModal')" id="addFolderBtn">NEW GROUP</button><button class="btn-secondary" style="background: var(--primary); color: #000;"
        onclick="openModal('playlistModal')" id="addPlaylistBtn">ADD PLAYLIST</button></div></div><div class="browser-grid" id="browserGrid">< !-- Folders and Playlists injected here --></div></div>< !-- Initial Empty State --><div class="empty-state" id="initialState"><svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z" /><path d="M12 6v6l4 2" /></svg><h3>No Curator Selected</h3><p>Select a curator from the sidebar or add a new one,
        or use the search controls to find specific curators and playlists.</p></div></main>< !-- Right Sidebar: Control Center --><aside class="sidebar-right"><div class="control-header"><h2 class="site-title" style="font-size: 1.1rem; letter-spacing: 0.1em;">CONTROL CENTER</h2></div><div class="control-section"><div class="control-label">Search Curators</div><div class="search-box"><input type="text" id="curatorSearch" placeholder="Find curator..." oninput="handleCuratorSearch()"></div></div><div class="control-section"><div class="control-label">Find Playlist</div><div class="search-box"><input type="text" id="globalSearch" placeholder="Search across all folders..." oninput="handleGlobalSearch()"></div></div><div class="control-section"><div class="control-label">Tag Filters</div><div class="filter-tags"><button class="filter-pill active" id="tag-all" onclick="setGlobalTagFilter('all')">ALL</button><button class="filter-pill" id="tag-local" onclick="setGlobalTagFilter('local')">LOCAL</button><button class="filter-pill" id="tag-global" onclick="setGlobalTagFilter('global')">GLOBAL</button><button class="filter-pill" id="tag-mix" onclick="setGlobalTagFilter('mix')">MIX</button></div></div><div class="search-stats" id="searchStats">Ready for discovery protocol. </div></aside>< !-- Modals --><div class="modal-overlay" id="curatorModal"><div class="modal"><h2 class="modal-title">New Curator</h2><div class="input-group"><label>Curator Name & Profile Art</label><input type="text" id="curatorInput" placeholder="Enter Name or Spotify Profile URL"></div><div class="modal-buttons"><button class="btn-secondary" onclick="closeModal('curatorModal')">CANCEL</button><button class="btn-primary" onclick="addCurator()">CREATE</button></div></div></div><div class="modal-overlay" id="folderModal"><div class="modal"><h2 class="modal-title">Create Group</h2><div class="input-group"><label>Group Name</label><input type="text" id="folderNameInput" placeholder="e.g. Chill Mixes, Hard Techno..."></div><div class="modal-buttons"><button class="btn-secondary" onclick="closeModal('folderModal')">CANCEL</button><button class="btn-primary" onclick="createFolder()">CREATE</button></div></div></div><div class="modal-overlay" id="playlistModal"><div class="modal"><h2 class="modal-title">Add Playlist</h2><div class="input-group"><label>Spotify Link</label><input type="text" id="playlistUrlInput" placeholder="Paste Spotify Playlist URL"></div><div class="input-group"><label>Manual Title (Optional)</label><input type="text" id="playlistTitleInput" placeholder="Leave blank to auto-fetch"></div><div class="modal-buttons"><button class="btn-secondary" onclick="closeModal('playlistModal')">CANCEL</button><button class="btn-primary" onclick="addPlaylist()">ADD PLAYLIST</button></div></div></div><script> // Data Structure

        let state= {
            curators: JSON.parse(localStorage.getItem('spotify_cataloger_data')) || [],
                activeCuratorId: null,
                activeFolderId: null,
                curatorQuery: '',
                globalQuery: '',
                tagFilter: 'all'
        }

        ;

        const defaultAvatar='https://i.scdn.co/image/ab6775700000ee851724fd1db265089e60228d4d';

        function saveState() {
            localStorage.setItem('spotify_cataloger_data', JSON.stringify(state.curators));
        }

        // oEmbed Metadata Fetching
        async function fetchSpotifyMeta(url) {
            try {
                // Spotify oEmbed doesn't require Auth for basic metadata
                const response=await fetch(`https: //open.spotify.com/oembed?url=${encodeURIComponent(url)}`);
                    if ( !response.ok) throw new Error('Not found');
                    return await response.json();
                }

                catch (e) {
                    console.error('Meta fetch failed:', e);
                    return null;
                }
            }

            // UI Core
            function openModal(id) {
                document.getElementById(id).style.display='flex';
            }

            function closeModal(id) {
                document.getElementById(id).style.display='none';
            }

            function renderCurators() {
                const list=document.getElementById('curatorList');
                list.innerHTML='';

                const filteredCurators=state.curators.filter(c=> c.name.toLowerCase().includes(state.curatorQuery.toLowerCase()));

                filteredCurators.forEach(c=> {
                        const item=document.createElement('div');

                        item.className=`curator-item $ {
                            state.activeCuratorId===c.id ? 'active' : ''
                        }

                        `;
                        item.onclick=()=> selectCurator(c.id);

                        item.innerHTML=` <img src="${c.image || defaultAvatar}" class="curator-avatar" > <div class="curator-info" > <span class="curator-name" >$ {
                            c.name
                        }

                        </span> <span class="curator-meta" >$ {
                            c.folders.length
                        }

                        groups</span> </div> `;
                        list.appendChild(item);
                    });
            }

            async function addCurator() {
                const val=document.getElementById('curatorInput').value.trim();
                if ( !val) return;

                let name=val;
                let image=defaultAvatar;

                if (val.includes('spotify.com/user/')) {
                    const meta=await fetchSpotifyMeta(val);

                    if (meta) {
                        name=meta.title || "Spotify User";
                        image=meta.thumbnail_url || defaultAvatar;
                    }
                }

                const newCurator= {
                    id: Date.now().toString(),
                    name: name,
                    image: image,
                    url: val.includes('spotify.com') ? val : '',
                    folders: []
                }

                ;

                state.curators.push(newCurator);
                saveState();
                renderCurators();
                closeModal('curatorModal');
                document.getElementById('curatorInput').value='';
                selectCurator(newCurator.id);
            }

            function selectCurator(id) {
                state.activeCuratorId=id;
                state.activeFolderId=null;
                renderCurators();
                renderWorkspace();
            }

            function createFolder() {
                const name=document.getElementById('folderNameInput').value.trim();
                if ( !name || !state.activeCuratorId) return;

                const curator=state.curators.find(c=> c.id===state.activeCuratorId);

                curator.folders.push({
                    id: Date.now().toString(),
                    name: name,
                    playlists: []
                });

            saveState();
            renderWorkspace();
            closeModal('folderModal');
            document.getElementById('folderNameInput').value='';
        }

        async function addPlaylist() {
            const url=document.getElementById('playlistUrlInput').value.trim();
            const manualTitle=document.getElementById('playlistTitleInput').value.trim();
            if ( !url || !state.activeCuratorId) return;

            const curator=state.curators.find(c=> c.id===state.activeCuratorId);
            const folder=state.activeFolderId ? curator.folders.find(f=> f.id===state.activeFolderId) : null;

            let title=manualTitle || "New Playlist";
            let image="https://community.spotify.com/t5/image/serverpage/image-id/25294i283654397369F6DA";

            // If it's a Spotify URL, fetch metadata
            if (url.includes('spotify.com/playlist/')) {
                const meta=await fetchSpotifyMeta(url);

                if (meta) {
                    title=manualTitle || meta.title;
                    image=meta.thumbnail_url;
                }
            }

            const newEntry= {
                id: Date.now().toString(),
                name: title,
                url: url,
                image: image,
                tag: 'local' // local, global, mix
            }

            ;

            if (folder) {
                folder.playlists.push(newEntry);
            }

            else {

                // If no folder, we could either prevent or add to a "General" group
                if ( !curator.folders.find(f=> f.name==='General')) {
                    curator.folders.push({
                        id: 'general', name: 'General', playlists: []
                    });
            }

            curator.folders.find(f=> f.name==='General').playlists.push(newEntry);
        }

        saveState();
        renderWorkspace();
        closeModal('playlistModal');
        document.getElementById('playlistUrlInput').value='';
        document.getElementById('playlistTitleInput').value='';
        }

        function renderWorkspace() {
            const initialState=document.getElementById('initialState');
            const content=document.getElementById('workspaceContent');
            const grid=document.getElementById('browserGrid');
            const backBtn=document.getElementById('backBtn');
            const addFolderBtn=document.getElementById('addFolderBtn');

            // Handle Global Search View
            if (state.globalQuery || state.tagFilter !=='all') {
                renderSearchView();
                return;
            }

            if ( !state.activeCuratorId) {
                initialState.style.display='flex';
                content.style.display='none';
                return;
            }

            initialState.style.display='none';
            content.style.display='flex';

            const curator=state.curators.find(c=> c.id===state.activeCuratorId);
            document.getElementById('headerAvatar').src=curator.image || defaultAvatar;
            document.getElementById('headerName').innerText=curator.name;

            document.getElementById('headerMeta').innerText=state.activeFolderId ? `FOLDER / $ {
                curator.folders.find(f=> f.id===state.activeFolderId).name
            }

            ` : 'CURATOR OVERVIEW';

            grid.innerHTML='';

            if (state.activeFolderId) {
                // Render Playlists in Folder
                const folder=curator.folders.find(f=> f.id===state.activeFolderId);
                backBtn.style.display='block';
                addFolderBtn.style.display='none';

                folder.playlists.forEach(p=> {
                        const card=createPlaylistCard(p);
                        grid.appendChild(card);
                    });
            }

            else {
                // Render Folders
                backBtn.style.display='none';
                addFolderBtn.style.display='block';

                curator.folders.forEach(f=> {
                        const folder=document.createElement('div');
                        folder.className='folder fade-in';

                        folder.onclick=()=> {
                            state.activeFolderId=f.id; renderWorkspace();
                        }

                        ;

                        folder.innerHTML=` <svg class="folder-icon" viewBox="0 0 24 24" fill="currentColor" ><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z" /></svg> <div class="folder-info" > <div class="folder-name" >$ {
                            f.name
                        }

                        </div> <div class="folder-count" >$ {
                            f.playlists.length
                        }

                        playlists</div> </div> `;
                        grid.appendChild(folder);
                    });
            }

            updateStats();
        }

        function createPlaylistCard(p) {
            const card=document.createElement('div');
            card.className='playlist-card fade-in';

            card.innerHTML=` <div class="playlist-art-container" > <img src="${p.image}" class="playlist-art" > </div> <div class="playlist-content" > <span class="playlist-title" >$ {
                p.name
            }

            </span> <div class="playlist-tag-container" > <span class="tag-pill ${p.tag === 'local' ? 'active' : ''}" onclick="setTag('${p.id}', 'local')" >Local</span> <span class="tag-pill ${p.tag === 'global' ? 'active' : ''}" onclick="setTag('${p.id}', 'global')" >Global</span> <span class="tag-pill ${p.tag === 'mix' ? 'active' : ''}" onclick="setTag('${p.id}', 'mix')" >Mix</span> </div> <div class="playlist-actions" > <a href="${p.url}" target="_blank" class="btn-icon" > <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" ><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" ></path><polyline points="15 3 21 3 21 9" ></polyline><line x1="10" y1="14" x2="21" y2="3" ></line></svg> </a> <button class="btn-icon" style="margin-left:auto; border-color: rgba(255,0,0,0.2);" onclick="deletePlaylist('${p.id}')" > <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" ><polyline points="3 6 5 6 21 6" ></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" ></path></svg> </button> </div> </div> `;
            return card;
        }

        function renderSearchView() {
            const grid=document.getElementById('browserGrid');
            const content=document.getElementById('workspaceContent');
            const initialState=document.getElementById('initialState');
            const backBtn=document.getElementById('backBtn');
            const addFolderBtn=document.getElementById('addFolderBtn');

            initialState.style.display='none';
            content.style.display='flex';
            backBtn.style.display='none';
            addFolderBtn.style.display='none';

            document.getElementById('headerAvatar').src='https://community.spotify.com/t5/image/serverpage/image-id/25294i283654397369F6DA';
            document.getElementById('headerName').innerText='Discovery Results';

            document.getElementById('headerMeta').innerText=`FILTERING BY: $ {
                state.tagFilter.toUpperCase()
            }

            | SEARCH: "${state.globalQuery}" `;

            grid.innerHTML='';

            let allPlaylists=[];

            state.curators.forEach(c=> {
                    c.folders.forEach(f=> {
                            allPlaylists.push(...f.playlists);
                        });
                });

            const filtered=allPlaylists.filter(p=> {
                    const matchesQuery=p.name.toLowerCase().includes(state.globalQuery.toLowerCase());
                    const matchesTag=state.tagFilter==='all' || p.tag===state.tagFilter;
                    return matchesQuery && matchesTag;
                });

            if (filtered.length===0) {
                grid.innerHTML='<div style="grid-column: 1/-1; text-align:center; padding: 40px; color: var(--text-dim);">No playlists match your search parameters.</div>';
            }

            else {
                filtered.forEach(p=> {
                        grid.appendChild(createPlaylistCard(p));
                    });
            }

            updateStats(filtered.length);
        }

        function handleCuratorSearch() {
            state.curatorQuery=document.getElementById('curatorSearch').value;
            renderCurators();
        }

        function handleGlobalSearch() {
            state.globalQuery=document.getElementById('globalSearch').value;
            renderWorkspace();
        }

        function setGlobalTagFilter(tag) {
            state.tagFilter=tag;
            document.querySelectorAll('.filter-pill').forEach(btn=> btn.classList.remove('active'));

            document.getElementById(`tag-$ {
                    tag
                }

                `).classList.add('active');
            renderWorkspace();
        }

        function updateStats(searchCount=null) {
            const stats=document.getElementById('searchStats');
            let totalPlaylists=0;
            state.curators.forEach(c=> c.folders.forEach(f=> totalPlaylists +=f.playlists.length));

            if (searchCount !==null) {
                stats.innerText=`Found $ {
                    searchCount
                }

                matches out of $ {
                    totalPlaylists
                }

                total playlists.`;
            }

            else {
                stats.innerText=`Workstation tracking $ {
                    state.curators.length
                }

                curators and $ {
                    totalPlaylists
                }

                playlists.`;
            }
        }

        function goBackToFolders() {
            state.activeFolderId=null;
            renderWorkspace();
        }

        function setTag(playlistId, tag) {
            state.curators.forEach(c=> {
                    c.folders.forEach(f=> {
                            const poly=f.playlists.find(p=> p.id===playlistId);
                            if (poly) poly.tag=tag;
                        });
                });
            saveState();
            renderWorkspace();
        }

        function deletePlaylist(id) {
            if ( !confirm("Remove this playlist?")) return;

            state.curators.forEach(c=> {
                    c.folders.forEach(f=> {
                            f.playlists=f.playlists.filter(p=> p.id !==id);
                        });
                });
            saveState();
            renderWorkspace();
        }

        // Canvas Background logic
        const canvas=document.getElementById('bgCanvas'), ctx=canvas.getContext('2d');
        let particles=[];

        const resize=()=> {
            canvas.width=window.innerWidth; canvas.height=window.innerHeight;

            particles=Array.from({
                length: 50
            }

            , ()=> ({
                x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                s: Math.random() * 2 + 1, vx: (Math.random() - 0.5) * 0.3,
                vy: (Math.random() - 0.5) * 0.3, o: Math.random() * 0.5 + 0.1
            }));
        }

        ;

        const animate=()=> {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p=> {
                    p.x +=p.vx; p.y +=p.vy;
                    if (p.x < 0) p.x=canvas.width; if (p.x > canvas.width) p.x=0;
                    if (p.y < 0) p.y=canvas.height; if (p.y > canvas.height) p.y=0;

                    ctx.fillStyle=`rgba(76, 201, 240, $ {
                            p.o
                        })`;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI * 2); ctx.fill();
                });
            requestAnimationFrame(animate);
        }

        ;
        window.onresize=resize; resize(); animate();

        // Initial Boot
        renderCurators();
        </script> </body> </html>
