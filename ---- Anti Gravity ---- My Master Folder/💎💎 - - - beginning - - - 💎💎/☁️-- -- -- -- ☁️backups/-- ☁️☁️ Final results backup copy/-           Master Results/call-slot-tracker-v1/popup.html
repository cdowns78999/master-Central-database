<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ffffff;
            --accent: #00f2ff;
            --bg: #000000;
            --card-bg: rgba(0, 0, 0, 0.6);
            --taken-bg: rgba(255, 68, 68, 0.2);
            --available-bg: rgba(0, 242, 255, 0.1);
        }

        html,
        body {
            background: #000;
            margin: 0;
            padding: 0;
            width: 240px;
            min-height: 400px;
            overflow-x: hidden;
            font-family: 'Space Grotesk', sans-serif;
            border-right: 2px solid #ffffff;
        }

        .layer {
            position: absolute;
            inset: 0;
            padding: 12px 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            pointer-events: none;
        }

        #particle-canvas,
        #top-particle-canvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
        }

        #particle-canvas {
            z-index: 5;
        }

        #listArea {
            z-index: 10;
            pointer-events: auto;
        }

        #top-particle-canvas {
            z-index: 15;
        }

        #textArea {
            z-index: 20;
            pointer-events: none;
        }

        .field-card {
            position: relative;
            background: var(--card-bg);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border-radius: 6px;
            height: 32px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0, 0, 1);
            display: flex;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .field-label {
            height: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 12px;
            width: 100%;
            box-sizing: border-box;
        }

        .field-text {
            font-size: 11px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.9);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status-emoji {
            font-size: 14px;
        }

        /* States */
        .field-card.taken {
            border-color: rgba(255, 68, 68, 0.4);
            background: var(--taken-bg);
        }

        .field-card.available {
            border-color: rgba(0, 242, 255, 0.4);
            background: var(--available-bg);
        }

        .field-card:hover {
            transform: translateY(-1px);
            background: rgba(255, 255, 255, 0.08);
        }

        .footer {
            margin-top: auto;
            padding-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .copy-btn {
            height: 30px;
            background: var(--accent);
            border: none;
            border-radius: 6px;
            color: #000;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            box-shadow: 0 0 15px var(--accent);
            transform: scale(1.02);
        }

        .clear-btn {
            height: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            color: #999;
            font-size: 8px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            pointer-events: auto;
        }
    </style>
</head>

<body>
    <canvas id="particle-canvas"></canvas>
    <div class="layer" id="listArea"></div>
    <canvas id="top-particle-canvas"></canvas>
    <div class="layer" id="textArea">
        <div id="fieldsContainer" style="display: contents;"></div>
        <div class="footer">
            <div class="copy-btn" id="copyBtn">Copy Availability</div>
            <div class="clear-btn" id="resetBtn">Reset All Slots</div>
        </div>
    </div>
    <script src="popup.js"></script>
</body>

</html>
