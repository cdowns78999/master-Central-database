<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call Planner Grid</title>
    <style>
        :root {
            --bg-deep: #0a0e17;
            --bg-card: #111827;
            --bg-card-hover: #1a2237;
            --border-glow: #00e5ff22;
            --accent-cyan: #00e5ff;
            --accent-green: #00ff88;
            --accent-red: #ff3366;
            --accent-amber: #ffaa00;
            --text-primary: #e8ecf4;
            --text-muted: #6b7a99;
            --text-dim: #3d4a66;
            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --font-mono: 'Consolas', 'Monaco', 'Courier New', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            width: 800px;
            height: 600px;
        }

        body {
            background: var(--bg-deep);
            color: var(--text-primary);
            font-family: var(--font-main);
            width: 100%;
            height: 100%;
            overflow-y: auto;
            padding: 24px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(ellipse at 20% 0%, #00e5ff08 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, #ff336608 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        .subtitle {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            color: var(--text-muted);
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* View Toggle */
        .view-toggle {
            display: flex;
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 8px;
            padding: 4px;
            margin-bottom: 20px;
            gap: 4px;
        }

        .toggle-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 8px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .toggle-btn.active {
            background: var(--accent-cyan);
            color: var(--bg-deep);
        }

        /* Day Tabs */
        .tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            overflow-x: auto;
            padding-bottom: 4px;
        }

        .tab {
            padding: 6px 12px;
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 4px;
            color: var(--text-muted);
            font-size: 0.65rem;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .tab.active {
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
            background: rgba(0, 229, 255, 0.05);
        }

        /* Schedule Layout */
        #scheduleContainer {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .section-label {
            font-family: var(--font-mono);
            font-size: 0.6rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent-cyan);
            margin: 0 0 8px;
            opacity: 0.7;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--text-dim), transparent);
        }

        .day-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            animation: fadeIn 0.4s ease forwards;
        }

        .slot-row {
            display: flex;
            align-items: center;
            padding: 6px 0;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            gap: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            cursor: pointer;
        }

        .slot-row:last-child {
            border-bottom: none;
        }

        .slot-icon {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
            flex-shrink: 0;
        }

        .slot-icon.open {
            background: rgba(0, 255, 136, 0.1);
            color: var(--accent-green);
        }

        .slot-icon.closed {
            background: rgba(255, 51, 102, 0.1);
            color: var(--accent-red);
        }

        .slot-time {
            color: var(--text-primary);
            min-width: 70px;
        }

        .slot-status {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .slot-status.open {
            color: var(--accent-green);
        }

        .slot-status.closed {
            color: var(--accent-red);
        }

        .slot-name {
            font-size: 0.55rem;
            color: var(--accent-amber);
            background: rgba(255, 170, 0, 0.1);
            padding: 1px 6px;
            border-radius: 3px;
            border: 1px solid rgba(255, 170, 0, 0.2);
            margin-left: 8px;
        }

        /* Footer Actions */
        .footer {
            margin-top: 10px;
            padding-top: 16px;
            border-top: 1px solid var(--text-dim);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .tile-section-label {
            font-family: var(--font-mono);
            font-size: 0.5rem;
            letter-spacing: 3px;
            color: var(--text-dim);
            text-transform: uppercase;
            padding-left: 2px;
        }

        .tile-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .tile-full {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .btn {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border-glow);
            padding: 12px 12px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.58rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: var(--font-mono);
            width: 100%;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .dot-cyan {
            background: #00e5ff;
            box-shadow: 0 0 6px #00e5ff88;
        }

        .dot-green {
            background: #00ff88;
            box-shadow: 0 0 6px #00ff8888;
        }

        .dot-amber {
            background: #ffaa00;
            box-shadow: 0 0 6px #ffaa0088;
        }

        .dot-red {
            background: #ff3366;
            box-shadow: 0 0 6px #ff336688;
        }

        .dot-purple {
            background: #a855f7;
            box-shadow: 0 0 6px #a855f788;
        }

        .dot-master {
            width: 10px;
            height: 10px;
            background: conic-gradient(#00e5ff, #00ff88, #ffaa00, #ff3366, #a855f7, #00e5ff);
            box-shadow: 0 0 8px #ffffff44;
            animation: spin 4s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Per-button hover glow matches its dot color */
        .btn-day-am:hover {
            border-color: #00e5ff;
            box-shadow: 0 0 16px #00e5ff22;
        }

        .btn-day-pm:hover {
            border-color: #00ff88;
            box-shadow: 0 0 16px #00ff8822;
        }

        .btn-week-am:hover {
            border-color: #ffaa00;
            box-shadow: 0 0 16px #ffaa0022;
        }

        .btn-week-pm:hover {
            border-color: #ff3366;
            box-shadow: 0 0 16px #ff336622;
        }

        .btn-full-day:hover {
            border-color: #a855f7;
            box-shadow: 0 0 16px #a855f722;
        }

        .btn-master:hover {
            border-color: #ffffff;
            box-shadow: 0 0 20px #ffffff18;
        }

        /* Dot pop on parent hover */
        .btn:hover .dot {
            transform: scale(1.4);
        }

        /* Left accent bar per button */
        .btn-day-am::before {
            background: linear-gradient(180deg, #00e5ff, transparent);
        }

        .btn-day-pm::before {
            background: linear-gradient(180deg, #00ff88, transparent);
        }

        .btn-week-am::before {
            background: linear-gradient(180deg, #ffaa00, transparent);
        }

        .btn-week-pm::before {
            background: linear-gradient(180deg, #ff3366, transparent);
        }

        .btn-full-day::before {
            background: linear-gradient(180deg, #a855f7, transparent);
        }

        .btn-master::before {
            background: conic-gradient(#00e5ff, #00ff88, #ffaa00, #ff3366, #a855f7, #00e5ff);
            width: 3px;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 3px;
            height: 100%;
            opacity: 0.6;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-deep);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--text-dim);
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="view-toggle" id="viewToggle">
            <button class="toggle-btn active" data-view="internal">Internal View</button>
            <button class="toggle-btn" data-view="public">Public View</button>
        </div>

        <div class="tabs" id="dayTabs">
            <button class="tab active" data-day="Monday">MON</button>
            <button class="tab" data-day="Tuesday">TUE</button>
            <button class="tab" data-day="Wednesday">WED</button>
            <button class="tab" data-day="Thursday">THU</button>
            <button class="tab" data-day="Friday">FRI</button>
        </div>

        <div id="scheduleContainer">
            <div class="schedule-column">
                <div class="section-label">Morning Block (AM)</div>
                <div class="day-card" id="morningCards">
                    <!-- Slots injected here -->
                </div>
            </div>

            <div class="schedule-column">
                <div class="section-label">Evening Block (PM)</div>
                <div class="day-card" id="eveningCards">
                    <!-- Slots injected here -->
                </div>
            </div>
        </div>

        <div class="footer">
            <div class="tile-section-label">Today</div>
            <div class="tile-grid">
                <button class="btn btn-day-am" id="copyCurrentAMBtn">
                    <span class="dot dot-cyan"></span>Morning
                </button>
                <button class="btn btn-day-pm" id="copyCurrentPMBtn">
                    <span class="dot dot-green"></span>Evening
                </button>
            </div>

            <div class="tile-section-label">Week</div>
            <div class="tile-grid">
                <button class="btn btn-week-am" id="copyWeekAMBtn">
                    <span class="dot dot-amber"></span>Morning
                </button>
                <button class="btn btn-week-pm" id="copyWeekPMBtn">
                    <span class="dot dot-red"></span>Evening
                </button>
            </div>

            <div class="tile-full">
                <button class="btn btn-full-day" id="copyFullDayBtn">
                    <span class="dot dot-purple"></span>Today · Full Day
                </button>
                <button class="btn btn-master" id="copyFinalMasterBtn">
                    <span class="dot dot-master"></span>Full Week · Master
                </button>
            </div>
        </div>
    </div>
    <script src="popup.js"></script>
</body>

</html>
