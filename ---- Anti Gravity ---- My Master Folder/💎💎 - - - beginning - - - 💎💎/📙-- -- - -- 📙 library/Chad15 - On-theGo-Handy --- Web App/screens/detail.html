<!-- REFINED DETAIL SCREEN (SLOT 6) -->
<!-- High-Transparency Glassmorphism for Mesh Background -->

<div class="screen-animation-fade">

    <!-- Hero Header Section -->
    <div
        style="height: 380px; margin: calc(var(--safe-top) * -1) -25px 0 -25px; position: relative; overflow: hidden; border-radius: 0 0 50px 50px; box-shadow: 0 20px 40px rgba(0,0,0,0.4);">
        <img src="https://images.unsplash.com/photo-1612036782180-6f0b6cd846fe?q=80&w=1000"
            style="width: 100%; height: 100%; object-fit: cover;">

        <!-- Controls -->
        <div style="position: absolute; top: 30px; left: 25px; width: 45px; height: 45px; background: rgba(0,0,0,0.3); backdrop-filter: blur(10px); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1.5px solid rgba(255,255,255,0.2);"
            onclick="app.load('home')">
            <svg style="width: 20px; height: 20px;" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3">
                <path d="M19 12H5M12 19l-7-7 7-7" />
            </svg>
        </div>
        <div
            style="position: absolute; top: 30px; right: 25px; width: 45px; height: 45px; background: rgba(0,0,0,0.3); backdrop-filter: blur(10px); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1.5px solid rgba(255,255,255,0.2);">
            <svg style="width: 20px; height: 20px;" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3">
                <circle cx="12" cy="12" r="1" />
                <circle cx="12" cy="5" r="1" />
                <circle cx="12" cy="19" r="1" />
            </svg>
        </div>

        <!-- Title Overlay (Transparent Gradient) -->
        <div
            style="position: absolute; bottom: 0; left: 0; right: 0; padding: 60px 20px 30px; background: linear-gradient(transparent, rgba(11, 1, 29, 1)); text-align: center;">
            <h1 style="font-size: 2.6rem; font-family: 'Outfit'; margin-bottom: 5px;">Doctor Strange</h1>
            <p style="color: var(--text-muted); font-size: 1rem; letter-spacing: 0.5px;">In the Multiverse of Madness
            </p>
        </div>
    </div>

    <!-- Description -->
    <div style="margin: 25px 0; padding: 0 10px; text-align: center;">
        <p style="color: var(--text-muted); line-height: 1.6; font-size: 1rem;">
            Dr. Stephen Strange casts a forbidden spell that opens the doorway to the multiverse... <b
                style="color: var(--accent-cyan);">read more</b>
        </p>
    </div>

    <!-- Date Selection (Glass Cards) -->
    <div class="scroll-hide"
        style="display: flex; gap: 15px; overflow-x: auto; padding: 10px 0 30px; align-items: center; justify-content: center;">
        <div class="glass-medium" style="min-width: 70px; padding: 18px 10px; text-align: center; border-radius: 24px;">
            <span
                style="font-size: 0.7rem; color: var(--text-muted); font-weight: 800; text-transform: uppercase;">Thu</span>
            <p style="font-size: 1.2rem; font-weight: 800; margin-top: 5px;">21</p>
        </div>

        <!-- ACTIVE CARD -->
        <div class="active-glow"
            style="min-width: 80px; padding: 25px 10px; text-align: center; border-radius: 28px; transform: scale(1.1); z-index: 10;">
            <span style="font-size: 0.7rem; color: white; font-weight: 800; text-transform: uppercase;">Sat</span>
            <p style="font-size: 1.6rem; font-weight: 800; color: white; margin-top: 5px;">23</p>
        </div>

        <div class="glass-medium" style="min-width: 70px; padding: 18px 10px; text-align: center; border-radius: 24px;">
            <span
                style="font-size: 0.7rem; color: var(--text-muted); font-weight: 800; text-transform: uppercase;">Sun</span>
            <p style="font-size: 1.2rem; font-weight: 800; margin-top: 5px;">24</p>
        </div>
    </div>

    <!-- Time Pills -->
    <div style="display: flex; gap: 12px; justify-content: center; margin-bottom: 40px;">
        <div class="glass-thin"
            style="padding: 12px 22px; border-radius: 15px; font-weight: 800; border: 1.5px solid rgba(0, 242, 255, 0.2);">
            16:00</div>
        <div
            style="background: var(--accent-cyan); color: var(--bg-void); padding: 12px 22px; border-radius: 15px; font-weight: 800; box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);">
            18:00</div>
        <div class="glass-thin"
            style="padding: 12px 22px; border-radius: 15px; font-weight: 800; border: 1.5px solid rgba(0, 242, 255, 0.2);">
            20:00</div>
    </div>

    <!-- Reservation Button -->
    <button
        style="width: 100%; height: 75px; background: linear-gradient(135deg, var(--accent-pink), var(--primary)); border: none; border-radius: 35px; color: white; font-weight: 800; font-size: 1.2rem; letter-spacing: 2px; box-shadow: 0 15px 30px rgba(255, 0, 222, 0.3); cursor: pointer;"
        onclick="app.load('ticket')">
        RESERVATION
    </button>

    <div style="height: 40px;"></div>
</div>
