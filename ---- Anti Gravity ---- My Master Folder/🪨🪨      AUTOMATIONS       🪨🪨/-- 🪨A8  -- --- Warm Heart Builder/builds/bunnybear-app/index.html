<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BUNNYBEAR — DOSSIER #B-2407-BB</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect x='6' y='18' width='52' height='28' fill='none' stroke='%23b8352b' stroke-width='4'/%3E%3Ctext x='32' y='37' font-family='Courier' font-size='10' font-weight='bold' fill='%23b8352b' text-anchor='middle'%3ECLASS%3C/text%3E%3C/svg%3E" />
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-tan: #d9c49a;
    --bg-tan-dark: #c6b086;
    --ink: #1a1814;
    --ink-soft: #3a352c;
    --stamp-red: #b8352b;
    --stamp-red-faded: rgba(184, 53, 43, 0.55);
    --redact-black: #000;
    --declass-green: #3a6b4a;
    --amber-glow: #c49a4a;
    --paper-shadow: rgba(26, 24, 20, 0.25);
    --folder-edge: #a88f5f;
    --tab-red: #9b2a22;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100vh;
    background: var(--bg-tan);
    color: var(--ink);
    font-family: 'Special Elite', 'IBM Plex Mono', 'Courier New', Courier, monospace;
    overflow-x: hidden;
  }

  /* paper fiber texture */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(120, 90, 40, 0.07) 0%, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(120, 90, 40, 0.05) 0%, transparent 40%),
      radial-gradient(circle at 50% 50%, rgba(60, 40, 20, 0.04) 0%, transparent 50%),
      repeating-linear-gradient(0deg, rgba(60, 40, 20, 0.015) 0px, transparent 1px, transparent 3px),
      repeating-linear-gradient(90deg, rgba(60, 40, 20, 0.015) 0px, transparent 1px, transparent 3px);
  }

  /* coffee stain */
  body::after {
    content: "";
    position: fixed;
    top: 12%;
    right: -40px;
    width: 220px;
    height: 220px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(90, 60, 20, 0.08) 0%, rgba(90, 60, 20, 0.15) 55%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 920px;
    margin: 0 auto;
    padding: 32px 24px 120px;
  }

  /* ---- SOURCE BANNER (scaffolded, unused on page 1) ---- */
  #sourceBanner {
    display: none;
    background: var(--ink);
    color: var(--bg-tan);
    padding: 10px 18px;
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 16px;
    border-left: 4px solid var(--stamp-red);
  }

  /* ---- HEADER ---- */
  header {
    position: relative;
    padding: 36px 24px 24px;
    border: 2px solid var(--ink);
    background: linear-gradient(180deg, rgba(230, 210, 170, 0.4) 0%, transparent 100%);
    margin-bottom: 32px;
  }

  .classified-stamp {
    position: absolute;
    top: 16px;
    left: 16px;
    display: inline-block;
    padding: 6px 14px;
    border: 3px double var(--stamp-red);
    color: var(--stamp-red);
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.2em;
    transform: rotate(-3deg);
    background: rgba(184, 53, 43, 0.06);
    text-shadow: 0 0 1px var(--stamp-red);
    font-family: 'IBM Plex Mono', 'Courier New', monospace;
  }

  .file-number {
    position: absolute;
    top: 22px;
    right: 22px;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--ink-soft);
    text-align: right;
  }

  .file-number .line1 { display: block; font-size: 10px; opacity: 0.7; }
  .file-number .line2 { display: block; font-weight: 700; color: var(--ink); margin-top: 2px; }

  .title-bar {
    margin-top: 56px;
    font-size: clamp(28px, 6vw, 44px);
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink);
    border-bottom: 2px solid var(--ink);
    padding-bottom: 8px;
    font-family: 'IBM Plex Mono', 'Courier New', monospace;
  }

  .title-bar .subject-label {
    color: var(--ink-soft);
    font-weight: 400;
    font-size: 0.55em;
    letter-spacing: 0.3em;
    display: block;
    margin-bottom: 6px;
  }

  .subtitle {
    margin-top: 12px;
    font-size: 13px;
    letter-spacing: 0.1em;
    color: var(--ink-soft);
    text-transform: lowercase;
  }

  .redacted-bar {
    display: inline-block;
    background: var(--redact-black);
    color: transparent;
    padding: 2px 0;
    user-select: none;
  }

  .header-redact {
    margin-top: 14px;
    height: 10px;
    background: linear-gradient(90deg, var(--redact-black) 0%, var(--redact-black) 70%, transparent 100%);
    width: 60%;
  }

  /* ---- CENTERPIECE (envelope) ---- */
  .centerpiece {
    margin: 60px auto 48px;
    text-align: center;
    perspective: 1400px;
  }

  .centerpiece-label {
    font-size: 11px;
    letter-spacing: 0.4em;
    color: var(--ink-soft);
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  .envelope-wrap {
    position: relative;
    width: min(360px, 85vw);
    height: min(240px, 56vw);
    margin: 0 auto;
    cursor: pointer;
    transform-style: preserve-3d;
  }

  /* envelope body */
  .envelope-body {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, #d4b680 0%, #bc9d64 100%);
    border: 1.5px solid var(--folder-edge);
    box-shadow:
      inset 0 0 30px rgba(90, 60, 20, 0.18),
      0 10px 30px var(--paper-shadow);
    border-radius: 3px;
    overflow: hidden;
  }

  .envelope-body::after {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(45deg, rgba(90, 60, 20, 0.02) 0px, transparent 3px, transparent 6px);
  }

  /* triangular flap */
  .envelope-flap {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 55%;
    background: linear-gradient(180deg, #c9a96d 0%, #b8985e 100%);
    clip-path: polygon(0 0, 100% 0, 50% 100%);
    transform-origin: top center;
    transition: transform 1.6s cubic-bezier(0.4, 0.1, 0.3, 1);
    z-index: 3;
    border-bottom: 1px solid var(--folder-edge);
  }

  .envelope-flap::after {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(45deg, rgba(90, 60, 20, 0.03) 0px, transparent 3px, transparent 6px);
    clip-path: polygon(0 0, 100% 0, 50% 100%);
  }

  .envelope-wrap.unsealed .envelope-flap {
    transform: rotateX(-175deg);
  }

  /* red wax/classified stamp on flap */
  .flap-stamp {
    position: absolute;
    top: 20%;
    left: 50%;
    transform: translate(-50%, 0) rotate(-6deg);
    padding: 6px 14px;
    border: 3px double var(--stamp-red);
    color: var(--stamp-red);
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.25em;
    background: rgba(184, 53, 43, 0.1);
    font-family: 'IBM Plex Mono', 'Courier New', monospace;
    z-index: 4;
    transition: opacity 0.3s, transform 0.8s;
    white-space: nowrap;
    pointer-events: none;
  }

  .envelope-wrap.unsealed .flap-stamp {
    opacity: 0;
    transform: translate(-50%, 0) rotate(-32deg) scale(1.15);
  }

  /* folded card that pushes up */
  .hidden-card {
    position: absolute;
    left: 8%;
    right: 8%;
    bottom: 10%;
    top: 30%;
    background: #f2e6c8;
    border: 1px solid #9d7f4a;
    box-shadow:
      inset 0 0 15px rgba(90, 60, 20, 0.15),
      0 4px 12px rgba(0, 0, 0, 0.3);
    transform: translateY(40%);
    transition: transform 1.4s 0.5s cubic-bezier(0.2, 0.8, 0.3, 1);
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 14px;
    font-size: clamp(10px, 2.1vw, 14px);
    letter-spacing: 0.08em;
    line-height: 1.6;
    text-align: center;
    color: var(--ink);
    font-weight: 600;
    overflow: hidden;
  }

  .envelope-wrap.unsealed .hidden-card {
    transform: translateY(-18%);
  }

  /* redacted overlay on card */
  .card-redact {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 6px;
    padding: 14px 18px;
    background: #f2e6c8;
    z-index: 5;
  }

  .card-redact .bar {
    height: 10px;
    background: var(--redact-black);
    border-radius: 1px;
    transform-origin: left center;
    transition: transform 0.6s cubic-bezier(0.6, 0.05, 0.3, 1);
  }

  .envelope-wrap.unsealed .card-redact .bar {
    transform: scaleX(0);
  }

  .envelope-wrap.unsealed .card-redact .bar:nth-child(1) { transition-delay: 1.4s; }
  .envelope-wrap.unsealed .card-redact .bar:nth-child(2) { transition-delay: 1.55s; }
  .envelope-wrap.unsealed .card-redact .bar:nth-child(3) { transition-delay: 1.7s; }

  .unseal-btn {
    margin-top: 28px;
    background: transparent;
    border: 2px solid var(--ink);
    color: var(--ink);
    padding: 10px 28px;
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 700;
  }

  .unseal-btn:hover {
    background: var(--ink);
    color: var(--bg-tan);
  }

  .unseal-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  /* ---- TILE GRID ---- */
  .section-heading {
    margin: 60px 0 24px;
    font-size: 14px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--ink-soft);
    border-left: 4px solid var(--stamp-red);
    padding-left: 14px;
    font-weight: 700;
  }

  .tile-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 20px;
  }

  .tile {
    position: relative;
    min-height: 170px;
    cursor: pointer;
    perspective: 1000px;
  }

  .tile-inner {
    position: relative;
    width: 100%;
    height: 100%;
    min-height: 170px;
    transition: transform 0.7s cubic-bezier(0.4, 0.1, 0.3, 1);
    transform-style: preserve-3d;
  }

  .tile.flipped .tile-inner {
    transform: rotateY(180deg);
  }

  .tile-face {
    position: absolute;
    inset: 0;
    padding: 22px 18px 18px;
    background: linear-gradient(180deg, #e8d4a8 0%, #d4bd85 100%);
    border: 1px solid var(--folder-edge);
    box-shadow: 0 3px 10px var(--paper-shadow);
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    overflow: hidden;
  }

  /* red folder tab */
  .tile-face::before {
    content: "";
    position: absolute;
    top: 0;
    left: 18px;
    width: 80px;
    height: 14px;
    background: var(--tab-red);
    border-radius: 0 0 2px 2px;
    box-shadow: inset 0 -2px 4px rgba(0, 0, 0, 0.2);
  }

  .tile-face.back {
    transform: rotateY(180deg);
    background: linear-gradient(180deg, #f0dfb5 0%, #e2c98d 100%);
  }

  .tile-face.back::before {
    background: var(--declass-green);
  }

  .tile-title {
    font-size: 13px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 700;
    color: var(--ink);
    border-bottom: 1.5px solid var(--ink);
    padding-bottom: 8px;
    margin-bottom: 10px;
    font-family: 'IBM Plex Mono', 'Courier New', monospace;
  }

  .tile-face.front .tile-hint {
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--stamp-red);
    margin-top: auto;
    text-transform: uppercase;
  }

  .tile-face.back .tile-body {
    font-size: 13px;
    line-height: 1.65;
    color: var(--ink);
    letter-spacing: 0.02em;
  }

  /* redact flash overlay during flip */
  .tile-flash {
    position: absolute;
    left: 14px;
    right: 14px;
    top: 50%;
    height: 14px;
    background: var(--redact-black);
    transform: translateY(-50%) scaleX(0);
    transform-origin: left center;
    pointer-events: none;
    z-index: 10;
  }

  .tile.flipping .tile-flash {
    animation: redact-flash 0.7s ease;
  }

  @keyframes redact-flash {
    0% { transform: translateY(-50%) scaleX(0); }
    40% { transform: translateY(-50%) scaleX(1); }
    60% { transform: translateY(-50%) scaleX(1); }
    100% { transform: translateY(-50%) scaleX(0); transform-origin: right center; }
  }

  /* ---- DRIFTING STAMPS ---- */
  .drift-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .drift-stamp {
    position: absolute;
    bottom: -80px;
    padding: 5px 11px;
    border: 2px double var(--stamp-red-faded);
    color: var(--stamp-red-faded);
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.2em;
    font-family: 'IBM Plex Mono', 'Courier New', monospace;
    opacity: 0;
    white-space: nowrap;
    animation: drift-up linear infinite;
  }

  @keyframes drift-up {
    0% {
      bottom: -80px;
      opacity: 0;
      transform: rotate(var(--r, -8deg)) translateX(0);
    }
    15% { opacity: 0.55; }
    80% { opacity: 0.4; }
    100% {
      bottom: 105vh;
      opacity: 0;
      transform: rotate(var(--r, -8deg)) translateX(var(--drift-x, 30px));
    }
  }

  /* ---- FOOTER ---- */
  footer {
    margin-top: 80px;
    text-align: center;
    position: relative;
  }

  .intel-link {
    display: inline-block;
    position: relative;
    padding: 18px 36px 18px 28px;
    background: #e8d4a8;
    border: 1.5px solid var(--ink);
    color: var(--ink);
    text-decoration: none;
    font-size: 13px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    font-weight: 700;
    transition: all 0.25s;
    box-shadow: 3px 3px 0 var(--ink);
    font-family: 'IBM Plex Mono', 'Courier New', monospace;
  }

  /* dog-ear fold corner */
  .intel-link::before {
    content: "";
    position: absolute;
    top: 0;
    right: 0;
    width: 22px;
    height: 22px;
    background: linear-gradient(225deg, var(--bg-tan) 50%, rgba(0,0,0,0.15) 50%);
    border-left: 1px solid var(--ink);
    border-bottom: 1px solid var(--ink);
  }

  .intel-link:hover {
    background: var(--stamp-red);
    color: #f2e6c8;
    transform: translate(-2px, -2px);
    box-shadow: 5px 5px 0 var(--ink);
  }

  .footer-note {
    margin-top: 18px;
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--ink-soft);
    text-transform: uppercase;
    opacity: 0.7;
  }

  @media (max-width: 520px) {
    .classified-stamp { font-size: 11px; padding: 4px 10px; }
    .file-number { font-size: 9px; }
    .title-bar { margin-top: 70px; }
    .wrapper { padding: 20px 16px 80px; }
  }
</style>
</head>
<body>

<div class="drift-container" id="driftContainer"></div>

<div class="wrapper">

  <div id="sourceBanner"></div>

  <!-- HEADER -->
  <header>
    <span class="classified-stamp">CLASSIFIED &#9888; LEVEL 6</span>
    <div class="file-number">
      <span class="line1">DOSSIER</span>
      <span class="line2">#B-2407-BB</span>
    </div>
    <h1 class="title-bar">
      <span class="subject-label">SUBJECT:</span>
      BUNNYBEAR
    </h1>
    <p class="subtitle">status: active &middot; disposition: loyal &middot; risk: zero (to us)</p>
    <div class="header-redact"></div>
  </header>

  <!-- CENTERPIECE -->
  <section class="centerpiece">
    <div class="centerpiece-label">&mdash; sealed correspondence &mdash;</div>

    <div class="envelope-wrap" id="envelope" tabindex="0" role="button" aria-label="Unseal envelope">
      <div class="envelope-body">
        <div class="hidden-card" id="hiddenCard">
          <span class="card-text" id="cardText">WITNESSED. CASE OPEN.</span>
          <div class="card-redact" id="cardRedact">
            <div class="bar" style="width: 88%;"></div>
            <div class="bar" style="width: 70%;"></div>
            <div class="bar" style="width: 92%;"></div>
          </div>
        </div>
      </div>
      <div class="envelope-flap">
        <span class="flap-stamp">CLASSIFIED</span>
      </div>
    </div>

    <button class="unseal-btn" id="unsealBtn">&#9654; UNSEAL</button>
  </section>

  <!-- TILE GRID -->
  <h2 class="section-heading">&mdash; FIELD NOTES &mdash;</h2>
  <div class="tile-grid" id="tileGrid"></div>

  <!-- FOOTER -->
  <footer>
    <span class="intel-link" style="pointer-events:none;cursor:default;opacity:0.5;">&mdash;</span>
    <div class="footer-note">page 2 of 2 &middot; authorized eyes only</div>
  </footer>

</div>

<script>
  // ============================================================
  // SOURCE BANNER (scaffold — not used on page 1, mirrors page 2)
  // ============================================================
  const SOURCE_BANNER = {
    enabled: false,
    text: ""
  };
  (function mountBanner() {
    const el = document.getElementById('sourceBanner');
    if (SOURCE_BANNER.enabled && SOURCE_BANNER.text) {
      el.textContent = SOURCE_BANNER.text;
      el.style.display = 'block';
    }
  })();

  // ============================================================
  // ENVELOPE CENTERPIECE
  // ============================================================
  const PHRASES = [
    "WITNESSED. ██████████ CASE OPEN.",
    "SIGNAL RECEIVED. THE ONE WHO COULDN'T LOOK AWAY.",
    "TRANSFER COMPLETE. GOOD ONES — OUT.",
    "EXTRACTION SUCCESSFUL. DAMAGE: THEIRS, NOT YOURS.",
    "LOGGED. EVERY PERSON YOU MOVED IS LOGGED.",
    "THIS IS HOW EXPLOITATION ENDS. ONE OPERATIVE AT A TIME.",
    "YOU SAW. YOU MOVED. THAT'S THE WHOLE JOB.",
    "DECLASSIFIED: THEY COULDN'T STAY HIDDEN BECAUSE YOU WERE WATCHING."
  ];

  let phraseIdx = 0;
  let isUnsealed = false;
  let resetTimer = null;

  const envelope = document.getElementById('envelope');
  const cardText = document.getElementById('cardText');
  const unsealBtn = document.getElementById('unsealBtn');

  function unseal() {
    if (isUnsealed) return;
    isUnsealed = true;
    cardText.textContent = PHRASES[phraseIdx];
    phraseIdx = (phraseIdx + 1) % PHRASES.length;
    envelope.classList.add('unsealed');
    unsealBtn.disabled = true;
    unsealBtn.textContent = '• UNSEALED •';

    clearTimeout(resetTimer);
    resetTimer = setTimeout(reseal, 4000);
  }

  function reseal() {
    envelope.classList.remove('unsealed');
    isUnsealed = false;
    unsealBtn.disabled = false;
    unsealBtn.textContent = '▶ UNSEAL';
  }

  envelope.addEventListener('click', unseal);
  envelope.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); unseal(); }
  });
  unsealBtn.addEventListener('click', unseal);

  // ============================================================
  // TILE GRID (flip cards)
  // ============================================================
  const TILES = [
    { title: "SIGNAL OVER NOISE",     body: "watches the room before entering. the rest is pattern recognition." },
    { title: "THE EXTRACTION CREW",   body: "didn't just leave a group that was mistreating its singers. brought the good ones with them. nobody left behind." },
    { title: "EYES THAT DON'T LET GO",body: "once the exploitation is spotted, the case doesn't close until the people are safe." },
    { title: "DOSSIER VIBES",         body: "reads a room like a file. knows who's real in the first 30 seconds." },
    { title: "LOYAL ALL THE WAY DOWN",body: "once you're in the circle, the circle defends you. that's not a vibe — that's a protocol." },
    { title: "THE PATIENT ONE",       body: "doesn't rush. builds position. then moves. that's why it works every time." }
  ];

  const grid = document.getElementById('tileGrid');
  TILES.forEach((t) => {
    const tile = document.createElement('div');
    tile.className = 'tile';
    tile.innerHTML = `
      <div class="tile-inner">
        <div class="tile-face front">
          <div class="tile-title">${t.title}</div>
          <div class="tile-hint">&gt; tap to declassify</div>
          <div class="tile-flash"></div>
        </div>
        <div class="tile-face back">
          <div class="tile-title">${t.title}</div>
          <div class="tile-body">${t.body}</div>
          <div class="tile-flash"></div>
        </div>
      </div>
    `;
    tile.addEventListener('click', () => {
      tile.classList.add('flipping');
      tile.classList.toggle('flipped');
      setTimeout(() => tile.classList.remove('flipping'), 700);
    });
    grid.appendChild(tile);
  });

  // ============================================================
  // DRIFTING CLASSIFIED STAMPS
  // ============================================================
  const DRIFT_LABELS = ['CLASSIFIED', 'DECLASSIFIED', 'CLASSIFIED', 'TOP SECRET', 'DECLASSIFIED', 'CONFIDENTIAL'];
  const driftContainer = document.getElementById('driftContainer');

  function spawnStamp() {
    const s = document.createElement('div');
    s.className = 'drift-stamp';
    s.textContent = DRIFT_LABELS[Math.floor(Math.random() * DRIFT_LABELS.length)];
    const leftPct = 5 + Math.random() * 90;
    const rot = (Math.random() * 20 - 10).toFixed(1) + 'deg';
    const driftX = (Math.random() * 80 - 40).toFixed(0) + 'px';
    const dur = (18 + Math.random() * 14).toFixed(1) + 's';
    s.style.left = leftPct + '%';
    s.style.setProperty('--r', rot);
    s.style.setProperty('--drift-x', driftX);
    s.style.animationDuration = dur;
    s.style.transform = `rotate(${rot})`;
    driftContainer.appendChild(s);
    setTimeout(() => s.remove(), parseFloat(dur) * 1000 + 500);
  }

  // initial burst + loop
  for (let i = 0; i < 3; i++) setTimeout(spawnStamp, i * 1500);
  setInterval(spawnStamp, 3200);

</script>
</body>
</html>
