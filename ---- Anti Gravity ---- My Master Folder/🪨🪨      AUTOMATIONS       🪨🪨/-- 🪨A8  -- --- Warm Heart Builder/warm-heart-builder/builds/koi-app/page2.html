<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>for Koi — the proof</title>
<style>
  /* ============================================================
     KOI ROSE THEME — flirty Ashes→Gold variant
     (shared theme: duplicate of index.html :root block)
     ============================================================ */
  :root {
    --bg-deep: #0d0a0c;
    --bg-soft: #1a1214;
    --rose: #ff7aa2;
    --rose-deep: #c72658;
    --gold: #e6b463;
    --gloss: #fff1e6;
    --text: #f5e9ec;
    --text-dim: rgba(245, 233, 236, 0.62);
    --serif: "Cormorant Garamond", "Playfair Display", Georgia, serif;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100%;
    background: radial-gradient(ellipse at top, var(--bg-soft) 0%, var(--bg-deep) 65%, #050303 100%);
    color: var(--text);
    font-family: var(--sans);
    overflow-x: hidden;
  }

  body {
    padding: 48px 32px 96px;
    max-width: 1180px;
    margin: 0 auto;
    position: relative;
  }

  /* ---------- HERO SPLIT HEADER ---------- */
  .hero {
    display: grid;
    grid-template-columns: 1fr 120px;
    gap: 48px;
    align-items: center;
    padding: 48px 0 72px;
    border-bottom: 1px solid rgba(230, 180, 99, 0.18);
    margin-bottom: 64px;
  }
  .hero-left .eyebrow {
    color: var(--gold);
    font-size: 0.72rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  .hero-thesis {
    font-family: var(--serif);
    font-size: clamp(1.5rem, 3.6vw, 2.6rem);
    font-weight: 500;
    line-height: 1.25;
    color: var(--gloss);
    letter-spacing: -0.005em;
  }
  .hero-thesis em {
    font-style: italic;
    background: linear-gradient(180deg, var(--rose), var(--rose-deep));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
  }

  /* decorative element: vertical gold line + rose on top */
  .hero-right {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    height: 100%;
    min-height: 220px;
  }
  .rose-top {
    font-size: 2.2rem;
    filter: drop-shadow(0 0 12px rgba(255, 122, 162, 0.45));
    margin-bottom: 12px;
  }
  .gold-line {
    flex: 1;
    width: 1.5px;
    background: linear-gradient(180deg, var(--gold) 0%, transparent 100%);
    min-height: 160px;
  }

  /* ---------- SECTION HEADS ---------- */
  .section {
    margin-bottom: 88px;
  }
  .section-head {
    font-family: var(--serif);
    font-style: italic;
    font-size: 1.65rem;
    color: var(--rose);
    margin-bottom: 28px;
    letter-spacing: 0.01em;
  }
  .section-head::before {
    content: "— ";
    color: var(--gold);
  }

  /* ---------- QUOTE CARDS GRID ---------- */
  #quoteCards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 22px;
  }
  /* quote card styling pre-wired for assembler */
  .quote-card {
    background: linear-gradient(145deg, rgba(255, 122, 162, 0.06), rgba(199, 38, 88, 0.03));
    border: 1px solid rgba(255, 122, 162, 0.2);
    border-radius: 14px;
    padding: 24px;
    cursor: pointer;
    transition: transform 0.25s ease, border-color 0.25s ease;
  }
  .quote-card:hover { transform: translateY(-3px); border-color: var(--rose); }
  .quote-card blockquote {
    font-family: var(--serif);
    font-style: italic;
    font-size: 1.1rem;
    line-height: 1.45;
    color: var(--gloss);
    margin-bottom: 16px;
  }
  .quote-card .attribution {
    font-size: 0.82rem;
    color: var(--text-dim);
    letter-spacing: 0.04em;
  }
  .quote-card .author { color: var(--gold); font-weight: 600; }

  /* ---------- FACTS STRIP ---------- */
  #factsStrip {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 18px;
  }
  .fact-tile {
    background: rgba(230, 180, 99, 0.05);
    border: 1px solid rgba(230, 180, 99, 0.2);
    border-radius: 12px;
    padding: 22px;
    cursor: pointer;
    transition: border-color 0.25s ease;
  }
  .fact-tile:hover { border-color: var(--gold); }
  .fact-tile .stat {
    font-family: var(--serif);
    font-size: 2.2rem;
    color: var(--gold);
    margin-bottom: 8px;
    line-height: 1;
  }
  .fact-tile .label {
    font-size: 0.92rem;
    color: var(--text-dim);
    line-height: 1.4;
  }

  /* ---------- FAMOUS VOICES RIBBON ---------- */
  #famousVoices {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
  }
  .voice-chip {
    background: rgba(255, 122, 162, 0.08);
    border: 1px solid rgba(255, 122, 162, 0.25);
    border-radius: 999px;
    padding: 10px 18px;
    font-family: var(--serif);
    font-style: italic;
    font-size: 0.98rem;
    color: var(--gloss);
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .voice-chip:hover {
    background: rgba(255, 122, 162, 0.18);
    border-color: var(--rose);
  }
  .voice-chip .who { color: var(--gold); font-weight: 600; margin-right: 8px; }

  /* ---------- CELEB CAROUSEL ---------- */
  .carousel-wrap {
    position: relative;
  }
  #celebCarousel {
    display: flex;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    scrollbar-width: none;
    gap: 20px;
    padding-bottom: 8px;
  }
  #celebCarousel::-webkit-scrollbar { display: none; }
  .celeb-card {
    flex: 0 0 100%;
    scroll-snap-align: center;
    background: linear-gradient(145deg, rgba(199, 38, 88, 0.1), rgba(255, 122, 162, 0.04));
    border: 1px solid rgba(255, 122, 162, 0.25);
    border-radius: 18px;
    padding: 32px;
    cursor: pointer;
    display: grid;
    grid-template-columns: 80px 1fr;
    gap: 22px;
    align-items: start;
  }
  .celeb-photo {
    width: 80px; height: 80px; border-radius: 50%;
    background: linear-gradient(135deg, var(--rose), var(--rose-deep));
    display: flex; align-items: center; justify-content: center;
    font-family: var(--serif); font-size: 1.6rem; color: var(--gloss);
    font-weight: 600;
  }
  .celeb-card blockquote {
    font-family: var(--serif);
    font-style: italic;
    font-size: 1.2rem;
    line-height: 1.45;
    color: var(--gloss);
    margin-bottom: 14px;
  }
  .celeb-name { color: var(--gold); font-weight: 600; font-size: 1rem; margin-bottom: 4px; }
  .celeb-meta { font-size: 0.82rem; color: var(--text-dim); letter-spacing: 0.04em; }

  .carousel-nav {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 18px;
    margin-top: 22px;
  }
  .carousel-arrow {
    background: rgba(255, 122, 162, 0.1);
    border: 1px solid rgba(255, 122, 162, 0.3);
    color: var(--rose);
    width: 40px; height: 40px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.2rem;
    transition: all 0.2s ease;
  }
  .carousel-arrow:hover { background: var(--rose); color: var(--bg-deep); }
  .carousel-dots { display: flex; gap: 8px; }
  .carousel-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(255, 122, 162, 0.25);
    cursor: pointer;
    transition: background 0.2s ease;
    border: none;
    padding: 0;
  }
  .carousel-dot.active { background: var(--rose); }

  /* ---------- BACK LINK ---------- */
  .back-link-wrap {
    text-align: center;
    margin-top: 72px;
  }
  .back-link {
    font-family: var(--serif);
    font-style: italic;
    font-size: 1.1rem;
    color: var(--gold);
    text-decoration: none;
    letter-spacing: 0.08em;
    padding: 10px 22px;
    border-bottom: 1px solid rgba(230, 180, 99, 0.3);
    transition: all 0.3s ease;
  }
  .back-link:hover {
    color: var(--rose);
    border-bottom-color: var(--rose);
    letter-spacing: 0.12em;
  }

  /* ---------- SOURCE BANNER ---------- */
  #sourceBanner {
    position: fixed;
    top: 22px;
    right: 22px;
    background: linear-gradient(135deg, var(--rose), var(--rose-deep));
    color: var(--gloss);
    padding: 14px 22px;
    border-radius: 10px;
    font-family: var(--serif);
    font-style: italic;
    font-size: 0.98rem;
    box-shadow: 0 8px 30px rgba(199, 38, 88, 0.35), 0 0 0 1px rgba(230, 180, 99, 0.3);
    cursor: pointer;
    opacity: 0;
    pointer-events: none;
    transform: translateY(-10px);
    transition: opacity 0.4s ease, transform 0.4s ease;
    z-index: 1000;
    max-width: 360px;
  }
  #sourceBanner.visible {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0);
  }

  /* ---------- RESPONSIVE ---------- */
  @media (max-width: 768px) {
    body { padding: 32px 20px 72px; }
    .hero { grid-template-columns: 1fr; gap: 24px; }
    .hero-right { display: none; }
    #quoteCards { grid-template-columns: 1fr; }
    .celeb-card { grid-template-columns: 1fr; text-align: center; }
    .celeb-photo { margin: 0 auto; }
    #sourceBanner { left: 20px; right: 20px; max-width: none; }
  }

  /* ---------- REDUCED MOTION ---------- */
  @media (prefers-reduced-motion: reduce) {
    .quote-card, .fact-tile, .voice-chip, #sourceBanner { transition: none; }
  }
</style>
</head>
<body>

  <!-- ---------- HERO ---------- -->
  <section class="hero">
    <div class="hero-left">
      <div class="eyebrow">for Koi</div>
      <h1 class="hero-thesis">
        women raised in divorced homes and mishandled by men don't love less &mdash;
        they love <em>sharper, deeper,</em> and choose <em>harder</em>. here is the proof.
      </h1>
    </div>
    <div class="hero-right" aria-hidden="true">
      <div class="rose-top">🌹</div>
      <div class="gold-line"></div>
    </div>
  </section>

  <!-- ---------- 1. QUOTE CARDS ---------- -->
  <section class="section">
    <h2 class="section-head">verbatim voices</h2>
    <!-- Assembler: populate from SA-A + SA-B research JSON. Each card:
         author, role, verbatim quote, publication, year,
         data-source="<url>", data-outlet="<outlet>" -->
    <div id="quoteCards" data-source-slot="quoteCards"></div>
  </section>

  <!-- ---------- 2. FACTS STRIP ---------- -->
  <section class="section">
    <h2 class="section-head">the hard facts</h2>
    <!-- Assembler: populate from SA-A primary-source research JSON.
         Each fact tile: stat (big number/phrase), label, data-source, data-outlet -->
    <div id="factsStrip" data-source-slot="factsStrip"></div>
  </section>

  <!-- ---------- 3. FAMOUS VOICES RIBBON ---------- -->
  <section class="section">
    <h2 class="section-head">famous voices</h2>
    <!-- Assembler: populate with voice-chip elements — each chip is a one-liner
         with data-source, data-outlet. Format: <div class="voice-chip" data-source="" data-outlet=""><span class="who">Name</span>quote</div> -->
    <div id="famousVoices" data-source-slot="famousVoices"></div>
  </section>

  <!-- ---------- 4. CELEB CAROUSEL (auto-hides if empty) ---------- -->
  <section class="section" id="celebCarouselSection">
    <h2 class="section-head">celebrity voices</h2>
    <div class="carousel-wrap">
      <!-- Assembler: populate ONLY with source-tier-gated celebrity voices.
           Each: .celeb-card with photo/initials, name, role, verbatim quote,
           outlet, year, data-source, data-outlet.
           If zero pass the gate → JS below hides the whole section. -->
      <div id="celebCarousel" class="carousel" data-source-slot="celebCarousel"></div>
      <div class="carousel-nav">
        <button class="carousel-arrow" id="celebPrev" aria-label="previous celebrity voice">&larr;</button>
        <div class="carousel-dots" id="celebDots" role="tablist" aria-label="carousel position"></div>
        <button class="carousel-arrow" id="celebNext" aria-label="next celebrity voice">&rarr;</button>
      </div>
    </div>
  </section>

  <!-- ---------- BACK LINK ---------- -->
  <div class="back-link-wrap">
    <a class="back-link" href="index.html" aria-label="back to page one">&larr; back</a>
  </div>

  <!-- ---------- SOURCE BANNER ---------- -->
  <div id="sourceBanner"
       role="status"
       aria-live="polite"
       aria-label="source banner — click to open source in new tab"></div>

<script>
  /* ============================================================
     SOURCE BANNER — fade-in on data-source click,
     auto-fade-out after 3s, click banner to open URL
     ============================================================ */
  const banner = document.getElementById('sourceBanner');
  let bannerTimer = null;
  let currentUrl = '';

  function showSourceBanner(url, outlet) {
    if (!url) return; // assembler hasn't filled yet
    currentUrl = url;
    banner.textContent = 'source: ' + (outlet || 'click to open') + ' — click to open';
    banner.classList.add('visible');
    clearTimeout(bannerTimer);
    bannerTimer = setTimeout(() => {
      banner.classList.remove('visible');
    }, 3000);
  }

  banner.addEventListener('click', () => {
    if (currentUrl) window.open(currentUrl, '_blank', 'noopener,noreferrer');
  });

  // Delegate: any element with data-source triggers banner
  document.body.addEventListener('click', (e) => {
    const el = e.target.closest('[data-source]');
    if (!el) return;
    // Don't re-trigger when clicking the banner itself
    if (el === banner) return;
    const url = el.getAttribute('data-source');
    const outlet = el.getAttribute('data-outlet');
    showSourceBanner(url, outlet);
  });

  /* ============================================================
     CELEB CAROUSEL — scroll-snap + arrows + dots
     Auto-hides section if empty
     ============================================================ */
  const celebCarousel = document.getElementById('celebCarousel');
  const celebSection = document.getElementById('celebCarouselSection');
  const celebPrev = document.getElementById('celebPrev');
  const celebNext = document.getElementById('celebNext');
  const celebDots = document.getElementById('celebDots');

  function initCelebCarousel() {
    if (!celebCarousel || celebCarousel.children.length === 0) {
      if (celebSection) celebSection.style.display = 'none';
      return;
    }
    const cards = Array.from(celebCarousel.children);
    // Build dots
    celebDots.innerHTML = '';
    cards.forEach((_, i) => {
      const dot = document.createElement('button');
      dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
      dot.setAttribute('role', 'tab');
      dot.setAttribute('aria-label', 'go to slide ' + (i + 1));
      dot.addEventListener('click', () => {
        cards[i].scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
      });
      celebDots.appendChild(dot);
    });
    // Arrow nav
    const scrollBy = (dir) => {
      const w = celebCarousel.clientWidth;
      celebCarousel.scrollBy({ left: dir * w, behavior: 'smooth' });
    };
    celebPrev.addEventListener('click', () => scrollBy(-1));
    celebNext.addEventListener('click', () => scrollBy(1));
    // Update active dot on scroll
    celebCarousel.addEventListener('scroll', () => {
      const idx = Math.round(celebCarousel.scrollLeft / celebCarousel.clientWidth);
      Array.from(celebDots.children).forEach((d, i) => {
        d.classList.toggle('active', i === idx);
      });
    });
  }

  // Run on load AND expose so assembler can re-run after injecting cards
  window.initCelebCarousel = initCelebCarousel;

  /* ============================================================
     CONTENT INJECTION — research-verified sources
     ============================================================ */
  const QUOTE_DATA = [
    {"author":"Cobb, Tedeschi, Calhoun & Cann","role":"Researchers, University of North Carolina at Charlotte","publication":"Journal of Traumatic Stress","year":2006,"url":"https://pubmed.ncbi.nlm.nih.gov/17195973/","quote":"Most women reported posttraumatic growth. Contact with a model of posttraumatic growth and having left an abusive relationship were both positively related to posttraumatic growth."},
    {"author":"Tedeschi & Calhoun","role":"Researchers, University of North Carolina at Charlotte","publication":"Journal of Traumatic Stress","year":1996,"url":"https://pubmed.ncbi.nlm.nih.gov/8827649/","quote":"Women tend to report more benefits than do men, and persons who have experienced traumatic events report more positive change than do persons who have not experienced extraordinary events."},
    {"author":"Valdez & Lilly","role":"Researchers, Northern Illinois University","publication":"Journal of Interpersonal Violence","year":2015,"url":"https://pubmed.ncbi.nlm.nih.gov/24850765/","quote":"World assumptions became more positive 1 year after an initial interview but only for women who had not been revictimized. Positive world assumption change was associated with greater PTG scores."},
    {"author":"Saunders, Jacobvitz, Zaccagnino, Beverung & Hazen","role":"Researchers, University of Texas at Austin","publication":"Attachment & Human Development","year":2011,"url":"https://pubmed.ncbi.nlm.nih.gov/21718225/","quote":"Mothers who report early negative relationship histories with their parents are later able to form a secure working model of attachment (indicated by the ability to speak clearly and coherently about these histories)."},
    {"author":"Smith-Etxeberria, Corres-Medrano & Fernandez-Villanueva","role":"Researchers, University of the Basque Country","publication":"Int'l Journal of Environmental Research and Public Health","year":2022,"url":"https://pmc.ncbi.nlm.nih.gov/articles/PMC9408156/","quote":"Positive behaviors promoted by parents allow children to feel loved and cared for by both parents, which set an essential foundation in the development of secure attachment relationships."},
    {"author":"Machinga-Asaolu","role":"Trauma & social work researcher","publication":"Trauma, Violence, & Abuse","year":2025,"url":"https://pubmed.ncbi.nlm.nih.gov/39460680/","quote":"IPV survivors might see, feel, and experience a hopeful, positive future after their IPV experience. Spiritual growth and new possibilities domains were experienced the most by adult IPV survivors."},
    {"author":"Judith Lewis Herman, M.D.","role":"Psychiatrist, Harvard Medical School; Victims of Violence Program","publication":"Trauma and Recovery (Basic Books)","year":1992,"url":"https://www.goodreads.com/work/quotes/530025-trauma-and-recovery","quote":"In her renewed connection with other people, the survivor re-creates the psychological faculties that were damaged or deformed by the traumatic experience. These faculties include the basic operations of trust, autonomy, initiative, competence, identity, and intimacy."},
    {"author":"Dr. Sue Johnson","role":"Clinical psychologist, developer of Emotionally Focused Therapy","publication":"Hold Me Tight (Little, Brown)","year":2008,"url":"https://www.goodreads.com/author/quotes/22726.Sue_Johnson","quote":"Love has an immense ability to help heal the devastating wounds that life sometimes deals us."},
    {"author":"Dr. Bessel van der Kolk","role":"Psychiatrist, founder Trauma Research Foundation","publication":"The Body Keeps the Score (Viking)","year":2014,"url":"https://www.goodreads.com/author/quotes/21280926.Bessel_van_der_Kolk","quote":"No doctor can write a prescription for friendship and love: These are complex and hard-earned capacities."}
  ];

  const FACTS_DATA = [
    {"stat":"Women report MORE post-traumatic growth than men.","label":"Tedeschi & Calhoun, Journal of Traumatic Stress, 1996","url":"https://pubmed.ncbi.nlm.nih.gov/8827649/","outlet":"Journal of Traumatic Stress"},
    {"stat":"The strongest growth domain for women is Relating to Others.","label":"Tedeschi & Calhoun, Journal of Traumatic Stress, 1996","url":"https://pubmed.ncbi.nlm.nih.gov/8827649/","outlet":"Journal of Traumatic Stress"},
    {"stat":"Leaving an abusive relationship is directly linked to post-traumatic growth.","label":"Cobb et al., Journal of Traumatic Stress, 2006","url":"https://pubmed.ncbi.nlm.nih.gov/17195973/","outlet":"Journal of Traumatic Stress"},
    {"stat":"Earned secure attachment: a secure love model built IN adulthood from insecure beginnings is well-documented.","label":"Saunders et al., Attachment & Human Development, 2011","url":"https://pubmed.ncbi.nlm.nih.gov/21718225/","outlet":"Attachment & Human Development"}
  ];

  const VOICES_DATA = [
    {"who":"Dr. Sue Johnson","line":"Love has an immense ability to help heal.","url":"https://www.goodreads.com/author/quotes/22726.Sue_Johnson","outlet":"Hold Me Tight (Little, Brown)"},
    {"who":"Dr. Bessel van der Kolk","line":"Friendship and love are complex and hard-earned capacities.","url":"https://www.goodreads.com/author/quotes/21280926.Bessel_van_der_Kolk","outlet":"The Body Keeps the Score (Viking)"},
    {"who":"Judith Herman, M.D.","line":"The survivor re-creates trust, autonomy, identity, and intimacy.","url":"https://www.goodreads.com/work/quotes/530025-trauma-and-recovery","outlet":"Trauma and Recovery (Basic Books)"}
  ];

  const CELEB_DATA = [
    {"name":"Jennifer Aniston","role":"Actress","quote":"It was always a little bit difficult for me in relationships, I think, because I really was kind of alone. My parents, watching my family's relationship, didn't make me kind of go, 'Oh, I can't wait to do that.'","outlet":"E! News","year":2024,"url":"https://www.eonline.com/news/1383740/jennifer-aniston-details-how-parents-divorce-impacted-her-own-approach-to-relationships"},
    {"name":"Reese Witherspoon","role":"Actress / Producer","quote":"I had to rewire my brain. My spirit had been diminished because I thought all those awful things that person said about me were true. It changed who I was on a cellular level, the fact that I stood up for myself.","outlet":"E! News","year":2024,"url":"https://www.eonline.com/news/1422830/reese-witherspoon-on-leaving-abusive-relationship"},
    {"name":"Selena Gomez","role":"Singer / Actress","quote":"I felt so less than in past relationships, and never really felt equal. I just said, 'This is what I want to feel about myself.'","outlet":"ABC News / Good Morning America","year":2021,"url":"https://abcnews.go.com/GMA/Culture/selena-gomez-cursed-past-relationships-damaged-worth-felt/story?id=78419410"},
    {"name":"Rihanna","role":"Singer / Businesswoman","quote":"It's not a subject to sweep under the rug. I just never understood that, like how the victim gets punished over and over.","outlet":"Rolling Stone","year":2009,"url":"https://www.rollingstone.com/music/music-news/rihanna-on-domestic-abuse-its-not-a-subject-to-sweep-under-the-rug-55580/"},
    {"name":"Viola Davis","role":"Actress / Author of Finding Me","quote":"I found that not only did I have fight in me, I had love.","outlet":"Finding Me: A Memoir (HarperOne)","year":2022,"url":"https://www.goodreads.com/work/quotes/92219814-finding-me"}
  ];

  function escAttr(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function escText(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function initials(name) {
    return name.split(/\s+/).filter(Boolean).map(n => n[0]).slice(0,2).join('').toUpperCase();
  }

  // ---------- QUOTE CARDS ----------
  const quoteCardsEl = document.getElementById('quoteCards');
  quoteCardsEl.innerHTML = QUOTE_DATA.map(q => `
    <article class="quote-card" data-source="${escAttr(q.url)}" data-outlet="${escAttr(q.publication)}">
      <blockquote>&ldquo;${escText(q.quote)}&rdquo;</blockquote>
      <footer class="attribution">
        <strong class="author">${escText(q.author)}</strong><br>
        <span>${escText(q.role)}</span><br>
        <span>${escText(q.publication)} &middot; ${escText(q.year)}</span>
      </footer>
    </article>
  `).join('');

  // ---------- FACTS STRIP ----------
  const factsEl = document.getElementById('factsStrip');
  factsEl.innerHTML = FACTS_DATA.map(f => `
    <div class="fact-tile" data-source="${escAttr(f.url)}" data-outlet="${escAttr(f.outlet)}">
      <span class="stat">${escText(f.stat)}</span>
      <span class="label">${escText(f.label)}</span>
    </div>
  `).join('');

  // ---------- FAMOUS VOICES ----------
  const voicesEl = document.getElementById('famousVoices');
  voicesEl.innerHTML = VOICES_DATA.map(v => `
    <div class="voice-chip" data-source="${escAttr(v.url)}" data-outlet="${escAttr(v.outlet)}">
      <span class="who">${escText(v.who)}</span>
      <span>${escText(v.line)}</span>
    </div>
  `).join('');

  // ---------- CELEB CAROUSEL ----------
  const celebEl = document.getElementById('celebCarousel');
  celebEl.innerHTML = CELEB_DATA.map(c => `
    <article class="celeb-card" data-source="${escAttr(c.url)}" data-outlet="${escAttr(c.outlet)}">
      <div class="celeb-photo" aria-hidden="true">${escText(initials(c.name))}</div>
      <div>
        <div class="celeb-name">${escText(c.name)}</div>
        <div class="celeb-meta" style="margin-bottom:12px;">${escText(c.role)}</div>
        <blockquote>&ldquo;${escText(c.quote)}&rdquo;</blockquote>
        <div class="celeb-meta">${escText(c.outlet)} &middot; ${escText(c.year)}</div>
      </div>
    </article>
  `).join('');

  // Kick off the carousel now that cards are injected
  initCelebCarousel();

  // Also hook the original load listener for any late calls
  document.addEventListener('DOMContentLoaded', initCelebCarousel);
</script>

</body>
</html>
