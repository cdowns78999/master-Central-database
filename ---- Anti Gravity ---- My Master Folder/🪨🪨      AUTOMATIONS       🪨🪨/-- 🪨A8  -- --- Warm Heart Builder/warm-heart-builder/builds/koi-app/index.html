<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>for Koi</title>
<style>
  /* ============================================================
     KOI ROSE THEME — flirty Ashes→Gold variant
     (shared theme: duplicate this :root block in page2.html)
     ============================================================ */
  :root {
    --bg-deep: #0d0a0c;
    --bg-soft: #1a1214;
    --rose: #ff7aa2;
    --rose-deep: #c72658;
    --gold: #e6b463;
    --gloss: #fff1e6;
    --text: #f5e9ec;
    --text-dim: rgba(245, 233, 236, 0.62);
    --serif: "Cormorant Garamond", "Playfair Display", Georgia, serif;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100%;
    background: radial-gradient(ellipse at top, var(--bg-soft) 0%, var(--bg-deep) 65%, #050303 100%);
    color: var(--text);
    font-family: var(--sans);
    overflow-x: hidden;
  }

  body {
    padding: 48px 24px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    position: relative;
  }

  /* ---------- HEADER ---------- */
  header {
    text-align: center;
    margin-bottom: 40px;
    z-index: 2;
  }
  .eyebrow {
    color: var(--gold);
    font-size: 0.72rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    font-weight: 500;
    margin-bottom: 14px;
  }
  .name {
    font-family: var(--serif);
    font-size: clamp(4.5rem, 14vw, 9rem);
    font-weight: 500;
    line-height: 0.95;
    background: linear-gradient(180deg, var(--gloss) 0%, var(--rose) 45%, var(--rose-deep) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
    text-shadow: 0 1px 0 rgba(255, 255, 255, 0.04);
    margin-bottom: 10px;
    letter-spacing: -0.02em;
  }
  .name::after {
    /* subtle gloss shimmer line */
    content: "";
    display: block;
    width: 44%;
    height: 1px;
    margin: 14px auto 0;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0.55;
  }
  .tagline {
    font-family: var(--serif);
    font-style: italic;
    font-size: clamp(1rem, 2.3vw, 1.35rem);
    color: var(--rose);
    font-weight: 400;
  }

  /* ---------- MAIN ---------- */
  main {
    width: 100%;
    max-width: 920px;
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 2;
    position: relative;
  }

  /* ---------- PHRASE DISPLAY ---------- */
  #phraseDisplay {
    font-family: var(--serif);
    font-style: italic;
    font-size: clamp(1.1rem, 2.6vw, 1.55rem);
    color: var(--gloss);
    text-align: center;
    min-height: 2.4em;
    max-width: 640px;
    padding: 0 16px;
    margin-bottom: 32px;
    opacity: 0.92;
    transition: opacity 0.45s ease;
    line-height: 1.4;
  }
  #phraseDisplay.fade { opacity: 0; }

  /* ---------- CENTERPIECE (glossy lips SVG) ---------- */
  #centerpiece {
    width: 400px;
    height: 400px;
    max-width: 85vw;
    max-height: 85vw;
    border-radius: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    background: radial-gradient(circle at center, rgba(255, 122, 162, 0.10), transparent 72%);
    margin-bottom: 56px;
    position: relative;
  }

  #lipsSvg {
    width: 100%;
    height: auto;
    max-width: 400px;
    overflow: visible;
    animation: breathe 6s ease-in-out infinite;
    transform-origin: center;
    transition: filter 0.4s ease;
    filter: drop-shadow(0 18px 42px rgba(199, 38, 88, 0.35));
  }

  #lipsSvg #upperLip,
  #lipsSvg #lowerLip {
    transition: transform 450ms cubic-bezier(.2,.9,.3,1.4);
    transform-origin: center;
  }
  #lipsSvg.open #upperLip { transform: translateY(-4px); }
  #lipsSvg.open #lowerLip { transform: translateY(4px); }

  #tongue {
    transform-origin: 200px 200px;
    transform: translateY(10px) scale(0.85);
    transition: transform 420ms cubic-bezier(.2,.9,.3,1.4);
  }
  #tongue.out {
    transform: translateY(-2px) scale(1.05);
  }

  #tongueHit {
    cursor: pointer;
  }
  #tongueHit:focus {
    outline: none;
  }
  #tongueHit:focus-visible rect {
    stroke: var(--gold);
    stroke-width: 2;
    stroke-dasharray: 4 3;
  }

  .gloss-shimmer {
    animation: shimmer 4.5s ease-in-out infinite;
    transform-origin: center;
  }

  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.015); }
  }

  @keyframes shimmer {
    0%, 100% { opacity: 0.35; }
    50%      { opacity: 0.55; }
  }

  /* ---------- TILE GRID ---------- */
  .tile-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
    width: 100%;
    max-width: 820px;
    margin-bottom: 80px;
  }
  .tile {
    aspect-ratio: 1 / 1;
    perspective: 900px;
    cursor: pointer;
    background: transparent;
    border: none;
    padding: 0;
    font-family: inherit;
  }
  .tile-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform 0.7s cubic-bezier(0.4, 0.15, 0.25, 1);
    transform-style: preserve-3d;
  }
  .tile.revealed .tile-inner { transform: rotateY(180deg); }
  .tile-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 18px;
    border: 1px solid rgba(255, 122, 162, 0.25);
    background: linear-gradient(145deg, rgba(255, 122, 162, 0.07), rgba(199, 38, 88, 0.04));
    backdrop-filter: blur(6px);
  }
  .tile-front .emoji {
    font-size: 2.4rem;
    margin-bottom: 12px;
    filter: drop-shadow(0 0 8px rgba(255, 122, 162, 0.3));
  }
  .tile-front .trait {
    font-family: var(--serif);
    font-size: 1.15rem;
    color: var(--gloss);
    font-style: italic;
  }
  .tile-back {
    transform: rotateY(180deg);
    background: linear-gradient(145deg, rgba(199, 38, 88, 0.2), rgba(255, 122, 162, 0.08));
    border: 1px solid var(--rose);
  }
  .tile-back .line {
    font-family: var(--serif);
    font-size: 1.02rem;
    color: var(--gloss);
    line-height: 1.45;
    font-style: italic;
  }

  /* ---------- KOI DRIFT (bottom 30%) ---------- */
  .koi-field {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    height: 30vh;
    pointer-events: none;
    overflow: hidden;
    z-index: 1;
    mask-image: linear-gradient(180deg, transparent 0%, black 40%);
    -webkit-mask-image: linear-gradient(180deg, transparent 0%, black 40%);
  }
  .koi {
    position: absolute;
    bottom: 10%;
    opacity: 0.35;
    animation: drift linear infinite;
  }
  .koi:nth-child(1) { bottom: 8%;  animation-duration: 48s; animation-delay: 0s;   transform: scale(0.9); }
  .koi:nth-child(2) { bottom: 18%; animation-duration: 62s; animation-delay: -12s; transform: scale(1.15); opacity: 0.28; }
  .koi:nth-child(3) { bottom: 4%;  animation-duration: 55s; animation-delay: -28s; transform: scale(0.75); opacity: 0.4; }
  .koi:nth-child(4) { bottom: 24%; animation-duration: 70s; animation-delay: -40s; transform: scale(1.0);  opacity: 0.22; }
  .koi:nth-child(5) { bottom: 13%; animation-duration: 58s; animation-delay: -20s; transform: scale(0.85); opacity: 0.33; }

  @keyframes drift {
    0%   { left: -12%;  transform: translateY(0)   scale(var(--s, 1)); }
    50%  { transform: translateY(-12px) scale(var(--s, 1)); }
    100% { left: 112%;  transform: translateY(0)   scale(var(--s, 1)); }
  }

  /* ---------- FOOTER ---------- */
  footer {
    margin: 40px 0 64px;
    text-align: center;
    z-index: 2;
    position: relative;
  }
  .page-turn {
    font-family: var(--serif);
    font-style: italic;
    font-size: 1.1rem;
    color: var(--gold);
    text-decoration: none;
    letter-spacing: 0.08em;
    padding: 10px 22px;
    border-bottom: 1px solid rgba(230, 180, 99, 0.3);
    transition: all 0.3s ease;
  }
  .page-turn:hover {
    color: var(--rose);
    border-bottom-color: var(--rose);
    letter-spacing: 0.12em;
  }

  /* ---------- RESPONSIVE ---------- */
  @media (max-width: 768px) {
    body { padding: 32px 16px 0; }
    .tile-grid { grid-template-columns: 1fr; gap: 14px; max-width: 380px; }
    #centerpiece { width: 320px; height: 320px; }
  }

  /* ---------- REDUCED MOTION ---------- */
  @media (prefers-reduced-motion: reduce) {
    .koi { animation: none; display: none; }
    .tile-inner { transition: none; }
    #centerpiece { transition: none; }
    #phraseDisplay { transition: none; }
    #lipsSvg { animation: none; }
    .gloss-shimmer { animation: none; }
    #lipsSvg #upperLip,
    #lipsSvg #lowerLip,
    #tongue { transition-duration: 0ms; }
  }
</style>
</head>
<body>

  <header>
    <div class="eyebrow">a little something for</div>
    <h1 class="name">Koi</h1>
    <div class="tagline">the most amazing girl I ever met</div>
  </header>

  <main>

    <!-- Phrase cycles on centerpiece tap -->
    <div id="phraseDisplay" aria-live="polite">tap the centerpiece</div>

    <!-- ============================================================
         CENTERPIECE — glossy parted lips with clickable tongue
         Tap #tongueHit to open lips, peek tongue, cycle phrase
         ============================================================ -->
    <div id="centerpiece" aria-label="Interactive lips centerpiece">
      <svg id="lipsSvg"
           viewBox="0 0 400 300"
           xmlns="http://www.w3.org/2000/svg"
           role="img"
           aria-label="glossy parted lips">
        <defs>
          <!-- Upper lip gradient: crimson deep → rose → cream cupid's bow -->
          <linearGradient id="upperLipGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"   stop-color="#fff1e6" stop-opacity="0.9"/>
            <stop offset="35%"  stop-color="#ff7aa2"/>
            <stop offset="100%" stop-color="#c72658"/>
          </linearGradient>
          <!-- Lower lip gradient: rose top → deep crimson bottom, with a fuller look -->
          <linearGradient id="lowerLipGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"   stop-color="#ff7aa2"/>
            <stop offset="55%"  stop-color="#e34075"/>
            <stop offset="100%" stop-color="#8d1a3e"/>
          </linearGradient>
          <!-- Tongue gradient -->
          <linearGradient id="tongueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"   stop-color="#ff3d77"/>
            <stop offset="100%" stop-color="#a41847"/>
          </linearGradient>
          <!-- Dark mouth interior -->
          <radialGradient id="mouthDark" cx="50%" cy="50%" r="60%">
            <stop offset="0%"   stop-color="#2a0612"/>
            <stop offset="100%" stop-color="#0a0205"/>
          </radialGradient>
          <!-- Soft inner shadow filter -->
          <filter id="innerShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
            <feOffset dx="0" dy="1" result="offsetblur"/>
            <feComponentTransfer>
              <feFuncA type="linear" slope="0.55"/>
            </feComponentTransfer>
            <feMerge>
              <feMergeNode/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
          <!-- Blur filter for gloss highlights -->
          <filter id="glossBlur" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="2.2"/>
          </filter>
        </defs>

        <!-- Upper lip: cupid's bow shape -->
        <path id="upperLip"
              d="M 60 150
                 C 80 120, 120 110, 160 118
                 C 175 122, 185 135, 200 135
                 C 215 135, 225 122, 240 118
                 C 280 110, 320 120, 340 150
                 C 320 148, 285 142, 255 148
                 C 230 153, 215 158, 200 158
                 C 185 158, 170 153, 145 148
                 C 115 142, 80 148, 60 150 Z"
              fill="url(#upperLipGrad)"
              filter="url(#innerShadow)"/>

        <!-- Mouth opening / inner dark + tongue -->
        <g id="mouthOpening">
          <!-- Dark inner shadow line -->
          <path d="M 68 152
                   C 130 160, 180 162, 200 162
                   C 220 162, 270 160, 332 152
                   C 320 168, 270 176, 200 176
                   C 130 176, 80 168, 68 152 Z"
                fill="url(#mouthDark)"/>

          <!-- Tongue: rounded teardrop -->
          <path id="tongue"
                d="M 170 160
                   C 170 175, 180 186, 200 186
                   C 220 186, 230 175, 230 160
                   C 225 168, 215 172, 200 172
                   C 185 172, 175 168, 170 160 Z"
                fill="url(#tongueGrad)"/>
          <!-- Tongue center crease -->
          <path d="M 200 164 Q 200 174 200 182"
                stroke="#7a0d2e"
                stroke-width="1"
                stroke-linecap="round"
                fill="none"
                opacity="0.55"
                pointer-events="none"/>
        </g>

        <!-- Lower lip: fuller curve -->
        <path id="lowerLip"
              d="M 62 152
                 C 90 168, 130 190, 200 198
                 C 270 190, 310 168, 338 152
                 C 330 180, 300 218, 260 230
                 C 230 239, 215 242, 200 242
                 C 185 242, 170 239, 140 230
                 C 100 218, 70 180, 62 152 Z"
              fill="url(#lowerLipGrad)"
              filter="url(#innerShadow)"/>

        <!-- Specular gloss on lower lip -->
        <ellipse class="gloss-shimmer"
                 cx="200" cy="210"
                 rx="70" ry="9"
                 fill="#ffffff"
                 opacity="0.35"
                 filter="url(#glossBlur)"/>
        <ellipse class="gloss-shimmer"
                 cx="160" cy="200"
                 rx="22" ry="4"
                 fill="#ffffff"
                 opacity="0.55"
                 filter="url(#glossBlur)"/>
        <!-- Smaller highlight on upper lip cupid's bow -->
        <ellipse class="gloss-shimmer"
                 cx="200" cy="128"
                 rx="16" ry="3"
                 fill="#ffffff"
                 opacity="0.45"
                 filter="url(#glossBlur)"/>
        <ellipse class="gloss-shimmer"
                 cx="255" cy="134"
                 rx="12" ry="2.5"
                 fill="#ffffff"
                 opacity="0.35"
                 filter="url(#glossBlur)"/>

        <!-- Invisible tongue hit target (larger for mobile taps) -->
        <g id="tongueHit"
           role="button"
           tabindex="0"
           aria-label="tap the tongue">
          <rect x="150" y="150"
                width="100" height="60"
                fill="transparent"
                stroke="transparent"/>
        </g>
      </svg>
    </div>

    <!-- ---------- TAP-REVEAL TILES ---------- -->
    <div class="tile-grid" role="list">

      <button class="tile" role="listitem" aria-label="rare presence — tap to reveal">
        <div class="tile-inner">
          <div class="tile-face tile-front">
            <div class="emoji" aria-hidden="true">🌹</div>
            <div class="trait">rare presence</div>
          </div>
          <div class="tile-face tile-back">
            <div class="line">the room gets quieter when you walk in</div>
          </div>
        </div>
      </button>

      <button class="tile" role="listitem" aria-label="sharp intuition — tap to reveal">
        <div class="tile-inner">
          <div class="tile-face tile-front">
            <div class="emoji" aria-hidden="true">🔮</div>
            <div class="trait">sharp intuition</div>
          </div>
          <div class="tile-face tile-back">
            <div class="line">you read people before they finish their sentence</div>
          </div>
        </div>
      </button>

      <button class="tile" role="listitem" aria-label="softness that survived — tap to reveal">
        <div class="tile-inner">
          <div class="tile-face tile-front">
            <div class="emoji" aria-hidden="true">🕊️</div>
            <div class="trait">softness that survived</div>
          </div>
          <div class="tile-face tile-back">
            <div class="line">every man who tried to ruin that failed</div>
          </div>
        </div>
      </button>

      <button class="tile" role="listitem" aria-label="magnetic — tap to reveal">
        <div class="tile-inner">
          <div class="tile-face tile-front">
            <div class="emoji" aria-hidden="true">🎐</div>
            <div class="trait">magnetic</div>
          </div>
          <div class="tile-face tile-back">
            <div class="line">people orbit you without knowing why</div>
          </div>
        </div>
      </button>

      <button class="tile" role="listitem" aria-label="original — tap to reveal">
        <div class="tile-inner">
          <div class="tile-face tile-front">
            <div class="emoji" aria-hidden="true">🌙</div>
            <div class="trait">original</div>
          </div>
          <div class="tile-face tile-back">
            <div class="line">there's no template for what you are</div>
          </div>
        </div>
      </button>

      <button class="tile" role="listitem" aria-label="amazing spirit — tap to reveal">
        <div class="tile-inner">
          <div class="tile-face tile-front">
            <div class="emoji" aria-hidden="true">💫</div>
            <div class="trait">amazing spirit</div>
          </div>
          <div class="tile-face tile-back">
            <div class="line">this is the part nobody can fake</div>
          </div>
        </div>
      </button>

    </div>

  </main>

  <!-- ---------- DRIFTING KOI (bottom 30%) ---------- -->
  <div class="koi-field" aria-hidden="true">
    <svg class="koi" width="90" height="36" viewBox="0 0 90 36" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="drifting koi fish">
      <ellipse cx="38" cy="18" rx="28" ry="10" fill="#ff7aa2" opacity="0.85"/>
      <path d="M 66 18 Q 82 6 88 18 Q 82 30 66 18 Z" fill="#c72658"/>
      <circle cx="22" cy="15" r="2" fill="#0d0a0c"/>
      <path d="M 30 14 Q 45 8 55 14" stroke="#e6b463" stroke-width="1.2" fill="none" opacity="0.7"/>
    </svg>
    <svg class="koi" width="90" height="36" viewBox="0 0 90 36" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="drifting koi fish">
      <ellipse cx="38" cy="18" rx="28" ry="10" fill="#e6b463" opacity="0.75"/>
      <path d="M 66 18 Q 82 6 88 18 Q 82 30 66 18 Z" fill="#ff7aa2"/>
      <circle cx="22" cy="15" r="2" fill="#0d0a0c"/>
      <path d="M 30 14 Q 45 8 55 14" stroke="#c72658" stroke-width="1.2" fill="none" opacity="0.7"/>
    </svg>
    <svg class="koi" width="90" height="36" viewBox="0 0 90 36" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="drifting koi fish">
      <ellipse cx="38" cy="18" rx="28" ry="10" fill="#ff7aa2" opacity="0.8"/>
      <path d="M 66 18 Q 82 6 88 18 Q 82 30 66 18 Z" fill="#c72658"/>
      <circle cx="22" cy="15" r="2" fill="#0d0a0c"/>
      <path d="M 30 14 Q 45 8 55 14" stroke="#fff1e6" stroke-width="1.2" fill="none" opacity="0.6"/>
    </svg>
    <svg class="koi" width="90" height="36" viewBox="0 0 90 36" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="drifting koi fish">
      <ellipse cx="38" cy="18" rx="28" ry="10" fill="#c72658" opacity="0.7"/>
      <path d="M 66 18 Q 82 6 88 18 Q 82 30 66 18 Z" fill="#e6b463"/>
      <circle cx="22" cy="15" r="2" fill="#0d0a0c"/>
      <path d="M 30 14 Q 45 8 55 14" stroke="#ff7aa2" stroke-width="1.2" fill="none" opacity="0.7"/>
    </svg>
    <svg class="koi" width="90" height="36" viewBox="0 0 90 36" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="drifting koi fish">
      <ellipse cx="38" cy="18" rx="28" ry="10" fill="#ff7aa2" opacity="0.78"/>
      <path d="M 66 18 Q 82 6 88 18 Q 82 30 66 18 Z" fill="#e6b463"/>
      <circle cx="22" cy="15" r="2" fill="#0d0a0c"/>
      <path d="M 30 14 Q 45 8 55 14" stroke="#c72658" stroke-width="1.2" fill="none" opacity="0.7"/>
    </svg>
  </div>

  <footer>
    <a class="page-turn" href="page2.html" aria-label="turn the page to the proof">turn the page &rarr;</a>
  </footer>

<script>
  /* ============================================================
     PHRASE CYCLER — fires on tongue hit-target tap
     ============================================================ */
  const phrases = [
    "you were never broken, just rare",
    "the ones who mishandled you didn't know what they were holding",
    "your radar is sharper because it had to be",
    "real love will recognize you immediately",
    "your softness survived them — that's a miracle"
  ];
  let phraseIdx = -1;
  const phraseEl = document.getElementById('phraseDisplay');
  const lipsSvg = document.getElementById('lipsSvg');
  const tongueEl = document.getElementById('tongue');
  const tongueHit = document.getElementById('tongueHit');

  function cyclePhrase() {
    phraseIdx = (phraseIdx + 1) % phrases.length;
    phraseEl.classList.add('fade');
    setTimeout(() => {
      phraseEl.textContent = phrases[phraseIdx];
      phraseEl.classList.remove('fade');
    }, 300);
  }

  let closeTimer = null;
  function triggerLips() {
    lipsSvg.classList.add('open');
    tongueEl.classList.add('out');
    cyclePhrase();
    clearTimeout(closeTimer);
    closeTimer = setTimeout(() => {
      lipsSvg.classList.remove('open');
      tongueEl.classList.remove('out');
    }, 2200);
  }

  // Only the tongue hit-target triggers the cycle.
  tongueHit.addEventListener('click', (e) => {
    e.stopPropagation();
    triggerLips();
  });
  tongueHit.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      triggerLips();
    }
  });

  /* ============================================================
     TILE FLIP — click to toggle .revealed
     ============================================================ */
  document.querySelectorAll('.tile').forEach(tile => {
    tile.addEventListener('click', () => tile.classList.toggle('revealed'));
  });
</script>

</body>
</html>
