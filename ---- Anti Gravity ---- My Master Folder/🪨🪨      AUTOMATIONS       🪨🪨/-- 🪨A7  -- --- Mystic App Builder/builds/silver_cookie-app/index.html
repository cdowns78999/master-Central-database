<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>silver_cookie ❄️</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Quicksand:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --deep-1: #050a14;
      --deep-2: #0a1428;
      --deep-3: #1a2f4d;
      --purple-mid: #2a5a9e;
      --purple-bright: #4a90e2;
      --violet-glow: #87ceeb;
      --mystic-pink: #b0e0ff;
      --hot-pink: #00bfff;
      --soft-rose: #c0d8e8;
      --text-primary: #e8f4ff;
      --text-muted: rgba(180, 210, 240, 0.6);
    }

    html { scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      background: var(--deep-1);
      color: var(--text-primary);
      font-family: 'Quicksand', 'Segoe UI', sans-serif;
      overflow-x: hidden;
      position: relative;
    }

    #particleCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    .goo-layer { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .goo-blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.35; animation: goo-drift 20s ease-in-out infinite alternate; }
    .goo-blob:nth-child(1) { width: 500px; height: 500px; background: radial-gradient(circle, #2a5a9e, transparent 70%); top: -10%; left: -10%; animation-duration: 22s; }
    .goo-blob:nth-child(2) { width: 400px; height: 400px; background: radial-gradient(circle, #4a90e2, transparent 70%); top: 30%; right: -15%; animation-duration: 18s; animation-delay: -5s; }
    .goo-blob:nth-child(3) { width: 600px; height: 600px; background: radial-gradient(circle, #0a1428, transparent 70%); bottom: -20%; left: 20%; animation-duration: 25s; animation-delay: -10s; }
    .goo-blob:nth-child(4) { width: 350px; height: 350px; background: radial-gradient(circle, #87ceeb, transparent 70%); top: 60%; left: -5%; animation-duration: 15s; animation-delay: -3s; opacity: 0.18; }
    .goo-blob:nth-child(5) { width: 280px; height: 280px; background: radial-gradient(circle, #00bfff, transparent 70%); top: 10%; right: 10%; animation-duration: 20s; animation-delay: -8s; opacity: 0.12; }

    @keyframes goo-drift {
      0%   { transform: translate(0, 0) scale(1); }
      33%  { transform: translate(60px, -40px) scale(1.15); }
      66%  { transform: translate(-30px, 50px) scale(0.9); }
      100% { transform: translate(40px, 20px) scale(1.05); }
    }

    .content { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

    .hero { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; min-height: 100dvh; padding: 2rem 1.5rem; text-align: center; position: relative; }

    .hero-tag { font-size: 0.8rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--soft-rose); opacity: 0.7; margin-bottom: 1rem; animation: fadeSlideIn 1.2s ease 0.3s both; }

    .hero-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.8rem, 6vw, 3.5rem);
      background: linear-gradient(135deg, #87ceeb 0%, #c0d8e8 30%, #00bfff 60%, #87ceeb 100%);
      background-size: 200% 200%;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      animation: gradientShift 6s ease-in-out infinite, fadeSlideIn 1.2s ease 0.6s both;
      filter: drop-shadow(0 0 30px rgba(0, 191, 255, 0.5));
      margin-bottom: 0.6rem;
    }

    .hero-sub { font-size: clamp(0.85rem, 2.5vw, 1rem); color: var(--text-muted); font-weight: 300; letter-spacing: 0.1em; margin-bottom: 3rem; animation: fadeSlideIn 1.2s ease 0.9s both; }

    @keyframes gradientShift { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
    @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    /* ========== CRYSTAL BALL ========== */
    .crystal-ball-wrap { position: relative; width: 240px; height: 240px; margin-bottom: 2rem; animation: fadeSlideIn 1.5s ease 1.2s both; cursor: pointer; }

    .crystal-ball {
      position: absolute; inset: 0; border-radius: 50%;
      background:
        radial-gradient(circle at 35% 30%, rgba(255,255,255,0.2) 0%, transparent 40%),
        radial-gradient(circle at 60% 70%, rgba(135, 206, 235, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(74, 144, 226, 0.5) 0%, rgba(26, 47, 77, 0.8) 60%, rgba(5, 10, 20, 0.95) 100%);
      box-shadow:
        0 0 40px rgba(74, 144, 226, 0.5), 0 0 80px rgba(0, 191, 255, 0.3), 0 0 120px rgba(42, 90, 158, 0.2),
        inset 0 0 60px rgba(135, 206, 235, 0.15), inset 0 -20px 40px rgba(5, 10, 20, 0.4);
      animation: crystalPulse 4s ease-in-out infinite;
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.5s ease;
    }

    .crystal-ball:hover {
      transform: scale(1.06);
      box-shadow:
        0 0 60px rgba(74, 144, 226, 0.7), 0 0 120px rgba(0, 191, 255, 0.4), 0 0 180px rgba(42, 90, 158, 0.25),
        inset 0 0 80px rgba(135, 206, 235, 0.25), inset 0 -20px 40px rgba(5, 10, 20, 0.4);
    }
    .crystal-ball:active { transform: scale(0.97); }

    .crystal-ball::before {
      content: ''; position: absolute; inset: 15%; border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, rgba(135, 206, 235, 0.4) 0%, transparent 50%), radial-gradient(circle at 65% 60%, rgba(0, 191, 255, 0.25) 0%, transparent 45%);
      animation: innerSwirl 8s ease-in-out infinite; opacity: 0.7;
    }

    .crystal-ball::after {
      content: ''; position: absolute; top: 12%; left: 18%; width: 35%; height: 25%; border-radius: 50%;
      background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0.05) 100%);
      filter: blur(2px); transform: rotate(-20deg);
    }

    .crystal-base { position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%); width: 100px; height: 30px; background: linear-gradient(180deg, #1a2f4d 0%, #0a1a30 100%); border-radius: 50%; box-shadow: 0 5px 20px rgba(0,0,0,0.6), 0 0 30px rgba(42, 90, 158, 0.3); }
    .crystal-base::before { content: ''; position: absolute; top: -8px; left: 50%; transform: translateX(-50%); width: 70px; height: 16px; background: linear-gradient(180deg, #2a4e7e, #1a2f4d); border-radius: 50%; }
    .crystal-reflection { position: absolute; bottom: -40px; left: 50%; transform: translateX(-50%); width: 180px; height: 20px; background: radial-gradient(ellipse, rgba(0, 191, 255, 0.25) 0%, transparent 70%); border-radius: 50%; animation: crystalPulse 4s ease-in-out infinite; }

    @keyframes crystalPulse {
      0%, 100% { box-shadow: 0 0 40px rgba(74,144,226,0.5), 0 0 80px rgba(0,191,255,0.3), 0 0 120px rgba(42,90,158,0.2), inset 0 0 60px rgba(135,206,235,0.15), inset 0 -20px 40px rgba(5,10,20,0.4); filter: brightness(1); }
      50% { box-shadow: 0 0 60px rgba(74,144,226,0.7), 0 0 100px rgba(0,191,255,0.4), 0 0 160px rgba(42,90,158,0.3), inset 0 0 80px rgba(135,206,235,0.25), inset 0 -20px 40px rgba(5,10,20,0.4); filter: brightness(1.1); }
    }
    @keyframes innerSwirl { 0%, 100% { transform: rotate(0deg) scale(1); opacity: 0.6; } 25% { transform: rotate(90deg) scale(1.1); opacity: 0.8; } 50% { transform: rotate(180deg) scale(0.95); opacity: 0.5; } 75% { transform: rotate(270deg) scale(1.05); opacity: 0.75; } }
    .crystal-ball.flash { animation: orbFlash 0.6s ease-out; }
    @keyframes orbFlash { 0% { filter: brightness(1); } 30% { filter: brightness(2) saturate(1.5); } 100% { filter: brightness(1); } }

    /* ========== CRYSTAL MESSAGE ========== */
    .crystal-message {
      max-width: 400px; min-height: 2.4rem; padding: 0.8rem 1.5rem;
      background: rgba(26, 47, 77, 0.4); border: 1px solid rgba(135, 206, 235, 0.2); border-radius: 20px;
      backdrop-filter: blur(10px); font-size: 0.9rem; font-style: italic; color: #c8e4f8; text-align: center;
      opacity: 0; transform: translateY(10px); transition: opacity 0.6s ease, transform 0.6s ease;
      animation: fadeSlideIn 1.5s ease 1.5s both;
    }
    .crystal-message .c-label { font-family: 'Cinzel Decorative', serif; font-style: normal; font-weight: 700; color: var(--hot-pink); text-transform: lowercase; font-size: 0.95rem; display: block; margin-bottom: 0.25rem; letter-spacing: 0.05em; }
    .crystal-message .c-detail { font-style: italic; color: #c8e4f8; font-size: 0.88rem; }
    .crystal-message.visible { opacity: 1; transform: translateY(0); }
    .crystal-message.hidden { opacity: 0; transform: translateY(10px); }

    /* ========== SCROLL CUE ========== */
    .scroll-cue { position: absolute; bottom: 2rem; display: flex; flex-direction: column; align-items: center; gap: 0.4rem; animation: fadeSlideIn 1.5s ease 2s both; }
    .scroll-cue span { font-size: 0.7rem; color: var(--text-muted); letter-spacing: 0.15em; text-transform: lowercase; }
    .scroll-arrow { width: 20px; height: 20px; border-right: 2px solid rgba(0, 191, 255, 0.4); border-bottom: 2px solid rgba(0, 191, 255, 0.4); transform: rotate(45deg); animation: scrollBounce 2s ease-in-out infinite; }
    @keyframes scrollBounce { 0%, 100% { transform: rotate(45deg) translate(0,0); opacity: 0.4; } 50% { transform: rotate(45deg) translate(5px,5px); opacity: 1; } }

    /* ========== TILES ========== */
    .tiles-section { width: 100%; max-width: 520px; padding: 2rem 1.5rem 6rem; display: flex; flex-direction: column; gap: 2.5rem; }

    .tile {
      position: relative; background: rgba(10, 20, 40, 0.6); border: 1.5px solid rgba(74, 144, 226, 0.15);
      border-radius: 24px; padding: 2.2rem 1.8rem 1.8rem; cursor: pointer; user-select: none;
      -webkit-tap-highlight-color: transparent; overflow: hidden; backdrop-filter: blur(12px);
      transition: transform 0.45s cubic-bezier(0.34,1.56,0.64,1), border-color 0.5s ease, box-shadow 0.5s ease;
      opacity: 0; transform: translateY(50px) scale(0.95);
    }
    .tile.revealed { opacity: 1; transform: translateY(0) scale(1); transition: opacity 0.8s cubic-bezier(0.16,1,0.3,1), transform 0.8s cubic-bezier(0.16,1,0.3,1), border-color 0.5s ease, box-shadow 0.5s ease; }

    .tile::before { content: ''; position: absolute; top: -1px; left: 10%; right: 10%; height: 3px; background: linear-gradient(90deg, transparent, var(--soft-rose), var(--hot-pink), var(--soft-rose), transparent); border-radius: 0 0 50% 50%; opacity: 0; transition: opacity 0.5s ease; }
    .tile::after { content: ''; position: absolute; inset: 0; border-radius: 24px; background: radial-gradient(ellipse at 50% 0%, rgba(0,191,255,0.12) 0%, transparent 65%); opacity: 0; transition: opacity 0.5s ease; pointer-events: none; }
    .tile:hover { transform: translateY(-6px) scale(1.02); border-color: rgba(0,191,255,0.45); box-shadow: 0 12px 40px rgba(20,50,100,0.35), 0 0 80px rgba(0,191,255,0.1); }
    .tile:hover::before { opacity: 1; }
    .tile:hover::after { opacity: 1; }
    .tile:active { transform: translateY(-2px) scale(0.98) !important; }

    .tile-header { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 0.5rem; }

    /* 3D Spinning Icon */
    .tile-icon-3d { width: 50px; height: 50px; flex-shrink: 0; perspective: 400px; }
    .tile-icon-3d .spinner {
      width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem; animation: spin3d 6s ease-in-out infinite; transform-style: preserve-3d;
      filter: drop-shadow(0 0 15px rgba(0, 191, 255, 0.6));
    }
    .tile:hover .tile-icon-3d .spinner { animation-duration: 2s; }
    @keyframes spin3d {
      0%   { transform: rotateY(0deg) rotateX(0deg) scale(1); }
      25%  { transform: rotateY(90deg) rotateX(10deg) scale(1.1); }
      50%  { transform: rotateY(180deg) rotateX(0deg) scale(1); }
      75%  { transform: rotateY(270deg) rotateX(-10deg) scale(1.1); }
      100% { transform: rotateY(360deg) rotateX(0deg) scale(1); }
    }

    .tile-title { font-family: 'Cinzel Decorative', serif; font-size: clamp(0.95rem, 3vw, 1.15rem); color: #a0d0f0; letter-spacing: 0.03em; }
    .tile-desc { font-size: 0.82rem; color: var(--text-muted); font-weight: 300; line-height: 1.5; margin-left: 0.2rem; }

    .tile-response {
      margin-top: 1.2rem; padding-top: 0; border-top: 1px solid rgba(74,144,226,0.12);
      font-size: 0.88rem; color: #d0eeff; line-height: 1.6; max-height: 0; overflow: hidden; opacity: 0;
      transition: max-height 0.6s cubic-bezier(0.16,1,0.3,1), opacity 0.5s ease, padding-top 0.5s ease;
    }
    .tile-response.open { max-height: 200px; opacity: 1; padding-top: 1rem; }
    .tile-response .r-label { font-family: 'Cinzel Decorative', serif; color: var(--hot-pink); font-weight: 700; font-size: 0.85rem; display: block; margin-bottom: 0.2rem; letter-spacing: 0.04em; }
    .tile-response .r-detail { font-style: italic; color: #c0ddf0; }
    .tile-response.typing::after { content: '|'; animation: cursorBlink 0.6s step-end infinite; color: var(--hot-pink); margin-left: 1px; }
    @keyframes cursorBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    .sparkle { position: absolute; border-radius: 50%; pointer-events: none; animation: sparklePop 0.7s ease-out forwards; }
    @keyframes sparklePop { 0% { transform: scale(0) translate(0,0); opacity: 1; } 100% { transform: scale(1) translate(var(--tx), var(--ty)); opacity: 0; } }

    footer { position: relative; z-index: 1; text-align: center; padding: 0 1.5rem 3rem; font-size: 0.72rem; color: rgba(180, 210, 240, 0.25); letter-spacing: 0.12em; }

    @media (max-width: 540px) {
      .crystal-ball-wrap { width: 190px; height: 190px; }
      .crystal-base { width: 80px; height: 24px; bottom: -14px; }
      .crystal-base::before { width: 56px; height: 12px; }
      .crystal-reflection { width: 140px; bottom: -34px; }
      .tiles-section { padding: 1.5rem 1rem 5rem; gap: 2rem; }
      .tile { padding: 1.8rem 1.4rem 1.4rem; }
      .hero { padding: 1.5rem 1rem; }
    }
    @media (max-width: 380px) { .crystal-ball-wrap { width: 160px; height: 160px; } }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    body { animation: fadeIn 0.8s ease; }
  </style>
</head>

<body>
  <canvas id="particleCanvas" aria-hidden="true"></canvas>

  <div class="goo-layer" aria-hidden="true">
    <div class="goo-blob"></div>
    <div class="goo-blob"></div>
    <div class="goo-blob"></div>
    <div class="goo-blob"></div>
    <div class="goo-blob"></div>
  </div>

  <div class="content">
    <section class="hero">
      <p class="hero-tag">❄️ for silver_cookie ❄️</p>
      <h1 class="hero-title">silver_cookie</h1>
      <p class="hero-sub">polish angel crashed into my orbit</p>

      <div class="crystal-ball-wrap" id="crystalBallWrap">
        <div class="crystal-ball" id="crystalBall"></div>
        <div class="crystal-base"></div>
        <div class="crystal-reflection"></div>
      </div>

      <div class="crystal-message" id="crystalMessage">tap the crystal...</div>

      <div class="scroll-cue">
        <span>keep going</span>
        <div class="scroll-arrow"></div>
      </div>
    </section>

    <section class="tiles-section">

      <!-- Tile 1 — Just Met -->
      <article class="tile" data-tile="justmet" role="button" tabindex="0">
        <div class="tile-header">
          <div class="tile-icon-3d"><div class="spinner">💫</div></div>
          <h2 class="tile-title">Just Met</h2>
        </div>
        <p class="tile-desc">tap to see...</p>
        <div class="tile-response" id="justmetResponse"></div>
      </article>

      <!-- Tile 2 — That Voice -->
      <article class="tile" data-tile="voice" role="button" tabindex="0">
        <div class="tile-header">
          <div class="tile-icon-3d"><div class="spinner">🎤</div></div>
          <h2 class="tile-title">That Voice</h2>
        </div>
        <p class="tile-desc">tap to see...</p>
        <div class="tile-response" id="voiceResponse"></div>
      </article>

      <!-- Tile 3 — Poland -->
      <article class="tile" data-tile="poland" role="button" tabindex="0">
        <div class="tile-header">
          <div class="tile-icon-3d"><div class="spinner">❄️</div></div>
          <h2 class="tile-title">Poland</h2>
        </div>
        <p class="tile-desc">tap to see...</p>
        <div class="tile-response" id="polandResponse"></div>
      </article>

      <!-- Tile 4 — Reese's -->
      <article class="tile" data-tile="reeses" role="button" tabindex="0">
        <div class="tile-header">
          <div class="tile-icon-3d"><div class="spinner">🍫</div></div>
          <h2 class="tile-title">Reese's</h2>
        </div>
        <p class="tile-desc">tap to see...</p>
        <div class="tile-response" id="reesesResponse"></div>
      </article>

      <!-- Tile 5 — Singer -->
      <article class="tile" data-tile="singer" role="button" tabindex="0">
        <div class="tile-header">
          <div class="tile-icon-3d"><div class="spinner">⭐</div></div>
          <h2 class="tile-title">Singer</h2>
        </div>
        <p class="tile-desc">tap to see...</p>
        <div class="tile-response" id="singerResponse"></div>
      </article>

    </section>

    <footer>
      <p>crafted under a silver moon — for silver_cookie</p>
    </footer>
  </div>

  <script>
    (() => {
      'use strict';

      /* ============================================================
         PARTICLE CANVAS
         ============================================================ */
      const canvas = document.getElementById('particleCanvas');
      const ctx = canvas.getContext('2d');
      let particles = [];
      let W, H;

      function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
      resize();
      window.addEventListener('resize', resize);

      class Particle {
        constructor() { this.reset(); }
        reset() {
          this.x = Math.random() * W; this.y = Math.random() * H + H;
          this.r = Math.random() * 2.5 + 0.5; this.vy = -(Math.random() * 0.5 + 0.15);
          this.vx = (Math.random() - 0.5) * 0.3; this.alpha = Math.random() * 0.5 + 0.1;
          this.hue = 190 + Math.random() * 40; this.sat = 65 + Math.random() * 30; this.light = 65 + Math.random() * 25;
        }
        update() { this.y += this.vy; this.x += this.vx + Math.sin(this.y * 0.005) * 0.2; this.alpha -= 0.0008; if (this.y < -10 || this.alpha <= 0) this.reset(); }
        draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2); ctx.fillStyle = `hsla(${this.hue}, ${this.sat}%, ${this.light}%, ${this.alpha})`; ctx.fill(); }
      }

      const PARTICLE_COUNT = Math.min(80, Math.floor(W * H / 15000));
      for (let i = 0; i < PARTICLE_COUNT; i++) { const p = new Particle(); p.y = Math.random() * H; particles.push(p); }
      function animateParticles() { ctx.clearRect(0, 0, W, H); for (const p of particles) { p.update(); p.draw(); } requestAnimationFrame(animateParticles); }
      animateParticles();

      /* ============================================================
         SCROLL REVEAL
         ============================================================ */
      const tiles = document.querySelectorAll('.tile');
      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            const delay = Array.from(tiles).indexOf(entry.target) * 150;
            setTimeout(() => entry.target.classList.add('revealed'), delay);
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.15, rootMargin: '0px 0px -50px 0px' });
      tiles.forEach(tile => observer.observe(tile));

      /* ============================================================
         TILE COMPLIMENT POOLS — "compliment: details" format
         ============================================================ */
      const messages = {
        justmet: [
          { label: "just met", detail: "already can't forget you" }
        ],
        voice: [
          { label: "that voice", detail: "honey poured over gold" }
        ],
        poland: [
          { label: "poland", detail: "warsaw snow in your smile" }
        ],
        reeses: [
          { label: "reese's", detail: "sweet like you, wrapped in silver" }
        ],
        singer: [
          { label: "singer", detail: "the stage is already yours" }
        ]
      };

      /* ============================================================
         CRYSTAL BALL COMPLIMENTS (sequential cycling)
         ============================================================ */
      const crystalCompliments = [
        { label: "just", detail: "met you and the air shifted" },
        { label: "that voice", detail: "stops the whole room cold" },
        { label: "polish", detail: "angel across the sea" },
        { label: "future star", detail: "the world's about to know your name" }
      ];
      let crystalIndex = 0;

      /* ============================================================
         HELPERS
         ============================================================ */
      function randomFrom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

      function typewriteCompliment(el, item, speed = 25) {
        el.innerHTML = '';
        el.classList.add('typing');
        const lbl = document.createElement('span'); lbl.className = 'r-label';
        const det = document.createElement('span'); det.className = 'r-detail';
        el.appendChild(lbl); el.appendChild(det);
        const fullLabel = item.label + ':';
        const fullDetail = ' ' + item.detail;
        let phase = 'label', i = 0;
        const iv = setInterval(() => {
          if (phase === 'label') { lbl.textContent += fullLabel[i]; i++; if (i >= fullLabel.length) { phase = 'detail'; i = 0; } }
          else { det.textContent += fullDetail[i]; i++; if (i >= fullDetail.length) { clearInterval(iv); el.classList.remove('typing'); } }
        }, speed);
      }

      function typewriteCrystal(el, item, speed = 30) {
        el.innerHTML = '';
        const lbl = document.createElement('span'); lbl.className = 'c-label';
        const det = document.createElement('span'); det.className = 'c-detail';
        el.appendChild(lbl); el.appendChild(det);
        const fullLabel = item.label + ':';
        const fullDetail = ' ' + item.detail;
        let phase = 'label', i = 0;
        const iv = setInterval(() => {
          if (phase === 'label') { lbl.textContent += fullLabel[i]; i++; if (i >= fullLabel.length) { phase = 'detail'; i = 0; } }
          else { det.textContent += fullDetail[i]; i++; if (i >= fullDetail.length) { clearInterval(iv); } }
        }, speed);
      }

      function spawnSparkles(container, x, y, count = 10) {
        for (let i = 0; i < count; i++) {
          const s = document.createElement('div'); s.className = 'sparkle';
          const angle = (Math.PI * 2 * i) / count + (Math.random() * 0.5);
          const dist = 25 + Math.random() * 50; const size = 3 + Math.random() * 5;
          s.style.width = size + 'px'; s.style.height = size + 'px'; s.style.left = x + 'px'; s.style.top = y + 'px';
          s.style.setProperty('--tx', `${Math.cos(angle) * dist}px`);
          s.style.setProperty('--ty', `${Math.sin(angle) * dist}px`);
          s.style.background = `hsl(${190 + Math.random() * 40}, 80%, ${70 + Math.random() * 25}%)`;
          container.appendChild(s);
          s.addEventListener('animationend', () => s.remove());
        }
      }

      /* ============================================================
         CRYSTAL BALL CLICK (sequential cycling)
         ============================================================ */
      const crystalBall = document.getElementById('crystalBall');
      const crystalWrap = document.getElementById('crystalBallWrap');
      const crystalMsg  = document.getElementById('crystalMessage');

      crystalWrap.addEventListener('click', (e) => {
        crystalBall.classList.remove('flash'); void crystalBall.offsetWidth; crystalBall.classList.add('flash');
        const rect = crystalWrap.getBoundingClientRect();
        spawnSparkles(crystalWrap, e.clientX - rect.left, e.clientY - rect.top, 12);
        const compliment = crystalCompliments[crystalIndex];
        crystalIndex = (crystalIndex + 1) % crystalCompliments.length;
        crystalMsg.classList.remove('visible', 'hidden'); crystalMsg.classList.add('hidden');
        setTimeout(() => { crystalMsg.classList.remove('hidden'); crystalMsg.classList.add('visible'); typewriteCrystal(crystalMsg, compliment, 30); }, 200);
      });

      setTimeout(() => crystalMsg.classList.add('visible'), 2000);

      /* ============================================================
         TILE CLICK
         ============================================================ */
      tiles.forEach(tile => {
        tile.addEventListener('click', (e) => {
          const type = tile.dataset.tile;
          const pool = messages[type]; if (!pool) return;
          const response = tile.querySelector('.tile-response'); if (!response) return;
          document.querySelectorAll('.tile-response.open').forEach(r => { if (r !== response) { r.classList.remove('open', 'typing'); } });
          const rect = tile.getBoundingClientRect();
          spawnSparkles(tile, e.clientX - rect.left, e.clientY - rect.top, 10);
          const msg = randomFrom(pool);
          response.classList.add('open');
          typewriteCompliment(response, msg, 22);
        });
        tile.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); tile.click(); } });
      });

      /* ============================================================
         HIDE SCROLL CUE
         ============================================================ */
      const scrollCue = document.querySelector('.scroll-cue');
      let cueHidden = false;
      window.addEventListener('scroll', () => {
        if (!cueHidden && window.scrollY > 100) { scrollCue.style.opacity = '0'; scrollCue.style.transition = 'opacity 0.5s ease'; cueHidden = true; }
      }, { passive: true });

    })();
  </script>
</body>
</html>
