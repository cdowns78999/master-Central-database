<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Build Memory — Session Log</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ── CSS Variables ── */
    :root {
      --lamp-deep: #c2560a;
      --lamp-mid: #e07b2e;
      --lamp-warm: #f2a54a;
      --lamp-soft: #f8c97d;
      --lamp-glow: #fde8c8;
      --bg-body: #0e0e0e;
      --bg-card: #ffffff;
      --border-thick: 4px solid var(--lamp-mid);
      --radius-card: 18px;
      --radius-pill: 999px;
      --font-sans: 'Outfit', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --report-bg: linear-gradient(145deg, #1a1a1a, #0a0a0a);
      --toggle-on: #22c55e;
      --toggle-off: #6b7280;
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background: var(--bg-body);
      color: #f5f5f5;
      min-height: 100vh;
      padding-bottom: 90px;
      background-image:
        radial-gradient(ellipse at 20% 0%, rgba(194, 86, 10, 0.25) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(224, 123, 46, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 100%, rgba(242, 165, 74, 0.10) 0%, transparent 40%);
    }

    /* ── Toggle Menu ── */
    .toggle-menu {
      display: flex;
      gap: 14px;
      justify-content: center;
      padding: 20px 16px 6px;
      flex-wrap: wrap;
    }

    .toggle-pill {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.06);
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: var(--radius-pill);
      padding: 8px 18px 8px 14px;
      cursor: pointer;
      user-select: none;
      transition: border-color 0.3s, background 0.3s;
    }
    .toggle-pill:hover { border-color: var(--lamp-warm); }

    .toggle-pill .dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--toggle-off);
      transition: background 0.3s, box-shadow 0.3s;
      flex-shrink: 0;
    }
    .toggle-pill.active .dot {
      background: var(--toggle-on);
      box-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
    }
    .toggle-pill .label {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.7);
      white-space: nowrap;
    }
    .toggle-pill.active .label { color: #ffffff; }
    .toggle-pill .state {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--toggle-off);
      transition: color 0.3s;
    }
    .toggle-pill.active .state { color: var(--toggle-on); }

    /* ── Header ── */
    .header {
      text-align: center;
      padding: 32px 16px 10px;
    }
    .header h1 {
      font-family: var(--font-sans);
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 800;
      background: linear-gradient(135deg, var(--lamp-glow), var(--lamp-warm), var(--lamp-mid));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }
    .header .timestamp {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--lamp-soft);
      margin-top: 8px;
      opacity: 0.8;
    }

    /* ── Panel Grid ── */
    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      padding: 24px 24px 32px;
      max-width: 1200px;
      margin: 0 auto;
    }
    @media (max-width: 768px) {
      .panels { grid-template-columns: 1fr; }
    }

    /* ── Card ── */
    .card {
      background: var(--bg-card);
      border: var(--border-thick);
      border-radius: var(--radius-card);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 20px;
      border-bottom: 2px solid rgba(224, 123, 46, 0.2);
      background: linear-gradient(135deg, rgba(253,232,200,0.15), rgba(248,201,125,0.08));
    }
    .card-header .icon { font-size: 20px; }
    .card-header .title {
      font-family: var(--font-sans);
      font-weight: 700;
      font-size: 17px;
      color: var(--lamp-deep);
      flex: 1;
    }
    .card-header .dot-indicator {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--lamp-warm);
      box-shadow: 0 0 6px rgba(242, 165, 74, 0.5);
    }
    .card-header .badge {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 700;
      background: var(--lamp-deep);
      color: #fff;
      padding: 2px 10px;
      border-radius: var(--radius-pill);
    }

    .card-body {
      padding: 20px;
      flex: 1;
      color: #333;
      font-size: 15px;
      line-height: 1.6;
    }
    .card-body .placeholder {
      font-family: var(--font-mono);
      font-size: 13px;
      color: #999;
      font-style: italic;
    }

    .card-footer {
      padding: 10px 20px;
      border-top: 1px solid rgba(0,0,0,0.06);
      font-family: var(--font-mono);
      font-size: 11px;
      color: #aaa;
    }

    /* ── Report Entry (dark notch style) ── */
    .report-entry {
      background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
      color: #f0f0f0;
      border-radius: 12px;
      padding: 16px 18px;
      margin-bottom: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      transition: border-color 0.3s;
    }
    .report-entry:hover {
      border-color: var(--lamp-mid);
    }
    .report-entry .entry-title {
      font-family: var(--font-sans);
      font-weight: 600;
      font-size: 14px;
      color: var(--lamp-warm);
      margin-bottom: 6px;
    }
    .report-entry .entry-body {
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.5;
      color: rgba(255,255,255,0.7);
    }
    .report-entry .entry-time {
      font-family: var(--font-mono);
      font-size: 10px;
      color: rgba(255,255,255,0.35);
      margin-top: 8px;
    }

    .empty-state {
      text-align: center;
      padding: 32px 16px;
      font-family: var(--font-mono);
      font-size: 13px;
      color: #bbb;
    }

    /* ── Bottom Toolbar ── */
    .toolbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
      border-top: 3px solid var(--lamp-mid);
      display: flex;
      justify-content: center;
      gap: 0;
      padding: 0;
    }
    .toolbar button {
      flex: 1;
      max-width: 220px;
      background: none;
      border: none;
      border-right: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.7);
      font-family: var(--font-sans);
      font-weight: 600;
      font-size: 14px;
      padding: 16px 12px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .toolbar button:last-child { border-right: none; }
    .toolbar button:hover {
      background: rgba(242, 165, 74, 0.12);
      color: var(--lamp-warm);
    }
    .toolbar button:active {
      background: rgba(242, 165, 74, 0.22);
    }
    .toolbar .btn-icon {
      display: block;
      font-size: 18px;
      margin-bottom: 2px;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--lamp-deep);
      color: #fff;
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 600;
      padding: 10px 24px;
      border-radius: var(--radius-pill);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 200;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--lamp-mid); border-radius: 3px; }
  </style>
</head>
<body>

  <!-- Toggle Menu -->
  <div class="toggle-menu">
    <div class="toggle-pill active" id="togglePickup" onclick="toggleSwitch('togglePickup')">
      <span class="dot"></span>
      <span class="label">Pickup Prompt</span>
      <span class="state">ON</span>
    </div>
    <div class="toggle-pill active" id="toggleReport" onclick="toggleSwitch('toggleReport')">
      <span class="dot"></span>
      <span class="label">Auto Job Report</span>
      <span class="state">ON</span>
    </div>
  </div>

  <!-- Header -->
  <header class="header" id="sectionHeader">
    <h1>Build Memory</h1>
    <div class="timestamp" id="sessionTimestamp">Session started: [timestamp]</div>
  </header>

  <!-- Panels -->
  <div class="panels">

    <!-- Panel 1: Pickup Prompt -->
    <div class="card" id="sectionPickup">
      <div class="card-header">
        <span class="icon">&#x1F4CB;</span>
        <span class="title">Pickup Prompt</span>
        <span class="dot-indicator"></span>
      </div>
      <div class="card-body">
        <div id="pickupContent" class="placeholder">[Session context will be written here per cycle]</div>
      </div>
      <div class="card-footer">
        Last Updated: <span id="pickupTimestamp">—</span>
      </div>
    </div>

    <!-- Panel 2: Job Reports -->
    <div class="card" id="sectionReports">
      <div class="card-header">
        <span class="icon">&#x1F4CA;</span>
        <span class="title">Job Reports</span>
        <span class="badge" id="reportCount">0</span>
      </div>
      <div class="card-body">
        <div id="reportLog">
          <div class="empty-state">No reports logged yet.</div>
        </div>
      </div>
    </div>

  </div>

  <!-- Bottom Toolbar -->
  <div class="toolbar">
    <button onclick="scrollToSection('sectionPickup')">
      <span class="btn-icon">&#x1F4CB;</span>
      View Prompt
    </button>
    <button onclick="scrollToSection('sectionReports')">
      <span class="btn-icon">&#x1F4CA;</span>
      View Reports
    </button>
    <button onclick="exportAll()">
      <span class="btn-icon">&#x1F4BE;</span>
      Export
    </button>
  </div>

  <!-- Toast Notification -->
  <div class="toast" id="toast">Copied to clipboard</div>

  <script>
    // ── Initialize Timestamp ──
    (function initTimestamp() {
      const now = new Date();
      const formatted = now.toLocaleString('en-US', {
        weekday: 'short',
        year: 'numeric',
        month: 'short',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: true
      });
      document.getElementById('sessionTimestamp').textContent = 'Session started: ' + formatted;
    })();

    // ── Toggle Switch ──
    function toggleSwitch(id) {
      const pill = document.getElementById(id);
      const stateEl = pill.querySelector('.state');
      const isActive = pill.classList.toggle('active');
      stateEl.textContent = isActive ? 'ON' : 'OFF';
    }

    // ── Scroll to Section ──
    function scrollToSection(id) {
      const el = document.getElementById(id);
      if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    // ── Show Toast ──
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg || 'Copied to clipboard';
      toast.classList.add('show');
      setTimeout(function() { toast.classList.remove('show'); }, 2200);
    }

    // ── Export All ──
    function exportAll() {
      const pickup = document.getElementById('pickupContent').innerText;
      const reports = document.getElementById('reportLog').innerText;
      const session = document.getElementById('sessionTimestamp').textContent;

      const output = [
        '=== BUILD MEMORY — SESSION LOG ===',
        session,
        '',
        '--- PICKUP PROMPT ---',
        pickup,
        '',
        '--- JOB REPORTS ---',
        reports,
        '',
        '=== END ==='
      ].join('\n');

      navigator.clipboard.writeText(output).then(function() {
        showToast('Exported to clipboard');
      }).catch(function() {
        // Fallback for older browsers
        var ta = document.createElement('textarea');
        ta.value = output;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('Exported to clipboard');
      });
    }

    // ── Update Pickup Timestamp ──
    function updatePickupTimestamp() {
      const now = new Date();
      const t = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
      document.getElementById('pickupTimestamp').textContent = t;
    }

    // ── Add Report Entry (callable by skill logic) ──
    function addReport(title, body) {
      var log = document.getElementById('reportLog');
      var empty = log.querySelector('.empty-state');
      if (empty) empty.remove();

      var now = new Date();
      var t = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });

      var entry = document.createElement('div');
      entry.className = 'report-entry';
      entry.innerHTML =
        '<div class="entry-title">' + (title || 'Report') + '</div>' +
        '<div class="entry-body">' + (body || '') + '</div>' +
        '<div class="entry-time">' + t + '</div>';

      log.prepend(entry);

      // Update badge count
      var count = log.querySelectorAll('.report-entry').length;
      document.getElementById('reportCount').textContent = count;
    }

    // ── Set Pickup Content (callable by skill logic) ──
    function setPickup(content) {
      var el = document.getElementById('pickupContent');
      el.classList.remove('placeholder');
      el.innerHTML = content;
      updatePickupTimestamp();
    }
  </script>

</body>
</html>
