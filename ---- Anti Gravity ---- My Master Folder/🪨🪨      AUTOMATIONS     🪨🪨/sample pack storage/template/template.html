<!DOCTYPE html>
<!--
  /samplepack TEMPLATE
  ------------------------------------------------------------
  Master shell. Cloned by /samplepack into storage/<dated-pack>/index.html.
  Each tile opens a FULLY OPERATIONAL sub-app via overlay (not a plan, not a mockup).
  Sub-apps live in tiles/<slug>.html alongside this index.
  CSS feel: gentle iTunes — clean, dense, breathable, utilitarian.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sample Pack — {{PACK_TITLE}}</title>
<style>
  :root {
    --bg: #f5f6f8;
    --pane: #ffffff;
    --line: #e3e6ec;
    --line-soft: #eef0f4;
    --ink: #1f2430;
    --muted: #6b7280;
    --accent: #4a6da7;
    --accent-soft: #eaf0fa;
    --tile: #ffffff;
    --hover: #f9fbfe;
    --shadow: 0 1px 2px rgba(20,30,50,0.04), 0 8px 24px rgba(20,30,50,0.06);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 13px;
  }
  .app {
    display: grid;
    grid-template-rows: 56px 1fr 28px;
    height: 100vh;
  }

  /* Top bar */
  header.top {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 0 22px;
    background: linear-gradient(180deg,#fbfcfd 0%,#eef0f4 100%);
    border-bottom: 1px solid var(--line);
  }
  header.top .traffic { display: flex; gap: 6px; }
  header.top .traffic span {
    width: 11px; height: 11px; border-radius: 50%;
    background: #d8dbe1; border: 1px solid #b9bdc6;
  }
  header.top .traffic span:nth-child(1) { background: #ff5f57; border-color: #e04a45; }
  header.top .traffic span:nth-child(2) { background: #ffbd2e; border-color: #dfa122; }
  header.top .traffic span:nth-child(3) { background: #28c940; border-color: #1ea832; }
  header.top h1 {
    margin: 0; font-size: 14px; font-weight: 600; letter-spacing: 0.01em;
    color: #4a5060;
  }
  header.top .sub { color: var(--muted); font-size: 12px; }
  header.top .spacer { flex: 1; }
  header.top .meta { color: var(--muted); font-size: 11.5px; font-family: ui-monospace, "SF Mono", Menlo, monospace; }

  /* Body */
  main {
    overflow: auto;
    padding: 24px 28px 32px;
  }
  .pack-head {
    margin: 0 0 22px;
    max-width: 720px;
  }
  .pack-head .title {
    font-size: 28px;
    font-weight: 300;
    letter-spacing: -0.01em;
    margin: 0 0 6px;
    font-family: ui-serif, Georgia, "Times New Roman", serif;
  }
  .pack-head .lede {
    color: var(--muted);
    font-size: 13.5px;
    line-height: 1.55;
    margin: 0;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 18px;
    max-width: 1280px;
  }
  .tile {
    background: var(--tile);
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.14s ease, box-shadow 0.14s ease, border-color 0.14s ease;
    display: flex; flex-direction: column;
    min-height: 220px;
  }
  .tile:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow);
    border-color: var(--accent);
  }
  .tile .stage {
    flex: 1;
    background: linear-gradient(135deg,#f0f3f8 0%, #e2e7f1 100%);
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; justify-content: center;
    color: #8893a8;
    font-size: 28px;
    font-weight: 200;
    letter-spacing: 0.02em;
    position: relative;
    overflow: hidden;
  }
  .tile .stage::after {
    content: "▶";
    position: absolute;
    top: 10px; right: 12px;
    font-size: 11px;
    color: rgba(74,109,167,0.6);
  }
  .tile .meta {
    padding: 10px 12px 12px;
  }
  .tile .meta .name {
    font-size: 13px;
    font-weight: 600;
    margin: 0 0 3px;
    color: var(--ink);
  }
  .tile .meta .sub {
    font-size: 11.5px;
    color: var(--muted);
    line-height: 1.4;
  }
  .tile .meta .src {
    margin-top: 6px;
    font-size: 10.5px;
    color: var(--accent);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    text-transform: lowercase;
  }

  /* Status bar */
  footer.status {
    display: flex; align-items: center; justify-content: center; gap: 16px;
    background: linear-gradient(180deg,#f5f6f9 0%, #e9ecf1 100%);
    border-top: 1px solid var(--line);
    color: var(--muted);
    font-size: 11px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }
  footer.status .dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    margin-right: 6px;
    vertical-align: middle;
  }

  /* Overlay (tile click → fully operational sub-app) */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(15,20,35,0.55);
    display: none;
    align-items: stretch; justify-content: stretch;
    z-index: 100;
  }
  .overlay.open { display: flex; }
  .overlay .frame-wrap {
    position: relative;
    margin: 28px;
    width: calc(100% - 56px);
    height: calc(100% - 56px);
    background: #fff;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.35);
  }
  .overlay iframe {
    width: 100%; height: 100%;
    border: 0;
  }
  .overlay .close {
    position: absolute;
    top: 14px; right: 14px;
    width: 32px; height: 32px;
    border-radius: 50%;
    background: #ffffff;
    color: #1f2430;
    border: none;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    z-index: 2;
  }
  .overlay .close:hover { background: var(--accent); color: #fff; }
</style>
</head>
<body>
  <div class="app">
    <header class="top">
      <div class="traffic"><span></span><span></span><span></span></div>
      <h1>Sample Pack</h1>
      <span class="sub">· {{PACK_SUBTITLE}}</span>
      <div class="spacer"></div>
      <div class="meta">{{PACK_DATE}} · {{TILE_COUNT}} tiles</div>
    </header>

    <main>
      <div class="pack-head">
        <h2 class="title">{{PACK_TITLE}}</h2>
        <p class="lede">{{PACK_LEDE}}</p>
      </div>

      <div class="grid" id="grid">
        <!--
          TILE TEMPLATE — repeat per produced sub-app.
          data-target = relative path to fully operational tiles/<slug>.html
        -->
        <div class="tile" data-target="tiles/example.html">
          <div class="stage">A</div>
          <div class="meta">
            <div class="name">{{TILE_NAME}}</div>
            <div class="sub">{{TILE_SUB}}</div>
            <div class="src">{{TILE_SOURCE}}</div>
          </div>
        </div>
      </div>
    </main>

    <footer class="status">
      <span><span class="dot"></span>Sample Pack · {{PACK_SLUG}}</span>
      <span>·</span>
      <span>click any tile — opens fully operational web app</span>
    </footer>
  </div>

  <div class="overlay" id="overlay">
    <div class="frame-wrap">
      <button class="close" id="closeBtn" title="Close">✕</button>
      <iframe id="frame" src="about:blank"></iframe>
    </div>
  </div>

  <script>
    const overlay = document.getElementById('overlay');
    const frame = document.getElementById('frame');
    const closeBtn = document.getElementById('closeBtn');

    document.querySelectorAll('.tile').forEach(t => {
      t.addEventListener('click', () => {
        const target = t.getAttribute('data-target');
        if (!target) return;
        frame.src = target;
        overlay.classList.add('open');
      });
    });
    closeBtn.addEventListener('click', () => {
      overlay.classList.remove('open');
      frame.src = 'about:blank';
    });
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) {
        overlay.classList.remove('open');
        frame.src = 'about:blank';
      }
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && overlay.classList.contains('open')) {
        overlay.classList.remove('open');
        frame.src = 'about:blank';
      }
    });
  </script>
</body>
</html>
