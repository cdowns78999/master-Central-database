<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipeline | Ahead</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --lamp-deep:#c2560a; --lamp-mid:#e07b2e; --lamp-warm:#f2a54a; --lamp-soft:#f8c97d; --lamp-glow:#fde8c8; --white:#fff; --text:#3b1a04; --radius:16px; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Outfit',sans-serif; color:var(--text); min-height:100vh; padding:2rem;
            background: linear-gradient(160deg, #fde8c8 0%, #f2a54a 35%, #d4700f 65%, #a84e08 100%); }
        .page-header { text-align:center; margin-bottom:2rem; }
        .page-header h1 { font-size:1.8rem; font-weight:800; color:var(--white); text-shadow:0 2px 8px rgba(0,0,0,0.2); }
        .page-header .sub { font-size:0.75rem; color:rgba(255,255,255,0.7); font-family:'JetBrains Mono',monospace; margin-top:0.3rem; text-transform:uppercase; letter-spacing:0.15em; }
        .nav { display:flex; gap:0.5rem; justify-content:center; margin-bottom:2rem; flex-wrap:wrap; }
        .nav a { padding:0.4rem 1rem; border-radius:100px; background:rgba(255,255,255,0.2); color:var(--white); text-decoration:none; font-size:0.75rem; font-weight:600; border:2px solid rgba(255,255,255,0.3); }
        .nav a.active { background:var(--white); color:var(--lamp-deep); border-color:var(--white); }
        .list { max-width:600px; margin:0 auto; display:flex; flex-direction:column; gap:0.5rem; }
        .item { background:var(--white); border-radius:var(--radius); padding:0.8rem 1.2rem; border:3px solid var(--white);
            box-shadow:0 2px 8px rgba(0,0,0,0.1); display:flex; align-items:center; gap:0.8rem; }
        .item-icon { font-size:1.1rem; }
        .item-label { font-weight:600; font-size:0.95rem; }
        .item-sub { font-size:0.7rem; color:rgba(59,26,4,0.5); font-family:'JetBrains Mono',monospace; }
    </style>
</head>
<body>
    <div class="page-header">
        <h1>Pipeline</h1>
        <div class="sub">Left Wing · Column 4 of 4</div>
    </div>
    <div class="nav">
        <a href="clients.html">Clients</a>
        <a href="pricing.html">Pricing</a>
        <a href="projects.html">Projects</a>
        <a href="pipeline.html" class="active">Pipeline</a>
    </div>
    <div class="list">
        <div class="item"><div class="item-icon">➤</div><div><div class="item-label">Full Pipeline</div><div class="item-sub">All stages</div></div></div>
        <div class="item"><div class="item-icon">★</div><div><div class="item-label">Hot Leads</div><div class="item-sub">High priority</div></div></div>
        <div class="item"><div class="item-icon">⇄</div><div><div class="item-label">In Negotiation</div><div class="item-sub">Active deals</div></div></div>
        <div class="item"><div class="item-icon">✓</div><div><div class="item-label">Won Deals</div><div class="item-sub">Closed revenue</div></div></div>
        <div class="item"><div class="item-icon">↻</div><div><div class="item-label">Follow-Up Queue</div><div class="item-sub">Needs touch</div></div></div>
        <div class="item"><div class="item-icon">⇒</div><div><div class="item-label">Add Opportunity</div><div class="item-sub">New lead</div></div></div>
    </div>
</body>
</html>
