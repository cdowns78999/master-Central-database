<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presentation — {{CLIENT_NAME}} | Ahead Artist Solutions</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Helvetica Neue",Helvetica,Arial,sans-serif;margin:0;padding:3rem 2rem;background:#000000;color:#ffffff;-webkit-font-smoothing:antialiased;min-height:100vh;background-image:radial-gradient(circle at 20% 30%,rgba(29,185,84,0.04) 0%,transparent 50%),radial-gradient(circle at 80% 70%,rgba(29,185,84,0.03) 0%,transparent 50%);}
h1{color:#ffffff;font-size:2.5rem;font-weight:700;letter-spacing:-0.02em;margin-bottom:1rem;}
h2{color:#1DB954;font-size:1.25rem;font-weight:600;margin:1.5rem 0 0.75rem;}
h3{color:#1ed760;font-size:1rem;font-weight:600;margin:1rem 0 0.5rem;}
p{color:#b3b3b3;font-size:0.95rem;line-height:1.7;margin-bottom:0.75rem;}
ul,ol{padding-left:1.5em;margin:0.5rem 0;}
li{color:#b3b3b3;font-size:0.95rem;line-height:1.8;margin-bottom:0.35rem;}
li::marker{color:#1DB954;}
strong{color:#ffffff;}
em{color:#1ed760;font-style:italic;}
table{width:100%;border-collapse:collapse;margin:1em 0;}
th,td{padding:10px 14px;border:1px solid rgba(29,185,84,0.15);text-align:left;}
th{background:rgba(29,185,84,0.1);color:#1DB954;font-weight:700;}
td{color:#b3b3b3;}
.pres-wrap{max-width:900px;margin:0 auto;background:linear-gradient(135deg,#282828 0%,#181818 100%);border:1px solid rgba(255,255,255,0.07);border-radius:32px;padding:4rem 3.5rem;box-shadow:0 1px 2px rgba(0,0,0,0.3),0 4px 8px rgba(0,0,0,0.2),0 8px 16px rgba(0,0,0,0.15),0 16px 32px rgba(0,0,0,0.1),inset 0 1px 0 rgba(255,255,255,0.03);}
.pres-meta{display:flex;align-items:center;gap:12px;margin-bottom:2rem;font-size:0.7rem;color:#727272;}
.pres-meta-dot{width:6px;height:6px;border-radius:50%;background:#1DB954;}
.pres-slot-badge{display:inline-block;padding:3px 10px;border-radius:6px;font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;background:rgba(29,185,84,0.12);border:1px solid rgba(29,185,84,0.3);color:#1DB954;}
.media-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin:1rem 0 1.5rem;}
.media-item{border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,0.08);background:rgba(0,0,0,0.3);}
.media-item iframe{width:100%;height:200px;border:none;}
.media-item img{width:100%;height:auto;display:block;}
</style></head><body>
<div class="pres-wrap">
<div class="pres-meta">
<span class="pres-meta-dot"></span>
<span>AHEAD ARTIST SOLUTIONS</span>
<span>&middot;</span>
<span class="pres-slot-badge">{{SLOT_NUMBER}}</span>
<span>&middot;</span>
<span>{{TIMESTAMP}}</span>
</div>
<h1>{{CLIENT_NAME}}</h1>
<div style="width:60px;height:2px;background:#1DB954;margin:1.5rem 0;"></div>
{{CONTENT}}
{{MEDIA}}
</div>
</body></html>
