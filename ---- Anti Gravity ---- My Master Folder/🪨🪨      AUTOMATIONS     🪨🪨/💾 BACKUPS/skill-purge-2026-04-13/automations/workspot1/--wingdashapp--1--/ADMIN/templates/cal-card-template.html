<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cal-Card — {{CLIENT_NAME}} | Ahead Artist Solutions</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Helvetica Neue",Helvetica,Arial,sans-serif;margin:0;padding:3rem 2rem;background:#0f0f0f;color:#ffffff;-webkit-font-smoothing:antialiased;min-height:100vh;background-image:radial-gradient(circle at 15% 25%,rgba(245,158,11,0.04) 0%,transparent 50%),radial-gradient(circle at 85% 75%,rgba(245,158,11,0.03) 0%,transparent 50%);}
.cal-wrap{max-width:960px;margin:0 auto;background:linear-gradient(135deg,#1a1a1a 0%,#111111 100%);border:1px solid rgba(245,158,11,0.12);border-radius:28px;padding:3.5rem 3rem;box-shadow:0 1px 2px rgba(0,0,0,0.3),0 4px 8px rgba(0,0,0,0.2),0 8px 16px rgba(0,0,0,0.15),0 16px 32px rgba(0,0,0,0.1),inset 0 1px 0 rgba(255,255,255,0.02);}
.cal-meta{display:flex;align-items:center;gap:12px;margin-bottom:2rem;font-size:0.7rem;color:#8a8a8a;flex-wrap:wrap;}
.cal-meta-dot{width:6px;height:6px;border-radius:50%;background:#f59e0b;}
.cal-slot-badge{display:inline-block;padding:3px 10px;border-radius:6px;font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.25);color:#f59e0b;}
.cal-preset-badge{display:inline-block;padding:3px 10px;border-radius:6px;font-size:0.65rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;background:rgba(245,158,11,0.06);border:1px solid rgba(245,158,11,0.15);color:#d97706;}
h1{color:#ffffff;font-size:2.2rem;font-weight:700;letter-spacing:-0.02em;margin-bottom:0.5rem;}
.cal-divider{width:60px;height:2px;background:linear-gradient(90deg,#f59e0b,#d97706);margin:1.5rem 0;border-radius:2px;}
.cal-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:2rem;}
@media(max-width:640px){.cal-grid{grid-template-columns:1fr;}}
.cal-tile{background:rgba(255,255,255,0.025);border:1px solid rgba(245,158,11,0.1);border-radius:14px;padding:1.25rem 1.5rem;transition:border-color 0.2s ease,box-shadow 0.2s ease;}
.cal-tile:hover{border-color:rgba(245,158,11,0.25);box-shadow:0 2px 12px rgba(245,158,11,0.08);}
.cal-tile-header{display:flex;align-items:center;gap:8px;margin-bottom:0.6rem;}
.cal-tile-dot{width:7px;height:7px;border-radius:50%;background:#f59e0b;flex-shrink:0;}
.cal-tile-title{font-size:0.9rem;font-weight:600;color:#ffffff;letter-spacing:-0.01em;}
.cal-tile-desc{font-size:0.82rem;color:#a0a0a0;line-height:1.65;}
.cal-tile-badge{display:inline-block;margin-top:0.6rem;padding:2px 8px;border-radius:5px;font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.2);color:#f59e0b;}
.cal-footer{margin-top:2.5rem;padding-top:1.5rem;border-top:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.cal-footer-brand{font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.15em;color:#5a5a5a;}
.cal-footer-ts{font-size:0.6rem;color:#4a4a4a;}
</style></head><body>
<div class="cal-wrap">
<div class="cal-meta">
<span class="cal-meta-dot"></span>
<span>AHEAD ARTIST SOLUTIONS</span>
<span>&middot;</span>
<span class="cal-slot-badge">{{SLOT_NUMBER}}</span>
<span>&middot;</span>
<span class="cal-preset-badge">{{PRESET_NAME}}</span>
<span>&middot;</span>
<span>{{TIMESTAMP}}</span>
</div>
<h1>{{CLIENT_NAME}}</h1>
<div class="cal-divider"></div>
<div class="cal-grid">
{{TILES}}
</div>
<div class="cal-footer">
<span class="cal-footer-brand">Ahead Artist Solutions</span>
<span class="cal-footer-ts">Generated {{TIMESTAMP}}</span>
</div>
</div>
</body></html>
