<!--
  Reusable select-pill CSS + JS snippet
  Include in any cal card that needs selectable/toggleable pills
  Used by: fast-1-onboard (call times + budget), or any tile with choices
-->

<!-- ADD THIS CSS inside the <style> block -->
<style>
    /* Selectable pill styles */
    .select-pill {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        background: rgba(14, 165, 233, 0.08);
        border: 2px solid rgba(14, 165, 233, 0.15);
        border-radius: 100px;
        padding: 0.55rem 1.1rem;
        font-size: 0.85rem;
        font-weight: 500;
        color: var(--text);
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        user-select: none;
        -webkit-tap-highlight-color: transparent;
    }

    .select-pill:hover {
        background: rgba(14, 165, 233, 0.14);
        border-color: rgba(14, 165, 233, 0.3);
        transform: scale(1.03);
    }

    .select-pill.selected {
        background: linear-gradient(135deg, rgba(14, 165, 233, 0.2), rgba(99, 102, 241, 0.2));
        border-color: var(--primary);
        box-shadow: 0 0 16px rgba(14, 165, 233, 0.2);
        transform: scale(1.05);
    }

    .select-pill .check-icon {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        border: 2px solid rgba(14, 165, 233, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.6rem;
        transition: all 0.3s ease;
        flex-shrink: 0;
    }

    .select-pill.selected .check-icon {
        background: linear-gradient(135deg, var(--primary), var(--accent));
        border-color: transparent;
        color: #fff;
    }

    .time-group-label {
        width: 100%;
        font-size: 0.72rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-dim);
        margin-top: 0.5rem;
        margin-bottom: 0.25rem;
    }
</style>

<!-- ADD THIS JS inside the <script> block -->
<script>
    function togglePill(el) {
        el.classList.toggle('selected');
        var icon = el.querySelector('.check-icon');
        if (el.classList.contains('selected')) {
            icon.textContent = '\u2713';
        } else {
            icon.textContent = '';
        }
    }
</script>
