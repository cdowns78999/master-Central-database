<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pipeline Runner — Ultimate Dashboard Demo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0f172a;
      --card: rgba(30, 41, 59, 0.8);
      --card-border: rgba(100, 116, 139, 0.25);
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --red: #ef4444;
      --amber: #f59e0b;
      --cyan: #0ea5e9;
      --green: #10b981;
      --purple: #6366f1;
      --pink: #ff5d8f;
      --mapper-cyan: #4cc9f0;
      --mapper-purple: #4361ee;
      --ease-out-expo: cubic-bezier(0.19, 1, 0.22, 1);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Animated background orbs ── */
    .bg-orbs {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .bg-orbs .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.12;
      animation: orbFloat 20s ease-in-out infinite alternate;
    }

    .bg-orbs .orb:nth-child(1) {
      width: 500px;
      height: 500px;
      background: var(--purple);
      top: -10%;
      left: -5%;
      animation-delay: 0s;
    }

    .bg-orbs .orb:nth-child(2) {
      width: 400px;
      height: 400px;
      background: var(--cyan);
      top: 40%;
      right: -8%;
      animation-delay: -7s;
    }

    .bg-orbs .orb:nth-child(3) {
      width: 350px;
      height: 350px;
      background: var(--pink);
      bottom: -5%;
      left: 30%;
      animation-delay: -14s;
    }

    @keyframes orbFloat {
      0% {
        transform: translate(0, 0) scale(1);
      }

      33% {
        transform: translate(30px, -40px) scale(1.05);
      }

      66% {
        transform: translate(-20px, 20px) scale(0.95);
      }

      100% {
        transform: translate(10px, -10px) scale(1.02);
      }
    }

    /* ── Layout ── */
    .app {
      position: relative;
      z-index: 1;
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px 20px;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 28px;
    }

    .header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .header h1 span {
      color: var(--mapper-cyan);
    }

    .header .subtitle {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-top: 4px;
      letter-spacing: 1px;
    }

    /* ── Input bar ── */
    .input-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 10px 14px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .input-bar input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      padding: 8px 4px;
    }

    .input-bar input::placeholder {
      color: var(--text-dim);
    }

    .input-bar button {
      padding: 8px 20px;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-weight: 600;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.25s var(--ease-out-expo);
      letter-spacing: 0.5px;
    }

    .btn-launch {
      background: linear-gradient(135deg, var(--mapper-cyan), var(--mapper-purple));
      color: #fff;
    }

    .btn-launch:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(76, 201, 240, 0.35);
    }

    .btn-auto {
      background: rgba(99, 102, 241, 0.2);
      color: var(--purple);
      border: 1px solid rgba(99, 102, 241, 0.3) !important;
    }

    .btn-auto:hover {
      background: rgba(99, 102, 241, 0.35);
    }

    .btn-auto.running {
      animation: autoPulse 1.5s ease-in-out infinite;
    }

    @keyframes autoPulse {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.3);
      }

      50% {
        box-shadow: 0 0 16px 4px rgba(99, 102, 241, 0.25);
      }
    }

    /* ── Pipeline columns ── */
    .pipeline {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
      min-height: 340px;
    }

    .stage {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 16px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      display: flex;
      flex-direction: column;
      min-height: 320px;
    }

    .stage-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(100, 116, 139, 0.15);
    }

    .stage-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .stage-left .stage-dot {
      background: var(--red);
      box-shadow: 0 0 8px var(--red);
    }

    .stage-center .stage-dot {
      background: var(--amber);
      box-shadow: 0 0 8px var(--amber);
    }

    .stage-right .stage-dot {
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
    }

    .stage-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-dim);
    }

    .stage-count {
      margin-left: auto;
      font-size: 0.65rem;
      color: var(--text-dim);
      background: rgba(100, 116, 139, 0.15);
      padding: 2px 8px;
      border-radius: 8px;
    }

    .stage-tiles {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .stage-tiles::-webkit-scrollbar {
      width: 4px;
    }

    .stage-tiles::-webkit-scrollbar-thumb {
      background: rgba(100, 116, 139, 0.3);
      border-radius: 4px;
    }

    /* ── Tile cards ── */
    .tile {
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 14px;
      transition: all 0.5s var(--ease-out-expo);
      position: relative;
      overflow: hidden;
    }

    .tile.entering {
      animation: tileEnter 0.6s var(--ease-out-expo) forwards;
    }

    @keyframes tileEnter {
      0% {
        opacity: 0;
        transform: scale(0.7) translateY(20px);
      }

      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .tile.sliding-out {
      animation: tileSlideOut 0.4s ease-in forwards;
    }

    @keyframes tileSlideOut {
      0% {
        opacity: 1;
        transform: translateX(0);
      }

      100% {
        opacity: 0;
        transform: translateX(60px);
      }
    }

    .tile.sliding-in {
      animation: tileSlideIn 0.5s var(--ease-out-expo) forwards;
    }

    @keyframes tileSlideIn {
      0% {
        opacity: 0;
        transform: translateX(-60px);
      }

      100% {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .tile.stage-0 {
      border-left: 3px solid var(--red);
    }

    .tile.stage-0 .tile-glow {
      background: var(--red);
    }

    .tile.stage-1 {
      border-left: 3px solid var(--amber);
    }

    .tile.stage-1 .tile-glow {
      background: var(--amber);
    }

    .tile.stage-2 {
      border-left: 3px solid var(--green);
    }

    .tile.stage-2 .tile-glow {
      background: var(--green);
    }

    .tile-glow {
      position: absolute;
      top: -20px;
      left: -20px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      opacity: 0.08;
      filter: blur(20px);
      pointer-events: none;
    }

    .tile.urgent .tile-glow {
      opacity: 0.18;
      animation: neonPulse 2s ease-in-out infinite;
    }

    @keyframes neonPulse {

      0%,
      100% {
        opacity: 0.1;
        transform: scale(1);
      }

      50% {
        opacity: 0.22;
        transform: scale(1.3);
      }
    }

    .tile-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .tile-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .tile.stage-0 .tile-dot {
      background: var(--red);
    }

    .tile.stage-1 .tile-dot {
      background: var(--amber);
    }

    .tile.stage-2 .tile-dot {
      background: var(--green);
    }

    .tile-name {
      font-weight: 600;
      font-size: 0.88rem;
      color: var(--text);
    }

    .tile-badge {
      margin-left: auto;
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 2px 8px;
      border-radius: 6px;
    }

    .tile.stage-0 .tile-badge {
      background: rgba(239, 68, 68, 0.15);
      color: var(--red);
    }

    .tile.stage-1 .tile-badge {
      background: rgba(245, 158, 11, 0.15);
      color: var(--amber);
    }

    .tile.stage-2 .tile-badge {
      background: rgba(16, 185, 129, 0.15);
      color: var(--green);
    }

    .tile-actions {
      display: flex;
      gap: 6px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .tile-btn {
      padding: 5px 12px;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.7rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s var(--ease-out-expo);
      letter-spacing: 0.3px;
    }

    .btn-goto {
      background: rgba(76, 201, 240, 0.12);
      color: var(--mapper-cyan);
      border: 1px solid rgba(76, 201, 240, 0.25);
    }

    .btn-goto:hover {
      background: rgba(76, 201, 240, 0.25);
    }

    .btn-goto.flash {
      animation: cyanFlash 0.6s ease-out;
    }

    @keyframes cyanFlash {
      0% {
        background: rgba(76, 201, 240, 0.6);
        box-shadow: 0 0 20px rgba(76, 201, 240, 0.5);
      }

      100% {
        background: rgba(76, 201, 240, 0.12);
        box-shadow: none;
      }
    }

    .btn-windup {
      background: rgba(255, 93, 143, 0.12);
      color: var(--pink);
      border: 1px solid rgba(255, 93, 143, 0.25);
    }

    .btn-windup:hover {
      background: rgba(255, 93, 143, 0.25);
    }

    .btn-advance {
      background: linear-gradient(135deg, var(--mapper-cyan), var(--mapper-purple));
      color: #fff;
      margin-left: auto;
    }

    .btn-advance:hover {
      transform: translateY(-1px);
      box-shadow: 0 2px 12px rgba(76, 201, 240, 0.3);
    }

    /* ── Wind Up Form ── */
    .windup-form {
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: max-height 0.5s var(--ease-out-expo), opacity 0.3s ease, margin 0.3s ease;
      margin-top: 0;
    }

    .windup-form.open {
      max-height: 260px;
      opacity: 1;
      margin-top: 10px;
    }

    .windup-form-inner {
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid rgba(100, 116, 139, 0.2);
      border-radius: 10px;
      padding: 12px;
    }

    .windup-field {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .windup-field label {
      font-size: 0.65rem;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      width: 70px;
      flex-shrink: 0;
    }

    .windup-field input {
      flex: 1;
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid rgba(100, 116, 139, 0.2);
      border-radius: 6px;
      padding: 5px 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.78rem;
      outline: none;
      transition: border-color 0.3s ease;
    }

    .windup-field input:focus {
      border-color: var(--mapper-cyan);
    }

    .windup-field .check {
      color: var(--green);
      font-size: 0.75rem;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .windup-field .check.visible {
      opacity: 1;
    }

    .windup-launch {
      width: 100%;
      padding: 6px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--pink), var(--mapper-purple));
      color: #fff;
      font-family: inherit;
      font-size: 0.72rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      margin-top: 4px;
    }

    .windup-launch:hover {
      box-shadow: 0 2px 16px rgba(255, 93, 143, 0.35);
    }

    .windup-launch.flash {
      animation: pinkFlash 0.5s ease-out;
    }

    @keyframes pinkFlash {
      0% {
        box-shadow: 0 0 30px rgba(255, 93, 143, 0.7);
        transform: scale(1.03);
      }

      100% {
        box-shadow: none;
        transform: scale(1);
      }
    }

    /* ── System Log ── */
    .log-section {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 14px 16px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .log-header {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-dim);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .log-header .blink-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: blink 1.5s ease-in-out infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.2;
      }
    }

    .log-feed {
      max-height: 180px;
      overflow-y: auto;
      font-size: 0.74rem;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      line-height: 1.7;
    }

    .log-feed::-webkit-scrollbar {
      width: 4px;
    }

    .log-feed::-webkit-scrollbar-thumb {
      background: rgba(100, 116, 139, 0.3);
      border-radius: 4px;
    }

    .log-entry {
      opacity: 0;
      animation: logFadeIn 0.3s ease forwards;
    }

    @keyframes logFadeIn {
      0% {
        opacity: 0;
        transform: translateY(4px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .log-tag {
      font-weight: 700;
    }

    .log-tag.comms {
      color: var(--cyan);
    }

    .log-tag.client-db {
      color: var(--purple);
    }

    .log-tag.css-tag {
      color: var(--pink);
    }

    .log-tag.effects {
      color: var(--amber);
    }

    .log-tag.support {
      color: var(--green);
    }

    .log-time {
      color: var(--text-dim);
      margin-right: 6px;
    }

    .log-msg {
      color: var(--text);
    }

    .log-msg.celebration {
      color: var(--green);
      font-weight: 600;
    }

    /* ── Confetti ── */
    .confetti-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
      overflow: hidden;
    }

    .confetti-piece {
      position: absolute;
      width: 8px;
      height: 8px;
      opacity: 0;
      border-radius: 2px;
    }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.7rem;
      color: var(--text-dim);
    }

    .stat-val {
      font-weight: 700;
      font-size: 0.85rem;
    }

    .stat-val.red {
      color: var(--red);
    }

    .stat-val.amber {
      color: var(--amber);
    }

    .stat-val.green {
      color: var(--green);
    }

    .stat-val.cyan {
      color: var(--cyan);
    }

    /* ── Responsive ── */
    @media (max-width: 800px) {
      .pipeline {
        grid-template-columns: 1fr;
      }

      .stage {
        min-height: 160px;
      }
    }
  </style>
</head>

<body>

  <div class="bg-orbs">
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
  </div>

  <div class="confetti-container" id="confettiContainer"></div>

  <div class="app">
    <!-- Header -->
    <div class="header">
      <h1>─── <span>Pipeline Runner</span> ───</h1>
      <div class="subtitle">ultimate dashboard demo &nbsp;·&nbsp; interactive test drive</div>
    </div>

    <!-- Stats -->
    <div class="stats-bar">
      <div class="stat">Urgent <span class="stat-val red" id="statLeft">0</span></div>
      <div class="stat">Solving <span class="stat-val amber" id="statCenter">0</span></div>
      <div class="stat">Complete <span class="stat-val green" id="statRight">0</span></div>
      <div class="stat">Total <span class="stat-val cyan" id="statTotal">0</span></div>
    </div>

    <!-- Input -->
    <div class="input-bar">
      <input type="text" id="clientInput" placeholder="Type a client name or scenario..." autocomplete="off" />
      <button class="btn-launch" id="btnLaunch">Launch</button>
      <button class="btn-auto" id="btnAuto">Auto</button>
    </div>

    <!-- Pipeline -->
    <div class="pipeline">
      <div class="stage stage-left">
        <div class="stage-header">
          <div class="stage-dot"></div>
          <div class="stage-label">Left — Urgent</div>
          <div class="stage-count" id="countLeft">0</div>
        </div>
        <div class="stage-tiles" id="tilesLeft"></div>
      </div>
      <div class="stage stage-center">
        <div class="stage-header">
          <div class="stage-dot"></div>
          <div class="stage-label">Center — Solving</div>
          <div class="stage-count" id="countCenter">0</div>
        </div>
        <div class="stage-tiles" id="tilesCenter"></div>
      </div>
      <div class="stage stage-right">
        <div class="stage-header">
          <div class="stage-dot"></div>
          <div class="stage-label">Right — Happy</div>
          <div class="stage-count" id="countRight">0</div>
        </div>
        <div class="stage-tiles" id="tilesRight"></div>
      </div>
    </div>

    <!-- System Log -->
    <div class="log-section">
      <div class="log-header">
        <div class="blink-dot"></div>
        system log
      </div>
      <div class="log-feed" id="logFeed"></div>
    </div>
  </div>

  <script>
    (function () {
      // ── State ──
      const tiles = [];
      let tileIdCounter = 0;
      let autoRunning = false;
      let autoTimeout = null;

      // ── DOM refs ──
      const clientInput = document.getElementById('clientInput');
      const btnLaunch = document.getElementById('btnLaunch');
      const btnAuto = document.getElementById('btnAuto');
      const tilesLeft = document.getElementById('tilesLeft');
      const tilesCenter = document.getElementById('tilesCenter');
      const tilesRight = document.getElementById('tilesRight');
      const logFeed = document.getElementById('logFeed');
      const confettiContainer = document.getElementById('confettiContainer');

      const stageContainers = [tilesLeft, tilesCenter, tilesRight];
      const stageNames = ['LEFT', 'CENTER', 'RIGHT'];
      const stageLabels = ['urgent', 'solving', 'happy'];
      const badgeLabels = ['URG', 'ACTIVE', 'DONE'];

      const sampleClients = [
        'Neon Vibe Studios', 'Lunar Echo Records', 'Skyfall Creative', 'Crimson Tide Mgmt',
        'Indigo Wave Audio', 'Blaze & Ember Co', 'Arctic Pulse Media', 'Velvet Thunder Ent',
        'Solar Flare Agency', 'Midnight Circuit', 'Copper Fox Studios', 'Nova Drift Labs',
        'Shadow Bloom Collective', 'Ember & Ash Recordings', 'Glass Horizon Inc'
      ];

      // ── Helpers ──
      function timestamp() {
        const d = new Date();
        return d.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
      }

      function log(tag, msg, isCelebration) {
        const entry = document.createElement('div');
        entry.className = 'log-entry';

        const tagClass = {
          'COMMS': 'comms', 'CLIENT-DB': 'client-db', 'CSS': 'css-tag',
          'EFFECTS': 'effects', 'SUPPORT': 'support'
        }[tag] || 'support';

        entry.innerHTML = `<span class="log-time">${timestamp()}</span><span class="log-tag ${tagClass}">[${tag}]</span> <span class="log-msg${isCelebration ? ' celebration' : ''}">${msg}</span>`;
        logFeed.appendChild(entry);
        logFeed.scrollTop = logFeed.scrollHeight;
      }

      function updateCounts() {
        const counts = [0, 0, 0];
        tiles.forEach(t => { if (t.stage >= 0 && t.stage <= 2) counts[t.stage]++; });
        document.getElementById('countLeft').textContent = counts[0];
        document.getElementById('countCenter').textContent = counts[1];
        document.getElementById('countRight').textContent = counts[2];
        document.getElementById('statLeft').textContent = counts[0];
        document.getElementById('statCenter').textContent = counts[1];
        document.getElementById('statRight').textContent = counts[2];
        document.getElementById('statTotal').textContent = tiles.length;
      }

      function futureDate(days) {
        const d = new Date();
        d.setDate(d.getDate() + days);
        return d.toISOString().split('T')[0];
      }

      // ── Tile creation ──
      function createTile(name) {
        const id = tileIdCounter++;
        const tile = { id, name, stage: 0, windupOpen: false };
        tiles.push(tile);

        log('COMMS', `Incoming client received: "${name}"`);

        setTimeout(() => log('CLIENT-DB', `Record created — stage: LEFT`), 120);
        setTimeout(() => log('CSS', `Tile rendered with urgent styling`), 250);
        setTimeout(() => log('EFFECTS', `Watching for movement triggers...`), 400);

        renderTile(tile, true);
        updateCounts();
        return tile;
      }

      function renderTile(tile, isNew) {
        const el = document.createElement('div');
        el.className = `tile stage-${tile.stage}${isNew ? ' entering' : ' sliding-in'}${tile.stage === 0 ? ' urgent' : ''}`;
        el.dataset.tileId = tile.id;

        el.innerHTML = `
      <div class="tile-glow"></div>
      <div class="tile-header">
        <div class="tile-dot"></div>
        <div class="tile-name">${tile.name}</div>
        <div class="tile-badge">${badgeLabels[tile.stage]}</div>
      </div>
      <div class="tile-actions">
        <button class="tile-btn btn-goto" data-id="${tile.id}">Go to Link</button>
        <button class="tile-btn btn-windup" data-id="${tile.id}">Wind Up</button>
        ${tile.stage < 2 ? `<button class="tile-btn btn-advance" data-id="${tile.id}">Advance →</button>` : ''}
      </div>
      <div class="windup-form" data-form-id="${tile.id}">
        <div class="windup-form-inner">
          <div class="windup-field">
            <label>Client</label>
            <input type="text" value="${tile.name}" readonly />
            <span class="check visible">✓</span>
          </div>
          <div class="windup-field">
            <label>Amount</label>
            <input type="text" class="windup-amount" placeholder="$0.00" />
            <span class="check">✓</span>
          </div>
          <div class="windup-field">
            <label>Due</label>
            <input type="text" value="${futureDate(30)}" readonly />
            <span class="check visible">✓</span>
          </div>
          <div class="windup-field">
            <label>Notes</label>
            <input type="text" value="Standard project — awaiting brief" readonly />
            <span class="check visible">✓</span>
          </div>
          <button class="windup-launch" data-id="${tile.id}">Launch →</button>
        </div>
      </div>
    `;

        stageContainers[tile.stage].appendChild(el);
        tile.el = el;

        // Wire up buttons
        el.querySelector('.btn-goto').addEventListener('click', () => handleGoto(tile));
        el.querySelector('.btn-windup').addEventListener('click', () => toggleWindup(tile));
        const advBtn = el.querySelector('.btn-advance');
        if (advBtn) advBtn.addEventListener('click', () => advanceTile(tile));
        el.querySelector('.windup-launch').addEventListener('click', () => handleWindupLaunch(tile));
      }

      // ── Actions ──
      function handleGoto(tile) {
        const btn = tile.el.querySelector('.btn-goto');
        btn.classList.remove('flash');
        void btn.offsetWidth; // reflow
        btn.classList.add('flash');
        log('COMMS', `"Go to Link" triggered for "${tile.name}" — opening resource`);
      }

      function toggleWindup(tile) {
        const form = tile.el.querySelector('.windup-form');
        tile.windupOpen = !tile.windupOpen;
        if (tile.windupOpen) {
          form.classList.add('open');
          log('CSS', `Wind Up form expanded for "${tile.name}"`);
        } else {
          form.classList.remove('open');
        }
      }

      function handleWindupLaunch(tile) {
        const btn = tile.el.querySelector('.windup-launch');
        btn.classList.remove('flash');
        void btn.offsetWidth;
        btn.classList.add('flash');

        const amountInput = tile.el.querySelector('.windup-amount');
        const amountCheck = amountInput.parentElement.querySelector('.check');
        if (amountInput.value) amountCheck.classList.add('visible');

        log('CLIENT-DB', `Wind Up launched for "${tile.name}" — data saved`);
        log('SUPPORT', `System nominal`);

        setTimeout(() => {
          tile.windupOpen = false;
          tile.el.querySelector('.windup-form').classList.remove('open');
        }, 600);
      }

      function advanceTile(tile) {
        if (tile.stage >= 2) return;

        const oldStage = tile.stage;
        const newStage = oldStage + 1;

        log('EFFECTS', `Evaluating movement rules for "${tile.name}"...`);

        // Slide out animation
        tile.el.classList.add('sliding-out');

        setTimeout(() => {
          // Remove from old container
          tile.el.remove();

          // Update stage
          tile.stage = newStage;

          log('EFFECTS', `Moving tile → ${stageNames[newStage]}`);

          // Render in new container
          renderTile(tile, false);
          updateCounts();

          // If reached RIGHT → celebrate
          if (newStage === 2) {
            setTimeout(() => {
              log('COMMS', '🎉 Celebration fired! Client journey complete.', true);
              log('SUPPORT', `System nominal — all departments green`);
              fireConfetti();
            }, 400);
          }
        }, 400);
      }

      // ── Confetti ──
      function fireConfetti() {
        const colors = ['#ef4444', '#f59e0b', '#0ea5e9', '#10b981', '#6366f1', '#ff5d8f', '#4cc9f0'];
        const count = 90;

        for (let i = 0; i < count; i++) {
          const piece = document.createElement('div');
          piece.className = 'confetti-piece';
          piece.style.background = colors[Math.floor(Math.random() * colors.length)];
          piece.style.left = (Math.random() * 100) + '%';
          piece.style.top = '-10px';
          piece.style.width = (Math.random() * 6 + 5) + 'px';
          piece.style.height = (Math.random() * 6 + 5) + 'px';
          piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';

          const xDrift = (Math.random() - 0.5) * 300;
          const yFall = Math.random() * 600 + 400;
          const rotation = Math.random() * 720 - 360;
          const duration = Math.random() * 1500 + 2000;
          const delay = Math.random() * 400;

          piece.style.transition = `none`;
          confettiContainer.appendChild(piece);

          requestAnimationFrame(() => {
            piece.style.transition = `all ${duration}ms cubic-bezier(0.25, 0.46, 0.45, 0.94)`;
            piece.style.opacity = '1';

            requestAnimationFrame(() => {
              piece.style.transform = `translate(${xDrift}px, ${yFall}px) rotate(${rotation}deg)`;
              piece.style.opacity = '0';
            });
          });

          setTimeout(() => piece.remove(), duration + delay + 200);
        }
      }

      // ── Launch ──
      function launchClient() {
        const name = clientInput.value.trim();
        if (!name) return;
        createTile(name);
        clientInput.value = '';
        clientInput.focus();
      }

      btnLaunch.addEventListener('click', launchClient);
      clientInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') launchClient();
      });

      // ── Auto Demo ──
      async function sleep(ms) {
        return new Promise(r => setTimeout(r, ms));
      }

      async function runAutoDemo() {
        if (autoRunning) {
          autoRunning = false;
          btnAuto.classList.remove('running');
          btnAuto.textContent = 'Auto';
          return;
        }

        autoRunning = true;
        btnAuto.classList.add('running');
        btnAuto.textContent = 'Stop';

        log('SUPPORT', `Auto-demo mode initiated — full simulation starting`);

        const name = sampleClients[Math.floor(Math.random() * sampleClients.length)];
        clientInput.value = '';

        // Type name character by character
        for (let i = 0; i < name.length; i++) {
          if (!autoRunning) return resetAuto();
          clientInput.value += name[i];
          await sleep(45);
        }
        await sleep(300);

        // Launch tile
        if (!autoRunning) return resetAuto();
        const tile = createTile(name);
        clientInput.value = '';
        await sleep(800);

        // Flash Go to Link
        if (!autoRunning) return resetAuto();
        handleGoto(tile);
        log('EFFECTS', `Auto: "Go to Link" activated`);
        await sleep(1000);

        // Open Wind Up form
        if (!autoRunning) return resetAuto();
        toggleWindup(tile);
        await sleep(500);

        // Auto-fill amount
        if (!autoRunning) return resetAuto();
        const amountInput = tile.el.querySelector('.windup-amount');
        const amounts = ['$2,500', '$5,000', '$7,500', '$10,000', '$15,000'];
        const amount = amounts[Math.floor(Math.random() * amounts.length)];
        for (let i = 0; i < amount.length; i++) {
          if (!autoRunning) return resetAuto();
          amountInput.value += amount[i];
          await sleep(50);
        }
        const amountCheck = amountInput.parentElement.querySelector('.check');
        amountCheck.classList.add('visible');
        await sleep(600);

        // Launch wind up
        if (!autoRunning) return resetAuto();
        handleWindupLaunch(tile);
        await sleep(800);

        // Advance to CENTER
        if (!autoRunning) return resetAuto();
        advanceTile(tile);
        await sleep(1200);

        // Another goto flash in center
        if (!autoRunning) return resetAuto();
        handleGoto(tile);
        await sleep(1000);

        // Advance to RIGHT
        if (!autoRunning) return resetAuto();
        advanceTile(tile);
        await sleep(2500);

        log('SUPPORT', `Auto-demo complete — simulation finished`);
        resetAuto();
      }

      function resetAuto() {
        autoRunning = false;
        btnAuto.classList.remove('running');
        btnAuto.textContent = 'Auto';
      }

      btnAuto.addEventListener('click', runAutoDemo);

      // ── Init log ──
      log('SUPPORT', 'Pipeline Runner initialized — all systems online');
      log('SUPPORT', 'Awaiting input — type a client name or hit Auto');
    })();
  </script>
</body>

</html>
