<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahead Artist Solutions — {CLIENT_NAME}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #ffffff;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 60px 24px;
  }

  .page {
    max-width: 680px;
    width: 100%;
  }

  /* ── Brand Header ── */
  .brand {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: #999;
    margin-bottom: 6px;
  }

  .client-name {
    font-size: 22px;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 4px;
  }

  .date-line {
    font-size: 13px;
    color: #999;
    font-style: italic;
    margin-bottom: 24px;
  }

  /* ── Section Header ── */
  .section-header {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: #1a1a1a;
    margin-bottom: 12px;
  }

  /* ── Dashed Separator ── */
  .sep {
    color: #c0c0c0;
    font-size: 13px;
    letter-spacing: 2px;
    margin: 8px 0 28px;
    user-select: none;
  }

  .sep-bottom {
    color: #c0c0c0;
    font-size: 13px;
    letter-spacing: 2px;
    margin: 8px 0 0;
    user-select: none;
  }

  /* ── Campaign Block ── */
  .campaign {
    margin-bottom: 32px;
  }

  .campaign .name {
    font-size: 15px;
    font-weight: 500;
    color: #1a1a1a;
    font-style: italic;
  }

  .campaign .platform {
    font-size: 14px;
    color: #1a1a1a;
    font-style: italic;
    margin-top: 1px;
  }

  .campaign .status {
    font-size: 14px;
    font-weight: 500;
    margin-top: 10px;
    font-style: italic;
  }

  .active   { color: #2d9d5e; }
  .complete { color: #2d9d5e; }
  .pending  { color: #b08d27; }

  /* ── Bottom Rule ── */
  .rule {
    width: 50%;
    margin: 40px auto 0;
    border: none;
    border-top: 2px solid #1a1a1a;
  }

  /* ── Report Table ── */
  .report-header {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: #1a1a1a;
    margin: 48px 0 12px;
  }

  .report-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
    margin-top: 8px;
  }

  .report-table th {
    text-align: left;
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.4px;
    color: #888;
    padding: 8px 0;
    border-bottom: 1px solid #e0e0e0;
  }

  .report-table td {
    padding: 10px 0;
    border-bottom: 1px solid #f0f0f0;
    font-style: italic;
  }

  .report-table td:nth-child(2),
  .report-table td:nth-child(3),
  .report-table th:nth-child(2),
  .report-table th:nth-child(3) {
    text-align: right;
  }

  /* ── Notes Section ── */
  .notes {
    font-size: 13px;
    color: #666;
    font-style: italic;
    line-height: 1.6;
    margin-top: 24px;
  }

  /* ── Footer ── */
  .footer {
    margin-top: 48px;
    padding-top: 24px;
    border-top: 1px solid #e0e0e0;
    font-size: 11px;
    color: #bbb;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
</style>
</head>
<body>

  <div class="page">

    <div class="brand">AHEAD ARTIST SOLUTIONS</div>
    <div class="client-name">{CLIENT_NAME}</div>
    <div class="date-line">{DATE}</div>

    <div class="section-header">{SECTION_TITLE}</div>
    <div class="sep">--- --- ---&nbsp;&nbsp; --- --- --- ---&nbsp;&nbsp; --- --- ---&nbsp;&nbsp; --- --- --- ---</div>

    <!-- Campaign blocks go here -->
    {CAMPAIGN_BLOCKS}

    <div class="sep-bottom">--- --- ---&nbsp;&nbsp; --- --- --- ---&nbsp;&nbsp; --- --- ---&nbsp;&nbsp; --- --- --- ---</div>

    <hr class="rule">

    <!-- Optional summary table -->
    {SUMMARY_TABLE}

    <!-- Optional notes -->
    {NOTES}

    <div class="footer">Ahead Artist Solutions</div>

  </div>

</body>
</html>
