<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahead Artist Solutions Mapper</title>
    <style>
        :root {
            --primary: #0ea5e9;
            --accent: #6366f1;
            --bg: #f5f1eb;
            --text: #0f172a;
            --text-dim: rgba(15, 23, 42, 0.6);
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            color: var(--text);
        }

        .mapper-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .mapper-item {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(16px);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .mapper-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .workflow-steps {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }

        .workflow-step {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(16px);
            border-radius: 15px;
            padding: 15px;
            transition: all 0.3s ease;
        }

        .workflow-step:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.6);
        }

        .step-number {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Ahead Artist Solutions Project Mapper</h1>
    
    <div class="mapper-container">
        
            <div class="mapper-item">
                <h2>Strategy</h2>
                <a href="https://example.com/strategy" target="_blank">Learn More</a>
            </div>
        
            <div class="mapper-item">
                <h2>Promotion</h2>
                <a href="https://example.com/promotion" target="_blank">Learn More</a>
            </div>
        
            <div class="mapper-item">
                <h2>Analytics</h2>
                <a href="https://example.com/analytics" target="_blank">Learn More</a>
            </div>
        
            <div class="mapper-item">
                <h2>Support</h2>
                <a href="https://example.com/support" target="_blank">Learn More</a>
            </div>
        
    </div>

    <div class="workflow-steps">
        
            <div class="workflow-step">
                <div class="step-number">1</div>
                <div class="step-details">Initial Consultation</div>
            </div>
        
            <div class="workflow-step">
                <div class="step-number">2</div>
                <div class="step-details">Strategic Planning</div>
            </div>
        
            <div class="workflow-step">
                <div class="step-number">3</div>
                <div class="step-details">Content Development</div>
            </div>
        
            <div class="workflow-step">
                <div class="step-number">4</div>
                <div class="step-details">Design & Build</div>
            </div>
        
            <div class="workflow-step">
                <div class="step-number">5</div>
                <div class="step-details">Testing & Refinement</div>
            </div>
        
            <div class="workflow-step">
                <div class="step-number">6</div>
                <div class="step-details">Final Revisions</div>
            </div>
        
            <div class="workflow-step">
                <div class="step-number">7</div>
                <div class="step-details">Launch & Handoff</div>
            </div>
        
    </div>
</body>
</html>
