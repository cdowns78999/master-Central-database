<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahead Artist Solutions - Project Mapper</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const CritMapper = ({ clientName, items, links }) => {
            const [selectedSteps, setSelectedSteps] = React.useState(new Set());

            const workflowSteps = [
                { 
                    title: 'Initial Consultation', 
                    description: 'Schedule kickoff, define goals, discuss timeline',
                    badges: []
                },
                { 
                    title: 'Strategic Planning', 
                    description: 'Create roadmap, outline deliverables, set milestones',
                    badges: []
                },
                { 
                    title: 'Content Development', 
                    description: 'Gather assets, create outline, collect media',
                    badges: []
                },
                { 
                    title: 'Design & Build', 
                    description: 'Design mockups, get approval, develop functionality',
                    badges: []
                },
                { 
                    title: 'Testing & Refinement', 
                    description: 'QA testing, cross-browser checks, mobile testing',
                    badges: []
                },
                { 
                    title: 'Final Revisions', 
                    description: 'Implement feedback, optimize performance, security review',
                    badges: []
                },
                { 
                    title: 'Launch & Handoff', 
                    description: 'Deploy to production, verify functionality, provide training',
                    badges: []
                }
            ];

            const toggleStep = (index) => {
                const newSelectedSteps = new Set(selectedSteps);
                if (newSelectedSteps.has(index)) {
                    newSelectedSteps.delete(index);
                } else {
                    newSelectedSteps.add(index);
                }
                setSelectedSteps(newSelectedSteps);
            };

            return (
                <div className="crit-mapper-container">
                    <style jsx global>{`
                        :root {
                            --primary: #0ea5e9;
                            --accent: #6366f1;
                            --bg: #f5f1eb;
                            --text: #0f172a;
                            --text-dim: rgba(15, 23, 42, 0.6);
                        }

                        body {
                            background-color: var(--bg);
                            font-family: 'Inter', sans-serif;
                            color: var(--text);
                        }

                        .crit-mapper-container {
                            max-width: 1200px;
                            margin: 0 auto;
                            padding: 2rem;
                            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.3));
                            backdrop-filter: blur(10px);
                            border-radius: 16px;
                        }

                        .mapper-title {
                            text-align: center;
                            font-size: 2.5rem;
                            background: linear-gradient(45deg, var(--primary), var(--accent));
                            -webkit-background-clip: text;
                            -webkit-text-fill-color: transparent;
                            margin-bottom: 2rem;
                            animation: shimmer 8s infinite linear;
                        }

                        .mapper-grid {
                            display: grid;
                            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                            gap: 1rem;
                            margin-bottom: 2rem;
                        }

                        .mapper-item {
                            background: rgba(255,255,255,0.7);
                            backdrop-filter: blur(16px);
                            border-radius: 12px;
                            padding: 1rem;
                            text-align: center;
                            transition: all 0.3s ease;
                            position: relative;
                            overflow: hidden;
                        }

                        .mapper-item:hover {
                            transform: translateY(-10px);
                            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
                        }

                        .workflow-section {
                            display: grid;
                            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
                            gap: 1rem;
                        }

                        .workflow-step {
                            background: rgba(255,255,255,0.45);
                            backdrop-filter: blur(10px);
                            border-radius: 12px;
                            padding: 1rem;
                            display: flex;
                            align-items: center;
                            gap: 1rem;
                            transition: all 0.3s ease;
                            cursor: pointer;
                        }

                        .workflow-step:hover {
                            background: rgba(255,255,255,0.6);
                            transform: translateY(-5px);
                        }

                        .step-number {
                            width: 50px;
                            height: 50px;
                            border-radius: 50%;
                            background: linear-gradient(45deg, var(--primary), var(--accent));
                            color: white;
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            font-weight: bold;
                        }

                        @keyframes shimmer {
                            0% { background-position: -100% 0; }
                            100% { background-position: 100% 0; }
                        }

                        @media (max-width: 768px) {
                            .mapper-grid,
                            .workflow-section {
                                grid-template-columns: 1fr;
                            }
                        }
                    `}</style>
                    
                    <h1 className="mapper-title">{clientName} Project Mapper</h1>
                    
                    <div className="mapper-grid">
                        {items.map((item, index) => (
                            <div key={index} className="mapper-item">
                                <h3>{item}</h3>
                                {links[index] && (
                                    <a 
                                        href={links[index]} 
                                        target="_blank" 
                                        rel="noopener noreferrer"
                                        className="p-btn"
                                    >
                                        Open {item} Link
                                    </a>
                                )}
                            </div>
                        ))}
                    </div>

                    <div className="workflow-section">
                        {workflowSteps.map((step, index) => (
                            <div 
                                key={index} 
                                className="workflow-step"
                                onClick={() => toggleStep(index)}
                            >
                                <div className="step-number">{index + 1}</div>
                                <div>
                                    <h4>{step.title}</h4>
                                    <p>{step.description}</p>
                                    {selectedSteps.has(index) && (
                                        <span>✅ Completed</span>
                                    )}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        ReactDOM.render(
            <CritMapper 
                clientName="Ahead Artist Solutions" 
                items={["Strategy", "Promotion", "Analytics", "Support"]} 
                links={["#strategy", "#promotion", "#analytics", "#support"]} 
            />,
            document.getElementById('root')
        );
    </script>
</body>
</html>
