<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card System | Ahead Command Center</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        /* ══════════════════════════════════════════════
           Card System — Base Shell
           Salt rock lamp palette from Ahead Command Center
           ══════════════════════════════════════════════ */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --lamp-deep: #c2560a;
            --lamp-mid: #e07b2e;
            --lamp-warm: #f2a54a;
            --lamp-soft: #f8c97d;
            --lamp-glow: #fde8c8;
            --white: #ffffff;
            --text: #3b1a04;
            --text-dim: rgba(59, 26, 4, 0.55);
            --border-thick: 4px;
            --radius: 16px;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.18),
                      0 1px 4px rgba(0, 0, 0, 0.10);
        }

        html, body {
            height: 100%;
            font-family: 'Outfit', sans-serif;
            color: var(--text);
            background:
                radial-gradient(ellipse at 30% 20%, var(--lamp-soft) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, var(--lamp-warm) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, #e8944a 0%, transparent 60%),
                linear-gradient(160deg, var(--lamp-glow) 0%, var(--lamp-warm) 35%, #d4700f 65%, #a84e08 100%);
            overflow-x: hidden;
        }

        /* ── Layout ── */
        .app {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 32px 24px 100px;
            gap: 24px;
        }

        /* ── Header ── */
        .header {
            text-align: center;
        }

        .header h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 1.8rem;
            color: var(--white);
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
        }

        .header .subtitle {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-dim);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 4px;
        }

        /* ── Card Container ── */
        .card-area {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            max-width: 900px;
            width: 100%;
        }

        /* ── Base Card ── */
        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: var(--border-thick) solid var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 24px;
            width: 260px;
            min-height: 180px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                        box-shadow 0.3s ease;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.22),
                        0 2px 8px rgba(0, 0, 0, 0.12);
        }

        .card:active {
            transform: scale(0.98);
        }

        .card-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-dim);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .card-title {
            font-weight: 600;
            font-size: 1.15rem;
            color: var(--text);
        }

        .card-body {
            font-weight: 300;
            font-size: 0.9rem;
            color: var(--text);
            line-height: 1.5;
            flex: 1;
        }

        .card-pill {
            align-self: flex-start;
            background: var(--lamp-deep);
            color: var(--white);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 100px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* ── Bottom Toolbar ── */
        .toolbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: linear-gradient(180deg, #9a4208 0%, #7a3506 100%);
            border-top: var(--border-thick) solid var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            z-index: 100;
        }

        .toolbar-btn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            border: 2px solid var(--white);
            background: rgba(255, 255, 255, 0.1);
            color: var(--white);
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.15s;
        }

        .toolbar-btn:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .toolbar-btn:active {
            transform: scale(0.92);
        }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            .card {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="app">
        <div class="header">
            <h1>Card System</h1>
            <div class="subtitle">Ahead Command Center</div>
        </div>

        <div class="card-area">
            <div class="card">
                <span class="card-label">Slot 1</span>
                <span class="card-title">Ready</span>
                <span class="card-body">Base card — waiting for content.</span>
                <span class="card-pill">Active</span>
            </div>

            <div class="card">
                <span class="card-label">Slot 2</span>
                <span class="card-title">Ready</span>
                <span class="card-body">Base card — waiting for content.</span>
                <span class="card-pill">Active</span>
            </div>

            <div class="card">
                <span class="card-label">Slot 3</span>
                <span class="card-title">Ready</span>
                <span class="card-body">Base card — waiting for content.</span>
                <span class="card-pill">Active</span>
            </div>
        </div>
    </div>

    <div class="toolbar">
        <button class="toolbar-btn">●</button>
        <button class="toolbar-btn">▲</button>
        <button class="toolbar-btn">▼</button>
        <button class="toolbar-btn">◆</button>
        <button class="toolbar-btn">■</button>
        <button class="toolbar-btn">♦</button>
        <button class="toolbar-btn">★</button>
    </div>

    <script>
        /* ══════════════════════════════════════════════
           Card System — Base JS
           Ready for logic layers
           ══════════════════════════════════════════════ */

        // Card interactions
        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('click', () => {
                console.log('Card clicked:', card.querySelector('.card-label').textContent);
            });
        });

        // Toolbar interactions
        document.querySelectorAll('.toolbar-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                console.log('Toolbar:', btn.textContent);
            });
        });
    </script>
</body>

</html>
