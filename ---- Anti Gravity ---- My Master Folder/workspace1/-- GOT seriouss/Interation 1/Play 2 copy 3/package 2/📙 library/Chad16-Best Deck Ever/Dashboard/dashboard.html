<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocean Protocol | Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="sidebar">
        <div class="logo">
            <div class="logo-icon"></div>
            <span>OCEAN</span>
        </div>
        <div style="margin-top: 2rem; display: flex; flex-direction: column; gap: 8px;">
            <a href="cards.html" class="nav-link">Cards</a>
            <a href="actions.html" class="nav-link">Actions</a>
            <a href="settings.html" class="nav-link">Settings</a>
            <a href="tiles.html" class="nav-link">Tiles</a>
            <div style="margin-top: 1rem; padding-left: 10px; font-size: 0.65rem; color: var(--primary); text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.7;">Campaign Tools</div>
            <a href="chad17-campaign-kit-generator copy.html" class="nav-link">Campaign Kit Generator</a>
        </div>

        <div class="sidebar-actions" style="margin-top: auto;">
            <div class="sidebar-section-title">Data Management</div>
            <button class="sidebar-action-btn" onclick="alert('Please manage data from the Tiles or Cards page.')">
                <span class="action-icon">💾</span> Export JSON
            </button>
            <button class="sidebar-action-btn" onclick="alert('Please manage data from the Tiles or Cards page.')">
                <span class="action-icon">📂</span> Import JSON
            </button>
        </div>
    </nav>

    <main class="main-view animate-in">
        <h1>Analytics Dashboard</h1>

        <div class="grid">
            <div class="card">
                <h2>Market Reach</h2>
                <div
                    style="height: 200px; border: 2px dashed var(--border); border-radius: 12px; margin-top: 1rem; display: flex; align-items: center; justify-content: center; color: var(--text-dim);">
                    [ Chart Placeholder ]
                </div>
            </div>
            <div class="card">
                <h2>Campaign Velocity</h2>
                <div
                    style="height: 200px; border: 2px dashed var(--border); border-radius: 12px; margin-top: 1rem; display: flex; align-items: center; justify-content: center; color: var(--text-dim);">
                    [ Chart Placeholder ]
                </div>
            </div>
            <div class="card" style="grid-column: span 2;">
                <h2>Global Node Distribution</h2>
                <div
                    style="height: 150px; background: rgba(76, 201, 240, 0.05); border-radius: 12px; margin-top: 1rem; padding: 1.5rem;">
                    <p>Active Nodes: 1,402</p>
                    <p style="color: var(--text-dim);">Last optimized: 14 mins ago</p>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
