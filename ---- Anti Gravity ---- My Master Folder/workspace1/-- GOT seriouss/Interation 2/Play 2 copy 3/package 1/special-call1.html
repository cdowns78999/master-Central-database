<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Special Call 1 — Shortcut Grid</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Outfit', system-ui, -apple-system, sans-serif;
      padding: 24px;
    }

    .phone-icon {
      font-size: 2.4rem;
      color: #ef4444;
      margin-bottom: 18px;
      filter: drop-shadow(0 0 8px rgba(239, 68, 68, 0.35));
      user-select: none;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 8px;
      width: 100%;
      max-width: 340px;
    }

    .btn {
      background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1), 0 4px 12px rgba(0, 0, 0, 0.4);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #ffffff;
      font-family: 'Outfit', system-ui, -apple-system, sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 14px 8px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
      user-select: none;
      text-align: center;
      white-space: nowrap;
    }

    .btn:hover {
      background: linear-gradient(145deg, #2a2a2a, #151515);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.14), 0 6px 16px rgba(0, 0, 0, 0.5);
      transform: translateY(-1px);
    }

    .btn:active {
      transform: scale(0.95);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06), 0 2px 6px rgba(0, 0, 0, 0.3);
    }

    @keyframes btn-vibrate {
      0%   { transform: rotate(0deg); }
      10%  { transform: rotate(-2deg); }
      20%  { transform: rotate(2deg); }
      30%  { transform: rotate(-2deg); }
      40%  { transform: rotate(2deg); }
      50%  { transform: rotate(-1deg); }
      60%  { transform: rotate(1deg); }
      70%  { transform: rotate(-0.5deg); }
      80%  { transform: rotate(0.5deg); }
      100% { transform: rotate(0deg); }
    }

    .btn.vibrating {
      animation: btn-vibrate 0.3s ease;
    }
  </style>
</head>
<body>

  <div class="phone-icon">&#9742;</div>

  <div class="grid">
    <button class="btn" data-label="Hello?">Hello?</button>
    <button class="btn" data-label="Grab Client">Grab Client</button>
    <button class="btn" data-label="Voice Command">Voice Command</button>
    <button class="btn" data-label="Quick Note">Quick Note</button>
    <button class="btn" data-label="Check Status">Check Status</button>
    <button class="btn" data-label="Run Report">Run Report</button>
    <button class="btn" data-label="Open Wing">Open Wing</button>
    <button class="btn" data-label="Star Mode">Star Mode</button>
    <button class="btn" data-label="New Task">New Task</button>
    <button class="btn" data-label="Follow Up">Follow Up</button>
    <button class="btn" data-label="Send Quote">Send Quote</button>
    <button class="btn" data-label="End Call">End Call</button>
  </div>

  <script>
    document.querySelectorAll('.btn').forEach(btn => {
      btn.addEventListener('click', () => {
        btn.classList.add('vibrating');
        setTimeout(() => {
          btn.classList.remove('vibrating');
        }, 300);
      });
    });
  </script>

</body>
</html>
