<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aetheric Hearts — Discord Carousel</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="theme-0">

    <main class="carousel-container">
        <div class="carousel-viewport" id="carouselViewport">
            <!-- Neon Pulse Heart (Active By Default) -->
            <div class="heart-container active" data-index="0" id="heart-0">
                <div class="heart neon-pulse"></div>
                <div class="heart-label">NEON PULSE</div>
            </div>

            <!-- Prismatic Prism Heart -->
            <div class="heart-container" data-index="1" id="heart-1">
                <div class="heart prismatic-prism"></div>
                <div class="heart-label">PRISMATIC PRISM</div>
            </div>

            <!-- Ethereal Echo Heart -->
            <div class="heart-container" data-index="2" id="heart-2">
                <div class="heart ethereal-echo"></div>
                <div class="heart-label">ETHEREAL ECHO</div>
            </div>
        </div>
    </main>

    <footer class="discord-nav">
        <div class="nav-tray">
            <button class="nav-button active" data-index="0" aria-label="Neon Pulse">
                <div class="nav-icon"></div>
            </button>
            <button class="nav-button" data-index="1" aria-label="Prismatic Prism">
                <div class="nav-icon"></div>
            </button>
            <button class="nav-button" data-index="2" aria-label="Ethereal Echo">
                <div class="nav-icon"></div>
            </button>
        </div>
    </footer>

    <script src="app.js"></script>
</body>

</html>
