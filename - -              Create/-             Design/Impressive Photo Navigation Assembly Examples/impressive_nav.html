<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impressive Photo Navigation - Sample Pack</title>
    <style>
        :root {
            --f-bg-color: #000000;
            --f-text-color: #ffffff;
            --cursor-size: 20px;
        }

        body {
            margin: 0;
            background: var(--f-bg-color);
            color: var(--f-text-color);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            cursor: none;
        }

        .custom-cursor {
            position: fixed;
            width: var(--cursor-size);
            height: var(--cursor-size);
            background: #E4FF97;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: difference;
            transition: transform 0.1s ease-out;
            transform: translate(-50%, -50%);
        }

        .showcase-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2px;
            padding: 2px;
            background: rgba(255, 255, 255, 0.1);
        }

        .showcase-item {
            position: relative;
            aspect-ratio: 4/5;
            overflow: hidden;
            background: #111;
        }

        .showcase-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.7;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s ease;
        }

        .showcase-item:hover img {
            transform: scale(1.05);
            opacity: 1;
        }

        .item-overlay {
            position: absolute;
            bottom: 2rem;
            left: 2rem;
            z-index: 10;
        }

        .item-title {
            font-size: 1.5rem;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .nav-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            mix-blend-mode: difference;
        }

        .logo {
            font-weight: 900;
            font-size: 1.5rem;
            letter-spacing: -0.05em;
        }

        .menu-toggle {
            font-family: monospace;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.2em;
        }
    </style>
</head>

<body>
    <!-- URL ID TAG -->
    <div id="url-id-tag"
        style="position: fixed; top: 20px; left: 20px; z-index: 9999; font-family: monospace; font-size: 0.75rem; font-weight: 800; color: #E4FF97; background: rgba(0,0,0,0.8); padding: 4px 12px; border-radius: 5px; border: 1px solid #E4FF97; box-shadow: 0 0 15px rgba(228, 255, 151, 0.4); pointer-events: none; text-transform: uppercase;">
        ID: /nav-impressive
    </div>

    <div class="custom-cursor" id="cursor"></div>

    <nav class="nav-overlay">
        <div class="logo">FIGMA_INSPIRED</div>
        <div class="menu-toggle">Index / 01</div>
    </nav>

    <div class="showcase-grid">
        <div class="showcase-item">
            <img src="https://picsum.photos/seed/1/800/1000" alt="Work 1">
            <div class="item-overlay">
                <div class="item-title">Visual Identity</div>
            </div>
        </div>
        <div class="showcase-item">
            <img src="https://picsum.photos/seed/2/800/1000" alt="Work 2">
            <div class="item-overlay">
                <div class="item-title">Interface Design</div>
            </div>
        </div>
        <div class="showcase-item">
            <img src="https://picsum.photos/seed/3/800/1000" alt="Work 3">
            <div class="item-overlay">
                <div class="item-title">Motion Systems</div>
            </div>
        </div>
        <div class="showcase-item">
            <img src="https://picsum.photos/seed/4/800/1000" alt="Work 4">
            <div class="item-overlay">
                <div class="item-title">Spatial Audio</div>
            </div>
        </div>
    </div>

    <script>
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        document.querySelectorAll('.showcase-item').forEach(item => {
            item.addEventListener('mouseenter', () => {
                cursor.style.transform = 'translate(-50%, -50%) scale(4)';
            });
            item.addEventListener('mouseleave', () => {
                cursor.style.transform = 'translate(-50%, -50%) scale(1)';
            });
        });
    </script>
</body>

</html>
