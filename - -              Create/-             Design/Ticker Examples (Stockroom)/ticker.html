<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Ticker - Sample Pack</title>
    <style>
        :root {
            --f-bg-color: #ffffff;
            --f-text-color: #000000;
            --f-gutter: 24px;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            background: var(--f-bg-color);
            color: var(--f-text-color);
            overflow-x: hidden;
        }

        .ticker-container {
            padding-block: 5rem;
            border-top: 1px solid rgba(0, 0, 0, 0.08);
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            background: #fafafa;
        }

        .ticker-wrapper {
            display: flex;
            overflow: hidden;
            user-select: none;
        }

        .ticker-list {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 4rem;
            padding-inline: 2rem;
            animation: scroll 30s linear infinite;
            list-style: none;
            margin: 0;
        }

        .ticker-item {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.05em;
            text-transform: uppercase;
            white-space: nowrap;
            opacity: 0.4;
            transition: opacity 0.3s ease;
        }

        .ticker-item:hover {
            opacity: 1;
        }

        @keyframes scroll {
            from {
                transform: translateX(0);
            }

            to {
                transform: translateX(-100%);
            }
        }

        /* Pause on hover */
        .ticker-wrapper:hover .ticker-list {
            animation-play-state: paused;
        }

        .section-label {
            text-align: center;
            font-family: monospace;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.75rem;
            margin-bottom: 2rem;
            opacity: 0.5;
        }
    </style>
</head>

<body>
    <!-- URL ID TAG -->
    <div id="url-id-tag"
        style="position: fixed; top: 20px; left: 20px; z-index: 9999; font-family: monospace; font-size: 0.75rem; font-weight: 800; color: #E4FF97; background: rgba(0,0,0,0.8); padding: 4px 12px; border-radius: 5px; border: 1px solid #E4FF97; box-shadow: 0 0 15px rgba(228, 255, 151, 0.4); pointer-events: none; text-transform: uppercase;">
        ID: /ticker-v1
    </div>

    <div style="height: 10vh;"></div>

    <div class="ticker-container">
        <div class="section-label">Trusted by high-performance teams</div>
        <div class="ticker-wrapper">
            <ul class="ticker-list">
                <li class="ticker-item">Innovation</li>
                <li class="ticker-item">Collaboration</li>
                <li class="ticker-item">Precision</li>
                <li class="ticker-item">Velocity</li>
                <li class="ticker-item">Integrity</li>
                <li class="ticker-item">Creativity</li>
                <li class="ticker-item">Excellence</li>
                <li class="ticker-item">Disruption</li>
            </ul>
            <!-- Duplicate for seamless loop -->
            <ul class="ticker-list" aria-hidden="true">
                <li class="ticker-item">Innovation</li>
                <li class="ticker-item">Collaboration</li>
                <li class="ticker-item">Precision</li>
                <li class="ticker-item">Velocity</li>
                <li class="ticker-item">Integrity</li>
                <li class="ticker-item">Creativity</li>
                <li class="ticker-item">Excellence</li>
                <li class="ticker-item">Disruption</li>
            </ul>
        </div>
    </div>

    <div style="height: 10vh;"></div>

</body>

</html>
