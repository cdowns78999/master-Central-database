<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Link Panels - Sample Pack</title>
    <style>
        body {
            margin: 0;
            padding: 5%;
            font-family: 'Inter', sans-serif;
            background: #fafafa;
            color: #111;
        }

        .panel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        .link-card {
            background: #fff;
            border: 1px solid rgba(0, 0, 0, 0.06);
            border-radius: 1rem;
            padding: 1.5rem;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .link-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            border-color: #4D49FC;
        }

        .thumbnail {
            width: 100%;
            height: 160px;
            background: #eee;
            border-radius: 0.5rem;
            overflow: hidden;
            position: relative;
        }

        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-info h3 {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .card-info p {
            margin: 0.5rem 0 0;
            font-size: 0.85rem;
            color: #666;
            line-height: 1.4;
        }

        .tag {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #4D49FC;
            letter-spacing: 0.05em;
        }
    </style>
</head>

<body>
    <!-- URL ID TAG -->
    <div id="url-id-tag"
        style="position: fixed; top: 20px; left: 20px; z-index: 9999; font-family: monospace; font-size: 0.75rem; font-weight: 800; color: #E4FF97; background: rgba(0,0,0,0.8); padding: 4px 12px; border-radius: 5px; border: 1px solid #E4FF97; box-shadow: 0 0 15px rgba(228, 255, 151, 0.4); pointer-events: none; text-transform: uppercase;">
        ID: /panels-v1
    </div>

    <h1 style="margin-bottom: 3rem; letter-spacing: -0.03em;">Resources</h1>

    <div class="panel-grid">
        <a href="#" class="link-card">
            <div class="thumbnail">
                <img src="https://picsum.photos/seed/a1/400/250" alt="Link 1">
            </div>
            <div class="card-info">
                <span class="tag">Guide</span>
                <h3>System Design Patterns</h3>
                <p>Learn the foundations of modern interface architecture.</p>
            </div>
        </a>
        <a href="#" class="link-card">
            <div class="thumbnail">
                <img src="https://picsum.photos/seed/a2/400/250" alt="Link 2">
            </div>
            <div class="card-info">
                <span class="tag">Article</span>
                <h3>Motion Principles</h3>
                <p>Mastering transitions and interactive animations.</p>
            </div>
        </a>
        <a href="#" class="link-card">
            <div class="thumbnail">
                <img src="https://picsum.photos/seed/a3/400/250" alt="Link 3">
            </div>
            <div class="card-info">
                <span class="tag">Tool</span>
                <h3>Icon Library</h3>
                <p>A comprehensive set of SVG icons for every project.</p>
            </div>
        </a>
    </div>

</body>

</html>
