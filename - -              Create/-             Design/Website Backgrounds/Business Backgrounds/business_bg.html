<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Backgrounds - Sample Pack</title>
    <style>
        body {
            margin: 0;
            background: #f8fafc;
            color: #0f172a;
            font-family: sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .business-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background:
                linear-gradient(135deg, #f1f5f9 25%, transparent 25%) -50px 0,
                linear-gradient(225deg, #f1f5f9 25%, transparent 25%) -50px 0,
                linear-gradient(315deg, #f1f5f9 25%, transparent 25%),
                linear-gradient(45deg, #f1f5f9 25%, transparent 25%);
            background-size: 100px 100px;
            background-color: #f8fafc;
            opacity: 0.5;
        }

        .panel {
            background: #fff;
            border: 1px solid #e2e8f0;
            padding: 3rem;
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            max-width: 400px;
        }

        .badge {
            background: #e0f2fe;
            color: #0369a1;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }
    </style>
</head>

<body>
    <!-- URL ID TAG -->
    <div id="url-id-tag"
        style="position: fixed; top: 20px; left: 20px; z-index: 9999; font-family: monospace; font-size: 0.75rem; font-weight: 800; color: #E4FF97; background: rgba(0,0,0,0.8); padding: 4px 12px; border-radius: 5px; border: 1px solid #E4FF97; box-shadow: 0 0 15px rgba(228, 255, 151, 0.4); pointer-events: none; text-transform: uppercase;">
        ID: /bg-business
    </div>
    <div class="business-bg"></div>
    <div class="panel">
        <span class="badge">Enterprise Ready</span>
        <h2 style="margin-top: 1rem;">Solid Foundation</h2>
        <p style="color: #64748b; font-size: 0.9rem;">Clean, professional background patterns for corporate
            applications.</p>
    </div>
</body>

</html>
