<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standard Backgrounds - Sample Pack</title>
    <style>
        body {
            margin: 0;
            background: #ffffff;
            color: #111;
            font-family: sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .standard-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background:
                linear-gradient(90deg, rgba(0, 0, 0, 0.02) 1px, transparent 1px),
                linear-gradient(rgba(0, 0, 0, 0.02) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .standard-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, transparent 0%, #fff 80%);
        }

        .message {
            text-align: center;
            border: 1px solid rgba(0, 0, 0, 0.1);
            padding: 2rem;
            border-radius: 1rem;
            background: #fff;
        }
    </style>
</head>

<body>
    <!-- URL ID TAG -->
    <div id="url-id-tag"
        style="position: fixed; top: 20px; left: 20px; z-index: 9999; font-family: monospace; font-size: 0.75rem; font-weight: 800; color: #E4FF97; background: rgba(0,0,0,0.8); padding: 4px 12px; border-radius: 5px; border: 1px solid #E4FF97; box-shadow: 0 0 15px rgba(228, 255, 151, 0.4); pointer-events: none; text-transform: uppercase;">
        ID: /bg-standard
    </div>
    <div class="standard-bg"></div>
    <div class="message">
        <h3 style="margin: 0;">Standard Utility</h3>
        <p style="opacity: 0.5;">Reliable grid-based background system.</p>
    </div>
</body>

</html>
