<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pretty Backgrounds - Sample Pack</title>
    <style>
        body {
            margin: 0;
            background: #fff;
            color: #111;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .pretty-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.15;
            animation: drift 20s infinite alternate ease-in-out;
        }

        .blob-1 {
            background: #4D49FC;
            top: -100px;
            left: -100px;
        }

        .blob-2 {
            background: #E4FF97;
            bottom: -100px;
            right: -100px;
            animation-delay: -5s;
        }

        .blob-3 {
            background: #FF97E4;
            bottom: 40%;
            left: 30%;
            animation-delay: -10s;
        }

        @keyframes drift {
            from {
                transform: translate(0, 0);
            }

            to {
                transform: translate(100px, 100px);
            }
        }

        .card {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 3rem;
            border-radius: 2rem;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        h2 {
            font-weight: 500;
            font-size: 2.5rem;
            letter-spacing: -0.02em;
        }
    </style>
</head>

<body>
    <!-- URL ID TAG -->
    <div id="url-id-tag"
        style="position: fixed; top: 20px; left: 20px; z-index: 9999; font-family: monospace; font-size: 0.75rem; font-weight: 800; color: #E4FF97; background: rgba(0,0,0,0.8); padding: 4px 12px; border-radius: 5px; border: 1px solid #E4FF97; box-shadow: 0 0 15px rgba(228, 255, 151, 0.4); pointer-events: none; text-transform: uppercase;">
        ID: /bg-pretty
    </div>
    <div class="pretty-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    <div class="card">
        <h2>Soft & Modern</h2>
        <p>Aesthetic drift background</p>
    </div>
</body>

</html>
