<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradient Backgrounds - Sample Pack</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
            color: #fff;
            overflow: hidden;
            background: #000;
        }

        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background:
                radial-gradient(circle at 20% 30%, rgba(77, 73, 252, 0.4) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(228, 255, 151, 0.2) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.05) 0%, transparent 50%);
            filter: blur(80px);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 4rem;
            border-radius: 2rem;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            letter-spacing: -0.05em;
        }

        p {
            opacity: 0.6;
            margin-top: 1rem;
        }
    </style>
</head>

<body>
    <!-- URL ID TAG -->
    <div id="url-id-tag"
        style="position: fixed; top: 20px; left: 20px; z-index: 9999; font-family: monospace; font-size: 0.75rem; font-weight: 800; color: #E4FF97; background: rgba(0,0,0,0.8); padding: 4px 12px; border-radius: 5px; border: 1px solid #E4FF97; box-shadow: 0 0 15px rgba(228, 255, 151, 0.4); pointer-events: none; text-transform: uppercase;">
        ID: /bg-gradient
    </div>
    <div class="gradient-bg"></div>
    <div class="glass-card">
        <h1>Atmospheric</h1>
        <p>Premium layered gradient system</p>
    </div>
</body>

</html>
