<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design System | Premium Zen Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --font-main: 'Inter', sans-serif;
            --bg-primary: #000000;
            --color-orange: #FA5D29;
            --color-blue: #49B3FC;
            --color-green: #AAEEC4;
            --text-primary: #ffffff;
            --text-dim: #7a7a7a;
            --border-dotted: rgba(255, 255, 255, 0.1);
            --transition: 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-main);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            overflow-y: hidden;
        }

        html {
            scroll-behavior: auto;
            overflow: hidden;
        }

        /* Utils */
        .hidden {
            opacity: 0;
            e pointer-events: none;
        }

        .visible {
            opacity: 1;
            pointer-events: all;
        }

        /* Layer 1: Premium Intro */
        #intro-layer {
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #000;
            transition: var(--transition);
        }

        .welcome-text {
            font-size: clamp(32px, 5vw, 60px);
            font-weight: 800;
            letter-spacing: -3px;
            line-height: 0.9;
            margin-bottom: 60px;
            opacity: 0;
            animation: premiumFadeIn 1.5s forwards 0.5s;
        }

        /* Brutalist Slider */
        .slider-container {
            width: 300px;
            height: 70px;
            background: transparent;
            border: none;
            position: relative;
            display: flex;
            align-items: center;
            padding: 5px;
            opacity: 0;
            animation: premiumFadeIn 1.5s forwards 1.2s;
        }

        .slider-label {
            position: absolute;
            width: 100%;
            text-align: center;
            font-size: 11px;
            font-weight: 600;
            color: #fff;
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 1;
            z-index: 0;
        }

        #slider-handle,
        .reveal-handle {
            width: 60px;
            height: 100%;
            background: var(--color-orange);
            cursor: grab;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.1s;
            border: 1px solid #000;
            position: relative;
            z-index: 1;
        }

        #slider-handle:active,
        .reveal-handle:active {
            cursor: grabbing;
        }

        /* Layer 2: Premium Discovery */
        #content-layer {
            max-width: 1400px;
            margin: 0 auto;
            padding: 120px 40px;
            opacity: 0;
            transform: translateY(50px);
            transition: opacity 1.2s cubic-bezier(0.16, 1, 0.3, 1), transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #content-layer.active {
            opacity: 1;
            transform: translateY(0);
        }

        .section-header {
            margin-bottom: 80px;
            border-bottom: 1px solid var(--border-dotted);
            padding-bottom: 40px;
        }

        .section-header span {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--color-orange);
            font-weight: 700;
        }

        /* Lux-Mono Prompt Boxes */
        .prompt-card {
            background: #000;
            border-radius: 0;
            padding: 30px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            transition: var(--transition);
        }

        .prompt-meta {
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            margin-bottom: 30px;
        }

        .prompt-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            color: #555;
            text-transform: uppercase;
        }


        .lux-input {
            width: 100%;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 16px;
            font-weight: 300;
            padding: 20px 0;
            outline: none;
            height: 150px;
            resize: none;
            font-family: monospace;
            cursor: copy;
            transition: 0.3s;
            border-bottom: 1px dotted #333;
        }

        .lux-input:hover {
            color: var(--color-orange);
            border-bottom-color: var(--color-orange);
        }

        /* Category Grid: Technical Lab */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
        }

        .category-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px;
            background: #0c0c0c;
            border-radius: 4px;
            text-decoration: none;
            color: #fff;
            border: 1px solid #1a1a1a;
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
        }

        .category-item:hover {
            border-color: #555;
            background: #111;
        }

        .category-item::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--color-orange);
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.4s;
        }

        .category-item:hover::after {
            transform: scaleX(1);
            transform-origin: left;
        }

        .cat-info h3 {
            font-size: clamp(24px, 3vw, 40px);
            font-weight: 800;
            letter-spacing: -1px;
            line-height: 1;
            margin-bottom: 10px;
        }

        .cat-info p {
            font-size: 13px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-badge {
            font-size: 10px;
            font-weight: 700;
            color: var(--color-green);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            background: var(--color-green);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--color-green);
            animation: pulse 2s infinite;
        }

        @keyframes premiumFadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
                filter: blur(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0px);
            }
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.5);
                opacity: 0.5;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Back to top button */
        #back-to-top {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: transparent;
            border: none;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            font-size: 32px;
            font-weight: 800;
            color: var(--color-orange);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            text-shadow: 0 0 20px var(--color-orange), 0 0 40px var(--color-orange), 0 0 60px var(--color-orange);
            font-family: monospace;
            line-height: 1;
            padding: 0;
        }

        #back-to-top.visible {
            display: flex;
            animation: glowPulse 2s infinite;
        }

        #back-to-top:hover {
            transform: translateX(-50%) translateY(-5px) scale(1.2);
            text-shadow: 0 0 30px var(--color-orange), 0 0 60px var(--color-orange), 0 0 80px var(--color-orange);
        }

        #back-to-top:active {
            transform: translateX(-50%) translateY(0) scale(0.95);
        }

        @keyframes glowPulse {
            0%, 100% {
                text-shadow: 0 0 20px var(--color-orange), 0 0 40px var(--color-orange), 0 0 60px var(--color-orange);
            }
            50% {
                text-shadow: 0 0 30px var(--color-orange), 0 0 60px var(--color-orange), 0 0 80px var(--color-orange);
            }
        }

        @media (max-width: 900px) {

            .grid,
            .category-grid {
                grid-template-columns: 1fr;
            }

            .welcome-text {
                font-size: 40px;
            }
        }
    </style>
</head>

    <script>
        // Ensure page starts at top
        window.addEventListener('load', () => {
            window.scrollTo(0, 0);
        });

        // Scroll control
        let scrollDisabled = true;

        // Disable mouse wheel and keyboard scrolling
        window.addEventListener('wheel', (e) => {
            if (scrollDisabled) e.preventDefault();
        }, { passive: false });

        window.addEventListener('keydown', (e) => {
            // Prevent arrow keys, space, page up/down from scrolling
            if (scrollDisabled && ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space', 'PageUp', 'PageDown', 'Home', 'End'].includes(e.code)) {
                e.preventDefault();
            }
        }, { passive: false });

        // Disable touch scrolling
        document.addEventListener('touchmove', (e) => {
            if (scrollDisabled) e.preventDefault();
        }, { passive: false });

        // Data Registry
        const SAMPLES = [
            { title: "Navigation", id: "/navs", desc: "Technical Menu Logic", indicator: "v1.0.4" },
            { title: "Tickers", id: "/tickers", desc: "Kinetic Motion Loops", indicator: "v2.6.1" },
            { title: "Backgrounds", id: "/bgs", desc: "Atmospheric Textures", indicator: "v1.9.0" },
            { title: "Panels", id: "/panels", desc: "System Grid Displays", indicator: "v3.0.2" },
            { title: "Landings", id: "/landings", desc: "High Conversion Bases", indicator: "v1.1.0" },
            { title: "Pricing", id: "/pricing", desc: "Monetization Tiers", indicator: "v2.0.0" }
        ];

        // Multi-Layer Sequential Unlock
        const handle = document.getElementById('slider-handle');
        const container = document.querySelector('.slider-container');
        const intro = document.getElementById('intro-layer');
        const content = document.getElementById('content-layer');

        const categoryHeader = document.querySelectorAll('.section-header')[1];

        // Initially hide categories
        categoryHeader.style.opacity = "0";

        function setupSlider(handleId, containerClass, onComplete, onClose) {
            const h = document.getElementById(handleId);
            const c = h.closest('.' + containerClass);
            let dragging = false;
            let startX = 0;
            let currentX = 0;
            let isOpen = false;

            // Reset function to allow slider to work again
            window['reset_' + handleId] = () => {
                dragging = false;
                startX = 0;
                currentX = 0;
                isOpen = false;
            };

            h.onmousedown = (e) => {
                dragging = true;
                startX = e.clientX - currentX;
                h.style.transition = "none"; // Disable during drag
            };
            window.addEventListener('mousemove', (e) => {
                if (!dragging) return;
                let moveX = e.clientX - startX;
                let max = c.offsetWidth - h.offsetWidth - 10;
                if (moveX < 0) moveX = 0;
                if (moveX > max) moveX = max;
                currentX = moveX;
                h.style.transform = `translateX(${moveX}px)`;

                // Open when reaching max
                if (moveX >= max && !isOpen) {
                    isOpen = true;
                    dragging = false;
                    h.style.transition = "0.4s cubic-bezier(0.16, 1, 0.3, 1)";
                    h.style.transform = `translateX(${max}px)`;
                    currentX = max;
                    // Keep handle visible and interactive for reveal sliders
                    if (handleId !== 'slider-handle') {
                        h.style.pointerEvents = "all";
                    } else {
                        h.style.pointerEvents = "none";
                        c.style.opacity = "0.2";
                    }
                    onComplete();
                }

                // Close when dragging back to start
                if (moveX <= 5 && isOpen && handleId !== 'slider-handle') {
                    isOpen = false;
                    dragging = false;
                    h.style.transition = "0.4s cubic-bezier(0.16, 1, 0.3, 1)";
                    h.style.transform = "translateX(0)";
                    currentX = 0;
                    if (onClose) onClose();
                }
            });
            window.addEventListener('mouseup', () => {
                if (!dragging) return;
                dragging = false;
                // Only allow snap back for the initial slider when not fully open
                if (handleId === 'slider-handle' && !isOpen) {
                    h.style.transition = "transform 0.4s cubic-bezier(0.16, 1, 0.3, 1)";
                    h.style.transform = "translateX(0)";
                    currentX = 0;
                }
            });
        }

        // Smooth scroll with dramatic easing and inertia
        function smoothScrollTo(target, duration = 1400) {
            const targetPosition = target.getBoundingClientRect().top + window.pageYOffset;
            const startPosition = window.pageYOffset;
            const distance = targetPosition - startPosition;
            let startTime = null;

            // Dramatically smooth easing with heavy inertia (ease-in-out-quart)
            function dramaticEase(t) {
                return t < 0.5
                    ? 8 * t * t * t * t
                    : 1 - 8 * (--t) * t * t * t;
            }

            function animation(currentTime) {
                if (startTime === null) startTime = currentTime;
                const timeElapsed = currentTime - startTime;
                const progress = Math.min(timeElapsed / duration, 1);
                const ease = dramaticEase(progress);

                window.scrollTo({
                    top: startPosition + distance * ease,
                    behavior: 'instant'
                });

                if (timeElapsed < duration) {
                    requestAnimationFrame(animation);
                }
            }

            requestAnimationFrame(animation);
        }

        // Layer 1: Start
        setupSlider('slider-handle', 'slider-container', () => {
            // Add active class before scroll to prevent flicker
            content.classList.add('active');

            // Dramatic smooth scroll to content layer - immediate start
            smoothScrollTo(content);

            // Show back to top button after scroll starts
            setTimeout(() => {
                document.getElementById('back-to-top').classList.add('visible');

            // Show categories after scroll completes
            setTimeout(() => {

                wrapCat.style.gridTemplateRows = "1fr";
                wrapCat.style.opacity = "1";
                wrapCat.style.filter = "none";
                renderCategories();
            }, 1600);

            // Enable scrolling after unlock
            scrollDisabled = false;
            document.body.style.overflowY = 'auto';
            document.documentElement.style.overflow = 'auto';
        });

        // Layer 2: Reveal Prompt 1
        setupSlider('reveal-h1', 'reveal-c1',
            () => {
                document.getElementById('wrap-p1').style.gridTemplateRows = "1fr";
                document.getElementById('copy-btn-1').style.display = "flex";
            },
            () => {
                document.getElementById('wrap-p1').style.gridTemplateRows = "0fr";
                document.getElementById('copy-btn-1').style.display = "none";
            }
        );

        // Layer 3: Reveal Prompt 2
        setupSlider('reveal-h2', 'reveal-c2',
            () => {
                document.getElementById('wrap-p2').style.gridTemplateRows = "1fr";
                document.getElementById('copy-btn-2').style.display = "flex";
            },
            () => {
                document.getElementById('wrap-p2').style.gridTemplateRows = "0fr";
                document.getElementById('copy-btn-2').style.display = "none";
            }
        );

        function renderCategories() {
            const grid = document.getElementById('cat-grid');
            grid.innerHTML = SAMPLES.map(item => `
                <a href="#" class="category-item">
                    <div class="cat-info">
                        <h3>${item.title}</h3>

                    </div>

                        <span class="status-badge"><div class="pulse-dot"></div> ACTIVE</span>
                        <div style="font-size: 10px; color: #555; margin-top: 5px;">${item.indicator}</div>
                    </div>
                </a>
            `).join('');
        }

        function copyText(id) {
            const area = document.getElementById(id);
            area.select();
            document.execCommand('copy');

            // Subtle visual feedback
            const originalColor = area.style.color;
            area.style.color = "var(--color-green)";
            const label = area.parentElement.querySelector('.prompt-label');
            const originalLabel = label.innerText;
            label.innerText = "COPIED TO CLIPBOARD";
            label.style.color = "var(--color-green)";

            setTimeout(() => {
                area.style.color = originalColor;
                label.innerText = originalLabel;
                label.style.color = "#555";
            }, 2000);
        }

        function goBackToTop() {
            // Disable scrolling when going back
            scrollDisabled = true;
            document.body.style.overflowY = 'hidden';
            document.documentElement.style.overflow = 'hidden';

            // Step 1: Fade out the up arrow button with scale down
            const upArrow = document.getElementById('back-to-top');
            upArrow.style.transition = "all 0.4s cubic-bezier(0.16, 1, 0.3, 1)";
            upArrow.style.opacity = "0";
            upArrow.style.transform = "translateX(-50%) scale(0.5)";

            // Step 2: Collapse categories with blur and fade (reverse of opening)
            setTimeout(() => {
                const wrapCat = document.getElementById('wrap-cat');
                wrapCat.style.gridTemplateRows = "0fr";
                wrapCat.style.opacity = "0";
                wrapCat.style.filter = "blur(10px)";
            }, 100);

            // Step 3: Collapse prompt reveals smoothly
            setTimeout(() => {
                document.getElementById('wrap-p1').style.gridTemplateRows = "0fr";
                document.getElementById('copy-btn-1').style.display = "none";
                document.getElementById('wrap-p2').style.gridTemplateRows = "0fr";
                document.getElementById('copy-btn-2').style.display = "none";

                // Reset reveal sliders smoothly
                const reveal1 = document.getElementById('reveal-h1');
                const reveal2 = document.getElementById('reveal-h2');
                reveal1.style.transition = "transform 0.5s cubic-bezier(0.16, 1, 0.3, 1)";
                reveal2.style.transition = "transform 0.5s cubic-bezier(0.16, 1, 0.3, 1)";
                reveal1.style.transform = "translateX(0)";
                reveal2.style.transform = "translateX(0)";
            }, 300);

            // Step 4: Fade out content layer before scroll (reverse fade)
            setTimeout(() => {
                content.style.transition = "opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1)";
                content.style.opacity = "0";
                content.style.transform = "translateY(50px)";
            }, 400);

            // Step 5: Begin smooth scroll to top with dramatic easing
            setTimeout(() => {
                smoothScrollTo(intro, 1400);
            }, 800);

            // Step 6: Remove active class and reset content transform after scroll begins
            setTimeout(() => {
                content.classList.remove('active');
                content.style.transition = "";
                content.style.opacity = "";
                content.style.transform = "";
            }, 1000);

            // Step 7: Reset main slider with smooth animation after scroll completes
            setTimeout(() => {
                const mainHandle = document.getElementById('slider-handle');
                const sliderContainer = container;

                // Animate slider handle back to start
                mainHandle.style.transition = "transform 0.8s cubic-bezier(0.16, 1, 0.3, 1)";
                mainHandle.style.transform = "translateX(0)";
                mainHandle.style.pointerEvents = "all";

                // Restore container opacity
                sliderContainer.style.transition = "opacity 0.6s ease-out";
                sliderContainer.style.opacity = "1";

                // Reset the slider's internal state so it can be used again
                if (window['reset_slider-handle']) {
                    window['reset_slider-handle']();
                }

                setTimeout(() => {
                    mainHandle.style.transition = "";
                }, 800);
            }, 2000);

            // Step 8: Fully reset and hide up arrow
            setTimeout(() => {
                upArrow.classList.remove('visible');
                upArrow.style.transition = "";
                upArrow.style.opacity = "";
                upArrow.style.transform = "";
            }, 2600);
        }
    </script>
