<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design System | Premium Zen Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --font-main: 'Inter', sans-serif;
            --bg-primary: #000000;
            --color-orange: #FA5D29;
            --color-blue: #49B3FC;
            --color-green: #AAEEC4;
            --text-primary: #ffffff;
            --text-dim: #7a7a7a;
            --border-dotted: rgba(255, 255, 255, 0.1);
            --transition: 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-main);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* Utils */
        .hidden {
            opacity: 0;
            e pointer-events: none;
        }

        .visible {
            opacity: 1;
            pointer-events: all;
        }

        /* Layer 1: Premium Intro */
        #intro-layer {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            background: #000;
            transition: var(--transition);
        }

        .welcome-text {
            font-size: clamp(32px, 5vw, 60px);
            font-weight: 800;
            letter-spacing: -3px;
            line-height: 0.9;
            margin-bottom: 60px;
            opacity: 0;
            animation: premiumFadeIn 1.5s forwards 0.5s;
        }

        /* Brutalist Slider */
        .slider-container {
            width: 300px;
            height: 70px;
            background: transparent;
            border: 2px solid #fff;
            position: relative;
            display: flex;
            align-items: center;
            padding: 5px;
            opacity: 0;
            animation: premiumFadeIn 1.5s forwards 1.2s;
            box-shadow: 6px 6px 0px rgba(255, 255, 255, 0.1);
        }

        .slider-label {
            position: absolute;
            width: 100%;
            text-align: center;
            font-size: 11px;
            font-weight: 600;
            color: #fff;
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.4;
        }

        #slider-handle,
        .reveal-handle {
            width: 60px;
            height: 56px;
            background: var(--color-orange);
            cursor: grab;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.1s;
            border: 1px solid #000;
        }

        #slider-handle:active,
        .reveal-handle:active {
            cursor: grabbing;
        }

        /* Layer 2: Premium Discovery */
        #content-layer {
            max-width: 1400px;
            margin: 0 auto;
            padding: 120px 40px;
            opacity: 0;
            transform: translateY(50px);
            transition: var(--transition);
        }

        #content-layer.active {
            opacity: 1;
            transform: translateY(0);
        }

        .section-header {
            margin-bottom: 80px;
            border-bottom: 1px solid var(--border-dotted);
            padding-bottom: 40px;
        }

        .section-header span {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--color-orange);
            font-weight: 700;
        }

        /* Lux-Mono Prompt Boxes */
        .prompt-card {
            background: #000;
            border-radius: 0;
            padding: 30px 0;
            margin-bottom: 20px;
            border: none;
            position: relative;
            transition: var(--transition);
        }

        .prompt-meta {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 30px;
        }

        .prompt-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            color: #555;
            text-transform: uppercase;
        }

        .badge-score {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #fff;
            padding: 8px 12px;
            line-height: 1;
            font-size: 9px;
            border-radius: 2px;
            color: #fff;
            text-transform: uppercase;
        }

        .badge-score strong {
            font-size: 14px;
            margin-top: 4px;
            color: var(--color-green);
        }


        .lux-input {
            width: 100%;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 16px;
            font-weight: 300;
            padding: 20px 0;
            outline: none;
            height: 150px;
            resize: none;
            font-family: monospace;
            cursor: copy;
            transition: 0.3s;
            border-bottom: 1px dotted #333;
        }

        .lux-input:hover {
            color: var(--color-orange);
            border-bottom-color: var(--color-orange);
        }

        /* Category Grid: Technical Lab */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
        }

        .category-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px;
            background: #0c0c0c;
            border-radius: 4px;
            text-decoration: none;
            color: #fff;
            border: 1px solid #1a1a1a;
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
        }

        .category-item:hover {
            border-color: #555;
            background: #111;
        }

        .category-item::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--color-orange);
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.4s;
        }

        .category-item:hover::after {
            transform: scaleX(1);
            transform-origin: left;
        }

        .cat-info h3 {
            font-size: clamp(24px, 3vw, 40px);
            font-weight: 800;
            letter-spacing: -1px;
            line-height: 1;
            margin-bottom: 10px;
        }

        .cat-info p {
            font-size: 13px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-badge {
            font-size: 10px;
            font-weight: 700;
            color: var(--color-green);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            background: var(--color-green);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--color-green);
            animation: pulse 2s infinite;
        }

        @keyframes premiumFadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
                filter: blur(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0px);
            }
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.5);
                opacity: 0.5;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @media (max-width: 900px) {

            .grid,
            .category-grid {
                grid-template-columns: 1fr;
            }

            .welcome-text {
                font-size: 40px;
            }
        }
    </style>
</head>

<body>

    <!-- Layer 1: Intro -->
    <div id="intro-layer">
        <h1 class="welcome-text">Hi Welcome.</h1>
        <div class="slider-container">
            <div class="slider-label">Slide to start :)</div>
            <div id="slider-handle">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
            </div>
        </div>
    </div>

    <!-- Layer 2: Discovery -->
    <div id="content-layer">

        <header class="section-header">
            <span>PROMPT_CONTROL_CENTER</span>
            <p style="margin-top: 10px; color: #7a7a7a;">Establishing the baseline intelligence for Step 3 Execution.
            </p>
        </header>

        <!-- Prompt Controls Row (Side-by-Side Mirrored) -->
        <div style="display: flex; gap: 40px; margin-bottom: 60px;">
            <!-- Prompt 1 Layer Handle -->
            <div class="slider-container reveal-c1"
                style="flex: 1; width: auto; height: 70px; opacity: 1; animation: none;">
                <div class="slider-label" style="opacity: 0.2;">Prompt 1</div>
                <div id="reveal-h1" class="reveal-handle">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </div>
            </div>

            <!-- Prompt 2 Layer Handle -->
            <div class="slider-container reveal-c2"
                style="flex: 1; width: auto; height: 70px; opacity: 1; animation: none;">
                <div class="slider-label" style="opacity: 0.2;">Prompt 2</div>
                <div id="reveal-h2" class="reveal-handle">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </div>
            </div>
        </div>

        <!-- Prompt 1 Content (Gentle Collapse Wrapper) -->
        <div id="wrap-p1"
            style="display: grid; grid-template-rows: 0fr; transition: grid-template-rows 1s cubic-bezier(0.16, 1, 0.3, 1);">
            <div style="overflow: hidden;">
                <div class="prompt-card">
                    <div class="prompt-meta">
                        <span class="prompt-label">PROMPT 1</span>
                        <div class="badge-score">STATUS <strong>ACTIVE</strong></div>
                    </div>
                    <textarea id="p1" class="lux-input" readonly onclick="copyText('p1')">⭐⭐⭐⭐⭐⭐⭐⭐⭐⭐⭐
Follow these instructions:

1. You've already done Step 1 and 2. Task complete. Move on. 
2. Focus Step 3
3. Before planning and coding, ask me what 'goal' is and what 3 'themes' I'd like.
4. Then Before planning and coding, ask which 'sources you'd like 'pulled' from

- www.google.com
- codepen.io
- duckduckgo.com
- archive.org
- github.com
- gitlab.com
- jsfiddle.net
- stackoverflow.com
- developer.mozilla.org
- web.dev
- caniuse.com
- behance.net
- dribbble.com

Only when those questions are answered and you can fulfill those fields within 'Step 3 Prompt' can you then begin planning, organizing, and creating all the files.
⭐⭐⭐⭐⭐⭐⭐⭐</textarea>
                </div>
            </div>
        </div>

        <!-- Prompt 2 Content (Gentle Collapse Wrapper) -->
        <div id="wrap-p2"
            style="display: grid; grid-template-rows: 0fr; transition: grid-template-rows 1s cubic-bezier(0.16, 1, 0.3, 1);">
            <div style="overflow: hidden;">
                <div class="prompt-card">
                    <div class="prompt-meta">
                        <span class="prompt-label">PROMPT 2</span>
                        <div class="badge-score">VERIFIED <strong>TRUE</strong></div>
                    </div>
                    <textarea id="p2" class="lux-input" readonly onclick="copyText('p2')">Below is ONE SINGLE PROMPT OUTPUT...
[PROMPT 1, 2, 3 CONTENT BUNDLE...]</textarea>
                </div>
            </div>
        </div>


        <div id="wrap-cat"
            style="display: grid; grid-template-rows: 0fr; opacity: 0; filter: blur(10px); transition: grid-template-rows 1.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 1.5s, filter 2s;">
            <div style="overflow: hidden;">
                <header class="section-header">
                    <span>WEB_DEV_CATEGORIES</span>
                </header>
                <div class="category-grid" id="cat-grid">
                    <!-- Dynamic Category Tiles -->
                </div>
            </div>
        </div>

    </div>

    <script>
        // Data Registry
        const SAMPLES = [
            { title: "Navigation", id: "/navs", desc: "Technical Menu Logic", indicator: "v1.0.4" },
            { title: "Tickers", id: "/tickers", desc: "Kinetic Motion Loops", indicator: "v2.6.1" },
            { title: "Backgrounds", id: "/bgs", desc: "Atmospheric Textures", indicator: "v1.9.0" },
            { title: "Panels", id: "/panels", desc: "System Grid Displays", indicator: "v3.0.2" },
            { title: "Landings", id: "/landings", desc: "High Conversion Bases", indicator: "v1.1.0" },
            { title: "Pricing", id: "/pricing", desc: "Monetization Tiers", indicator: "v2.0.0" }
        ];

        // Multi-Layer Sequential Unlock
        const handle = document.getElementById('slider-handle');
        const container = document.querySelector('.slider-container');
        const intro = document.getElementById('intro-layer');
        const content = document.getElementById('content-layer');

        const promptCard1 = document.querySelectorAll('.prompt-card')[0];
        const promptCard2 = document.querySelectorAll('.prompt-card')[1];
        const categoryHeader = document.querySelectorAll('.section-header')[1];

        // Initially hide prompt 2 and categories
        promptCard2.style.opacity = "0";
        promptCard2.style.pointerEvents = "none";
        promptCard2.style.transform = "translateY(30px)";
        categoryHeader.style.opacity = "0";

        function setupSlider(handleId, containerClass, onComplete) {
            const h = document.getElementById(handleId);
            const c = h.closest('.' + containerClass);
            let dragging = false;
            let startX = 0;

            h.onmousedown = (e) => {
                dragging = true;
                startX = e.clientX;
                h.style.transition = "none"; // Disable during drag
            };
            window.addEventListener('mousemove', (e) => {
                if (!dragging) return;
                let moveX = e.clientX - startX;
                let max = c.offsetWidth - h.offsetWidth - 10;
                if (moveX < 0) moveX = 0;
                if (moveX > max) moveX = max;
                h.style.transform = `translateX(${moveX}px)`;
                if (moveX >= max) {
                    dragging = false;
                    h.style.transition = "0.4s cubic-bezier(0.16, 1, 0.3, 1)";
                    h.style.transform = `translateX(${max}px)`;
                    h.style.pointerEvents = "none";
                    c.style.opacity = "0.2";
                    onComplete();
                }
            });
            window.addEventListener('mouseup', () => {
                if (!dragging) return;
                dragging = false;
                h.style.transition = "transform 0.4s cubic-bezier(0.16, 1, 0.3, 1)";
                h.style.transform = "translateX(0)";
            });
        }

        // Layer 1: Start
        setupSlider('slider-handle', 'slider-container', () => {
            intro.style.opacity = "0";
            intro.style.pointerEvents = "none";
            content.classList.add('active');
        });

        // Layer 2: Reveal Prompt 1
        setupSlider('reveal-h1', 'reveal-c1', () => {
            document.getElementById('wrap-p1').style.gridTemplateRows = "1fr";
            // Ensure prompt 2 slider is now interactable if it was limited
        });

        // Layer 3: Reveal Prompt 2 & Auto-unfold Categories
        setupSlider('reveal-h2', 'reveal-c2', () => {
            document.getElementById('wrap-p2').style.gridTemplateRows = "1fr";

            // Gentle delay for the category stack self-reveal
            setTimeout(() => {
                const wrapCat = document.getElementById('wrap-cat');
                wrapCat.style.gridTemplateRows = "1fr";
                wrapCat.style.opacity = "1";
                wrapCat.style.filter = "none";
                renderCategories();

                // Scroll into view
                window.scrollTo({
                    top: wrapCat.offsetTop + 200,
                    behavior: 'smooth'
                });
            }, 800);
        });

        function renderCategories() {
            const grid = document.getElementById('cat-grid');
            grid.innerHTML = SAMPLES.map(item => `
                <a href="#" class="category-item">
                    <div class="cat-info">
                        <h3>${item.title}</h3>
                        <p>${item.id} • ${item.desc}</p>
                    </div>
                    <div style="text-align: right;">
                        <span class="status-badge"><div class="pulse-dot"></div> ACTIVE</span>
                        <div style="font-size: 10px; color: #555; margin-top: 5px;">${item.indicator}</div>
                    </div>
                </a>
            `).join('');
        }

        function copyText(id) {
            const area = document.getElementById(id);
            area.select();
            document.execCommand('copy');

            // Subtle visual feedback
            const originalColor = area.style.color;
            area.style.color = "var(--color-green)";
            const label = area.parentElement.querySelector('.prompt-label');
            const originalLabel = label.innerText;
            label.innerText = "COPIED TO CLIPBOARD";
            label.style.color = "var(--color-green)";

            setTimeout(() => {
                area.style.color = originalColor;
                label.innerText = originalLabel;
                label.style.color = "#555";
            }, 2000);
        }
    </script>
</body>

</html>
