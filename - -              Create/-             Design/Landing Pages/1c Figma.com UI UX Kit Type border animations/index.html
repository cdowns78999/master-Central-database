<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borders Kit: Glass-Noise Base (Awwwards Spec)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --color-primary: #fff;
            --color-accent: #FA5D29;
            --bg-midnight: #050505;
            --glass-white: rgba(255, 255, 255, 0.05);
            --font-main: 'Inter', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        body {
            font-family: var(--font-main);
            background: var(--bg-midnight);
            color: var(--color-primary);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* NOISE OVERLAY */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("https://grainy-gradients.vercel.app/noise.svg");
            opacity: 0.15;
            pointer-events: none;
            z-index: 9999;
        }

        .header-disclaimer {
            background: #fff;
            color: #000;
            text-align: center;
            padding: 15px;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            width: 100%;
        }

        .container {
            max-width: 1200px;
            padding: 100px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .title-block {
            text-align: center;
            margin-bottom: 100px;
        }

        .title-label {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 5px;
            color: var(--color-accent);
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .main-title {
            font-size: clamp(40px, 10vw, 100px);
            font-weight: 800;
            letter-spacing: -4px;
            line-height: 0.8;
            background: linear-gradient(to bottom, #fff, #444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- GLASS-NOISE ENGINE --- */
        .showcase-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 60px;
            width: 100%;
        }

        .border-box {
            position: relative;
            background: var(--glass-white);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            height: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
            overflow: hidden;
            transition: transform 0.3s;
        }

        .border-box:hover {
            transform: scale(1.02);
        }

        /* 01. THE TRACING BORDER */
        .trace-border::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 2px;
            background: linear-gradient(90deg,
                    transparent 10%,
                    var(--color-accent) 20%,
                    var(--color-accent) 30%,
                    transparent 40%);
            background-size: 300% 100%;
            -webkit-mask:
                linear-gradient(#fff 0 0) content-box,
                linear-gradient(#fff 0 0);
            mask:
                linear-gradient(#fff 0 0) content-box,
                linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: trace 4s linear infinite;
        }

        @keyframes trace {
            0% {
                background-position: 100% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        /* 02. THE CONIC SHIMMER */
        .shimmer-border::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: conic-gradient(transparent 180deg,
                    var(--color-accent) 270deg,
                    #fff 360deg);
            animation: rotate 6s linear infinite;
            z-index: -1;
        }

        .shimmer-border::after {
            content: '';
            position: absolute;
            inset: 3px;
            background: #080808;
            border-radius: 17px;
            z-index: -1;
        }

        /* 03. THE NOISE BLOOM */
        .noise-bloom {
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .noise-bloom .glow {
            position: absolute;
            width: 50%;
            height: 50%;
            background: var(--color-accent);
            filter: blur(100px);
            opacity: 0.2;
            animation: bloom 8s ease-in-out infinite alternate;
        }

        /* 04. THE GRAIN MASK */
        .grain-mask {
            border: 1px solid #222;
        }

        .grain-mask:hover {
            border-color: #fff;
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @keyframes bloom {
            0% {
                transform: translate(-20%, -20%) scale(1);
            }

            100% {
                transform: translate(20%, 20%) scale(1.5);
            }
        }

        .box-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .box-meta {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #555;
        }

        /* CURSOR */
        #cursor {
            position: fixed;
            width: 6px;
            height: 6px;
            background: #fff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 10000;
        }

        #follower {
            position: fixed;
            width: 50px;
            height: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s cubic-bezier(0.23, 1, 0.32, 1);
            backdrop-filter: blur(5px);
        }
    </style>
</head>

<body>

    <div class="header-disclaimer">
        'kit' refers to 'bringing forth a balanced packaged of helpfulness, given the criteria'
    </div>

    <div class="container">
        <div class="title-block">
            <div class="title-label">05 Glass-Noise Base</div>
            <h1 class="main-title">ATMOSPHERIC.<br>TEXTURES.</h1>
        </div>

        <div class="showcase-grid">

            <div class="border-box trace-border">
                <div class="glow"></div>
                <div class="box-title">Tracing Current</div>
                <div class="box-meta">Kinetic Border Flow</div>
            </div>

            <div class="border-box shimmer-border">
                <div class="box-title">Conic Shimmer</div>
                <div class="box-meta">Rotational Spectral Mask</div>
            </div>

            <div class="border-box noise-bloom">
                <div class="glow"></div>
                <div class="box-title">Noise Bloom</div>
                <div class="box-meta">Static Gradient Texture</div>
            </div>

            <div class="border-box grain-mask">
                <div class="box-title">Editorial Sharp</div>
                <div class="box-meta">Minimalist Glass Mesh</div>
            </div>

        </div>
    </div>

    <div id="cursor"></div>
    <div id="follower"></div>

    <script>
        const cursor = document.getElementById('cursor');
        const follower = document.getElementById('follower');

        let mouseX = 0, mouseY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;

            cursor.style.transform = `translate(${mouseX - 3}px, ${mouseY - 3}px)`;
            follower.style.transform = `translate(${mouseX - 25}px, ${mouseY - 25}px)`;
        });

        document.addEventListener('mousedown', () => {
            follower.style.transform += ' scale(2)';
            follower.style.borderColor = '#FA5D29';
        });

        document.addEventListener('mouseup', () => {
            follower.style.transform += ' scale(1)';
            follower.style.borderColor = 'rgba(255,255,255,0.2)';
        });
    </script>
</body>

</html>
