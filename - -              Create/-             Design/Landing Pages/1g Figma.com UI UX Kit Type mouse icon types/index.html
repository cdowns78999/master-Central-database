<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursors Kit: Physics-Engine Base (Awwwards Spec)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --color-primary: #1a1a1a;
            --color-accent: #FA5D29;
            --bg-primary: #f8f8f8;
            --font-main: 'Inter', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        body {
            font-family: var(--font-main);
            background: var(--bg-primary);
            color: var(--color-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .header-disclaimer {
            background: #000;
            color: #fff;
            text-align: center;
            padding: 15px;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            z-index: 1000;
        }

        /* --- PHYSICS-ENGINE CURSOR --- */
        #cursor-main {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #000;
            border-radius: 50%;
            pointer-events: none;
            z-index: 10000;
        }

        #cursor-follower {
            position: fixed;
            width: 150px;
            height: 150px;
            background: rgba(250, 93, 41, 0.1);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.2s cubic-bezier(0.23, 1, 0.32, 1), background 0.3s, border-radius 0.6s, width 0.3s, height 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: transparent;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            backdrop-filter: blur(2px);
        }

        /* --- INTERACTIVE ZONES --- */
        .interaction-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px;
            background: #eee;
        }

        .zone {
            background: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .zone-label {
            font-size: 12px;
            font-weight: 800;
            color: #ccc;
            letter-spacing: 4px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .zone-title {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -1.5px;
        }

        .magnetic-target {
            margin-top: 40px;
            padding: 20px 40px;
            border: 1px solid #ddd;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 12px;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* --- PHYSICS STATES --- */
        body.mode-view #cursor-follower {
            background: var(--color-accent);
            color: #fff;
            transform: scale(0.6);
            backdrop-filter: none;
        }

        body.mode-magnetic #cursor-follower {
            width: 80px;
            height: 80px;
            border-radius: 4px;
            border: 1px dotted #000;
            background: transparent;
        }

        body.mode-liquid #cursor-follower {
            background: #000;
            color: #fff;
            width: 200px;
            height: 200px;
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            animation: morphing 5s infinite alternate;
        }

        @keyframes morphing {
            0% {
                border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            }

            100% {
                border-radius: 70% 30% 50% 50% / 30% 60% 40% 70%;
            }
        }

        .coords {
            position: fixed;
            bottom: 40px;
            left: 40px;
            font-family: monospace;
            font-size: 10px;
            color: #999;
        }
    </style>
</head>

<body>

    <div class="header-disclaimer">
        'kit' refers to 'bringing forth a balanced packaged of helpfulness, given the criteria'
    </div>

    <div id="cursor-main"></div>
    <div id="cursor-follower">VIEW</div>

    <div class="interaction-grid">

        <!-- ZONE 1: LIQUID -->
        <div class="zone" data-mode="liquid" onmouseenter="setMode('liquid', 'EXPANDED')"
            onmouseleave="setMode('', '')">
            <div class="zone-label">Phys_01</div>
            <h2 class="zone-title">Liquid Blob</h2>
            <div class="magnetic-target">SURFACE_MESH</div>
        </div>

        <!-- ZONE 2: MAGNETIC -->
        <div class="zone" data-mode="magnetic" onmouseenter="setMode('magnetic', 'LOCKED')"
            onmouseleave="setMode('', '')">
            <div class="zone-label">Phys_02</div>
            <h2 class="zone-title">Magnetic Snap</h2>
            <div class="magnetic-target">BIND_TARGET</div>
        </div>

        <!-- ZONE 3: PREVIEW -->
        <div class="zone" data-mode="view" onmouseenter="setMode('view', 'PREVIEW')" onmouseleave="setMode('', '')">
            <div class="zone-label">Phys_03</div>
            <h2 class="zone-title">Action Reveal</h2>
            <div class="magnetic-target">INITIATE</div>
        </div>

    </div>

    <div class="coords" id="coords">X: 000 / Y: 000</div>

    <script>
        const cursor = document.getElementById('cursor-main');
        const follower = document.getElementById('cursor-follower');
        const coords = document.getElementById('coords');
        const targets = document.querySelectorAll('.magnetic-target');

        let mouseX = 0, mouseY = 0;
        let followerX = 0, followerY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;

            cursor.style.transform = `translate(${mouseX - 5}px, ${mouseY - 5}px)`;
            coords.textContent = `X: ${Math.round(mouseX)} / Y: ${Math.round(mouseY)}`;
        });

        function animate() {
            // Smooth follower
            followerX += (mouseX - followerX) * 0.1;
            followerY += (mouseY - followerY) * 0.1;
            follower.style.left = `${followerX - (follower.offsetWidth / 2)}px`;
            follower.style.top = `${followerY - (follower.offsetHeight / 2)}px`;

            // Magnetic logic
            targets.forEach(target => {
                const rect = target.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;

                const dx = mouseX - centerX;
                const dy = mouseY - centerY;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < 150) {
                    target.style.transform = `translate(${dx * 0.3}px, ${dy * 0.3}px)`;
                    target.style.borderColor = '#000';
                    target.style.background = '#000';
                    target.style.color = '#fff';
                } else {
                    target.style.transform = `translate(0, 0)`;
                    target.style.borderColor = '#ddd';
                    target.style.background = 'transparent';
                    target.style.color = '#000';
                }
            });

            requestAnimationFrame(animate);
        }
        animate();

        function setMode(mode, text) {
            document.body.className = mode ? `mode-${mode}` : '';
            follower.textContent = text;
        }

    </script>
</body>

</html>
