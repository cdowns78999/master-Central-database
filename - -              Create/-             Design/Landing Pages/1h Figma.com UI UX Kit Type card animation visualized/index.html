<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animations Kit: Fluid-Text Base (Awwwards Spec)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --color-primary: #000;
            --color-accent: #FA5D29;
            --bg-primary: #f2f2f2;
            --font-main: 'Inter', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        body {
            font-family: var(--font-main);
            background: var(--bg-primary);
            color: var(--color-primary);
            overflow-x: hidden;
        }

        .header-disclaimer {
            background: #000;
            color: #fff;
            text-align: center;
            padding: 15px;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        /* --- FLUID-TEXT ENGINE --- */
        .kinetic-section {
            padding: 100px 40px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }

        .hero-title-wrap {
            position: relative;
            z-index: 10;
        }

        .hero-title {
            font-size: clamp(60px, 15vw, 200px);
            font-weight: 800;
            letter-spacing: -8px;
            line-height: 0.8;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .hero-title span {
            display: inline-block;
            transition: transform 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .hero-title:hover span {
            transform: skewX(-20deg);
            color: var(--color-accent);
        }

        .marquee-wrap {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            overflow: hidden;
            pointer-events: none;
            opacity: 0.1;
            z-index: 1;
        }

        .marquee {
            display: flex;
            white-space: nowrap;
            animation: marquee 20s linear infinite;
            font-size: clamp(100px, 20vw, 300px);
            font-weight: 800;
        }

        @keyframes marquee {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-50%);
            }
        }

        /* --- CARD ENTRY SHOWCASE --- */
        .showcase-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 20;
        }

        .card-entry {
            background: #fff;
            aspect-ratio: 4/5;
            padding: 30px;
            display: flex;
            flex-direction: column;
            border: 1px solid #eee;
            opacity: 0;
            transform: translateY(100px) rotateX(20deg);
            animation: cardEntry 1s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        @keyframes cardEntry {
            to {
                opacity: 1;
                transform: translateY(0) rotateX(0);
            }
        }

        .card-entry:hover {
            transform: translateY(-20px) scale(1.05);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.1);
            border-color: var(--color-accent);
        }

        .card-num {
            font-family: monospace;
            font-size: 10px;
            color: #ccc;
            margin-bottom: 20px;
        }

        .card-img {
            flex: 1;
            background: #f8f8f8;
            margin-bottom: 20px;
        }

        .card-label {
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
        }

        /* CURSOR */
        #cursor {
            position: fixed;
            width: 200px;
            height: 200px;
            background: var(--color-accent);
            border-radius: 50%;
            mix-blend-mode: difference;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%) scale(0);
            transition: transform 0.3s;
        }

        body:hover #cursor {
            transform: translate(-50%, -50%) scale(1);
        }
    </style>
</head>

<body>

    <div class="header-disclaimer">
        'kit' refers to 'bringing forth a balanced packaged of helpfulness, given the criteria'
    </div>

    <div id="cursor"></div>

    <section class="kinetic-section">

        <div class="marquee-wrap">
            <div class="marquee">
                KINETIC. MOTION. FLUID. TYPE. KINETIC. MOTION. FLUID. TYPE.
            </div>
        </div>

        <div class="container" style="max-width: 1400px; margin: 0 auto; width: 100%;">
            <div class="hero-title-wrap">
                <h1 class="hero-title">
                    <span>M</span><span>O</span><span>T</span><span>I</span><span>O</span><span>N</span>.<br>
                    <span>V</span><span>I</span><span>S</span><span>U</span><span>A</span><span>L</span>.
                </h1>
            </div>

            <div class="showcase-grid">
                <div class="card-entry" style="animation-delay: 0.1s;">
                    <div class="card-num">_01</div>
                    <div class="card-img"></div>
                    <div class="card-label">Elastic Entry</div>
                </div>
                <div class="card-entry" style="animation-delay: 0.2s;">
                    <div class="card-num">_02</div>
                    <div class="card-img"></div>
                    <div class="card-label">Fluid Scaling</div>
                </div>
                <div class="card-entry" style="animation-delay: 0.3s;">
                    <div class="card-num">_03</div>
                    <div class="card-img"></div>
                    <div class="card-label">Kinetic Tilt</div>
                </div>
                <div class="card-entry" style="animation-delay: 0.4s;">
                    <div class="card-num">_04</div>
                    <div class="card-img"></div>
                    <div class="card-label">Shadow Lift</div>
                </div>
            </div>
        </div>

    </section>

    <script>
        const cursor = document.getElementById('cursor');

        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // Simple magnetic parallax for the spans
        const spans = document.querySelectorAll('.hero-title span');
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX - window.innerWidth / 2) * 0.05;
            const y = (e.clientY - window.innerHeight / 2) * 0.05;

            spans.forEach(span => {
                span.style.transform = `translate(${x}px, ${y}px)`;
            });
        });
    </script>
</body>

</html>
