<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Silk - Sample Pack</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap');

        :root {
            --mesh-1: #e0c3fc;
            --mesh-2: #8ec5fc;
            --mesh-3: #fccb90;
            --mesh-4: #d4fc79;
            --text: #2d3436;
            --glass: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(45deg, var(--mesh-1), var(--mesh-2));
            min-height: 100vh;
            color: var(--text);
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Mesh Background Effect */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 30%, var(--mesh-3) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, var(--mesh-4) 0%, transparent 40%);
            filter: blur(80px);
            z-index: -1;
            animation: meshMove 20s infinite alternate ease-in-out;
        }

        @keyframes meshMove {
            0% {
                transform: scale(1) translate(0, 0);
            }

            100% {
                transform: scale(1.2) translate(5%, 5%);
            }
        }

        .main {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 100px 20px;
        }

        .hero-pill {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 10px 24px;
            border-radius: 100px;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        h1 {
            font-size: clamp(50px, 9vw, 100px);
            font-weight: 900;
            line-height: 1;
            text-align: center;
            letter-spacing: -3px;
            margin-bottom: 40px;
        }

        .silk-card {
            background: var(--glass);
            backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 60px;
            max-width: 900px;
            width: 100%;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.08);
            transform: perspective(1000px) rotateX(2deg);
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .silk-card:hover {
            transform: perspective(1000px) rotateX(0deg) translateY(-10px);
        }

        .silk-card p {
            font-size: 24px;
            line-height: 1.5;
            font-weight: 300;
            margin-bottom: 40px;
        }

        .pulse-btn {
            background: #ffffff;
            color: #000;
            padding: 20px 40px;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.4s ease;
            display: inline-block;
            box-shadow: 0 10px 40px rgba(255, 255, 255, 0.4);
        }

        .pulse-btn:hover {
            transform: scale(1.1);
            background: #000;
            color: #fff;
        }
    </style>
</head>

<body>
    <div class="main">
        <div class="hero-pill">NEURAL SILK // LIQUID DESIGN AI</div>
        <h1>Effortless<br>Flow.</h1>
        <div class="silk-card">
            <p>Experience the next generation of generative aesthetics. Neural Silk blends biological fluidity with
                high-tech glassmorphism to create interfaces that feel alive.</p>
            <a href="#" class="pulse-btn">Enter The Flow</a>
        </div>
    </div>
</body>

</html>
