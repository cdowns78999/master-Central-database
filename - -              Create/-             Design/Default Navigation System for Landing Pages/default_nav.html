<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Default Navigation - Sample Pack</title>
    <style>
        :root {
            --f-bg-color: #ffffff;
            --f-text-color: #000000;
            --f-nav-height: 80px;
        }

        body {
            margin: 0;
            font-family: sans-serif;
            background: var(--f-bg-color);
            color: var(--f-text-color);
        }

        .navbar {
            height: var(--f-nav-height);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-inline: 5%;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .nav-brand {
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: -0.02em;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-link {
            text-decoration: none;
            color: inherit;
            font-size: 0.95rem;
            font-weight: 500;
            position: relative;
            padding-block: 0.5rem;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: #000;
            transition: width 0.3s ease;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        .nav-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .btn-outline {
            border: 1px solid #000;
            color: #000;
        }

        .btn-outline:hover {
            background: #000;
            color: #fff;
        }

        .btn-primary {
            background: #000;
            color: #fff;
            border: 1px solid #000;
        }

        .btn-primary:hover {
            opacity: 0.8;
        }
    </style>
</head>

<body>
    <!-- URL ID TAG -->
    <div id="url-id-tag"
        style="position: fixed; top: 20px; left: 20px; z-index: 9999; font-family: monospace; font-size: 0.75rem; font-weight: 800; color: #E4FF97; background: rgba(0,0,0,0.8); padding: 4px 12px; border-radius: 5px; border: 1px solid #E4FF97; box-shadow: 0 0 15px rgba(228, 255, 151, 0.4); pointer-events: none; text-transform: uppercase;">
        ID: /nav-v1
    </div>

    <nav class="navbar">
        <div class="nav-brand">PLATFORM</div>
        <ul class="nav-links">
            <li><a href="#" class="nav-link">Products</a></li>
            <li><a href="#" class="nav-link">Enterprise</a></li>
            <li><a href="#" class="nav-link">Pricing</a></li>
            <li><a href="#" class="nav-link">Resources</a></li>
        </ul>
        <div class="nav-actions">
            <a href="#" class="btn btn-outline">Log in</a>
            <a href="#" class="btn btn-primary">Get started</a>
        </div>
    </nav>

    <div style="height: 200vh; padding: 5%;">
        <h1>Scroll to see sticky behavior</h1>
    </div>

</body>

</html>
