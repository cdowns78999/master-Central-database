<!-- REFINED HOME SCREEN (SLOT 6) -->
<!-- Leveraging the new Mesh Gradient Engine -->

<div class="screen-animation-fade" style="padding-top: 10px;">

    <!-- User Header -->
    <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 35px;">
        <div class="user-info">
            <p style="color: var(--text-muted); font-size: 0.85rem; letter-spacing: 0.5px; margin-bottom: 4px;">Welcome
                back,</p>
            <h1 style="font-size: 1.8rem; font-family: 'Outfit';">Chad Downs</h1>
        </div>
        <div class="profile-glow"
            style="width: 50px; height: 50px; border-radius: 50%; border: 2.5px solid var(--accent-cyan); overflow: hidden; padding: 3px; background: rgba(0, 242, 255, 0.1);">
            <img src="https://via.placeholder.com/50" alt="Chad"
                style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">
        </div>
    </header>

    <!-- Search Glass -->
    <div class="glass-medium"
        style="display: flex; align-items: center; padding: 15px 20px; border-radius: var(--radius-md); margin-bottom: 35px;">
        <svg style="width: 20px; height: 20px; color: var(--text-ghost); margin-right: 15px;" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="3">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        <span style="color: var(--text-ghost); font-size: 1rem;">Search movies, actors...</span>
    </div>

    <!-- Category Pills -->
    <div class="scroll-hide"
        style="display: flex; gap: 12px; overflow-x: auto; margin-bottom: 35px; padding-bottom: 5px;">
        <div
            style="background: var(--accent-cyan); color: var(--bg-void); padding: 10px 22px; border-radius: var(--radius-pill); font-weight: 800; font-size: 0.85rem; box-shadow: 0 10px 20px rgba(0, 242, 255, 0.2);">
            Featured</div>
        <div class="glass-thin"
            style="padding: 10px 22px; border-radius: var(--radius-pill); color: var(--text-muted); font-size: 0.85rem;">
            Music</div>
        <div class="glass-thin"
            style="padding: 10px 22px; border-radius: var(--radius-pill); color: var(--text-muted); font-size: 0.85rem;">
            Movies</div>
        <div class="glass-thin"
            style="padding: 10px 22px; border-radius: var(--radius-pill); color: var(--text-muted); font-size: 0.85rem;">
            Sports</div>
    </div>

    <!-- Trending Section -->
    <h2 style="font-size: 1.4rem; margin-bottom: 25px; display: flex; align-items: center; gap: 10px;">
        Trending Now <span
            style="width: 8px; height: 8px; background: var(--accent-pink); border-radius: 50%; box-shadow: 0 0 10px var(--accent-pink);"></span>
    </h2>

    <!-- Hero Card (The Multi-Layered Masterpiece) -->
    <div class="glass-medium"
        style="position: relative; border-radius: var(--radius-lg); overflow: hidden; height: 220px; cursor: pointer;"
        onclick="app.load('detail')">

        <!-- Image with Deep Mask -->
        <img src="https://images.unsplash.com/photo-1612036782180-6f0b6cd846fe?q=80&w=1000"
            style="width: 100%; height: 100%; object-fit: cover;">
        <div
            style="position: absolute; inset: 0; background: linear-gradient(to right, rgba(11, 1, 29, 0.9) 20%, transparent 80%);">
        </div>

        <!-- Content Overlay -->
        <div
            style="position: absolute; inset: 0; padding: 25px; display: flex; flex-direction: column; justify-content: center;">
            <div
                style="background: linear-gradient(90deg, var(--accent-pink), #8E2DE2); padding: 5px 12px; border-radius: 8px; width: fit-content; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; box-shadow: 0 5px 15px rgba(255, 0, 222, 0.3);">
                Selling Fast</div>
            <h3 style="font-size: 1.8rem; margin-bottom: 4px; line-height: 1.1;">Doctor<br>Strange</h3>
            <p style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 15px;">In the Multiverse of Madness
            </p>
            <div style="font-family: 'Outfit'; font-size: 1.2rem; font-weight: 800; color: var(--accent-cyan);">$18.00
            </div>
        </div>

        <!-- Float Accent -->
        <div
            style="position: absolute; bottom: 20px; right: 20px; width: 45px; height: 45px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 20px rgba(0,0,0,0.3);">
            <svg style="width: 24px; height: 24px; color: var(--bg-void);" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="3">
                <path d="M12 5v14M5 12h14" />
            </svg>
        </div>
    </div>

    <!-- Small Grid -->
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 25px;">
        <div class="glass-medium"
            style="height: 150px; border-radius: var(--radius-md); padding: 15px; position: relative; overflow: hidden;">
            <img src="https://images.unsplash.com/photo-1542204172-3c1f817456a0?q=80&w=1000"
                style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.4;">
            <h4 style="position: relative; font-size: 1.1rem;">Music Festivals</h4>
            <p
                style="position: relative; color: var(--accent-cyan); font-size: 0.75rem; font-weight: 800; margin-top: 5px;">
                24 EVENTS</p>
        </div>
        <div class="glass-medium"
            style="height: 150px; border-radius: var(--radius-md); padding: 15px; position: relative; overflow: hidden;">
            <img src="https://images.unsplash.com/photo-1518611012118-2961d6a5ec94?q=80&w=1000"
                style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.4;">
            <h4 style="position: relative; font-size: 1.1rem;">Live Sports</h4>
            <p
                style="position: relative; color: var(--accent-pink); font-size: 0.75rem; font-weight: 800; margin-top: 5px;">
                12 EVENTS</p>
        </div>
    </div>

    <div style="height: 40px;"></div>
</div>
