<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Happy Face</title>
    <style>
        :root {
            --bg-top: #1a1a2e;
            --bg-bottom: #16213e;
            --face-color: #ffd700;
            --face-shine: #fff4bd;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, var(--bg-top), var(--bg-bottom));
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
        }

        .container {
            position: relative;
            padding: 60px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: scale(1.02);
        }

        .face {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle at 30% 30%, var(--face-shine), var(--face-color));
            border-radius: 50%;
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3), inset -5px -5px 15px rgba(0, 0, 0, 0.2);
            animation: bounce 4s infinite ease-in-out;
        }

        .eye {
            width: 25px;
            height: 25px;
            background: #2c3e50;
            border-radius: 50%;
            position: absolute;
            top: 60px;
            animation: blink 5s infinite;
        }

        .eye.left {
            left: 50px;
        }

        .eye.right {
            right: 50px;
        }

        .mouth {
            width: 100px;
            height: 40px;
            border-bottom: 8px solid #2c3e50;
            border-radius: 0 0 50px 50px;
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .container:hover .mouth {
            height: 60px;
            width: 120px;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-15px);
            }
        }

        @keyframes blink {

            0%,
            90%,
            100% {
                transform: scaleY(1);
            }

            95% {
                transform: scaleY(0.1);
            }
        }

        .background-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.1) 0%, transparent 70%);
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>

<body>
    <div class="background-glow"></div>
    <div class="container">
        <div class="face">
            <div class="eye left"></div>
            <div class="eye right"></div>
            <div class="mouth"></div>
        </div>
    </div>

    <script>
        const container = document.querySelector('.container');
        const glow = document.querySelector('.background-glow');

        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX - window.innerWidth / 2) / 20;
            const y = (e.clientY - window.innerHeight / 2) / 20;

            container.style.transform = `translate(${x}px, ${y}px)`;
            glow.style.transform = `translate(${x * 1.5}px, ${y * 1.5}px)`;
            glow.style.left = `${e.clientX - 200}px`;
            glow.style.top = `${e.clientY - 200}px`;
        });
    </script>
</body>

</html>
