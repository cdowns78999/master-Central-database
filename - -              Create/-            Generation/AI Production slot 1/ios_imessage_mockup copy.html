<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS 2026 iMessage Mockup</title>
    <style>
        :root {
            --ios-bg: #000;
            --bubble-sent: linear-gradient(180deg, #007aff 0%, #0056b3 100%);
            --liquid-glass: rgba(255, 255, 255, 0.08);
            --glass-blur: blur(30px);
            --accent-glow: rgba(0, 122, 255, 0.4);
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at 50% 50%, #1a1a2e, #000);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            color: white;
            overflow: hidden;
        }

        /* Phone Frame - High Fidelity */
        .iphone-frame {
            width: 390px;
            height: 844px;
            background: var(--ios-bg);
            border: 10px solid #222;
            border-radius: 55px;
            position: relative;
            box-shadow: 0 0 0 2px #333, 0 50px 100px rgba(0, 0, 0, 0.9);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            user-select: none;
        }

        /* Dynamic Island 2026 */
        .island {
            width: 110px;
            height: 32px;
            background: black;
            border-radius: 20px;
            position: absolute;
            top: 14px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            transition: all 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        .island:hover {
            width: 280px;
            height: 60px;
        }

        /* Header UI */
        .header {
            padding: 55px 20px 15px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: var(--glass-blur);
            text-align: center;
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.08);
            z-index: 10;
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border-radius: 50%;
            margin-bottom: 4px;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .contact-name {
            font-size: 13px;
            font-weight: 500;
            opacity: 0.9;
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            background: #000;
            position: relative;
        }

        /* Ambient Glow Background */
        .chat-area::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 80% 20%, rgba(0, 122, 255, 0.1), transparent 50%),
                radial-gradient(circle at 20% 80%, rgba(255, 215, 0, 0.05), transparent 50%);
            z-index: 0;
            pointer-events: none;
        }

        /* Liquid Glass Bubbles */
        .bubble {
            max-width: 75%;
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 16px;
            line-height: 1.35;
            position: relative;
            z-index: 1;
            transition: transform 0.2s ease;
        }

        .bubble:active {
            transform: scale(0.98);
        }

        .bubble.sent {
            align-self: flex-end;
            background: var(--bubble-sent);
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
        }

        .bubble.received {
            align-self: flex-start;
            background: var(--liquid-glass);
            backdrop-filter: var(--glass-blur);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-bottom-left-radius: 4px;
        }

        /* Premium Link Preview - Extreme Blending */
        .link-card {
            margin-top: 12px;
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border-radius: 24px;
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .link-card:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .card-preview-area {
            width: 100%;
            aspect-ratio: 1.91 / 1;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Ambient light inside the card area */
        .card-preview-area::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .preview-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            text-align: center;
            mix-blend-mode: overlay;
            animation: float 4s infinite ease-in-out;
        }

        .halogen-text {
            font-size: 38px;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.95);
            text-transform: uppercase;
            letter-spacing: 12px;
            margin-bottom: 4px;
        }

        .quote-label {
            font-size: 14px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 8px;
            text-transform: uppercase;
        }

        .author-text {
            font-size: 16px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 4px;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
                opacity: 0.8;
            }

            50% {
                transform: translateY(-8px);
                opacity: 1;
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.6;
                filter: blur(0px);
            }

            50% {
                opacity: 0.9;
                filter: blur(1px);
            }
        }

        .card-info {
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.02);
            border-top: 0.5px solid rgba(255, 255, 255, 0.05);
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 2px;
            display: block;
        }

        .card-desc {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }

        /* iOS 2026 Menu Look (Pop-up) */
        .ios-menu {
            position: absolute;
            bottom: 100px;
            right: 20px;
            width: 220px;
            background: rgba(25, 25, 25, 0.85);
            backdrop-filter: blur(40px);
            border-radius: 24px;
            border: 0.5px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            padding: 6px;
            z-index: 1000;
            display: none;
            /* Trigger via JS or keep as part of visual */
            animation: popIn 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        .menu-item {
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 16px;
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.1);
            transition: background 0.2s;
            cursor: pointer;
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .menu-item:hover {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
        }

        .menu-icon {
            opacity: 0.7;
        }

        /* Input Bar */
        .input-bar {
            padding: 10px 16px 36px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: var(--glass-blur);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .add-btn {
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            color: rgba(255, 255, 255, 0.6);
        }

        .text-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 22px;
            padding: 8px 16px;
            font-size: 16px;
            color: #fff;
        }

        .send-btn {
            width: 32px;
            height: 32px;
            background: #007aff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes popIn {
            from {
                transform: scale(0.9) translateY(10px);
                opacity: 0;
            }

            to {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }

        /* Scrollbar Hide */
        .chat-area::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>

<body>
    <div class="iphone-frame">
        <div class="island"></div>

        <header class="header">
            <div class="contact-info">
                <div class="avatar"></div>
                <div class="contact-name">Antigravity AI</div>
            </div>
        </header>

        <section class="chat-area">
            <div class="bubble received">The 2026 "Liquid Glass" look is finally here. 🌊</div>

            <div class="bubble sent">
                Check the link metadata. Spot on 1.91:1 ratio.
                <div class="link-card">
                    <div class="card-preview-area">
                        <div class="preview-content">
                            <span class="halogen-text">Halogen</span>
                            <span class="quote-label">Quote</span>
                            <span class="author-text">GRIPPA // The Haywoods</span>
                        </div>
                    </div>
                    <div class="card-info">
                        <span class="card-title">Happy Face Preview</span>
                        <span class="card-desc">Experience 2026 aesthetics...</span>
                    </div>
                </div>
            </div>

            <div class="bubble received">That menu animation is smooth. Try clicking the bubble!</div>
        </section>

        <!-- Mock iOS Menu -->
        <div class="ios-menu" id="iosMenu">
            <div class="menu-item"><span>Reply</span><span class="menu-icon">↩️</span></div>
            <div class="menu-item"><span>Copy</span><span class="menu-icon">📄</span></div>
            <div class="menu-item"><span>Translate</span><span class="menu-icon">🌐</span></div>
            <div class="menu-item" style="color: #ff3b30;"><span>Delete</span><span class="menu-icon">🗑️</span></div>
        </div>

        <div class="input-bar">
            <div class="add-btn">+</div>
            <div class="text-input">iMessage</div>
            <div class="send-btn">↑</div>
        </div>
    </div>

    <script>
        const bubbles = document.querySelectorAll('.bubble');
        const menu = document.getElementById('iosMenu');

        bubbles.forEach(bubble => {
            bubble.addEventListener('click', (e) => {
                const rect = bubble.getBoundingClientRect();
                menu.style.display = 'block';
                menu.style.bottom = `${window.innerHeight - rect.bottom + 10}px`;
                menu.style.right = bubble.classList.contains('sent') ? '20px' : 'auto';
                menu.style.left = bubble.classList.contains('received') ? '20px' : 'auto';
            });
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.bubble') && !e.target.closest('.ios-menu')) {
                menu.style.display = 'none';
            }
        });
    </script>
</body>

</html>
