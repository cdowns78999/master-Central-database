<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Peugeot Shop | Premium</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@800&family=Inter:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="app-shell">
        <div id="screen-mount" class="screen-mount">
            <!-- Screen content injected here -->
        </div>

        <nav class="tab-bar">
            <!-- Home -->
            <div class="tab-item active" onclick="app.load('home')">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                    <polyline points="9 22 9 12 15 12 15 22" />
                </svg>
            </div>
            <!-- Map -->
            <div class="tab-item">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6" />
                    <line x1="8" y1="2" x2="8" y2="18" />
                    <line x1="16" y1="6" x2="16" y2="22" />
                </svg>
            </div>
            <!-- Cart (Active Glow Inspired) -->
            <div class="tab-item"
                style="background: var(--primary-glow); width: 55px; height: 55px; border-radius: 18px; display: flex; align-items: center; justify-content: center; color: white; margin-top: -15px; box-shadow: var(--shadow-active);">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
                    <circle cx="9" cy="21" r="1" />
                    <circle cx="20" cy="21" r="1" />
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
                </svg>
            </div>
            <!-- Profile -->
            <div class="tab-item">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg>
            </div>
            <!-- Documents -->
            <div class="tab-item">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                    <polyline points="14 2 14 8 20 8" />
                </svg>
            </div>
        </nav>
    </div>

    <script>
        const app = {
            data: null,
            async init() {
                const res = await fetch('data.json');
                this.data = await res.json();
                this.load('home');
            },
            async load(screen) {
                const mount = document.getElementById('screen-mount');
                try {
                    const res = await fetch(`screens/${screen}.html`);
                    const html = await res.text();
                    mount.innerHTML = html;

                    // Update Active Tab UI
                    document.querySelectorAll('.tab-item').forEach(i => i.classList.remove('active'));
                    // Logic to find active tab could be added here
                } catch (e) { console.error(e); }
            }
        };
        app.init();
    </script>
</body>

</html>
