<div class="detail-header" style="padding: 40px 0 20px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <div style="width: 45px; height: 45px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center;"
            onclick="app.load('detail')">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
                <path d="M19 12H5M12 19l-7-7 7-7" />
            </svg>
        </div>
        <h2 style="font-size: 1.5rem;">Mobile Ticket</h2>
        <div
            style="width: 45px; height: 45px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
                <circle cx="12" cy="12" r="1" />
                <circle cx="12" cy="5" r="1" />
                <circle cx="12" cy="19" r="1" />
            </svg>
        </div>
    </div>
    <p style="text-align: center; color: var(--text-muted); margin: 0 auto 40px; max-width: 250px; line-height: 1.5;">
        Once you buy a movie ticket simply scan the barcode to access to your movie.
    </p>
</div>

<div class="ticket-container" style="position: relative; perspective: 1000px; display: flex; justify-content: center;">
    <!-- Pseudo stacking effect icons from screen -->
    <div class="glass-panel"
        style="position: absolute; width: 85%; height: 450px; transform: rotate(-5deg) translateZ(-50px); opacity: 0.5;">
    </div>
    <div class="glass-panel"
        style="position: absolute; width: 85%; height: 450px; transform: rotate(5deg) translateZ(-50px); opacity: 0.5;">
    </div>

    <div class="ticket-main glass-panel"
        style="width: 92%; height: 500px; padding: 0; overflow: hidden; position: relative; border-radius: 40px; box-shadow: 0 30px 60px rgba(0,0,0,0.5);">
        <div style="height: 65%; overflow: hidden;">
            <img src="https://images.unsplash.com/photo-1635805737707-575885ab0820?q=80&w=1000"
                style="width: 100%; height: 100%; object-fit: cover;">
        </div>

        <div class="ticket-info" style="padding: 20px; background: white; color: #333; height: 35%;">
            <div
                style="display: flex; justify-content: space-between; margin-bottom: 20px; border-bottom: 2px dashed #ddd; padding-bottom: 15px;">
                <div>
                    <span
                        style="color: #999; font-size: 0.7rem; text-transform: uppercase; font-weight: 700;">Date</span>
                    <p style="font-weight: 800; color: #1a0b2e;">April 23</p>
                </div>
                <div>
                    <span
                        style="color: #999; font-size: 0.7rem; text-transform: uppercase; font-weight: 700;">Time</span>
                    <p style="font-weight: 800; color: #1a0b2e;">6 p.m.</p>
                </div>
            </div>

            <div style="display: flex; justify-content: center; align-items: center; flex-direction: column;">
                <!-- Barcode visual -->
                <div
                    style="width: 100%; height: 40px; background-image: repeating-linear-gradient(90deg, #333, #333 2px, transparent 2px, transparent 6px);">
                </div>
                <p style="letter-spacing: 5px; font-weight: 600; font-size: 0.8rem; margin-top: 10px;">0987654321</p>
            </div>
        </div>

        <!-- Punch holes effect -->
        <div
            style="position: absolute; top: 65%; left: -15px; width: 30px; height: 30px; background: var(--bg-deep); border-radius: 50%; transform: translateY(-50%);">
        </div>
        <div
            style="position: absolute; top: 65%; right: -15px; width: 30px; height: 30px; background: var(--bg-deep); border-radius: 50%; transform: translateY(-50%);">
        </div>
    </div>
</div>
