<div class="detail-header"
    style="height: 400px; margin: -20px -20px 0 -20px; position: relative; overflow: hidden; border-radius: 0 0 50px 50px;">
    <img src="https://images.unsplash.com/photo-1612036782180-6f0b6cd846fe?q=80&w=1000"
        style="width: 100%; height: 100%; object-fit: cover;">
    <div style="position: absolute; top: 40px; left: 20px; width: 45px; height: 45px; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.2);"
        onclick="app.load('home')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
            <path d="M19 12H5M12 19l-7-7 7-7" />
        </svg>
    </div>
    <div
        style="position: absolute; bottom: 0; left: 0; right: 0; padding: 60px 20px 30px; background: linear-gradient(transparent, var(--bg-deep)); text-align: center;">
        <h1 style="font-size: 2.5rem; margin-bottom: 5px;">Doctor Strange</h1>
        <p style="color: var(--text-muted); font-size: 1.1rem;">in the Multiverse of Madness</p>
    </div>
</div>

<div class="content">
    <div style="margin: 30px 0;">
        <p style="color: var(--text-muted); line-height: 1.6; font-size: 1rem;">
            Dr. Stephen Strange casts a forbidden spell that opens the doorway to the multiverse, including alternate
            versions of <b>...read more</b>
        </p>
    </div>

    <h3
        style="margin-bottom: 25px; text-align: center; font-size: 1.1rem; letter-spacing: 1px; color: var(--text-muted); text-transform: uppercase;">
        Select date and time</h3>

    <div class="date-selector" style="display: flex; gap: 15px; overflow-x: auto; padding: 10px 0 30px;">
        <div class="date-card glass-panel"
            style="min-width: 75px; padding: 15px 10px; text-align: center; display: flex; flex-direction: column; gap: 8px;">
            <span style="font-size: 0.8rem; text-transform: uppercase; color: var(--text-muted);">Thu</span>
            <span style="font-size: 1.4rem; font-weight: 800;">21</span>
        </div>
        <div class="date-card glass-panel"
            style="min-width: 75px; padding: 15px 10px; text-align: center; display: flex; flex-direction: column; gap: 8px;">
            <span style="font-size: 0.8rem; text-transform: uppercase; color: var(--text-muted);">Fri</span>
            <span style="font-size: 1.4rem; font-weight: 800;">22</span>
        </div>
        <div class="date-card"
            style="min-width: 85px; padding: 25px 10px; text-align: center; display: flex; flex-direction: column; gap: 10px; background: linear-gradient(135deg, var(--accent-pink), var(--primary)); border-radius: 20px; box-shadow: 0 15px 30px rgba(255, 0, 222, 0.3);">
            <span style="font-size: 0.8rem; text-transform: uppercase; font-weight: 700;">Sat</span>
            <span style="font-size: 1.6rem; font-weight: 800;">23</span>
        </div>
        <div class="date-card glass-panel"
            style="min-width: 75px; padding: 15px 10px; text-align: center; display: flex; flex-direction: column; gap: 8px;">
            <span style="font-size: 0.8rem; text-transform: uppercase; color: var(--text-muted);">Sun</span>
            <span style="font-size: 1.4rem; font-weight: 800;">24</span>
        </div>
        <div class="date-card glass-panel"
            style="min-width: 75px; padding: 15px 10px; text-align: center; display: flex; flex-direction: column; gap: 8px;">
            <span style="font-size: 0.8rem; text-transform: uppercase; color: var(--text-muted);">Mon</span>
            <span style="font-size: 1.4rem; font-weight: 800;">25</span>
        </div>
    </div>

    <div class="time-selector"
        style="display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-bottom: 40px;">
        <div class="time-pill glass-panel"
            style="padding: 12px 22px; border-radius: 12px; font-weight: 700; border: 1px solid rgba(0, 242, 255, 0.3);">
            16:00</div>
        <div class="time-pill glass-panel"
            style="padding: 12px 22px; border-radius: 12px; font-weight: 700; border: 1px solid rgba(0, 242, 255, 0.3);">
            17:00</div>
        <div class="time-pill"
            style="padding: 12px 22px; border-radius: 12px; font-weight: 700; background: var(--accent-cyan); color: var(--bg-deep);">

        <div class="time-pill glass-panel"
            style="padding: 12px 22px; border-radius: 12px; font-weight: 700; border: 1px solid rgba(0, 242, 255, 0.3);">
            19:00</div>
        <div class="time-pill glass-panel"
            style="padding: 12px 22px; border-radius: 12px; font-weight: 700; border: 1px solid rgba(0, 242, 255, 0.3);">
            20:00</div>

    <button class="btn-primary"
        style="width: 100%; border-radius: 30px; height: 75px; font-size: 1.2rem; margin-bottom: 40px;"
        onclick="app.load('ticket')">Reservation</button>
</div>
