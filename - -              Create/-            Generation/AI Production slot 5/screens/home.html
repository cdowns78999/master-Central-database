<div class="home-header"
    style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; padding-top: 20px;">
    <div>
        <p style="color: var(--text-muted); font-size: 0.85rem; letter-spacing: 1px; margin-bottom: 5px;">Welcome back,
        </p>
        <h1 style="font-size: 1.8rem; font-family: 'Outfit';">Chad Downs</h1>
    </div>
    <div style="width: 50px; height: 50px; border-radius: 50%; border: 3px solid var(--accent-blue); padding: 2px;">
        <img src="https://via.placeholder.com/50" style="width: 100%; height: 100%; border-radius: 50%;"
            alt="User Avatar">
    </div>
</div>

<div class="search-bar asset-card"
    style="padding: 16px 20px; display: flex; align-items: center; gap: 15px; margin-bottom: 40px; background: var(--bg-darkest);">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2.5">
        <circle cx="11" cy="11" r="8" />
        <line x1="21" y1="21" x2="16.65" y2="16.65" />
    </svg>
    <input type="text" placeholder="Search for bikes, brands..."
        style="background: none; border: none; color: white; width: 100%; outline: none; font-size: 1rem;">
</div>

<div class="category-scroll"
    style="display: flex; gap: 12px; overflow-x: auto; padding-bottom: 20px; margin-bottom: 30px;">
    <div class="pill active-glow" style="padding: 14px 28px; border-radius: 16px; font-weight: 700; font-size: 0.9rem;">
        All</div>
    <div class="pill asset-card" style="padding: 14px 28px; border-radius: 16px; font-weight: 700; font-size: 0.9rem;">
        Road</div>
    <div class="pill asset-card" style="padding: 14px 28px; border-radius: 16px; font-weight: 700; font-size: 0.9rem;">
        Mountain</div>
    <div class="pill asset-card" style="padding: 14px 28px; border-radius: 16px; font-weight: 700; font-size: 0.9rem;">
        Urban</div>
</div>

<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
    <h2 style="font-size: 1.4rem; font-family: 'Outfit';">Featured Products</h2>
    <span style="color: var(--accent-blue); font-weight: 700; font-size: 0.9rem;">View All</span>
</div>

<!-- Product List -->
<div class="product-grid" style="display: flex; flex-direction: column; gap: 25px;">

    <div class="bike-item asset-card" style="padding: 20px; position: relative; overflow: hidden;"
        onclick="app.load('detail')">
        <div
            style="position: absolute; top: 20px; right: 20px; width: 35px; height: 35px; background: rgba(255,255,255,0.05); border-radius: 50%; display: flex; align-items: center; justify-content: center;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                <path
                    d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l8.84-8.84 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
            </svg>
        </div>
        <div style="height: 180px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px;">
            <img src="https://images.unsplash.com/photo-1485965120184-e220f721d03e?q=80&w=1000"
                style="max-width: 100%; max-height: 100%; object-fit: contain;" alt="Peugeot Bike">
        </div>
        <div style="display: flex; justify-content: space-between; align-items: flex-end;">
            <div>
                <p
                    style="color: var(--text-muted); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; margin-bottom: 4px;">
                    Road Bike</p>
                <h3 style="font-size: 1.25rem;">PEUGEOT - LR01</h3>
                <p style="color: var(--accent-blue); font-weight: 800; font-size: 1.1rem; margin-top: 8px;">$ 1,999.99
                </p>
            </div>
            <div class="active-glow"
                style="width: 45px; height: 45px; border-radius: 14px; display: flex; align-items: center; justify-content: center;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3">
                    <path d="M12 5v14M5 12h14" />
                </svg>
            </div>
        </div>
    </div>

    <!-- Second Bike -->
    <div class="bike-item asset-card" style="padding: 20px; position: relative; overflow: hidden;">
        <div style="height: 180px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px;">
            <img src="https://images.unsplash.com/photo-1507035895480-2b3156c31fc8?q=80&w=1000"
                style="max-width: 100%; max-height: 100%; object-fit: contain;" alt="Pilot Bike">
        </div>
        <div style="display: flex; justify-content: space-between; align-items: flex-end;">
            <div>
                <p
                    style="color: var(--text-muted); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; margin-bottom: 4px;">
                    Mountain Bike</p>
                <h3 style="font-size: 1.25rem;">PILOT - CHROMOLY 520</h3>
                <p style="color: var(--accent-blue); font-weight: 800; font-size: 1.1rem; margin-top: 8px;">$ 3,899.99
                </p>
            </div>
            <div class="asset-card"
                style="width: 45px; height: 45px; border-radius: 14px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05);">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3">
                    <path d="M12 5v14M5 12h14" />
                </svg>
            </div>
        </div>
    </div>

</div>
