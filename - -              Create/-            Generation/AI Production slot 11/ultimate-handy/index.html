<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ULTIMATE HANDY | Evolution 11.0 - God-Mode</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="mobile-command god-mode">

    <!-- 🌌 Advanced Obsidian Pearl Mesh System -->
    <div class="mesh-bg">
        <div class="mesh-layer mesh-layer-1"></div>
        <div class="mesh-layer mesh-layer-2"></div>
        <div class="mesh-layer mesh-layer-3"></div>
        <div class="noise-overlay"></div>
    </div>

    <!-- 🏆 Elite Status Pill with Enhanced Depth -->
    <div class="focus-pill-wrapper">
        <div class="focus-pill elite" id="lock-pill" onclick="engine.toggleLock()">
            <div class="status-dot" id="lock-dot"></div>
            <div class="pill-content">
                <span id="rank-badge" class="rank-name">ROOKIE</span>
                <div class="xp-mini-bar">
                    <div class="xp-mini-fill" id="xp-fill" style="width: 45%;"></div>
                    <div class="xp-percentage" id="xp-percentage">45%</div>
                </div>
            </div>
            <div class="pill-glow"></div>
        </div>
    </div>

    <!-- 📱 Enhanced Main Viewport -->
    <main class="viewport">
        <header class="view-header">
            <div class="header-accent"></div>
            <h1 id="page-title">Command Center</h1>
            <p id="page-subtitle">On-the-fly Artist Utility</p>
        </header>

        <div id="stage-mount" class="command-grid">
            <!-- Dynamic Content Injected Here -->
        </div>
    </main>

    <!-- 🧭 Ultimate Navigation Bar with God-Mode Aesthetics -->
    <nav class="bottom-nav frost-bar">
        <div class="nav-blur"></div>
        <div class="nav-item active" onclick="app.switch('command', this)">
            <div class="nav-icon-container">
                <span class="nav-icon">🏠</span>
                <div class="icon-ripple"></div>
            </div>
            <span class="nav-label">Command</span>
        </div>
        <div class="nav-item" onclick="app.switch('vault', this)">
            <div class="nav-icon-container">
                <span class="nav-icon">📍</span>
                <div class="icon-ripple"></div>
            </div>
            <span class="nav-label">Vault</span>
        </div>

        <!-- ⚡ Elevated Central Command Button -->
        <div class="nav-item center-cmd">
            <div class="btn-command elite" onclick="engine.add()">
                <span class="command-icon">🔳</span>
                <div class="command-pulse"></div>
                <div class="command-glow"></div>
            </div>
        </div>

        <div class="nav-item" onclick="app.switch('lab', this)">
            <div class="nav-icon-container">
                <span class="nav-icon">🔬</span>
                <div class="icon-ripple"></div>
            </div>
            <span class="nav-label">The Lab</span>
        </div>
        <div class="nav-item" onclick="app.switch('grid', this)">
            <div class="nav-icon-container">
                <span class="nav-icon">🔲</span>
                <div class="icon-ripple"></div>
            </div>
            <span class="nav-label">Grid</span>
        </div>
    </nav>

    <!-- ⚡ Enhanced Anomaly Overlay System -->
    <div id="anomaly-overlay" class="god-mode-anomaly">
        <div class="anomaly-backdrop"></div>
        <div class="glitch-msg" id="anomaly-text">BREACH</div>
        <div class="scan-lines"></div>
    </div>

    <!-- 📱 iOS Handle with Premium Styling -->
    <div class="ios-handle">
        <div class="handle-inner"></div>
    </div>

    <!-- 🎯 Floating XP Popup Container -->
    <div id="xp-popup-container"></div>

    <!-- 🏆 Level Up Overlay -->
    <div id="level-up-overlay" class="level-up-flash">
        <div class="rank-announcement">
            <div class="rank-icon">👑</div>
            <div class="rank-title" id="rank-title">ELITE UNLOCKED</div>
        </div>
    </div>

    <script src="engine.js"></script>
    <script>
        const app = {
            switch(view, el) {
                // Enhanced ripple effect
                if (el) {
                    const ripple = el.querySelector('.icon-ripple');
                    if (ripple) {
                        ripple.style.animation = 'none';
                        setTimeout(() => ripple.style.animation = 'iconRipple 0.6s ease-out', 10);
                    }
                }

                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                el.classList.add('active');

                const title = document.getElementById('page-title');
                const subtitle = document.getElementById('page-subtitle');

                if (view === 'command') {
                    engine.render();
                    title.innerText = "Command Center";
                    subtitle.innerText = "On-the-fly Artist Utility";
                } else {
                    document.getElementById('stage-mount').innerHTML = `
                        <div class="handy-card construction-card">
                            <div class="construction-header">
                                <div class="construction-icon">🔒</div>
                                <h2>${view.toUpperCase()} SECURE</h2>
                            </div>
                            <p>Handy logical drive encrypted with quantum protection...</p>
                            <div class="tech-id">ENGINE: ULTIMATE-11.0 | MODE: GOD-CLASS</div>
                            <div class="security-seal">
                                <div class="seal-ring"></div>
                                <span>HANDY EDITION</span>
                            </div>
                        </div>
                    `;
                    title.innerText = view.charAt(0).toUpperCase() + view.slice(1);
                    subtitle.innerText = "Authorized Personal use Only";
                }
                
                // Enhanced haptic feedback
                window.navigator.vibrate?.([30, 10, 30]);
            }
        };

        // Initialize with premium fade-in
        window.addEventListener('load', () => {
            document.body.style.opacity = '0';
            setTimeout(() => {
                document.body.style.transition = 'opacity 1s ease-out';
                document.body.style.opacity = '1';
            }, 100);
            engine.render();
        });
    </script>
</body>

</html>
