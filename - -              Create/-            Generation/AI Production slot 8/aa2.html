<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gothic Thorns: Dark Victorian Kinetics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --obsidian: #0a0a0c;
            --blood: #4a0404;
            --iron: #7b7b7b;
            --thorn-color: #1a1a1a;
            --vine-base: #142111;
            --glow-red: rgba(255, 0, 0, 0.2);
            --transition-organic: all 2s cubic-bezier(0.19, 1, 0.22, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: pointer;
        }

        body {
            background-color: var(--obsidian);
            background-image:
                radial-gradient(circle at center, rgba(74, 4, 4, 0.15) 0%, transparent 70%),
                url('https://www.transparenttextures.com/patterns/black-linen-2.png');
            color: #d1d1d1;
            font-family: 'Playfair Display', serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .header {
            position: absolute;
            top: 40px;
            text-align: center;
            z-index: 10;
        }

        .header h1 {
            font-family: 'UnifrakturMaguntia', cursive;
            font-size: 4rem;
            color: var(--iron);
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            margin-bottom: 5px;
        }

        .header p {
            font-style: italic;
            opacity: 0.5;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 4px;
        }

        /* --- STAGE --- */
        .stage {
            position: relative;
            width: 100%;
            max-width: 1100px;
            height: 600px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 50px;
        }

        /* --- NODES --- */
        .node-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            z-index: 5;
        }

        .node {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--iron);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: var(--transition-organic);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
        }

        .node.center {
            width: 220px;
            height: 220px;
            border-color: #333;
        }

        .node::before {
            content: '';
            position: absolute;
            inset: -5px;
            border-radius: 50%;
            border: 1px solid rgba(123, 123, 123, 0.1);
            animation: pulse-border 4s ease-in-out infinite;
        }

        @keyframes pulse-border {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.1;
            }

            50% {
                transform: scale(1.1);
                opacity: 0.3;
            }
        }

        .node-label {
            font-family: 'UnifrakturMaguntia', cursive;
            font-size: 1.5rem;
            color: var(--iron);
            pointer-events: none;
            transition: var(--transition-organic);
        }

        .center .node-label {
            font-size: 2.5rem;
        }

        /* --- VINES (Realistic Thorns) --- */
        .vines-svg {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }

        .vine-path {
            fill: none;
            stroke: var(--vine-base);
            stroke-width: 3;
            stroke-linecap: round;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            transition: stroke-dashoffset 4s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .thorn {
            fill: var(--thorn-color);
            opacity: 0;
            transition: opacity 0.5s calc(var(--delay) * 1s);
        }

        .grown .thorn {
            opacity: 1;
        }

        /* --- SWITCH --- */
        .gothic-switch {
            background: transparent;
            border: 1px solid #333;
            color: var(--iron);
            padding: 8px 20px;
            font-family: inherit;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 2px;
            border-radius: 0;
            transition: 0.3s;
        }

        .gothic-switch:hover {
            border-color: var(--blood);
            color: white;
            background: rgba(74, 4, 4, 0.2);
            box-shadow: 0 0 15px var(--glow-red);
        }

        .gothic-switch.active {
            border-color: var(--blood);
            background: var(--blood);
            color: white;
        }

        /* --- CENTER LIGHT UP --- */
        .lit-up {
            border-color: var(--blood) !important;
            box-shadow: 0 0 60px var(--blood), inset 0 0 20px var(--blood) !important;
        }

        .lit-up .node-label {
            color: #ff0000;
            text-shadow: 0 0 10px #ff0000;
        }
    </style>
</head>

<body>

    <header class="header">
        <h1>Gothic Thorns</h1>
        <p>A Darker Manifestation of Completion</p>
    </header>

    <div class="stage">
        <svg class="vines-svg" viewBox="0 0 1100 600">
            <!-- Left Vine Group -->
            <g id="group-left">
                <path id="vine-left" class="vine-path" d="M 120,300 Q 300,250 550,300" />
                <!-- Thorns along the path -->
                <polygon points="250,270 260,285 240,285" class="thorn" style="--delay: 1;" />
                <polygon points="350,265 365,280 345,285" class="thorn" style="--delay: 1.5;" />
                <polygon points="450,280 460,300 440,300" class="thorn" style="--delay: 2;" />
            </g>

            <!-- Right Vine Group -->
            <g id="group-right">
                <path id="vine-right" class="vine-path" d="M 980,300 Q 800,250 550,300" />
                <polygon points="850,270 860,285 840,285" class="thorn" style="--delay: 1;" />
                <polygon points="750,265 765,280 745,285" class="thorn" style="--delay: 1.5;" />
                <polygon points="650,280 660,300 640,300" class="thorn" style="--delay: 2;" />
            </g>
        </svg>

        <!-- Node Left -->
        <div class="node-container">
            <div class="node" id="node-left">
                <div class="node-label">Sin</div>
            </div>
            <button class="gothic-switch" onclick="authorize('left')">Imprint</button>
        </div>

        <!-- Node Center -->
        <div class="node-container">
            <div class="node center" id="node-center">
                <div class="node-label">Void</div>
            </div>
        </div>

        <!-- Node Right -->
        <div class="node-container">
            <div class="node" id="node-right">
                <div class="node-label">Pain</div>
            </div>
            <button class="gothic-switch" onclick="authorize('right')">Imprint</button>
        </div>
    </div>

    <script>
        const states = { left: false, right: false };

        function authorize(side) {
            states[side] = !states[side];
            const btn = event.target;
            const path = document.getElementById(`vine-${side}`);
            const group = document.getElementById(`group-${side}`);

            if (states[side]) {
                btn.classList.add('active');
                path.style.strokeDashoffset = '0';
                group.classList.add('grown');
            } else {
                btn.classList.remove('active');
                path.style.strokeDashoffset = '1000';
                group.classList.remove('grown');
            }

            checkVoid();
        }

        function checkVoid() {
            const center = document.getElementById('node-center');
            const label = center.querySelector('.node-label');

            if (states.left && states.right) {
                center.classList.add('lit-up');
                label.innerText = 'Ascension';
            } else {
                center.classList.remove('lit-up');
                label.innerText = 'Void';
            }
        }

        // Magnetic Drag/Attraction (Aggressive)
        document.addEventListener('mousemove', (e) => {
            const nodes = document.querySelectorAll('.node');
            nodes.forEach(n => {
                const rect = n.getBoundingClientRect();
                const cx = rect.left + rect.width / 2;
                const cy = rect.top + rect.height / 2;
                const dx = e.clientX - cx;
                const dy = e.clientY - cy;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < 400) {
                    const intense = (400 - dist) / 400;
                    n.style.transform = `translate(${dx * 0.15 * intense}px, ${dy * 0.15 * intense}px) scale(${1 + 0.1 * intense})`;
                    n.style.borderColor = `rgba(123,123,123, ${0.2 + 0.8 * intense})`;
                } else {
                    n.style.transform = `translate(0,0) scale(1)`;
                    n.style.borderColor = `rgba(123,123,123, 0.2)`;
                }
            });
        });

    </script>
</body>

</html>
