<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spectral Victorian: Ethereal Kinetics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --spectral-blue: #a8dadc;
            --ethereal-white: #f8f9fa;
            --phantom-gray: #343a40;
            --aura-glow: rgba(168, 218, 220, 0.4);
            --transition-fluid: all 1.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        body {
            background-color: #0d1117;
            background-image:
                radial-gradient(circle at center, #1b263b 0%, #0d1117 100%);
            color: var(--ethereal-white);
            font-family: 'Playfair Display', serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #custom-cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            background: var(--spectral-blue);
            border-radius: 50%;
            pointer-events: none;
            z-index: 10000;
            mix-blend-mode: screen;
            box-shadow: 0 0 20px var(--spectral-blue);
            transition: transform 0.1s ease-out;
        }

        .header {
            position: absolute;
            top: 50px;
            text-align: center;
            z-index: 10;
        }

        .header h1 {
            font-family: 'Josefin Sans', sans-serif;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 15px;
            font-size: 2.5rem;
            color: var(--spectral-blue);
            opacity: 0.8;
        }

        /* --- STAGE --- */
        .stage {
            position: relative;
            width: 100%;
            max-width: 1200px;
            height: 600px;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        /* --- NODES --- */
        .node-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            z-index: 5;
        }

        .spectral-node {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(168, 218, 220, 0.2);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: var(--transition-fluid);
        }

        .spectral-node.large {
            width: 240px;
            height: 240px;
        }

        .spectral-node::after {
            content: '';
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            border: 1px solid rgba(168, 218, 220, 0.1);
            animation: breathe 8s ease-in-out infinite;
        }

        @keyframes breathe {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.1;
            }

            50% {
                transform: scale(1.2);
                opacity: 0.3;
            }
        }

        .node-label {
            font-family: 'Josefin Sans', sans-serif;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 0.8rem;
            opacity: 0.6;
            pointer-events: none;
        }

        .large .node-label {
            font-size: 1.5rem;
            letter-spacing: 5px;
        }

        /* --- SPECTRAL VINES --- */
        .vines-svg {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }

        .spectral-vine {
            fill: none;
            stroke: var(--spectral-blue);
            stroke-width: 2;
            stroke-dasharray: 2000;
            stroke-dashoffset: 2000;
            opacity: 0.1;
            transition: stroke-dashoffset 2.5s cubic-bezier(0.23, 1, 0.32, 1), opacity 1s;
            filter: blur(1px);
        }

        .active-vine {
            stroke-dashoffset: 0;
            opacity: 0.6;
            filter: blur(0px) drop-shadow(0 0 10px var(--spectral-blue));
        }

        /* --- LIGHT BUTTON --- */
        .ghost-btn {
            background: transparent;
            border: 1px solid rgba(168, 218, 220, 0.3);
            color: var(--spectral-blue);
            padding: 10px 25px;
            font-family: 'Josefin Sans', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.4s;
        }

        .ghost-btn:hover {
            background: rgba(168, 218, 220, 0.1);
            border-color: var(--spectral-blue);
            box-shadow: 0 0 20px var(--aura-glow);
        }

        .ghost-btn.on {
            background: var(--spectral-blue);
            color: #0d1117;
            box-shadow: 0 0 30px var(--spectral-blue);
        }

        /* --- TOTAL MANIFESTATION --- */
        .manifested {
            background: rgba(168, 218, 220, 0.1) !important;
            border-color: var(--spectral-blue) !important;
            box-shadow: 0 0 80px var(--aura-glow), inset 0 0 40px var(--aura-glow) !important;
            transform: scale(1.1) !important;
        }
    </style>
</head>

<body>

    <div id="custom-cursor"></div>

    <header class="header">
        <h1>Spectral Reach</h1>
    </header>

    <div class="stage">
        <svg class="vines-svg" viewBox="0 0 1200 600">
            <!-- Left Ethereal Vine -->
            <path id="vine-l" class="spectral-vine" d="M 200,300 C 400,100 500,500 600,300" />
            <path class="spectral-vine" d="M 200,300 C 400,500 500,100 600,300" style="stroke-width: 1; opacity: 0.05;"
                id="vine-l-sub" />

            <!-- Right Ethereal Vine -->
            <path id="vine-r" class="spectral-vine" d="M 1000,300 C 800,100 700,500 600,300" />
            <path class="spectral-vine" d="M 1000,300 C 800,500 700,100 600,300" style="stroke-width: 1; opacity: 0.05;"
                id="vine-r-sub" />
        </svg>

        <!-- Node 1 -->
        <div class="node-container">
            <div class="spectral-node" id="node-1">
                <div class="node-label">Echo</div>
            </div>
            <button class="ghost-btn" onclick="ignite(1)">Ignite</button>
        </div>

        <!-- Center Node -->
        <div class="node-container">
            <div class="spectral-node large" id="node-center">
                <div class="node-label">Nexus</div>
            </div>
        </div>

        <!-- Node 2 -->
        <div class="node-container">
            <div class="spectral-node" id="node-2">
                <div class="node-label">Pulse</div>
            </div>
            <button class="ghost-btn" onclick="ignite(2)">Ignite</button>
        </div>
    </div>

    <script>
        const states = { 1: false, 2: false };
        const cursor = document.getElementById('custom-cursor');

        document.addEventListener('mousemove', (e) => {
            cursor.style.transform = `translate(${e.clientX - 10}px, ${e.clientY - 10}px)`;

            // Kinetic reaction
            const nodes = document.querySelectorAll('.spectral-node');
            nodes.forEach(node => {
                const rect = node.getBoundingClientRect();
                const cx = rect.left + rect.width / 2;
                const cy = rect.top + rect.height / 2;
                const dx = e.clientX - cx;
                const dy = e.clientY - cy;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < 300) {
                    const power = (300 - dist) / 300;
                    node.style.transform = `translate(${dx * 0.1 * power}px, ${dy * 0.1 * power}px)`;
                    node.style.background = `rgba(168, 218, 220, ${0.03 + 0.1 * power})`;
                } else {
                    node.style.transform = `translate(0,0)`;
                    node.style.background = `rgba(255, 255, 255, 0.03)`;
                }
            });
        });

        function ignite(id) {
            states[id] = !states[id];
            const btn = event.target;
            const side = id === 1 ? 'l' : 'r';
            const mainVine = document.getElementById(`vine-${side}`);
            const subVine = document.getElementById(`vine-${side}-sub`);

            if (states[id]) {
                btn.classList.add('on');
                mainVine.classList.add('active-vine');
                subVine.classList.add('active-vine');
                document.getElementById(`node-${id}`).style.borderColor = 'var(--spectral-blue)';
            } else {
                btn.classList.remove('on');
                mainVine.classList.remove('active-vine');
                subVine.classList.remove('active-vine');
                document.getElementById(`node-${id}`).style.borderColor = 'rgba(168, 218, 220, 0.2)';
            }

            checkNexus();
        }

        function checkNexus() {
            const center = document.getElementById('node-center');
            const label = center.querySelector('.node-label');
            if (states[1] && states[2]) {
                center.classList.add('manifested');
                label.innerText = 'Transcendence';
            } else {
                center.classList.remove('manifested');
                label.innerText = 'Nexus';
            }
        }
    </script>
</body>

</html>
