<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Manifest: Simulation Node System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --gold-glow: rgba(212, 175, 55, 0.4);
            --bg: #0a0a0c;
            --row-bg: rgba(255, 255, 255, 0.02);
            --node-border: rgba(212, 175, 55, 0.2);
            --transition-row: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
            --transition-node: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scrollbar-width: thin;
            scrollbar-color: var(--gold) var(--bg);
        }

        body {
            background-color: var(--bg);
            background-image:
                radial-gradient(circle at center, #1b1b22 0%, #0a0a0c 100%),
                url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            color: #fff;
            font-family: 'Josefin Sans', sans-serif;
            min-height: 100vh;
            padding: 40px;
            overflow-x: hidden;
        }

        /* --- HEADER & CONTROLS --- */
        .manifest-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--node-border);
        }

        .title-group h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--gold);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .title-group p {
            font-weight: 300;
            opacity: 0.6;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .global-actions {
            display: flex;
            gap: 20px;
        }

        .btn-manifest {
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 12px 25px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 2px;
        }

        .btn-manifest:hover {
            background: var(--gold);
            color: var(--bg);
            box-shadow: 0 0 20px var(--gold-glow);
        }

        /* --- MANIFEST CONTAINER --- */
        #manifest-stage {
            display: flex;
            flex-direction: column;
            gap: 100px;
            padding-bottom: 200px;
        }

        /* --- ROW SYSTEM --- */
        .manifest-row {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            padding: 40px;
            background: var(--row-bg);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: buildRow 1s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes buildRow {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .node-side-group {
            display: flex;
            gap: 30px;
        }

        /* --- NODE DESIGN --- */
        .m-node {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid var(--node-border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            background: rgba(0, 0, 0, 0.4);
            transition: var(--transition-node);
            cursor: pointer;
        }

        .m-node.center {
            width: 160px;
            height: 160px;
            border-color: var(--gold);
            order: 2;
        }

        .m-node:hover {
            border-color: var(--gold);
            box-shadow: 0 0 15px var(--gold-glow);
            transform: scale(1.05);
        }

        .node-type-icon {
            font-size: 1.5rem;
            margin-bottom: 5px;
            transition: 0.3s;
        }

        .node-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.6;
        }

        /* --- NODE TYPE SELECTOR (MODAL-LIKE OVERLAY) --- */
        .type-overlay {
            position: absolute;
            inset: -5px;
            background: var(--bg);
            border-radius: 50%;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 5px;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
            z-index: 10;
            border: 1px solid var(--gold);
        }

        .m-node.selecting .type-overlay {
            opacity: 1;
            pointer-events: auto;
            border-radius: 10px;
            inset: -20px -80px;
            flex-direction: row;
            padding: 10px;
        }

        .type-opt {
            padding: 8px;
            font-size: 0.7rem;
            border: 1px solid #333;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
            flex: 1 1 40%;
            text-align: center;
        }

        .type-opt:hover {
            background: var(--gold);
            color: var(--bg);
        }

        /* --- VINES --- */
        .vines-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }

        .v-path {
            fill: none;
            stroke: #2d5a27;
            stroke-width: 2;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            transition: stroke-dashoffset 2s ease-in-out;
        }

        .v-path.active {
            stroke-dashoffset: 0;
            filter: drop-shadow(0 0 5px #2d5a27);
        }

        .auth-mark {
            position: absolute;
            top: -10px;
            right: -10px;
            width: 25px;
            height: 25px;
            background: #2d5a27;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: white;
            opacity: 0;
            transition: 0.3s;
        }

        .authorized .auth-mark {
            opacity: 1;
        }

        .authorized {
            border-color: #2d5a27 !important;
            background: rgba(45, 90, 39, 0.1) !important;
        }

        .center.authorized {
            border-color: var(--gold) !important;
            box-shadow: 0 0 30px var(--gold-glow) !important;
            background: rgba(212, 175, 55, 0.1) !important;
        }

        @keyframes shake {

            10%,
            90% {
                transform: translate3d(-1px, 0, 0);
            }

            20%,
            80% {
                transform: translate3d(2px, 0, 0);
            }

            30%,
            50%,
            70% {
                transform: translate3d(-4px, 0, 0);
            }

            40%,
            60% {
                transform: translate3d(4px, 0, 0);
            }
        }

        /* Hover Physics */
        .m-node:not(.selecting):active {
            transform: scale(0.95);
        }
    </style>
</head>

<body id="manifest-body">

    <header class="manifest-header">
        <div class="title-group">
            <h1>The Manifest</h1>
            <p>Sovereign Organizational Simulation</p>
        </div>
        <div class="global-actions">
            <button class="btn-manifest" onclick="addRow()">Add New Entry</button>
            <button class="btn-manifest" onclick="exportJSON()">Download JSON</button>
        </div>
    </header>

    <div id="manifest-stage">
        <!-- Rows will be injected here -->
    </div>

    <script>
        let rowCount = 0;
        const NODE_TYPES = {
            'Spotify': '🎵',
            'Press': '📰',
            'Social': '📱',
            'Other': '⭐'
        };

        function addRow() {
            rowCount++;
            const stage = document.getElementById('manifest-stage');
            const rowId = `row-${rowCount}`;

            const row = document.createElement('div');
            row.className = 'manifest-row';
            row.id = rowId;
            row.innerHTML = `
                <svg class="vines-layer" viewBox="0 0 1000 200">
                    <path class="v-path p-l1" d="M 100,100 C 200,50 350,50 500,100" />
                    <path class="v-path p-l2" d="M 230,100 C 330,150 430,150 500,100" />
                    <path class="v-path p-r1" d="M 900,100 C 800,50 650,50 500,100" />
                    <path class="v-path p-r2" d="M 770,100 C 670,150 570,150 500,100" />
                </svg>

                <div class="node-side-group left">
                    ${createNode(rowId, 'l1', 'Spotify')}
                    ${createNode(rowId, 'l2', 'Social')}
                </div>

                ${createNode(rowId, 'center', 'Nexus', true)}

                <div class="node-side-group right">
                    ${createNode(rowId, 'r1', 'Press')}
                    ${createNode(rowId, 'r2', 'Other')}
                </div>
            `;

            stage.appendChild(row);

            // Re-calc SVG lengths
            row.querySelectorAll('.v-path').forEach(p => {
                const l = p.getTotalLength();
                p.style.strokeDasharray = l;
                p.style.strokeDashoffset = l;
            });
        }

        function createNode(rowId, nodeId, defaultType, isCenter = false) {
            const fullId = `${rowId}-${nodeId}`;
            return `
                <div class="m-node ${isCenter ? 'center' : ''}" id="${fullId}" onclick="handleNodeClick('${fullId}')">
                    <div class="auth-mark">✓</div>
                    <div class="node-type-icon">${NODE_TYPES[defaultType] || '⚪'}</div>
                    <div class="node-label">${defaultType}</div>
                    
                    ${isCenter ? '' : `
                    <div class="type-overlay">
                        ${Object.keys(NODE_TYPES).map(t => `<div class="type-opt" onclick="setNodeType('${fullId}', '${t}')">${t}</div>`).join('')}
                    </div>
                    `}
                </div>
            `;
        }

        function handleNodeClick(id) {
            const node = document.getElementById(id);
            if (node.classList.contains('center')) {
                const row = node.closest('.manifest-row');
                const others = row.querySelectorAll('.m-node:not(.center)');
                const allAuth = Array.from(others).every(n => n.classList.contains('authorized'));
                if (allAuth) {
                    node.classList.toggle('authorized');
                    if (node.classList.contains('authorized')) {
                        triggerCompletionEffect(row);
                    }
                } else {
                    // Simulation style shake effect
                    node.style.animation = 'none';
                    node.offsetHeight;
                    node.style.animation = 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both';
                }
            } else {
                node.classList.toggle('authorized');
                updateVines(id);
                checkRowCompletion(node.closest('.manifest-row'));
            }
        }

        function checkRowCompletion(row) {
            const center = row.querySelector('.m-node.center');
            const others = row.querySelectorAll('.m-node:not(.center)');
            const allAuth = Array.from(others).every(n => n.classList.contains('authorized'));

            if (allAuth) {
                center.style.borderColor = 'var(--gold)';
                center.style.boxShadow = '0 0 30px var(--gold-glow)';
            } else {
                center.classList.remove('authorized');
                center.style.borderColor = 'var(--node-border)';
                center.style.boxShadow = 'none';
            }
        }

        function triggerCompletionEffect(row) {
            // Visual feedback for row completion
            row.style.boxShadow = 'inset 0 0 50px rgba(212, 175, 55, 0.1)';
            setTimeout(() => row.style.boxShadow = 'none', 1000);
        }

        function setNodeType(id, type) {
            event.stopPropagation();
            const node = document.getElementById(id);
            node.querySelector('.node-type-icon').innerText = NODE_TYPES[type];
            node.querySelector('.node-label').innerText = type;
            node.classList.remove('selecting');
        }

        // Logic to show type selector on right click
        document.addEventListener('contextmenu', (e) => {
            const node = e.target.closest('.m-node:not(.center)');
            if (node) {
                e.preventDefault();
                node.classList.toggle('selecting');
            }
        });

        function updateVines(nodeId) {
            const node = document.getElementById(nodeId);
            const row = node.closest('.manifest-row');
            const suffix = nodeId.split('-').pop(); // l1, l2, etc
            const path = row.querySelector(`.p-${suffix}`);

            if (node.classList.contains('authorized')) {
                path.classList.add('active');
            } else {
                path.classList.remove('active');
            }
        }

        function exportJSON() {
            const data = [];
            document.querySelectorAll('.manifest-row').forEach(row => {
                const rowData = { id: row.id, nodes: [] };
                row.querySelectorAll('.m-node').forEach(node => {
                    rowData.nodes.push({
                        id: node.id,
                        type: node.querySelector('.node-label').innerText,
                        authorized: node.classList.contains('authorized')
                    });
                });
                data.push(rowData);
            });

            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `manifest_${new Date().getTime()}.json`;
            a.click();
        }

        // Add first row on start
        window.onload = addRow;

    </script>
</body>

</html>
