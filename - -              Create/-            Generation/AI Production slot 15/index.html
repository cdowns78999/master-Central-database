<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>HANDY v15 | REPLICA SYSTEM</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;800;900&family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <style>
        .app-frame {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #top-hud {
            padding: calc(var(--safe-top) + 10px) 20px 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
        }

        .xp-container {
            flex: 1;
            margin: 0 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .xp-bar {
            width: 100%;
            max-width: 120px;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }

        .xp-fill {
            height: 100%;
            width: 45%;
            /* Dynamic */
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-vibrant));
            transition: width 0.6s var(--spring);
        }

        .rank-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--rank-color);
            letter-spacing: 1px;
        }

        #screen-mount {
            flex: 1;
            padding-bottom: 120px;
        }

        .tab-bar-container {
            position: absolute;
            bottom: calc(var(--safe-bottom) + 12px);
            left: 20px;
            right: 20px;
            height: 85px;
            background: rgba(11, 1, 29, 0.7);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 35px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 9999;
        }

        .tab-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-ghost);
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .tab-btn.active {
            color: var(--accent-cyan);
        }

        .tab-btn.center-island {
            width: 65px;
            height: 65px;
            background: linear-gradient(135deg, var(--accent-vibrant), #6e48aa);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -55px;
            box-shadow: 0 15px 30px rgba(255, 0, 204, 0.4);
            border: 4px solid var(--bg-void);
            color: white;
        }

        .icon {
            width: 24px;
            height: 24px;
            stroke-width: 2;
        }
    </style>
</head>

<body>

    <div class="mesh-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="app-frame">
        <header id="top-hud">
            <div class="rank-badge">RANK: ACE</div>
            <div class="xp-container">
                <div class="xp-bar">
                    <div class="xp-fill" id="xp-fill-indicator"></div>
                </div>
                <div style="font-size: 0.55rem; font-family: 'JetBrains Mono'; opacity: 0.5; margin-top: 4px;">XP: 2450
                    / 5000</div>
            </div>
            <div id="lock-toggle" style="opacity: 0.4;">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                    <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                </svg>
            </div>
        </header>

        <div id="screen-mount" class="scroll-hide"></div>

        <nav class="tab-bar-container">
            <div class="tab-btn active" onclick="app.load('home')">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                </svg>
            </div>
            <div class="tab-btn" onclick="app.load('map')">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                    <circle cx="12" cy="10" r="3" />
                </svg>
            </div>
            <div class="tab-btn center-island" onclick="app.load('wizard')">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3">
                    <line x1="12" y1="5" x2="12" y2="19" />
                    <line x1="5" y1="12" x2="19" y2="12" />
                </svg>
            </div>
            <div class="tab-btn" onclick="app.load('focus')">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <circle cx="12" cy="12" r="10" />
                    <circle cx="12" cy="12" r="3" />
                </svg>
            </div>
            <div class="tab-btn" onclick="app.load('profile')">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg>
            </div>
        </nav>
    </div>

    <!-- The Bundle -->
    <script src="screens.js"></script>

    <script>
        const app = {
            init() {
                this.load('home');
            },
            load(screenName) {
                const mount = document.getElementById('screen-mount');
                mount.style.opacity = '0';

                setTimeout(() => {
                    if (SCREENS[screenName]) {
                        mount.innerHTML = SCREENS[screenName];

                        // Update Tab UI
                        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                        const indexMap = { 'home': 0, 'map': 1, 'wizard': 2, 'focus': 3, 'profile': 4 };
                        document.querySelectorAll('.tab-btn')[indexMap[screenName]]?.classList.add('active');

                        mount.style.transition = 'opacity 0.4s ease';
                        mount.style.opacity = '1';
                        mount.scrollTop = 0;

                        // Execute screen-specific logic if exists
                        if (typeof window[`init_${screenName}`] === 'function') {
                            window[`init_${screenName}`]();
                        }
                    } else {
                        console.error(`[App Engine] Screen '${screenName}' not found.`);
                    }
                }, 100);
            }
        };

        window.addEventListener('load', () => app.init());
    </script>
</body>

</html>
