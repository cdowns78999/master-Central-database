<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Process Steps</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');

        :root {
            --bg: #010c1a;
            --primary: #4cc9f0;
            --accent: #4361ee;
            --text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.5);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --radius-lg: 35px;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            background-image:
                radial-gradient(circle at 10% 10%, #001219 0%, transparent 50%),
                radial-gradient(circle at 90% 90%, #003049 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, #1a2a6c 0%, transparent 80%);
            min-height: 100vh;
            font-family: 'Outfit', sans-serif;
            color: var(--text);
            padding: 4rem 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .step-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 2rem 3rem;
            transition: var(--transition);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .step-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            opacity: 0;
            transition: var(--transition);
            z-index: 0;
        }

        .step-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 40px rgba(76, 201, 240, 0.2);
        }

        .step-card:hover::before {
            opacity: 0.05;
        }

        .step-title {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            position: relative;
            z-index: 1;
            transition: var(--transition);
        }

        .step-card:hover .step-title {
            color: var(--primary);
            transform: translateX(10px);
        }

        .step-space {
            flex: 1;
            position: relative;
            z-index: 1;
            margin-left: 2rem;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }

        .step-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
            opacity: 0;
            transition: var(--transition);
        }

        .step-card:hover .step-indicator {
            opacity: 1;
            animation: pulse 2s infinite;
        }

        /* Special styling for Step 1 */
        .step-card.step-1 {
            background: rgba(76, 201, 240, 0.05);
        }

        .step-card.step-1:hover::before {
            opacity: 0.08;
        }

        /* New Phase special styling */
        .step-card.new-phase {
            background: rgba(255, 93, 143, 0.05);
            border-color: rgba(255, 93, 143, 0.3);
        }

        .step-card.new-phase::before {
            background: linear-gradient(135deg, #ff5d8f 0%, #7209b7 100%);
        }

        .step-card.new-phase:hover {
            border-color: #ff5d8f;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 40px rgba(255, 93, 143, 0.3);
        }

        .step-card.new-phase .step-indicator {
            background: #ff5d8f;
            box-shadow: 0 0 15px #ff5d8f;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.3);
                opacity: 0.7;
            }
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 3rem;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            color: var(--primary);
            opacity: 0.8;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">Process Framework</div>

        <div class="step-card step-1">
            <div class="step-title">Step 1 - Goal</div>
            <div class="step-space">
                <div class="step-indicator"></div>
            </div>
        </div>

        <div class="step-card">
            <div class="step-title">Step 2 - Max Things Out</div>
            <div class="step-space">
                <div class="step-indicator"></div>
            </div>
        </div>

        <div class="step-card">
            <div class="step-title">A - Spotify</div>
            <div class="step-space">
                <div class="step-indicator"></div>
            </div>
        </div>

        <div class="step-card">
            <div class="step-title">B - Content</div>
            <div class="step-space">
                <div class="step-indicator"></div>
            </div>
        </div>

        <div class="step-card">
            <div class="step-title">C - The Connections</div>
            <div class="step-space">
                <div class="step-indicator"></div>
            </div>
        </div>

        <div class="step-card new-phase">
            <div class="step-title">New Phase</div>
            <div class="step-space">
                <div class="step-indicator"></div>
            </div>
        </div>

        <div class="step-card">
            <div class="step-title">Step 6 - That's Why We Do a Weekly Call</div>
            <div class="step-space">
                <div class="step-indicator"></div>
            </div>
        </div>

        <div class="step-card">
            <div class="step-title">Step 7 - Long-Term Plan</div>
            <div class="step-space">
                <div class="step-indicator"></div>
            </div>
        </div>

        <div class="step-card">
            <div class="step-title">Step 8 - Return on Results</div>
            <div class="step-space">
                <div class="step-indicator"></div>
            </div>
        </div>

        <div class="step-card">
            <div class="step-title">Step 9 - Recap Last Year / Plan This Year</div>
            <div class="step-space">
                <div class="step-indicator"></div>
            </div>
        </div>
    </div>
</body>

</html>
