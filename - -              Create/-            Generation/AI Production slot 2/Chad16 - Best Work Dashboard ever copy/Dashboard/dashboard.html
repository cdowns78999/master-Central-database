<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocean Protocol | Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="sidebar">
        <div class="logo">
            <div class="logo-icon"></div>
            <span>OCEAN</span>
        </div>
        <div style="margin-top: 2rem; display: flex; flex-direction: column; gap: 8px;">
            <a href="index.html" class="nav-link">Hub</a>
            <a href="dashboard.html" class="nav-link active">Dashboard</a>
            <a href="cards.html" class="nav-link">Cards</a>
            <a href="reports.html" class="nav-link">Reports</a>
            <a href="settings.html" class="nav-link">Settings</a>
        </div>
    </nav>

    <main class="main-view animate-in">
        <h1>Analytics Dashboard</h1>

        <div class="grid">
            <div class="card">
                <h2>Market Reach</h2>
                <div
                    style="height: 200px; border: 2px dashed var(--border); border-radius: 12px; margin-top: 1rem; display: flex; align-items: center; justify-content: center; color: var(--text-dim);">
                    [ Chart Placeholder ]
                </div>
            </div>
            <div class="card">
                <h2>Campaign Velocity</h2>
                <div
                    style="height: 200px; border: 2px dashed var(--border); border-radius: 12px; margin-top: 1rem; display: flex; align-items: center; justify-content: center; color: var(--text-dim);">
                    [ Chart Placeholder ]
                </div>
            </div>
            <div class="card" style="grid-column: span 2;">
                <h2>Global Node Distribution</h2>
                <div
                    style="height: 150px; background: rgba(76, 201, 240, 0.05); border-radius: 12px; margin-top: 1rem; padding: 1.5rem;">
                    <p>Active Nodes: 1,402</p>
                    <p style="color: var(--text-dim);">Last optimized: 14 mins ago</p>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
