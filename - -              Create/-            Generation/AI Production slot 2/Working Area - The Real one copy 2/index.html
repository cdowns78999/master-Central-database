<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Return To Grace | Campaign Engine</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap');

        :root {
            /* Core Theme */
            --bg: #000814;
            --ocean-deep: #001d3d;
            --ocean-mid: #003566;
            --primary: #4cc9f0;
            --accent: #4361ee;
            --text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.5);

            /* Stone Palette (from Official Tile) */
            --stone-bg: #0c0f13;
            --stone-card: #14181e;
            --stone-surface: #1a1f27;
            --stone-hover: #1e242d;

            /* Accents */
            --press: #5eb5c9;
            --spotify: #4aba70;
            --social: #c975a8;
            --other: #d4a54a;

            --radius: 20px;
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            background-image:
                radial-gradient(circle at 0% 0%, var(--ocean-deep) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, #1a2a6c 0%, transparent 50%);
            min-height: 100vh;
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            display: flex;
        }

        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* Sidebar - Enhanced Blur */
        .side-panel {
            width: 450px;
            height: 100vh;
            background: rgba(12, 15, 19, 0.4);
            backdrop-filter: blur(40px);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            padding: 4rem 2.5rem;
            z-index: 10;
            overflow-y: auto;
            position: relative;
        }

        .main-content {
            flex-grow: 1;
            height: 100vh;
            z-index: 5;
            position: relative;
            padding: 3rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            align-items: center;
        }

        .header {
            margin-bottom: 3.5rem;
        }

        .header h1 {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #fff 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header .subtitle {
            font-size: 0.75rem;
            color: var(--text-dim);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-top: 0.6rem;
            font-weight: 600;
        }

        /* HUD Badges */
        .hud-status {
            position: absolute;
            top: 2rem;
            right: 2rem;
            display: flex;
            gap: 12px;
            z-index: 20;
        }

        .badge {
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            color: var(--text-dim);
            transition: var(--transition);
        }

        .badge.active {
            color: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(76, 201, 240, 0.2);
            background: rgba(76, 201, 240, 0.05);
        }

        /* Tiles Grid */
        #tiles-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
            gap: 2.5rem;
            width: 100%;
            max-width: 1400px;
            padding-bottom: 5rem;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }
    </style>
</head>

<body>
    <canvas id="bgCanvas"></canvas>

    <div class="side-panel">
        <header class="header">
            <h1>Return To Grace</h1>
            <div class="subtitle">Ecosystem Orchestration</div>
        </header>

        <div id="sidebar-content">
            <!-- Dynamic Sidebar items will be injected here -->
        </div>
    </div>

    <main class="main-content">
        <div class="hud-status" id="hud-triggers">
            <div class="badge active">Telemetry: Online</div>
            <div class="badge">Grid: Active</div>
            <div class="badge" id="campaign-node">Node: Root</div>
        </div>

        <div id="tiles-container">
            <!-- Official Stone Tiles will be injected here -->
        </div>
    </main>

    <script src="engine.js"></script>
</body>

</html>
