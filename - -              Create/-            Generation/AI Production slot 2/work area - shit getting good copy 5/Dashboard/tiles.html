<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocean Protocol | Tiles</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="tile-component.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">
</head>

<body>
    <nav class="sidebar">
        <div class="logo">
            <div class="logo-icon"></div>
            <span>OCEAN</span>
        </div>
        <div style="margin-top: 2rem; display: flex; flex-direction: column; gap: 8px;">
            <a href="index.html" class="nav-link">Hub</a>
            <a href="dashboard.html" class="nav-link">Dashboard</a>
            <a href="cards.html" class="nav-link">Cards</a>
            <a href="reports.html" class="nav-link">Reports</a>
            <a href="settings.html" class="nav-link">Settings</a>
            <a href="tiles.html" class="nav-link active">Tiles</a>
            <a href="actions.html" class="nav-link">Actions</a>
        </div>
    </nav>

    <main class="main-view animate-in">
        <h1>Tile Management</h1>

        <div id="tiles-container" class="tiles-grid"
            style="display: grid; grid-template-columns: repeat(auto-fill, minmax(450px, 1fr)); gap: 2rem;">
            <!-- Tiles will be dynamically added here -->
        </div>
    </main>

    <script src="tile-component.js"></script>
    <script>
        // Load data and display all tiles
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                const tileData = data.tiles || [];

                const container = document.getElementById('tiles-container');
                container.innerHTML = '';

                tileData.forEach((tileData, index) => {
                    const tileContainer = document.createElement('div');
                    tileContainer.id = `tile-${index}`;
                    container.appendChild(tileContainer);

                    const tile = new StoneTile(tileData.name, tileContainer, { data: tileData.projectData });
                });
            })
            .catch(error => console.error('Error loading data:', error));
    </script>
</body>

</html>
