<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocean Protocol | Hub</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="sidebar">
        <div class="logo">
            <div class="logo-icon"></div>
            <span>OCEAN</span>
        </div>
        <div style="margin-top: 2rem; display: flex; flex-direction: column; gap: 8px;">
            <a href="index.html" class="nav-link active">Hub</a>
            <a href="dashboard.html" class="nav-link">Dashboard</a>
            <a href="cards.html" class="nav-link">Cards</a>
            <a href="reports.html" class="nav-link">Reports</a>
            <a href="settings.html" class="nav-link">Settings</a>
        </div>
    </nav>

    <main class="main-view animate-in">
        <h1>Welcome back, Admiral.</h1>

        <div class="grid">
            <div class="card" style="grid-column: span 2;">
                <h2>System Overview</h2>
                <div style="display: flex; justify-content: space-between; margin-top: 1rem;">
                    <div>
                        <p style="color: var(--text-dim);">Revenue Projection 2026</p>
                        <h3 style="font-size: 2rem;">$4.82M</h3>
                    </div>
                    <div>
                        <p style="color: var(--text-dim);">Active Launches</p>
                        <h3 style="font-size: 2rem; color: var(--primary);">24</h3>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2>Recent Activity</h2>
                <ul id="activity-list" style="list-style: none; margin-top: 1rem;">
                    <li style="padding: 10px 0; border-bottom: 1px solid var(--border);">Global Beats Sync - <span
                            style="color: var(--primary);">Success</span></li>
                    <li style="padding: 10px 0; border-bottom: 1px solid var(--border);">Lumina PR Audit - <span
                            style="color: var(--primary);">Success</span></li>
                    <li style="padding: 10px 0;">X-Track Launch - <span style="color: #ff5d8f;">Critical</span></li>
                </ul>
            </div>
        </div>
    </main>
</body>

</html>
