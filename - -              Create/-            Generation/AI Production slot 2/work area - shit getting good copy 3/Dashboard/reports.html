<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocean Protocol | Reports</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="sidebar">
        <div class="logo">
            <div class="logo-icon"></div>
            <span>OCEAN</span>
        </div>
        <div style="margin-top: 2rem; display: flex; flex-direction: column; gap: 8px;">
            <a href="index.html" class="nav-link">Hub</a>
            <a href="dashboard.html" class="nav-link">Dashboard</a>
            <a href="cards.html" class="nav-link">Cards</a>
            <a href="reports.html" class="nav-link active">Reports</a>
            <a href="settings.html" class="nav-link">Settings</a>
        </div>
    </nav>

    <main class="main-view animate-in">
        <h1>PR & Artist Reports</h1>

        <div class="card">
            <h2>Generated Archives</h2>
            <div style="margin-top: 1.5rem; display: flex; flex-direction: column; gap: 15px;">
                <div
                    style="background: rgba(255,255,255,0.02); padding: 20px; border-radius: 15px; border-left: 4px solid var(--primary); display: flex; justify-content: space-between;">
                    <span>Annual Ecosystem Growth 2025.pdf</span>
                    <span style="color: var(--text-dim);">12.4 MB</span>
                </div>
                <div
                    style="background: rgba(255,255,255,0.02); padding: 20px; border-radius: 15px; border-left: 4px solid var(--primary); display: flex; justify-content: space-between;">
                    <span>Q4 Artist Retention Analysis.xlsx</span>
                    <span style="color: var(--text-dim);">2.1 MB</span>
                </div>
                <div
                    style="background: rgba(255,255,255,0.02); padding: 20px; border-radius: 15px; border-left: 4px solid var(--primary); display: flex; justify-content: space-between;">
                    <span>Campaign Match Velocity.docx</span>
                    <span style="color: var(--text-dim);">4.8 MB</span>
                </div>
            </div>
        </div>
