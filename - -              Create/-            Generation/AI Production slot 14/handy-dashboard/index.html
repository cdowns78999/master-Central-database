<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HANDY DASHBOARD | Slot 14</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&family=Outfit:wght@400;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="mobile-first">
    <!-- Global Anomaly Overlay (Shock Protocol) -->
    <div id="anomaly_overlay" class="hidden">
        <div class="anomaly-msg">BREACH DETECTED</div>
    </div>

    <!-- Main App Container -->
    <main id="app_container">
        <!-- Top HUD: Rank & XP -->
        <header id="top_hud" class="glass-pill">
            <div id="rank_badge" class="vibe-gold">ROOKIE</div>
            <div id="xp_container">
                <div id="xp_bar">
                    <div id="xp_fill"></div>
                </div>
                <span id="xp_text">0 / 100 XP</span>
            </div>
            <div id="lock_toggle" class="unlocked">
                <span id="lock_status">UNLOCKED</span>
                <div id="lock_indicator"></div>
            </div>
        </header>

        <!-- Dynamic Content Area -->
        <section id="content_view">
            <div id="task_feed" class="scroll-container">
                <!-- Task Cards will be injected here -->
            </div>
        </section>

        <!-- Command Navigation -->
        <nav id="bottom_nav" class="frost-bar">
            <div class="nav-item active" data-view="home">
                <div class="nav-icon house"></div>
                <span class="nav-label">HOME</span>
            </div>
            <div class="nav-item" data-view="vault">
                <div class="nav-icon pin"></div>
                <span class="nav-label">VAULT</span>
            </div>

            <!-- Elevated Command Button -->
            <div id="elevated_cmd" class="cmd-btn">
                <div class="cmd-plus"></div>
            </div>

            <div class="nav-item" data-view="lab">
                <div class="nav-icon microscope"></div>
                <span class="nav-label">LAB</span>
            </div>
            <div class="nav-item" data-view="grid">
                <div class="nav-icon squares"></div>
                <span class="nav-label">GRID</span>
            </div>
        </nav>
    </main>

    <!-- Swift Wizard Overlay -->
    <div id="wizard_overlay" class="hidden glass-bg">
        <div id="wizard_card" class="ticket-card">
            <div class="notches"></div>
            <div id="wizard_header">
                <span class="step-indicator">STEP 1/4</span>
                <button id="wizard_close" class="close-btn">×</button>
            </div>

            <div id="wizard_step_container">
                <!-- Steps will be injected here -->
            </div>

            <div id="wizard_footer">
                <div id="progress_dots">
                    <div class="dot active"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
                <button id="wizard_next" class="primary-btn">PROCEED →</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
