<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>MASTER REPLICATION | SLOT 6</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;800&family=Inter:wght@400;600;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <style>
        .app-frame {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #screen-mount {
            flex: 1;
            padding: 0 20px;
            overflow-y: auto;
            padding-top: var(--safe-top);
            padding-bottom: 120px;
        }

        .tab-bar-container {
            position: absolute;
            bottom: calc(var(--safe-bottom) + 12px);
            left: 20px;
            right: 20px;
            height: 85px;
            background: rgba(11, 1, 29, 0.7);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 35px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 9999;
        }

        .tab-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-ghost);
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .tab-btn.active {
            color: var(--accent-cyan);
        }

        .tab-btn.center-island {
            width: 65px;
            height: 65px;
            background: linear-gradient(135deg, var(--primary), #6e48aa);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -55px;
            box-shadow: 0 15px 30px var(--primary-glow);
            border: 4px solid var(--bg-void);
            color: white;
        }

        .icon {
            width: 26px;
            height: 26px;
            stroke-width: 2.5;
        }

        /* RECAP DATE SLOTS - ROW-BY-ROW ROLLOUT */
        .recap-dates-container {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .recap-dates-container.open {
            max-height: 80px;
        }

        .recap-date-slot {
            flex: 1;
            min-width: 50px;
            height: 28px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.4);
            opacity: 0;
            transform: translateY(8px);
        }

        .recap-dates-container.open .recap-date-slot {
            animation: recapSlotRollIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes recapSlotRollIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="mesh-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="app-frame">
        <div id="screen-mount" class="scroll-hide"></div>

        <nav class="tab-bar-container">
            <div class="tab-btn active" onclick="app.load('home')">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                    <polyline points="9 22 9 12 15 12 15 22" />
                </svg>
            </div>
            <div class="tab-btn" onclick="app.load('search')">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <circle cx="11" cy="11" r="8" />
                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg>
            </div>
            <div class="tab-btn center-island" onclick="app.load('ticket')">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3">
                    <rect x="3" y="3" width="7" height="7" />
                    <rect x="14" y="3" width="7" height="7" />
                    <rect x="14" y="14" width="7" height="7" />
                    <rect x="3" y="14" width="7" height="7" />
                </svg>
            </div>
            <div class="tab-btn" onclick="app.load('save')">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path
                        d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l8.84-8.84 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
                </svg>
            </div>
            <div class="tab-btn" onclick="app.load('profile')">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg>
            </div>
        </nav>
    </div>

    <!-- The Bundle: No Fetching Required -->
    <script src="screens.js"></script>

    <script>
        const app = {
            init() {
                this.load('home');
            },
            toggleRecapDates() {
                const container = document.getElementById('recap-dates-mount');
                if (!container) return;

                const isOpen = container.classList.toggle('open');

                if (isOpen) {
                    // Apply staggered animation delays
                    const slots = container.querySelectorAll('.recap-date-slot');
                    slots.forEach((slot, i) => {
                        slot.style.animationDelay = `${(i + 1) * 0.1}s`;
                    });
                }
            },
            load(screenName) {
                const mount = document.getElementById('screen-mount');
                mount.style.opacity = '0';

                setTimeout(() => {
                    // Check if screen exists in bundle
                    if (SCREENS[screenName]) {
                        mount.innerHTML = SCREENS[screenName];

                        // Update UI State
                        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                        const indexMap = { 'home': 0, 'search': 1, 'ticket': 2, 'save': 3, 'profile': 4 };
                        document.querySelectorAll('.tab-btn')[indexMap[screenName]]?.classList.add('active');

                        mount.style.transition = 'opacity 0.4s ease';
                        mount.style.opacity = '1';
                        mount.scrollTop = 0;
                    } else {
                        console.error(`[App Engine] Screen '${screenName}' not found in bundle.`);
                    }
                }, 100);
            }
        };

        window.addEventListener('load', () => app.init());
    </script>
</body>

</html>
