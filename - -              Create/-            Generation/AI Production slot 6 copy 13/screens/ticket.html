<!-- REFINED TICKET SCREEN (SLOT 6) -->
<!-- High-Transparency 3D Card Stack over Mesh Background -->

<div class="screen-animation-fade">

    <!-- Header -->
    <header
        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; padding-top: 10px;">
        <div style="width: 45px; height: 45px; background: rgba(255,255,255,0.06); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer;"
            onclick="app.load('detail')">
            <svg style="width: 20px; height: 20px;" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3">
                <path d="M19 12H5M12 19l-7-7 7-7" />
            </svg>
        </div>
        <h2 style="font-size: 1.4rem; font-family: 'Outfit';">Mobile Ticket</h2>
        <div
            style="width: 45px; height: 45px; background: rgba(255,255,255,0.06); border-radius: 50%; display: flex; align-items: center; justify-content: center;">
            <svg style="width: 20px; height: 20px;" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3">
                <circle cx="12" cy="12" r="1" />
                <circle cx="12" cy="5" r="1" />
                <circle cx="12" cy="19" r="1" />
            </svg>
        </div>
    </header>

    <p
        style="text-align: center; color: var(--text-muted); line-height: 1.5; max-width: 260px; margin: 0 auto 50px; font-size: 0.95rem;">
        Scan this barcode at the entrance to access the cinema.
    </p>

    <!-- TICKET ARENA -->
    <div style="position: relative; height: 480px; display: flex; justify-content: center; perspective: 1000px;">

        <!-- Background Card 1 (Ghostly Blur) -->
        <div class="glass-medium"
            style="position: absolute; width: 80%; height: 400px; border-radius: 40px; transform: rotate(-8deg) translateY(20px); opacity: 0.2;">
        </div>

        <!-- Background Card 2 (Ghostly Blur) -->
        <div class="glass-medium"
            style="position: absolute; width: 80%; height: 400px; border-radius: 40px; transform: rotate(8deg) translateY(20px); opacity: 0.2;">
        </div>

        <!-- MAIN TICKET -->
        <div
            style="position: relative; width: 90%; height: 460px; border-radius: 40px; overflow: hidden; background: #FFF; box-shadow: 0 40px 80px rgba(0,0,0,0.7); z-index: 10;">

            <!-- Poster -->
            <div style="height: 62%; overflow: hidden; position: relative;">
                <img src="https://images.unsplash.com/photo-1635805737707-575885ab0820?q=80&w=1000"
                    style="width: 100%; height: 100%; object-fit: cover;">
                <div
                    style="position: absolute; inset: 0; background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.5));">
                </div>
            </div>

            <!-- Ticket Details (Solid White Section for Scanability) -->
            <div style="height: 38%; background: #FFF; padding: 22px; color: #111;">

                <div
                    style="display: flex; justify-content: space-between; border-bottom: 2px dashed #EEE; padding-bottom: 15px; margin-bottom: 20px;">
                    <div>
                        <span
                            style="color: var(--primary); font-weight: 800; font-size: 0.65rem; text-transform: uppercase;">Date:</span>
                        <p style="font-weight: 800; font-size: 0.95rem;">April 23</p>
                    </div>
                    <div>
                        <span
                            style="color: var(--primary); font-weight: 800; font-size: 0.65rem; text-transform: uppercase;">Time:</span>
                        <p style="font-weight: 800; font-size: 0.95rem;">18:00</p>
                    </div>
                    <div>
                        <span
                            style="color: var(--primary); font-weight: 800; font-size: 0.65rem; text-transform: uppercase;">Row:</span>
                        <p style="font-weight: 800; font-size: 0.95rem;">2</p>
                    </div>
                    <div>
                        <span
                            style="color: var(--primary); font-weight: 800; font-size: 0.65rem; text-transform: uppercase;">Seats:</span>
                        <p style="font-weight: 800; font-size: 0.95rem;">9, 10</p>
                    </div>
                </div>

                <!-- Barcode -->
                <div style="text-align: center;">
                    <div
                        style="width: 100%; height: 40px; background-image: repeating-linear-gradient(90deg, #111, #111 2px, transparent 2px, transparent 6px);">
                    </div>
                    <p style="font-weight: 800; color: #777; letter-spacing: 5px; font-size: 0.8rem; margin-top: 8px;">
                        0987654321</p>
                </div>
            </div>

            <!-- Punch Holes -->
            <div
                style="position: absolute; top: 62%; left: -15px; width: 30px; height: 30px; background: var(--bg-void); border-radius: 50%; transform: translateY(-50%);">
            </div>
            <div
                style="position: absolute; top: 62%; right: -15px; width: 30px; height: 30px; background: var(--bg-void); border-radius: 50%; transform: translateY(-50%);">
            </div>
        </div>
    </div>

    <!-- Paging -->
    <div style="display: flex; justify-content: center; gap: 8px; margin-top: 30px;">
        <div style="width: 8px; height: 8px; background: rgba(255,255,255,0.2); border-radius: 50%;"></div>
        <div
            style="width: 25px; height: 8px; background: var(--accent-cyan); border-radius: 10px; box-shadow: 0 0 10px var(--accent-cyan);">
        </div>
        <div style="width: 8px; height: 8px; background: rgba(255,255,255,0.2); border-radius: 50%;"></div>
    </div>

</div>
