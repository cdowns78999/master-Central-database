<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ULTIMATE HANDY | Artist Utility</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="mobile-command">

    <div class="mesh-bg"></div>

    <!-- 🏆 FOCUS PILL (Item 81-100) -->
    <div class="focus-pill-wrapper">
        <div class="focus-pill" id="lock-pill" onclick="engine.toggleLock()">
            <div class="status-dot" id="lock-dot"></div>
            <div class="pill-content">
                <span id="rank-badge" class="rank-name">ROOKIE</span>
                <div class="xp-mini-bar">
                    <div class="xp-mini-fill" id="xp-fill" style="width: 45%;"></div>
                </div>
            </div>
            <!-- Toggle happens on pill tap for Swift Mobile Feel -->
        </div>
    </div>

    <!-- 📲 MAIN CONTENT -->
    <main class="viewport">
        <header class="view-header">
            <h1 id="page-title">Command Center</h1>
            <p id="page-subtitle">On-the-fly Artist Utility</p>
        </header>

        <div id="stage-mount" class="command-grid">
            <!-- Ultimate Fidelity Tiles injected here -->
        </div>
    </main>

    <!-- 🧭 BOTTOM NAVIGATION (Item 21-40) -->
    <nav class="bottom-nav">
        <div class="nav-item active" onclick="app.switch('command', this)">
            <span class="nav-icon">🏠</span> <!-- 23. Home Icon -->
            <span class="nav-label">Command</span>
        </div>
        <div class="nav-item" onclick="app.switch('vault', this)">
            <span class="nav-icon">📍</span> <!-- 25. Vault Icon -->
            <span class="nav-label">Vault</span>
        </div>

        <div class="nav-item center-cmd" onclick="engine.add()">
            <div class="btn-command">
                <span style="font-size: 1.8rem; color: white;">🔳</span> <!-- 27. Center Icon -->
            </div>
        </div>

        <div class="nav-item" onclick="app.switch('lab', this)">
            <span class="nav-icon">🔬</span>
            <span class="nav-label">The Lab</span>
        </div>
        <div class="nav-item" onclick="app.switch('grid', this)">
            <span class="nav-icon">🔲</span> <!-- 24. Grid Icon -->
            <span class="nav-label">Grid</span>
        </div>
    </nav>

    <!-- ⚡ ANOMALY ALERTS -->
    <div id="anomaly-overlay">
        <div class="glitch-msg" id="anomaly-text">BREACH</div>
    </div>

    <!-- 35. Mobile Indicator Pill -->
    <div
        style="position:fixed; bottom:8px; left:50%; transform:translateX(-50%); width:40px; height:4px; border-radius:10px; background:#fff2; z-index:2000;">
    </div>

    <script src="engine.js"></script>
    <script>
        const app = {
            switch(view, el) {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                el.classList.add('active');

                const mount = document.getElementById('stage-mount');
                const title = document.getElementById('page-title');

                if (view === 'command') {
                    engine.render();
                    title.innerText = "Command Center";
                } else {
                    mount.innerHTML = `
                        <div class="handy-card" style="text-align: center; opacity: 0.5;">
                            <h2>${view.toUpperCase()} UNIT</h2>
                            <p>Initializing logic port...</p>
                            <div style="margin-top: 20px; font-family:'JetBrains Mono'; font-size: 0.7rem;">STATUS: ENCRYPTED</div>
                        </div>
                    `;
                    title.innerText = view.charAt(0).toUpperCase() + view.slice(1);
                }
            }
        };
        window.addEventListener('load', () => engine.render());
    </script>
</body>

</html>
