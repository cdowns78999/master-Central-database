<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELITE DASHBOARD | SL-7</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;800&family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <style>
        .app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
            padding: 24px;
            gap: 24px;
            position: relative;
            z-index: 10;
        }

        /* SIDEBAR */
        .sidebar {
            width: 300px;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            border-radius: var(--radius-lg);
        }

        .brand {
            padding: 0 15px;
            margin-bottom: 40px;
        }

        .brand h1 {
            font-size: 1.5rem;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, white, var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 14px 18px;
            border-radius: 18px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition-smooth);
            cursor: pointer;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .nav-link.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 10px 20px var(--primary-glow);
        }

        /* MAIN CONTENT AREA */
        .main-stage {
            flex: 1;
            height: 100%;
            border-radius: var(--radius-lg);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .stage-header {
            padding: 30px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
        }

        #stage-mount {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        /* SEARCH BAR */
        .search-container {
            width: 400px;
            padding: 12px 20px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .search-container input {
            background: transparent;
            border: none;
            color: white;
            outline: none;
            width: 100%;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <!-- Cinematic Backdrop -->
    <div class="mesh-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="app-container">

        <!-- Sidebar Navigation -->
        <nav class="sidebar glass-medium">
            <div class="brand">
                <h1>ANTIGRAVITY v3</h1>
            </div>

            <div class="nav-group">
                <div class="nav-link active" onclick="app.load('roadmap')">
                    <svg style="width:20px; height:20px;" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                        <polyline points="9 22 9 12 15 12 15 22" />
                    </svg>
                    Project Roadmap
                </div>
                <div class="nav-link" onclick="app.load('predictors')">
                    <svg style="width:20px; height:20px;" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5">
                        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
                    </svg>
                    Predictor Hub
                </div>
                <div class="nav-link" onclick="app.load('content')">
                    <svg style="width:20px; height:20px;" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                        <line x1="9" y1="3" x2="9" y2="21" />
                    </svg>
                    Content Strategy
                </div>
                <div class="nav-link" onclick="app.load('assets')">
                    <svg style="width:20px; height:20px;" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5">
                        <path
                            d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
                        <polyline points="3.27 6.96 12 12.01 20.73 6.96" />
                        <line x1="12" y1="22.08" x2="12" y2="12" />
                    </svg>
                    Asset Vault
                </div>
            </div>

            <!-- Profile / Logout Area -->
            <div
                style="margin-top: auto; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; gap: 15px;">
                <div
                    style="width:45px; height:45px; border-radius: 50%; background: var(--accent-cyan); display: flex; align-items: center; justify-content: center; color: var(--bg-void); font-weight: 800;">
                    CD</div>
                <div>
                    <div style="font-size: 0.9rem; font-weight: 800;">Chad Downs</div>
                    <div style="font-size: 0.7rem; color: var(--text-muted);">Master Artist</div>
                </div>
            </div>
        </nav>

        <!-- Main Stage -->
        <main class="main-stage glass-medium">
            <header class="stage-header">
                <div>
                    <h2 id="page-title" style="font-size: 1.8rem;">Project Roadmap</h2>
                    <p id="page-subtitle" style="color: var(--text-muted); font-size: 0.9rem; margin-top: 4px;">Track
                        your sequence of discovery streams.</p>
                </div>

                <div class="search-container glass-thin">
                    <svg style="width:18px; height:18px; color: var(--text-ghost);" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="3">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                    <input type="text" placeholder="Search roadmap details...">
                </div>
            </header>

            <div id="stage-mount" class="scroll-hide">
                <!-- Content injected here via app.load() -->
            </div>
        </main>

    </div>

    <!-- The Logic Engine (Transformation of the 7.5k Master file) -->
    <script src="engine.js"></script>
    <script>
        const app = {
            load(screen) {
                // UI Management
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                event?.currentTarget?.classList?.add('active');

                const mount = document.getElementById('stage-mount');
                mount.style.opacity = '0';

                setTimeout(() => {
                    // We will expand these screens next
                    if (screen === 'roadmap') {
                        if (window.engine) engine.render();
                        document.getElementById('page-title').innerText = "Project Roadmap";
                        document.getElementById('page-subtitle').innerText = "Track your sequence of discovery streams.";
                    } else {
                        mount.innerHTML = `<div style="text-align:center; padding-top:100px; opacity:0.5;">
                            <div style="font-size:3rem;">🚧</div>
                            <h2>Screen Under Construction</h2>
                            <p>Transforming this logic next...</p>
                        </div>`;
                        document.getElementById('page-title').innerText = screen.charAt(0).toUpperCase() + screen.slice(1);
                    }

                    mount.style.transition = 'opacity 0.4s ease';
                    mount.style.opacity = '1';
                }, 100);
            }
        };
        window.addEventListener('load', () => app.load('roadmap'));
    </script>
</body>

</html>
