<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>MASTER REPLICATION | SLOT 6</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;800&family=Inter:wght@400;600;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <style>
        .app-frame {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #screen-mount {
            flex: 1;
            padding: 0 20px;
            overflow-y: auto;
            padding-top: var(--safe-top);
            padding-bottom: 120px;
        }

        .tab-bar-container {
            position: absolute;
            bottom: calc(var(--safe-bottom) + 12px);
            left: 20px;
            right: 20px;
            height: 85px;
            background: rgba(11, 1, 29, 0.7);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 35px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 9999;
        }

        .tab-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-ghost);
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .tab-btn.active {
            color: var(--accent-cyan);
        }

        .tab-btn.center-island {
            width: 65px;
            height: 65px;
            background: linear-gradient(135deg, var(--primary), #6e48aa);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -55px;
            box-shadow: 0 15px 30px var(--primary-glow);
            border: 4px solid var(--bg-void);
            color: white;
        }

        .icon {
            width: 26px;
            height: 26px;
            stroke-width: 2.5;
        }

        /* 🎟️ OVERLAY SYSTEM */
        .overlay-container {
            position: fixed;
            inset: 0;
            z-index: 10000;
            display: flex;
            align-items: flex-end;
            visibility: hidden;
            pointer-events: none;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .overlay-container.active {
            visibility: visible;
            pointer-events: auto;
        }

        .overlay-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(11, 1, 29, 0.6);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .overlay-container.active .overlay-backdrop {
            opacity: 1;
        }

        .overlay-card {
            position: relative;
            width: 100%;
            height: 85vh;
            background: rgba(255, 255, 255, 0.03);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 45px 45px 0 0;
            padding: 30px 20px;
            transform: translateY(100%);
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            overflow-y: auto;
        }

        .overlay-container.active .overlay-card {
            transform: translateY(0);
        }

        .drag-handle {
            width: 45px;
            height: 5px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            margin: 0 auto 30px;
        }
    </style>
</head>

<body>

    <div class="mesh-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="app-frame">
        <div id="screen-mount" class="scroll-hide"></div>

        <nav class="tab-bar-container">
            <div class="tab-btn active" onclick="app.load('home')">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                    <polyline points="9 22 9 12 15 12 15 22" />
                </svg>
            </div>
            <div class="tab-btn" onclick="app.load('search')">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <circle cx="11" cy="11" r="8" />
                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg>
            </div>
            <div class="tab-btn center-island" onclick="app.toggleOverlay('ticket', true)">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3">
                    <rect x="3" y="3" width="7" height="7" />
                    <rect x="14" y="3" width="7" height="7" />
                    <rect x="14" y="14" width="7" height="7" />
                    <rect x="3" y="14" width="7" height="7" />
                </svg>
            </div>
            <div class="tab-btn" onclick="app.load('save')">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path
                        d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l8.84-8.84 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
                </svg>
            </div>
            <div class="tab-btn" onclick="app.load('profile')">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg>
            </div>
        </nav>
    </div>

    <!-- 🎟️ TICKET OVERLAY MOUNT -->
    <div id="ticket-overlay" class="overlay-container">
        <div class="overlay-backdrop" onclick="app.toggleOverlay('ticket', false)"></div>
        <div class="overlay-card scroll-hide">
            <div class="drag-handle" onclick="app.toggleOverlay('ticket', false)"></div>
            <div id="overlay-content"></div>
        </div>
    </div>

    <!-- The Bundle: No Fetching Required -->
    <script src="screens.js"></script>

    <script>
        const app = {
            init() {
                this.load('home');
            },
            load(screenName) {
                const mount = document.getElementById('screen-mount');
                mount.style.opacity = '0';

                setTimeout(() => {
                    if (SCREENS[screenName]) {
                        mount.innerHTML = SCREENS[screenName];

                        // Update Nav UI
                        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                        const indexMap = { 'home': 0, 'search': 1, 'ticket': 2, 'save': 3, 'profile': 4 };
                        document.querySelectorAll('.tab-btn')[indexMap[screenName]]?.classList.add('active');

                        mount.style.transition = 'opacity 0.4s ease';
                        mount.style.opacity = '1';
                        mount.scrollTop = 0;
                    }
                }, 100);
            },
            toggleOverlay(screenName, show) {
                const overlay = document.getElementById(`${screenName}-overlay`);
                const content = document.getElementById('overlay-content');

                if (show) {
                    content.innerHTML = SCREENS[screenName];
                    overlay.classList.add('active');
                } else {
                    overlay.classList.remove('active');
                    setTimeout(() => content.innerHTML = '', 600);
                }
            }
        };

        window.addEventListener('load', () => app.init());
    </script>
</body>

</html>
