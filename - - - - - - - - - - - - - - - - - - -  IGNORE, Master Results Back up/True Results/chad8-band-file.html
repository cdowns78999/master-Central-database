    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAND FORCE | Progression Command</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&amp;family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&amp;family=Outfit:wght@300;400;600;800&amp;family=JetBrains+Mono:wght@400;700&amp;display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #7FDBFF;
            --secondary: #667eea;
            --accent: #ffcc33;
            --danger: #ff5e62;
            --success: #34d399;
            --bg-dark: transparent;
            --card-glass: rgba(255, 255, 255, 0.05);
            --border-glass: rgba(255, 255, 255, 0.1);
            --glow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            --inner-glow: inset 0 1px 1px rgba(255, 255, 255, 0.05);
            --muted: rgba(255, 255, 255, 0.9);
            --glass-blur: blur(25px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scrollbar-width: thin;
            scrollbar-color: var(--secondary) var(--bg-dark);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f1419 0%, #1a2332 50%, #0f1419 100%) fixed;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
            background-attachment: fixed;
            position: relative;
            color: #fff;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }





        /* --- HUD / NAVIGATION --- */
        .sidebar {
            width: 440px;
            background: rgba(15, 20, 30, 0.4);
            border-right: 2px solid rgba(74, 159, 191, 0.15);
            backdrop-filter: var(--glass-blur);
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .hud-header {
            padding: 30px;
            background: transparent;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .hud-header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            margin-bottom: 5px;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
        }

        .hud-subtitle {
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
            font-weight: 400;
        }

        .library-scroller {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            transition: background 0.3s;
        }

        .library-scroller.drag-over {
            background: rgba(255, 77, 77, 0.05);
            box-shadow: inset 0 0 40px rgba(255, 77, 77, 0.1);
        }

        /* --- TASK CARDS --- */
        .rank-group {
            margin-bottom: 55px;
            display: grid;
            grid-template-columns: repeat(2, 180px);
            gap: 20px;
            justify-content: start;
        }

        .rank-title {
            font-family: 'Outfit', sans-serif;
            font-size: 0.85rem;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            margin-bottom: 25px;
            text-align: left;
            display: block;
            letter-spacing: 4px;
            grid-column: 1 / -1;
            position: relative;
            padding-bottom: 10px;
            opacity: 0.95;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .rank-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 40px;
            height: 1px;
            background: var(--primary);
            opacity: 0.3;
        }

        .task-card {
            background: rgba(30, 35, 45, 0.6);
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 16px;
            width: 180px;
            height: 180px;
            cursor: grab;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: flex-start;
            text-align: left;
            gap: 6px;
        }

        .task-card:hover {
            background: rgba(40, 45, 55, 0.7);
            transform: translateY(-4px);
        }

        /* Module Variants for Library */
        .task-card.blue {
            border-color: #4A9FBF;
            color: #4A9FBF;
            box-shadow: inset 0 0 20px rgba(74, 159, 191, 0.08);
        }

        .task-card.blue:hover {
            box-shadow: 0 8px 24px rgba(74, 159, 191, 0.4), inset 0 0 25px rgba(74, 159, 191, 0.15);
        }

        .task-card.green {
            border-color: #3D7A47;
            color: #4CAF50;
            box-shadow: inset 0 0 20px rgba(61, 122, 71, 0.08);
        }

        .task-card.green:hover {
            box-shadow: 0 8px 24px rgba(61, 122, 71, 0.4), inset 0 0 25px rgba(61, 122, 71, 0.15);
        }

        .task-card.purple {
            border-color: #6B4E8C;
            color: #9575CD;
            box-shadow: inset 0 0 20px rgba(107, 78, 140, 0.08);
        }

        .task-card.purple:hover {
            box-shadow: 0 8px 24px rgba(107, 78, 140, 0.4), inset 0 0 25px rgba(107, 78, 140, 0.15);
        }

        .task-card.orange {
            border-color: #8B5A2B;
            color: #FF9800;
            box-shadow: inset 0 0 20px rgba(139, 90, 43, 0.08);
        }

        .task-card.orange:hover {
            box-shadow: 0 8px 24px rgba(139, 90, 43, 0.4), inset 0 0 25px rgba(139, 90, 43, 0.15);
        }

        .scheduled-item.completed {
            border-color: var(--success) !important;
            border-left-color: var(--success) !important;
            box-shadow: 0 0 8px rgba(0, 242, 254, 0.15), inset 0 0 6px rgba(0, 242, 254, 0.08) !important;
            background: rgba(0, 242, 254, 0.03) !important;
        }

        .task-card.completed {
            border-color: var(--success) !important;
            border-left-color: var(--success) !important;
            box-shadow: 0 0 8px rgba(0, 242, 254, 0.15), inset 0 0 6px rgba(0, 242, 254, 0.08) !important;
            background: rgba(0, 242, 254, 0.03) !important;
        }

        .scheduled-item.completed::before {
            content: '✓';
            position: absolute;
            top: 5px;
            right: 8px;
            color: var(--success);
            font-size: 0.7rem;
            font-weight: 900;
        }

        .task-field {
            font-family: 'Inter', sans-serif;
            font-size: 0.65rem;
            color: inherit;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 0;
            display: block;
            letter-spacing: 0.5px;
            opacity: 0.9;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
            text-align: left;
            width: 100%;
            line-height: 1.2;
        }

        .task-desc {
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 400;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
            text-align: left;
            width: 100%;
            line-height: 1.4;
            word-wrap: break-word;
            overflow-wrap: break-word;
            flex: 1;
            max-height: 100px;
            overflow: hidden;
        }

        .task-ref {
            position: absolute;
            bottom: -4px;
            left: 0;
            transform: translateY(100%);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            letter-spacing: 1px;
            pointer-events: none;
            text-transform: uppercase;
            opacity: 0.8;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
        }

        .task-ref.glow-10m,
        .task-ref.t10m {
            color: var(--success);
            text-shadow: 0 0 5px rgba(0, 204, 153, 0.5);
            opacity: 0.7;
        }

        .task-ref.glow-20m,
        .task-ref.t20m {
            color: var(--accent);
            opacity: 0.8;
            text-shadow: 0 0 8px var(--accent);
        }

        .task-ref.glow-30m,
        .task-ref.t30m {
            color: var(--danger);
            text-shadow: 0 0 8px var(--danger);
            opacity: 0.8;
        }

        /* --- MAIN WORKSPACE --- */
        .workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .top-nav {
            height: auto;
            min-height: 80px;
            padding: 35px 40px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, rgba(15, 20, 30, 0.6) 0%, transparent 100%);
            border-bottom: 1px solid rgba(74, 159, 191, 0.1);
            backdrop-filter: blur(5px);
            z-index: 1000;
            position: relative;
        }

        .top-nav::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(74, 159, 191, 0.3), transparent);
            pointer-events: none;
        }

        .command-hub {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            background: rgba(15, 20, 30, 0.95);
            backdrop-filter: var(--glass-blur);
            border: 2px solid rgba(74, 159, 191, 0.25);
            border-radius: 25px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.8), 0 0 40px rgba(74, 159, 191, 0.15);
            transition: all 0.3s ease;
            position: relative;
            flex-wrap: nowrap;
        }

        .command-hub::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            height: 140%;
            background: radial-gradient(ellipse 100% 100% at 50% 50%, rgba(74, 159, 191, 0.25), transparent 60%);
            border-radius: 100px;
            pointer-events: none;
            opacity: 1;
            z-index: -1;
            filter: blur(20px);
        }

        .command-hub:hover {
            background: rgba(20, 25, 35, 0.98);
            border-color: rgba(74, 159, 191, 0.4);
            box-shadow: 0 40px 96px rgba(0, 0, 0, 1), 0 0 80px rgba(74, 159, 191, 0.3), inset 0 2px 60px rgba(74, 159, 191, 0.1);
            transform: translateY(-2px);
        }

        .command-hub:hover::before {
            background: radial-gradient(ellipse 100% 100% at 50% 50%, rgba(74, 159, 191, 0.35), transparent 60%);
            filter: blur(25px);
        }

        .progression-stats {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 4px 0;
            background: transparent;
            border-radius: 0;
            border: none;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: rgba(74, 159, 191, 0.08);
            border-radius: 100px;
            position: relative;
            overflow: hidden;
        }

        .stat-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(74, 159, 191, 0.3), transparent);
            animation: swiftGlow 3s ease-in-out infinite;
        }

        @keyframes swiftGlow {
            0% {
                left: -100%;
            }

            50% {
                left: 100%;
            }

            100% {
                left: 100%;
            }
        }

        .stat-label {
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            white-space: nowrap;
            font-weight: 600;
        }

        .stat-value {
            font-family: 'Outfit', sans-serif;
            font-size: 1.2rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 20px rgba(74, 159, 191, 0.5);
            letter-spacing: 0.5px;
            min-width: 60px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 0.8;
        }

        .stat-value:hover {
            opacity: 1;
            transform: scale(1.05);
        }

        .stat-value.updating {
            animation: pulse 0.3s ease-out;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.15);
                opacity: 1;
            }

            100% {
                transform: scale(1);
            }
        }

        .nav-separator {
            width: 1px;
            height: 30px;
            background: linear-gradient(to bottom, transparent, var(--border-glass), transparent);
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-action {
            background: transparent;
            border: none;
            padding: 6px 10px;
            border-radius: 15px;
            color: rgba(255, 255, 255, 0.8);
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 0.6rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            white-space: nowrap;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .btn-action:hover {
            background: rgba(74, 159, 191, 0.1);
            color: #fff;
            transform: translateY(-1px);
        }

        /* --- DROPDOWN SYSTEM --- */
        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            width: 200px;
            background: rgba(10, 15, 25, 0.95);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 16px;
            z-index: 2000;
            margin-top: 6px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.7), 0 0 20px rgba(127, 219, 255, 0.1);
            transform-origin: top left;
            animation: dropdownEnter 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .dropdown.active .dropdown-content {
            display: block;
        }



        .dropdown-header {
            grid-column: span 2;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .dropdown-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: 1px;
        }

        .dropdown-close {
            color: #ff5e62;
            font-size: 1.2rem;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .dropdown-close:hover {
            opacity: 1;
        }

        .module-btn {
            background: rgba(30, 35, 45, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 12px 16px;
            position: relative;
            height: 80px;
        }

        .module-btn:hover {
            background: rgba(40, 45, 55, 0.7);
            transform: translateY(-4px);
        }

        .module-icon {
            font-family: 'Outfit', sans-serif;
            font-size: 1.2rem;
            font-weight: 900;
            margin-bottom: 8px;
            text-shadow: 0 0 10px currentColor;
            line-height: 1;
            opacity: 0.8;
        }

        .module-label {
            font-size: 0.55rem;
            color: rgba(255, 255, 255, 0.8);
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.6px;
            text-align: center;
            width: 100%;
            line-height: 1.1;
        }

        /* Module Variants */
        .module-btn.blue {
            border-color: #4A9FBF;
            color: #4A9FBF;
            box-shadow: inset 0 0 20px rgba(74, 159, 191, 0.08);
        }

        .module-btn.blue:hover {
            box-shadow: 0 8px 24px rgba(74, 159, 191, 0.4), inset 0 0 25px rgba(74, 159, 191, 0.15);
        }

        .module-btn.green {
            border-color: #3D7A47;
            color: #4CAF50;
            box-shadow: inset 0 0 20px rgba(61, 122, 71, 0.08);
        }

        .module-btn.green:hover {
            box-shadow: 0 8px 24px rgba(61, 122, 71, 0.4), inset 0 0 25px rgba(61, 122, 71, 0.15);
        }

        .module-btn.purple {
            border-color: #6B4E8C;
            color: #9575CD;
            box-shadow: inset 0 0 20px rgba(107, 78, 140, 0.08);
        }

        .module-btn.purple:hover {
            box-shadow: 0 8px 24px rgba(107, 78, 140, 0.4), inset 0 0 25px rgba(107, 78, 140, 0.15);
        }

        .module-btn.orange {
            border-color: #8B5A2B;
            color: #FF9800;
            box-shadow: inset 0 0 20px rgba(139, 90, 43, 0.08);
        }

        .module-btn.orange:hover {
            box-shadow: 0 8px 24px rgba(139, 90, 43, 0.4), inset 0 0 25px rgba(139, 90, 43, 0.15);
        }

        @keyframes dropdownEnter {
            from {
                opacity: 0;
                transform: translateY(-10px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .dropdown-item {
            width: 100% !important;
            text-align: left !important;
            justify-content: flex-start !important;
        }

        .dropdown-trigger::after {
            content: '▿';
            margin-left: 10px;
            font-size: 0.8rem;
            opacity: 0.5;
            transition: transform 0.3s;
        }

        .dropdown.active .dropdown-trigger::after {
            transform: rotate(180deg);
        }

        /* --- MAIN TITLE --- */
        .main-title-container {
            text-align: center;
            padding: 30px 40px 40px;
            background: linear-gradient(135deg, rgba(15, 20, 30, 0.8) 0%, rgba(26, 35, 50, 0.6) 50%, rgba(15, 20, 30, 0.8) 100%);
            backdrop-filter: blur(10px);
            border-bottom: none;
            position: relative;
            overflow: hidden;
        }

        .main-title-container::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 200%;
            background: radial-gradient(ellipse 100% 100% at 50% 50%, rgba(74, 159, 191, 0.15), transparent 60%);
            pointer-events: none;
            z-index: 0;
            filter: blur(30px);
        }

        .main-title {
            font-family: 'Outfit', sans-serif;
            font-size: 2.8rem;
            font-weight: 800;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            text-shadow:
                0 0 20px rgba(74, 159, 191, 0.5),
                0 4px 8px rgba(0, 0, 0, 0.7),
                0 0 40px rgba(74, 159, 191, 0.3);
            position: relative;
            z-index: 1;
            line-height: 1.1;
            animation: titleGlow 3s ease-in-out infinite alternate;
        }

        .main-subtitle {
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow:
                0 0 15px rgba(74, 159, 191, 0.6),
                0 2px 4px rgba(0, 0, 0, 0.8);
            position: relative;
            z-index: 1;
            opacity: 0.9;
        }

        @keyframes titleGlow {
            0% {
                text-shadow:
                    0 0 20px rgba(74, 159, 191, 0.5),
                    0 4px 8px rgba(0, 0, 0, 0.7),
                    0 0 40px rgba(74, 159, 191, 0.3);
            }

            100% {
                text-shadow:
                    0 0 30px rgba(74, 159, 191, 0.7),
                    0 4px 8px rgba(0, 0, 0, 0.7),
                    0 0 60px rgba(74, 159, 191, 0.5);
            }
        }

        /* --- WEEKLY GRID --- */
        .grid-container {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 60px;
            align-content: start;
        }

        .week-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 25px;
            position: relative;
        }

        .week-row-label {
            position: absolute;
            top: -30px;
            left: 0;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
            font-weight: 400;
        }

        .week-column {
            background: transparent;
            border: none;
            border-radius: 20px;
            padding: 24px;
            min-height: 480px;
            max-height: 480px;
            display: flex;
            flex-direction: column;
            transition: none;
            backdrop-filter: none;
            box-shadow: -2px 0 8px rgba(255, 255, 255, 0.03), 2px 0 8px rgba(255, 255, 255, 0.03);
            position: relative;
        }



        .week-column.drag-over .drop-zone {
            background: rgba(30, 35, 45, 0.3);
            border: none;
            box-shadow: inset 0 0 30px rgba(74, 159, 191, 0.15);
            border-radius: 15px;
        }

        .week-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .week-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.2rem;
            font-weight: 800;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .task-counter {
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 12px;
            border-radius: 20px;

        const state = {
            weeks: { 1: [], 2: [], 3: [], 4: [], 5: [] },
            completed: []
        };

        const dayNames = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"];

        function addWeek() {
            const currentDays = Object.keys(state.weeks).length;
            for (let i = 1; i <= 5; i++)             state.weeks[currentDays + i] = [];
            renderGrid();
        }

        function autoSchedule() {
            if (!confirm("This will clear your Command Board and distribute all library tasks sequentially (one per day). Proceed?")) return;
            const allTasks = [];
            let globalIdx = 1;
            appData.ranks.forEach((rank, rankIdx) => {
                rank.tasks.forEach(task => {
                    let duration = "10M";
                    if (rankIdx >= 3 && rankIdx <= 6) duration = "20M";
                    if (rankIdx >= 7) duration = "30M";
                    allTasks.push({ ...task, rank: rank.name, refId: globalIdx, duration: duration });
                    globalIdx++;
                });
            });
            state.weeks = {};
            const totalTasks = allTasks.length;
            const totalWeeks = Math.ceil(totalTasks / 5);
            for (let w = 0; w < totalWeeks; w++) {
                for (let d = 1; d <= 5; d++) {
                    const dayNum = (w * 5) + d;
                    state.weeks[dayNum] = [];
                    const taskIdx = (w * 5) + (d - 1);
                    if (taskIdx < totalTasks) state.weeks[dayNum].push(allTasks[taskIdx]);
                }
            }
            renderGrid();
            renderLibrary();
            updateStats();
        }

        function strategicSchedule() {
            if (!confirm("This will clear your board and apply the Tiered Command Pattern (Mon: 30M, Wed: 20M, Thu/Fri: 10M). Proceed?")) return;

            const pool10 = [];
            const pool20 = [];
            const pool30 = [];
            let globalIdx = 1;

            appData.ranks.forEach((rank, rankIdx) => {
                rank.tasks.forEach(task => {
                    let dur = "10M";
                    if (rankIdx >= 3 && rankIdx <= 6) dur = "20M";
                    if (rankIdx >= 7) dur = "30M";

                    const taskObj = { ...task, rank: rank.name, refId: globalIdx, duration: dur };
                    if (dur === "10M") pool10.push(taskObj);
                    else if (dur === "20M") pool20.push(taskObj);
                    else pool30.push(taskObj);

                    globalIdx++;
                });
            });

            state.weeks = {};
            let currentWeek = 0;

            while (pool10.length > 0 || pool20.length > 0 || pool30.length > 0) {
                currentWeek++;
                for (let d = 1; d <= 5; d++) {
                    const dayId = ((currentWeek - 1) * 5) + d;
                    state.weeks[dayId] = [];

                    if (d === 1 && pool30.length > 0) state.weeks[dayId].push(pool30.shift());
                    if (d === 3 && pool20.length > 0) state.weeks[dayId].push(pool20.shift());
                    if (d === 4 && pool10.length > 0) state.weeks[dayId].push(pool10.shift());
                    if (d === 5 && pool10.length > 0) state.weeks[dayId].push(pool10.shift());
                }
            }

            renderGrid();
            renderLibrary();
            updateStats();
        }

        function rotationSchedule() {
            if (!confirm("This will clear your board and cycle all tasks through a 30M-20M-10M rotation. Proceed?")) return;

            const allTasks = [];
            appData.ranks.forEach(rank => {
                rank.tasks.forEach(task => {
                    allTasks.push({ ...task, rank: rank.name });
                });
            });

            state.weeks = {};
            const totalTasks = allTasks.length;
            const totalWeeksNeeded = Math.ceil(totalTasks / 5);
            const durations = ["30M", "20M", "10M"];

            for (let w = 0; w < totalWeeksNeeded; w++) {
                for (let d = 1; d <= 5; d++) {
                    const dayNum = (w * 5) + d;
                    state.weeks[dayNum] = [];

                    const taskIdx = (w * 5) + (d - 1);
                    if (taskIdx < totalTasks) {
                        const cycleIdx = taskIdx % 3;
                        const task = allTasks[taskIdx];
                        state.weeks[dayNum].push({
                            ...task,
                            refId: taskIdx + 1,
                            duration: durations[cycleIdx]
                        });
                    }
                }
            }

            renderGrid();
            renderLibrary();
            updateStats();
        }

        function toggleTaskComplete(globalIdx) {
            const idxStr = globalIdx.toString();
            const pos = state.completed.indexOf(idxStr);
            if (pos === -1) state.completed.push(idxStr);
            else state.completed.splice(pos, 1);
            renderLibrary();
            updateStats();
            renderGrid();
        }

        function init() { renderLibrary(); renderGrid(); setupTrashZone(); }
        function updateStats() {
            const totalTasks = Object.values(state.weeks).flat().length;
            const completedTasks = state.completed.length;
            const assignedEl = document.getElementById('assignedCount');
            const completedEl = document.getElementById('completedCount');

            assignedEl.innerText = totalTasks;
            completedEl.innerText = completedTasks;

            // Add animation effect
            assignedEl.classList.add('updating');
            completedEl.classList.add('updating');

            // Remove animation class after animation completes
            setTimeout(() => {
                assignedEl.classList.remove('updating');
                completedEl.classList.remove('updating');
            }, 300);
        }

        function renderLibrary() {
            const container = document.getElementById('library');
            container.innerHTML = '';
            let globalIdx = 1;
            const colors = ['blue', 'green', 'purple', 'orange'];
            appData.ranks.forEach((rank, rankIdx) => {
                const group = document.createElement('div');
                group.className = 'rank-group';
                group.innerHTML = `<div class="rank-title">${rank.name}</div>`;

                let duration = "10M";
                if (rankIdx >= 3 && rankIdx < 7) duration = "20M";
                if (rankIdx >= 7) duration = "30M";

                const cardColor = colors[rankIdx % colors.length];

                rank.tasks.forEach(task => {
                    const card = document.createElement('div');
                    card.className = `task-card ${cardColor} ${state.completed.includes(globalIdx.toString()) ? 'completed' : ''}`;
                    card.draggable = true;

                    // Large identifier from ID
                    const displayId = task.id.split('-')[1] || task.id;

                    const gid = globalIdx;
                    card.innerHTML = `
                        <span class="module-icon" style="color: inherit;">${displayId}</span>
                        <div class="task-field">${task.field}</div>
                        <div class="task-desc">${task.desc}</div>
                        <span class="task-ref t${duration.toLowerCase()}" style="bottom: 8px; right: 8px; left: auto; transform: none; font-size: 0.6rem;">${gid}-${duration}</span>
                    `;

                    card.addEventListener('dblclick', () => toggleTaskComplete(gid));
                    card.addEventListener('dragstart', (e) => {
                        e.dataTransfer.setData('application/json', JSON.stringify({ rank: rank.name, refId: gid, duration: duration, ...task }));
                        card.classList.add('dragging');
                    });
                    card.addEventListener('dragend', () => card.classList.remove('dragging'));
                    group.appendChild(card);
                    globalIdx++;
                });
                container.appendChild(group);
            });
        }

        function renderGrid() {
            const container = document.getElementById('grid');
            container.innerHTML = '';
            const dayKeys = Object.keys(state.weeks).map(Number).sort((a, b) => a - b);
            const weekCount = Math.ceil(dayKeys.length / 5);
            for (let w = 0; w < weekCount; w++) {
                const row = document.createElement('div');
                row.className = 'week-row';
                row.innerHTML = `<div class="week-row-label">Command Week ${w + 1}</div>`;
                for (let d = 1; d <= 5; d++) {
                    const dayId = (w * 5) + d;
                    if (!state.weeks[dayId]) state.weeks[dayId] = [];
                    const col = document.createElement('div');
                    col.className = 'week-column';
                    col.dataset.week = dayId;
                    col.innerHTML = `<div class="week-header"><span class="week-title">${dayNames[d - 1]}</span><span class="task-counter">${state.weeks[dayId].length}</span></div><div class="drop-zone"></div>`;
                    const zone = col.querySelector('.drop-zone');
                    if (state.weeks[dayId].length === 0) { zone.innerHTML = `<div class="empty-indicator"></div>`; }
                    else {
                        state.weeks[dayId].forEach((task, idx) => {
                            const item = document.createElement('div');
                            item.className = `scheduled-item ${state.completed.includes(task.refId?.toString()) ? 'completed' : ''}`;
                            item.draggable = true;
                            const dur = task.duration || '10M';
                            const gid = task.refId;
                            item.innerHTML = `<span class="remove-trigger" onclick="removeTask(${dayId}, ${idx})">×</span><span class="task-ref t${dur.toLowerCase()}" oncontextmenu="cycleDuration(event,${dayId},${idx})" style="position: absolute; bottom: 12px; right: 12px; top: auto; left: auto; transform: none; cursor: pointer; font-size: 0.6rem;">${gid}-${dur}</span><div class="item-meta">${task.rank || 'Task'} | ${task.field}</div><div class="task-desc">${task.desc}</div><div class="difficulty-strip"><div class="diff-segment easy ${dur === '10M' ? 'glow' : ''}"></div><div class="diff-segment ${dur === '20M' || dur === '30M' ? 'medium' : ''} ${dur === '20M' ? 'glow' : ''}"></div><div class="diff-segment ${dur === '30M' ? 'hard glow' : ''}"></div></div>`;
                            item.addEventListener('dblclick', () => toggleTaskComplete(gid));
                            item.addEventListener('dragstart', (e) => { e.dataTransfer.setData('application/scheduled-item', JSON.stringify({ week: dayId, index: idx })); item.classList.add('dragging'); });
                            item.addEventListener('dragend', () => item.classList.remove('dragging'));
                            zone.appendChild(item);
                        });
                    }
                    col.addEventListener('dragover', (e) => { e.preventDefault(); col.classList.add('drag-over'); });
                    col.addEventListener('dragleave', () => col.classList.remove('drag-over'));
                    col.addEventListener('drop', (e) => {
                        e.preventDefault(); col.classList.remove('drag-over');
                        const ni = e.dataTransfer.getData('application/json');
                        const mi = e.dataTransfer.getData('application/scheduled-item');
                        if (ni && state.weeks[dayId].length < 6) { state.weeks[dayId].push(JSON.parse(ni)); renderGrid(); updateStats(); }
                        else if (mi) { const { week, index } = JSON.parse(mi); if (week != dayId && state.weeks[dayId].length < 6) { state.weeks[dayId].push(state.weeks[week].splice(index, 1)[0]); renderGrid(); updateStats(); } }
                    });
                    row.appendChild(col);
                }
                container.appendChild(row);
            }
            updateStats();
        }

        function removeTask(w, i) { state.weeks[w].splice(i, 1); renderGrid(); updateStats(); }
        function cycleDuration(e, w, i) { e.preventDefault(); const t = state.weeks[w][i]; t.duration = t.duration === '10M' ? '20M' : t.duration === '20M' ? '30M' : '10M'; renderGrid(); }
        function getTotalTaskCount() {
            let total = 0;
            appData.ranks.forEach(rank => {
                total += rank.tasks.length;
            });
            return total;
        }

        function updateStats() {
            let t = 0; Object.values(state.weeks).forEach(w => t += w.length);
            const totalTasks = getTotalTaskCount();
            const completedTasks = state.completed.length;
            const remainingTasks = totalTasks - completedTasks;

            const assignedEl = document.getElementById('assignedCount');
            const completedEl = document.getElementById('completedCount');

            // Animate the transition
            assignedEl.classList.add('updating');
            completedEl.classList.add('updating');

            // Update values with fractions
            assignedEl.innerText = `${remainingTasks}/${totalTasks}`;
            completedEl.innerText = `${completedTasks}/${totalTasks}`;

            // Remove animation class after animation completes
            setTimeout(() => {
                assignedEl.classList.remove('updating');
                completedEl.classList.remove('updating');
            }, 300);
        }
        function exportData(isAuto = false) {
            // Export all data including state, app data, and metadata
            const exportData = {
                version: "1.0",
                program: appData.program,
                exportDate: new Date().toISOString(),
                state: state,
                appData: appData,
                metadata: {
                    totalTasks: Object.values(state.weeks).flat().length,
                    completedTasks: state.completed.length,
                    totalWeeks: Object.keys(state.weeks).length
                }
            };

            const dataStr = JSON.stringify(exportData, null, 2);
            const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);
            const exportFileDefaultName = (isAuto ? 'AUTO-BACKUP_' : '') + `band_force_complete_${new Date().toISOString().replace(/[:.]/g, '-')}.json`;

            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', exportFileDefaultName);
            linkElement.click();
            linkElement.remove();
        }

        function importData(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const importedData = JSON.parse(event.target.result);

                    // Handle both old format (just state) and new format (complete export)
                    if (importedData && importedData.state) {
                        // New format with complete export data
                        state.weeks = importedData.state.weeks;
                        state.completed = importedData.state.completed || [];

                        // Update app data if present
                        if (importedData.appData) {
                            appData.program = importedData.appData.program || appData.program;
                        }

                        console.log(`Imported: ${importedData.metadata?.totalTasks || 'Unknown'} tasks from ${importedData.exportDate || 'Unknown date'}`);
                        alert(`Successfully imported ${importedData.metadata?.totalTasks || 0} tasks from ${importedData.exportDate ? new Date(importedData.exportDate).toLocaleDateString() : 'unknown date'}`);
                    } else if (importedData && importedData.weeks) {
                        // Old format - just state data
                        state.weeks = importedData.weeks;
                        state.completed = importedData.completed || [];
                        console.log("Legacy command state restored successfully.");
                        alert("Successfully imported command data.");
                    } else {
                        throw new Error("Invalid file format");
                    }

                    renderGrid();
                    renderLibrary();

                } catch (err) {
                    console.error("Import error:", err);
                    alert("Error: Invalid Band Force Command File. Please ensure you're selecting a valid JSON export file.");
                }
            };
            reader.readAsText(file);
        }

        // --- EXIT PROTECTION PROTOCOL ---
        // Auto-download disabled
        // window.addEventListener('beforeunload', (e) => {
        //     // Trigger emergency backup
        //     exportData(true);

        //     // Standard departure confirmation
        //     e.preventDefault();
        //     e.returnValue = 'Unsaved changes in the command module. Are you sure you wish to exit?';
        //     return e.returnValue;
        // });
        function rotationSchedule() {
            if (!confirm("Clear board and cycle tasks through 30M-20M-10M?")) return;
            const allTasks = [];
            let globalIdx = 1;
            appData.ranks.forEach(rank => rank.tasks.forEach(t => allTasks.push({ ...t, rank: rank.name, refId: globalIdx++ })));

            state.weeks = {};
            const durations = ["30M", "20M", "10M"];
            for (let i = 0; i < allTasks.length; i++) {
                const dayNum = i + 1;
                state.weeks[dayNum] = [{ ...allTasks[i], duration: durations[i % 3] }];
            }
            renderGrid(); renderLibrary();
        }

        function intensiveSchedule() {
            if (!confirm("Clear board and apply Sequential Intensive cadence (30M x1/day, 20M x1/day, 10M x2/day)?")) return;

            const pool10 = [];
            const pool20 = [];
            const pool30 = [];
            let gIdx = 1;

            appData.ranks.forEach((rank, rIdx) => {
                rank.tasks.forEach(task => {
                    let d = "10M";
                    if (rIdx >= 3 && rIdx <= 6) d = "20M";
                    if (rIdx >= 7) d = "30M";
                    const t = { ...task, rank: rank.name, refId: gIdx++, duration: d };
                    if (d === "30M") pool30.push(t);
                    else if (d === "20M") pool20.push(t);
                    else pool10.push(t);
                });
            });

            state.weeks = {};
            let day = 1;

            // Phase 1: All 30M tasks, one per day
            while (pool30.length > 0) {
                state.weeks[day] = [pool30.shift()];
                day++;
            }

            // Phase 2: All 20M tasks, one per day
            while (pool20.length > 0) {
                state.weeks[day] = [pool20.shift()];
                day++;
            }

            // Phase 3: All 10M tasks, two per day
            while (pool10.length > 0) {
                state.weeks[day] = [];
                for (let i = 0; i < 2; i++) {
                    if (pool10.length > 0) state.weeks[day].push(pool10.shift());
                }
                day++;
            }

            // Fill out the remaining days of the final week
            const totalDays = day - 1;
            const fullWeeksNeeded = Math.ceil(totalDays / 5) * 5;
            for (let i = 1; i <= fullWeeksNeeded; i++) {
                if (!state.weeks[i]) state.weeks[i] = [];
            }

            renderGrid(); renderLibrary();
        }

        function first21Schedule() {
            if (!confirm("Clear board and apply 'Tasks 1/21' plan (4 tasks per day)?")) return;

            const allTasks = [];
            let gIdx = 1;

            appData.ranks.forEach((rank, rIdx) => {
                rank.tasks.forEach(task => {
                    let d = "10M";
                    if (rIdx >= 3 && rIdx <= 6) d = "20M";
                    if (rIdx >= 7) d = "30M";
                    allTasks.push({ ...task, rank: rank.name, refId: gIdx++, duration: d });
                });
            });

            const first21 = allTasks.slice(0, 21);
            state.weeks = {};

            for (let i = 0; i < first21.length; i++) {
                const dayIdx = Math.floor(i / 4);
                const dayNum = dayIdx + 4; // Start on Thursday (Day 4)
                if (!state.weeks[dayNum]) state.weeks[dayNum] = [];
                state.weeks[dayNum].push(first21[i]);
            }

            // Fill out the remaining days of the weeks
            const maxDay = Math.max(...Object.keys(state.weeks).map(Number), 0);
            const fullWeeksNeeded = Math.ceil(maxDay / 5) * 5;
            for (let i = 1; i <= fullWeeksNeeded; i++) {
                if (!state.weeks[i]) state.weeks[i] = [];
            }

            renderGrid(); updateStats(); renderLibrary();
        }

        function toggleDropdown(e) {
            e.stopPropagation();
            document.getElementById('plansDropdown').classList.toggle('active');
        }

        function toggleTileSizeDropdown(e) {
            e.stopPropagation();
            document.getElementById('tileSizeDropdown').classList.toggle('active');
        }

        function updateTileSize(type, value) {
            const columns = document.querySelectorAll('.week-column');

            if (type === 'height') {
                document.getElementById('tileHeightDisplay').innerText = value + 'px';
                columns.forEach(col => {
                    col.style.minHeight = value + 'px';
                    col.style.maxHeight = value + 'px';
                });
            } else if (type === 'width') {
                document.getElementById('tileWidthDisplay').innerText = value + 'px';
                columns.forEach(col => {
                    col.style.minWidth = value + 'px';
                    col.style.maxWidth = value + 'px';
                });
            } else if (type === 'both') {
                document.getElementById('tileBothDisplay').innerText = value + '%';
                const scale = value / 100;
                columns.forEach(col => {
                    col.style.transform = `scale(${scale})`;
                    col.style.transformOrigin = 'top left';
                });
            }
        }

        function toggleFontSizeDropdown(e) {
            e.stopPropagation();
            document.getElementById('fontSizeDropdown').classList.toggle('active');
        }

        function updateFontSize(size) {
            document.getElementById('fontSizeDisplay').innerText = size + '%';
            // Apply font size to all elements except nav fonts and week titles
            document.querySelectorAll('*').forEach(el => {
                if (!el.classList.contains('week-title') &&
                    !el.closest('.week-header') &&
                    !el.closest('.command-hub') &&
                    !el.classList.contains('stat-label') &&
                    !el.classList.contains('stat-value') &&
                    !el.classList.contains('hud-header') &&
                    !el.classList.contains('main-title') &&
                    !el.classList.contains('main-subtitle')) {
                    el.style.fontSize = (parseInt(size) / 100 * 16) + 'px';
                }
            });
        }

        function makeTitleEditable(event) {
            event.preventDefault();
            const titleElement = document.getElementById('mainTitle');

            if (titleElement.contentEditable === 'true') {
                // Save the changes
                titleElement.contentEditable = 'false';
                titleElement.style.outline = 'none';
                titleElement.style.background = 'transparent';
                // Flash to indicate saved
                titleElement.style.color = '#4CAF50';
                setTimeout(() => {
                    titleElement.style.color = '#fff';
                }, 300);
            } else {
                // Make editable
                titleElement.contentEditable = 'true';
                titleElement.style.outline = '2px solid var(--primary)';
                titleElement.style.background = 'rgba(74, 159, 191, 0.1)';
                titleElement.focus();

                // Select all text for easy editing
                const range = document.createRange();
                range.selectNodeContents(titleElement);
                const selection = window.getSelection();
                selection.removeAllRanges();
                selection.addRange(range);

                // Add blur event listener to save on click away
                titleElement.addEventListener('blur', function () {
                    titleElement.contentEditable = 'false';
                    titleElement.style.outline = 'none';
                    titleElement.style.background = 'transparent';
                }, { once: true });

                // Add keydown event listener to save on Enter
                titleElement.addEventListener('keydown', function (e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        titleElement.blur();
                    }
                });
            }
        }

        function makeSubtitleEditable(event) {
            event.preventDefault();
            const subtitleElement = document.getElementById('mainSubtitle');

            if (subtitleElement.contentEditable === 'true') {
                // Save the changes
                subtitleElement.contentEditable = 'false';
                subtitleElement.style.outline = 'none';
                subtitleElement.style.background = 'transparent';
                // Flash to indicate saved
                subtitleElement.style.color = '#4CAF50';
                setTimeout(() => {
                    subtitleElement.style.color = 'var(--primary)';
                }, 300);
            } else {
                // Make editable
                subtitleElement.contentEditable = 'true';
                subtitleElement.style.outline = '2px solid var(--primary)';
                subtitleElement.style.background = 'rgba(74, 159, 191, 0.1)';
                subtitleElement.focus();

                // Select all text for easy editing
                const range = document.createRange();
                range.selectNodeContents(subtitleElement);
                const selection = window.getSelection();
                selection.removeAllRanges();
                selection.addRange(range);

                // Add blur event listener to save on click away
                subtitleElement.addEventListener('blur', function () {
                    subtitleElement.contentEditable = 'false';
                    subtitleElement.style.outline = 'none';
                    subtitleElement.style.background = 'transparent';
                }, { once: true });

                // Add keydown event listener to save on Enter
                subtitleElement.addEventListener('keydown', function (e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        subtitleElement.blur();
                    }
                });
            }
        }

        window.onclick = function () {
            document.getElementById('plansDropdown').classList.remove('active');
            document.getElementById('tileSizeDropdown').classList.remove('active');
        }

        init();
    </script>
