<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big Copy</title>
    <style>
        body {
            width: 300px;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
        }

        .container {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        h1 {
            margin: 0 0 15px 0;
            font-size: 1.5rem;
            color: #333;
            text-align: center;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        #status {
            margin-top: 15px;
            padding: 10px;
            text-align: center;
            border-radius: 6px;
            font-size: 0.9rem;
            display: none;
        }

        #status.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        #status.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .option-label {
            display: flex;
            align-items: center;
            margin: 10px 0;
            font-size: 0.9rem;
            color: #555;
        }

        input[type="checkbox"] {
            margin-right: 8px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Big Copy</h1>

        <div style="display: none;">
            <label class="option-label">
                <input type="checkbox" id="includeHtml" checked>
                Include HTML
            </label>

            <label class="option-label">
                <input type="checkbox" id="includeText" checked>
                Include Text
            </label>
        </div>

        <button id="copyBtn">Initializing...</button>

        <div id="status"></div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
