<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sims 4 - Optimized Node Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --s4-white: #ffffff;
            --s4-gray: #f2f2f2;
            --s4-blue: #35C6EB;
            --s4-dark-blue: #2594a4;
            --s4-shadow: rgba(0, 0, 0, 0.12);
            --node-dia: 100px;
            --curve-offset: -45px;
            --transition: 0.3s cubic-bezier(0.19, 1, 0.22, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--s4-gray);
            background-image:
                radial-gradient(at 0% 0%, rgba(53, 198, 235, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(78, 195, 0, 0.05) 0px, transparent 50%);
            color: #333;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 80px 20px;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 120px;
            background: var(--s4-white);
            padding: 25px 80px;
            border-radius: 25px;
            box-shadow: 0 5px 25px var(--s4-shadow);
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--s4-dark-blue);
            letter-spacing: -1px;
        }

        .node-container {
            display: flex;
            flex-direction: column;
            gap: 150px;
            width: 100%;
            max-width: 1100px;
            align-items: center;
        }

        .node-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 70px;
            position: relative;
        }

        .node-wrapper {
            position: relative;
            width: var(--node-dia);
            height: var(--node-dia);
        }

        /* Curved Logic: Outer nodes (+45px higher) */
        .node-row .node-wrapper:nth-child(1),
        .node-row .node-wrapper:nth-child(5) {
            transform: translateY(var(--curve-offset));
        }

        .node {
            width: 100%;
            height: 100%;
            background: var(--s4-white);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 12px var(--s4-shadow);
            position: relative;
            z-index: 10;
        }

        .node:hover {
            transform: scale(1.1);
            background: #fff;
            box-shadow: 0 10px 30px rgba(53, 198, 235, 0.3);
        }

        .plumbob-s4 {
            width: 25px;
            height: 40px;
            background: #4EC300;
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            border: 2px solid rgba(0, 0, 0, 0.1);
        }

        /* Sims 4 Pie Menu */
        .pie-menu {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            pointer-events: none;
            opacity: 0;
            transition: var(--transition);
            transform: translate(-50%, -50%) scale(0.4);
            z-index: 5;
        }

        .pie-menu.active {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            pointer-events: auto;
        }

        .pie-option {
            position: absolute;
            width: 80px;
            height: 80px;
            background: var(--s4-white);
            border: 2px solid var(--s4-blue);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 11px;
            font-weight: 700;
            color: var(--s4-dark-blue);
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 15px var(--s4-shadow);
            text-align: center;
            padding: 8px;
        }

        .pie-option:hover {
            background: var(--s4-blue);
            color: #fff;
            transform: translate(-50%, -50%) scale(1.1);
        }

        /* Distribution (Radius 120px) */
        .pie-option:nth-child(1) {
            transform: translate(-50%, -50%) rotate(0deg) translate(120px) rotate(0deg);
        }

        .pie-option:nth-child(2) {
            transform: translate(-50%, -50%) rotate(60deg) translate(120px) rotate(-60deg);
        }

        .pie-option:nth-child(3) {
            transform: translate(-50%, -50%) rotate(120deg) translate(120px) rotate(-120deg);
        }

        .pie-option:nth-child(4) {
            transform: translate(-50%, -50%) rotate(180deg) translate(120px) rotate(-180deg);
        }

        .pie-option:nth-child(5) {
            transform: translate(-50%, -50%) rotate(240deg) translate(120px) rotate(-240deg);
        }

        .pie-option:nth-child(6) {
            transform: translate(-50%, -50%) rotate(300deg) translate(120px) rotate(-300deg);
        }

        .node-label {
            position: absolute;
            bottom: -45px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--s4-white);
            color: #333;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            box-shadow: 0 4px 10px var(--s4-shadow);
            white-space: nowrap;
        }

        .btn-add-sims {
            margin-top: 100px;
            padding: 18px 60px;
            background: var(--s4-blue);
            border: none;
            border-radius: 50px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 20px rgba(53, 198, 235, 0.4);
        }

        .btn-add-sims:hover {
            background: var(--s4-dark-blue);
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(53, 198, 235, 0.5);
        }

        /* Pop-up bubble for interactions */
        .info-bubble {
            position: absolute;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--s4-dark-blue);
            color: #fff;
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .info-bubble::after {
            content: "";
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-top: 6px solid var(--s4-dark-blue);
        }

        .pie-option:hover~.info-bubble {
            opacity: 1;
            visibility: visible;
            top: -120px;
        }
    </style>
</head>

<body>

    <header class="header">
        <h1>Sims 4 Node Matrix</h1>
        <p style="opacity: 0.5; font-size: 0.9rem;">BUILD YOUR NETWORK</p>
    </header>

    <div class="node-container" id="matrix">
        <!-- Template Row -->
        <div class="node-row">
            <div class="node-wrapper">
                <div class="node" onclick="togglePie(this)">
                    <div class="plumbob-s4"></div><span class="node-label">Alpha Sim</span>
                </div>
                <div class="pie-menu">
                    <div class="pie-option" onmouseover="setTip(this, 'Open Dashboard')">Open</div>
                    <div class="pie-option" onmouseover="setTip(this, 'Modify Structure')">Build</div>
                    <div class="pie-option" onmouseover="setTip(this, 'Social Update')">Social</div>
                    <div class="pie-option" onmouseover="setTip(this, 'System Logs')">Log</div>
                    <div class="pie-option" onmouseover="setTip(this, 'Resource Map')">Map</div>
                    <div class="pie-option" onmouseover="setTip(this, 'Settings')">Config</div>
                    <div class="info-bubble">Tip Text</div>
                </div>
            </div>
            <!-- Repeat for 4 more nodes -->
            <div class="node-wrapper">
                <div class="node" onclick="togglePie(this)">
                    <div class="plumbob-s4"></div><span class="node-label">Beta Sim</span>
                </div>
                <div class="pie-menu">
                    <div class="pie-option">Open</div>
                    <div class="pie-option">Build</div>
                    <div class="pie-option">Social</div>
                    <div class="pie-option">Log</div>
                    <div class="pie-option">Map</div>
                    <div class="pie-option">Config</div>
                </div>
            </div>
            <div class="node-wrapper">
                <div class="node" onclick="togglePie(this)">
                    <div class="plumbob-s4"></div><span class="node-label">Gamma Sim</span>
                </div>
                <div class="pie-menu">
                    <div class="pie-option">Open</div>
                    <div class="pie-option">Build</div>
                    <div class="pie-option">Social</div>
                    <div class="pie-option">Log</div>
                    <div class="pie-option">Map</div>
                    <div class="pie-option">Config</div>
                </div>
            </div>
            <div class="node-wrapper">
                <div class="node" onclick="togglePie(this)">
                    <div class="plumbob-s4"></div><span class="node-label">Delta Sim</span>
                </div>
                <div class="pie-menu">
                    <div class="pie-option">Open</div>
                    <div class="pie-option">Build</div>
                    <div class="pie-option">Social</div>
                    <div class="pie-option">Log</div>
                    <div class="pie-option">Map</div>
                    <div class="pie-option">Config</div>
                </div>
            </div>
            <div class="node-wrapper">
                <div class="node" onclick="togglePie(this)">
                    <div class="plumbob-s4"></div><span class="node-label">Epsilon Sim</span>
                </div>
                <div class="pie-menu">
                    <div class="pie-option">Open</div>
                    <div class="pie-option">Build</div>
                    <div class="pie-option">Social</div>
                    <div class="pie-option">Log</div>
                    <div class="pie-option">Map</div>
                    <div class="pie-option">Config</div>
                </div>
            </div>
        </div>
    </div>

    <button class="btn-add-sims" onclick="addSimsRow()">+ Join New Cluster +</button>

    <script>
        function togglePie(el) {
            const menu = el.nextElementSibling;
            const active = menu.classList.contains('active');

            document.querySelectorAll('.pie-menu').forEach(m =\u003e m.classList.remove('active'));

            if (!active) menu.classList.add('active');
        }

        function setTip(el, text) {
            const tip = el.parentElement.querySelector('.info-bubble');
            if (tip) tip.textContent = text;
        }

        let rowC = 1;
        function addSimsRow() {
            rowC++;
            const matrix = document.getElementById('matrix');
            const row = document.createElement('div');
            row.className = 'node-row';
            row.style.opacity = '0';
            row.style.transform = 'translateY(30px)';
            row.style.transition = 'all 0.6s ease-out';

            for (let i = 0; i < 5; i++) {
                const wrap = document.createElement('div');
                wrap.className = 'node-wrapper';
                wrap.innerHTML = `
                    <div class="node" onclick="togglePie(this)">
                        <div class="plumbob-s4"></div>
                        <span class="node-label">Cluster ${rowC}.${i + 1}</span>
                    </div>
                    <div class="pie-menu">
                        <div class="pie-option">Open</div>
                        <div class="pie-option">Build</div>
                        <div class="pie-option">Social</div>
                        <div class="pie-option">Log</div>
                        <div class="pie-option">Map</div>
                        <div class="pie-option">Config</div>
                    </div>
                `;
                row.appendChild(wrap);
            }

            matrix.appendChild(row);

            setTimeout(() => {
                row.style.opacity = '1';
                row.style.transform = 'translateY(0)';
            }, 50);
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.node-wrapper')) {
                document.querySelectorAll('.pie-menu').forEach(m => m.classList.remove('active'));
            }
        });
    </script>
</body>

</html>
