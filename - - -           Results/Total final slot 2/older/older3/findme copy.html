        function saveLeadData() {
            if (!activeLeadKey) return;
            const leadCard = document.getElementById('lead-card');
            const items = leadCard.querySelectorAll('.lead-item');
            const checks = Array.from(items).map(item => item.querySelector('.lead-check').checked);
            const notes = Array.from(items).map(item => item.querySelector('.lead-note').value);

            // Trigger soft ignition on tracker for feedback
            const wrapper = document.querySelector(`.node-wrapper[data-id="${activeLeadKey}"]`);
            if (wrapper) {
                const tracker = wrapper.querySelector('.lead-tracker');
                if (tracker) {
                    tracker.classList.remove('ignition');
                    void tracker.offsetWidth;
                    tracker.classList.add('ignition');
                }
            }

            networkDataStore[activeLeadKey].leadData = { checks, notes };
            updateGlows();
        }

        function updateGlows() {
            document.querySelectorAll('.lead-tracker').forEach(tracker => {
                const wrap = tracker.closest('.node-wrapper');
                const key = wrap.getAttribute('data-id');
                const data = networkDataStore[key];

                tracker.classList.remove('state-low', 'state-mid', 'state-high', 'state-max', 'glowing');

                if (data && data.leadData) {
                    const filledChecks = data.leadData.checks.filter(c => c).length;
                    const filledNotes = data.leadData.notes.filter(n => n.trim() !== '').length;
                    const totalScore = filledChecks + filledNotes;

                    if (totalScore > 0) {
                        tracker.classList.add('glowing');
                        if (totalScore >= 1 && totalScore <= 3) tracker.classList.add('state-low');
                        else if (totalScore >= 4 && totalScore <= 6) tracker.classList.add('state-mid');
                        else if (totalScore >= 7 && totalScore <= 9) tracker.classList.add('state-high');
                        else if (totalScore === 10) tracker.classList.add('state-max');
                    }
                }
            });
            document.querySelectorAll('.node').forEach(node => {
                const wrap = node.closest('.node-wrapper');
                const key = wrap.getAttribute('data-id');
                const data = networkDataStore[key];
                if (data && data.leadData && (data.leadData.checks.some(c => c) || data.leadData.notes.some(n => n.trim()))) {
                    node.classList.add('has-lead');
                } else {
                    node.classList.remove('has-lead');
                }
            });
        }

            const data = networkDataStore[activeKey];

            // Limit to 10 phases maximum
            if (newIndex >= 10) {
                showLimitNotification(activeTile);

            });

            const workspaceAfter = activeTile.querySelector('.workflow-workspace');

                workspaceAfter.scrollTop = scrollPos;

        function renderWorkflow(tile, key) {
            const data = networkDataStore[key];
            const workspace = tile.querySelector('.workflow-workspace');

            // CRITICAL: Clean up existing particle intervals for this tile's steps before re-rendering
            // This prevents orphaned intervals from leaking
            for (let [pId, entry] of activeParticleIntervals) {
                if (pId.startsWith(key + '-p')) {
                    clearInterval(entry.interval);
                    activeParticleIntervals.delete(pId);
                }
            }

            // CRITICAL: Save scroll position before rendering
            const savedScrollPos = workspace ? workspace.scrollTop : 0;

            workspace.innerHTML = `
                <div class="left-panel"></div>
                <div class="main-area"></div>
            `;

            const leftPanel = workspace.querySelector('.left-panel');
            const mainArea = workspace.querySelector('.main-area');

            data.nodes.forEach((n, i) => {
                const node = document.createElement('div');
                node.className = 'station revealed' + (n.done ? ' done' : '') + (n.category ? ' category-' + n.category.toLowerCase() : '');
                node.innerHTML = `
                    <span contenteditable="true" style="font-size: 9px; text-align: center; margin-bottom: 2px;">${n.label}</span>
                    <div class="category-slider">
                        <div class="category-block press" data-category="Press">P</div>
                        <div class="category-block spotify" data-category="Spotify">S</div>
                        <div class="category-block social" data-category="Social">So</div>
                        <div class="category-block other" data-category="Other">O</div>
                    </div>
                    <button class="delete-phase" onclick="handleDeleteClick(this)" title="Triple-click to delete phase">×</button>
                `;

                // Pre-render workflow items for this step
                const rowItems = [];
                const gridRow = (i * 2) + 1; // Calculate grid row for this phase (1, 3, 5, 7, ...)

                n.subs.forEach((s, j) => {
                    const sub = document.createElement('div');
                    const isFirst = j === 0;
                    sub.className = 'station step-button' + (s.done ? ' done' : '') + (n.category ? ' category-' + n.category.toLowerCase() : '') + (isFirst ? ' first-step' : '');
                    sub.setAttribute('data-phase-index', i);
                    sub.setAttribute('data-step-index', j);
                    sub.style.opacity = '0';
                    sub.style.transform = 'scale(0.7)';
                    sub.style.pointerEvents = 'none';

                    // Assign grid position with progressive offset
                    sub.style.gridRow = gridRow;
                    const gridCol = (j * 2) + 1; // Column: 1, 3, 5, 7 (step columns)
                    sub.style.gridColumn = gridCol;
                    sub.style.alignSelf = 'start'; // Override center alignment
                    // Custom hand-tuned offsets for phases 1-10
                    let phase3Boost = 0;
                    if (i === 0) phase3Boost = 0;        // Phase 1: 0px total
                    else if (i === 1) phase3Boost = -2;  // Phase 2: 28px total (30*1 + -2) - moved up 2px from 30
                    else if (i === 2) phase3Boost = 67;  // Phase 3: 127px total (30*2 + 67) - moved up 3px from 130
                    else if (i === 3) phase3Boost = 25;  // Phase 4: 115px total (30*3 + 25) - moved up 30px more from 145
                    else if (i === 4) phase3Boost = 5;   // Phase 5: 125px total (30*4 + 5) - moved down 2px from 123
                    else if (i === 5) phase3Boost = -20; // Phase 6: 130px total (30*5 + -20) - moved down 2px from 128
                    else if (i === 6) phase3Boost = -55; // Phase 7: 125px total (30*6 + -55) - moved down 5px from 120
                    else if (i === 7) phase3Boost = -80; // Phase 8: 130px total (30*7 + -80) - moved down 10px from 120
                    else if (i === 8) phase3Boost = -111; // Phase 9: 129px total (30*8 + -111) - moved up 7px from 136
                    else if (i === 9) phase3Boost = -151; // Phase 10: 119px total (30*9 + -151) - moved up 5px from 124
                    else phase3Boost = 540 + ((i - 9) * 90); // Beyond Phase 10
                    sub.style.marginTop = (i * 30 + phase3Boost) + 'px';

                    // Create plumbob
                    const plumbob = document.createElement('div');
                    plumbob.className = 'plumbob';

                    // Create span
                    const span = document.createElement('span');
                    span.textContent = s.label;

                    // Append children
                    sub.appendChild(plumbob);
                    sub.appendChild(span);

                    // Set up click handler
                    sub.onclick = (e) => {
                        e.stopPropagation();
                        s.done = !s.done;
                        sub.classList.toggle('done', s.done);

                        const subId = `${key}-p${i}-s${j}`;
                        manageParticleEffect(subId, sub, s.done);
                    };

                    // Restore particle effect if already marked done
                    if (s.done) {
                        const subId = `${key}-p${i}-s${j}`;
                        manageParticleEffect(subId, sub, true);
                    }

                    // PROPER CONTEXT MENU TRIGGER (Right Click)
                    sub.oncontextmenu = (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        triggerBouncyMenu(e, sub, s);
                    };

                    mainArea.appendChild(sub);

                    if (j < n.subs.length - 1) {

                node.ondblclick = (e) => {

                    const nodeId = `${key}-phase-${i}`;

                    const nodeId = `${key}-phase-${i}`;

            // CRITICAL: Restore scroll position after rendering completes

            setTimeout(() => { workspace.scrollTop = savedScrollPos; }, 0);

        // Gentle faucet particle fountain effect
        function createCheckParticles(element) {
            if (!element) return;
            const isStep = element.classList.contains('step-button');
            const isMatrixNode = element.classList.contains('node');

            let checkX, checkY;
            if (isStep) {
                // For station steps (120px wide)
                // Checkmark is right: 10px, top: 50%, transY(-50px)
                checkX = 102; // Center of checkmark horizontally
                checkY = -25; // Just under the checkmark (17.5 - 50 + 7.5)
            } else if (isMatrixNode) {
                // For matrix nodes (usually 100px-132px diameter)
                // Checkmark is perfectly centered via translate(-50%, -50%)
                checkX = element.offsetWidth / 2;
                checkY = element.offsetHeight / 2 + 25; // Just under the large center checkmark
            } else {
                checkX = element.offsetWidth / 2;
                checkY = element.offsetHeight / 2;
            }

            const particleCount = 3; // Optimized for up to 40 simultaneous fountains
            for (let i = 0; i < particleCount; i++) {
                setTimeout(() => {
                    const particle = document.createElement('div');
                    particle.className = 'check-particle';

                    const spreadX = (Math.random() - 0.5) * 20;
                    const spreadY = Math.random() * 30 + 10;

                    particle.style.left = checkX + 'px';
                    particle.style.top = checkY + 'px';
                    particle.style.setProperty('--px', spreadX + 'px');
                    particle.style.setProperty('--py', spreadY + 'px');
                    particle.style.animation = `particleFountain ${2.2 + Math.random() * 0.6}s ease-out forwards`;

                    element.appendChild(particle);

                    setTimeout(() => particle.remove(), 2800);
                }, i * 55);
            }
        }

        function deletePhase(btn) {
            const node = btn.closest('.station');
            const leftPanel = node.parentElement;
            // Collect selected indices before deletion
            const selectedIndices = [];
            leftPanel.querySelectorAll('.station').forEach((s, i) => {
                if (s.classList.contains('selected')) selectedIndices.push(i);
            });
            const index = Array.from(leftPanel.children).indexOf(node);
            // Adjust selected indices for the deletion
            const adjustedIndices = selectedIndices.filter(i => i !== index).map(i => i > index ? i - 1 : i);
            // Delete the phase
            const data = networkDataStore[activeKey];
            data.nodes.splice(index, 1);
            // Re-render
            renderWorkflow(activeTile, activeKey);
            // Restore adjusted selected states
            const newStations = activeTile.querySelectorAll('.left-panel .station');
            const newMainArea = activeTile.querySelector('.main-area');
            adjustedIndices.forEach(i => {
                const node = newStations[i];
                const start = i * 7;
                const rowItems = [];
                for (let k = 0; k < 7; k++) {
                    rowItems.push(newMainArea.children[start + k]);
                }
                node.classList.add('selected');
                gsap.to(rowItems, { opacity: 1, scale: 1, duration: 0.6, stagger: 0.08, ease: "back.out(1.7)", pointerEvents: 'auto' });
            });
            log("Deleted phase");
        }

        function fillPhaseSubs(phaseData, category) {
            const tasks = shortcutTasks[category];
            if (!phaseData.subs || phaseData.subs.length === 0) {
                log(`Cannot fill phase "${phaseData.label}" - no sub-tasks available`);
                return;
            }
            // Collect currently selected phases before re-rendering
            const selectedIndices = [];
            const currentStations = activeTile.querySelectorAll('.left-panel .station');
            currentStations.forEach((s, i) => {
                if (s.classList.contains('selected')) selectedIndices.push(i);
            });
            phaseData.subs.forEach((s, i) => {
                if (i < tasks.length) {
                    s.label = tasks[i];
                }
            });
            // Update phase label to reflect the category
            const phaseNumber = phaseData.label.split(' ')[1] || '1';
            phaseData.label = category + ' ' + phaseNumber;
            phaseData.category = category;
            phaseData.expanded = true;
            renderWorkflow(activeTile, activeKey);
            // Restore selected states
            const data = networkDataStore[activeKey];
            const newStations = activeTile.querySelectorAll('.left-panel .station');
            const newMainArea = activeTile.querySelector('.main-area');
            selectedIndices.forEach(i => {
                const node = newStations[i];
                // Dynamically calculate element indices based on actual step counts
                const allMainChildren = Array.from(newMainArea.children);
                let currentIndex = 0;
                for (let pi = 0; pi < i; pi++) {
                    const phaseStepCount = data.nodes[pi].subs.length;
                    const elementsForThisPhase = phaseStepCount + (phaseStepCount - 1);
                    currentIndex += elementsForThisPhase;
                }
                const phaseStepCount = data.nodes[i].subs.length;
                const rowItems = [];
                for (let k = 0; k < phaseStepCount + (phaseStepCount - 1); k++) {
                    if (allMainChildren[currentIndex + k]) {
                        rowItems.push(allMainChildren[currentIndex + k]);
                    }
                }
                node.classList.add('selected');
                gsap.to(rowItems, { opacity: 1, scale: 1, duration: 0.6, stagger: 0.08, ease: "back.out(1.7)", pointerEvents: 'auto' });
            });
            // Auto-expand the filled phase to show the steps
            const filledIndex = data.nodes.indexOf(phaseData);
            if (filledIndex !== -1 && !selectedIndices.includes(filledIndex)) {
                const node = newStations[filledIndex];
                // Dynamically calculate element indices based on actual step counts
                const allMainChildren = Array.from(newMainArea.children);
                let currentIndex = 0;
                for (let pi = 0; pi < filledIndex; pi++) {
                    const phaseStepCount = data.nodes[pi].subs.length;
                    const elementsForThisPhase = phaseStepCount + (phaseStepCount - 1);
                    currentIndex += elementsForThisPhase;
                }
                const phaseStepCount = data.nodes[filledIndex].subs.length;
                const rowItems = [];
                for (let k = 0; k < phaseStepCount + (phaseStepCount - 1); k++) {
                    if (allMainChildren[currentIndex + k]) {
                        rowItems.push(allMainChildren[currentIndex + k]);
                    }
                }
                node.classList.add('selected');
                gsap.to(rowItems, { opacity: 1, scale: 1, duration: 0.6, stagger: 0.08, ease: "back.out(1.7)", pointerEvents: 'auto' });
            }
            log(`Filled phase "${phaseData.label}" with ${category} tasks`);
        }

                input.value = '';

        async function processTileSpotify(url, tile, directWrap = null) {
            const oembedUrl = `https://open.spotify.com/oembed?url=${encodeURIComponent(url)}`;
            try {
                const response = await fetch(oembedUrl);
                const data = await response.json();

                const artistName = data.title ? data.title.toUpperCase() : "SYNCED ARTIST";
                const thumbUrl = data.thumbnail_url;

                // 1. Determine target node and tile
                // If directWrap is null, we are coming from the Global Tile input, so use activeKey
                const nodeWrapper = directWrap || (activeKey ? document.querySelector(`.node-wrapper[data-id="${activeKey}"]`) : null);
                const effectiveTile = tile || (nodeWrapper && nodeWrapper.getAttribute('data-id') === activeKey ? activeTile : null);

                // 2. Update Tile Visuals
                if (effectiveTile) {
                    effectiveTile.querySelector('.tile-title span').innerText = artistName;
                    let thumb = effectiveTile.querySelector('.artist-thumb');
                    if (!thumb) {
                        thumb = document.createElement('img');
                        thumb.className = 'artist-thumb';
                        effectiveTile.querySelector('.tile-title').prepend(thumb);
                    }
                    thumb.src = thumbUrl;

                    // Clear tile input after sync
                    const tInput = effectiveTile.querySelector('input.spotify-input');
                    if (tInput) tInput.value = '';
                }

                // 3. Transform Matrix Node Visuals & Data
                if (nodeWrapper) {
                    const matrixNode = nodeWrapper.querySelector('.node');
                    matrixNode.style.backgroundImage = `url('${thumbUrl}')`;
                    matrixNode.classList.add('has-image');
                    nodeWrapper.setAttribute('data-synced', 'true');

                    const input = nodeWrapper.querySelector('.node-label.active-input');
                    if (input) {
                        // "POOF" Effect - Fade, Blur, Scale up
                        gsap.to(input, {
                            opacity: 0,
                            scale: 1.4,
                            filter: 'blur(10px)',
                            duration: 0.4,
                            ease: "power2.in",
                            onComplete: () => {
                                input.value = artistName;
                                nodeWrapper.setAttribute('data-label', artistName);
                                autoSizeInput(input);

                                // "BOOM" Effect - Scale down from 0.8, focus in
                                gsap.fromTo(input,
                                    { scale: 0.8, filter: 'blur(15px)', opacity: 0 },
                                    {
                                        scale: 1,
                                        filter: 'blur(0px)',
                                        opacity: 1,
                                        duration: 0.7,
                                        ease: "elastic.out(1, 0.75)"
                                    }
                                );
                            }
                        });
                    }

                    const key = nodeWrapper.getAttribute('data-id');
                    if (!networkDataStore[key]) {
                        networkDataStore[key] = {
                            nodes: [],
                            notes: "Standard Workflow Initialized.",
                            leadData: { checks: Array(5).fill(false), notes: Array(5).fill('') }
                        };
                        for (let i = 0; i < 10; i++) {
                            networkDataStore[key].nodes.push({
                                label: 'Phase ' + (i + 1),
                                done: false,
                                expanded: false,
                                subs: [{ label: 'Step 1', done: false }, { label: 'Step 2', done: false }, { label: 'Step 3', done: false }, { label: 'Step 4', done: false }]
                            });
                        }
                    }
                    networkDataStore[key].spotifyData = {
                        title: data.title,
                        thumbnail: thumbUrl,
                        url: url
                    };
                    return `Synced: ${data.title}`;
                }
            } catch (error) {
                return 'Sync failed: ' + error.message;
            }
        }
        function importNetwork(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    linkStorageData = data.links || {};
                    renderImported(data);
                    log("Network imported successfully");
                } catch (err) {
                    log("Error importing JSON: Invalid format");
                }
            };
            reader.readAsText(file);
        }

        function renderImported(data) {
            matrix.innerHTML = '';
            rowCount = data.rowCount || 0;
            networkDataStore = data.store || {};

            // Clean up potentially corrupted store entries
            Object.keys(networkDataStore).forEach(key => {
                if (!networkDataStore[key].leadData) {
                    networkDataStore[key].leadData = { checks: Array(5).fill(false), notes: Array(5).fill('') };
                }
            });

            // Group nodes by row
            const rows = {};
            data.nodes.forEach(n => {
                const parts = n.id ? n.id.split('.') : ["1", "0"];
                const rId = parts[0];
                if (!rows[rId]) rows[rId] = [];
                rows[rId].push(n);
            });

            Object.entries(rows).forEach(([rId, nodeList]) => {
                const row = document.createElement('div');
                row.className = 'node-row';

                // Sort by colId to maintain order
                nodeList.sort((a, b) => {
                    const aCol = parseInt(a.id.split('.')[1]);
                    const bCol = parseInt(b.id.split('.')[1]);
                    return aCol - bCol;
                });

                nodeList.forEach((n) => {
                    const parts = n.id.split('.');
                    const rowNum = parseInt(parts[0]);
                    const colNum = parseInt(parts[1]);
                    const nodeWrap = createNode(rowNum, colNum, n.label, n.id);

                    const nodeInner = nodeWrap.querySelector('.node');
                    if (n.done) nodeInner.classList.add('done');

                    // RESTORE VISUAL HIERARCHY (Spotify/Images)
                    const storeData = networkDataStore[n.id];
                    if (storeData && storeData.spotifyData) {
                        nodeInner.style.backgroundImage = `url('${storeData.spotifyData.thumbnail}')`;
                        nodeInner.classList.add('has-image');
                        nodeWrap.setAttribute('data-synced', 'true');
                    }

                    row.appendChild(nodeWrap);
                });

                // Add top separator wrapper if needed
                const rowWrapper = document.createElement('div');
                rowWrapper.style.position = 'relative';
                rowWrapper.style.width = '100%';
                rowWrapper.appendChild(row);

                matrix.appendChild(rowWrapper);
                updateRowLayout(row);
            });
            updateGlows();
        }

            const label = customLabel || (colId === 2 ? 'Artist Node' : 'Node');

                    placeholder="Paste Spotify..." 
                    value="${label}"
                    oninput="this.closest('.node-wrapper').setAttribute('data-label', this.value); autoSizeInput(this)"
                    onpaste="setTimeout(()=>{ const val=this.value; this.value='...'+val.slice(-8); autoSizeInput(this); syncFromNode(val, this); }, 10)"
                    onclick="handleNodeClick(this); event.stopPropagation()">
                    <div class="node-edit-btn" onclick="const i=this.previousElementSibling; i.focus(); i.select(); event.stopPropagation();" title="Click to Edit"></div>`;

            node.innerHTML = `<div class="plumbob"></div>
                             ${labelHTML}
                              <div class="lead-tracker" title="Lead Tracker" onclick="openLeadCard(this); event.stopPropagation();">
                                💰
                                <div class="lead-comet comet-1"></div>
                                <div class="lead-comet comet-2"></div>
                                <div class="moon-orbit"><div class="satellite"></div></div>
                              </div>`;

            // Auto-size after small delay to ensure DOM state
            setTimeout(() => {
                const input = node.querySelector('input');
                if (input) autoSizeInput(input);
            }, 0);
            node.onclick = (e) => {

                if (node.classList.contains('done')) {
                    manageParticleEffect(`node-${nodeId}`, node, true);
                }

            wrap.appendChild(node);
            return wrap;

        function addNodeToRow(side) {
            const rows = matrix.querySelectorAll('.node-row');
            if (rows.length === 0) {
                addRow();
                return;
            }
            const lastRow = rows[rows.length - 1];
            const currentNodes = Array.from(lastRow.querySelectorAll('.node-wrapper'));
            const colIds = currentNodes.map(n => parseInt(n.getAttribute('data-id').split('.')[1]));

            const minCol = Math.min(...colIds);
            const maxCol = Math.max(...colIds);

            if (side === 'left' && minCol <= -2) {
                log("Limit reached: Max 2 extra on left");
                return;
            }
            if (side === 'right' && maxCol >= 6) {
                log("Limit reached: Max 2 extra on right");
                return;
            }

            let targetColId = side === 'left' ? minCol - 1 : maxCol + 1;
            const newNode = createNode(rowCount, targetColId);

            newNode.style.opacity = '0';
            newNode.style.transform = 'scale(0.5)';

            if (side === 'left') {
                lastRow.prepend(newNode);
            } else {
                lastRow.appendChild(newNode);
            }

            updateRowLayout(lastRow);
            gsap.to(newNode, { opacity: 1, scale: 1, duration: 0.5, ease: "back.out(1.7)" });

            log(`Added node to ${side}`);
        }

        function updateRowLayout(row) {
            const wrappers = Array.from(row.querySelectorAll('.node-wrapper'));
            wrappers.forEach(wrap => {
                const colId = parseInt(wrap.getAttribute('data-id').split('.')[1]);
                const offset = Math.abs(colId - 2);

                // Parabolic vertical offset: y = - (x^1.8) * 18
                // This creates the "upwards and outward" feel
                const translateY = -Math.pow(offset, 1.8) * 18;

                // Slight scale reduction for perspective (outward)
                // Offset 0 (center) = 1.0, Offset 4 = 1.0 - (4*0.02) = 0.92
                const scale = 1.0 - (offset * 0.02);

                wrap.style.transform = `translateY(${translateY}px) scale(${scale})`;
                wrap.style.transition = 'transform 0.6s cubic-bezier(0.17, 0.67, 0.43, 1.05)';
            });
        }

        class WindParticle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * windWidth;
                this.y = Math.random() * windHeight;
                this.vx = (Math.random() - 0.5) * 0.8;
                this.vy = (Math.random() - 0.5) * 0.8;
                this.size = Math.random() * 2 + 1;
                this.opacity = Math.random() * 0.3 + 0.1;
                this.origX = this.x;
                this.origY = this.y;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (this.x < -50) this.x = windWidth + 50;
                if (this.x > windWidth + 50) this.x = -50;
                if (this.y < -50) this.y = windHeight + 50;
                if (this.y > windHeight + 50) this.y = -50;
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < 80; i++) {
                particles.push(new WindParticle());
            }
        }

        function drawPlexus() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const p1 = particles[i];
                    const p2 = particles[j];
                    const dist = Math.hypot(p1.x - p2.x, p1.y - p2.y);

                    if (dist < 150) {
                        const alpha = (1 - dist / 150) * 0.15;
                        ctx.strokeStyle = `rgba(53, 198, 235, ${alpha})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animateWind() {
            ctx.clearRect(0, 0, windWidth, windHeight);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            drawPlexus();
            requestAnimationFrame(animateWind);
        }

        window.addEventListener('resize', resizeWind);
        resizeWind();
        animateWind();

        document.addEventListener('mousedown', (e) => {
            // Only allow closing via the specific X buttons as requested
        });
    </script>
</body>

</html>
