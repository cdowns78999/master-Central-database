<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sims 4 - Advanced Network Matrix</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --s4-white: #ffffff;
            --s4-gray: #f2f2f2;
            --s4-blue: #35C6EB;
            --s4-dark-blue: #2594a4;
            --s4-green: #4EC300;
            --s4-shadow: rgba(0, 0, 0, 0.12);
            --node-dia: 100px;
            --sub-dia: 70px;
            --ter-dia: 30px;
            --curve-offset: -45px;
            --transition: 0.4s cubic-bezier(0.17, 0.67, 0.43, 1.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #06070a;
            background-image:
                radial-gradient(at 0% 0%, rgba(53, 198, 235, 0.12) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(78, 195, 0, 0.08) 0px, transparent 50%),
                radial-gradient(at 50% 50%, rgba(177, 157, 255, 0.05) 0px, transparent 100%);
            background-size: 200% 200%;
            animation: backgroundShimmer 20s ease infinite;
            color: #eee;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px 150px;
            overflow-x: hidden;
            position: relative;
        }

        @keyframes windDrift {
            0% {
                background-position: -200% 0;
                opacity: 0;
            }

            50% {
                opacity: 0.15;
            }

            100% {
                background-position: 200% 0;
                opacity: 0;
            }
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg,
                    transparent,
                    rgba(255, 255, 255, 0.05) 20%,
                    transparent 40%,
                    rgba(255, 255, 255, 0.08) 60%,
                    transparent 80%);
            background-size: 200% 100%;
            animation: windDrift 30s linear infinite;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes oceanShimmer {
            0% {
                transform: scale(1) translate(0, 0);
            }

            50% {
                transform: scale(1.1) translate(-1%, -2%);
            }

            100% {
                transform: scale(1) translate(0, 0);
            }
        }

        /* --- Aurora Background & Blobs --- */
        .aurora-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: #05080c;
            overflow: hidden;
            pointer-events: none;
        }

        .blob {
            position: absolute;
            width: min(80vw, 800px);
            height: min(80vw, 800px);
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.12;
            animation: blobDrift 25s infinite alternate ease-in-out;
        }

        .blob-1 {
            background: var(--s4-blue);
            top: -10%;
            left: -10%;
            animation-delay: 0s;
        }

        .blob-2 {
            background: var(--s4-green);
            bottom: -10%;
            right: -10%;
            animation-delay: -5s;
        }

        .blob-3 {
            background: gold;
            top: 40%;
            left: 50%;
            width: 500px;
            height: 500px;
            animation-delay: -12s;
        }

        @keyframes blobDrift {
            0% {
                transform: translate(0, 0) scale(1) rotate(0deg);
            }

            100% {
                transform: translate(150px, 80px) scale(1.3) rotate(15deg);
            }
        }

        /* --- Jellyfish Wind Separator (Organic Wiggle) --- */
        .wind-separator {
            position: relative;
            width: 100%;
            height: 80px;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: visible;
        }

        .separator-string {
            position: absolute;
            width: 380px;
            height: 10px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.9), transparent);
            filter: blur(2px);
            box-shadow: 0 0 45px rgba(53, 198, 235, 0.5);
            border-radius: 50%;
            animation: jellyfishCore 6s ease-in-out infinite alternate;
        }

        /* Organic Tentacle Arms */
        .separator-string::before,
        .separator-string::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, rgba(53, 198, 235, 0.4), transparent);
            filter: blur(5px);
            border-radius: 50%;
        }

        .separator-string::before {
            top: 25px;
            animation: jellyfishWiggle 6s ease-in-out infinite alternate -1.5s;
        }

        .separator-string::after {
            top: -25px;
            animation: jellyfishWiggle 6s ease-in-out infinite alternate -3s;
        }

        @keyframes jellyfishCore {
            0% {
                transform: translateY(-5px) rotate(-1.5deg) skewX(-4deg);
                opacity: 0.2;
            }

            50% {
                transform: translateY(12px) rotate(1.5deg) skewX(4deg) scaleX(1.1);
                opacity: 0.9;
            }

            100% {
                transform: translateY(-5px) rotate(-1.5deg) skewX(-4deg);
                opacity: 0.2;
            }
        }

        @keyframes jellyfishWiggle {
            0% {
                transform: translateX(-40px) skewX(12deg) scaleX(0.7) rotate(-8deg);
                opacity: 0;
            }

            50% {
                transform: translateX(0) skewX(-12deg) scaleX(1.3) rotate(8deg);
                opacity: 0.7;
            }

            100% {
                transform: translateX(40px) skewX(12deg) scaleX(0.7) rotate(-8deg);
                opacity: 0;
            }
        }

        /* --- UI Elements --- */
        #wind-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            opacity: 0.4;
        }

        .header {
            text-align: center;
            margin-bottom: 80px;
            width: 100%;
            max-width: 900px;
            position: sticky;
            top: 20px;
            z-index: 2000;
            background: transparent;
            pointer-events: none;
        }

        .header>* {
            pointer-events: auto;
        }

        h1 {
            display: block;
            font-size: 11px;
            letter-spacing: 5px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 25px;
            text-transform: uppercase;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }

        .header-actions {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            padding: 2px 10px;
            background: rgba(13, 22, 35, 0.9);
            backdrop-filter: blur(30px);
            border-radius: 50px;
            border: 1.5px solid gold;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            pointer-events: auto;
            gap: 0;
            /* Removing gap to let separators do the work */
        }

        .btn-header {
            padding: 10px 35px;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-header:not(:last-child)::after {
            content: "";
            position: absolute;
            right: 0;
            top: 25%;
            height: 50%;
            width: 1px;
            background: rgba(255, 215, 0, 0.15);
            /* Subtle gold separator */
        }

        .btn-header:hover {
            color: #fff;
            transform: translateY(-1px);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.4);
        }

        .btn-add-top {
            color: gold;
        }

        .btn-add-top span {
            color: #a29bfe;
            /* Purple plus icon */
            font-size: 18px;
            font-weight: 900;
            line-height: 1;
        }

        .btn-header:not(.btn-add-top) {
            color: rgba(255, 255, 255, 0.7);
        }

        .node-container {
            display: flex;
            flex-direction: column;
            gap: 280px;
            /* Increased to 280px for cleaner wing vertical space */
            /* Expansive spacing for high-end feel */
            width: 95%;
            max-width: 1600px;
            /* Increased from 1100px to avoid squishing */
            align-items: center;
            margin-top: 100px;
            /* More breathing room at the top */
        }

        .node-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 110px;
            position: relative;
        }

        .node-wrapper {
            position: relative;
            width: var(--node-dia);
            height: var(--node-dia);
        }

        /* Center Node - Slightly Larger */
        .node-row .node-wrapper.is-center {
            width: 132px;
            height: 132px;
            z-index: 5;
        }


        .node {
            width: 100%;
            height: 100%;
            background: var(--s4-white);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 12px var(--s4-shadow);
            position: relative;
            z-index: 100;
        }



        .node::before,
        .node::after,
        .lead-tracker::before,
        .lead-tracker::after {
            content: '';
            position: absolute;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1), transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: -1;
        }

        .node::before {
            inset: -12px;
            border-radius: 50%;
            background: conic-gradient(from 0deg,
                    rgba(53, 198, 235, 0) 0%,
                    rgba(53, 198, 235, 1) 25%,
                    rgba(78, 195, 0, 1) 50%,
                    rgba(53, 198, 235, 1) 75%,
                    rgba(53, 198, 235, 0) 100%);
            -webkit-mask: radial-gradient(transparent 62%, #000 64%);
            mask: radial-gradient(transparent 62%, #000 64%);
            filter: blur(1px);
            transform: scale(0.9);
        }

        .node::after {
            inset: -8px;
            border-radius: 50%;
            border: 2px solid rgba(53, 198, 235, 0.3);
            transform: scale(0.9);
        }

        /* Visualizers trigger on ANY hover over the node (white space) */
        .node:hover::before {
            opacity: 1;
            transform: scale(1);
            animation: visualizerSpin 4s linear infinite;
        }

        .node:hover::after {
            opacity: 1;
            transform: scale(1);
            animation: visualizerPulse 1.5s ease-out infinite;
        }

        @keyframes visualizerSpin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes visualizerPulse {
            0% {
                transform: scale(1);
                opacity: 0.8;
            }

            100% {
                transform: scale(1.4);
                opacity: 0;
            }
        }

        @keyframes exquisiteSpin {
            0% {
                transform: rotate(0deg) scale(1);
            }

            50% {
                transform: rotate(180deg) scale(1.1);
            }

            100% {
                transform: rotate(360deg) scale(1);
            }
        }

        @keyframes exquisitePulse {

            0%,
            100% {
                opacity: 0.4;
            }

            50% {
                opacity: 1;
            }
        }

        @keyframes exquisiteFloat {

            0%,
            100% {
                transform: translateX(-50%) translateY(0);
            }

            50% {
                transform: translateX(-50%) translateY(-6px);
            }
        }

        .node.active-primary {
            box-shadow: 0 0 0 4px var(--s4-blue);
        }

        .plumbob {
            width: 25px;
            height: 40px;
            background: var(--s4-green);
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            border: 2px solid rgba(0, 0, 0, 0.1);
            animation: spin3d 4s linear infinite;
            transition: 0.3s;
            transform-origin: center;
        }

        .node.done {
            background: var(--s4-green) !important;
            box-shadow: 0 0 30px rgba(78, 195, 0, 0.6);
        }

        .node.done::after {
            content: '✓';
            color: #fff;
            font-weight: 900;
            font-size: 50px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            z-index: 10;
        }

        .node.done .plumbob,
        .node.done .node-label {
            opacity: 0.3;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                filter: brightness(1);
            }

            50% {
                transform: scale(1.1);
                filter: brightness(1.2);
            }
        }

        .node-label {
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            background: transparent;
            /* Borderless look */
            color: rgba(255, 255, 255, 0.9);
            padding: 8px 10px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 700;
            white-space: nowrap;
            outline: none;
            border: none;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1), transform 0.3s, color 0.3s, width 0.2s;
            width: 80px;
            text-align: center;
            pointer-events: auto;
            cursor: text;
        }

        .node.has-image {
            background-size: cover;
            background-position: center;
            border: 3px solid var(--s4-blue);
            box-shadow: 0 0 20px rgba(53, 198, 235, 0.5);
        }

        .node.has-image .plumbob {
            display: none;
        }

        .node-label.active-input {
            background: transparent;
            color: #fff;
            text-shadow: 0 0 15px rgba(53, 198, 235, 0.8);
            animation: textGlowPulse 2s infinite ease-in-out;
        }

        @keyframes textGlowPulse {

            0%,
            100% {
                transform: translateX(-50%) scale(1);
                text-shadow: 0 0 10px rgba(53, 198, 235, 0.5);
            }

            50% {
                transform: translateX(-50%) scale(1.05);
                text-shadow: 0 0 20px rgba(53, 198, 235, 0.9);
            }
        }

        /* Tiny Glowing Gold Dot for Synced Nodes */
        .node-edit-btn {
            position: absolute;
            bottom: -32px;
            right: -2px;
            width: 8px;
            height: 8px;
            background: gold;
            border-radius: 50%;
            display: none;
            cursor: pointer;
            z-index: 1001;
            transition: all 0.2s;
            box-shadow: 0 0 8px gold, 0 0 15px rgba(255, 215, 0, 0.4);
            animation: dotGlow 1.5s ease-in-out infinite alternate;
        }

        @keyframes dotGlow {
            0% {
                transform: scale(1);
                opacity: 0.8;
                box-shadow: 0 0 5px gold;
            }

            100% {
                transform: scale(1.3);
                opacity: 1;
                box-shadow: 0 0 12px gold, 0 0 20px rgba(255, 215, 0, 0.6);
            }
        }

        .node-edit-btn:hover {
            transform: scale(1.5);
            box-shadow: 0 0 15px gold, 0 0 25px rgba(255, 215, 0, 0.8);
        }

        .node-wrapper[data-synced="true"] .node-edit-btn {
            display: flex;
        }

        @keyframes glowPulse {

            0%,
            100% {
                box-shadow: 0 0 15px rgba(53, 198, 235, 0.3);
            }

            50% {
                box-shadow: 0 0 30px rgba(53, 198, 235, 0.6);
            }
        }

        .node-label.active-input:hover {
            transform: translateX(-50%) scale(1.1);
            text-shadow: 0 0 25px rgba(53, 198, 235, 1);
            animation: none;
        }

        .node-label.active-input:focus {
            background: transparent;
            color: #fff;
            transform: translateX(-50%) scale(1.1);
            z-index: 1000;
            border-bottom: 2.5px solid var(--s4-blue);
        }

        /* Specific style for central 'Main' node input */
        .node-label.active-input.main-node {
            color: gold;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
        }

        /* --- Level 2: Pie Menu (4 Sub-nodes) --- */
        .pie-menu {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            pointer-events: none;
            opacity: 0;
            transition: var(--transition);
            transform: translate(-50%, -50%) scale(0.4) rotate(-45deg);
            z-index: 50;
        }

        .pie-menu.active {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1) rotate(0deg);
            pointer-events: auto;
        }

        .sub-node {
            position: absolute;
            width: var(--sub-dia);
            height: var(--sub-dia);
            background: var(--s4-white);
            border: 3px solid var(--s4-blue);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 10px;
            font-weight: 700;
            color: var(--s4-dark-blue);
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 5px 15px var(--s4-shadow);
            padding: 5px;
            text-align: center;
        }

        .sub-node span {
            outline: none;
            cursor: text;
            display: block;
            width: 100%;
            border-bottom: 1px dashed transparent;
            transition: 0.3s;
        }

        .sub-node:hover {
            border-color: var(--s4-dark-blue);
            transform: translate(-50%, -50%) scale(1.15);
        }

        .sub-node span:hover,
        .sub-node span:focus {
            border-bottom-color: var(--s4-dark-blue);
        }

        /* Blossom Style Symmetrical Distribution (All Above) */
        .sub-node:nth-child(1) {
            transform: translate(-50%, -50%) translate(-100px, -50px);
        }

        .sub-node:nth-child(2) {
            transform: translate(-50%, -50%) translate(-45px, -110px);
        }

        .sub-node:nth-child(3) {
            transform: translate(-50%, -50%) translate(45px, -110px);
        }

        .sub-node:nth-child(4) {
            transform: translate(-50%, -50%) translate(100px, -50px);
        }

        /* --- Footer Actions --- */
        .btn-add {
            margin-top: 50px;
            padding: 15px 50px;
            background: var(--s4-blue);
            border: none;
            border-radius: 50px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(53, 198, 235, 0.4);
        }

        .btn-add:hover {
            background: var(--s4-dark-blue);
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(53, 198, 235, 0.5);
        }

        .spotify-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(53, 198, 235, 0.3);
            border-radius: 8px;
            padding: 8px 15px;
            color: var(--s4-blue);
            font-size: 12px;
            width: 100%;
            max-width: 400px;
            outline: none;
            transition: all 0.3s;
        }

        .quick-integrations {
            padding: 15px 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(53, 198, 235, 0.02);
            margin-top: 30px;
            /* Space from title */
        }

        .quick-integrations label {
            font-size: 11px;
            color: var(--s4-blue);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .spotify-input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--s4-blue);
            box-shadow: 0 0 15px rgba(53, 198, 235, 0.3);
        }

        .spotify-input::placeholder {
            color: rgba(53, 198, 235, 0.5);
        }

        .action-log {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 250px;
            max-height: 200px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 5px 15px var(--s4-shadow);
            overflow-y: auto;
            font-size: 0.8rem;
            z-index: 3000;
        }

        .log-entry {
            margin-bottom: 5px;
            border-bottom: 1px solid #eee;
            padding-bottom: 2px;
        }

        /* --- Red Carpet Workflow --- */
        .config-tile {
            position: fixed;
            top: 50%;
            left: 50%;
            /* Fixed central position */
            transform: translate(-50%, -50%) scale(0);
            width: min(1100px, 95vw);
            height: min(700px, 85vh);
            background: rgba(10, 15, 25, 0.9);
            backdrop-filter: blur(50px);
            padding: 30px;
            border-radius: 40px;
            box-shadow: 0 50px 150px rgba(0, 0, 0, 1),
                0 0 1px 1px rgba(255, 255, 255, 0.5),
                0 0 30px rgba(255, 255, 255, 0.3),
                0 0 60px rgba(255, 255, 255, 0.2),
                0 0 90px rgba(200, 220, 255, 0.15),
                0 0 120px rgba(180, 200, 255, 0.08),
                inset 0 0 100px rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.35);
            z-index: 500;
            opacity: 0;
            pointer-events: none;
            transition: 0.7s cubic-bezier(0.19, 1, 0.22, 1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .config-tile.active {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            pointer-events: auto;
        }

        .workflow-note {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 12px 20px;
            color: #fff;
            font-size: 14px;
            outline: none;
            margin-bottom: 30px;
            transition: 0.3s;
            cursor: pointer;
            text-align: center;
            font-weight: 500;
        }

        .workflow-note:focus {
            border-color: var(--s4-blue);
            background: rgba(53, 198, 235, 0.05);
            box-shadow: 0 0 20px rgba(53, 198, 235, 0.2);
        }

        .workflow-workspace {
            width: 100%;
            flex: 1;
            min-height: 0;
            position: relative;
            display: flex;
            align-items: flex-start;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            margin: 20px 0;
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 215, 0, 0.5) transparent;
        }

        .workflow-workspace::-webkit-scrollbar {
            width: 8px;
        }

        .workflow-workspace::-webkit-scrollbar-track {
            background: transparent;
        }

        .workflow-workspace::-webkit-scrollbar-thumb {
            background: rgba(255, 215, 0, 0.5);
            border-radius: 4px;
        }

        /* ═══════════════════════════════════════════════════════════════
           SPATIAL MATH PROTOCOL - Phase & Workflow Alignment System
           ═══════════════════════════════════════════════════════════════

           PHASE BUTTON DIMENSIONS:
           • Width: 120px
           • Height: ~117px calculated as:
             - Top padding: 5px
             - Label height: ~9px
             - Gap: 3px
             - Grid (2×2 52px squares): 107px (52 + 3 + 52)
             - Bottom padding: 5px
             - TOTAL: 117px

           PHASE SPACING:
           • Vertical gap between phases: 20px
           • Left panel width: 150px
           • Total phase cycle height: 117px + 20px = 137px

           WORKFLOW STEP DIMENSIONS:
           • Height: 35px (30% of phase height for visual balance)
           • Connector width: 40px
           • Vertical alignment: center (via grid align-items)

           MINI MENU (Right-Click):
           • Appears 31px below step button
           • Height: ~28px (3px padding × 2 + 12px font + 10px)
           • Border matches parent button color (darkened -0.15 alpha)

           PROPORTIONAL RELATIONSHIPS:
           • Phase:Step ratio = 117:35 ≈ 3.3:1
           • Phase:Gap ratio = 117:20 ≈ 5.9:1
           • Step:Menu ratio = 35:28 ≈ 1.25:1
           ═══════════════════════════════════════════════════════════════ */

        .left-panel {
            flex: 0 0 150px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            /* Phase vertical spacing */
            padding: 15px;
            padding-top: 60px;
            overflow-y: visible;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        .tile-title {
            position: absolute;
            top: 10px;
            /* Moved even higher */
            left: 30px;
            right: 30px;
            font-size: 14px;
            color: var(--s4-blue);
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .artist-thumb {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            margin-right: 12px;
            border: 1.5px solid gold;
            object-fit: cover;
            box-shadow: 0 0 12px rgba(255, 215, 0, 0.4);
            flex-shrink: 0;
            background: #111;
        }

        .main-area {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 40px 1fr 40px 1fr 40px 1fr;
            grid-template-rows: repeat(auto-fill, 117px 20px);
            gap: 0;
            padding: 60px;
            overflow-y: visible;
            align-content: start;
            /* ALIGNMENT PROTOCOL: Progressive offset aligns workflow step buttons with their phase buttons */
            /* Phase buttons: auto height (~117px: 5px top padding + 9px label + 3px gap + 107px grid + 5px bottom padding) */
            /* Step buttons: 35px tall */
            /* Grid row assignment + progressive marginTop ensures alignment all the way down */
            align-items: center;
        }

        .connector {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            color: var(--s4-blue);
            opacity: 0;
            pointer-events: none;
            font-weight: 900;
            transform: translateX(-20px);
        }

        .station.selected {
            border-color: var(--s4-blue);
            box-shadow: 0 0 20px rgba(53, 198, 235, 0.5);
        }


        .station {
            width: 120px;
            height: auto;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: stretch;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0.2;
            transform: translateY(10px);
            cursor: default;
            position: relative;
            color: #fff;
            font-size: 11px;
            font-weight: 500;
            padding: 5px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            overflow: visible;
            gap: 3px;
        }

        /* Category Slider - 2x2 Grid with Perfect Squares */
        /* Width: 120px - 10px padding (5px each side) - 3px gap = 107px available */
        /* Each column: (107px - 3px gap) / 2 = 52px per square */
        .category-slider {
            display: grid;
            grid-template-columns: 52px 52px;
            grid-template-rows: 52px 52px;
            gap: 3px;
            width: 100%;
            padding: 0;
            justify-content: center;
        }

        .category-block {
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        .category-block::before {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0.15;
            transition: opacity 0.3s;
        }

        .category-block:hover::before {
            opacity: 0.3;
        }

        .category-block.press {
            background: linear-gradient(135deg, rgba(53, 198, 235, 0.2), rgba(53, 198, 235, 0.1));
            border: 1px solid rgba(53, 198, 235, 0.3);
            color: var(--s4-blue);
        }

        .category-block.spotify {
            background: linear-gradient(135deg, rgba(78, 195, 0, 0.2), rgba(78, 195, 0, 0.1));
            border: 1px solid rgba(78, 195, 0, 0.3);
            color: var(--s4-green);
        }

        .category-block.social {
            background: linear-gradient(135deg, rgba(155, 89, 182, 0.2), rgba(155, 89, 182, 0.1));
            border: 1px solid rgba(155, 89, 182, 0.3);
            color: #9b59b6;
        }

        .category-block.other {
            background: linear-gradient(135deg, rgba(230, 126, 34, 0.2), rgba(230, 126, 34, 0.1));
            border: 1px solid rgba(230, 126, 34, 0.3);
            color: #e67e22;
        }

        .station .plumbob {
            display: none;
            /* Quieter look inside tile */
        }

        .station span {
            width: 100%;
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            pointer-events: none;
        }

        .station.revealed {
            opacity: 1;
            transform: translateY(0);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .station:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--s4-blue);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            transform: translateY(-2px);
        }

        .station.done {
            opacity: 1 !important;
        }

        .station.done.category-spotify {
            background: rgba(78, 195, 0, 0.3) !important;
            border-color: var(--s4-green) !important;
            color: var(--s4-green);
            box-shadow: 0 0 30px rgba(78, 195, 0, 0.6);
            animation: shineGreen 1s ease-in-out;
        }

        .station.done.category-press {
            background: rgba(53, 198, 235, 0.3) !important;
            border-color: var(--s4-blue) !important;
            color: var(--s4-blue);
            box-shadow: 0 0 30px rgba(53, 198, 235, 0.6);
            animation: shineBlue 1s ease-in-out;
        }

        .station.done.category-social {
            background: rgba(155, 89, 182, 0.3) !important;
            /* Purple */
            border-color: #9b59b6 !important;
            color: #9b59b6;
            box-shadow: 0 0 30px rgba(155, 89, 182, 0.6);
            animation: shinePurple 1s ease-in-out;
        }

        .station.done.category-other {
            background: rgba(230, 126, 34, 0.3) !important;
            /* Orange */
            border-color: #e67e22 !important;
            color: #e67e22;
            box-shadow: 0 0 30px rgba(230, 126, 34, 0.6);
            animation: shineOrange 1s ease-in-out;
        }

        @keyframes shineGreen {

            0%,
            100% {
                box-shadow: 0 0 30px rgba(78, 195, 0, 0.6);
            }

            50% {
                box-shadow: 0 0 50px rgba(78, 195, 0, 1);
            }
        }

        @keyframes shineBlue {

            0%,
            100% {
                box-shadow: 0 0 30px rgba(53, 198, 235, 0.6);
            }

            50% {
                box-shadow: 0 0 50px rgba(53, 198, 235, 1);
            }
        }

        @keyframes shinePurple {

            0%,
            100% {
                box-shadow: 0 0 30px rgba(155, 89, 182, 0.6);
            }

            50% {
                box-shadow: 0 0 50px rgba(155, 89, 182, 1);
            }
        }

        @keyframes shineOrange {

            0%,
            100% {
                box-shadow: 0 0 30px rgba(230, 126, 34, 0.6);
            }

            50% {
                box-shadow: 0 0 50px rgba(230, 126, 34, 1);
            }
        }

        .station.done::after {
            content: '✓';
            color: var(--s4-green);
            font-weight: 900;
            font-size: 18px;
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%) translateY(-50px);
            z-index: 10;
        }

        /* Particle fountain effect - gentle faucet dots */
        .check-particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(220, 220, 220, 0.9);
            border-radius: 50%;
            pointer-events: none;
            z-index: 10001;
        }

        @keyframes particleFountain {
            0% {
                opacity: 0;
                transform: translate(0, 0) scale(1);
            }

            15% {
                opacity: 0.6;
            }

            100% {
                opacity: 0;
                transform: translate(var(--px), var(--py)) scale(0.2);
            }
        }

        .delete-phase {
            position: absolute;
            right: 3px;

        }

        }

        .btn-add-station {
            position: absolute;
            top: 10px;

        }

        .close-tile {
            position: absolute;
            top: 10px;
            right: 10px;

            cursor: pointer;
            z-index: 30;

        }

        }

        .lead-tracker {
            position: absolute;
            top: -45px;
            left: 50%;
            transform: translateX(-50%);
            width: 34px;
            height: 34px;
            /* Minimal Premium Look */
            background: rgba(13, 22, 35, 0.85);
            backdrop-filter: blur(10px);
            border: 1.5px solid rgba(255, 215, 0, 0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4), 0 0 15px rgba(255, 215, 0, 0.2);
            cursor: pointer;
            z-index: 10;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: visible;
            perspective: 800px;
        }

        /* Diagonal Satellite Orbit (Saturn Style) - Hidden by Default */
        .moon-orbit {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50px;
            height: 50px;
            transform: translate(-50%, -50%) rotateX(70deg) rotateY(20deg);
            pointer-events: none;
            z-index: 15;
            visibility: hidden;
            opacity: 0;
            transition: opacity 1s ease-in-out, visibility 1s;
        }

        .satellite {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 11px;
            height: 13px;
            background: #dfe6e9;
            /* Metallic body */
            border-radius: 1px;
            box-shadow: 0 0 18px rgba(255, 255, 255, 1);
            animation: satelliteOrbit 6s linear infinite;
        }

        /* Tiny Solar Panels */
        .satellite::before,
        .satellite::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 7px;
            background: #0984e3;
            /* Solar blue */
            border: 0.5px solid rgba(255, 255, 255, 0.6);
            top: 3px;
        }

        .satellite::before {
            left: -17px;
        }

        .satellite::after {
            right: -17px;
        }

        @keyframes satelliteOrbit {
            0% {
                transform: rotate(0deg) translate(28px) rotate(0deg);
                z-index: 15;
            }

            50% {
                transform: rotate(180deg) translate(28px) rotate(-180deg);
                z-index: -1;
            }

            100% {
                transform: rotate(360deg) translate(28px) rotate(-360deg);
                z-index: 15;
            }
        }

        /* Specular Gloss Overlay - Softened */
        .lead-tracker::after {
            content: '';
            position: absolute;
            top: 20%;
            left: 20%;
            width: 30%;
            height: 30%;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            filter: blur(2px);
            pointer-events: none;
            z-index: 2;
        }

        /* Prismatic Wind Layers (Refractive Aura) */
        .lead-tracker::before {
            content: '';
            position: absolute;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 1.3s ease-in-out, transform 1.3s ease-in-out;
            pointer-events: none;
            filter: blur(10px);
            z-index: -1;
        }

        /* Billiard Physics - Dramatic Travel & Speed */
        @keyframes billiardFloat {
            0% {
                transform: translateX(-50%) translateY(0) rotate(0deg);
            }

            25% {
                transform: translateX(-58%) translateY(-12px) rotate(6deg);
            }

            50% {
                transform: translateX(-42%) translateY(-18px) rotate(-8deg);
            }

            75% {
                transform: translateX(-54%) translateY(-10px) rotate(4deg);
            }

            100% {
                transform: translateX(-50%) translateY(0) rotate(0deg);
            }
        }

        .lead-tracker span {
            display: inline-block;
            transition: transform 0.7s ease-out;
            z-index: 1;
            user-select: none;
        }

        .lead-tracker.glowing span {
            animation: ballRoll 3.2s ease-in-out infinite;
            /* ~10% faster than previous */
        }

        @keyframes ballRoll {

            0%,
            100% {
                transform: rotate(0deg) scale(1.1);
            }

            50% {
                transform: rotate(30deg) scale(1.25);
            }
        }

        /* Intense Bright White Ignition Burst */
        .lead-tracker.ignition {
            animation: brightIgnition 0.7s cubic-bezier(0.19, 1, 0.22, 1);
        }

        @keyframes brightIgnition {
            0% {
                transform: translateX(-50%) scale(1);
                filter: brightness(1) contrast(1);
                box-shadow: 0 0 0 0 transparent;
            }

            20% {
                transform: translateX(-50%) scale(1.6);
                filter: brightness(2.5) contrast(1.2);
                box-shadow:
                    0 0 40px 15px white,
                    0 0 60px 25px rgba(255, 255, 255, 0.8),
                    0 0 80px 35px var(--s4-blue);
            }

            100% {
                transform: translateX(-50%) scale(1);
                filter: brightness(1) contrast(1);
                box-shadow: 0 0 0 0 transparent;
            }
        }

        /* Swirling White Comets - Hidden by Default */
        .lead-comet {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 5px;
            height: 5px;
            background: #fff;
            border-radius: 50%;
            box-shadow:
                0 0 10px #fff,
                0 0 20px #fff,
                -8px 0 15px 2px rgba(255, 255, 255, 0.6);
            /* Tail effect */
            pointer-events: none;
            z-index: 10;
            visibility: hidden;
            opacity: 0;
            transition: opacity 1s ease-in-out, visibility 1s;
        }

        .lead-tracker.glowing .lead-comet,
        .lead-tracker.glowing .moon-orbit {
            visibility: visible;
            opacity: 1;
        }

        .comet-1 {
            animation: cometSwirl 3.5s linear infinite;
        }

        .comet-2 {
            animation: cometSwirl 4.8s linear infinite reverse;
            animation-delay: -1.2s;
        }

        @keyframes cometSwirl {
            0% {
                transform: rotate(0deg) translateX(35px) rotate(0deg) scale(1);
            }

            25% {
                scale: 1.2;
            }

            50% {
                transform: rotate(180deg) translateX(35px) rotate(-180deg) scale(0.6);
            }

            75% {
                scale: 0.8;
            }

            100% {
                transform: rotate(360deg) translateX(35px) rotate(-360deg) scale(1);
            }
        }

        @keyframes exquisiteBreath {

            0%,
            100% {
                opacity: 0.2;
                transform: scale(1);
            }

            50% {
                opacity: 0.8;
                transform: scale(1.2);
            }
        }

        /* Gorgeous Harmonic Rainbow States (Speed Boosted 10%) */
        .lead-tracker.state-low {
            animation: billiardFloat 5s ease-in-out infinite;
        }

        .lead-tracker.state-low::before {
            opacity: 0.35;
            inset: -15px;
            background: conic-gradient(from 0deg,
                    transparent, var(--s4-blue), transparent, var(--s4-green), transparent, gold, transparent);
            animation: exquisiteSpin 6.5s linear infinite, exquisiteBreath 3.2s ease-in-out infinite;
            -webkit-mask: radial-gradient(transparent 55%, #000 70%);
        }

        .lead-tracker.state-mid {
            animation: billiardFloat 3.2s ease-in-out infinite;
        }

        .lead-tracker.state-mid::before {
            opacity: 0.55;
            inset: -20px;
            background: conic-gradient(from 45deg,
                    var(--s4-blue), transparent, var(--s4-green), transparent, gold, transparent, white, transparent);
            animation: exquisiteSpin 4.8s linear infinite, exquisiteBreath 2.4s ease-in-out infinite;
            -webkit-mask: radial-gradient(transparent 50%, #000 65%);
        }

        .lead-tracker.state-high {
            animation: billiardFloat 2.4s ease-in-out infinite;
        }

        .lead-tracker.state-high::before {
            opacity: 0.75;
            inset: -22px;
            background: conic-gradient(from 90deg,
                    var(--s4-blue), var(--s4-green), gold, white, var(--s4-blue), gold, var(--s4-green));
            animation: exquisiteSpin 3.2s linear infinite, exquisiteBreath 1.8s ease-in-out infinite;
            -webkit-mask: radial-gradient(transparent 45%, #000 60%);
            filter: blur(5px);
        }

        .lead-tracker.state-max {
            animation: billiardFloat 1.6s ease-in-out infinite;
            box-shadow:
                0 0 25px var(--s4-blue),
                0 0 45px var(--s4-green),
                0 0 70px gold,
                0 0 90px white;
            /* Dialed down */
            filter: brightness(1.3);
        }

        .lead-tracker.state-max::before {
            opacity: 0.95;
            inset: -28px;
            background: conic-gradient(from 180deg,
                    var(--s4-blue), white, var(--s4-green), white, gold, white, var(--s4-blue), gold, var(--s4-green));
            animation: exquisiteSpin 2.4s linear infinite, exquisiteBreath 1.6s ease-in-out infinite;
            -webkit-mask: radial-gradient(transparent 40%, #000 55%);
            filter: blur(4px);
        }

        .lead-tracker.state-max::after {
            opacity: 0.8;
            inset: -32px;
            background: conic-gradient(from 180deg, gold, transparent, white, transparent, gold, transparent, white, transparent);
            animation: exquisiteSpin 3s linear infinite reverse;
            -webkit-mask: radial-gradient(transparent 50%, #000 65%);
            filter: blur(2px) contrast(1.5);
            box-shadow: inset 0 0 20px white;
            /* Extra inner shimmer */
        }

        .lead-tracker:hover {
            transform: translateX(-50%) scale(1.1);
            filter: brightness(1.2);
            box-shadow: 0 10px 40px rgba(53, 198, 235, 0.8), 0 0 30px rgba(255, 215, 0, 0.5);
        }

        /* ALIGNMENT PROTOCOL: Step buttons in workflows */
        /* These are the horizontal workflow steps that appear when a phase expands */
        /* Phase button height: ~117px (auto-calculated from 52×52 grid + padding + label) */
        /* Step button height: 35px (roughly 1/3 of phase height for clean proportions) */

            padding: 6px 12px;

            border: 1px solid var(--s4-blue);
            color: var(--s4-blue);
            border-radius: 8px;
            cursor: pointer;
            font-size: 10px;
            font-weight: 700;
            transition: all 0.3s;
            text-align: center;
            pointer-events: auto;
        }

        .overlay-shortcut-btn:hover {
            background: var(--s4-blue);
            color: #fff;
            transform: scale(1.05);
        }

        /* --- Lead Card --- */
        .lead-card {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 600px;
            height: 500px;
            min-width: 300px;
            min-height: 250px;
            background: rgba(10, 15, 25, 0.95);
            /* Concise minimal background */
            backdrop-filter: blur(40px);
            padding: 30px;
            border-radius: 30px;
            border: none;
            /* Removed border as requested */
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            z-index: 600;
            opacity: 0;
            pointer-events: none;
            transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            display: flex;
            flex-direction: column;
            resize: both;
            overflow: hidden;

        .lead-card::after {
            content: "";
            position: absolute;
            bottom: 5px;
            right: 5px;

            height: 15px;

            border-radius: 2px;
            pointer-events: none;
            opacity: 0.6;

        .lead-title {

            text-align: center;

            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);

        .lead-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .lead-content::-webkit-scrollbar {
            width: 6px;
        }

        .lead-content::-webkit-scrollbar-thumb {
            background: rgba(255, 215, 0, 0.3);
            border-radius: 10px;
        }

        .lead-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 5px;
            /* Minimal padding since no boxes */
            border-radius: 12px;
            background: transparent;
            /* Removed layers */
            border: none;
            /* Removed borders */
            transition: all 0.3s;
        }

        .lead-item:hover {
            background: rgba(255, 255, 255, 0.02);
            transform: translateX(3px);
        }

        .lead-check {
            width: 20px;
            height: 20px;
            accent-color: gold;
        }

        .lead-note {
            flex: 1;
            padding: 8px 10px;
            background: transparent;
            /* Borderless look */
            border: none;
            border-bottom: 1px solid rgba(255, 215, 0, 0.1);
            /* Subtle indicator */
            color: #fff;
            border-radius: 0;
            outline: none;
            transition: border-bottom 0.3s;
        }

        .lead-note:focus {
            border-bottom: 1px solid gold;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        .close-lead {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            color: #ff4444;
            font-size: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .close-lead:hover {
            color: #ff6666;
            transform: scale(1.2);
        }

        @keyframes leadGlow {
            0% {
                box-shadow: 0 0 20px gold, 0 0 40px rgba(255, 215, 0, 0.5);
            }

            100% {
                box-shadow: 0 0 30px gold, 0 0 60px rgba(255, 215, 0, 0.8);
            }
        }

        .node.has-lead:has(.lead-tracker:hover) {
            box-shadow: 0 15px 60px rgba(53, 198, 235, 0.9), 0 0 40px rgba(255, 215, 0, 0.6);
        }

        .hidden {
            display: none !important;
        }

        /* --- Phase Shortcut Menu --- */
        .phase-menu {
            position: absolute;
            right: -120px;
            top: 0;
            width: 100px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 100;
        }

        .phase-menu.active {
            opacity: 1;
            pointer-events: auto;
        }

        .phase-shortcut-btn {
            padding: 5px 10px;

            color: var(--s4-blue);
            border-radius: 8px;
            cursor: pointer;
            font-size: 10px;
            font-weight: 700;

        .phase-shortcut-btn:hover {

        .artist-thumb {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--s4-blue);
            margin-right: 10px;
        }

        /* --- Bouncy Submenu (Right Click) --- */
        #bouncy-submenu {
            position: fixed;
            z-index: 20000;
            background: rgba(13, 22, 35, 0.9);
            backdrop-filter: blur(30px);
            border: 1.5px solid gold;
            border-radius: 30px;
            padding: 2px 6px;
            display: flex;
            align-items: center;
            gap: 4px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), 0 0 10px rgba(255, 215, 0, 0.2);
            /* Truncation Protocol: Limit width to maintain half-pill structure */
            width: max-content;
            max-width: 280px;
            /* Initial State Hidden */
            opacity: 0;
            transform: perspective(1000px) translate3d(0, -20px, -50px) scale(0.5);
            pointer-events: none;
            transition: none;
            /* Handled by GSAP */
        }

        /* Subtle Mechanical Handles */
        #bouncy-submenu::before,
        #bouncy-submenu::after {
            content: '';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 2px;
            height: 55%;
            background: rgba(255, 215, 0, 0.15);
            border-radius: 1px;
            box-shadow: 0 0 6px rgba(255, 215, 0, 0.1);
        }

        #bouncy-submenu::before {
            left: 5px;
        }

        #bouncy-submenu::after {
            right: 5px;
        }

        #bouncy-submenu.active {
            pointer-events: auto;
        }

        .submenu-btn {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.8);
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;

            color: #a29bfe;

        /* --- Link Storage Fields --- */
        .link-field {
            position: relative;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 3px 12px;
            background: rgba(128, 128, 128, 0.08);

        .link-field:not(:last-child)::after {
            content: "";

        /* Field Label (L1, L2, L3) */
        .field-label {

        /* Link Input Field */
        .link-input {
            flex: 1;

            border: none;

            font-size: 11px;
            font-weight: 600;

            white-space: nowrap;
            overflow: hidden;

        .link-input:focus {
            border-bottom-color: gold;
            color: #fff;
        }

        .link-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
            font-size: 7px;
        }

        /* Link Display (Saved State) */
        .link-display {
            flex: 1;
            min-width: 0;
            /* Ensures flex item can shrink for ellipsis */
            font-family: monospace;
            font-style: italic;
            font-size: 11px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding: 1px 2px;
            text-overflow: ellipsis;
            overflow: hidden;
            white-space: nowrap;
            cursor: pointer;
        }

        .link-display:hover {
            color: #fff;
            text-decoration: underline;
        }

        /* URL Warning Indicator */
        .link-field .url-warning {
            position: absolute;
            right: 2px;
            top: 2px;
            font-size: 8px;
            color: orange;
            opacity: 0.6;
        }

        /* Active Field Layout (Vertical stack for drawer) */
        .link-field {
            position: relative;
            display: flex;
            flex-direction: column;
            /* Stack label/input and drawer */
            gap: 2px;
            padding: 2px 6px;
            background: rgba(128, 128, 128, 0.08);
            border-radius: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            min-height: 32px;
            max-width: 220px;
            overflow: hidden;
            /* For drawer clip */
        }

        .field-top {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            min-width: 0;
            /* Allows children to truncate */
            overflow: hidden;
            /* Safety for ellipsis */
        }

        /* Action Drawer (Scroll-down effect) */
        .link-drawer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), margin-top 0.3s;
            display: flex;
            justify-content: center;
            /* Center them for better clarity */
            gap: 12px;
            padding: 0 10px;
            width: 100%;
            position: relative;
            z-index: 1000;
            /* Ensure top layer */
            pointer-events: none;
            /* Only buttons should be clickable */
        }

        .link-field.drawer-open .link-drawer {
            max-height: 48px;
            margin-top: 10px;
            padding-bottom: 8px;
            pointer-events: auto;
        }

        .link-field.drawer-open {
            background: rgba(53, 198, 235, 0.15);
            box-shadow: inset 0 0 20px rgba(53, 198, 235, 0.1);
        }

        @keyframes vinylSpin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        /* Iconic Actions */
        .drawer-btn {
            background: transparent;
            border: none;
            width: 36px;
            height: 36px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            opacity: 0.5;
            transform: scale(0.8);
            font-size: 0;
            position: relative;
            z-index: 1001;
            transform-style: preserve-3d;
        }

        .link-field.drawer-open .drawer-btn {
            opacity: 1;
            transform: scale(1);
        }

        .drawer-btn:hover {
            opacity: 1;
            transform: scale(1.3) translateY(-3px) !important;
            z-index: 1002;
        }

        .drawer-btn.open:hover {
            color: #fff;
            filter: drop-shadow(0 0 8px var(--s4-blue));
            box-shadow: 0 0 15px rgba(53, 198, 235, 0.4);
        }

        .drawer-btn.copy:hover {
            color: #fff;
            filter: drop-shadow(0 0 8px gold);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }

        .drawer-btn.edit:hover {
            color: #fff;
            filter: drop-shadow(0 0 8px #a29bfe);
            box-shadow: 0 0 15px rgba(162, 155, 254, 0.4);
        }

        .drawer-btn.delete:hover {
            color: #fff;
            filter: drop-shadow(0 0 8px #ff4444);
            box-shadow: 0 0 15px rgba(255, 68, 68, 0.4);
        }

        /* 3D Icon Styles */
        .drawer-btn::before {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            transform-style: preserve-3d;
        }

        /* Open Link Icon - 3D Link */
        .drawer-btn.open::before {
            border: 2px solid rgba(53, 198, 235, 0.6);
            border-radius: 4px;
            box-shadow: 2px 2px 0 rgba(53, 198, 235, 0.3),
                inset 1px 1px 0 rgba(53, 198, 235, 0.4);
            transform: rotate(-45deg);

        .drawer-btn.open:hover::before {
            border-color: rgba(53, 198, 235, 1);
            box-shadow: 3px 3px 0 rgba(53, 198, 235, 0.5),
                inset 2px 2px 0 rgba(53, 198, 235, 0.6);
        }

        /* Copy Icon - 3D Document Stack */
        .drawer-btn.copy::before {
            width: 14px;
            height: 16px;
            border: 2px solid rgba(255, 215, 0, 0.6);
            border-radius: 2px;
            box-shadow: 3px 3px 0 rgba(255, 215, 0, 0.3),
                inset 1px 1px 0 rgba(255, 215, 0, 0.4);
        }

        .drawer-btn.copy:hover::before {
            border-color: rgba(255, 215, 0, 1);

        /* Edit Icon - 3D Pencil */
        .drawer-btn.edit::before {
            width: 3px;

            box-shadow: 2px 0 0 rgba(162, 155, 254, 0.3),
                inset 1px 0 0 rgba(162, 155, 254, 0.6);
            transform: rotate(135deg);
        }

        .drawer-btn.edit::after {
            content: '';
            position: absolute;
            width: 6px;
            height: 6px;
            background: rgba(162, 155, 254, 0.8);
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            transform: rotate(135deg) translateY(-10px);

        .drawer-btn.edit:hover::before {
            background: linear-gradient(to bottom, rgba(162, 155, 254, 1), rgba(162, 155, 254, 0.6));
            box-shadow: 3px 0 0 rgba(162, 155, 254, 0.5),
                inset 2px 0 0 rgba(162, 155, 254, 0.8);

        /* Delete Icon - 3D Trash Can */
        .drawer-btn.delete::before {

            border-top: 3px solid rgba(255, 68, 68, 0.8);
            border-radius: 0 0 2px 2px;
            box-shadow: 2px 2px 0 rgba(255, 68, 68, 0.3),
                inset 1px 1px 0 rgba(255, 68, 68, 0.4);

        .drawer-btn.delete:hover::before {

            border-top-color: rgba(255, 68, 68, 1);
            box-shadow: 3px 3px 0 rgba(255, 68, 68, 0.5),
                inset 2px 2px 0 rgba(255, 68, 68, 0.6);

        .link-field.unlocked {

            border: 1px dashed gold;
        }

        /* Delete Button in Unlocked State */
        .field-edit {
            background: rgba(255, 68, 68, 0.2);
            border: 1px solid rgba(255, 68, 68, 0.4);
            color: #ff4444;
            width: 16px;
            height: 16px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 900;
            line-height: 1;
        }

        .field-edit:hover {

        }

        /* Link Saved Glow */
        .link-field.link-saved {
            animation: linkGlow 1s ease-out;
        }

        @keyframes linkGlow {
            0% {
                box-shadow: 0 0 20px rgba(78, 195, 0, 0.8);
            }

            100% {
                box-shadow: none;
            }
        }
    </style>
</head>

<body>

    <div class="aurora-container">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    <canvas id="wind-canvas"></canvas>
    <header class="header">

                onblur="this.classList.remove('editing')">TITLE</span>

                onpaste="setTimeout(()=>processTileSpotify(this.value, document.getElementById('global-config-tile')), 10)">

    <script>
        const matrix = document.getElementById('matrix');
        const logEl = document.getElementById('log');
        const overlay = document.getElementById('hover-overlay');
        let rowCount = 0;
        let activeTile = null;
        let activeKey = null;
        let hideTimeout = null;

        let networkDataStore = {};
        let activeParticleIntervals = new Map(); // Tracks intervals for looping particles (ID -> {interval, element})

        function manageParticleEffect(id, element, isDone) {
            // First, clear any existing interval for this ID to prevent duplicates
            const existing = activeParticleIntervals.get(id);
            if (existing) {
                clearInterval(existing.interval);
                activeParticleIntervals.delete(id);
            }

            if (isDone && element) {
                // Return to 200ms loop as requested for better flow
                const interval = setInterval(() => createCheckParticles(element), 200);
                activeParticleIntervals.set(id, { interval, element });
                createCheckParticles(element); // Instant start
            }
        }

        // Link Storage for Mini Menu - Format: { 'nodeId': { '1': {url: '...', name: '...'}, '2': {...}, '3': {...} } }
        let linkStorageData = {};
        let currentMenuStorageId = null; // Tracks current phase context for mini menu

        const shortcutTasks = {

        function showOverlay(e, nodeData, isPhaseNode = false) {
            const rect = e.currentTarget.getBoundingClientRect();
            // Position to the right of the element
            overlay.style.top = (rect.top + rect.height / 2) + 'px';
            overlay.style.left = rect.right + 'px';

            // Populate Data
            // Show/hide workflow buttons based on node type
            const buttonsContainer = document.getElementById('overlay-buttons-container');
            if (isPhaseNode) {
                buttonsContainer.style.display = 'flex';

                // Attach click handlers to buttons with current phase data
                const buttons = buttonsContainer.querySelectorAll('.overlay-shortcut-btn');
                buttons.forEach(btn => {
                    // Remove old handlers to prevent duplicates
                    btn.onclick = null;

                    // Add new handler with current nodeData in closure
                    btn.onclick = (clickEvent) => {
                        clickEvent.stopPropagation();
                        const category = btn.getAttribute('data-category');
                        fillPhaseSubs(nodeData, category);
                        hideOverlay(); // Hide overlay after selection

            overlay.onmouseleave = () => {
                hideOverlay();
            };

        /* --- Bouncy Submenu Logic --- */
        const bouncyMenu = document.getElementById('bouncy-submenu');
        let activeMenuTarget = null;

        function triggerBouncyMenu(e, targetElement, dataNode) {
            // TOGGLE LOGIC: If right-clicking the same target, hide it
            if (activeMenuTarget === targetElement && bouncyMenu.classList.contains('active')) {
                hideBouncyMenu();
                return;
            }

            // Close any existing
            hideBouncyMenu();

            activeMenuTarget = targetElement;
            const rect = targetElement.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;

            // Get button's border color and darken it by 3px equivalent
            const computedStyle = window.getComputedStyle(targetElement);
            let borderColor = computedStyle.borderColor || 'rgba(255, 215, 0, 0.5)';

            if (borderColor.includes('rgba')) {
                borderColor = borderColor.replace(/[\d.]+\)$/g, match => {
                    const alpha = parseFloat(match);
                    return (Math.max(0, alpha - 0.15)) + ')';
                });
            }

            // ROBOTIC CLAW INITIAL STATE
            gsap.set(bouncyMenu, {
                left: centerX - (bouncyMenu.offsetWidth / 2),
                top: rect.top + 2,
                opacity: 0,
                scale: 0.85,
                z: -100,
                rotateX: -90,
                transformOrigin: "center top",
                zIndex: 9998,
                borderTopLeftRadius: '8px',
                borderTopRightRadius: '8px',
                borderColor: borderColor
            });

            bouncyMenu.classList.add('active');

            // MECHANICAL TIMELINE
            const tl = gsap.timeline();
            tl.to(bouncyMenu, {
                opacity: 1,
                rotateX: 10,
                top: rect.bottom + 31,
                z: -20,
                duration: 0.35,
                ease: "power2.out",
                borderTopLeftRadius: '8px',
                borderTopRightRadius: '8px',
                borderColor: borderColor
            }).to(bouncyMenu, {
                rotateX: 0,
                scale: 1,
                z: 0,
                duration: 0.25,
                ease: "back.out(2.5)",
                borderTopLeftRadius: '6px',
                borderTopRightRadius: '6px',
                borderColor: borderColor
            });

            // Set Context and Refresh UI
            const phaseIndex = targetElement.getAttribute('data-phase-index');
            currentMenuStorageId = `${activeKey}-p${phaseIndex}`;
            refreshLinkUI();
        }

        function hideBouncyMenu() {
            if (!bouncyMenu.classList.contains('active')) return;
            gsap.to(bouncyMenu, {
                opacity: 0,
                rotateX: -45,
                scale: 0.8,
                top: "-=10",
                duration: 0.2,

        // ONE-TIME INITIALIZATION: Listeners are bound once to avoid duplication
        function initLinkMenuListeners() {
            for (let i = 1; i <= 2; i++) {
                const field = document.getElementById(`link-field-${i}`);
                const input = field.querySelector('.link-input');
                const display = field.querySelector('.link-display');
                const editBtn = field.querySelector('.field-edit');

                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        const url = input.value.trim();
                        if (url && currentMenuStorageId) {
                            let fixedUrl = url;
                            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                                fixedUrl = 'https://' + url;
                                field.classList.add('url-fixed');
                                setTimeout(() => field.classList.remove('url-fixed'), 2000);
                            }
                            // Direct save without prompt - cleaner flow
                            saveLinkField(currentMenuStorageId, i, fixedUrl, fixedUrl);
                            refreshLinkUI();

                            // AUTO-REVEAL: Open the action drawer immediately after saving
                            field.classList.add('drawer-open');

                            field.classList.add('link-saved');
                            setTimeout(() => field.classList.remove('link-saved'), 1000);
                        }
                    }
                });

                // DRAWER TOGGLE: Click display to open/close action icons
                display.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const saved = linkStorageData[currentMenuStorageId] && linkStorageData[currentMenuStorageId][i.toString()];
                    if (!saved) return;

                    // Close other drawers first
                    document.querySelectorAll('.link-field').forEach(f => {
                        if (f !== field) f.classList.remove('drawer-open');
                    });

                    field.classList.toggle('drawer-open');
                });

                // ICONIC ACTIONS (Drawer)
                const drawer = field.querySelector('.link-drawer');
                drawer.querySelector('.copy').addEventListener('click', (e) => {
                    e.stopPropagation();
                    const saved = linkStorageData[currentMenuStorageId] && linkStorageData[currentMenuStorageId][i.toString()];
                    if (saved) {
                        navigator.clipboard.writeText(saved.url);
                        log(`Copied: ${saved.url}`);
                        // Visual feedback on the drawer icon?
                        const btn = e.currentTarget;
                        const original = btn.textContent;
                        btn.textContent = "✅";
                        setTimeout(() => btn.textContent = original, 1000);
                    }
                });

                drawer.querySelector('.open').addEventListener('click', (e) => {
                    e.stopPropagation();
                    const saved = linkStorageData[currentMenuStorageId] && linkStorageData[currentMenuStorageId][i.toString()];
                    if (saved) window.open(saved.url, '_blank');
                });

                drawer.querySelector('.delete').addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (currentMenuStorageId && confirm('Delete this link?')) {
                        delete linkStorageData[currentMenuStorageId][i.toString()];
                        field.classList.remove('drawer-open');
                        refreshLinkUI();
                    }
                });

                drawer.querySelector('.edit').addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (currentMenuStorageId) {
                        editLinkField(currentMenuStorageId, i.toString(), field);
                    }
                });
            }

        function refreshLinkUI() {
            if (!currentMenuStorageId) return;
            for (let i = 1; i <= 2; i++) {
                const field = document.getElementById(`link-field-${i}`);
                if (!field) continue;

                const input = field.querySelector('.link-input');
                const display = field.querySelector('.link-display');

                const saved = linkStorageData[currentMenuStorageId] && linkStorageData[currentMenuStorageId][i.toString()];

                if (saved) {
                    updateLinkDisplay(currentMenuStorageId, i);
                    display.classList.remove('hidden');
                    input.classList.add('hidden');
                    field.classList.add('has-link');
                } else {
                    display.classList.add('hidden');
                    input.classList.remove('hidden');
                    input.value = '';
                    field.classList.remove('has-link');
                    field.classList.remove('drawer-open');
                }
            }
            // Focus first empty input
            const firstEmpty = bouncyMenu.querySelector('.link-input:not(.hidden)');
            if (firstEmpty) firstEmpty.focus();
        }

        function saveLinkField(nodeId, fieldNum, url, name) {
            if (!linkStorageData[nodeId]) linkStorageData[nodeId] = {};
            linkStorageData[nodeId][fieldNum.toString()] = { url, name };
            fetchTitleAndFavicon(url).then(data => {
                if (data.title) linkStorageData[nodeId][fieldNum].title = data.title;
                if (data.favicon) linkStorageData[nodeId][fieldNum].favicon = data.favicon;
                updateLinkDisplay(nodeId, fieldNum);
            }).catch(() => updateLinkDisplay(nodeId, fieldNum));
        }

        function fetchTitleAndFavicon(url) {
            return fetch(url, { mode: 'no-cors' }) // Try no-cors to avoid CORS
                .then(response => {
                    if (!response.ok) throw new Error('Fetch failed');
                    return response.text();
                })
                .then(html => {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    const title = doc.querySelector('title')?.textContent?.trim() || '';
                    const favicon = doc.querySelector('link[rel*="icon"]')?.href || url + '/favicon.ico';
                    return { title, favicon };
                })
                .catch(() => ({}));
        }

        function updateLinkDisplay(nodeId, fieldNum) {
            const saved = linkStorageData[nodeId] && linkStorageData[nodeId][fieldNum.toString()];
            if (!saved) return;
            const field = document.getElementById(`link-field-${fieldNum}`);
            const display = field.querySelector('.link-display');

            // TRUNCATION PROTOCOL: Use title if available, else name/url.
            const fullLabel = saved.title || saved.name || saved.url;
            display.textContent = fullLabel;
        }

        function editLinkField(nodeId, fieldNum, field) {
            const choice = prompt('Choose: rename, delete, replace');
            if (choice === 'rename') {
                const newName = prompt('New name:');
                if (newName) {
                    linkStorageData[nodeId][fieldNum].name = newName;
                    refreshLinkUI();
                }
            } else if (choice === 'delete') {
                delete linkStorageData[nodeId][fieldNum];
                refreshLinkUI();
            } else if (choice === 'replace') {
                const newUrl = prompt('New URL:', linkStorageData[nodeId][fieldNum].url);
                if (newUrl) {
                    linkStorageData[nodeId][fieldNum].url = newUrl;
                    refreshLinkUI();
                }
            }
        }
