<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sims 4 - Advanced Network Matrix</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --s4-white: #ffffff;
            --s4-gray: #f2f2f2;
            --s4-blue: #35C6EB;
            --s4-dark-blue: #2594a4;
            --s4-green: #4EC300;
            --s4-shadow: rgba(0, 0, 0, 0.12);
            --node-dia: 100px;
            --sub-dia: 70px;
            --ter-dia: 30px;
            --curve-offset: -45px;
            --transition: 0.4s cubic-bezier(0.17, 0.67, 0.43, 1.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #06070a;
            background-image:
                radial-gradient(at 0% 0%, rgba(53, 198, 235, 0.12) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(78, 195, 0, 0.08) 0px, transparent 50%),
                radial-gradient(at 50% 50%, rgba(177, 157, 255, 0.05) 0px, transparent 100%);
            background-size: 200% 200%;
            animation: backgroundShimmer 20s ease infinite;
            color: #eee;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px 150px;
            overflow-x: hidden;
            position: relative;
        }

        @keyframes backgroundShimmer {
            0% {
                background-position: 0% 0%;
            }

            50% {
                background-position: 100% 100%;
            }

            100% {
                background-position: 0% 0%;
            }
        }

        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M40 40c0-1.1.9-2 2-2s2 .9 2 2-.9 2-2 2-2-.9-2-2zm-20 0c0-1.1.9-2 2-2s2 .9 2 2-.9 2-2 2-2-.9-2-2zm40 0c0-1.1.9-2 2-2s2 .9 2 2-.9 2-2 2-2-.9-2-2zM40 20c0-1.1.9-2 2-2s2 .9 2 2-.9 2-2 2-2-.9-2-2zm0 40c0-1.1.9-2 2-2s2 .9 2 2-.9 2-2 2-2-.9-2-2z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
            z-index: -1;
        }

        /* --- UI Elements --- */
        .header {
            text-align: center;
            margin-bottom: 80px;
            width: 100%;
            max-width: 900px;
            position: sticky;
            top: 20px;
            z-index: 2000;
            background: transparent;
            pointer-events: none;
        }

        .header>* {
            pointer-events: auto;
        }

        h1 {
            display: none;
        }

        .search-bar {
            width: 100%;
            max-width: 400px;
            padding: 12px 25px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            outline: none;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px);
            margin-bottom: 15px;
        }

        .search-bar:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--s4-blue);
            box-shadow: 0 0 20px rgba(53, 198, 235, 0.3);
        }

        .header-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-header {
            padding: 12px 28px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
        }

        .btn-header:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-4px) scale(1.02);
            border-color: var(--s4-blue);
            box-shadow: 0 15px 40px rgba(53, 198, 235, 0.2);
        }

        .btn-add-top {
            background: rgba(53, 198, 235, 0.15);
            border: 1px solid rgba(53, 198, 235, 0.4);
        }

        /* --- Node Container --- */
        .node-container {
            display: flex;
            flex-direction: column;
            gap: 120px;
            /* Increased by ~20px for more breathing room */
            width: 100%;
            max-width: 1100px;
            align-items: center;
            margin-top: 80px;
        }

        .node-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 70px;
            position: relative;
        }

        .node-wrapper {
            position: relative;
            width: var(--node-dia);
            height: var(--node-dia);
        }

        /* Curved Logic: Outer nodes */
        .node-row .node-wrapper:nth-child(1),
        .node-row .node-wrapper:nth-child(5) {
            transform: translateY(var(--curve-offset));
        }

        .node {
            width: 100%;
            height: 100%;
            background: var(--s4-white);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 12px var(--s4-shadow);
            position: relative;
            z-index: 100;
        }

        .node:hover {
            transform: scale(1.1);
            box-shadow: 0 10px 30px rgba(53, 198, 235, 0.3);
        }

        .node.active-primary {
            box-shadow: 0 0 0 4px var(--s4-blue);
        }

        .plumbob {
            width: 25px;
            height: 40px;
            background: var(--s4-green);
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            border: 2px solid rgba(0, 0, 0, 0.1);
            animation: pulse 2s infinite ease-in-out;
            transition: 0.3s;
        }

        .node.done {
            background: var(--s4-green) !important;
            box-shadow: 0 0 30px rgba(78, 195, 0, 0.6);
        }

        .node.done::after {
            content: '✓';
            color: #fff;
            font-weight: 900;
            font-size: 60px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            z-index: 1000;
        }

        .node.done .plumbob,
        .node.done .node-label {
            opacity: 0.1 !important;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                filter: brightness(1);
            }

            50% {
                transform: scale(1.1);
                filter: brightness(1.2);
            }
        }

        .node-label {
            position: absolute;
            bottom: -45px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            color: #000;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            white-space: nowrap;
            outline: none;
            border: 2px dashed transparent;
            transition: all 0.3s;
            min-width: 90px;
            text-align: center;
            pointer-events: none;
        }

        .node-label.editable-main {
            pointer-events: auto;
            cursor: text;
            background: #fff;
            box-shadow: 0 0 20px rgba(53, 198, 235, 0.3);
            border-color: rgba(53, 198, 235, 0.4);
            animation: glowPulse 2s infinite ease-in-out;
        }

        @keyframes glowPulse {

            0%,
            100% {
                box-shadow: 0 0 15px rgba(53, 198, 235, 0.3);
            }

            50% {
                box-shadow: 0 0 30px rgba(53, 198, 235, 0.6);
            }
        }

        .node-label.editable-main:hover {
            border-color: var(--s4-blue);
            transform: translateX(-50%) scale(1.05);
            box-shadow: 0 0 25px rgba(53, 198, 235, 0.6);
            animation: none;
        }

        .node-label.editable-main:focus {
            border-color: var(--s4-dark-blue);
            border-style: solid;
            box-shadow: 0 0 40px rgba(53, 198, 235, 0.8);
            transform: translateX(-50%) scale(1.1);
            z-index: 1000;
        }

        .node-wrapper:hover .pie-menu {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1) rotate(0deg);
            pointer-events: auto;
        }

        /* --- Level 2: Pie Menu (6 Sub-nodes) --- */
        .pie-menu {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            pointer-events: none;
            opacity: 0;
            transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            transform: translate(-50%, -50%) scale(0.4) rotate(-45deg);
            z-index: 50;
        }

        .sub-node {
            position: absolute;
            width: var(--sub-dia);
            height: var(--sub-dia);
            background: var(--s4-white);
            border: 3px solid var(--s4-blue);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 10px;
            font-weight: 700;
            color: var(--s4-dark-blue);
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 5px 15px var(--s4-shadow);
            padding: 5px;
            text-align: center;
        }

        .sub-node span {
            outline: none;
            cursor: text;
            display: block;
            width: 100%;
            border-bottom: 1px dashed transparent;
            transition: 0.3s;
        }

        .sub-node:hover {
            border-color: var(--s4-dark-blue);
            transform: translate(-50%, -50%) scale(1.15);
        }

        .sub-node span:hover,
        .sub-node span:focus {
            border-bottom-color: var(--s4-dark-blue);
        }

        /* Blossom Style Symmetrical Distribution (6 Nodes) */
        .sub-node:nth-child(1) {
            transform: translate(-50%, -50%) translate(-120px, -60px);
        }

        .sub-node:nth-child(2) {
            transform: translate(-50%, -50%) translate(-70px, -130px);
        }

        .sub-node:nth-child(3) {
            transform: translate(-50%, -50%) translate(0px, -150px);
        }

        .sub-node:nth-child(4) {
            transform: translate(-50%, -50%) translate(70px, -130px);
        }

        .sub-node:nth-child(5) {
            transform: translate(-50%, -50%) translate(120px, -60px);
        }

        .sub-node:nth-child(6) {
            transform: translate(-50%, -50%) translate(0px, -50px);
            opacity: 0;
            pointer-events: none;
        }

        /* Spacer */

        /* --- Footer Actions --- */
        .btn-add {
            margin-top: 50px;
            padding: 15px 50px;
            background: var(--s4-blue);
            border: none;
            border-radius: 50px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(53, 198, 235, 0.4);
        }

        .btn-add:hover {
            background: var(--s4-dark-blue);
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(53, 198, 235, 0.5);
        }

        .action-log {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 250px;
            max-height: 200px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 5px 15px var(--s4-shadow);
            overflow-y: auto;
            font-size: 0.8rem;
            z-index: 3000;
        }

        .log-entry {
            margin-bottom: 5px;
            border-bottom: 1px solid #eee;
            padding-bottom: 2px;
        }

        /* --- Red Carpet Workflow --- */
        .config-tile {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 1000px;
            height: 700px;
            background: rgba(10, 15, 25, 0.98);
            backdrop-filter: blur(80px);
            padding: 30px;
            border-radius: 40px;
            box-shadow: 0 50px 150px rgba(0, 0, 0, 1), 0 0 0 1px rgba(255, 255, 255, 0.1);
            z-index: 500;
            opacity: 0;
            pointer-events: none;
            transition: 0.7s cubic-bezier(0.19, 1, 0.22, 1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .config-tile.active {
            transform: translate(-50%, -25%) scale(1);
            opacity: 1;
            pointer-events: auto;
        }

        .workflow-note {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 12px 20px;
            color: #fff;
            font-size: 14px;
            outline: none;
            margin-bottom: 30px;
            transition: 0.3s;
            cursor: pointer;
            text-align: center;
            font-weight: 500;
        }

        .workflow-note:focus {
            border-color: var(--s4-blue);
            background: rgba(53, 198, 235, 0.05);
            box-shadow: 0 0 20px rgba(53, 198, 235, 0.2);
        }

        .workflow-workspace {
            width: 100%;
            flex: 1;
            min-height: 0;
            position: relative;
            display: flex;
            align-items: flex-start;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            margin: 20px 0;
            overflow: hidden;
        }

        .left-panel {
            flex: 0 0 150px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 15px;
            overflow-y: auto;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        .tile-title {
            position: absolute;
            top: 25px;
            left: 30px;
            font-size: 14px;
            color: var(--s4-blue);
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 10;
        }

        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 40px 30px;
            padding-top: 80px;
            /* Space for title */
            overflow-y: auto;
            align-items: flex-start;
        }

        .workflow-row {
            display: flex;
            align-items: center;
            gap: 0;
            min-height: 50px;
            width: fit-content;
        }

        .connector {
            width: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            color: var(--s4-blue);
            opacity: 0;
            pointer-events: none;
            font-weight: 900;
        }

        .station.selected {
            background: rgba(53, 198, 235, 0.1);
            border-color: var(--s4-blue);
            box-shadow: 0 0 15px rgba(53, 198, 235, 0.3);
        }


        .station {
            width: 140px;
            height: 45px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            flex-shrink: 0;
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0.2;
            transform: translateY(10px);
            cursor: pointer;
            position: relative;
            color: #fff;
            font-size: 11px;
            font-weight: 500;
            padding: 0 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .station .plumbob {
            display: none;
            /* Quieter look inside tile */
        }

        .station span {
            width: 100%;
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .station.revealed {
            opacity: 1;
            transform: translateY(0);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .station:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--s4-blue);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            transform: translateY(-2px);
        }

        .station.done {
            background: rgba(78, 195, 0, 0.2) !important;
            border-color: var(--s4-green) !important;
            color: var(--s4-green);
            box-shadow: 0 0 20px rgba(78, 195, 0, 0.2);
            opacity: 1 !important;
        }

        .station.done::after {
            content: '✓';
            color: var(--s4-green);
            font-weight: 900;
            font-size: 18px;
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
        }

        .station.selected {
            background: rgba(53, 198, 235, 0.15);
            border-color: var(--s4-blue);
            box-shadow: 0 0 15px rgba(53, 198, 235, 0.3);
        }

        .btn-add-station {
            position: absolute;
            top: 25px;
            right: 30px;
            width: 32px;
            height: 32px;
            background: rgba(53, 198, 235, 0.1);
            border: 1px solid var(--s4-blue);
            color: var(--s4-blue);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            transition: 0.3s;
            z-index: 600;
        }

        .btn-add-station:hover {
            background: var(--s4-blue);
            color: #fff;
            transform: scale(1.2) rotate(90deg);
            box-shadow: 0 0 20px var(--s4-blue);
        }

        .tile-title {
            position: absolute;
            bottom: 15px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 10px;
            color: #555;
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>

    <header class="header">
        <input type="text" class="search-bar" placeholder="" oninput="filter(this.value)">
        <div class="header-actions">
            <button class="btn-header btn-add-top" onclick="addRow()">+ Add New +</button>
            <button class="btn-header" onclick="exportNetwork()">Export JSON</button>
            <button class="btn-header" onclick="document.getElementById('file-input').click()">Import JSON</button>
            <input type="file" id="file-input" class="hidden" accept=".json" onchange="importNetwork(event)">
        </div>
    </header>

    <div class="node-container" id="matrix">
        <!-- Rows injected here -->
    </div>

    <div class="action-log" id="log">
        <div class="log-entry"><strong>System:</strong> Hover nodes for Shortcuts • Click to Manage</div>
    </div>

    <script>
        const matrix = document.getElementById('matrix');
        const logEl = document.getElementById('log');
        let rowCount = 0;
        let activeTile = null;
        let activeKey = null;

        const SHORTCUT_REGISTRY = {
            'Spotify': ['Artist Profile', 'Link Release', 'Canvas Setup', 'Playlist Pitch'],
            'Press': ['Bio Update', 'Press Photos', 'EPK Hook', 'Journalist List'],
            'SoundCloud': ['Upload Track', 'Metadata', 'Repost Chain', 'Premier Link'],
            'YouTube': ['Video Draft', 'Tags/SEO', 'Thumbnail', 'End Card'],
            'Social': ['IG Reel', 'Twitter Post', 'TikTok Trend', 'Story Link'],
            'Other': ['Phase 1', 'Phase 2', 'Phase 3', 'Phase 4']
        };

        function log(msg) {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<strong>${new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}:</strong> ${msg}`;
            logEl.prepend(entry);
        }

        function filter(val) {
            const q = val.toLowerCase();
            document.querySelectorAll('.node-wrapper').forEach(w => {
                const label = w.getAttribute('data-label').toLowerCase();
                if (label.includes(q)) w.classList.remove('hidden');
                else w.classList.add('hidden');
            });
        }

        function openTile(tile, key) {
            closeAll();
            activeTile = tile;
            activeKey = key;

            tile.classList.add('active');

            if (!networkDataStore[key]) {
                const shortcutName = Object.keys(SHORTCUT_REGISTRY).find(k => key.endsWith(k));
                const fields = SHORTCUT_REGISTRY[shortcutName] || ['Step 1', 'Step 2', 'Step 3', 'Step 4'];

                networkDataStore[key] = {
                    nodes: [],
                    notes: shortcutName ? `Rollout: ${shortcutName} Protocol` : "Standard Workflow Initialized."
                };

                fields.forEach((fieldName, i) => {
                    networkDataStore[key].nodes.push({
                        label: fieldName,
                        done: false,
                        subs: [
                            { label: `${fieldName} Sub-Task 1`, done: false },
                            { label: `${fieldName} Sub-Task 2`, done: false },
                            { label: `${fieldName} Sub-Task 3`, done: false },
                            { label: `${fieldName} Sub-Task 4`, done: false }
                        ]
                    });
                });
            }

            renderWorkflow(tile, key);
        }

        function toggleRow(stepNode, items) {
            const isSelected = stepNode.classList.contains('selected');
            if (isSelected) {
                stepNode.classList.remove('selected');
                gsap.to(items, {
                    opacity: 0,
                    x: -20,
                    duration: 0.4,
                    stagger: { each: 0.05, from: "end" },
                    ease: "power2.in",
                    pointerEvents: 'none'
                });
            } else {
                stepNode.classList.add('selected');
                gsap.fromTo(items,
                    { opacity: 0, x: -30, scale: 0.9 },
                    {
                        opacity: 1,
                        x: 0,
                        scale: 1,
                        duration: 0.5,
                        stagger: 0.08,
                        ease: "back.out(1.5)",
                        pointerEvents: 'auto'
                    }
                );
            }
        }

        function addStation(btn) {
            if (!activeKey || !activeTile) return;
            const data = networkDataStore[activeKey];
            const newIndex = data.nodes.length;
            data.nodes.push({
                label: 'Step ' + (newIndex + 1),
                done: false,
                subs: [
                    { label: `Workflow ${(newIndex + 1)}.1`, done: false },
                    { label: `Workflow ${(newIndex + 1)}.2`, done: false },
                    { label: `Workflow ${(newIndex + 1)}.3`, done: false },
                    { label: `Workflow ${(newIndex + 1)}.4`, done: false }
                ]
            });
            renderWorkflow(activeTile, activeKey);
            const leftPanel = activeTile.querySelector('.left-panel');
            const newNode = leftPanel.lastElementChild;
            gsap.fromTo(newNode, { x: -100, opacity: 0 }, { x: 0, opacity: 1, duration: 0.5, ease: "back.out(1.7)" });
            log("Added new workflow step");
        }


        function renderWorkflow(tile, key) {
            const data = networkDataStore[key];
            const workspace = tile.querySelector('.workflow-workspace');
            workspace.innerHTML = `
                <div class="left-panel"></div>
                <div class="main-area"></div>
            `;

            const leftPanel = workspace.querySelector('.left-panel');
            const mainArea = workspace.querySelector('.main-area');

            data.nodes.forEach((n, i) => {
                const node = document.createElement('div');
                node.className = 'station revealed' + (n.done ? ' done' : '');
                node.innerHTML = `
                    <div class="plumbob"></div>
                    <span contenteditable="true">${n.label}</span>
                `;

                // Create a row container for this step's workflow
                const rowWrap = document.createElement('div');
                rowWrap.className = 'workflow-row';
                mainArea.appendChild(rowWrap);

                const rowItems = [];
                n.subs.forEach((s, j) => {
                    const sub = document.createElement('div');
                    sub.className = 'station' + (s.done ? ' done' : '');
                    Object.assign(sub.style, {
                        opacity: '0',
                        pointerEvents: 'none'
                    });
                    sub.innerHTML = `<span>${s.label}</span>`;

                    sub.onclick = (e) => {
                        e.stopPropagation();
                        openTile(activeTile, `${activeKey}.${s.label}`);
                    };
                    sub.ondblclick = (e) => {
                        e.stopPropagation();
                        toggleDone(sub);
                        s.done = sub.classList.contains('done');
                    };
                    rowWrap.appendChild(sub);
                    rowItems.push(sub);

                    if (j < n.subs.length - 1) {
                        const connector = document.createElement('div');
                        connector.className = 'connector';
                        connector.innerHTML = '→';
                        rowWrap.appendChild(connector);
                        rowItems.push(connector);
                    }
                });

                node.onclick = () => toggleRow(node, rowItems);
                node.ondblclick = (e) => {
                    e.stopPropagation();
                    toggleDone(node);
                    n.done = node.classList.contains('done');
                };
                node.querySelector('span').oninput = () => n.label = node.querySelector('span').innerText;
                leftPanel.appendChild(node);
            });

            gsap.fromTo(Array.from(leftPanel.children), { x: -100, opacity: 0 }, { x: 0, opacity: 1, duration: 0.5, stagger: 0.1, ease: "back.out(1.7)" });

            tile.addEventListener('wheel', (e) => {
                e.preventDefault();
                leftPanel.scrollTop += e.deltaY;
            });
        }

        function toggleDone(el) {
            el.classList.toggle('done');
        }

        function exportNetwork() {
            const nodes = [];
            document.querySelectorAll('.node-wrapper').forEach(w => {
                nodes.push({
                    label: w.getAttribute('data-label'),
                    id: w.getAttribute('data-id')
                });
            });

            const data = {
                rowCount,
                nodes,
                store: networkDataStore
            };

            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `network_state_${Date.now()}.json`;
            a.click();
            log("Network exported to JSON");
        }

        function importNetwork(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    renderImported(data);
                    log("Network imported successfully");
                } catch (err) {
                    log("Error importing JSON: Invalid format");
                }
            };
            reader.readAsText(file);
        }

        function renderImported(data) {
            matrix.innerHTML = '';
            rowCount = 0;
            networkDataStore = data.store || {};

            // Group nodes by row
            const rows = {};
            data.nodes.forEach(n => {
                const parts = n.id ? n.id.split('.') : ["1", "0"];
                const rId = parts[0];
                if (!rows[rId]) rows[rId] = [];
                rows[rId].push(n);
            });

            Object.entries(rows).forEach(([rId, nodeList]) => {
                rowCount++;
                const row = document.createElement('div');
                row.className = 'node-row';
                nodeList.forEach((n, i) => {
                    row.appendChild(createNode(rowCount, i, n.label));
                });
                matrix.appendChild(row);
            });
        }

        function createNode(rowId, colId, customLabel) {
            const label = customLabel || (colId === 2 ? 'Main' : 'Node');
            const nodeId = `${rowId}.${colId}`;
            const wrap = document.createElement('div');
            wrap.className = 'node-wrapper';
            wrap.setAttribute('data-label', label);
            wrap.setAttribute('data-id', nodeId);

            const isMain = colId === 2;
            const node = document.createElement('div');
            node.className = 'node';
            node.innerHTML = `<div class="plumbob"></div>
                             <div class="node-label ${isMain ? 'editable-main' : ''}" 
                                  ${isMain ? 'contenteditable="true"' : ''}
                                  oninput="this.closest('.node-wrapper').setAttribute('data-label', this.innerText)"
                                  onclick="if(${isMain}) event.stopPropagation()">${label}</div>`;
            node.onclick = (e) => {
                e.stopPropagation();
                togglePrimary(node);
            };
            node.ondblclick = (e) => {
                e.preventDefault();
                e.stopPropagation();
                node.classList.toggle('done');
                log(`${node.classList.contains('done') ? 'Completed' : 'Reset'}: ${label}`);
            };

            const menu = document.createElement('div');
            menu.className = 'pie-menu';

            const tile = document.createElement('div');
            tile.className = 'config-tile';
            tile.innerHTML = `
                <div class="tile-title"><span contenteditable="true">${label.toUpperCase()}</span></div>
                <button class="btn-add-station" onclick="addStation(this)">+</button>
                <div class="workflow-workspace"></div>
            `;
            tile.onclick = (e) => e.stopPropagation();

            const shortcuts = ['Spotify', 'Press', 'SoundCloud', 'YouTube', 'Social', 'Other'];
            shortcuts.forEach(txt => {
                const sub = document.createElement('div');
                sub.className = 'sub-node';
                sub.innerHTML = `<span contenteditable="true" onclick="event.stopPropagation()">${txt}</span>`;
                sub.onclick = (e) => {
                    e.stopPropagation();
                    const currentTxt = sub.querySelector('span').innerText;
                    openTile(tile, `${nodeId}.${currentTxt}`);
                };
                menu.appendChild(sub);
            });

            wrap.appendChild(node);
            wrap.appendChild(menu);
            wrap.appendChild(tile);
            return wrap;
        }

        function addRow() {
            rowCount++;
            const row = document.createElement('div');
            row.className = 'node-row';
            row.style.opacity = '0';
            row.style.transform = 'translateY(30px)';

            for (let i = 0; i < 5; i++) {
                const label = i === 2 ? 'Main' : 'Node';
                row.appendChild(createNode(rowCount, i, label));
            }

            matrix.appendChild(row);
            setTimeout(() => {
                row.style.transition = '0.6s ease-out';
                row.style.opacity = '1';
                row.style.transform = 'translateY(0)';
            }, 50);
            log(`Added cluster set ${rowCount}`);
        }

        function togglePrimary(node) {
            const menu = node.nextElementSibling;
            const active = menu.classList.contains('active');
            closeAll();
            if (!active) {
                menu.classList.add('active');
                node.classList.add('active-primary');
                log(`Interaction: ${node.querySelector('.node-label').innerText.trim()}`);
            }
        }

        function closeAll() {
            document.querySelectorAll('.pie-menu').forEach(m => m.classList.remove('active'));
            document.querySelectorAll('.node').forEach(n => n.classList.remove('active-primary'));
            document.querySelectorAll('.config-tile').forEach(t => t.classList.remove('active'));
        }

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            const row = document.createElement('div');
            row.className = 'node-row';
            rowCount = 1;
            const labels = ['Node', 'Node', 'Main', 'Node', 'Node'];
            labels.forEach((l, i) => row.appendChild(createNode(1, i, l)));
            matrix.appendChild(row);
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.node-wrapper')) {
                closeAll();
            }
        });
    </script>
</body>

</html>
