<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sims 4 - Advanced Network Matrix</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --s4-white: #ffffff;
            --s4-gray: #f2f2f2;
            --s4-blue: #35C6EB;
            --s4-dark-blue: #2594a4;
            --s4-green: #4EC300;
            --s4-shadow: rgba(0, 0, 0, 0.12);
            --node-dia: 100px;
            --sub-dia: 70px;
            --ter-dia: 30px;
            --curve-offset: -45px;
            --transition: 0.4s cubic-bezier(0.17, 0.67, 0.43, 1.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #06070a;
            background-image:
                radial-gradient(at 0% 0%, rgba(53, 198, 235, 0.12) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(78, 195, 0, 0.08) 0px, transparent 50%),
                radial-gradient(at 50% 50%, rgba(177, 157, 255, 0.05) 0px, transparent 100%);
            background-size: 200% 200%;
            animation: backgroundShimmer 20s ease infinite;
            color: #eee;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px 150px;
            overflow-x: hidden;
            position: relative;
        }

        e @keyframes backgroundShimmer {
            0% {
                background-position: 0% 0%;
            }

            50% {
                background-position: 100% 100%;
            }

            100% {
                background-position: 0% 0%;
            }
        }

        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M40 40c0-1.1.9-2 2-2s2 .9 2 2-.9 2-2 2-2-.9-2-2zm-20 0c0-1.1.9-2 2-2s2 .9 2 2-.9 2-2 2-2-.9-2-2zm40 0c0-1.1.9-2 2-2s2 .9 2 2-.9 2-2 2-2-.9-2-2zM40 20c0-1.1.9-2 2-2s2 .9 2 2-.9 2-2 2-2-.9-2-2zm0 40c0-1.1.9-2 2-2s2 .9 2 2-.9 2-2 2-2-.9-2-2z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
            z-index: -1;
        }

        /* --- UI Elements --- */
        .header {
            text-align: center;
            margin-bottom: 80px;
            width: 100%;
            max-width: 900px;
            position: sticky;
            top: 20px;
            z-index: 2000;
            background: transparent;
            pointer-events: none;
        }

        .header>* {
            pointer-events: auto;
        }

        h1 {
            display: none;
        }

        .search-bar {
            width: 100%;
            max-width: 400px;
            padding: 12px 25px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            outline: none;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px);
            margin-bottom: 15px;
        }

        .search-bar:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--s4-blue);
            box-shadow: 0 0 20px rgba(53, 198, 235, 0.3);
        }

        .header-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-header {
            padding: 12px 28px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
        }

        .btn-header:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-4px) scale(1.02);
            border-color: var(--s4-blue);
            box-shadow: 0 15px 40px rgba(53, 198, 235, 0.2);
        }

        .btn-add-top {
            background: rgba(53, 198, 235, 0.15);
            border: 1px solid rgba(53, 198, 235, 0.4);
        }

        /* --- Node Container --- */
        .node-container {
            display: flex;
            flex-direction: column;
            gap: 120px;
            /* Increased by ~20px for more breathing room */
            width: 100%;
            max-width: 1100px;
            align-items: center;
            margin-top: 80px;
        }

        .node-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 70px;
            position: relative;
        }

        .node-wrapper {
            position: relative;
            width: var(--node-dia);
            height: var(--node-dia);
        }

        /* Curved Logic: Outer nodes */
        .node-row .node-wrapper:nth-child(1),
        .node-row .node-wrapper:nth-child(5) {
            transform: translateY(var(--curve-offset));
        }

        .node {
            width: 100%;
            height: 100%;
            background: var(--s4-white);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 12px var(--s4-shadow);
            position: relative;
            z-index: 100;
        }



        .node.lead-hover:hover {
            transform: none !important;
            box-shadow: none !important;
        }

        .node::before,
        .node::after,
        .lead-tracker::before {
            content: '';
            position: absolute;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1), transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: -1;
        }

        .node::before {
            inset: -12px;
            border-radius: 50%;
            background: conic-gradient(from 0deg,
                    rgba(53, 198, 235, 0) 0%,
                    rgba(53, 198, 235, 1) 25%,
                    rgba(78, 195, 0, 1) 50%,
                    rgba(53, 198, 235, 1) 75%,
                    rgba(53, 198, 235, 0) 100%);
            animation: visualizerSpin 4s linear infinite;
            -webkit-mask: radial-gradient(transparent 62%, #000 64%);
            mask: radial-gradient(transparent 62%, #000 64%);
            filter: blur(1px);
            transform: scale(0.9);
        }

        .node::after {
            inset: -8px;
            border-radius: 50%;
            border: 2px solid rgba(53, 198, 235, 0.3);
            animation: visualizerPulse 1.5s ease-out infinite;
            transform: scale(0.9);
        }

        .node:hover::before,
        .node:hover::after {
            opacity: 1;
            transform: scale(1);
        }

        @keyframes visualizerSpin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes visualizerPulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            100% {
                transform: scale(1.4);
                opacity: 0;
            }
        }

        .node.active-primary {
            box-shadow: 0 0 0 4px var(--s4-blue);
        }

        .plumbob {
            width: 25px;
            height: 40px;
            background: var(--s4-green);
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            border: 2px solid rgba(0, 0, 0, 0.1);
            animation: spin3d 4s linear infinite;
            transition: 0.3s;
            transform-origin: center;
        }

        .node.done {
            background: var(--s4-green) !important;
            box-shadow: 0 0 30px rgba(78, 195, 0, 0.6);
        }

        .node.done::after {
            content: '✓';
            color: #fff;
            font-weight: 900;
            font-size: 50px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            z-index: 10;
        }

        .node.done .plumbob,
        .node.done .node-label {
            opacity: 0.3;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                filter: brightness(1);
            }

            50% {
                transform: scale(1.1);
                filter: brightness(1.2);
            }
        }

        .node-label {
            position: absolute;
            bottom: -50px;
            /* Moved lower for better visibility */
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            color: #000;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            white-space: nowrap;
            outline: none;
            border: 2px dashed transparent;
            transition: all 0.3s;
            min-width: 90px;
            text-align: center;
            pointer-events: none;
        }

        .node.has-image {
            background-size: cover;
            background-position: center;
            border: 3px solid var(--s4-blue);
            box-shadow: 0 0 20px rgba(53, 198, 235, 0.5);
        }

        .node.has-image .plumbob {
            display: none;
        }

        .node-label.editable-main {
            pointer-events: auto;
            cursor: text;
            background: #fff;
            box-shadow: 0 0 20px rgba(53, 198, 235, 0.3);
            border-color: rgba(53, 198, 235, 0.4);
            animation: glowPulse 2s infinite ease-in-out;
        }

        @keyframes glowPulse {

            0%,
            100% {
                box-shadow: 0 0 15px rgba(53, 198, 235, 0.3);
            }

            50% {
                box-shadow: 0 0 30px rgba(53, 198, 235, 0.6);
            }
        }

        .node-label.editable-main:hover {
            border-color: var(--s4-blue);
            transform: translateX(-50%) scale(1.05);
            box-shadow: 0 0 25px rgba(53, 198, 235, 0.6);
            animation: none;
        }

        .node-label.editable-main:focus {
            border-color: var(--s4-dark-blue);
            border-style: solid;
            box-shadow: 0 0 40px rgba(53, 198, 235, 0.8);
            transform: translateX(-50%) scale(1.1);
            z-index: 1000;
        }

        /* --- Level 2: Pie Menu (4 Sub-nodes) --- */
        .pie-menu {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            pointer-events: none;
            opacity: 0;
            transition: var(--transition);
            transform: translate(-50%, -50%) scale(0.4) rotate(-45deg);
            z-index: 50;
        }

        .pie-menu.active {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1) rotate(0deg);
            pointer-events: auto;
        }

        .sub-node {
            position: absolute;
            width: var(--sub-dia);
            height: var(--sub-dia);
            background: var(--s4-white);
            border: 3px solid var(--s4-blue);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 10px;
            font-weight: 700;
            color: var(--s4-dark-blue);
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 5px 15px var(--s4-shadow);
            padding: 5px;
            text-align: center;
        }

        .sub-node span {
            outline: none;
            cursor: text;
            display: block;
            width: 100%;
            border-bottom: 1px dashed transparent;
            transition: 0.3s;
        }

        .sub-node:hover {
            border-color: var(--s4-dark-blue);
            transform: translate(-50%, -50%) scale(1.15);
        }

        .sub-node span:hover,
        .sub-node span:focus {
            border-bottom-color: var(--s4-dark-blue);
        }

        /* Blossom Style Symmetrical Distribution (All Above) */
        .sub-node:nth-child(1) {
            transform: translate(-50%, -50%) translate(-100px, -50px);
        }

        .sub-node:nth-child(2) {
            transform: translate(-50%, -50%) translate(-45px, -110px);
        }

        .sub-node:nth-child(3) {
            transform: translate(-50%, -50%) translate(45px, -110px);
        }

        .sub-node:nth-child(4) {
            transform: translate(-50%, -50%) translate(100px, -50px);
        }

        /* --- Footer Actions --- */
        .btn-add {
            margin-top: 50px;
            padding: 15px 50px;
            background: var(--s4-blue);
            border: none;
            border-radius: 50px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(53, 198, 235, 0.4);
        }

        .btn-add:hover {
            background: var(--s4-dark-blue);
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(53, 198, 235, 0.5);
        }

        .spotify-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(53, 198, 235, 0.3);
            border-radius: 8px;
            padding: 8px 15px;
            color: var(--s4-blue);
            font-size: 12px;
            width: 100%;
            max-width: 400px;
            outline: none;
            transition: all 0.3s;
        }

        .quick-integrations {
            padding: 15px 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(53, 198, 235, 0.02);
            margin-top: 30px;
            /* Space from title */
        }

        .quick-integrations label {
            font-size: 11px;
            color: var(--s4-blue);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .spotify-input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--s4-blue);
            box-shadow: 0 0 15px rgba(53, 198, 235, 0.3);
        }

        .spotify-input::placeholder {
            color: rgba(53, 198, 235, 0.5);
        }

        .action-log {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 250px;
            max-height: 200px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 5px 15px var(--s4-shadow);
            overflow-y: auto;
            font-size: 0.8rem;
            z-index: 3000;
        }

        .log-entry {
            margin-bottom: 5px;
            border-bottom: 1px solid #eee;
            padding-bottom: 2px;
        }

        /* --- Red Carpet Workflow --- */
        .config-tile {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 1100px;
            height: 700px;
            background: rgba(10, 15, 25, 0.98);
            backdrop-filter: blur(80px);
            padding: 30px;
            border-radius: 40px;
            box-shadow: 0 50px 150px rgba(0, 0, 0, 1), 0 0 0 1px rgba(255, 255, 255, 0.1);
            z-index: 500;
            opacity: 0;
            pointer-events: none;
            transition: 0.7s cubic-bezier(0.19, 1, 0.22, 1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .config-tile.active {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            pointer-events: auto;
        }

        .workflow-note {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 12px 20px;
            color: #fff;
            font-size: 14px;
            outline: none;
            margin-bottom: 30px;
            transition: 0.3s;
            cursor: pointer;
            text-align: center;
            font-weight: 500;
        }

        .workflow-note:focus {
            border-color: var(--s4-blue);
            background: rgba(53, 198, 235, 0.05);
            box-shadow: 0 0 20px rgba(53, 198, 235, 0.2);
        }

        .workflow-workspace {
            width: 100%;
            flex: 1;
            min-height: 0;
            position: relative;
            display: flex;
            align-items: flex-start;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            margin: 20px 0;
            overflow: hidden;
        }

        .left-panel {
            flex: 0 0 150px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 15px;
            padding-top: 60px;
            overflow-y: auto;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .left-panel::-webkit-scrollbar {
            display: none;
        }

        .tile-title {
            position: absolute;
            top: 10px;
            /* Moved even higher */
            left: 30px;
            right: 30px;
            font-size: 14px;
            color: var(--s4-blue);
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-area {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 40px 1fr 40px 1fr 40px 1fr;
            gap: 30px 0;
            padding: 60px;
            overflow-y: auto;
            align-content: start;
            align-items: center;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .main-area::-webkit-scrollbar {
            display: none;
        }

        .connector {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            color: var(--s4-blue);
            opacity: 0;
            pointer-events: none;
            font-weight: 900;
            transform: translateX(-20px);
        }

        .station.selected {
            border-color: var(--s4-blue);
            box-shadow: 0 0 20px rgba(53, 198, 235, 0.5);
        }


        .station {
            width: 120px;
            height: 42px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            flex-shrink: 0;
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0.2;
            transform: translateY(10px);
            cursor: pointer;
            position: relative;
            color: #fff;
            font-size: 11px;
            font-weight: 500;
            padding: 0 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .station .plumbob {
            display: none;
            /* Quieter look inside tile */
        }

        .station span {
            width: 100%;
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .station.revealed {
            opacity: 1;
            transform: translateY(0);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .station:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--s4-blue);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            transform: translateY(-2px);
        }

        .station.done {
            opacity: 1 !important;
        }

        .station.done.category-spotify {
            background: rgba(78, 195, 0, 0.3) !important;
            border-color: var(--s4-green) !important;
            color: var(--s4-green);
            box-shadow: 0 0 30px rgba(78, 195, 0, 0.6);
            animation: shineGreen 1s ease-in-out;
        }

        .station.done.category-press {
            background: rgba(53, 198, 235, 0.3) !important;
            border-color: var(--s4-blue) !important;
            color: var(--s4-blue);
            box-shadow: 0 0 30px rgba(53, 198, 235, 0.6);
            animation: shineBlue 1s ease-in-out;
        }

        .station.done.category-social {
            background: rgba(155, 89, 182, 0.3) !important;
            /* Purple */
            border-color: #9b59b6 !important;
            color: #9b59b6;
            box-shadow: 0 0 30px rgba(155, 89, 182, 0.6);
            animation: shinePurple 1s ease-in-out;
        }

        .station.done.category-other {
            background: rgba(230, 126, 34, 0.3) !important;
            /* Orange */
            border-color: #e67e22 !important;
            color: #e67e22;
            box-shadow: 0 0 30px rgba(230, 126, 34, 0.6);
            animation: shineOrange 1s ease-in-out;
        }

        @keyframes shineGreen {

            0%,
            100% {
                box-shadow: 0 0 30px rgba(78, 195, 0, 0.6);
            }

            50% {
                box-shadow: 0 0 50px rgba(78, 195, 0, 1);
            }
        }

        @keyframes shineBlue {

            0%,
            100% {
                box-shadow: 0 0 30px rgba(53, 198, 235, 0.6);
            }

            50% {
                box-shadow: 0 0 50px rgba(53, 198, 235, 1);
            }
        }

        @keyframes shinePurple {

            0%,
            100% {
                box-shadow: 0 0 30px rgba(155, 89, 182, 0.6);
            }

            50% {
                box-shadow: 0 0 50px rgba(155, 89, 182, 1);
            }
        }

        @keyframes shineOrange {

            0%,
            100% {
                box-shadow: 0 0 30px rgba(230, 126, 34, 0.6);
            }

            50% {
                box-shadow: 0 0 50px rgba(230, 126, 34, 1);
            }
        }

        .station.done::after {
            content: '✓';
            color: var(--s4-green);
            font-weight: 900;
            font-size: 18px;
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
        }

        .delete-phase {
            position: absolute;
            right: 5px;
            top: 50%;
            transform: translateY(-50%);
            color: #ff4444;
            font-size: 18px;
            font-weight: bold;
            background: none;
            border: none;
            cursor: pointer;
            z-index: 20;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .delete-phase:hover {
            opacity: 1;
        }

        .btn-add-station {
            position: absolute;
            top: 10px;
            right: 40px;
        }

        .close-tile {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #ff4444;
            font-size: 18px;
            font-weight: bold;
            background: none;
            border: none;
            cursor: pointer;
            z-index: 30;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .close-tile:hover {
            opacity: 1;
        }

        .lead-tracker {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            width: 32px;
            height: 32px;
            background: gold;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            z-index: 10;
        }



        .lead-tracker::before {
            inset: -6px;
            border-radius: 50%;
            background: conic-gradient(from 0deg,
                    rgba(255, 215, 0, 0) 0%,
                    rgba(255, 215, 0, 1) 25%,
                    rgba(255, 165, 0, 1) 50%,
                    rgba(255, 215, 0, 1) 75%,
                    rgba(255, 215, 0, 0) 100%);
            animation: visualizerSpin 3s linear infinite;
            -webkit-mask: radial-gradient(transparent 60%, #000 62%);
            mask: radial-gradient(transparent 60%, #000 62%);
            filter: blur(1px);
            transform: scale(0.9);
        }

        .lead-tracker:hover::before {
            opacity: 1;
            transform: scale(1);
        }

        .step-button {
            height: 35px;
            font-size: 10px;
        }

        .station span {
            user-select: none;
        }

        .first-step.done {
            box-shadow: 0 0 40px rgba(78, 195, 0, 0.8) !important;
            animation: shineGreen 2s ease-in-out !important;
        }

        .tile-title span.editing {
            background: rgba(155, 89, 182, 0.1);
            border: 1px solid #9b59b6;
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(155, 89, 182, 0.3);
            padding: 2px 4px;
        }

        .station.selected {
            background: rgba(53, 198, 235, 0.15);
            box-shadow: 0 0 15px rgba(53, 198, 235, 0.3);
        }

        /* Category color coding */
        .station.category-spotify {
            border-color: #4EC300;
            /* Bright green */
        }

        .station.category-press {
            border-color: #35C6EB;
            /* Bright blue */
        }

        .station.category-social {
            border-color: #9b59b6;
            /* Purple */
        }

        .station.category-other {
            border-color: #e67e22;
            /* Orange */
        }

        .btn-add-station {
            position: absolute;
            bottom: 10px;
            left: 10px;
            width: 32px;
            height: 32px;
            background: rgba(53, 198, 235, 0.1);
            border: 1px solid var(--s4-blue);
            color: var(--s4-blue);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            transition: 0.3s;
            z-index: 600;
        }

        .btn-add-station:hover {
            background: var(--s4-blue);
            color: #fff;
            transform: scale(1.2) rotate(90deg);
            box-shadow: 0 0 20px var(--s4-blue);
        }



        .hover-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 220px;
            background: rgba(16, 20, 30, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid var(--s4-blue);
            border-radius: 12px;
            padding: 15px;
            pointer-events: auto;
            opacity: 0;
            transform: translate(15px, -50%) scale(0.95);
            transition: all 0.2s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 10000;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            color: #fff;
        }

        .hover-overlay.visible {
            opacity: 1;
            transform: translate(15px, -50%) scale(1);
        }

        .hover-overlay h3 {
            font-size: 14px;
            color: var(--s4-blue);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 5px;
        }

        .hover-overlay .meta-row {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #aaa;
            margin-bottom: 4px;
        }

        .hover-overlay .meta-val {
            color: #fff;
            font-weight: 700;
        }

        .overlay-workflow-buttons {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .overlay-shortcut-btn {
            padding: 6px 12px;
            background: rgba(53, 198, 235, 0.1);
            border: 1px solid var(--s4-blue);
            color: var(--s4-blue);
            border-radius: 8px;
            cursor: pointer;
            font-size: 10px;
            font-weight: 700;
            transition: all 0.3s;
            text-align: center;
            pointer-events: auto;
        }

        .overlay-shortcut-btn:hover {
            background: var(--s4-blue);
            color: #fff;
            transform: scale(1.05);
        }

        /* --- Lead Card --- */
        .lead-card {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 400px;
            height: 300px;
            background: rgba(10, 15, 25, 0.98);
            backdrop-filter: blur(80px);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 50px 150px rgba(0, 0, 0, 1);
            z-index: 600;
            opacity: 0;
            pointer-events: none;
            transition: 0.5s;
            display: flex;
            flex-direction: column;
        }

        .lead-card.active {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            pointer-events: auto;
        }

        .lead-title {
            font-size: 18px;
            color: gold;
            text-align: center;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .lead-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .lead-item {
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.3s;
        }

        .lead-item:hover {
            background: rgba(53, 198, 235, 0.1);
        }

        .lead-check {
            width: 20px;
            height: 20px;
            accent-color: gold;
        }

        .lead-note {
            flex: 1;
            padding: 5px 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            border-radius: 5px;
            outline: none;
        }

        .lead-note:focus {
            border-color: gold;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .close-lead {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            color: #ff4444;
            font-size: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .close-lead:hover {
            color: #ff6666;
            transform: scale(1.2);
        }

        .lead-tracker.glowing::before {
            content: '';
            position: absolute;
            top: -3px;
            left: -3px;
            right: -3px;
            bottom: -3px;
            border-radius: 50%;
            background: linear-gradient(45deg, gold, yellow, orange, red, gold);
            background-size: 400% 400%;
            animation: borderFlow 1s ease-in-out infinite;
            z-index: -1;
            pointer-events: none;
        }

        @keyframes leadGlow {
            0% {
                box-shadow: 0 0 20px gold, 0 0 40px rgba(255, 215, 0, 0.5);
            }

            100% {
                box-shadow: 0 0 30px gold, 0 0 60px rgba(255, 215, 0, 0.8);
            }
        }

        .node.has-lead:hover {
            box-shadow: 0 10px 50px rgba(53, 198, 235, 0.8), 0 0 30px rgba(255, 215, 0, 0.5);
        }

        .hidden {
            display: none !important;
        }

        /* --- Phase Shortcut Menu --- */
        .phase-menu {
            position: absolute;
            right: -120px;
            top: 0;
            width: 100px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 100;
        }

        .phase-menu.active {
            opacity: 1;
            pointer-events: auto;
        }

        .phase-shortcut-btn {
            padding: 5px 10px;
            background: rgba(53, 198, 235, 0.1);
            border: 1px solid var(--s4-blue);
            color: var(--s4-blue);
            border-radius: 8px;
            cursor: pointer;
            font-size: 10px;
            font-weight: 700;
            transition: all 0.3s;
            text-align: center;
        }

        .phase-shortcut-btn:hover {
            background: var(--s4-blue);
            color: #fff;
            transform: scale(1.05);
        }

        .artist-thumb {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--s4-blue);
            margin-right: 10px;
        }
    </style>
</head>

<body>

    <header class="header">
        <input type="text" class="search-bar" placeholder="" oninput="filter(this.value)">
        <div class="header-actions">
            <button class="btn-header btn-add-top" onclick="addRow()">+ Add New +</button>
            <button class="btn-header" onclick="exportNetwork()">Export JSON</button>
            <button class="btn-header" onclick="document.getElementById('file-input').click()">Import JSON</button>
            <input type="file" id="file-input" class="hidden" accept=".json" onchange="importNetwork(event)">
        </div>
    </header>

    <div class="node-container" id="matrix">
        <!-- Rows injected here -->
    </div>

    <div class="action-log" id="log">
        <div class="log-entry"><strong>System:</strong> Ready</div>
    </div>

    <!-- Hover Overlay Element -->
    <div id="hover-overlay" class="hover-overlay">
        <h3>Phase Details</h3>
        <div class="meta-row"><span>Status:</span> <span class="meta-val" id="ov-status">Pending</span></div>
        <div class="meta-row"><span>Tasks:</span> <span class="meta-val" id="ov-tasks">0</span></div>
        <div class="meta-row"><span>Est. Time:</span> <span class="meta-val">45m</span></div>

        <!-- Workflow Shortcut Buttons -->
        <div id="overlay-buttons-container" class="overlay-workflow-buttons" style="display: none;">
            <button class="overlay-shortcut-btn" data-category="Press">Press</button>
            <button class="overlay-shortcut-btn" data-category="Social">Social</button>
            <button class="overlay-shortcut-btn" data-category="Spotify">Spotify</button>
            <button class="overlay-shortcut-btn" data-category="Other">Other</button>
        </div>
    </div>

    <!-- Lead Card -->
    <div id="lead-card" class="lead-card">
        <div class="lead-title">Lead Tracker</div>
        <div class="lead-content">
            <div class="lead-item"><input type="checkbox" class="lead-check" onchange="saveLeadData()"><input
                    type="text" class="lead-note" placeholder="Note 1" oninput="saveLeadData()"></div>
            <div class="lead-item"><input type="checkbox" class="lead-check" onchange="saveLeadData()"><input
                    type="text" class="lead-note" placeholder="Note 2" oninput="saveLeadData()"></div>
            <div class="lead-item"><input type="checkbox" class="lead-check" onchange="saveLeadData()"><input
                    type="text" class="lead-note" placeholder="Note 3" oninput="saveLeadData()"></div>
            <div class="lead-item"><input type="checkbox" class="lead-check" onchange="saveLeadData()"><input
                    type="text" class="lead-note" placeholder="Note 4" oninput="saveLeadData()"></div>
            <div class="lead-item"><input type="checkbox" class="lead-check" onchange="saveLeadData()"><input
                    type="text" class="lead-note" placeholder="Note 5" oninput="saveLeadData()"></div>
        </div>
        <button class="close-lead" onclick="closeLeadCard()">×</button>
    </div>

    <script>
        const matrix = document.getElementById('matrix');
        const logEl = document.getElementById('log');
        const overlay = document.getElementById('hover-overlay');
        let rowCount = 0;
        let activeTile = null;
        let activeKey = null;
        let hideTimeout = null;

        let networkDataStore = {};

        const shortcutTasks = {
            'Press': ['Press Release', 'Pitch', 'Report', 'Report link'],
            'Social': ['Social Post', 'Engage', 'Monitor', 'Share'],
            'Spotify': ['Pitch', 'Report', 'Check', 'Report link'],
            'Other': ['General Task', 'Review', 'Finalize', 'Archive']
        };

        function showOverlay(e, nodeData, isPhaseNode = false) {
            const rect = e.currentTarget.getBoundingClientRect();
            // Position to the right of the element
            overlay.style.top = (rect.top + rect.height / 2) + 'px';
            overlay.style.left = rect.right + 'px';

            // Populate Data
            overlay.querySelector('h3').innerText = nodeData.label;
            document.getElementById('ov-status').innerText = nodeData.done ? 'Completed' : 'In Progress';
            document.getElementById('ov-status').style.color = nodeData.done ? 'var(--s4-green)' : '#fff';
            document.getElementById('ov-tasks').innerText = nodeData.subs.length + ' Steps';

            // Show/hide workflow buttons based on node type
            const buttonsContainer = document.getElementById('overlay-buttons-container');
            if (isPhaseNode) {
                buttonsContainer.style.display = 'flex';

                // Attach click handlers to buttons with current phase data
                const buttons = buttonsContainer.querySelectorAll('.overlay-shortcut-btn');
                buttons.forEach(btn => {
                    // Remove old handlers to prevent duplicates
                    btn.onclick = null;

                    // Add new handler with current nodeData in closure
                    btn.onclick = (clickEvent) => {
                        clickEvent.stopPropagation();
                        const category = btn.getAttribute('data-category');
                        fillPhaseSubs(nodeData, category);
                        hideOverlay(); // Hide overlay after selection
                    };
                });
            } else {
                renderWorkflow(tile, key);
                // Auto-expand phases that are marked as expanded
                const data = networkDataStore[key];
                const newStations = tile.querySelectorAll('.left-panel .station');
                const newMainArea = tile.querySelector('.main-area');
                data.nodes.forEach((n, i) => {
                    if (n.expanded) {
                        const node = newStations[i];
                        const start = i * 7;
                        const rowItems = [];
                        for (let k = 0; k < 7; k++) {
                            rowItems.push(newMainArea.children[start + k]);
                        }
                        node.classList.add('selected');
                        gsap.to(rowItems, { opacity: 1, scale: 1, duration: 0.6, stagger: 0.08, ease: "back.out(1.7)", pointerEvents: 'auto' });
                    }
                });
            }

            overlay.classList.add('visible');

            // Handle overlay hover to keep it open
            overlay.onmouseenter = () => {
                if (hideTimeout) {
                    clearTimeout(hideTimeout);
                    hideTimeout = null;
                }
            };
            overlay.onmouseleave = () => {
                hideOverlay();
            };
        }

        function hideOverlay() {
            if (hideTimeout) {
                clearTimeout(hideTimeout);
                hideTimeout = null;
            }
            overlay.classList.remove('visible');
        }

        let activeLeadKey = null;

        function openLeadCard(btn) {
            closeAll();
            const wrap = btn.closest('.node-wrapper');
            const key = wrap.getAttribute('data-label');
            let data = networkDataStore[key];
            if (!data) {
                networkDataStore[key] = {
                    nodes: [],
                    notes: "Lead Tracker Initialized.",
                    leadData: { checks: Array(5).fill(false), notes: Array(5).fill('') }
                };
                for (let i = 0; i < 4; i++) {
                    networkDataStore[key].nodes.push({
                        label: 'Phase ' + (i + 1),
                        done: false,
                        expanded: false,
                        subs: [
                            { label: 'Step 1', done: false },
                            { label: 'Step 2', done: false },
                            { label: 'Step 3', done: false },
                            { label: 'Step 4', done: false }
                        ]
                    });
                }
                data = networkDataStore[key];
            }
            const leadCard = document.getElementById('lead-card');
            const items = leadCard.querySelectorAll('.lead-item');
            data.leadData.checks.forEach((checked, i) => {
                items[i].querySelector('.lead-check').checked = checked;
            });
            data.leadData.notes.forEach((note, i) => {
                items[i].querySelector('.lead-note').value = note;
            });
            leadCard.classList.add('active');
            activeLeadKey = key;
        }

        function closeLeadCard() {
            const leadCard = document.getElementById('lead-card');
            leadCard.classList.remove('active');
            saveLeadData();
            activeLeadKey = null;
        }

        function saveLeadData() {
            if (!activeLeadKey) return;
            const leadCard = document.getElementById('lead-card');
            const items = leadCard.querySelectorAll('.lead-item');
            const checks = Array.from(items).map(item => item.querySelector('.lead-check').checked);
            const notes = Array.from(items).map(item => item.querySelector('.lead-note').value);
            networkDataStore[activeLeadKey].leadData = { checks, notes };
            updateGlows();
            saveToLocalStorage();
        }

        function updateGlows() {
            document.querySelectorAll('.lead-tracker').forEach(tracker => {
                const wrap = tracker.closest('.node-wrapper');
                const key = wrap.getAttribute('data-label');
                const data = networkDataStore[key];
                if (data && data.leadData && (data.leadData.checks.some(c => c) || data.leadData.notes.some(n => n.trim()))) {
                    tracker.classList.add('glowing');
                } else {
                    tracker.classList.remove('glowing');
                }
            });
            document.querySelectorAll('.node').forEach(node => {
                const wrap = node.closest('.node-wrapper');
                const key = wrap.getAttribute('data-label');
                const data = networkDataStore[key];
                if (data && data.leadData && (data.leadData.checks.some(c => c) || data.leadData.notes.some(n => n.trim()))) {
                    node.classList.add('has-lead');
                } else {
                    node.classList.remove('has-lead');
                }
            });
        }

        function saveToLocalStorage() {
            const nodes = [];
            document.querySelectorAll('.node-wrapper').forEach(w => {
                nodes.push({
                    label: w.getAttribute('data-label'),
                    id: w.getAttribute('data-id'),
                    done: w.querySelector('.node').classList.contains('done')
                });
            });
            const data = {
                rowCount,
                nodes,
                store: networkDataStore
            };
            localStorage.setItem('networkState', JSON.stringify(data));
        }

        function log(msg) {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<strong>${new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}:</strong> ${msg}`;
            logEl.prepend(entry);
        }

        function filter(val) {
            const q = val.toLowerCase();
            document.querySelectorAll('.node-wrapper').forEach(w => {
                const label = w.getAttribute('data-label').toLowerCase();
                if (label.includes(q)) w.classList.remove('hidden');
                else w.classList.add('hidden');
            });
        }

        function openTile(tile, key) {
            closeAll();
            activeTile = tile;
            activeKey = key;

            tile.classList.add('active');

            if (!networkDataStore[key]) {
                const isShortcut = key.includes('Quick:');
                networkDataStore[key] = {
                    nodes: [],
                    notes: isShortcut ? "Shortcut activated: Fields pre-filled." : "Standard Workflow Initialized.",
                    leadData: { checks: Array(5).fill(false), notes: Array(5).fill('') }
                };
                for (let i = 0; i < 4; i++) {
                    networkDataStore[key].nodes.push({
                        label: 'Phase ' + (i + 1),
                        done: false,
                        expanded: false,
                        subs: [
                            { label: 'Step 1', done: false },
                            { label: 'Step 2', done: false },
                            { label: 'Step 3', done: false },
                            { label: 'Step 4', done: false }
                        ]
                    });
                }
            }

            renderWorkflow(tile, key);
        }

        function toggleRow(stepNode, items) {
            const isSelected = stepNode.classList.contains('selected');
            if (!isSelected) {
                stepNode.classList.add('selected');
                gsap.to(items, { opacity: 1, scale: 1, duration: 0.6, stagger: 0.08, ease: "back.out(1.7)", pointerEvents: 'auto' });
                // Set expanded in data
                const leftPanel = stepNode.parentElement;
                const index = Array.from(leftPanel.children).indexOf(stepNode);
                const key = activeTile.getAttribute('data-key');
                const data = networkDataStore[key];
                if (data && data.nodes[index]) {
                    data.nodes[index].expanded = true;
                }
            }
            // Once expanded, stays permanent unless deleted
        }

        function addStation(btn) {
            if (!activeKey || !activeTile) return;
            // Collect currently selected phases before adding
            const selectedIndices = [];
            const currentStations = activeTile.querySelectorAll('.left-panel .station');
            currentStations.forEach((s, i) => {
                if (s.classList.contains('selected')) selectedIndices.push(i);
            });
            const data = networkDataStore[activeKey];
            const newIndex = data.nodes.length;
            data.nodes.push({
                label: 'Phase ' + (newIndex + 1),
                done: false,
                subs: [
                    { label: 'Step 1', done: false },
                    { label: 'Step 2', done: false },
                    { label: 'Step 3', done: false },
                    { label: 'Step 4', done: false }
                ]
            });
            renderWorkflow(activeTile, activeKey);
            // Restore selected states
            const newStations = activeTile.querySelectorAll('.left-panel .station');
            const newMainArea = activeTile.querySelector('.main-area');
            selectedIndices.forEach(i => {
                const node = newStations[i];
                const start = i * 7;
                const rowItems = [];
                for (let k = 0; k < 7; k++) {
                    rowItems.push(newMainArea.children[start + k]);
                }
                node.classList.add('selected');
                gsap.to(rowItems, { opacity: 1, scale: 1, duration: 0.6, stagger: 0.08, ease: "back.out(1.7)", pointerEvents: 'auto' });
            });
            const leftPanel = activeTile.querySelector('.left-panel');
            const newNode = leftPanel.lastElementChild;
            gsap.fromTo(newNode, { x: -100, opacity: 0 }, { x: 0, opacity: 1, duration: 0.5, ease: "back.out(1.7)" });
            log("Added new workflow step");
        }


        function renderWorkflow(tile, key) {
            const data = networkDataStore[key];
            const workspace = tile.querySelector('.workflow-workspace');
            workspace.innerHTML = `
                <div class="left-panel"></div>
                <div class="main-area"></div>
            `;

            const leftPanel = workspace.querySelector('.left-panel');
            const mainArea = workspace.querySelector('.main-area');

            data.nodes.forEach((n, i) => {
                const node = document.createElement('div');
                node.className = 'station revealed' + (n.done ? ' done' : '') + (n.category ? ' category-' + n.category.toLowerCase() : '');
                node.innerHTML = `
                    <div class="plumbob"></div>
                    <span contenteditable="true">${n.label}</span>
                    <button class="delete-phase" onclick="handleDeleteClick(this)" title="Triple-click to delete phase">×</button>
                `;

                // Pre-render workflow items for this step
                const rowItems = [];
                n.subs.forEach((s, j) => {
                    const sub = document.createElement('div');
                    const isFirst = j === 0;
                    sub.className = 'station step-button' + (s.done ? ' done' : '') + (n.category ? ' category-' + n.category.toLowerCase() : '') + (isFirst ? ' first-step' : '');
                    sub.style.opacity = '0';
                    sub.style.transform = 'scale(0.7)';
                    sub.style.pointerEvents = 'none';
                    sub.innerHTML = `
                         <div class="plumbob"></div>
                         <span>${s.label}</span>
                     `;
                    sub.onclick = (e) => {
                        e.stopPropagation();
                        sub.classList.add('done');
                        s.done = true;
                    };
                    mainArea.appendChild(sub);
                    rowItems.push(sub);

                    if (j < n.subs.length - 1) {
                        const connector = document.createElement('div');
                        connector.className = 'connector';
                        connector.innerHTML = '→';
                        Object.assign(connector.style, {
                            fontSize: '16px',
                            color: 'var(--s4-blue)',
                            display: 'flex',
                            justifyContent: 'center',
                            alignItems: 'center',
                            opacity: '0',
                            pointerEvents: 'none'
                        });
                        mainArea.appendChild(connector);
                        rowItems.push(connector);
                    }
                });

                node.onclick = () => toggleRow(node, rowItems);

                node.ondblclick = (e) => {
                    e.stopPropagation();
                    toggleDone(node);
                    n.done = node.classList.contains('done');
                };
                node.querySelector('span').oninput = () => n.label = node.querySelector('span').innerText;

                node.onmouseenter = (e) => {
                    showOverlay(e, n, true); // Pass true for isPhaseNode
                };
                node.onmouseleave = () => {
                    hideTimeout = setTimeout(() => {
                        hideOverlay();
                        hideTimeout = null;
                    }, 300);
                };

                leftPanel.appendChild(node);
            });

            gsap.fromTo(Array.from(leftPanel.children), { x: -100, opacity: 0 }, { x: 0, opacity: 1, duration: 0.5, stagger: 0.1, ease: "back.out(1.7)" });

            tile.addEventListener('wheel', (e) => {
                e.preventDefault();
                leftPanel.scrollTop += e.deltaY;
            });
        }

        function toggleDone(el) {
            el.classList.toggle('done');
        }

        function handleDeleteClick(btn) {
            if (!btn.clickCount) btn.clickCount = 0;
            btn.clickCount++;
            if (btn.clickCount === 1) {
                btn.innerText = 'Sure?';
                btn.style.color = 'orange';
            } else if (btn.clickCount === 2) {
                btn.innerText = 'Delete?';
                btn.style.color = 'red';
            } else if (btn.clickCount === 3) {
                deletePhase(btn);
                btn.clickCount = 0;
                btn.innerText = '×';
                btn.style.color = '#ff4444';
            }
            // Reset after 3 seconds if not completed
            clearTimeout(btn.resetTimeout);
            btn.resetTimeout = setTimeout(() => {
                btn.clickCount = 0;
                btn.innerText = '×';
                btn.style.color = '#ff4444';
            }, 3000);
        }

        function deletePhase(btn) {
            const node = btn.closest('.station');
            const leftPanel = node.parentElement;
            // Collect selected indices before deletion
            const selectedIndices = [];
            leftPanel.querySelectorAll('.station').forEach((s, i) => {
                if (s.classList.contains('selected')) selectedIndices.push(i);
            });
            const index = Array.from(leftPanel.children).indexOf(node);
            // Adjust selected indices for the deletion
            const adjustedIndices = selectedIndices.filter(i => i !== index).map(i => i > index ? i - 1 : i);
            // Delete the phase
            const data = networkDataStore[activeKey];
            data.nodes.splice(index, 1);
            // Re-render
            renderWorkflow(activeTile, activeKey);
            // Restore adjusted selected states
            const newStations = activeTile.querySelectorAll('.left-panel .station');
            const newMainArea = activeTile.querySelector('.main-area');
            adjustedIndices.forEach(i => {
                const node = newStations[i];
                const start = i * 7;
                const rowItems = [];
                for (let k = 0; k < 7; k++) {
                    rowItems.push(newMainArea.children[start + k]);
                }
                node.classList.add('selected');
                gsap.to(rowItems, { opacity: 1, scale: 1, duration: 0.6, stagger: 0.08, ease: "back.out(1.7)", pointerEvents: 'auto' });
            });
            log("Deleted phase");
        }

        function fillPhaseSubs(phaseData, category) {
            const tasks = shortcutTasks[category];
            if (!phaseData.subs || phaseData.subs.length === 0) {
                log(`Cannot fill phase "${phaseData.label}" - no sub-tasks available`);
                return;
            }
            // Collect currently selected phases before re-rendering
            const selectedIndices = [];
            const currentStations = activeTile.querySelectorAll('.left-panel .station');
            currentStations.forEach((s, i) => {
                if (s.classList.contains('selected')) selectedIndices.push(i);
            });
            phaseData.subs.forEach((s, i) => {
                if (i < tasks.length) {
                    s.label = tasks[i];
                }
            });
            // Update phase label to reflect the category
            const phaseNumber = phaseData.label.split(' ')[1] || '1';
            phaseData.label = category + ' ' + phaseNumber;
            phaseData.category = category;
            phaseData.expanded = true;
            renderWorkflow(activeTile, activeKey);
            // Restore selected states
            const data = networkDataStore[activeKey];
            const newStations = activeTile.querySelectorAll('.left-panel .station');
            const newMainArea = activeTile.querySelector('.main-area');
            selectedIndices.forEach(i => {
                const node = newStations[i];
                const start = i * 7; // Each phase has 7 elements: 4 subs + 3 connectors
                const rowItems = [];
                for (let k = 0; k < 7; k++) {
                    rowItems.push(newMainArea.children[start + k]);
                }
                node.classList.add('selected');
                gsap.to(rowItems, { opacity: 1, scale: 1, duration: 0.6, stagger: 0.08, ease: "back.out(1.7)", pointerEvents: 'auto' });
            });
            // Auto-expand the filled phase to show the steps
            const filledIndex = data.nodes.indexOf(phaseData);
            if (filledIndex !== -1 && !selectedIndices.includes(filledIndex)) {
                const node = newStations[filledIndex];
                const start = filledIndex * 7;
                const rowItems = [];
                for (let k = 0; k < 7; k++) {
                    rowItems.push(newMainArea.children[start + k]);
                }
                node.classList.add('selected');
                gsap.to(rowItems, { opacity: 1, scale: 1, duration: 0.6, stagger: 0.08, ease: "back.out(1.7)", pointerEvents: 'auto' });
            }
            log(`Filled phase "${phaseData.label}" with ${category} tasks`);
        }

        function exportNetwork() {
            const nodes = [];
            document.querySelectorAll('.node-wrapper').forEach(w => {
                nodes.push({
                    label: w.getAttribute('data-label'),
                    id: w.getAttribute('data-id'),
                    done: w.querySelector('.node').classList.contains('done')
                });
            });

            const data = {
                rowCount,
                nodes,
                store: networkDataStore
            };

            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `network_state_${Date.now()}.json`;
            a.click();
            log("Network exported to JSON");
        }

        async function processTileSpotify(url, tile) {
            const oembedUrl = `https://open.spotify.com/oembed?url=${encodeURIComponent(url)}`;
            try {
                const response = await fetch(oembedUrl);
                const data = await response.json();

                // 1. Update Tile Title
                tile.querySelector('.tile-title span').innerText = data.title.toUpperCase();

                // 2. Add Artist Thumb to Tile
                if (data.thumbnail_url) {
                    let thumb = tile.querySelector('.artist-thumb');
                    if (!thumb) {
                        thumb = document.createElement('img');
                        thumb.className = 'artist-thumb';
                        tile.querySelector('.tile-title').prepend(thumb);
                    }
                    thumb.src = data.thumbnail_url;

                    // 3. Transform Matrix Node into Profile Image
                    const nodeWrapper = tile.closest('.node-wrapper');
                    if (nodeWrapper) {
                        const matrixNode = nodeWrapper.querySelector('.node');
                        matrixNode.style.backgroundImage = `url('${data.thumbnail_url}')`;
                        matrixNode.classList.add('has-image');
                        const key = nodeWrapper.getAttribute('data-id');
                        if (networkDataStore[key]) {
                            networkDataStore[key].spotifyData = {
                                title: data.title,
                                thumbnail: data.thumbnail_url,
                                url: url
                            };
                        }
                        log(`Transformed node into: ${data.title}`);
                    }
                }

                // Clear the input
                tile.querySelector('input.spotify-input').value = '';
            } catch (error) {
                log('Spotify Fetch Failed: ' + error.message);
            }
        }
        function importNetwork(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    renderImported(data);
                    log("Network imported successfully");
                } catch (err) {
                    log("Error importing JSON: Invalid format");
                }
            };
            reader.readAsText(file);
        }

        function renderImported(data) {
            matrix.innerHTML = '';
            rowCount = 0;
            networkDataStore = data.store || {};
            Object.keys(networkDataStore).forEach(key => {
                if (!networkDataStore[key].leadData) {
                    networkDataStore[key].leadData = { checks: Array(5).fill(false), notes: Array(5).fill('') };
                }
            });

            // Group nodes by row
            const rows = {};
            data.nodes.forEach(n => {
                const parts = n.id ? n.id.split('.') : ["1", "0"];
                const rId = parts[0];
                if (!rows[rId]) rows[rId] = [];
                rows[rId].push(n);
            });

            Object.entries(rows).forEach(([rId, nodeList]) => {
                rowCount++;
                const row = document.createElement('div');
                row.className = 'node-row';
                nodeList.forEach((n, i) => {
                    const nodeWrap = createNode(rowCount, i, n.label);
                    if (n.done) {
                        nodeWrap.querySelector('.node').classList.add('done');
                    }
                    row.appendChild(nodeWrap);
                });
                matrix.appendChild(row);
            });
            updateGlows();
        }

        function createNode(rowId, colId, customLabel) {
            const label = customLabel || (colId === 2 ? 'Main' : 'Node');
            const nodeId = `${rowId}.${colId}`;
            const wrap = document.createElement('div');
            wrap.className = 'node-wrapper';
            wrap.setAttribute('data-label', label);
            wrap.setAttribute('data-id', nodeId);

            const isMain = colId === 2;
            const node = document.createElement('div');
            node.className = 'node';
            node.innerHTML = `<div class="plumbob"></div>
                             <div class="node-label ${isMain ? 'editable-main' : ''}"
                                   ${isMain ? 'contenteditable="true"' : ''}
                                   oninput="this.closest('.node-wrapper').setAttribute('data-label', this.innerText)"
                                   onclick="if(${isMain}) event.stopPropagation()">${label}</div>
                              <div class="lead-tracker" title="Lead Tracker" onclick="openLeadCard(this); event.stopPropagation();">💰</div>`;
            node.onclick = (e) => {
                e.stopPropagation();
                togglePrimary(node);
            };
            if (!isMain) {
                node.ondblclick = (e) => {
                    e.stopPropagation();
                    node.classList.toggle('done');
                    log(`${node.classList.contains('done') ? 'Completed' : 'Reset'}: ${label}`);
                };
            }

            const tile = document.createElement('div');
            tile.className = 'config-tile';
            tile.innerHTML = `
                <div class="tile-title">
                    <span contenteditable="true" onfocus="this.classList.add('editing')" onblur="this.classList.remove('editing')">${label.toUpperCase()}</span>
                    <button class="btn-add-station" onclick="addStation(this)" style="background: rgba(53, 198, 235, 0.2); border: 1px solid var(--s4-blue); color: var(--s4-blue); padding: 2px 8px; font-size: 12px;">+</button>
                    <button class="close-tile" onclick="closeTile(this)" title="Close Tile">×</button>
                </div>
                <div class="quick-integrations">
                    <label>Spotify Link:</label>
                    <input type="text" class="spotify-input" placeholder="Paste Artist/Album URL to sync..." onpaste="setTimeout(()=>processTileSpotify(this.value, this.closest('.config-tile')), 10)">
                </div>
                <div class="workflow-workspace"></div>
            `;
            tile.onclick = (e) => e.stopPropagation();

            wrap.appendChild(node);
            wrap.appendChild(tile);
            return wrap;
        }

        function addRow() {
            rowCount++;
            const row = document.createElement('div');
            row.className = 'node-row';
            row.style.opacity = '0';
            row.style.transform = 'translateY(30px)';

            for (let i = 0; i < 5; i++) {
                const label = i === 2 ? 'Main' : 'Node';
                row.appendChild(createNode(rowCount, i, label));
            }

            matrix.appendChild(row);
            setTimeout(() => {
                row.style.transition = '0.6s ease-out';
                row.style.opacity = '1';
                row.style.transform = 'translateY(0)';
            }, 50);
            log(`Added cluster set ${rowCount}`);
        }

        function togglePrimary(node) {
            const wrap = node.parentElement;
            const tile = wrap.querySelector('.config-tile');
            const key = wrap.getAttribute('data-id');
            openTile(tile, key);
        }

        function closeAll() {
            document.querySelectorAll('.node').forEach(n => n.classList.remove('active-primary'));
            document.querySelectorAll('.config-tile').forEach(t => t.classList.remove('active'));
            if (typeof closeLeadCard === 'function') closeLeadCard();
        }

        function closeTile(btn) {
            closeAll();
        }

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            const row = document.createElement('div');
            row.className = 'node-row';
            rowCount = 1;
            const labels = ['Node', 'Node', 'Main', 'Node', 'Node'];
            labels.forEach((l, i) => row.appendChild(createNode(1, i, l)));
            matrix.appendChild(row);
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.node-wrapper') &&
                !e.target.closest('.config-tile') &&
                !e.target.closest('#lead-card')) {
                closeAll();
            }
        });
    </script>
</body>

</html>
