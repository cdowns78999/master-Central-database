<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .section { margin-bottom: 40px; border: 1px solid #ccc; padding: 20px; }
        input { width: 300px; padding: 10px; }
        button { padding: 10px 20px; margin-left: 10px; }
        img { max-width: 300px; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Spotify Profile Image Test</h1>

    <div class="section">
        <h2>Version 1: Using Spotify oEmbed API</h2>
        <input type="text" id="url1" placeholder="Enter Spotify URL (e.g., https://open.spotify.com/artist/4gzpq5DPGxSnKTe4SA8HAU)">
        <button onclick="getImage1()">Get Image</button>
        <div id="result1"></div>
    </div>

    <div class="section">
        <h2>Version 2: Extract ID and Use Spotify Image URL</h2>
        <input type="text" id="url2" placeholder="Enter Spotify URL">
        <button onclick="getImage2()">Get Image</button>
        <div id="result2"></div>
    </div>

    <div class="section">
        <h2>Version 3: Using Embed and Extract Image</h2>
        <input type="text" id="url3" placeholder="Enter Spotify URL">
        <button onclick="getImage3()">Get Image</button>
        <div id="result3"></div>
    </div>

    <script>
        async function getImage1() {
            const url = document.getElementById('url1').value;
            const oembedUrl = `https://open.spotify.com/oembed?url=${encodeURIComponent(url)}`;
            try {
                const response = await fetch(oembedUrl);
                const data = await response.json();
                const img = `<img src="${data.thumbnail_url}" alt="Spotify Image">`;
                document.getElementById('result1').innerHTML = img;
            } catch (error) {
                document.getElementById('result1').innerHTML = 'Error: ' + error.message;
            }
        }

        function getImage2() {
            const url = document.getElementById('url2').value;
            const match = url.match(/spotify\.com\/(artist|album|track)\/([a-zA-Z0-9]+)/);
            if (match) {
                const type = match[1];
                const id = match[2];
                // Spotify images are not directly accessible, but for demo, use a placeholder
                const imgUrl = `https://i.scdn.co/image/${id}`; // This may not work, placeholder
                const img = `<img src="${imgUrl}" alt="Spotify Image" onerror="this.src='https://via.placeholder.com/300?text=Image+Not+Available'">`;
                document.getElementById('result2').innerHTML = img;
            } else {
                document.getElementById('result2').innerHTML = 'Invalid URL';
            }
        }

        function getImage3() {
            const url = document.getElementById('url3').value;
            const embedUrl = url.replace('open.spotify.com', 'open.spotify.com/embed');
            const iframe = `<iframe src="${embedUrl}" width="300" height="380" frameborder="0" allowtransparency="true" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>`;
            // To extract image, it's tricky without API, so just embed
            document.getElementById('result3').innerHTML = iframe + '<p>Image displayed in embed.</p>';
        }
    </script>
</body>
</html>
