        async function processTileSpotify(url, tile, directWrap = null) {
            const oembedUrl = `https://open.spotify.com/oembed?url=${encodeURIComponent(url)}`;
            try {
                const response = await fetch(oembedUrl);
                const data = await response.json();

                // 1. Update Title/Input
                const artistName = data.title ? data.title.toUpperCase() : "SYNCED ARTIST";
                if (tile) tile.querySelector('.tile-title span').innerText = artistName;

                // 2. Add Artist Thumb to Tile
                if (data.thumbnail_url && tile) {
                    let thumb = tile.querySelector('.artist-thumb');
                    if (!thumb) {
                        thumb = document.createElement('img');
                        thumb.className = 'artist-thumb';
                        tile.querySelector('.tile-title').prepend(thumb);
                    }
                    thumb.src = data.thumbnail_url;
                }

                // 3. Transform Matrix Node
                const nodeWrapper = directWrap || (tile ? tile.closest('.node-wrapper') : null);
                if (nodeWrapper) {
                    const matrixNode = nodeWrapper.querySelector('.node');
                    matrixNode.style.backgroundImage = `url('${data.thumbnail_url}')`;
                    matrixNode.classList.add('has-image');

                    // Update input label
                    const input = nodeWrapper.querySelector('.node-label.active-input');
                    if (input) {
                        input.value = artistName;
                        nodeWrapper.setAttribute('data-label', artistName);
                        autoSizeInput(input);
                    }

                    const key = nodeWrapper.getAttribute('data-id');
                    if (networkDataStore[key]) {
                        networkDataStore[key].spotifyData = {
                            title: data.title,
                            thumbnail: data.thumbnail_url,
                            url: url
                        };
                    }
                    return `Synced Artist: ${data.title}`;
                }

                // Clear the input if in tile
                if (tile) tile.querySelector('input.spotify-input').value = '';
            } catch (error) {
                return 'Spotify Fetch Failed: ' + error.message;
            }
        }
        function importNetwork(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    renderImported(data);
                    log("Network imported successfully");
                } catch (err) {
                    log("Error importing JSON: Invalid format");
                }
            };
            reader.readAsText(file);
        }

        function renderImported(data) {
            matrix.innerHTML = '';
            rowCount = 0;
            networkDataStore = data.store || {};
            Object.keys(networkDataStore).forEach(key => {
                if (!networkDataStore[key].leadData) {
                    networkDataStore[key].leadData = { checks: Array(5).fill(false), notes: Array(5).fill('') };
                }
            });

            // Group nodes by row
            const rows = {};
            data.nodes.forEach(n => {
                const parts = n.id ? n.id.split('.') : ["1", "0"];
                const rId = parts[0];
                if (!rows[rId]) rows[rId] = [];
                rows[rId].push(n);
            });

            Object.entries(rows).forEach(([rId, nodeList]) => {
                rowCount++;
                const row = document.createElement('div');
                row.className = 'node-row';
                nodeList.forEach((n, i) => {
                    const nodeWrap = createNode(rowCount, i, n.label);
                    if (n.done) {
                        nodeWrap.querySelector('.node').classList.add('done');
                    }
                    row.appendChild(nodeWrap);
                });
                matrix.appendChild(row);
            });
            updateGlows();
        }

        function createNode(rowId, colId, customLabel) {
            const label = customLabel || (colId === 2 ? 'Main' : 'Node');
            const nodeId = `${rowId}.${colId}`;
            const wrap = document.createElement('div');
            wrap.className = 'node-wrapper';
            wrap.setAttribute('data-label', label);
            wrap.setAttribute('data-id', nodeId);

            const isMain = colId === 2;
            const node = document.createElement('div');
            node.className = 'node';

            // All nodes now use an input for the Spotify Shortcut
            const labelHTML = `<input type="text" class="node-label active-input ${isMain ? 'main-node' : ''}" 
                    placeholder="Paste Spotify..." 
                    value="${label}"
                    oninput="this.closest('.node-wrapper').setAttribute('data-label', this.value); autoSizeInput(this)"
                    onpaste="setTimeout(()=>syncFromNode(this.value, this), 10)"
                    onclick="event.stopPropagation()">`;

            node.innerHTML = `<div class="plumbob"></div>
                             ${labelHTML}
                              <div class="lead-tracker" title="Lead Tracker" onclick="openLeadCard(this); event.stopPropagation();">
                                💰
                                <div class="lead-comet comet-1"></div>
                                <div class="lead-comet comet-2"></div>
                                <div class="moon-orbit"><div class="satellite"></div></div>
                              </div>`;

            // Auto-size after small delay to ensure DOM state
            setTimeout(() => {
                const input = node.querySelector('input');
                if (input) autoSizeInput(input);
            }, 0);
            node.onclick = (e) => {
                e.stopPropagation();
                togglePrimary(node);
            };
            if (!isMain) {
                node.ondblclick = (e) => {
                    e.stopPropagation();
                    node.classList.toggle('done');
                    log(`${node.classList.contains('done') ? 'Completed' : 'Reset'}: ${label}`);
                };
            }

            wrap.appendChild(node);
            return wrap;
        }

        function addRow() {
            rowCount++;

            const row = document.createElement('div');
            row.className = 'node-row';
            row.style.opacity = '0';
            row.style.transform = 'translateY(30px)';

            for (let i = 0; i < 5; i++) {
                const label = i === 2 ? 'Main' : 'Node';
                row.appendChild(createNode(rowCount, i, label));
            }

            matrix.appendChild(row);
            setTimeout(() => {
                row.style.transition = '0.6s ease-out';
                row.style.opacity = '1';
                row.style.transform = 'translateY(0)';
            }, 50);
            log(`Added group ${rowCount}`);
            saveToLocalStorage();
        }

        function togglePrimary(node) {
            const wrap = node.parentElement;
            const key = wrap.getAttribute('data-id');
            const label = wrap.getAttribute('data-label');
            const globalTile = document.getElementById('global-config-tile');
            openTile(globalTile, key, label);
        }

        function closeAll() {
            document.querySelectorAll('.node').forEach(n => n.classList.remove('active-primary'));
            document.querySelectorAll('.config-tile').forEach(t => t.classList.remove('active'));
            if (typeof closeLeadCard === 'function') closeLeadCard();
        }

        function closeTile(btn) {
            closeAll();
        }

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            loadLinkStorageFromLocal();
            const row = document.createElement('div');
            row.className = 'node-row';
            rowCount = 1;
            const labels = ['Node', 'Node', 'Main', 'Node', 'Node'];
            labels.forEach((l, i) => row.appendChild(createNode(1, i, l)));

            // Relative container for the initial row and its (missing) top separator
            const rowWrapper = document.createElement('div');
            rowWrapper.style.position = 'relative';
            rowWrapper.style.width = '100%';
            rowWrapper.appendChild(row); // No separator for the very first row

            matrix.appendChild(rowWrapper);
        });

        // init high-end plexus wind
        const canvas = document.getElementById('wind-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let windWidth, windHeight;
        let mouseX = 0, mouseY = 0;

        function resizeWind() {
            windWidth = canvas.width = window.innerWidth;
            windHeight = canvas.height = window.innerHeight;
            initParticles();
        }

        class WindParticle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * windWidth;
                this.y = Math.random() * windHeight;
                this.vx = (Math.random() - 0.5) * 0.8;
                this.vy = (Math.random() - 0.5) * 0.8;
                this.size = Math.random() * 2 + 1;
                this.opacity = Math.random() * 0.3 + 0.1;
                this.origX = this.x;
                this.origY = this.y;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (this.x < -50) this.x = windWidth + 50;
                if (this.x > windWidth + 50) this.x = -50;
                if (this.y < -50) this.y = windHeight + 50;
                if (this.y > windHeight + 50) this.y = -50;
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < 80; i++) {
                particles.push(new WindParticle());
            }
        }

        function drawPlexus() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const p1 = particles[i];
                    const p2 = particles[j];
                    const dist = Math.hypot(p1.x - p2.x, p1.y - p2.y);

                    if (dist < 150) {
                        const alpha = (1 - dist / 150) * 0.15;
                        ctx.strokeStyle = `rgba(53, 198, 235, ${alpha})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animateWind() {
            ctx.clearRect(0, 0, windWidth, windHeight);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            drawPlexus();
            requestAnimationFrame(animateWind);
        }

        window.addEventListener('resize', resizeWind);
        resizeWind();
        animateWind();

        document.addEventListener('mousedown', (e) => {
            // Only allow closing via the specific X buttons as requested
        });
    </script>
</body>

</html>
