<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HANDY DASHBOARD</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wdth,wght@12..96,75..100,200..800&family=Manrope:wght@200;300;400;500;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="mesh-bg"></div>
    <div class="grain-overlay"></div>

    <!-- Rank & Lock System -->
    <div class="rank-pill" id="rankPill">
        <div class="rank-icon">⭐</div>
        <div class="rank-info">
            <div class="rank-name">ROOKIE</div>
            <div class="xp-bar">
                <div class="xp-fill" id="xpFill"></div>
                <div class="xp-text">0/100 XP</div>
            </div>
        </div>
        <div class="lock-toggle" id="lockToggle">
            <span class="lock-text">UNLOCKED</span>
        </div>
        <div class="theme-switcher">
            <button class="theme-btn" data-theme="light" title="Light Mode">☀️</button>
            <button class="theme-btn" data-theme="evening" title="Evening Mode">🌆</button>
            <button class="theme-btn" data-theme="dark" title="Dark Mode">🌙</button>
        </div>
    </div>

    <!-- Main App Container -->
    <main class="app-container" id="appContainer">
        <!-- View 1: Home (Mission Control) -->
        <section class="view active" id="homeView">
            <header class="view-header">
                <h1 class="view-title">MISSION CONTROL</h1>
                <p class="view-subtitle">Ready for deployment</p>
            </header>

            <div class="tasks-grid" id="tasksGrid">
                <!-- Tasks will be dynamically inserted here -->
            </div>

            <!-- Floating Add Button (replaces center nav when in grid view) -->
            <button class="floating-add-btn" id="floatingAddBtn">
                <span class="add-icon">+</span>
            </button>
        </section>

        <!-- View 2: Vault (History) -->
        <section class="view" id="vaultView">
            <header class="view-header">
                <h1 class="view-title">VAULT</h1>
                <p class="view-subtitle">Mission archives</p>
            </header>
            <div class="vault-grid" id="vaultGrid">
                <!-- Completed tasks will appear here -->
            </div>
        </section>

        <!-- View 3: Lab (Experiments) -->
        <section class="view" id="labView">
            <header class="view-header">
                <h1 class="view-title">LAB</h1>
                <p class="view-subtitle">Experimental protocols</p>
            </header>
            <div class="lab-content">
                <div class="construction-card">
                    <div class="construction-icon">🔬</div>
                    <h3>Under Construction</h3>
                    <p>Advanced features coming soon</p>
                </div>
            </div>
        </section>

        <!-- View 4: Grid (All Tasks) -->
        <section class="view" id="gridView">
            <header class="view-header">
                <h1 class="view-title">GRID</h1>
                <p class="view-subtitle">All operations</p>
            </header>
            <div class="all-tasks-grid" id="allTasksGrid">
                <!-- All tasks (active and completed) -->
            </div>
        </section>
    </main>

    <!-- Swift Wizard Modal -->
    <div class="wizard-overlay" id="wizardOverlay">
        <div class="wizard-card" id="wizardCard">
            <!-- Wizard content will be dynamically generated -->
        </div>
    </div>

    <!-- Anomaly Overlay (for completion effects) -->
    <div class="anomaly-overlay" id="anomalyOverlay">
        <div class="anomaly-message" id="anomalyMessage">BREACH DETECTED</div>
    </div>

    <!-- XP Popup -->
    <div class="xp-popup" id="xpPopup">+25 XP</div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav" id="bottomNav">
        <div class="nav-item active" data-view="home">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                <polyline points="9,22 9,12 15,12 15,22" />
            </svg>
            <span class="nav-label">Home</span>
        </div>

        <div class="nav-item" data-view="vault">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10" />
                <path d="M12 6v6l4 2" />
            </svg>
            <span class="nav-label">Vault</span>
        </div>

        <button class="nav-center-btn" id="centerCommandBtn">
            <svg class="center-icon" viewBox="0 0 24 24" fill="white">
                <rect x="3" y="3" width="7" height="7" />
                <rect x="14" y="3" width="7" height="7" />
                <rect x="3" y="14" width="7" height="7" />
                <rect x="14" y="14" width="7" height="7" />
            </svg>
        </button>

        <div class="nav-item" data-view="lab">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 3v6m6-6v6m-6 6h6m-3-3v6" />
            </svg>
            <span class="nav-label">Lab</span>
        </div>

        <div class="nav-item" data-view="grid">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="7" />
                <rect x="14" y="3" width="7" height="7" />
                <rect x="14" y="14" width="7" height="7" />
                <rect x="3" y="14" width="7" height="7" />
            </svg>
            <span class="nav-label">Grid</span>
        </div>
    </nav>

    <!-- iOS-style Home Indicator -->
    <div class="home-indicator"></div>

    <script src="engine.js"></script>
</body>

</html>
