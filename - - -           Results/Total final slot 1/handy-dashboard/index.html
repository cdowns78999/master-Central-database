<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HANDY DASHBOARD | Slot 19</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Neue+Haas+Grotesk:wght@400;500;600;700&family=SF+Pro+Display:wght@300;400;500;600;700&family=Inter:wght@200;300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="mobile-first">
    <!-- Global Effects -->
    <div id="anomaly_overlay" class="hidden">
        <div class="anomaly-msg">BREACH DETECTED</div>
    </div>
    <div id="level_flash" class="hidden"></div>

    <!-- Main App Wrapper -->
    <main id="app_viewport">

        <!-- TOP HUD (Fixed) -->
        <header id="global_hud">
            <div id="rank_pill" class="glass-pill" onclick="engine.toggleLock()">
                <div id="lock_status_dot"></div>
                <div class="rank-info">
                    <span id="rank_name">ROOKIE</span>
                    <div class="xp-progress">
                        <div id="xp_fill"></div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Dynamic Content Mount -->
        <section id="stage_mount" class="scroll-container">
            <!-- Content will be injected by engine.switchView() -->
        </section>

        <!-- Bottomfrost Nav -->
        <nav id="bottom_nav" class="frost-bar">
            <div class="nav-item active" data-view="home">
                <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                <span class="nav-label">COMMAND</span>
                <div class="nav-dot"></div>
            </div>
            <div class="nav-item" data-view="vault">
                <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
                <span class="nav-label">VAULT</span>
                <div class="nav-dot"></div>
            </div>

            <div id="elevated_cmd" class="center-btn" onclick="wizard.open()">
                <div class="btn-inner">🔳</div>
            </div>

            <div class="nav-item" data-view="lab">
                <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2l4 8v10h-8v-10l4-8z"></path>
                </svg>
                <span class="nav-label">LAB</span>
                <div class="nav-dot"></div>
            </div>
            <div class="nav-item" data-view="grid">
                <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7"></rect>
                    <rect x="14" y="3" width="7" height="7"></rect>
                    <rect x="14" y="14" width="7" height="7"></rect>
                    <rect x="3" y="14" width="7" height="7"></rect>
                </svg>
                <span class="nav-label">GRID</span>
                <div class="nav-dot"></div>
            </div>
        </nav>

    </main>

    <!-- Swift Wizard Overlay -->
    <div id="wizard_overlay" class="hidden glass-bg">
        <div id="wizard_card" class="ticket-card-3d">
            <div class="card-notches"></div>
            <div id="wizard_header">
                <span id="wizard_step_indicator">STEP 1/4</span>
                <button onclick="wizard.close()" class="close-btn">×</button>
            </div>

            <div id="wizard_step_content">
                <!-- Injected via wizard.js -->
            </div>

            <div id="wizard_footer">
                <div class="progress-dots">
                    <div class="dot active"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
                <button id="wizard_next_btn" class="primary-btn">PROCEED →</button>
            </div>
        </div>
    </div>

    <!-- Engine & Content Script -->
    <script src="script.js"></script>
</body>

</html>
