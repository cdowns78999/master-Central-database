<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap');

        body {
            background: #020617;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            font-family: 'Outfit', sans-serif;
        }

        .card {
            background: rgba(15, 23, 42, 0.9);
            border: 2px solid rgba(56, 189, 248, 0.4);
            border-radius: 32px;
            padding: 3rem;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
            color: white;
            position: relative;
        }
    </style>
</head>

<body>
    <div class="card">

        <div
            style="display: flex; align-items: center; gap: 1.5rem; margin-bottom: 2.5rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 1.5rem;">
            <img src="https://image-cdn-ak.spotifycdn.com/image/ab676161000051746a1c32d5a0ef95a5bfca92da"
                style="width: 70px; height: 70px; border-radius: 50%; border: 3px solid #1ed760; box-shadow: 0 0 20px rgba(30,215,96,0.3);">
            <div>
                <div style="font-size: 1.8rem; font-weight: 800; letter-spacing: -1px;">Lemi Vice</div>
                <div style="color: #1ed760; font-family: 'JetBrains Mono'; font-size: 0.8rem; letter-spacing: 2px;">
                    STRATEGY PAYLOAD</div>
            </div>
        </div>

        <div style="margin-bottom: 2.5rem;">
            <div
                style="font-size: 0.7rem; text-transform: uppercase; letter-spacing: 3px; color: rgba(255,255,255,0.3); margin-bottom: 1rem;">
                Core Objective</div>
            <div style="font-size: 1rem; line-height: 1.6; color: rgba(255,255,255,0.8);">Comprehensive growth strategy
                for Lemi Vice. Leveraging high-authority placements and data-driven targeting to maximize audience
                retention and platform velocity.</div>
        </div>

        <div style="display: flex; flex-direction: column; gap: 1rem; margin-bottom: 2.5rem;">

            <div
                style="background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); padding: 1rem 1.5rem; border-radius: 12px; display: flex; justify-content: space-between; align-items: center;">
                <span style="font-weight: 600;">10K Spotify</span>
                <span style="color: #38bdf8; font-weight: 800; font-family: 'JetBrains Mono';">$325</span>
            </div>

            <div
                style="background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); padding: 1rem 1.5rem; border-radius: 12px; display: flex; justify-content: space-between; align-items: center;">
                <span style="font-weight: 600;">10K Spotify</span>
                <span style="color: #38bdf8; font-weight: 800; font-family: 'JetBrains Mono';">$325</span>
            </div>

        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2.5rem;">
            <div
                style="background: rgba(56, 189, 248, 0.1); border: 1px solid rgba(56, 189, 248, 0.3); border-radius: 16px; padding: 1.25rem; text-align: center;">
                <div
                    style="font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; color: #38bdf8; margin-bottom: 5px;">
                    Deadline</div>
                <div style="font-weight: 800; font-size: 1.1rem;">N/A</div>
            </div>
            <div
                style="background: rgba(244, 63, 94, 0.1); border: 1px solid rgba(244, 63, 94, 0.3); border-radius: 16px; padding: 1.25rem; text-align: center;">
                <div
                    style="font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; color: #f43f5e; margin-bottom: 5px;">
                    Discount</div>
                <div style="font-weight: 800; font-size: 1.1rem;">6% OFF</div>
            </div>
        </div>



        <div
            style="padding-top: 2rem; border-top: 2px solid #38bdf8; display: flex; justify-content: space-between; align-items: center;">
            <span style="font-weight: 800; text-transform: uppercase; letter-spacing: 4px; font-size: 1rem;">Total
                Investment</span>
            <span
                style="font-size: 2.2rem; font-weight: 900; color: #38bdf8; text-shadow: 0 0 20px rgba(56,189,248,0.3);">$611.00</span>
        </div>

    </div>
</body>

</html>
