<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proposal Pro V2 | Universal Hub</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>Proposal Pro V2</h1>
        </header>

        <!-- Dynamic URL Entry -->
        <div class="url-bar">
            <input type="text" id="spotifyUrl" placeholder="Paste Spotify Link to begin..." autocomplete="off">
        </div>

        <div class="proposal-grid">
            <!-- Field 1: Artist & Strategy -->
            <div class="input-group">
                <label>Artist & Strategy (Long)</label>
                <div id="field1-container">
                    <div id="artistHeader" class="artist-header">
                        <img id="artistPic" src="" alt="" class="artist-pic">
                        <div class="artist-name-display" id="artistNameDisplay">Artist Name</div>
                    </div>
                    <textarea id="field1" placeholder="Craft the campaign vision here..."></textarea>
                </div>
            </div>

            <!-- Side Fields -->
            <div class="side-fields">
                <div class="input-group" style="height: 100%;">
                    <label>Timeline (Short)</label>
                    <textarea id="field2" placeholder="Start date, duration, etc."></textarea>
                </div>
            </div>

            <div class="side-fields">
                <div class="input-group" id="field3-wrapper" style="height: 100%;">
                    <label>Order Choice (Short)</label>
                    <textarea id="field3" placeholder="Select services..."></textarea>
                    <!-- Suggestions Panel -->
                    <div id="suggestionBox" class="suggestion-box"></div>
                </div>
            </div>
        </div>

        <!-- Advanced Pricing Tools -->
        <div class="advanced-tools">
            <div class="input-row">
                <div class="input-group">
                    <label>Discount (%)</label>
                    <input type="number" id="discountInput" placeholder="0" min="0" max="100" oninput="updateLedger()">
                </div>
                <div class="input-group">
                    <label>Bonus Line 1</label>
                    <input type="text" id="bonus1" placeholder="e.g. Free Press Hit">
                </div>
                <div class="input-group">
                    <label>Bonus Line 2</label>
                    <input type="text" id="bonus2" placeholder="e.g. 5K Extra Streams">
                </div>
                <div class="input-group">
                    <label>Deadline</label>
                    <input type="date" id="deadlineDate">
                </div>
            </div>
        </div>

        <!-- Dynamic Pricing Ledger -->
        <div class="ledger-section">
            <div class="ledger-title">Price Breakdown</div>
            <div id="ledgerTable" class="ledger-table">
                <!-- Line items fall here -->
            </div>
            <div id="discountRow" class="ledger-row"
                style="display: none; border-top: 1px dashed var(--primary); margin-top: 0.5rem; color: #ff6b6b !important;">
                <span>Discount Impact</span>
                <span id="discountValue">-$0.00</span>
            </div>
            <div class="ledger-total">
                <span class="label">Total Investment</span>
                <span id="ledgerTotal">$0.00</span>
            </div>
        </div>

        <!-- Step 2: Go Button -->
        <div class="go-section">
            <button class="btn-go" onclick="revealResults()">GO</button>
        </div>

        <!-- Step 3: Results (Hidden until GO) -->
        <div id="resultsArea" class="results-area">
            <div class="ledger-title">Final Proposal Visualization</div>

            <!-- Visualization Preview (Mirrors chad6b styling) -->
            <div id="visualPreview" class="visual-preview-area">
                <!-- Dynamic card injected here -->
            </div>

            <!-- Reveal Code Section -->
            <div style="display: flex; justify-content: center; margin-top: 3rem;">
                <button class="btn btn-primary" id="revealCodeBtn" style="display: none;" onclick="toggleCode()">Reveal
                    Code</button>
            </div>

            <div id="codeArea" class="code-display">
                <pre id="codeContent"></pre>
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-secondary" onclick="resetV2()">Reset Tool</button>
            <button class="btn btn-primary" onclick="copyProposalV2()">Copy Proposal Text</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
