<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ledger Grid Template | Ready to Deploy</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        /* 
           LEDGER GRID CORE STYLES 
           Copy this :root and the classes below to your project.
        */
        :root {
            --ledger-bg: #05070a;
            --ledger-row: rgba(255, 255, 255, 0.02);
            --ledger-border: rgba(255, 255, 255, 0.05);
            --spotify-green: #1db954;
            --ocean-orange: #fa5d29;
            --text-dim: rgba(255, 255, 255, 0.5);
            --transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            background-color: var(--ledger-bg);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            padding: 4rem 2rem;
            display: flex;
            justify-content: center;
        }

        .ledger-container {
            width: 100%;
            max-width: 1400px;
        }

        /* THE TABLE */
        .ledger-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
            /* Space between rows */
        }

        .ledger-header {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            padding: 0 1.5rem 1.2rem;
            text-align: left;
        }

        /* ROWS */
        .ledger-row {
            background: var(--ledger-row);
            border: 1px solid var(--ledger-border);
            transition: var(--transition);
        }

        .ledger-row:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: scale(1.005);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        /* CELLS */
        .ledger-cell {
            padding: 1.2rem 1.5rem;
            font-size: 1rem;
            font-weight: 500;
            border-top: 1px solid var(--ledger-border);
            border-bottom: 1px solid var(--ledger-border);
        }

        .ledger-cell:first-child {
            border-left: 1px solid var(--ledger-border);
            border-radius: 12px 0 0 12px;
        }

        .ledger-cell:last-child {
            border-right: 1px solid var(--ledger-border);
            border-radius: 0 12px 12px 0;
        }

        /* VISUALS / THUMBNAILS */
        .entity-visual {
            width: 52px;
            height: 52px;
            border-radius: 8px;
            background: #111;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .entity-visual img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* BADGES */
        .match-badge {
            padding: 6px 12px;
            background: rgba(29, 185, 84, 0.1);
            color: var(--spotify-green);
            font-family: 'JetBrains Mono';
            font-weight: 700;
            font-size: 0.75rem;
            border-radius: 6px;
            display: inline-block;
        }

        /* SCORE / STATS */
        .stat-main {
            font-family: 'JetBrains Mono';
            font-weight: 600;
            color: #fff;
        }

        .stat-sub {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 4px;
        }

        /* PROTOCOL BUTTONS */
        .action-btn-protocol {
            padding: 10px 18px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .action-btn-protocol.primary {
            border: 1px solid var(--spotify-green);
            color: var(--spotify-green);
            background: transparent;
        }

        .action-btn-protocol.primary:hover {
            background: var(--spotify-green);
            color: #000;
        }

        .action-btn-protocol.secondary {
            border: 1px solid var(--ocean-orange);
            color: var(--ocean-orange);
            background: transparent;
        }

        .action-btn-protocol.secondary:hover {
            background: var(--ocean-orange);
            color: #000;
        }
    </style>
</head>

<body>

    <div class="ledger-container">
        <table class="ledger-table">
            <thead>
                <tr>
                    <th class="ledger-header">Visual</th>
                    <th class="ledger-header">Artist Entity</th>
                    <th class="ledger-header" style="text-align: center;">Match %</th>
                    <th class="ledger-header">Impact Score</th>
                    <th class="ledger-header">Network</th>
                    <th class="ledger-header">Intelligence</th>
                    <th class="ledger-header">Direct Action</th>
                </tr>
            </thead>
            <tbody>
                <!-- ROW 1 -->
                <tr class="ledger-row">
                    <td class="ledger-cell">
                        <div class="entity-visual">
                            <img src="https://picsum.photos/seed/art1/100" alt="Artist">
                        </div>
                    </td>
                    <td class="ledger-cell">
                        <div style="font-weight: 800; font-size: 1.1rem;">VELOCITY</div>
                        <div style="font-size: 0.75rem; color: var(--text-dim); margin-top: 2px;">Alternative Pop</div>
                    </td>
                    <td class="ledger-cell" style="text-align: center;">
                        <span class="match-badge">94%</span>
                    </td>
                    <td class="ledger-cell">
                        <div class="stat-main">88 / 100</div>
                        <div class="stat-sub">High Momentum</div>
                    </td>
                    <td class="ledger-cell">
                        <div class="stat-main">1.2M</div>
                        <div class="stat-sub">Followers</div>
                    </td>
                    <td class="ledger-cell">
                        <a href="#" class="action-btn-protocol primary">
                            <span style="font-size: 14px;">🎧</span>
                            Listen
                        </a>
                    </td>
                    <td class="ledger-cell">
                        <a href="#" class="action-btn-protocol secondary">
                            <span>📩</span>
                            Deploy Contact
                        </a>
                    </td>
                </tr>

                <!-- ROW 2 -->
                <tr class="ledger-row">
                    <td class="ledger-cell">
                        <div class="entity-visual">
                            <img src="https://picsum.photos/seed/art2/100" alt="Artist">
                        </div>
                    </td>
                    <td class="ledger-cell">
                        <div style="font-weight: 800; font-size: 1.1rem;">NOVA SOUL</div>
                        <div style="font-size: 0.75rem; color: var(--text-dim); margin-top: 2px;">Neo-Soul</div>
                    </td>
                    <td class="ledger-cell" style="text-align: center;">
                        <span class="match-badge"
                            style="background: rgba(250, 93, 41, 0.1); color: var(--ocean-orange);">81%</span>
                    </td>
                    <td class="ledger-cell">
                        <div class="stat-main">74 / 100</div>
                        <div class="stat-sub">Steady Growth</div>
                    </td>
                    <td class="ledger-cell">
                        <div class="stat-main">450K</div>
                        <div class="stat-sub">Monthly Listeners</div>
                    </td>
                    <td class="ledger-cell">
                        <a href="#" class="action-btn-protocol primary">
                            <span>🎧</span>
                            Listen
                        </a>
                    </td>
                    <td class="ledger-cell">
                        <a href="#" class="action-btn-protocol secondary">
                            <span>📩</span>
                            Deploy Contact
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</body>

</html>
