<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connector Line Prototype</title>
    <style>
        :root {
            --bg: #010c1a;
            --primary: #4cc9f0;
            --gap: 100px;
            --node-w: 200px;
            --node-h: 60px;
            --transition: all 0.3s ease;
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .matrix {
            display: grid;
            grid-template-columns: repeat(3, var(--node-w));
            grid-template-rows: repeat(3, var(--node-h));
            gap: var(--gap);
            position: relative;
        }

        .node {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
        }

        /* Connector Lines */
        .connector {
            position: absolute;
            background: rgba(255, 255, 255, 0.03);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }

        .connector:hover {
            background: rgba(76, 201, 240, 0.1);
        }

        /* Horizontal Connector */
        .connector-h {
            width: var(--gap);
            height: 20px;
            top: calc(50% - 10px);
            left: var(--node-w);
        }

        .connector-h::after {
            content: '';
            width: 100%;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            transition: var(--transition);
        }

        /* Vertical Connector */
        .connector-v {
            width: 20px;
            height: var(--gap);
            top: var(--node-h);
            left: calc(50% - 10px);
        }

        .connector-v::after {
            content: '';
            width: 1px;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            transition: var(--transition);
        }

        /* Line Styles */
        .style-solid::after {
            border-top: 2px solid var(--primary);
            background: none !important;
            opacity: 1 !important;
            height: 0 !important;
        }

        .style-dashed::after {
            border-top: 2px dashed var(--primary);
            background: none !important;
            opacity: 0.7 !important;
            height: 0 !important;
        }

        .style-dotted::after {
            border-top: 2px dotted var(--primary);
            background: none !important;
            opacity: 0.5 !important;
            height: 0 !important;
        }

        .connector-v.style-solid::after {
            border-top: none;
            border-left: 2px solid var(--primary);
            width: 0 !important;
        }

        .connector-v.style-dashed::after {
            border-top: none;
            border-left: 2px dashed var(--primary);
            width: 0 !important;
        }

        .connector-v.style-dotted::after {
            border-top: none;
            border-left: 2px dotted var(--primary);
            width: 0 !important;
        }

        .selected {
            background: rgba(76, 201, 240, 0.2) !important;
            box-shadow: 0 0 15px rgba(76, 201, 240, 0.2);
        }

        .status {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 2px;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body>

    <div class="matrix">
        <!-- Row 1 -->
        <div class="node">Node 1-1</div>
        <div class="connector connector-h" id="h1" oncontextmenu="cycleLine(event, this)"
            onclick="selectLine(event, this)" ondblclick="resetLine(event, this)"></div>
        <div class="node">Node 1-2</div>

        <!-- Spacer for grid mapping -->
        <div class="connector connector-v" id="v1" oncontextmenu="cycleLine(event, this)"
            onclick="selectLine(event, this)" ondblclick="resetLine(event, this)"></div>
        <div></div>
        <div></div>

        <!-- Row 2 -->
        <div class="node">Node 2-1</div>
        <div></div>
        <div></div>
    </div>

    <div class="status">
        Right Click: Style Carousel | Left Click: Select & Add | Double Click: Reset
    </div>

    <script>
        const styles = ['ghost', 'solid', 'dashed', 'dotted'];

        function cycleLine(e, el) {
            e.preventDefault();
            let current = el.dataset.style || 'ghost';
            let idx = (styles.indexOf(current) + 1) % styles.length;
            let next = styles[idx];

            // Clean up
            styles.forEach(s => el.classList.remove('style-' + s));

            if (next !== 'ghost') {
                el.classList.add('style-' + next);
            }
            el.dataset.style = next;

            console.log('Style cycled to:', next);
        }

        function selectLine(e, el) {
            // Check for double click prevention in simple one-off
            if (e.detail === 2) return;

            el.classList.add('selected');
            // Logic to 'pop up and add' would go here
            console.log('Line selected. Ready to add node.');

            setTimeout(() => {
                if (confirm('Add node at this connector?')) {
                    alert('Node Added! (Mock logic for prototype)');
                    el.classList.remove('selected');
                }
            }, 100);
        }

        function resetLine(e, el) {
            e.preventDefault();
            styles.forEach(s => el.classList.remove('style-' + s));
            el.classList.remove('selected');
            el.dataset.style = 'ghost';
            console.log('Line reset to ghost.');
        }
    </script>
</body>

</html>
