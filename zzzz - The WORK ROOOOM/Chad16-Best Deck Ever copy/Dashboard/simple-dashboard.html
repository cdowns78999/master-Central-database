<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Dashboard | Workstation Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --bg: #010c1a;
            --primary: #4cc9f0;
            --accent: #4361ee;
            --group: #ff5d8f;
            --aws: #ffcc00;
            --text: #fff;
            --text-dim: rgba(255, 255, 255, 0.5);
            --radius: 12px;
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #003049 0%, transparent 70%),
                radial-gradient(circle at 0% 100%, #1a2a6c 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, #001219 0%, transparent 50%);
            min-height: 100vh;
            font-family: 'Outfit', sans-serif;
            color: var(--text);
            padding: 2rem;
            position: relative;
            overflow-x: hidden;
        }

        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
            z-index: 10;
            position: relative;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.05em;
        }

        .mapper-container {
            width: 100%;
            z-index: 10;
            position: relative;
        }

        .mapper-grid {
            display: grid;
            grid-template-columns: repeat(20, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 1800px;
            margin: 0 auto;
        }

        .grid-column {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .p-btn {
            width: 100%;
            aspect-ratio: 1 / 1;
            padding: 8px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(25px);
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            border-radius: var(--radius);
            color: #fff;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
        }

        .p-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: #fff;
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 0 20px var(--primary), inset 0 0 10px var(--primary);
        }

        .p-btn .dot {
            width: 6px;
            height: 6px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--primary);
            flex-shrink: 0;
        }

        .btn-label {
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            text-align: center;
            line-height: 1.2;
            word-wrap: break-word;
            width: 100%;
        }

        .add-tile-btn {
            width: 100%;
            aspect-ratio: 1 / 1;
            border: 1px dashed rgba(255, 255, 255, 0.1);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            color: rgba(255, 255, 255, 0.2);
            font-size: 18px;
            background: transparent;
        }

        .add-tile-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(76, 201, 240, 0.05);
            transform: scale(1.02);
        }

        .btn-content.hidden {
            display: none;
        }
    </style>
</head>

    <script>
        function addNewTile(btn) {
            const column = btn.parentElement;
            const newTile = document.createElement('a');
            newTile.href = "#";
            newTile.className = 'p-btn';
            newTile.innerHTML = '<div class="dot"></div><span class="btn-label">New Tile</span>';
            column.insertBefore(newTile, btn);
        }

        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        const resize = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = Array.from({ length: 45 }, () => ({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                s: Math.random() * 2 + 1,
                vx: (Math.random() - 0.5) * 0.4,
                vy: (Math.random() - 0.5) * 0.4,
                o: Math.random() * 0.4 + 0.1
            }));
        };

        const animate = () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if (p.x < 0) p.x = canvas.width;
                if (p.x > canvas.width) p.x = 0;
                if (p.y < 0) p.y = canvas.height;
                if (p.y > canvas.height) p.y = 0;
                ctx.fillStyle = `rgba(76, 201, 240, ${p.o})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI * 2); ctx.fill();
            });
            requestAnimationFrame(animate);
        };

        window.onresize = resize;
        resize(); animate();
    </script>
