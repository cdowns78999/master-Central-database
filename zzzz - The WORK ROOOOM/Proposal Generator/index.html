<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proposal Generator | Universal Hub</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>Proposal Generator</h1>
        </header>

        <div class="input-section">
            <!-- Artist Detail Row -->
            <div class="main-inputs">
                <div class="input-group">
                    <label for="artistName">Artist Name</label>
                    <input type="text" id="artistName" placeholder="Enter artist name..." autocomplete="off">
                </div>
                <div class="input-group">
                    <label for="spotifyLink">Spotify Link</label>
                    <input type="text" id="spotifyLink" placeholder="Paste Spotify Artist, Album, or Track URL..."
                        autocomplete="off">
                </div>
            </div>

            <!-- Spotify Preview (Dynamic) -->
            <div id="artistPreview" class="artist-preview">
                <img id="previewImg" src="" alt="Artist" class="artist-img">
                <div class="artist-info">
                    <h3 id="previewTitle">Artist Name</h3>
                    <p id="previewSubtitle">Spotify Artist</p>
                </div>
            </div>

            <!-- 3-Column Proposal Layout -->
            <div class="proposal-grid">
                <div class="input-group">
                    <label for="field1">Strategy & Audience (Long)</label>
                    <textarea id="field1" placeholder="Describe the campaign strategy..."></textarea>
                </div>
                <div class="input-group">
                    <label for="field2">Timeline (Short)</label>
                    <textarea id="field2" placeholder="Campaign duration..."></textarea>
                </div>
                <div class="input-group">
                    <label for="field3">Budget & Priority (Short)</label>
                    <textarea id="field3" placeholder="Investment details..."></textarea>
                </div>
            </div>

            <!-- Auto-Suggestion Panel -->
            <div class="suggestion-panel">
                <h2 class="suggestion-title">Intelligent Suggestions</h2>
                <div id="suggestionChips" class="suggestion-chips">
                    <!-- Chips will be injected here via JS -->
                    <div class="chip" onclick="applySuggestion('Premium Press Campaign')">Premium Press</div>
                    <div class="chip" onclick="applySuggestion('Monthly Growth Plan')">Monthly Growth</div>
                    <div class="chip spotify" onclick="applySuggestion('20K Spotify Starter')">20K Spotify</div>
                </div>
            </div>

            <div class="actions">
                <button class="btn btn-secondary" onclick="clearForm()">Clear All</button>
                <button class="btn btn-primary" onclick="exportProposal()">Generate Proposal</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
