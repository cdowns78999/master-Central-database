<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sharon — Artists</title>
<style>
  :root{--bg:#f4f5f7;--pane:#fff;--line:#e1e4ea;--accent:#4a6da7;--ink:#1f2430;--muted:#6b7280;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--ink);font-size:13px;min-height:100vh;display:flex;flex-direction:column;}
  header{background:var(--pane);border-bottom:1px solid var(--line);padding:14px 20px;display:flex;align-items:baseline;gap:18px;}
  header a{color:var(--accent);text-decoration:none;font-size:12px;}
  header a:hover{text-decoration:underline;}
  header h1{font-size:22px;font-weight:600;letter-spacing:-.3px;}
  header .sub{color:var(--muted);font-size:12px;margin-left:auto;}
  main{flex:1;display:grid;grid-template-columns:1fr 240px;gap:18px;padding:20px;}
  .pane{background:var(--pane);border:1px solid var(--line);border-radius:6px;padding:18px;}
  .pane h2{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:14px;font-weight:600;}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
  .card{aspect-ratio:1.1;border:1.5px dashed #c4c9d2;border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;color:var(--muted);transition:all .15s;background:#fafbfc;}
  .card:hover{border-color:var(--accent);color:var(--accent);background:#f5f7fb;}
  .card .plus{font-size:26px;font-weight:200;line-height:1;}
  .card .lbl{font-size:11px;}
  .stat{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);font-size:12px;}
  .stat:last-child{border-bottom:0;}
  .stat .v{font-weight:600;color:var(--accent);}
  footer{background:var(--pane);border-top:1px solid var(--line);padding:8px 20px;font-size:11px;color:var(--muted);font-family:"SF Mono",Menlo,monospace;}
  dialog{border:0;border-radius:8px;padding:0;width:88vw;height:88vh;max-width:1100px;background:var(--pane);box-shadow:0 30px 80px rgba(0,0,0,.3);}
  dialog::backdrop{background:rgba(31,36,48,.6);}
  .dlg-head{padding:18px 24px;border-bottom:1px solid var(--line);display:flex;align-items:center;}
  .dlg-head h3{font-size:18px;font-weight:600;}
  .x{margin-left:auto;width:28px;height:28px;border-radius:50%;background:var(--ink);color:#fff;border:0;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
  .dlg-body{padding:24px;display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:5px;}
  .field input{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:4px;font-size:13px;font-family:inherit;background:#fafbfc;}
</style>
</head>
<body>
<header>
  <a href="../index.html">&larr; Sharon</a>
  <h1>Artists</h1>
  <span class="sub">Roster tiles &middot; drill into everything</span>
</header>
<main>
  <section class="pane">
    <h2>Roster</h2>
    <div class="grid">
      <div class="card" onclick="document.getElementById('d').showModal()"><span class="plus">+</span><span class="lbl">Add new artist</span></div>
      <div class="card" onclick="document.getElementById('d').showModal()"><span class="plus">+</span><span class="lbl">Add new artist</span></div>
      <div class="card" onclick="document.getElementById('d').showModal()"><span class="plus">+</span><span class="lbl">Add new artist</span></div>
    </div>
  </section>
  <aside class="pane">
    <h2>Quick stats</h2>
    <div class="stat"><span>Total</span><span class="v">0</span></div>
    <div class="stat"><span>This week</span><span class="v">0</span></div>
    <div class="stat"><span>Active</span><span class="v">0</span></div>
  </aside>
</main>
<footer>Artists &middot; v0.1 &middot; empty</footer>
<dialog id="d">
  <div class="dlg-head">
    <h3>New artist</h3>
    <button class="x" onclick="document.getElementById('d').close()">&times;</button>
  </div>
  <div class="dlg-body">
    <div class="field"><label>Name</label><input placeholder="Artist name"></div>
    <div class="field"><label>Roster status</label><input placeholder="Signed / Dev / Inactive"></div>
    <div class="field"><label>Genre</label><input placeholder="Indie / Pop / Hip-hop"></div>
    <div class="field"><label>Manager</label><input placeholder="Manager name"></div>
    <div class="field"><label>Releases count</label><input type="number" placeholder="0"></div>
  </div>
</dialog>
</body>
</html>
