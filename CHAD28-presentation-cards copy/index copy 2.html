<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentation Cards</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&family=Space+Grotesk:wght@300;500;700&family=Bebas+Neue&family=Outfit:wght@200;400;700&family=Playfair+Display:wght@700;900&family=Monoton&family=Righteous&family=Audiowide&family=Press+Start+2P&family=Fredoka+One&family=Bungee&family=Permanent+Marker&family=Staatliches&family=Rubik+Mono+One&family=Ultra&family=Alfa+Slab+One&family=Faster+One&family=Bangers&family=Cinzel:wght@700;900&family=Lobster&family=Pacifico&family=Anton&family=Titan+One&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #a855f7;
            --secondary: #ec4899;
            --accent: #8b5cf6;
            --tertiary: #d946ef;
            --glow-1: rgba(168, 85, 247, 0.5);
            --glow-2: rgba(236, 72, 153, 0.4);
            --glow-3: rgba(217, 70, 239, 0.3);
            --bg-1: #1a0a2e;
            --bg-2: #16213e;
            --bg-3: #0f0f23;
            --card-border: 6px;
            --card-scale: 1;
            --card-spacing: 40px;
            --glow-intensity: 1;
            --animation-speed: 1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 25%, var(--bg-3) 50%, var(--bg-1) 75%, var(--bg-2) 100%);
            background-size: 400% 400%;
            animation: gradientShift calc(15s / var(--animation-speed)) ease infinite;
            font-family: 'Outfit', sans-serif;
            padding: 20px;
            padding-top: 110px;
            overflow-x: hidden;
        }

        body.clean-mode .control-panel {
            display: none !important;
        }

        body.clean-mode {
            padding-top: 20px;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* ============================================
           CONTROL PANEL - Global Settings
           ============================================ */
        .control-panel {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            padding: 8px 15px;
            z-index: 1000;
            border-bottom: 2px solid var(--primary);
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }

        .ctrl-group {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 10px;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        .ctrl-group:last-child {
            border-right: none;
        }

        .ctrl-group label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .theme-btn {
            padding: 5px 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.8);
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.6rem;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .theme-btn:hover,
        .theme-btn.active {
            background: var(--primary);
            border-color: var(--primary);
        }

        .mini-slider {
            width: 50px;
            -webkit-appearance: none;
            height: 3px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.2);
        }

        .mini-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
        }

        .fx-btn {
            padding: 4px 8px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.6);
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.55rem;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .fx-btn:hover {
            border-color: var(--primary);
            color: white;
        }

        .fx-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        /* ============================================
           MAIN CONTENT AREA
           ============================================ */
        .content-area {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: var(--card-spacing);
        }

        /* ============================================
           TITLE SYSTEM
           ============================================ */
        .title-wrapper {
            position: relative;
            text-align: center;
        }

        .title-text {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 4rem;
            color: white;
            text-transform: uppercase;
            letter-spacing: 8px;
            padding: 20px;
            outline: none;
            min-height: 80px;
            text-shadow:
                0 0 10px var(--primary),
                0 0 20px var(--primary),
                0 0 40px var(--secondary),
                0 0 80px var(--secondary);
            animation: textPulse calc(3s / var(--animation-speed)) ease-in-out infinite;
            transition: all 0.3s;
        }

        .title-text:empty::before {
            content: 'Click to add title...';
            opacity: 0.3;
        }

        .title-text:focus {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
        }

        /* Title style variations */
        .title-wrapper.style-2 .title-text {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 3rem;
            background: linear-gradient(180deg, white 0%, var(--primary) 50%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
            filter: drop-shadow(0 0 30px var(--primary));
        }

        .title-wrapper.style-3 .title-text {
            font-family: 'Outfit', sans-serif;
            font-weight: 200;
            letter-spacing: 20px;
            font-size: 2.5rem;
            border-top: 2px solid var(--primary);
            border-bottom: 2px solid var(--secondary);
            padding: 25px 40px;
            display: inline-block;
            text-shadow: 0 0 30px var(--glow-1);
        }

        .title-wrapper.style-4 .title-text {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 3.5rem;
            -webkit-text-stroke: 2px var(--primary);
            color: transparent;
            text-shadow: none;
        }

        @keyframes textPulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.9;
            }
        }

        /* Title Edit Controls - appear when editing */
        .title-controls {
            display: none;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            margin-top: 15px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 12px;
            animation: fadeIn 0.2s ease;
        }

        .title-wrapper.editing .title-controls {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .title-controls .ctrl-btn {
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: all 0.2s;
        }

        .title-controls .ctrl-btn:hover {
            background: var(--primary);
            border-color: var(--primary);
        }

        .title-controls .ctrl-btn.active {
            background: var(--primary);
            border-color: var(--primary);
        }

        .font-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 5px;
            width: 100%;
            padding-top: 10px;
            margin-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .font-btn {
            padding: 6px 10px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.2s;
        }

        .font-btn:hover {
            background: var(--primary);
            transform: translateY(-2px);
        }

        .font-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            box-shadow: 0 0 15px var(--glow-1);
        }

        /* Edit button - shows when NOT editing */
        .edit-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 30px;
            height: 30px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .edit-btn:hover {
            background: var(--primary);
            color: white;
            transform: scale(1.1);
        }

        .title-wrapper.editing .edit-btn {
            display: none;
        }

        /* Hint text */
        .hint-text {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.7rem;
            margin-top: 8px;
        }

        .title-wrapper:not(.editing) .hint-text {
            display: none;
        }

        /* Font classes */
        .font-bebas {
            font-family: 'Bebas Neue', sans-serif !important;
        }

        .font-orbitron {
            font-family: 'Orbitron', sans-serif !important;
        }

        .font-rajdhani {
            font-family: 'Rajdhani', sans-serif !important;
        }

        .font-space {
            font-family: 'Space Grotesk', sans-serif !important;
        }

        .font-outfit {
            font-family: 'Outfit', sans-serif !important;
        }

        .font-playfair {
            font-family: 'Playfair Display', serif !important;
        }

        .font-monoton {
            font-family: 'Monoton', cursive !important;
            font-size: 3rem !important;
        }

        .font-righteous {
            font-family: 'Righteous', cursive !important;
        }

        .font-audiowide {
            font-family: 'Audiowide', cursive !important;
        }

        .font-press {
            font-family: 'Press Start 2P', cursive !important;
            font-size: 1.8rem !important;
        }

        .font-fredoka {
            font-family: 'Fredoka One', cursive !important;
        }

        .font-bungee {
            font-family: 'Bungee', cursive !important;
        }

        .font-marker {
            font-family: 'Permanent Marker', cursive !important;
        }

        .font-staatliches {
            font-family: 'Staatliches', cursive !important;
        }

        .font-rubik {
            font-family: 'Rubik Mono One', sans-serif !important;
            font-size: 2.5rem !important;
        }

        .font-ultra {
            font-family: 'Ultra', serif !important;
        }

        .font-alfa {
            font-family: 'Alfa Slab One', cursive !important;
        }

        .font-faster {
            font-family: 'Faster One', cursive !important;
        }

        .font-bangers {
            font-family: 'Bangers', cursive !important;
        }

        .font-cinzel {
            font-family: 'Cinzel', serif !important;
        }

        .font-lobster {
            font-family: 'Lobster', cursive !important;
        }

        .font-pacifico {
            font-family: 'Pacifico', cursive !important;
        }

        .font-anton {
            font-family: 'Anton', sans-serif !important;
        }

        .font-titan {
            font-family: 'Titan One', cursive !important;
        }

        /* ============================================
           DROP ZONE
           ============================================ */
        .drop-zone {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.02);
        }

        .drop-zone:hover,
        .drop-zone.drag-over {
            border-color: var(--primary);
            background: rgba(168, 85, 247, 0.1);
            box-shadow: 0 0 30px var(--glow-1);
        }

        .drop-zone p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
        }

        .drop-zone .icon {
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 10px;
        }

        /* ============================================
           CARDS
           ============================================ */
        .card {
            background: rgba(255, 255, 255, 0.02);
            border: var(--card-border) solid white;
            border-radius: 16px;
            padding: 15px;
            position: relative;
            transform: scale(var(--card-scale));
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow:
                0 0 calc(20px * var(--glow-intensity)) var(--glow-1),
                0 0 calc(40px * var(--glow-intensity)) var(--glow-2);
        }

        .card:hover {
            transform: scale(calc(var(--card-scale) * 1.01)) translateY(-5px);
            box-shadow:
                0 0 calc(30px * var(--glow-intensity)) var(--glow-1),
                0 0 calc(60px * var(--glow-intensity)) var(--glow-2);
        }

        .card::before {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 19px;
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--tertiary), var(--primary));
            background-size: 400% 400%;
            animation: borderGlow calc(6s / var(--animation-speed)) ease infinite;
            z-index: -1;
            opacity: calc(0.7 * var(--glow-intensity));
        }

        @keyframes borderGlow {

            0%,
            100% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }
        }

        .image-container {
            width: 100%;
            aspect-ratio: 16/9;
            overflow: hidden;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
        }

        .image-container:active {
            cursor: grabbing;
        }

        .image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: transform 0.1s ease-out;
            pointer-events: none;
        }

        /* Card Controls */
        .card-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            padding: 8px 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
        }

        .card-controls span {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.7rem;
        }

        .card-controls input[type="range"] {
            flex: 1;
            -webkit-appearance: none;
            height: 4px;
            border-radius: 2px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }

        .card-controls input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            box-shadow: 0 0 10px var(--primary);
        }

        .card-btn {
            padding: 5px 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: all 0.2s;
        }

        .card-btn:hover {
            background: var(--primary);
            border-color: var(--primary);
        }

        .card-btn.delete:hover {
            background: #ef4444;
            border-color: #ef4444;
        }

        /* ============================================
           THEMES
           ============================================ */

        /* ============================================
           EFFECTS
           ============================================ */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: var(--primary);
            animation: floatUp linear infinite;
            opacity: 0;
            box-shadow: 0 0 10px var(--primary);
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh);
                opacity: 0;
            }

            10% {
                opacity: 0.7;
            }

            90% {
                opacity: 0.7;
            }

            100% {
                transform: translateY(-100vh);
                opacity: 0;
            }
        }

        .scanlines {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9998;
            background: repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.1) 0px, rgba(0, 0, 0, 0.1) 1px, transparent 1px, transparent 3px);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .scanlines.active {
            opacity: 1;
        }

        .vignette {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 2;
            box-shadow: inset 0 0 150px rgba(0, 0, 0, 0.8);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .vignette.active {
            opacity: 1;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            border: 1px solid var(--primary);
            font-size: 0.85rem;
            z-index: 10000;
            transition: transform 0.3s;
            box-shadow: 0 0 20px var(--glow-1);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Slideshow */
        body.slideshow-mode .content-area>*:not(.slideshow-active) {
            display: none !important;
        }

        body.slideshow-mode .drop-zone {
            display: none !important;
        }

        .slideshow-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            gap: 10px;
            background: rgba(0, 0, 0, 0.9);
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid var(--primary);
            z-index: 1000;
        }

        body.slideshow-mode .slideshow-nav {
            display: flex;
        }

        .slideshow-nav button {
            padding: 8px 15px;
            background: transparent;
            border: 1px solid var(--primary);
            color: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.2s;
        }

        .slideshow-nav button:hover {
            background: var(--primary);
        }

        .slideshow-nav span {
            color: white;
            display: flex;
            align-items: center;
            padding: 0 10px;
        }
    </style>
</head>

<body>
    <!-- Effects -->
    <div class="particles" id="particles"></div>
    <div class="scanlines" id="scanlines"></div>
    <div class="vignette" id="vignette"></div>

    <!-- Control Panel -->
    <div class="control-panel">
        <div class="ctrl-group">
            <label>Theme</label>
            <button class="theme-btn active" data-theme="">Purple</button>
            <button class="theme-btn" data-theme="theme-cyber">Cyber</button>
            <button class="theme-btn" data-theme="theme-aurora">Aurora</button>
            <button class="theme-btn" data-theme="theme-sunset">Sunset</button>
            <button class="theme-btn" data-theme="theme-ocean">Ocean</button>
            <button class="theme-btn" data-theme="theme-matrix">Matrix</button>
            <button class="theme-btn" data-theme="theme-gold">Gold</button>
            <button class="theme-btn" data-theme="theme-vapor">Vapor</button>
            <button class="theme-btn" data-theme="theme-blood">Blood</button>
            <button class="theme-btn" data-theme="theme-mono">Mono</button>
            <button class="theme-btn" data-theme="theme-holo">Holo</button>
            <button class="theme-btn" data-theme="theme-noir">Noir</button>
            <button class="theme-btn" data-theme="theme-cosmic">Cosmic</button>
            <button class="theme-btn" data-theme="theme-mint">Mint</button>
            <button class="theme-btn" data-theme="theme-rose">Rose</button>
            <button class="theme-btn" data-theme="theme-electric">Electric</button>
            <button class="theme-btn" data-theme="theme-fire">Fire</button>
        </div>

        <div class="ctrl-group">
            <label>Scale</label>
            <input type="range" class="mini-slider" id="scaleSlider" min="0.7" max="1.2" step="0.02" value="1">
        </div>

        <div class="ctrl-group">
            <label>Glow</label>
            <input type="range" class="mini-slider" id="glowSlider" min="0" max="2" step="0.1" value="1">
        </div>

        <div class="ctrl-group">
            <label>Border</label>
            <input type="range" class="mini-slider" id="borderSlider" min="2" max="15" step="1" value="6">
        </div>

        <div class="ctrl-group">
            <label>Gap</label>
            <input type="range" class="mini-slider" id="gapSlider" min="20" max="80" step="5" value="40">
        </div>

        <div class="ctrl-group">
            <label>Speed</label>
            <input type="range" class="mini-slider" id="speedSlider" min="0.3" max="2" step="0.1" value="1">
        </div>

        <div class="ctrl-group">
            <button class="fx-btn" id="particleBtn">Particles</button>
            <button class="fx-btn" id="scanlineBtn">Scanlines</button>
            <button class="fx-btn" id="vignetteBtn">Vignette</button>
            <button class="fx-btn" id="cleanBtn">Clean [C]</button>
            <button class="fx-btn" id="slideBtn">Slideshow [S]</button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="content-area" id="contentArea">

        <!-- Title Section -->
        <div class="title-wrapper" id="titleWrapper">
            <button class="edit-btn" id="editTitleBtn">✎</button>
            <div class="title-text font-bebas" contenteditable="true" id="titleText"></div>
            <div class="title-controls" id="titleControls">
                <button class="ctrl-btn" data-style="1">Neon</button>
                <button class="ctrl-btn" data-style="2">Gradient</button>
                <button class="ctrl-btn" data-style="3">Minimal</button>
                <button class="ctrl-btn" data-style="4">Outline</button>
                <span style="color:rgba(255,255,255,0.2)">|</span>
                <button class="ctrl-btn" data-action="bigger">A+</button>
                <button class="ctrl-btn" data-action="smaller">A-</button>
                <button class="ctrl-btn" data-action="upper">ABC</button>
                <button class="ctrl-btn" data-action="lower">abc</button>
                <div class="font-row" id="fontRow"></div>
            </div>
            <div class="hint-text">Press ENTER when done</div>
        </div>

        <!-- Drop Zone -->
        <div class="drop-zone" id="dropZone">
            <div class="icon">+</div>
            <p>Drop screenshots here or click to upload</p>
            <input type="file" id="fileInput" multiple accept="image/*" style="display:none">
        </div>

    </div>

    <!-- Slideshow Nav -->
    <div class="slideshow-nav">
        <button id="prevSlide">◀ Prev</button>
        <span><span id="slideNum">1</span> / <span id="slideTotal">1</span></span>
        <button id="nextSlide">Next ▶</button>
        <button id="exitSlide">Exit</button>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // Elements
        const contentArea = document.getElementById('contentArea');
        const titleWrapper = document.getElementById('titleWrapper');
        const titleText = document.getElementById('titleText');
        const titleControls = document.getElementById('titleControls');
        const editTitleBtn = document.getElementById('editTitleBtn');
        const fontRow = document.getElementById('fontRow');
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const toast = document.getElementById('toast');
        const particles = document.getElementById('particles');
        const scanlines = document.getElementById('scanlines');
        const vignette = document.getElementById('vignette');

        // Font options
        const fonts = [
            { name: 'Bebas', cls: 'font-bebas', family: "'Bebas Neue'" },
            { name: 'Orbitron', cls: 'font-orbitron', family: "'Orbitron'" },
            { name: 'Anton', cls: 'font-anton', family: "'Anton'" },
            { name: 'Bungee', cls: 'font-bungee', family: "'Bungee'" },
            { name: 'Bangers', cls: 'font-bangers', family: "'Bangers'" },
            { name: 'Audiowide', cls: 'font-audiowide', family: "'Audiowide'" },
            { name: 'Staatliches', cls: 'font-staatliches', family: "'Staatliches'" },
            { name: 'Righteous', cls: 'font-righteous', family: "'Righteous'" },
            { name: 'Fredoka', cls: 'font-fredoka', family: "'Fredoka One'" },
            { name: 'Titan', cls: 'font-titan', family: "'Titan One'" },
            { name: 'Alfa', cls: 'font-alfa', family: "'Alfa Slab One'" },
            { name: 'Ultra', cls: 'font-ultra', family: "'Ultra'" },
            { name: 'Faster', cls: 'font-faster', family: "'Faster One'" },
            { name: 'Monoton', cls: 'font-monoton', family: "'Monoton'" },
            { name: 'Cinzel', cls: 'font-cinzel', family: "'Cinzel'" },
            { name: 'Playfair', cls: 'font-playfair', family: "'Playfair Display'" },
            { name: 'Lobster', cls: 'font-lobster', family: "'Lobster'" },
            { name: 'Pacifico', cls: 'font-pacifico', family: "'Pacifico'" },
            { name: 'Marker', cls: 'font-marker', family: "'Permanent Marker'" },
            { name: 'Pixel', cls: 'font-press', family: "'Press Start 2P'" },
            { name: 'Space', cls: 'font-space', family: "'Space Grotesk'" },
            { name: 'Outfit', cls: 'font-outfit', family: "'Outfit'" },
            { name: 'Rajdhani', cls: 'font-rajdhani', family: "'Rajdhani'" },
            { name: 'Rubik', cls: 'font-rubik', family: "'Rubik Mono One'" }
        ];

        // Build font buttons
        fonts.forEach((f, i) => {
            const btn = document.createElement('button');
            btn.className = 'font-btn' + (i === 0 ? ' active' : '');
            btn.dataset.font = f.cls;
            btn.style.fontFamily = f.family;
            btn.textContent = f.name;
            fontRow.appendChild(btn);
        });

        // ===== TITLE SYSTEM =====
        titleText.addEventListener('focus', () => {
            titleWrapper.classList.add('editing');
        });

        titleText.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                lockTitle();
            }
        });

        editTitleBtn.addEventListener('click', () => {
            titleWrapper.classList.add('editing');
            titleText.focus();
        });

        function lockTitle() {
            titleWrapper.classList.remove('editing');
            titleText.blur();
            if (titleText.textContent.trim()) {
                showToast('Title set!');
            }
        }

        // Style buttons
        titleControls.querySelectorAll('[data-style]').forEach(btn => {
            btn.addEventListener('click', () => {
                titleControls.querySelectorAll('[data-style]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                titleWrapper.className = 'title-wrapper editing';
                if (btn.dataset.style !== '1') {
                    titleWrapper.classList.add('style-' + btn.dataset.style);
                }
            });
        });

        // Action buttons
        titleControls.querySelectorAll('[data-action]').forEach(btn => {
            btn.addEventListener('click', () => {
                const action = btn.dataset.action;
                if (action === 'bigger') {
                    const size = parseFloat(getComputedStyle(titleText).fontSize);
                    titleText.style.fontSize = (size * 1.15) + 'px';
                } else if (action === 'smaller') {
                    const size = parseFloat(getComputedStyle(titleText).fontSize);
                    titleText.style.fontSize = (size * 0.85) + 'px';
                } else if (action === 'upper') {
                    titleText.style.textTransform = 'uppercase';
                } else if (action === 'lower') {
                    titleText.style.textTransform = 'none';
                }
            });
        });

        // Font buttons
        fontRow.addEventListener('click', (e) => {
            if (e.target.classList.contains('font-btn')) {
                fontRow.querySelectorAll('.font-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                fonts.forEach(f => titleText.classList.remove(f.cls));
                titleText.classList.add(e.target.dataset.font);
            }
        });

        // ===== CARDS =====
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
        dropZone.addEventListener('drop', (e) => { e.preventDefault(); dropZone.classList.remove('drag-over'); handleFiles(e.dataTransfer.files); });
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

        function handleFiles(files) {
            Array.from(files).forEach(file => {
                if (file.type.startsWith('image/')) createCard(file);
            });
        }

        function createCard(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="image-container" data-zoom="1" data-px="0" data-py="0">
                        <img src="${e.target.result}" draggable="false">
                    </div>
                    <div class="card-controls">
                        <span>Zoom</span>
                        <input type="range" class="zoom-range" min="1" max="4" step="0.1" value="1">
                        <span class="zoom-val">100%</span>
                        <button class="card-btn" data-act="up">▲</button>
                        <button class="card-btn" data-act="down">▼</button>
                        <button class="card-btn" data-act="reset">Reset</button>
                        <button class="card-btn delete" data-act="delete">✕</button>
                    </div>
                `;
                contentArea.appendChild(card);
                setupCard(card);
                updateSlideCount();
            };
            reader.readAsDataURL(file);
        }

        function setupCard(card) {
            const container = card.querySelector('.image-container');
            const img = container.querySelector('img');
            const range = card.querySelector('.zoom-range');
            const zoomVal = card.querySelector('.zoom-val');

            let dragging = false, startX, startY, startPX, startPY;

            range.addEventListener('input', () => {
                container.dataset.zoom = range.value;
                zoomVal.textContent = Math.round(range.value * 100) + '%';
                updateTransform();
            });

            container.addEventListener('mousedown', (e) => {
                if (parseFloat(container.dataset.zoom) > 1) {
                    dragging = true;
                    startX = e.clientX; startY = e.clientY;
                    startPX = parseFloat(container.dataset.px);
                    startPY = parseFloat(container.dataset.py);
                }
            });

            document.addEventListener('mousemove', (e) => {
                if (dragging) {
                    const z = parseFloat(container.dataset.zoom);
                    container.dataset.px = startPX + (e.clientX - startX) / z;
                    container.dataset.py = startPY + (e.clientY - startY) / z;
                    updateTransform();
                }
            });

            document.addEventListener('mouseup', () => dragging = false);

            container.addEventListener('wheel', (e) => {
                e.preventDefault();
                let z = parseFloat(container.dataset.zoom) + (e.deltaY > 0 ? -0.2 : 0.2);
                z = Math.max(1, Math.min(4, z));
                container.dataset.zoom = z;
                range.value = z;
                zoomVal.textContent = Math.round(z * 100) + '%';
                updateTransform();
            });

            function updateTransform() {
                const z = container.dataset.zoom, px = container.dataset.px, py = container.dataset.py;
                img.style.transform = `scale(${z}) translate(${px}px, ${py}px)`;
            }

            card.querySelectorAll('.card-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const act = btn.dataset.act;
                    if (act === 'up') {
                        const prev = card.previousElementSibling;
                        if (prev && !prev.classList.contains('title-wrapper') && !prev.classList.contains('drop-zone')) {
                            contentArea.insertBefore(card, prev);
                        }
                    } else if (act === 'down') {
                        const next = card.nextElementSibling;
                        if (next) contentArea.insertBefore(next, card);
                    } else if (act === 'reset') {
                        container.dataset.zoom = 1; container.dataset.px = 0; container.dataset.py = 0;
                        range.value = 1; zoomVal.textContent = '100%';
                        updateTransform();
                    } else if (act === 'delete') {
                        card.style.opacity = '0'; card.style.transform = 'scale(0.9)';
                        setTimeout(() => { card.remove(); updateSlideCount(); }, 200);
                    }
                });
            });
        }

        // ===== GLOBAL CONTROLS =====
        document.querySelectorAll('.theme-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.body.className = btn.dataset.theme || '';
                if (document.body.dataset.clean === 'true') document.body.classList.add('clean-mode');
                if (document.body.dataset.slide === 'true') document.body.classList.add('slideshow-mode');
            });
        });

        document.getElementById('scaleSlider').addEventListener('input', (e) => {
            document.documentElement.style.setProperty('--card-scale', e.target.value);
        });
        document.getElementById('glowSlider').addEventListener('input', (e) => {
            document.documentElement.style.setProperty('--glow-intensity', e.target.value);
        });
        document.getElementById('borderSlider').addEventListener('input', (e) => {
            document.documentElement.style.setProperty('--card-border', e.target.value + 'px');
        });
        document.getElementById('gapSlider').addEventListener('input', (e) => {
            document.documentElement.style.setProperty('--card-spacing', e.target.value + 'px');
        });
        document.getElementById('speedSlider').addEventListener('input', (e) => {
            document.documentElement.style.setProperty('--animation-speed', e.target.value);
        });

        document.getElementById('particleBtn').addEventListener('click', function () {
            this.classList.toggle('active');
            if (this.classList.contains('active')) {
                for (let i = 0; i < 30; i++) {
                    const p = document.createElement('div');
                    p.className = 'particle';
                    p.style.left = Math.random() * 100 + '%';
                    p.style.width = p.style.height = (Math.random() * 5 + 2) + 'px';
                    p.style.animationDuration = (Math.random() * 12 + 8) + 's';
                    p.style.animationDelay = Math.random() * 10 + 's';
                    particles.appendChild(p);
                }
            } else {
                particles.innerHTML = '';
            }
        });

        document.getElementById('scanlineBtn').addEventListener('click', function () {
            this.classList.toggle('active');
            scanlines.classList.toggle('active');
        });

        document.getElementById('vignetteBtn').addEventListener('click', function () {
            this.classList.toggle('active');
            vignette.classList.toggle('active');
        });

        document.getElementById('cleanBtn').addEventListener('click', function () {
            this.classList.toggle('active');
            document.body.classList.toggle('clean-mode');
            document.body.dataset.clean = document.body.classList.contains('clean-mode');
        });

        // ===== SLIDESHOW =====
        let slideIndex = 0;
        function getSlides() {
            return Array.from(contentArea.querySelectorAll('.title-wrapper, .card')).filter(el =>
                el.classList.contains('card') || (el.classList.contains('title-wrapper') && titleText.textContent.trim())
            );
        }

        function updateSlideCount() {
            document.getElementById('slideTotal').textContent = getSlides().length || 1;
        }

        document.getElementById('slideBtn').addEventListener('click', startSlideshow);

        function startSlideshow() {
            const slides = getSlides();
            if (slides.length === 0) { showToast('Add content first!'); return; }
            document.body.classList.add('slideshow-mode');
            document.body.dataset.slide = 'true';
            slideIndex = 0;
            showSlide(0);
        }

        function showSlide(i) {
            const slides = getSlides();
            slides.forEach(s => s.classList.remove('slideshow-active'));
            if (slides[i]) {
                slides[i].classList.add('slideshow-active');
                slideIndex = i;
                document.getElementById('slideNum').textContent = i + 1;
                document.getElementById('slideTotal').textContent = slides.length;
            }
        }

        document.getElementById('prevSlide').addEventListener('click', () => {
            const slides = getSlides();
            showSlide((slideIndex - 1 + slides.length) % slides.length);
        });

        document.getElementById('nextSlide').addEventListener('click', () => {
            const slides = getSlides();
            showSlide((slideIndex + 1) % slides.length);
        });

        document.getElementById('exitSlide').addEventListener('click', () => {
            document.body.classList.remove('slideshow-mode');
            document.body.dataset.slide = 'false';
            getSlides().forEach(s => s.classList.remove('slideshow-active'));
        });

        // ===== KEYBOARD =====
        document.addEventListener('keydown', (e) => {
            if (e.target.isContentEditable) return;
            if (e.key === 'c' || e.key === 'C') document.getElementById('cleanBtn').click();
            if (e.key === 's' || e.key === 'S') {
                if (document.body.classList.contains('slideshow-mode')) document.getElementById('exitSlide').click();
                else startSlideshow();
            }
            if (e.key === 'ArrowLeft' && document.body.classList.contains('slideshow-mode')) document.getElementById('prevSlide').click();
            if (e.key === 'ArrowRight' && document.body.classList.contains('slideshow-mode')) document.getElementById('nextSlide').click();
            if (e.key === 'Escape' && document.body.classList.contains('slideshow-mode')) document.getElementById('exitSlide').click();
        });

        // ===== TOAST =====
        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // Init
        updateSlideCount();
    </script>
</body>

</html>
