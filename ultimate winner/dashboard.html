        // Removed localStorage loading logic

        // JSON Export
        function downloadJSON() {
            const data = {
                theme: document.body.classList.contains('light-mode') ? 'light' : 'dark',
                artist: artistState,
                campaigns: campaignsData,
                platformStages: platformStages,
                timestamp: new Date().toISOString()
            };

            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `campaign-dashboard-${Date.now()}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // JSON Import
        function uploadJSON(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);

                    // Restore theme
                    if (data.theme) {
                        if (data.theme === 'light') {
                            document.body.classList.add('light-mode');
                            document.getElementById('themeIconDark').style.display = 'none';
                            document.getElementById('themeIconLight').style.display = 'block';
                        } else {
                            document.body.classList.remove('light-mode');
                            document.getElementById('themeIconDark').style.display = 'block';
                            document.getElementById('themeIconLight').style.display = 'none';
                        }
                        updateParticleColors();
                    }

                    // Restore artist
                    if (data.artist) {
                        artistState.name = data.artist.name;
                        artistState.image = data.artist.image;
                        if (artistState.name) {
                            document.getElementById('spotifyUrl').value = '';
                            updateArtistDisplay();
                        }
                    }

                    // Restore campaigns - DEEP CLEAN
                    if (data.campaigns) {
                        document.getElementById('masterCampaignsGrid').innerHTML = '';
                        document.getElementById('spotifyQuickGlance').innerHTML = '';
                        document.getElementById('soundcloudQuickGlance').innerHTML = '';
                        document.getElementById('pressQuickGlance').innerHTML = '';

                        campaignsData = [];
                        totalCampaigns = 0;
                        selectedCampaignId = null;
                        document.getElementById('masterStageContainer').classList.remove('selection-active');

                        data.campaigns.forEach(campaign => {
                            restoreCampaign(campaign);
                        });
                    }

                    // Restore platform stages
                    if (data.platformStages) {
                        Object.keys(data.platformStages).forEach(platform => {
                            setPlatformStage(platform, data.platformStages[platform]);
                        });
                    }

                    alert('Dashboard data imported successfully!');
                } catch (error) {
                    alert('Error importing data. Please check the file format.');
                    console.error(error);
                }
            };
            reader.readAsText(file);
        }

        // Abbreviate campaign names for registry: "Spotify Playlisting Campaign (Third Party) - 25K" → "25K Spotify"
        function shortCampaign(name, platform) {
            const sizeMatch = name.match(/(\d+K?)\s*$/i) || name.match(/-\s*(\d+K)/i);
            const artMatch = name.match(/-\s*(\d+[\u2013\-]?\d*)\s*Articles?/i);
            const platLabel = { spotify: 'Spotify', soundcloud: 'SoundCloud', press: 'Press' }[platform] || platform;
            if (sizeMatch) return sizeMatch[1] + ' ' + platLabel;
            if (artMatch) return artMatch[1] + ' Articles ' + platLabel;
            return name.split(' - ')[0].replace(/Campaign|Release|\(.*?\)/g, '').trim() || name;
        }

        function restoreCampaign(campaign) {
            const masterGrid = document.getElementById('masterCampaignsGrid');
            const campaignId = campaign.id || (Date.now() + Math.random());
            totalCampaigns++;

            const platformColors = {
                spotify: { bg: '#1DB954', name: 'Spotify' },
                soundcloud: { bg: '#FF5500', name: 'SoundCloud' },
                press: { bg: '#fafafa', name: 'Press' }
            };

            const color = platformColors[campaign.platform];

            // Add to master grid
            const row = document.createElement('div');
            row.className = 'campaign-row ' + (campaign.tags.length > 0 ? 'row-tagged' : 'row-safe');
            row.id = `campaign-${campaignId}`;

            row.innerHTML = `
                <div class="w-1.5 h-10 rounded-full flex-shrink-0" style="background: ${color.bg}; box-shadow: 0 0 10px ${color.bg}44;"></div>
                <div class="campaign-info">
                    <div class="campaign-song-name">${campaign.songName}</div>
                    <div class="campaign-type">${color.name} · ${campaign.campaignName}${campaign.amount ? ` - ${campaign.amount}` : ''}</div>
                </div>
                <div class="campaign-tags" id="tags-${campaignId}">
                    <div class="tag-add-btn" onclick="event.stopPropagation(); startAddTag(${campaignId})">+</div>
                </div>
                <div class="campaign-stage-indicator">
                    <div class="mini-dot inactive"></div>
                    <div class="mini-dot"></div>
                    <div class="mini-dot"></div>
                    <div class="mini-dot"></div>
                    <div class="mini-dot"></div>
                </div>
                <div class="campaign-delete ml-2" onclick="event.stopPropagation(); deleteCampaign(${campaignId})">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </div>
            `;

            // Add double-click to advance stage
            row.addEventListener('dblclick', () => {
                const camp = campaignsData.find(c => c.id === campaignId);
                if (!camp) return;

                const nextStage = (camp.stage + 1) % 5;
                setCampaignStage(campaignId, nextStage);
                updateCampaignCardIndicator(campaignId);

                row.style.transform = 'scale(1.02)';
                setTimeout(() => row.style.transform = '', 150);
            });

            masterGrid.appendChild(row);

            // Click to select
            row.addEventListener('click', (e) => {
                if (e.target.closest('.campaign-delete')) return;
                selectCampaign(campaignId);
            });

            // Add to quick-glance section
            const quickGlance = document.getElementById(`${campaign.platform}QuickGlance`);
            if (quickGlance) {
                const quickRow = document.createElement('div');
                quickRow.className = 'quick-campaign-row';
                quickRow.id = `quick-${campaignId}`;
                const dateStr = campaign.dateAdded || new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                quickRow.innerHTML = `
                    <span class="quick-campaign-name">${campaign.songName}</span>
                    <span class="quick-campaign-type">${shortCampaign(campaign.campaignName, campaign.platform)}</span>
                    <span class="quick-campaign-date">${dateStr}</span>
                `;
                quickGlance.appendChild(quickRow);
            }

            campaignsData.push({ id: campaignId, ...campaign, tags: campaign.tags || [], acceptedAt: campaign.acceptedAt || null });

            // Render tags if any
            if (campaign.tags && campaign.tags.length > 0) {
                renderTagsForRow(campaignId);
            }

            // Restore stage
            if (campaign.stage) {
                setCampaignStage(campaignId, campaign.stage);
                updateCampaignCardIndicator(campaignId);
            }

            updateMasterCampaignCount();
        }

        // Enhanced Particle Background with Connections
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const connectionDistance = 100;
        const mouse = { x: null, y: null, radius: 100 };

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = Array.from({ length: 30 }, () => ({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 1.5 + 0.5,
                vx: (Math.random() - 0.5) * 0.15,
                vy: (Math.random() - 0.5) * 0.15,
                opacity: Math.random() * 0.15 + 0.1
            }));
        }

        function drawConnections() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < connectionDistance) {
                        const opacity = (1 - distance / connectionDistance) * 0.25;
                        const particleColor = getComputedStyle(document.documentElement).getPropertyValue('--particle-color').trim();
                        ctx.strokeStyle = `rgba(${particleColor}, ${opacity})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw connections first
            drawConnections();

            // Draw and update particles
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;

                // Bounce off edges
                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

                // Mouse interaction
                if (mouse.x !== null && mouse.y !== null) {
                    const dx = p.x - mouse.x;
                    const dy = p.y - mouse.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < mouse.radius) {
                        const force = (mouse.radius - distance) / mouse.radius;
                        p.x += (dx / distance) * force * 0.5;
                        p.y += (dy / distance) * force * 0.5;
                    }
                }

                // Draw particle with enhanced glow and gradient
                const particleColor = getComputedStyle(document.documentElement).getPropertyValue('--particle-color').trim();

                // Create radial gradient for prettier particles
                const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 3);
                gradient.addColorStop(0, `rgba(${particleColor}, ${p.opacity * 0.8})`);
                gradient.addColorStop(0.5, `rgba(${particleColor}, ${p.opacity * 0.4})`);
                gradient.addColorStop(1, `rgba(${particleColor}, 0)`);

                // Draw with soft glow
                ctx.shadowBlur = 15;
                ctx.shadowColor = `rgba(${particleColor}, ${p.opacity * 0.5})`;
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            });

            requestAnimationFrame(animate);
        }

        // Mouse tracking for interactivity
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
        });

        window.addEventListener('mouseleave', () => {
            mouse.x = null;
            mouse.y = null;
        });

        window.addEventListener('resize', resize);
        resize();
        animate();

        // Spotify URL - Artist Identity Extraction
        const artistState = { name: '', image: '' };

        document.getElementById('spotifyUrl').addEventListener('input', async (e) => {
            const url = e.target.value.trim();
            const info = extractSpotifyID(url);
            if (info) {
                const data = await fetchSpotifyOEmbed(url);
                if (data) {
                    artistState.name = data.title;
                    artistState.image = data.thumbnail_url;
                    updateArtistDisplay();
                }
            }
        });

        function extractSpotifyID(url) {
            const matches = url.match(/spotify\.com\/(track|album|artist)\/([a-zA-Z0-9]+)/i);
            return matches ? { type: matches[1], id: matches[2] } : null;
        }

        async function fetchSpotifyOEmbed(url) {
            try {
                const cleanUrl = url.split('?')[0];
                const res = await fetch(`https://open.spotify.com/oembed?url=${encodeURIComponent(cleanUrl)}`);
                return res.ok ? await res.json() : null;
            } catch { return null; }
        }

        function updateArtistDisplay() {
            const display = document.getElementById('artistDisplay');
            const image = document.getElementById('artistImage');
            const name = document.getElementById('artistName');

            display.classList.remove('hidden');
            image.src = artistState.image;
            image.style.display = 'block';
            name.textContent = artistState.name;
        }

        // Auto-Suggest Logic
        function initAutoSuggest(platform) {
            const input = document.getElementById(`${platform}Input`);
            const results = document.getElementById(`${platform}Results`);

            input.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase().trim();
                if (query.length > 0) {
                    const matches = serviceDatabase[platform].filter(s =>
                        s.name.toLowerCase().includes(query) || s.amount.toLowerCase().includes(query)
                    );
                    renderSuggestions(platform, matches, query);
                } else {
                    results.classList.remove('active');
                }
            });

            document.addEventListener('click', (e) => {
                if (!input.contains(e.target) && !results.contains(e.target)) {
                    results.classList.remove('active');
                }
            });
        }

        function renderSuggestions(platform, matches, query) {
            const results = document.getElementById(`${platform}Results`);
            results.innerHTML = '';

            const customDiv = document.createElement('div');
            customDiv.className = 'suggest-item add-custom';
            customDiv.innerHTML = `+ Add Custom Campaign...`;
            customDiv.onclick = () => promptCustomCampaign(platform, query);
            results.appendChild(customDiv);

            if (matches.length > 0) {
                results.classList.add('active');
                matches.slice(0, 8).forEach(match => {
                    const div = document.createElement('div');
                    div.className = 'suggest-item';
                    div.innerHTML = `<span class="service-name">${match.name}</span><span class="price-badge">${match.amount}</span>`;
                    div.onclick = () => selectSuggestion(platform, match);
                    results.appendChild(div);
                });
            } else if (query.length > 0) {
                results.classList.add('active');
            }
        }

        function selectSuggestion(platform, service) {
            const input = document.getElementById(`${platform}Input`);
            input.value = service.name;
            input.dataset.amount = service.amount; // Store the amount in the input element
            document.getElementById(`${platform}Results`).classList.remove('active');
        }

        function promptCustomCampaign(platform, defaultValue) {
            const input = document.getElementById(`${platform}Input`);
            const name = prompt("Enter Custom Campaign Name:", defaultValue || input.value);
            if (!name) return;

            const amount = prompt("Enter Amount (e.g. $500):", "$");
            if (amount) {
                input.value = name;
                input.dataset.amount = amount;
                document.getElementById(`${platform}Results`).classList.remove('active');
            }
        }

        function addCampaign(platform) {
            const songNameInput = document.getElementById(`${platform}SongName`);
            const campaignInput = document.getElementById(`${platform}Input`);

            const songName = songNameInput.value.trim();
            const campaignName = campaignInput.value.trim();
            const amount = campaignInput.dataset.amount || '';

            if (!songName || !campaignName) {
                alert('Please enter both song name and campaign type');
                return;
            }

            const masterGrid = document.getElementById('masterCampaignsGrid');
            const campaignId = Date.now();
            totalCampaigns++;

            // Platform color mapping for visual identification
            const platformColors = {
                spotify: { bg: '#1DB954', name: 'Spotify' },
                soundcloud: { bg: '#FF5500', name: 'SoundCloud' },
                press: { bg: '#fafafa', name: 'Press' }
            };

            const color = platformColors[platform];

            const row = document.createElement('div');
            row.className = 'campaign-row row-safe';
            row.id = `campaign-${campaignId}`;

            row.innerHTML = `
                <div class="w-1.5 h-10 rounded-full flex-shrink-0" style="background: ${color.bg}; box-shadow: 0 0 10px ${color.bg}44;"></div>
                <div class="campaign-info">
                    <div class="campaign-song-name">${songName}</div>
                    <div class="campaign-type">${color.name} · ${campaignName}${amount ? ` - ${amount}` : ''}</div>
                </div>
                <div class="campaign-tags" id="tags-${campaignId}">
                    <div class="tag-add-btn" onclick="event.stopPropagation(); startAddTag(${campaignId})">+</div>
                </div>
                <div class="campaign-stage-indicator">
                    <div class="mini-dot inactive"></div>
                    <div class="mini-dot"></div>
                    <div class="mini-dot"></div>
                    <div class="mini-dot"></div>
                    <div class="mini-dot"></div>
                </div>
                <div class="campaign-delete ml-2" onclick="event.stopPropagation(); deleteCampaign(${campaignId})">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </div>
            `;

            // Add double-click to advance stage
            row.addEventListener('dblclick', () => {
                const campaign = campaignsData.find(c => c.id === campaignId);
                if (!campaign) return;

                // Advance to next stage (0 → 1 → 2 → 3 → 4 → 0)
                const nextStage = (campaign.stage + 1) % 5;
                setCampaignStage(campaignId, nextStage);
                updateCampaignCardIndicator(campaignId);

                // Visual feedback
                row.style.transform = 'scale(1.02)';
                setTimeout(() => row.style.transform = '', 150);
            });

            masterGrid.appendChild(row);

            // Click to select
            row.addEventListener('click', (e) => {
                if (e.target.closest('.campaign-delete')) return;
                selectCampaign(campaignId);
            });

            // Store campaign data
            campaignsData.push({
                id: campaignId,
                songName: songName,
                campaignName: campaignName,
                amount: amount,
                platform: platform,
                stage: 0,
                tags: [],
                dateAdded: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
            });

            // Trigger visual update for stage 0 (glow)
            setCampaignStage(campaignId, 0);
            updateCampaignCardIndicator(campaignId);

            // Add to platform's quick-glance section
            const quickGlance = document.getElementById(`${platform}QuickGlance`);
            const quickRow = document.createElement('div');
            quickRow.className = 'quick-campaign-row';
            quickRow.id = `quick-${campaignId}`;
            const dateStr = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            quickRow.innerHTML = `
                <span class="quick-campaign-name">${songName}</span>
                <span class="quick-campaign-type">${shortCampaign(campaignName, platform)}</span>
                <span class="quick-campaign-date">${dateStr}</span>
            `;
            quickGlance.appendChild(quickRow);

            // Auto-advance platform stage to "Pitched" when first campaign is added
            const platformCampaigns = campaignsData.filter(c => c.platform === platform);
            if (platformCampaigns.length === 1 && platformStages[platform] === 0) {
                setPlatformStage(platform, 1); // Move to Pitched stage
            }

            songNameInput.value = '';
            campaignInput.value = '';
            delete campaignInput.dataset.amount;
            document.getElementById(`${platform}Results`).classList.remove('active');
            updateMasterCampaignCount();
        }

        // Global click to deselect
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.campaign-row') && !e.target.closest('.master-stage-item')) {
                if (selectedCampaignId !== null) {
                    selectedCampaignId = null;
                    document.querySelectorAll('.campaign-row').forEach(row => row.classList.remove('selected'));
                    document.getElementById('masterStageContainer').classList.remove('selection-active');
                }
            }
        });

        function updateMasterCampaignCount() {
            document.getElementById('masterCampaignCount').textContent = `${totalCampaigns} campaign${totalCampaigns !== 1 ? 's' : ''}`;
        }



        function deleteCampaign(campaignId) {
            document.getElementById(`campaign-${campaignId}`).remove();
            const quickRow = document.getElementById(`quick-${campaignId}`);
            if (quickRow) quickRow.remove();
            totalCampaigns--;
            campaignsData = campaignsData.filter(c => c.id !== campaignId);
            if (selectedCampaignId === campaignId) {
                selectedCampaignId = null;
                document.getElementById('masterStageContainer').classList.remove('selection-active');
            }
            updateMasterCampaignCount();
            refreshTicker();
        }

        function selectCampaign(campaignId) {
            // Remove previous selection
            document.querySelectorAll('.campaign-row').forEach(row => row.classList.remove('selected'));

            if (selectedCampaignId === campaignId) {
                // Deselect if clicking the same one
                selectedCampaignId = null;
                document.getElementById('masterStageContainer').classList.remove('selection-active');
                return;
            }

            // Set new selection
            selectedCampaignId = campaignId;
            const campaign = campaignsData.find(c => c.id === campaignId);
            const row = document.getElementById(`campaign-${campaignId}`);
            if (row) row.classList.add('selected');

            // Highlight Master Stage Container
            document.getElementById('masterStageContainer').classList.add('selection-active');

            // Visual feedback on the master stages could go here (e.g. highlighting current stage)
        }

        function updateStageFromMaster(stageIndex) {
            if (selectedCampaignId === null) {
                // If nothing selected, maybe it just shows a tooltip or flash?
                // For now, let's allow it to act as a "Set All" or just ignore
                return;
            }

            setCampaignStage(selectedCampaignId, stageIndex);
            updateCampaignCardIndicator(selectedCampaignId);

            // Pulse the clicked stage for feedback
            const stages = document.querySelectorAll('.master-stage-item');
            stages[stageIndex].style.transform = 'scale(1.1) translateY(-5px)';
            setTimeout(() => stages[stageIndex].style.transform = '', 200);
        }

        function setCampaignStage(campaignId, stageIndex) {
            const campaign = campaignsData.find(c => c.id === campaignId);
            if (!campaign) return;

            campaign.stage = stageIndex;

            // Stamp acceptedAt when campaign reaches "Accepted" stage (index 2)
            if (stageIndex === 2 && !campaign.acceptedAt) {
                campaign.acceptedAt = Date.now();
            }

            const quickRow = document.getElementById(`quick-${campaignId}`);
            if (quickRow) {
                const dots = quickRow.querySelectorAll('.quick-stage-dot');
                dots.forEach((dot, index) => {
                    dot.classList.remove('active', 'inactive', 'current', 'complete');

                    if (index === 0) {
                        dot.classList.add('inactive');
                    } else if (index === stageIndex && stageIndex === 4) {
                        // Complete stage (index 4) gets special green styling
                        dot.classList.add('complete');
                    } else if (index <= stageIndex && stageIndex > 0) {
                        dot.classList.add('active');
                    }

                    // Highlight the current step
                    if (index === stageIndex) {
                        dot.classList.add('current');
                    }
                });
            }

            // Refresh countdown ticker
            refreshTicker();
        }

        function updateCampaignCardIndicator(campaignId) {
            const campaign = campaignsData.find(c => c.id === campaignId);
            if (!campaign) return;

            const card = document.getElementById(`campaign-${campaignId}`);
            if (!card) return;

            const miniDots = card.querySelectorAll('.mini-dot');
            miniDots.forEach((dot, index) => {
                dot.classList.remove('active', 'inactive', 'current', 'complete');

                if (index === 0) {
                    dot.classList.add('inactive');
                } else if (index === campaign.stage && campaign.stage === 4) {
                    // Complete stage (index 4) gets special green styling
                    dot.classList.add('complete');
                } else if (index <= campaign.stage && campaign.stage > 0) {
                    dot.classList.add('active');
                }

                // Highlight the current step
                if (index === campaign.stage) {
                    dot.classList.add('current');
                }
            });

            // Trigger synchronized glow flash
            flashStageGlow(campaignId, campaign.stage);
        }

        function flashStageGlow(campaignId, stageIndex) {
            const isRed = stageIndex === 0;
            const glowClass = isRed ? 'stage-glow-flash-red' : 'stage-glow-flash';
            const masterGlowClass = isRed ? 'master-stage-glow-red' : 'master-stage-glow';

            // Flash the mini-dot on the campaign card
            const card = document.getElementById(`campaign-${campaignId}`);
            if (card) {
                const miniDots = card.querySelectorAll('.mini-dot');
                const targetDot = miniDots[stageIndex];
                if (targetDot) {
                    targetDot.classList.remove(glowClass);
                    void targetDot.offsetWidth; // force reflow
                    targetDot.classList.add(glowClass);
                    setTimeout(() => targetDot.classList.remove(glowClass), 750);
                }
            }

            // Flash the matching master stage button at the top
            const masterStages = document.querySelectorAll('.master-stage-item');
            const masterTarget = masterStages[stageIndex];
            if (masterTarget) {
                masterTarget.classList.remove(masterGlowClass);
                void masterTarget.offsetWidth;
                masterTarget.classList.add(masterGlowClass);
                setTimeout(() => {
                    masterTarget.classList.remove(masterGlowClass);
                    masterTarget.style.transform = '';
                }, 750);
            }

            // Also flash the quick-glance dot
            const quickRow = document.getElementById(`quick-${campaignId}`);
            if (quickRow) {
                const quickDots = quickRow.querySelectorAll('.quick-stage-dot');
                const quickTarget = quickDots[stageIndex];
                if (quickTarget) {
                    quickTarget.classList.remove(glowClass);
                    void quickTarget.offsetWidth;
                    quickTarget.classList.add(glowClass);
                    setTimeout(() => quickTarget.classList.remove(glowClass), 750);
                }
            }
        }

        function updateParticleColors() {
            // Particle colors will update on next animation frame
            const root = getComputedStyle(document.documentElement);
            const colorValue = root.getPropertyValue('--particle-color').trim();
            // Colors will be applied in the animate function
        }

        // === Campaign Row Tags ===
        const tagSuggestions = ['Stalled', 'Priority', 'Hot', 'Follow Up', 'Pending', 'Approved', 'On Hold', 'Rush', 'VIP', 'Review', 'Confirmed', 'Waiting on Artist', 'Paid', 'Unpaid', 'Issue'];

        function startAddTag(campaignId) {
            const container = document.getElementById(`tags-${campaignId}`);
            if (!container || container.querySelector('.tag-input-wrapper')) return;

            // Pulse the "+" button on click for satisfying feedback
            const addBtn = container.querySelector('.tag-add-btn');
            if (addBtn) {
                addBtn.style.animation = 'tagAddPulse 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                addBtn.addEventListener('animationend', () => { addBtn.style.animation = ''; }, { once: true });
            }

            const wrapper = document.createElement('div');
            wrapper.className = 'tag-input-wrapper';

            const input = document.createElement('input');
            input.className = 'tag-input';
            input.type = 'text';
            input.placeholder = 'Tag...';

            const dropdown = document.createElement('div');
            dropdown.className = 'tag-suggest-dropdown';
            dropdown.style.display = 'none';

            wrapper.appendChild(input);
            wrapper.appendChild(dropdown);

            // Insert before the "+" button — scoot existing pills left
            container.classList.add('tags-editing');
            container.insertBefore(wrapper, addBtn);

            input.focus();

            // Show all suggestions immediately with flutter entrance
            showTagSuggestions(input, dropdown, '', campaignId);
            dropdown.style.display = 'block';
            dropdown.style.animation = 'none';
            dropdown.offsetHeight; // force reflow
            dropdown.style.animation = '';

            const cleanupEditing = () => container.classList.remove('tags-editing');

            input.addEventListener('input', () => {
                showTagSuggestions(input, dropdown, input.value.trim(), campaignId);
                dropdown.style.display = 'block';
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const text = input.value.trim();
                    if (text) {
                        cleanupEditing();
                        commitTag(campaignId, text, wrapper);
                    }
                } else if (e.key === 'Escape') {
                    cleanupEditing();
                    wrapper.remove();
                }
            });

            // Close on outside click
            const closeHandler = (e) => {
                if (!wrapper.contains(e.target)) {
                    cleanupEditing();
                    wrapper.remove();
                    document.removeEventListener('click', closeHandler);
                }
            };
            setTimeout(() => document.addEventListener('click', closeHandler), 10);
        }

        function showTagSuggestions(input, dropdown, query, campaignId) {
            const campaign = campaignsData.find(c => c.id === campaignId);
            const existingTags = campaign ? campaign.tags : [];

            dropdown.innerHTML = '';

            // "+ custom" option at top
            if (query.length > 0) {
                const customItem = document.createElement('div');
                customItem.className = 'tag-suggest-item add-custom-tag';
                customItem.textContent = `+ "${query}"`;
                customItem.onclick = (e) => {
                    e.stopPropagation();
                    commitTag(campaignId, query, input.closest('.tag-input-wrapper'));
                };
                dropdown.appendChild(customItem);
            }

            // Filter suggestions
            const filtered = tagSuggestions.filter(s => {
                const matchesQuery = query.length === 0 || s.toLowerCase().includes(query.toLowerCase());
                const notAlreadyUsed = !existingTags.includes(s);
                return matchesQuery && notAlreadyUsed;
            });

            filtered.forEach(suggestion => {
                const item = document.createElement('div');
                item.className = 'tag-suggest-item';
                item.textContent = suggestion;
                item.onclick = (e) => {
                    e.stopPropagation();
                    commitTag(campaignId, suggestion, input.closest('.tag-input-wrapper'));
                };
                dropdown.appendChild(item);
            });

            if (dropdown.children.length === 0) {
                dropdown.style.display = 'none';
            }
        }

        function commitTag(campaignId, text, wrapper) {
            const campaign = campaignsData.find(c => c.id === campaignId);
            if (!campaign) return;

            // Don't add duplicates
            if (campaign.tags.includes(text)) {
                if (wrapper) wrapper.remove();
                return;
            }

            campaign.tags.push(text);

            // Add to suggestions if new
            if (!tagSuggestions.includes(text)) {
                tagSuggestions.push(text);
            }

            if (wrapper) wrapper.remove();
            renderTagsForRow(campaignId);
        }

        function removeTagFromCampaign(campaignId, index) {
            const campaign = campaignsData.find(c => c.id === campaignId);
            if (!campaign) return;

            // Find the pill to animate out
            const container = document.getElementById(`tags-${campaignId}`);
            const pills = container ? container.querySelectorAll('.campaign-tag') : [];
            const targetPill = pills[index];

            if (targetPill) {
                targetPill.classList.add('tag-removing');
                setTimeout(() => {
                    campaign.tags.splice(index, 1);
                    renderTagsForRow(campaignId);
                }, 250);
            } else {
                campaign.tags.splice(index, 1);
                renderTagsForRow(campaignId);
            }
        }

        function editTagInRow(campaignId, index) {
            const campaign = campaignsData.find(c => c.id === campaignId);
            if (!campaign) return;

            const oldText = campaign.tags[index];
            campaign.tags.splice(index, 1);
            renderTagsForRow(campaignId);

            // Open input pre-filled
            const container = document.getElementById(`tags-${campaignId}`);
            if (!container) return;

            const wrapper = document.createElement('div');
            wrapper.className = 'tag-input-wrapper';

            const input = document.createElement('input');
            input.className = 'tag-input';
            input.type = 'text';
            input.value = oldText;

            const dropdown = document.createElement('div');
            dropdown.className = 'tag-suggest-dropdown';
            dropdown.style.display = 'none';

            wrapper.appendChild(input);
            wrapper.appendChild(dropdown);

            const addBtn = container.querySelector('.tag-add-btn');
            container.insertBefore(wrapper, addBtn);

            input.focus();
            input.select();

            showTagSuggestions(input, dropdown, oldText, campaignId);
            dropdown.style.display = 'block';
            dropdown.style.animation = 'none';
            dropdown.offsetHeight;
            dropdown.style.animation = '';

            input.addEventListener('input', () => {
                showTagSuggestions(input, dropdown, input.value.trim(), campaignId);
                dropdown.style.display = 'block';
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const text = input.value.trim();
                    if (text) {
                        commitTag(campaignId, text, wrapper);
                    }
                } else if (e.key === 'Escape') {
                    // Restore original tag on cancel
                    campaign.tags.splice(index, 0, oldText);
                    wrapper.remove();
                    renderTagsForRow(campaignId);
                }
            });

            const closeHandler = (e) => {
                if (!wrapper.contains(e.target)) {
                    // Commit what's there or restore
                    const text = input.value.trim();
                    if (text) {
                        commitTag(campaignId, text, wrapper);
                    } else {
                        campaign.tags.splice(index, 0, oldText);
                        wrapper.remove();
                        renderTagsForRow(campaignId);
                    }
                    document.removeEventListener('click', closeHandler);
                }
            };
            setTimeout(() => document.addEventListener('click', closeHandler), 10);
        }

        function renderTagsForRow(campaignId) {
            const container = document.getElementById(`tags-${campaignId}`);
            if (!container) return;

            const campaign = campaignsData.find(c => c.id === campaignId);
            if (!campaign) return;

            container.innerHTML = '';

            campaign.tags.forEach((tag, index) => {
                const pill = document.createElement('div');
                pill.className = 'campaign-tag';
                pill.style.animationDelay = `${index * 0.05}s`;
                pill.innerHTML = `<span>${tag}</span><span class="tag-x" onclick="event.stopPropagation(); removeTagFromCampaign(${campaignId}, ${index})">✕</span>`;
                pill.addEventListener('dblclick', (e) => {
                    e.stopPropagation();
                    editTagInRow(campaignId, index);
                });
                container.appendChild(pill);
            });

            container.appendChild(createAddBtn(campaignId));

            // Row hue: green = safe (no tags), red = tagged
            const row = document.getElementById(`campaign-${campaignId}`);
            if (row) {
                row.classList.remove('row-safe', 'row-tagged');
                row.classList.add(campaign.tags.length > 0 ? 'row-tagged' : 'row-safe');
            }
        }

        function createAddBtn(campaignId) {
            const btn = document.createElement('div');
            btn.className = 'tag-add-btn';
            btn.textContent = '+';
            btn.onclick = (e) => {
                e.stopPropagation();
                startAddTag(campaignId);
            };
            return btn;
        }

        // Countdown Ticker Management
        function refreshTicker() {
            const ticker = document.getElementById('countdownTicker');
            ticker.innerHTML = '';

            // Get campaigns in Accepted or later stages
            const activeCampaigns = campaignsData.filter(c => c.stage >= 2);
            if (activeCampaigns.length === 0) {
                return; // Hide ticker if no active campaigns
            }

            // Sort by acceptedAt (newest first)
            activeCampaigns.sort((a, b) => {
                const aTime = a.acceptedAt || 0;
                const bTime = b.acceptedAt || 0;
                return bTime - aTime;
            });

            // Group into pairs for two-column layout
            for (let i = 0; i < activeCampaigns.length; i += 2) {
                const row = document.createElement('div');
                row.className = 'ticker-row';

                // First campaign in the pair
                const campaign1 = activeCampaigns[i];
                const entry1 = createTickerEntry(campaign1);
                row.appendChild(entry1);

                // Separator line if there's a second campaign
                if (activeCampaigns[i + 1]) {
                    const connector = document.createElement('div');
                    connector.className = 'ticker-connector';
                    row.appendChild(connector);

                    const campaign2 = activeCampaigns[i + 1];
                    const entry2 = createTickerEntry(campaign2);
                    row.appendChild(entry2);
                }

                ticker.appendChild(row);
            }
        }

        function createTickerEntry(campaign) {
            const entry = document.createElement('div');
            entry.className = 'ticker-entry';

            let daysRemaining;
            let displayText;
            let urgentClass = '';

            if (campaign.stage === 4) {
                // Complete stage
                daysRemaining = null;
                displayText = '✓';
                urgentClass = 'ticker-complete';
            } else if (campaign.acceptedAt) {
                // Calculate days remaining from acceptedAt
                daysRemaining = 7 - Math.floor((Date.now() - campaign.acceptedAt) / 86400000);
                if (daysRemaining <= 0) {
                    displayText = '-0';
                    urgentClass = 'ticker-urgent';
                } else {
                    displayText = `-${daysRemaining}`;
                }
            } else {
                // No acceptedAt timestamp
                daysRemaining = 7;
                displayText = '-7';
            }

            entry.innerHTML = `
                <span class="ticker-slash">//</span>
                <span class="ticker-days">${displayText}</span>
                <span class="ticker-separator">/</span>
                <span class="ticker-song">${campaign.songName}</span>
            `;

            if (urgentClass) {
                entry.classList.add(urgentClass);
            }

            return entry;
        }

        // Platform Stage Management
        function setPlatformStage(platform, stageIndex) {
            platformStages[platform] = stageIndex;

            const container = document.getElementById(`${platform}Stages`);
            const dots = container.querySelectorAll('.platform-stage-dot');

            dots.forEach((dot, index) => {
                dot.classList.remove('active', 'inactive');

                if (index === 0) {
                    // First dot is always "Not Activated" (red)
                    dot.classList.add('inactive');
                } else if (index <= stageIndex && stageIndex > 0) {
                    // Active stages (blue)
                    dot.classList.add('active');
                }
            });
        }

        // Initialize auto-suggest for all platforms
        ['spotify', 'soundcloud', 'press'].forEach(platform => {
            initAutoSuggest(platform);

            document.getElementById(`${platform}Input`).addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addCampaign(platform);
            });
        });

        // Pre-load 4 demo campaigns
        const demoCampaigns = [
            { id: 1001, songName: 'Midnight Drive', campaignName: 'Spotify Playlisting Campaign (Third Party) - 25K', amount: '$590', platform: 'spotify', stage: 3, tags: ['Priority', 'Hot'], acceptedAt: Date.now() - (3 * 86400000) },
            { id: 1002, songName: 'Neon Skyline', campaignName: 'Spotify Playlisting Campaign (Third Party) - 50K', amount: '$890', platform: 'spotify', stage: 1, tags: ['VIP'] },
            { id: 1003, songName: 'Midnight Drive', campaignName: 'SoundCloud Repost Campaign - 8K', amount: '$240', platform: 'soundcloud', stage: 2, tags: ['Follow Up'], acceptedAt: Date.now() - (5 * 86400000) },
            { id: 1004, songName: 'Neon Skyline', campaignName: 'Press Release Campaign - 5 Articles (In-Network)', amount: '$300', platform: 'press', stage: 0, tags: [] }
        ];

        demoCampaigns.forEach(c => restoreCampaign(c));

        // Set platform stages to reflect the demo data
        setPlatformStage('spotify', 2);
        setPlatformStage('soundcloud', 1);
        setPlatformStage('press', 0);

        // Initialize countdown ticker
        refreshTicker();

        // Refresh ticker every 60 seconds
        setInterval(refreshTicker, 60000);
    </script>
