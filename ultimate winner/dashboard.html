<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaign Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #0a0a0a;
            --border-primary: #333;
            --border-secondary: #2a2a2a;
            --text-primary: #fafafa;
            --text-secondary: #a3a3a3;
            --text-tertiary: #525252;
            --particle-color: 200, 200, 220;
        }

        body.light-mode {
            --bg-primary: #f5f5f5;
            --bg-secondary: #ffffff;
            --bg-tertiary: #fafafa;
            --border-primary: #e5e5e5;
            --border-secondary: #d4d4d4;
            --text-primary: #171717;
            --text-secondary: #525252;
            --text-tertiary: #737373;
            --particle-color: 100, 100, 120;
        }

        body {
            background: var(--bg-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-primary);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* Particle Background */
        canvas#particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            filter: blur(0.5px);
            opacity: 0.8;
        }

        /* Auto-Suggest Dropdown */
        .suggest-results {
            position: absolute;
            top: calc(100% + 5px);
            left: 0;
            width: 100%;
            background: var(--bg-secondary);
            border: 1px solid var(--border-primary);
            border-radius: 12px;
            z-index: 100;
            max-height: 250px;
            overflow-y: auto;
            display: none;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            transition: background 0.3s ease, border 0.3s ease;
        }

        .suggest-results.active {
            display: block;
        }

        .suggest-item {
            padding: 12px 16px;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 1px solid #2a2a2a;
            font-size: 14px;
            color: #fafafa;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .suggest-item:last-child {
            border-bottom: none;
        }

        .suggest-item:hover {
            background: #252525;
        }

        .suggest-item.add-custom {
            color: #60a5fa;
            font-weight: 600;
            border-bottom: 1px solid #60a5fa;
        }

        .suggest-item .price-badge {
            background: #fafafa;
            color: #0a0a0a;
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            letter-spacing: 0.3px;
        }

        .suggest-item .service-name {
            flex: 1;
            font-weight: 500;
        }

        /* Common Section Styles */
        .dashboard-section {
            background: var(--bg-secondary);
            border: 1px solid var(--border-primary);
            border-radius: 1.5rem;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }

        .dashboard-input {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-primary);
            color: var(--text-primary);
            transition: all 0.2s ease;
        }

        .dashboard-input:focus {
            outline: none;
            border-color: #1DB954;
        }

        .dashboard-input::placeholder {
            color: var(--text-tertiary);
        }

        body.light-mode .stage-dot.inactive {
            background: #ef4444;
            border-color: #dc2626;
        }

        /* Master Stage Reference Dots */
        .master-stage-item {
            padding: 0.5rem 0.75rem;
            border-radius: 1rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-primary);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
        }

        .master-stage-item:hover {
            transform: translateY(-3px);
            background: var(--bg-secondary);
            border-color: #3b82f6;
            box-shadow: 0 8px 16px rgba(59, 130, 246, 0.15);
        }

        .master-stage-item.selected-path {
            background: rgba(59, 130, 246, 0.05);
            border-color: #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
        }

        #masterStageContainer.selection-active {
            border-color: rgba(59, 130, 246, 0.3);
            box-shadow: inset 0 0 20px rgba(59, 130, 246, 0.05);
        }

        .master-stage-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2.5px solid;
            position: relative;
            flex-shrink: 0;
        }

        .master-stage-inactive {
            background: linear-gradient(145deg, #ef4444 0%, #dc2626 100%);
            border-color: #b91c1c;
            box-shadow: 0 0 12px rgba(239, 68, 68, 0.6),
                0 0 24px rgba(239, 68, 68, 0.3),
                0 2px 4px rgba(0, 0, 0, 0.2),
                inset 0 1px 1px rgba(255, 255, 255, 0.3),
                inset 0 -1px 1px rgba(0, 0, 0, 0.2);
        }

        .master-stage-active {
            background: linear-gradient(145deg, #60a5fa 0%, #3b82f6 100%);
            border-color: #2563eb;
            box-shadow: 0 0 12px rgba(96, 165, 250, 0.7),
                0 0 24px rgba(96, 165, 250, 0.4),
                0 2px 4px rgba(0, 0, 0, 0.15),
                inset 0 1px 1px rgba(255, 255, 255, 0.4),
                inset 0 -1px 1px rgba(0, 0, 0, 0.15);
        }

        /* Platform Stage Dots - Sharp Dimensional Look */
        .platform-stage-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--border-secondary);
            border: 2px solid var(--border-primary);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            z-index: 2;
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.15),
                0 1px 2px rgba(0, 0, 0, 0.1);
        }

        .platform-stage-dot:hover {
            transform: scale(1.5) translateY(-2px);
            filter: brightness(1.3) contrast(1.1);
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.25),
                0 3px 6px rgba(0, 0, 0, 0.15);
        }

        .platform-stage-dot.inactive {
            background: linear-gradient(145deg, #ef4444 0%, #dc2626 100%);
            border-color: #b91c1c;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.85),
                0 0 40px rgba(239, 68, 68, 0.45),
                0 5px 10px rgba(220, 38, 38, 0.35),
                0 2px 5px rgba(0, 0, 0, 0.25),
                inset 0 2px 3px rgba(255, 255, 255, 0.4),
                inset 0 -2px 3px rgba(0, 0, 0, 0.3);
        }

        .platform-stage-dot.active {
            background: linear-gradient(145deg, #60a5fa 0%, #3b82f6 100%);
            border-color: #2563eb;
            box-shadow: 0 0 22px rgba(96, 165, 250, 0.95),
                0 0 44px rgba(96, 165, 250, 0.55),
                0 5px 10px rgba(59, 130, 246, 0.35),
                0 2px 5px rgba(0, 0, 0, 0.2),
                inset 0 2px 3px rgba(255, 255, 255, 0.5),
                inset 0 -2px 3px rgba(0, 0, 0, 0.25);
            animation: pulse 3s ease-in-out infinite;
        }

        .stage-connector-line {
            flex: 1;
            height: 3px;
            background: linear-gradient(90deg,
                    var(--border-primary) 0%,
                    var(--border-secondary) 50%,
                    var(--border-primary) 100%);
            min-width: 20px;
            transition: all 0.3s ease;
            border-radius: 2px;
            opacity: 0.6;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                box-shadow: 0 0 22px rgba(96, 165, 250, 0.95),
                    0 0 44px rgba(96, 165, 250, 0.55),
                    0 5px 10px rgba(59, 130, 246, 0.35),
                    0 2px 5px rgba(0, 0, 0, 0.2),
                    inset 0 2px 3px rgba(255, 255, 255, 0.5),
                    inset 0 -2px 3px rgba(0, 0, 0, 0.25);
            }

            50% {
                opacity: 0.85;
                box-shadow: 0 0 30px rgba(96, 165, 250, 1),
                    0 0 60px rgba(96, 165, 250, 0.65),
                    0 6px 12px rgba(59, 130, 246, 0.4),
                    0 3px 6px rgba(0, 0, 0, 0.25),
                    inset 0 2px 4px rgba(255, 255, 255, 0.6),
                    inset 0 -2px 4px rgba(0, 0, 0, 0.3);
            }
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-3px);
            }
        }

        .platform-stage-dot {
            animation: float 4s ease-in-out infinite;
        }

        .platform-stage-dot.active {
            animation: float 4s ease-in-out infinite, pulse 3s ease-in-out infinite;
        }

        /* Campaign Row */
        .campaign-row {
            display: flex;
            align-items: center;
            gap: 1.25rem;
            padding: 0.75rem 1.25rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-primary);
            border-radius: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            animation: rowIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            overflow: visible;
        }

        @keyframes rowIn {
            from {
                opacity: 0;
                transform: translateY(15px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .campaign-row:hover {
            border-color: var(--border-secondary);
            background: rgba(255, 255, 255, 0.02);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            transform: translateX(4px);
        }

        .campaign-row:active {
            transform: translateX(2px) scale(0.995);
        }

        .campaign-row.selected {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.05);
            box-shadow: 0 0 0 1px #3b82f6, 0 8px 24px rgba(59, 130, 246, 0.15);
        }

        .campaign-row.row-safe {
            background: rgba(34, 197, 94, 0.03);
            border-color: rgba(34, 197, 94, 0.1);
        }

        .campaign-row.row-tagged {
            background: rgba(239, 68, 68, 0.03);
            border-color: rgba(239, 68, 68, 0.1);
        }

        .campaign-row.selected::after {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: #3b82f6;
            box-shadow: 0 0 10px #3b82f6;
        }

        .campaign-stage-indicator {
            display: flex;
            gap: 0.35rem;
            align-items: center;
            padding: 0 0.5rem;
            border-left: 1px solid var(--border-primary);
        }

        .campaign-stage-indicator .mini-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--border-secondary);
            transition: all 0.3s ease;
            box-shadow: inset 0 1px 1px rgba(0, 0, 0, 0.2);
        }

        .campaign-stage-indicator .mini-dot.active {
            background: #60a5fa;
            box-shadow: 0 0 10px rgba(96, 165, 250, 0.6),
                0 0 20px rgba(96, 165, 250, 0.3),
                inset 0 1px 1px rgba(255, 255, 255, 0.4);
        }

        .campaign-stage-indicator .mini-dot.inactive {
            background: #ef4444;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.6),
                0 0 20px rgba(239, 68, 68, 0.3),
                inset 0 1px 1px rgba(255, 255, 255, 0.4);
        }

        .campaign-stage-indicator .mini-dot.current {
            animation: dotStepGlow 2s ease-in-out infinite;
            z-index: 10;
        }

        .campaign-stage-indicator .mini-dot.current.active {
            box-shadow: 0 0 15px #60a5fa, 0 0 30px rgba(96, 165, 250, 0.5);
        }

        .campaign-stage-indicator .mini-dot.current.inactive {
            box-shadow: 0 0 15px #ef4444, 0 0 30px rgba(239, 68, 68, 0.5);
        }

        @keyframes dotStepGlow {

            0%,
            100% {
                transform: scale(1);
                filter: brightness(1);
            }

            50% {
                transform: scale(1.4);
                filter: brightness(1.3);
            }
        }

        /* Stage Change Glow Flash */
        @keyframes stageGlowFlash {
            0% {
                filter: brightness(1);
                box-shadow: 0 0 0px rgba(96, 165, 250, 0);
            }

            25% {
                filter: brightness(2.2);
                box-shadow: 0 0 25px rgba(96, 165, 250, 0.9), 0 0 50px rgba(96, 165, 250, 0.5), 0 0 80px rgba(96, 165, 250, 0.25);
            }

            50% {
                filter: brightness(1.8);
                box-shadow: 0 0 18px rgba(96, 165, 250, 0.7), 0 0 40px rgba(96, 165, 250, 0.35);
            }

            100% {
                filter: brightness(1);
                box-shadow: none;
            }
        }

        @keyframes stageGlowFlashRed {
            0% {
                filter: brightness(1);
                box-shadow: 0 0 0px rgba(239, 68, 68, 0);
            }

            25% {
                filter: brightness(2.2);
                box-shadow: 0 0 25px rgba(239, 68, 68, 0.9), 0 0 50px rgba(239, 68, 68, 0.5), 0 0 80px rgba(239, 68, 68, 0.25);
            }

            50% {
                filter: brightness(1.8);
                box-shadow: 0 0 18px rgba(239, 68, 68, 0.7), 0 0 40px rgba(239, 68, 68, 0.35);
            }

            100% {
                filter: brightness(1);
                box-shadow: none;
            }
        }

        .stage-glow-flash {
            animation: stageGlowFlash 0.7s ease-out forwards !important;
        }

        .stage-glow-flash-red {
            animation: stageGlowFlashRed 0.7s ease-out forwards !important;
        }

        .master-stage-glow {
            animation: stageGlowFlash 0.7s ease-out forwards;
            transform: translateY(-3px) scale(1.05);
            transition: transform 0.3s ease;
        }

        .master-stage-glow-red {
            animation: stageGlowFlashRed 0.7s ease-out forwards;
            transform: translateY(-3px) scale(1.05);
            transition: transform 0.3s ease;
        }

        .campaign-info {
            flex: 1;
            min-width: 0;
        }

        .campaign-song-name {
            font-size: 0.875rem;
            font-weight: 700;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: -0.01em;
        }

        .campaign-type {
            font-size: 0.625rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .campaign-delete {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: var(--text-tertiary);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .campaign-delete:hover {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

        /* Progress Dots */
        .stage-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--border-secondary);
            border: 2px solid var(--border-primary);
            transition: all 0.3s;
            cursor: pointer;
        }

        .stage-dot.inactive {
            background: #ef4444;
            border-color: #dc2626;
            box-shadow: 0 0 12px rgba(239, 68, 68, 0.5),
                0 0 24px rgba(239, 68, 68, 0.3);
        }

        .stage-dot.active.spotify {
            background: #1DB954;
            border-color: #1ed760;
            box-shadow: 0 0 12px rgba(29, 185, 84, 0.6),
                0 0 24px rgba(29, 185, 84, 0.4);
            animation: glow 2s ease-in-out infinite;
        }

        .stage-dot.active.soundcloud {
            background: #FF5500;
            border-color: #ff6a1f;
            box-shadow: 0 0 12px rgba(255, 85, 0, 0.6),
                0 0 24px rgba(255, 85, 0, 0.4);
            animation: glow 2s ease-in-out infinite;
        }

        .stage-dot.active.press {
            background: #fafafa;
            border-color: #e5e5e5;
            box-shadow: 0 0 12px rgba(250, 250, 250, 0.6),
                0 0 24px rgba(250, 250, 250, 0.4);
            animation: glow 2s ease-in-out infinite;
        }

        .stage-dot.active.global {
            background: #60a5fa;
            border-color: #93c5fd;
            box-shadow: 0 0 12px rgba(96, 165, 250, 0.6),
                0 0 24px rgba(96, 165, 250, 0.4);
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.6;
            }
        }

        .stage-connector {
            flex: 1;
            height: 2px;
            background: var(--border-secondary);
            margin: 0 4px;
            align-self: center;
            margin-bottom: 32px;
            transition: background 0.3s ease;
        }

        /* Quick Glance — Registry Tile */
        .quick-glance-tile {
            margin-top: 1rem;
            padding: 0.5rem 0.6rem;
            background: rgba(74, 222, 128, 0.02);
            border: 1px solid rgba(74, 222, 128, 0.06);
            border-radius: 0.5rem;
            box-shadow: inset 0 0 12px rgba(74, 222, 128, 0.02);
        }

        .quick-glance-tile:empty {
            display: none;
        }

        body.light-mode .quick-glance-tile {
            background: rgba(22, 163, 74, 0.03);
            border-color: rgba(22, 163, 74, 0.08);
            box-shadow: none;
        }

        .quick-campaign-row {
            padding: 0.15rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.2s ease;
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
            font-family: 'SF Mono', 'Cascadia Code', 'Consolas', 'Menlo', 'Monaco', monospace;
        }

        .quick-campaign-row:last-child {
            border-bottom: none;
        }

        .quick-campaign-row:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        body.light-mode .quick-campaign-row {
            border-bottom-color: rgba(0, 0, 0, 0.03);
        }

        body.light-mode .quick-campaign-row:hover {
            background: rgba(0, 0, 0, 0.02);
        }

        .quick-campaign-name {
            font-size: 0.5rem;
            font-weight: 500;
            color: #4ade80;
            text-shadow: 0 0 6px rgba(74, 222, 128, 0.3);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: 0.04em;
            text-transform: lowercase;
            animation: registryGlow 3s ease-in-out infinite alternate;
        }

        .quick-campaign-type {
            font-size: 0.45rem;
            color: #86efac;
            opacity: 0.5;
            text-shadow: 0 0 4px rgba(134, 239, 172, 0.15);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: 0.02em;
            text-transform: lowercase;
        }

        .quick-campaign-date {
            font-size: 0.4rem;
            color: #4ade80;
            opacity: 0.25;
            text-shadow: 0 0 3px rgba(74, 222, 128, 0.1);
            white-space: nowrap;
            margin-left: auto;
            flex-shrink: 0;
            letter-spacing: 0.02em;
        }

        body.light-mode .quick-campaign-name {
            color: #16a34a;
            text-shadow: none;
        }

        body.light-mode .quick-campaign-type {
            color: #22c55e;
            text-shadow: none;
        }

        body.light-mode .quick-campaign-date {
            color: #16a34a;
            text-shadow: none;
        }

        .quick-stage-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--border-secondary);
            border: 2px solid var(--border-primary);
            cursor: pointer;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .quick-stage-dot.inactive {
            background: linear-gradient(145deg, #ef4444 0%, #dc2626 100%);
            border-color: #b91c1c;
            box-shadow: 0 0 8px rgba(239, 68, 68, 0.5),
                0 0 16px rgba(239, 68, 68, 0.3);
        }

        .quick-stage-dot.active {
            background: linear-gradient(145deg, #60a5fa 0%, #3b82f6 100%);
            border-color: #2563eb;
            box-shadow: 0 0 8px rgba(96, 165, 250, 0.6),
                0 0 16px rgba(96, 165, 250, 0.4);
        }

        .quick-stage-dot:hover {
            transform: scale(1.3);
            filter: brightness(1.2);
        }

        .quick-stage-connector {
            flex: 1;
            height: 1.5px;
            background: var(--border-secondary);
            min-width: 12px;
            border-radius: 1px;
        }

        /* Campaign Row Tags */
        .campaign-tags {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            flex-shrink: 0;
            position: relative;
            flex-wrap: wrap;
            max-width: 220px;
        }

        .campaign-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 999px;
            background: rgba(239, 68, 68, 0.12);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.25);
            font-size: 0.65rem;
            font-weight: 600;
            white-space: nowrap;
            cursor: default;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            letter-spacing: 0.02em;
            animation: tagPillIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .campaign-tag.tag-removing {
            animation: tagPillOut 0.25s cubic-bezier(0.4, 0, 1, 1) forwards;
            pointer-events: none;
        }

        .campaign-tags.tags-editing .campaign-tag {
            transform: translateX(-6px);
            opacity: 0.7;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .campaign-tag:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.4);
        }

        .campaign-tag .tag-x {
            cursor: pointer;
            font-size: 10px;
            line-height: 1;
            opacity: 0.5;
            transition: opacity 0.15s ease;
            margin-left: 2px;
        }

        .campaign-tag .tag-x:hover {
            opacity: 1;
        }

        .tag-add-btn {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 1px dashed rgba(239, 68, 68, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: rgba(239, 68, 68, 0.4);
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            flex-shrink: 0;
        }

        .tag-add-btn:hover {
            border-color: #f87171;
            color: #f87171;
            background: rgba(239, 68, 68, 0.12);
            transform: scale(1.2);
            box-shadow: 0 0 10px rgba(248, 113, 113, 0.25);
            border-style: solid;
        }

        .tag-add-btn:active {
            transform: scale(0.9);
            box-shadow: 0 0 6px rgba(248, 113, 113, 0.4);
        }

        .tag-input-wrapper {
            position: relative;
            display: inline-flex;
            animation: tagPillIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .tag-input {
            width: 120px;
            height: 22px;
            padding: 0 6px;
            border-radius: 999px;
            border: 1px solid rgba(239, 68, 68, 0.3);
            background: rgba(239, 68, 68, 0.06);
            color: #f87171;
            font-size: 0.65rem;
            font-weight: 600;
            outline: none;
            transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .tag-input:focus {
            border-color: #f87171;
            background: rgba(248, 113, 113, 0.15);
            box-shadow: 0 0 12px rgba(248, 113, 113, 0.35), 0 0 4px rgba(248, 113, 113, 0.2);
        }

        .tag-suggest-dropdown {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            width: 160px;
            background: var(--bg-secondary);
            border: 1px solid rgba(239, 68, 68, 0.25);
            border-radius: 8px;
            z-index: 200;
            max-height: 180px;
            overflow-y: auto;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            animation: tagDropIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
            transform-origin: top left;
        }

        .tag-suggest-item {
            padding: 6px 10px;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 500;
            color: #f87171;
            transition: all 0.2s ease;
            border-bottom: 1px solid rgba(239, 68, 68, 0.08);
            background: transparent;
        }

        .tag-suggest-item:last-child {
            border-bottom: none;
        }

        .tag-suggest-item:hover {
            background: rgba(239, 68, 68, 0.1);
            padding-left: 14px;
            color: #fca5a5;
        }

        .tag-suggest-item.add-custom-tag {
            color: #fb923c;
            font-weight: 600;
            border-bottom: 1px solid rgba(239, 68, 68, 0.15);
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .stage-connector {
                margin-bottom: 28px;
            }

            .stage-dot {
                width: 10px;
                height: 10px;
            }

            /* Make campaign grid more mobile-friendly */
            #campaignsGrid {
                grid-template-columns: repeat(2, 1fr) !important;
                gap: 0.5rem;
            }

            /* Stack artist display on mobile */
            #artistDisplay {
                display: flex !important;
                margin-top: 1rem;
            }
        }

        @media (max-width: 480px) {
            #campaignsGrid {
                grid-template-columns: 1fr !important;
            }
        }

        /* === Tag Flutter Animations (POS-Inspired) === */
        @keyframes tagPillIn {
            0% {
                opacity: 0;
                transform: translateX(20px) scale(0.8);
            }

            100% {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }

        @keyframes tagPillOut {
            0% {
                opacity: 1;
                transform: scale(1);
            }

            100% {
                opacity: 0;
                transform: scale(0.4);
                max-width: 0;
                padding: 0;
                margin: 0;
                border-width: 0;
            }
        }

        @keyframes tagDropIn {
            0% {
                opacity: 0;
                transform: translateY(-8px) scale(0.95);
            }

            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes tagAddPulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.15);
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes registryGlow {
            0% {
                text-shadow: 0 0 6px rgba(74, 222, 128, 0.3);
                opacity: 0.85;
            }

            100% {
                text-shadow: 0 0 10px rgba(74, 222, 128, 0.5), 0 0 2px rgba(74, 222, 128, 0.2);
                opacity: 1;
            }
        }

        /* Countdown Ticker */
        #countdownTicker {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem 2rem;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 0.65rem;
            padding: 1.5rem;
            margin: 1.5rem 0;
            border-radius: 8px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-primary);
            animation: rowIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .ticker-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            animation: rowIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .ticker-entry {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            color: var(--text-secondary);
            transition: all 0.3s ease;
            flex: 1;
        }

        .ticker-entry .ticker-slash {
            color: var(--text-tertiary);
            margin-right: 0.2rem;
        }

        .ticker-entry .ticker-days {
            color: var(--text-primary);
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        .ticker-entry .ticker-separator {
            color: var(--text-tertiary);
            margin: 0 0.2rem;
        }

        .ticker-entry .ticker-song {
            color: var(--text-secondary);
        }

        .ticker-connector {
            flex: 1;
            height: 1px;
            background: var(--border-secondary);
            margin: 0 0.5rem;
            opacity: 0.5;
        }

        .ticker-entry.ticker-urgent {
            color: #ef4444;
            text-shadow: 0 0 10px rgba(239, 68, 68, 0.6), 0 0 20px rgba(239, 68, 68, 0.3);
        }

        .ticker-entry.ticker-urgent .ticker-days {
            color: #fca5a5;
            text-shadow: 0 0 8px rgba(239, 68, 68, 0.8);
        }

        .ticker-entry.ticker-complete {
            color: #22c55e;
        }

        .ticker-entry.ticker-complete .ticker-days {
            color: #4ade80;
            font-weight: 700;
        }

        /* Complete stage dot styling */
        .master-stage-dot.complete {
            background: linear-gradient(145deg, #4ade80, #22c55e);
            border-color: #16a34a;
            box-shadow: 0 0 12px rgba(74, 222, 128, 0.7),
                0 0 24px rgba(74, 222, 128, 0.4),
                0 2px 4px rgba(0, 0, 0, 0.2),
                inset 0 1px 1px rgba(255, 255, 255, 0.3),
                inset 0 -1px 1px rgba(0, 0, 0, 0.2);
        }

        .platform-stage-dot.complete {
            background: linear-gradient(145deg, #4ade80, #22c55e);
            border-color: #16a34a;
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.85),
                0 0 40px rgba(74, 222, 128, 0.45),
                0 5px 10px rgba(34, 197, 94, 0.35),
                0 2px 5px rgba(0, 0, 0, 0.25),
                inset 0 2px 3px rgba(255, 255, 255, 0.4),
                inset 0 -2px 3px rgba(0, 0, 0, 0.3);
        }

        .mini-dot.complete {
            background: #4ade80;
            box-shadow: 0 0 10px rgba(74, 222, 128, 0.6),
                0 0 20px rgba(74, 222, 128, 0.3),
                inset 0 1px 1px rgba(255, 255, 255, 0.4);
        }

        .quick-stage-dot.complete {
            background: linear-gradient(145deg, #4ade80, #22c55e);
            border-color: #16a34a;
            box-shadow: 0 0 12px rgba(74, 222, 128, 0.7),
                0 0 24px rgba(74, 222, 128, 0.4);
        }

        #countdownTicker:empty {
            display: none;
        }
    </style>
</head>

        // Theme Toggle
        function toggleTheme() {
            const body = document.body;
            const isDark = !body.classList.contains('light-mode');

            if (isDark) {
                body.classList.add('light-mode');
                document.getElementById('themeIconDark').style.display = 'none';
                document.getElementById('themeIconLight').style.display = 'block';
            } else {
                body.classList.remove('light-mode');
                document.getElementById('themeIconDark').style.display = 'block';
                document.getElementById('themeIconLight').style.display = 'none';
            }

            // Update particle colors
            updateParticleColors();
