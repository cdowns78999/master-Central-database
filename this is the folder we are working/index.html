<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medicine Reminder</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #faf7f2;
            color: #333;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 30px 16px;
        }

        .container {
            width: 100%;
            max-width: 520px;
        }

        /* ── Header ── */
        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        .header .icon {
            font-size: 3rem;
            margin-bottom: 8px;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #2d6a4f;
        }

        .header .subtitle {
            font-size: 1.1rem;
            color: #888;
            margin-top: 4px;
        }

        .clock {
            text-align: center;
            font-size: 2.6rem;
            font-weight: 700;
            color: #2d6a4f;
            margin-bottom: 24px;
            letter-spacing: 2px;
        }

        /* ── Add Medicine ── */
        .add-section {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        .add-section label {
            font-size: 1.1rem;
            font-weight: 600;
            color: #555;
            display: block;
            margin-bottom: 8px;
        }

        .add-section input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 1.2rem;
            outline: none;
            margin-bottom: 12px;
            transition: border-color 0.2s;
        }

        .add-section input[type="text"]:focus {
            border-color: #2d6a4f;
        }

        .time-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }

        .time-row input[type="time"] {
            flex: 1;
            padding: 12px 14px;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 1.3rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .time-row input[type="time"]:focus {
            border-color: #2d6a4f;
        }

        .timer-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }

        .timer-row label {
            margin-bottom: 0 !important;
            white-space: nowrap;
        }

        .timer-row select {
            flex: 1;
            padding: 12px 14px;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 1.2rem;
            outline: none;
            background: #fff;
        }

        .add-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: #2d6a4f;
            color: #fff;
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }

        .add-btn:hover {
            background: #1b4332;
        }

        /* ── Medicine List ── */
        .med-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .med-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 18px 20px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            border-left: 6px solid #2d6a4f;
            transition: all 0.3s;
        }

        .med-item.taken {
            border-left-color: #aaa;
            opacity: 0.5;
        }

        .med-item.taken .med-name {
            text-decoration: line-through;
            color: #aaa;
        }

        .med-info {
            flex: 1;
        }

        .med-name {
            font-size: 1.4rem;
            font-weight: 700;
            color: #333;
        }

        .med-time {
            font-size: 1.1rem;
            color: #2d6a4f;
            font-weight: 600;
            margin-top: 2px;
        }

        .med-timer-status {
            font-size: 0.95rem;
            color: #b85c1f;
            font-weight: 600;
            margin-top: 2px;
        }

        .taken-btn {
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            background: #2d6a4f;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .taken-btn:hover {
            background: #1b4332;
        }

        .med-item.taken .taken-btn {
            background: #aaa;
        }

        .remove-btn {
            background: none;
            border: none;
            color: #ccc;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 4px 8px;
            transition: color 0.2s;
        }

        .remove-btn:hover {
            color: #d44;
        }

        .empty-msg {
            text-align: center;
            color: #aaa;
            font-size: 1.2rem;
            padding: 40px 0;
        }

        /* ── ALERT OVERLAY ── */
        .alert-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .alert-overlay.active {
            display: flex;
        }

        .alert-box {
            background: #fff;
            border-radius: 24px;
            padding: 40px 32px;
            text-align: center;
            max-width: 420px;
            width: 90%;
            animation: pulse 1s ease-in-out infinite alternate;
            box-shadow: 0 0 60px rgba(45,106,79,0.5);
        }

        @keyframes pulse {
            from { transform: scale(1); box-shadow: 0 0 40px rgba(45,106,79,0.4); }
            to { transform: scale(1.03); box-shadow: 0 0 80px rgba(45,106,79,0.7); }
        }

        .alert-box .alert-icon {
            font-size: 5rem;
            margin-bottom: 12px;
        }

        .alert-box h2 {
            font-size: 2rem;
            color: #2d6a4f;
            margin-bottom: 8px;
        }

        .alert-box .alert-med-name {
            font-size: 1.6rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 20px;
        }

        .alert-box button {
            padding: 18px 48px;
            border: none;
            border-radius: 14px;
            background: #2d6a4f;
            color: #fff;
            font-size: 1.4rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }

        .alert-box button:hover {
            background: #1b4332;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="icon">💊</div>
            <h1>Medicine Reminder</h1>
            <p class="subtitle">Never miss a dose</p>
        </div>

        <div class="clock" id="clock"></div>

        <!-- Add Medicine -->
        <div class="add-section">
            <label>Medicine Name</label>
            <input type="text" id="medName" placeholder="e.g. Blood Pressure Pill" />

            <label>Set a Time</label>
            <div class="time-row">
                <input type="time" id="medTime" />
            </div>

            <label>Or Set a Timer</label>
            <div class="timer-row">
                <select id="medTimer">
                    <option value="0">No timer</option>
                    <option value="5">5 minutes</option>
                    <option value="10">10 minutes</option>
                    <option value="15">15 minutes</option>
                    <option value="30">30 minutes</option>
                    <option value="45">45 minutes</option>
                    <option value="60">1 hour</option>
                    <option value="120">2 hours</option>
                    <option value="240">4 hours</option>
                    <option value="480">8 hours</option>
                </select>
            </div>

            <button class="add-btn" onclick="addMedicine()">Add Reminder</button>
        </div>

        <!-- Medicine List -->
        <ul class="med-list" id="medList"></ul>
    </div>

    <!-- Alert Overlay -->
    <div class="alert-overlay" id="alertOverlay">
        <div class="alert-box">
            <div class="alert-icon">🔔</div>
            <h2>Time to Take</h2>
            <p class="alert-med-name" id="alertMedName"></p>
            <button onclick="dismissAlert()">I Took It</button>
        </div>
    </div>

    <script>
        let meds = JSON.parse(localStorage.getItem('meds') || '[]');
        let activeTimers = {};
        let alertQueue = [];
        let alertAudio = null;

        // ── Clock ──
        function updateClock() {
            const now = new Date();
            let h = now.getHours();
            const m = String(now.getMinutes()).padStart(2, '0');
            const ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            document.getElementById('clock').textContent = h + ':' + m + ' ' + ampm;
        }
        updateClock();
        setInterval(updateClock, 1000);

        // ── Save / Load ──
        function save() {
            localStorage.setItem('meds', JSON.stringify(meds));
        }

        // ── Add Medicine ──
        function addMedicine() {
            const name = document.getElementById('medName').value.trim();
            const time = document.getElementById('medTime').value;
            const timerMin = parseInt(document.getElementById('medTimer').value);

            if (!name) return;

            const med = {
                id: Date.now(),
                name: name,
                time: time || null,
                timerMin: timerMin || 0,
                timerEnd: timerMin > 0 ? Date.now() + timerMin * 60000 : null,
                taken: false
            };

            meds.push(med);
            document.getElementById('medName').value = '';
            document.getElementById('medTime').value = '';
            document.getElementById('medTimer').value = '0';
            save();
            render();

            if (med.timerEnd) startTimer(med);
            if (med.time) startTimeCheck(med);
        }

        // ── Timer Logic ──
        function startTimer(med) {
            const remaining = med.timerEnd - Date.now();
            if (remaining <= 0) {
                triggerAlert(med);
                return;
            }
            activeTimers[med.id] = setTimeout(() => {
                triggerAlert(med);
            }, remaining);
        }

        // ── Time-of-Day Check ──
        function startTimeCheck(med) {
            // checked every 15 seconds in the main loop
        }

        setInterval(() => {
            const now = new Date();
            const currentTime = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');

            meds.forEach(med => {
                if (med.time && !med.taken && med.time === currentTime) {
                    if (!med._alerted) {
                        med._alerted = true;
                        triggerAlert(med);
                    }
                }
                // reset alert flag when minute passes
                if (med.time && med.time !== currentTime) {
                    med._alerted = false;
                }
            });

            updateTimerDisplays();
        }, 5000);

        // ── Alert ──
        function triggerAlert(med) {
            alertQueue.push(med);
            if (alertQueue.length === 1) showNextAlert();
        }

        function showNextAlert() {
            if (alertQueue.length === 0) {
                document.getElementById('alertOverlay').classList.remove('active');
                stopSound();
                return;
            }

            const med = alertQueue[0];
            document.getElementById('alertMedName').textContent = med.name;
            document.getElementById('alertOverlay').classList.add('active');
            playSound();
        }

        function dismissAlert() {
            const med = alertQueue.shift();
            if (med) {
                const found = meds.find(m => m.id === med.id);
                if (found) found.taken = true;
                save();
                render();
            }
            showNextAlert();
        }

        // ── Sound (simple beep using Web Audio) ──
        function playSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                function beep() {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.frequency.value = 800;
                    osc.type = 'sine';
                    gain.gain.value = 0.3;
                    osc.start();
                    osc.stop(ctx.currentTime + 0.2);
                }
                beep();
                alertAudio = setInterval(beep, 1500);
            } catch(e) {}
        }

        function stopSound() {
            if (alertAudio) {
                clearInterval(alertAudio);
                alertAudio = null;
            }
        }

        // ── Toggle Taken ──
        function toggleTaken(id) {
            const med = meds.find(m => m.id === id);
            if (med) med.taken = !med.taken;
            save();
            render();
        }

        // ── Remove ──
        function removeMed(id) {
            if (activeTimers[id]) clearTimeout(activeTimers[id]);
            meds = meds.filter(m => m.id !== id);
            save();
            render();
        }

        // ── Timer Display Updates ──
        function updateTimerDisplays() {
            meds.forEach(med => {
                const el = document.getElementById('timer-' + med.id);
                if (el && med.timerEnd && !med.taken) {
                    const left = med.timerEnd - Date.now();
                    if (left > 0) {
                        const mins = Math.floor(left / 60000);
                        const secs = Math.floor((left % 60000) / 1000);
                        el.textContent = mins + 'm ' + secs + 's remaining';
                    } else {
                        el.textContent = 'Timer done!';
                    }
                }
            });
        }

        // ── Render ──
        function render() {
            const list = document.getElementById('medList');

            if (meds.length === 0) {
                list.innerHTML = '<li class="empty-msg">No medicines added yet</li>';
                return;
            }

            list.innerHTML = meds.map(m => {
                let timeLabel = '';
                if (m.time) {
                    const [h, min] = m.time.split(':');
                    let hr = parseInt(h);
                    const ampm = hr >= 12 ? 'PM' : 'AM';
                    hr = hr % 12 || 12;
                    timeLabel = 'Daily at ' + hr + ':' + min + ' ' + ampm;
                }

                let timerLabel = '';
                if (m.timerEnd && !m.taken) {
                    timerLabel = '<span class="med-timer-status" id="timer-' + m.id + '"></span>';
                }

                return '<li class="med-item ' + (m.taken ? 'taken' : '') + '">' +
                    '<div class="med-info">' +
                        '<div class="med-name">' + m.name.replace(/</g, '&lt;') + '</div>' +
                        (timeLabel ? '<div class="med-time">' + timeLabel + '</div>' : '') +
                        timerLabel +
                    '</div>' +
                    '<button class="taken-btn" onclick="toggleTaken(' + m.id + ')">' + (m.taken ? 'Undo' : 'Taken') + '</button>' +
                    '<button class="remove-btn" onclick="removeMed(' + m.id + ')">&times;</button>' +
                '</li>';
            }).join('');

            updateTimerDisplays();
        }

        // ── Init: restart any active timers from storage ──
        meds.forEach(med => {
            if (med.timerEnd && !med.taken) startTimer(med);
        });

        render();
        setInterval(updateTimerDisplays, 1000);
    </script>
</body>
</html>
