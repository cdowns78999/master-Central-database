<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Hub - Recipes, Safety, Business</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@300;500;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <header class="hero">
        <div class="hero-container">
            <div class="hero-image-wrapper">
                <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=2070&auto=format&fit=crop"
                    alt="Hero Food" class="hero-image">
            </div>
            <div class="hero-content">
                <h1 class="hero-title">Food Strategy & Knowledge Hub</h1>
                <p class="hero-subtitle">A curated collection of culinary recipes, food safety protocols, and business
                    evolution strategies.</p>
                <div class="hub-nav">
                    <button class="pill-button active" data-view="recipes">Cooking Recipes Hub</button>
                    <button class="pill-button" data-view="safety">Safety Library Hub</button>
                    <button class="pill-button" data-view="business">Food Business Hub</button>
                </div>
            </div>
        </div>
    </header>

    <main class="content-container">
        <!-- Recipes Hub -->
        <section id="recipes-hub" class="hub-section">
            <div class="section-header">
                <input type="text" id="recipe-search" placeholder="Search recipes (e.g. 'Apple Pie', 'A')..."
                    autocomplete="off">
                <div id="autosuggest-list" class="autosuggest-list"></div>

                <div class="alphabet-filter">
                    <!-- JS populated -->
                </div>
            </div>

            <div class="gallery-preview" id="recipe-gallery">
                <!-- JS populated with 3-4 items -->
            </div>

            <div class="recipe-grid" id="recipe-grid">
                <!-- JS populated -->
                <div class="drop-zone" id="recipe-drop-zone">
                    <span>Drag & Drop Link or Text to Add Recipe</span>
                </div>
            </div>
        </section>

        <!-- Safety Hub -->
        <section id="safety-hub" class="hub-section hidden">
            <div class="safety-layout">
                <aside class="safety-sidebar">
                    <ul id="safety-categories">
                        <li class="active" data-category="all">All Topics</li>
                        <li data-category="storage">Storage</li>
                        <li data-category="temp">Temperature</li>
                        <li data-category="handling">Handling</li>
                    </ul>
                </aside>
                <div class="safety-content" id="safety-grid">
                    <!-- JS populated -->
                </div>
            </div>
        </section>

        <!-- Business Hub -->
        <section id="business-hub" class="hub-section hidden">
            <div class="business-layout">
                <div class="business-tabs">
                    <button class="tab-btn active" data-brand="pioneer">Pioneer Woman History</button>
                    <button class="tab-btn" data-brand="fmr">FMR Business History</button>
                    <button class="tab-btn" data-brand="notes">Combined Study Notes</button>
                </div>
                <div class="business-narrative" id="business-narrative">
                    <!-- JS populated -->
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Anti Gravity Food Engine. All rights reserved.</p>
    </footer>

    <!-- Modal for Recipe Pump Card -->
    <div id="recipe-modal" class="modal hidden">
        <div class="modal-content">
            <button class="close-modal">&times;</button>
            <div id="modal-body">
                <!-- JS populated -->
            </div>
        </div>
    </div>

    <!-- Loading Spinner -->
    <div id="loading-spinner" class="spinner-overlay hidden">
        <div class="spinner"></div>
    </div>

    <script src="scripts/app.js"></script>
</body>

</html>
