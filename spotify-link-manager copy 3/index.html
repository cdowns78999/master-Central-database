<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Link Manager | Master View</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&family=Outfit:wght@400;600;800;900&display=swap"
        rel="stylesheet">
</head>

<body data-page-category="Top 20 Overall">
    <!-- Ambient Background -->
    <div class="bg-overlay"></div>
    <div class="ambient-glow g1"></div>
    <div class="ambient-glow g2"></div>

    <main class="master-container">
        <!-- Navigation / Control Bar -->
        <header class="control-bar">
            <div class="control-left">
                <!-- Cycle Button -->
                <div id="mode-trigger" class="circle-btn" title="Left Click: Selection Mode | Right Click: Sorting">
                    <div class="circle-inner"></div>
                </div>
                <h1 class="master-title">Top 20 Overall</h1>
            </div>

            <div class="control-right">
                <!-- Sorting Button -->
                <button id="sort-trigger" class="blue-pill secondary">
                    <span class="pill-text">MASTER OPTIONS</span>
                </button>

                <button id="load-trigger" class="blue-pill secondary">
                    <span class="pill-text">LOAD JSON</span>
                </button>

                <!-- Share JSON Button -->
                <button id="share-trigger" class="blue-pill">
                    <span class="pill-text">SHARE JSON</span>
                </button>

                <input type="file" id="json-input" style="display: none;" accept=".json">

                <!-- Journey Link -->
                <a href="journey/journey_01_the_vision.md" target="_blank" class="journey-btn">
                    <span class="icon">📜</span>
                </a>
            </div>
        </header>

        <!-- Selection Mode Overlay (Hidden by Default) -->
        <div id="selection-overlay" class="selection-overlay hidden">
            <div class="overlay-header">
                <h3>Selection Mode</h3>
                <p>Drag and drop playlists here to curate your list</p>
            </div>
            <div id="drop-zone" class="drop-zone">
                <!-- Dragged items appear here -->
            </div>
        </div>

        <!-- Scrollable Grid View -->
        <section class="grid-section">
            <div id="grid-root" class="master-grid">
                <!-- Data injected here -->
            </div>
        </section>
    </main>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>

</html>
