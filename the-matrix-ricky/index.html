<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MATRIX: RICKY | Mission Control</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;500&family=Inter:wght@300;400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="matrix-theme">
    <div class="scanlines"></div>
    <div class="vignette"></div>

    <header class="commander-header">
        <div class="logo-area">
            <h1 class="hud-glitch" data-text="L1 // THE MATRIX">L1 // THE MATRIX</h1>
            <div class="mission-label">PROJECT: RICKY (SPACE WAV // RICH FURNISS)</div>
        </div>
        <nav class="view-selector">
            <button class="view-btn active" data-view="linear">LINEAR STACK</button>
            <button class="view-btn" data-view="kanban">KANBAN TRACK</button>
            <button class="view-btn" data-view="hub">HUB & SPOKE</button>
            <button class="view-btn" data-view="tile">FATHER'S PATH</button>
            <button class="view-btn" data-view="swimlane">SWIMLANES</button>
        </nav>
        <div class="hud-telemetry">
            <span class="status-blink">SYSTEM: ONLINE</span>
            <span class="timestamp" id="hud-clock">14:21:00</span>
        </div>
    </header>

    <main class="master-container" id="main-view">
        <!-- Views will be injected here by design-views.js -->
    </main>

    <aside class="workflow-drawer closed" id="workflow-panel">
        <div class="drawer-header">
            <h3>40-PHASE MISSION LOG</h3>
            <button class="toggle-drawer" id="close-drawer">×</button>
        </div>
        <div class="workflow-content" id="workflow-steps">
            <!-- 40 Phases injected here by workflow.js -->
        </div>
        <div class="drawer-footer">
            <div class="progress-bar-container">
                <div class="progress-fill" id="total-progress"></div>
            </div>
            <div class="progress-text">MISSION READINESS: <span id="progress-percent">0%</span></div>
        </div>
    </aside>

    <section class="training-deck">
        <div class="deck-header">
            <h4>TRAINING DECK // RAW_FEED</h4>
        </div>
        <div class="video-grid" id="training-videos">
            <!-- YouTube Raw URLs and embeds injected here -->
        </div>
    </section>

    <button class="fab-workflow" id="open-workflow">MISSION LOG</button>

    <script src="workflow.js"></script>
    <script src="design-views.js"></script>
    <script src="app.js"></script>
</body>

</html>
