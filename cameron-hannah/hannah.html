<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#050505">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Hannah | Premium Experience</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="app.css">
    <style>
        /* Hannah-specific accent overrides */
        :root {
            --accent-pink: #9333ea;
            --accent-secondary: #00d4ff;
        }

        .avatar {
            background: linear-gradient(135deg, #9333ea 0%, #00d4ff 50%, #7dd3fc 100%);
        }

        .avatar-glow {
            background: linear-gradient(135deg, #9333ea, #00d4ff);
        }

        .avatar-ring {
            background: linear-gradient(var(--bg-dark), var(--bg-dark)) padding-box,
                        linear-gradient(135deg, #9333ea, #00d4ff, #7dd3fc) border-box;
        }

        .title {
            background: linear-gradient(135deg, #fff 0%, #9333ea 50%, #00d4ff 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tile--love:hover { box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), 0 0 30px rgba(147, 51, 234, 0.3); }
        .tile--joy:hover { box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), 0 0 30px rgba(0, 212, 255, 0.3); }

        .modal-close {
            background: linear-gradient(135deg, #9333ea, #00d4ff);
        }

        .modal-close:hover {
            box-shadow: 0 10px 30px rgba(147, 51, 234, 0.4);
        }
    </style>
</head>
<body class="profile-page">
    <!-- Loading Screen -->
    <div class="loading-screen">
        <div class="loader"></div>
        <p class="loading-text">Loading magic...</p>
    </div>

    <!-- Animated Background -->
    <div class="bg-gradient"></div>
    <div class="bg-mesh"></div>

    <!-- Floating Shapes -->
    <div class="floating-shapes">
        <div class="shape shape--1" style="background: #9333ea;"></div>
        <div class="shape shape--2" style="background: #00d4ff;"></div>
        <div class="shape shape--3" style="background: #7dd3fc;"></div>
    </div>

    <!-- Particles Container -->
    <div class="particles" id="particles"></div>

    <!-- Main App Container -->
    <div class="app">
        <!-- Header -->
        <header class="app-header">
            <a href="index.html" class="back-btn" style="position: static;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"></path>
                </svg>
                Back
            </a>
            <nav class="nav">
                <button class="nav-btn" data-action="theme">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"></circle>
                        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
                    </svg>
                </button>
            </nav>
        </header>

        <!-- Profile Section -->
        <section class="scene">
            <div class="scene-content" id="parallaxContainer">
                <!-- Profile Card -->
                <div class="glass-card profile-card">
                    <!-- Avatar -->
                    <div class="avatar-wrapper">
                        <div class="avatar-ring"></div>
                        <div class="avatar-glow"></div>
                        <div class="avatar">H</div>
                    </div>

                    <!-- Name & Subtitle -->
                    <h1 class="title">Hannah</h1>
                    <p class="subtitle">Spreading Joy & Light</p>

                    <!-- Interactive Tiles -->
                    <div class="tile-grid">
                        <div class="tile tile--love" data-action="love">
                            <span class="tile-icon">&#10084;&#65039;</span>
                            <span class="tile-label">Radiant Heart</span>
                        </div>

                        <div class="tile tile--joy" data-action="joy">
                            <span class="tile-icon">&#128522;</span>
                            <span class="tile-label">Endless Joy</span>
                        </div>

                        <div class="tile tile--magic" data-action="magic">
                            <span class="tile-icon">&#10024;</span>
                            <span class="tile-label">You're Fucking Awesome</span>
                        </div>

                        <div class="tile tile--surprise" data-action="surprise">
                            <span class="tile-icon">&#127881;</span>
                            <span class="tile-label">Surprise</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="app-footer">
            <p>Made with <span class="heart">&#10084;</span> just for Hannah</p>
        </footer>
    </div>

    <!-- Surprise Modal -->
    <div class="modal" id="surpriseModal">
        <div class="modal-content">
            <span class="modal-icon">&#127873;</span>
            <h3 class="modal-title">Hey Hannah!</h3>
            <p class="modal-text">
                You are pure magic in human form.
                Your light touches everyone around you.
                Never stop being the incredible person you are!
            </p>
            <button class="modal-close" onclick="closeModal()">&#10084; Thank You!</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
