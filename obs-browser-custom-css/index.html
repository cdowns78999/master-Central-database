<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OBS Ticker Builder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- TOP NAV: List Selector -->
  <nav class="list-nav">
    <span class="nav-label">Collection</span>
    <div id="list-nav-btns"></div>
  </nav>

  <!-- CONTROLS: Theme + Border -->
  <div class="controls">
    <div class="control-group">
      <span class="group-label">Theme</span>
      <div id="theme-btns"></div>
    </div>
    <div class="divider"></div>
    <div class="control-group">
      <span class="group-label">Border</span>
      <div id="border-btns"></div>
    </div>
  </div>

  <!-- PREVIEW GRID -->
  <div class="previews" id="preview-grid"></div>

  <script src="app.js"></script>
</body>
</html>
