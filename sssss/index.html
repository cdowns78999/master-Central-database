<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 540px;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 24px;
            font-weight: 600;
        }

        .input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }

        .input-row input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #333;
            border-radius: 8px;
            background: #16213e;
            color: #eee;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-row input:focus {
            border-color: #0f3460;
        }

        .input-row button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background: #e94560;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .input-row button:hover {
            background: #c73652;
        }

        .filters {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .filters button {
            padding: 6px 14px;
            border: 1px solid #333;
            border-radius: 20px;
            background: transparent;
            color: #aaa;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filters button.active {
            background: #e94560;
            border-color: #e94560;
            color: #fff;
        }

        .task-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: #16213e;
            border-radius: 8px;
            transition: opacity 0.3s, transform 0.3s;
        }

        .task-item.done {
            opacity: 0.5;
        }

        .task-item.done .task-text {
            text-decoration: line-through;
        }

        .task-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #e94560;
            cursor: pointer;
        }

        .task-text {
            flex: 1;
            font-size: 1rem;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #555;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 4px;
            transition: color 0.2s;
        }

        .delete-btn:hover {
            color: #e94560;
        }

        .empty {
            text-align: center;
            color: #555;
            padding: 32px 0;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Task Manager</h1>

        <div class="input-row">
            <input type="text" id="taskInput" placeholder="Add a new task..." />
            <button onclick="addTask()">Add</button>
        </div>

        <div class="filters">
            <button class="active" onclick="setFilter('all', this)">All</button>
            <button onclick="setFilter('active', this)">Active</button>
            <button onclick="setFilter('done', this)">Done</button>
        </div>

        <ul class="task-list" id="taskList"></ul>
    </div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
        let filter = 'all';

        const input = document.getElementById('taskInput');
        const list = document.getElementById('taskList');

        input.addEventListener('keydown', e => {
            if (e.key === 'Enter') addTask();
        });

        function save() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }

        function addTask() {
            const text = input.value.trim();
            if (!text) return;
            tasks.push({ text, done: false, id: Date.now() });
            input.value = '';
            save();
            render();
        }

        function toggleTask(id) {
            const t = tasks.find(t => t.id === id);
            if (t) t.done = !t.done;
            save();
            render();
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            save();
            render();
        }

        function setFilter(f, btn) {
            filter = f;
            document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        function render() {
            const filtered = tasks.filter(t => {
                if (filter === 'active') return !t.done;
                if (filter === 'done') return t.done;
                return true;
            });

            if (filtered.length === 0) {
                list.innerHTML = '<li class="empty">No tasks yet</li>';
                return;
            }

            list.innerHTML = filtered.map(t => `
                <li class="task-item ${t.done ? 'done' : ''}">
                    <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask(${t.id})" />
                    <span class="task-text">${t.text.replace(/</g, '&lt;')}</span>
                    <button class="delete-btn" onclick="deleteTask(${t.id})">&#x2715;</button>
                </li>
            `).join('');
        }

        render();
    </script>
</body>
</html>
