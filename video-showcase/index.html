<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Video Tools Showcase</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Outfit:wght@300;600;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="bg-animate"></div>

    <main class="container">
        <header class="hero">
            <h1 class="glitch" data-text="THE JOURNEY">THE JOURNEY</h1>
            <p class="subtitle">A Father's Path Through The Matrix</p>
        </header>

        <div class="matrix-grid">c
            <!-- Unreal Engine 5 -->
            <div class="tile-wrapper" id="ue5">
                <div class="tile ue5-theme" onclick="drillDown('ue5')">
                    <div class="tile-content">
                        <span class="tool-label">UNREAL ENGINE 5</span>
                        <div class="layer-indicator">L1: THE MATRIX</div>
                    </div>
                </div>
            </div>

            <!-- Pulsar VS -->
            <div class="tile-wrapper" id="pulsar">
                <div class="tile pulsar-theme" onclick="drillDown('pulsar')">
                    <div class="tile-content">
                        <span class="tool-label">PULSAR VS</span>
                        <div class="layer-indicator">L1: THE MATRIX</div>
                    </div>
                </div>
            </div>

            <!-- DaVinci Resolve -->
            <div class="tile-wrapper" id="resolve">
                <div class="tile resolve-theme" onclick="drillDown('resolve')">
                    <div class="tile-content">
                        <span class="tool-label">DAVINCI RESOLVE</span>
                        <div class="layer-indicator">L1: THE MATRIX</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Drill-down Overlay -->
        <div id="overlay" class="overlay hidden">
            <button class="close-btn" onclick="closeDrill()">×</button>
            <div id="overlay-content" class="overlay-inner">
                <!-- Dynamic Content Injected Here -->
            </div>

        </div>
    </main>

    <script src="app.js"></script>
</body>

</html>
