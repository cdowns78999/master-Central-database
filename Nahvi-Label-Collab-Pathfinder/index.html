<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nahvi | Label Collab Pathfinder</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@300;500;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="dashboard">
        <!-- Persistence Hub -->
        <div class="persistence-hub">
            <div class="floppy-trigger floppy-pink" onclick="exportData()" title="Export JSON">
                <div class="persistence-label">EXPORT PATH</div>
                <div class="floppy-3d-container">
                    <div class="floppy-disk-3d">
                        <div class="floppy-face front">
                            <div class="floppy-shutter"></div>
                            <div class="floppy-label">
                                <div class="floppy-line"></div>
                                <div class="floppy-line"></div>
                            </div>
                        </div>
                        <div class="floppy-face back"></div>
                    </div>
                </div>
            </div>

            <div class="floppy-trigger floppy-cyan" onclick="document.getElementById('import-input').click()"
                title="Import JSON">
                <div class="persistence-label">IMPORT PATH</div>
                <div class="floppy-3d-container">
                    <div class="floppy-disk-3d">
                        <div class="floppy-face front">
                            <div class="floppy-shutter"></div>
                            <div class="floppy-label">
                                <div class="floppy-line"></div>
                                <div class="floppy-line"></div>
                            </div>
                        </div>
                        <div class="floppy-face back"></div>
                    </div>
                </div>
            </div>
            <input type="file" id="import-input" hidden accept=".json" onchange="importData(this)">
        </div>

        <header class="main-header">
            <div class="brand">
                <span class="pill">STRATEGIC PATHFINDER</span>
                <h1>Nahvi <span class="accent">& Crew</span></h1>
                <p class="subtitle">The Ascension Course: From Catalyst to Destination</p>
            </div>
            <div class="stats-overview">
                <div class="stat-item">
                    <span class="label">Total Targets</span>
                    <span class="value">40+</span>
                </div>
                <div class="stat-item">
                    <span class="label">Path Status</span>
                    <span class="value accent">Optimizing</span>
                </div>
            </div>
        </header>

        <section class="pathway-grid">
            <!-- Sector A: Catalyst Labels -->
            <div class="sector mid-labels" id="sector-mid">
                <div class="sector-header">
                    <h2><span class="icon">🚀</span> Catalyst Labels</h2>
                    <p>The Mid-Tier Entrance</p>
                </div>
                <div class="card-container" id="mid-list">
                    <!-- Cards injected by JS -->
                </div>
            </div>

            <!-- Sector B: Artist Bridge -->
            <div class="sector artist-bridge" id="sector-artists">
                <div class="sector-header">
                    <h2><span class="icon">🤝</span> Orbit Artists</h2>
                    <p>Strategic Collaboration Bridge</p>
                </div>
                <div class="card-container" id="artist-list">
                    <!-- Cards injected by JS -->
                </div>
            </div>

            <!-- Sector C: Destination Labels -->
            <div class="sector big-labels" id="sector-big">
                <div class="sector-header">
                    <h2><span class="icon">👑</span> Destination Labels</h2>
                    <p>Major Label End-Goal</p>
                </div>
                <div class="card-container" id="big-list">
                    <!-- Cards injected by JS -->
                </div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>

</html>
