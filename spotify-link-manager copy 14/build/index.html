<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Link Manager</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&family=Outfit:wght@400;600;800;900&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- Ambient Glow Effects -->
    <div class="ambient-glow ambient-glow-1"></div>
    <div class="ambient-glow ambient-glow-2"></div>
    <div class="ambient-glow ambient-glow-3"></div>

    <aside class="sidebar">
        <div class="logo-container">
            <div class="logo-circle" id="logoCircle"></div>
        </div>
        <nav class="nav-links">
            <a href="#" class="nav-item active" title="Playlists">S</a>
        </nav>
        <div class="sidebar-footer">
            <div class="nav-item" id="mdButton" title="Changelog">MD</div>
        </div>
    </aside>

    <div class="main-wrapper">
        <header class="top-bar">
            <div class="top-bar-left">
                <span class="app-name">spotify link manager</span>
            </div>
            <div class="top-bar-right">
                <div class="user-profile">
                    <div class="user-avatar"></div>
                    <span>Chad Downs</span>
                </div>
            </div>
        </header>

        <!-- Selection Mode Overlay -->
        <div id="selectionOverlay" class="selection-overlay">
            <div class="selection-header">
                <span class="selection-badge" id="selectionBadge">0 selected</span>
                <span class="selection-label">Drag playlists here</span>
            </div>
            <div class="selection-drop-zone" id="selectionDropZone">
                <div class="drop-placeholder" id="dropPlaceholder">Drop playlists into this zone</div>
                <div class="selection-items" id="selectionItems"></div>
            </div>
        </div>

        <main class="content-area">
            <div class="content-header">
                <h2 id="current-view-title" class="section-title">Top 20 Overall</h2>
            </div>

            <div id="grid-root">
                <!-- Data will be injected here by app.js -->
            </div>
        </main>
    </div>

    <!-- Sort Menu -->
    <div id="sortMenu" class="sort-menu">
        <div class="sort-option" data-sort="name">Playlist A–Z</div>
        <div class="sort-option" data-sort="curator">Curator A–Z</div>
        <div class="sort-option" data-sort="tag">Tag A–Z</div>
    </div>

    <!-- MD Changelog Panel -->
    <div id="mdPanel" class="md-panel">
        <div class="md-panel-header">Changelog</div>
        <div class="md-panel-entries" id="mdEntries"></div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>

</html>
