<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Avicii | RaveRafting</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap">
    <style>
        :root {
            --primary: #0072ff;
            --bg: #0a0a0c;
            --text: #fff;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            padding: 4rem;
        }

        .hero {
            height: 300px;
            background: linear-gradient(to right, #00c6ff, #0072ff);
            display: flex;
            align-items: flex-end;
            padding: 2rem;
            border-radius: 20px;
        }

        h1 {
            font-size: 4rem;
            margin: 0;
        }

        .content {
            max-width: 800px;
            margin: 2rem 0;
            font-size: 1.2rem;
            border-left: 4px solid var(--primary);
            padding-left: 2rem;
        }

        a {
            color: var(--primary);
            text-decoration: none;
        }
    </style>
</head>

<body>
    <a href="index.html">&larr; Back</a>
    <div class="hero">
        <h1>Avicii</h1>
    </div>
    <div class="content">
        <p>Tim Bergling, or more popularly known as Avicii all over the world, is not only a Swedish DJ, but also a
            record producer and remixer known for "LEVELS".</p>
    </div>
</body>

</html>
