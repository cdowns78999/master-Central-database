<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>EDC New York | RaveRafting</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap">
    <style>
        :root {
            --primary: #ff00ff;
            --accent: #00ffcc;
            --bg: #0a0a0c;
            --text: #fff;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            padding: 0;
            margin: 0;
        }

        .hero {
            height: 500px;
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('https://source.unsplash.com/random/1200x800/?festival,rave');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        h1 {
            font-size: 5rem;
            text-transform: uppercase;
            margin: 0;
            color: var(--accent);
            text-shadow: 0 0 20px var(--accent);
        }

        .date {
            font-size: 1.5rem;
            letter-spacing: 5px;
            margin-top: 1rem;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .pic {
            height: 250px;
            background: #222;
            border: 2px solid var(--primary);
            transition: 0.3s;
            cursor: pointer;
        }

        .pic:hover {
            filter: brightness(1.5);
            transform: scale(1.05);
        }

        .back {
            position: absolute;
            top: 2rem;
            left: 2rem;
            color: #fff;
            text-decoration: none;
            border: 1px solid #fff;
            padding: 10px 20px;
        }
    </style>
</head>

<body>
    <a href="index.html" class="back">BACK TO HQ</a>
    <div class="hero">
        <h1>EDC NEW YORK</h1>
        <div class="date">JUNE 2013 // TACTICAL ARCHIVE</div>
    </div>
    <div class="gallery">
        <div class="pic"></div>
        <div class="pic"></div>
        <div class="pic"></div>
        <div class="pic"></div>
        <div class="pic"></div>
        <div class="pic"></div>
    </div>
</body>

</html>
