<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Columns Shortcode | RaveRafting Tactical</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap">
    <style>
        :root {
            --primary: #00ffcc;
            --secondary: #ff00ff;
            --bg: #0a0a0c;
            --surface: #16161a;
            --text: #ffffff;
            --text-dim: #a0a0a0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            line-height: 1.6;
            padding: 4rem 2rem;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .protocol-label {
            color: var(--secondary);
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 0.7rem;
            margin-bottom: 1rem;
            opacity: 0.6;
        }

        h1 {
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 6px;
            margin: 0;
            color: var(--primary);
        }

        .row {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .col {
            background: var(--surface);
            border: 1px solid #333;
            padding: 2rem;
            border-radius: 4px;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .full {
            width: 100%;
        }

        .half {
            width: 50%;
        }

        .third {
            width: 33.33%;
        }

        .two-third {
            width: 66.66%;
        }

        .label {
            font-size: 0.6rem;
            color: #444;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            font-family: monospace;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div class="protocol-label">Logic Demonstration // Asset 012</div>
            <h1>Columns Shortcode</h1>
        </header>

        <div class="label">[one_half] .. [one_half]</div>
        <div class="row">
            <div class="col half">1/2 Tactical Unit</div>
            <div class="col half">1/2 Tactical Unit</div>
        </div>

        <div class="label">[one_third] .. [one_third] .. [one_third]</div>
        <div class="row">
            <div class="col third">1/3 Intel</div>
            <div class="col third">1/3 Intel</div>
            <div class="col third">1/3 Intel</div>
        </div>

        <div class="label">[two_third] .. [one_third]</div>
        <div class="row">
            <div class="col two-third">2/3 Heavy Content Deployment</div>
            <div class="col third" style="border-color: var(--secondary);">1/3 Sidebar</div>
        </div>

        <div style="text-align: center; margin-top: 6rem;">
            <a href="index.html"
                style="color: var(--text-dim); text-decoration: none; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; border: 1px solid #333; padding: 0.5rem 1rem;">RTB</a>
        </div>
    </div>
</body>

</html>
