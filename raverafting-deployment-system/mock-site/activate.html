<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description"
        content="RaveRafting System Protocol: Authorization required for high-fidelity intelligence stream activation.">
    <title>Activate | RaverRafting</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto+Condensed:400,700|Lato:400,700" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        :root {
            --primary-green: #82c341;
            --brand-purple: #7c13af;
            --bg-gray: #f5f5f5;
            --nav-black: #000;
        }

        body {
            background: #121214;
            color: #fff;
            font-family: 'Lato', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .activate-card {
            background: #1a1a1d;
            border: 1px solid #333;
            padding: 4rem;
            max-width: 600px;
            text-align: center;
            border-radius: 4px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .activate-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--primary-green);
        }

        .protocol-label {
            font-family: 'Roboto Condensed';
            text-transform: uppercase;
            color: var(--primary-green);
            letter-spacing: 4px;
            font-size: 0.7rem;
            margin-bottom: 1rem;
            opacity: 0.8;
        }

        h1 {
            font-family: 'Roboto Condensed';
            text-transform: uppercase;
            font-size: 3rem;
            letter-spacing: 6px;
            margin: 0 0 20px 0;
        }

        p {
            color: #888;
            line-height: 1.8;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        .uplink-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
            text-align: left;
        }

        .uplink-stat {
            background: rgba(255, 255, 255, 0.05);
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .uplink-stat label {
            display: block;
            font-size: 0.6rem;
            text-transform: uppercase;
            font-weight: bold;
            color: var(--brand-purple);
            margin-bottom: 5px;
        }

        .uplink-stat span {
            font-family: monospace;
            font-size: 0.9rem;
        }

        .activate-btn {
            background: transparent;
            border: 2px solid var(--primary-green);
            color: var(--primary-green);
            padding: 15px 30px;
            text-transform: uppercase;
            font-family: 'Roboto Condensed';
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
        }

        .activate-btn:hover {
            background: var(--primary-green);
            color: #000;
        }

        .back-link {
            display: block;
            margin-top: 2rem;
            color: #555;
            text-decoration: none;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .back-link:hover {
            color: var(--primary-green);
        }
    </style>
</head>

<body>
    <div class="activate-card">
        <div class="protocol-label">System Protocol // Asset 003</div>
        <h1>Activate</h1>
        <p>This terminal is currently in standby mode. Please provide valid authorization credentials to activate the
            full RaveRafting intelligence stream.</p>

        <div class="uplink-grid">
            <div class="uplink-stat">
                <label>Uplink Status</label>
                <span>AWAITING_INPUT</span>
            </div>
            <div class="uplink-stat">
                <label>Access Zone</label>
                <span>RESTRICTED</span>
            </div>
        </div>

        <button class="activate-btn">Initialize Uplink</button>

        <a href="index.html" class="back-link">&larr; Return to Base</a>
    </div>
</body>

</html>
